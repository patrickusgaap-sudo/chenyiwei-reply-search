05 13:06:08", "replySortTime": "2026-05-05 13:06:08", "url": "https://bbs.esnai.com/thread-5496974-1-1.html", "question": "上市公司自身单体报告时，由于不涉及到合并报表，只是单体报表，有几个疑问：\n\n1、是否需要披露重要的非全资子公司数据、重要联营企业的主要财务信息（这账表格内容中的“对联营企业权益投资的账面价值”最终会与合并报表中的长期股权投资-联营企业数据一致，与单体报表中的长期股权投资-联营企业并不会一致）？\n\n2、涉及到其他原因导致的合并范围变动、在未纳入合并财务报表范围的结构化主体中的权益等事项，应该不用披露吧。\n\n3、上市公司有分公司的，是否需要披露分公司纳入的情况呢？如果需要披露，那么在哪里进行披露呢？", "reply": "1、这些信息都是在合并报表层面披露的。如果仅编制个别报表而不编制合并报表（此时属于特殊目的审计，不能用于对外公告），是否披露这些信息可由管理层与委托方、预期报表使用者等确定；如果该上市公司本身无子公司，只有个别报表的，则该个别报表属于正式的年度财务报表，附注中需完整披露主要联营、合营企业财务信息。\n\n2、同上，关键是看此次审计是法定审计还是特殊目的审计。如果是法定审计则需披露，如果是特殊目的审计则取决于委托方和预期使用者的信息需求。\n\n3、一般不需要披露。如果是专项审计则根据委托方的信息需求确定。", "searchText": "5496974 母公司单体报告问题 合并/股权/权益法 爬爬呀 上市公司自身单体报告时，由于不涉及到合并报表，只是单体报表，有几个疑问：\n\n1、是否需要披露重要的非全资子公司数据、重要联营企业的主要财务信息（这账表格内容中的“对联营企业权益投资的账面价值”最终会与合并报表中的长期股权投资-联营企业数据一致，与单体报表中的长期股权投资-联营企业并不会一致）？\n\n2、涉及到其他原因导致的合并范围变动、在未纳入合并财务报表范围的结构化主体中的权益等事项，应该不用披露吧。\n\n3、上市公司有分公司的，是否需要披露分公司纳入的情况呢？如果需要披露，那么在哪里进行披露呢？ 1、这些信息都是在合并报表层面披露的。如果仅编制个别报表而不编制合并报表（此时属于特殊目的审计，不能用于对外公告），是否披露这些信息可由管理层与委托方、预期报表使用者等确定；如果该上市公司本身无子公司，只有个别报表的，则该个别报表属于正式的年度财务报表，附注中需完整披露主要联营、合营企业财务信息。\n\n2、同上，关键是看此次审计是法定审计还是特殊目的审计。如果是法定审计则需披露，如果是特殊目的审计则取决于委托方和预期使用者的信息需求。\n\n3、一般不需要披露。如果是专项审计则根据委托方的信息需求确定。"}, {"tid": "5496939", "title": "求助陈版主", "category": "其他", "questionAuthor": "爬爬呀", "questionTime": "2026-04-29 18:50:05", "replyTime": "2026-05-05 13:02:43", "replySortTime": "2026-05-05 13:02:43", "url": "https://bbs.esnai.com/thread-5496939-1-1.html", "question": "特别感谢陈版主的很多指导，下列问题希望陈版主可以多加指导下：1、公司打算无纸化办公，像很多资料没有打印出来，这块我们如何实施相应的审计程序呢？考虑这块的审计风险以及企业风险提示呢？以企业收入业务为例，根据客户验收确认收入，收入一流程涉及到发票、出库单、验收单，但是这一流程资料都是由不同部门保管的，财务没有将一系列流程统一保管，放在记账凭证后面，这个如何向企业提建议呢？2、企业2025年12月对于大额应收账款有进行核销，只有内部管理层审批的文件，没有其他的程序了。然后在2026年与年报公告时，一并发布了关于 2025 年度计提资产减值准备及核销资产的公告，请问一样这样的程序是否合规，存在哪些风险呢？大额的应收账款核销是否需要经事务所审计呢？3、像2025年审计报告中，有涉及到仓单作为会计政策变更，如果被审计单位不涉及到此项业务，是否可以不在报告中进行披露呢，即列示为本公司本期无重要会计政策变更。4、企业采购原材料入库时，是否必须要有内部签字确认的入库单呢，在外单位送货单上签字确认留存作为入库的依据，是否可以呢？", "reply": "1、需对存储电子凭证信息的系统进行IT审计，确保其内部控制的有效性，在此基础上才能以该系统中导出或输出的原始凭证信息作为审计证据。\n\n2、应收账款核销应按照《关于建立健全企业应收款项管理制度的通知》（财企[2002]513号）、《关于印发中央企业资产减值准备财务核销工作规则的通知》（国资发评价[2005]67号）等规定的条件和程序处理。事务所专项审计可能不是必经程序，但在年度审计中度对核销的依据和流程予以重点关注。\n\n3、没有此类业务的企业，无需披露该项会计政策变更。\n\n4、根据企业内部管理流程确定。", "searchText": "5496939 求助陈版主 其他 爬爬呀 特别感谢陈版主的很多指导，下列问题希望陈版主可以多加指导下：1、公司打算无纸化办公，像很多资料没有打印出来，这块我们如何实施相应的审计程序呢？考虑这块的审计风险以及企业风险提示呢？以企业收入业务为例，根据客户验收确认收入，收入一流程涉及到发票、出库单、验收单，但是这一流程资料都是由不同部门保管的，财务没有将一系列流程统一保管，放在记账凭证后面，这个如何向企业提建议呢？2、企业2025年12月对于大额应收账款有进行核销，只有内部管理层审批的文件，没有其他的程序了。然后在2026年与年报公告时，一并发布了关于 2025 年度计提资产减值准备及核销资产的公告，请问一样这样的程序是否合规，存在哪些风险呢？大额的应收账款核销是否需要经事务所审计呢？3、像2025年审计报告中，有涉及到仓单作为会计政策变更，如果被审计单位不涉及到此项业务，是否可以不在报告中进行披露呢，即列示为本公司本期无重要会计政策变更。4、企业采购原材料入库时，是否必须要有内部签字确认的入库单呢，在外单位送货单上签字确认留存作为入库的依据，是否可以呢？ 1、需对存储电子凭证信息的系统进行it审计，确保其内部控制的有效性，在此基础上才能以该系统中导出或输出的原始凭证信息作为审计证据。\n\n2、应收账款核销应按照《关于建立健全企业应收款项管理制度的通知》（财企[2002]513号）、《关于印发中央企业资产减值准备财务核销工作规则的通知》（国资发评价[2005]67号）等规定的条件和程序处理。事务所专项审计可能不是必经程序，但在年度审计中度对核销的依据和流程予以重点关注。\n\n3、没有此类业务的企业，无需披露该项会计政策变更。\n\n4、根据企业内部管理流程确定。"}, {"tid": "5496931", "title": "金融企业转为非金融企业是否要变更核算科目？", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "破罗马", "questionTime": "2026-04-28 21:32:59", "replyTime": "2026-05-05 12:56:07", "replySortTime": "2026-05-05 12:56:07", "url": "https://bbs.esnai.com/thread-5496931-1-1.html", "question": "某企业原来是金融企业，后因金融牌照到期，也变更了经营范围，不再从事金融服务。\n\n原在“贷款”科目下核算的内容，是否要在变更后转为“其他应收款”？", "reply": "金融企业不再从事需办理金融许可证才能从事的业务，转为非金融企业的，其核算科目和报表格式应按非金融企业的要求进行相应调整。主帖的理解基本合理。可参照国资委发布的金融企业报表格式转为非金融企业报表格式的相关对应关系处理。", "searchText": "5496931 金融企业转为非金融企业是否要变更核算科目？ 金融工具/外币/债务重组/abs 破罗马 某企业原来是金融企业，后因金融牌照到期，也变更了经营范围，不再从事金融服务。\n\n原在“贷款”科目下核算的内容，是否要在变更后转为“其他应收款”？ 金融企业不再从事需办理金融许可证才能从事的业务，转为非金融企业的，其核算科目和报表格式应按非金融企业的要求进行相应调整。主帖的理解基本合理。可参照国资委发布的金融企业报表格式转为非金融企业报表格式的相关对应关系处理。"}, {"tid": "5496930", "title": "建筑劳务分包属于代理人还是主要责任人！！！", "category": "收入确认/总额净额", "questionAuthor": "wuzhilin_000", "questionTime": "2026-04-28 20:55:29", "replyTime": "2026-05-05 12:49:20", "replySortTime": "2026-05-05 12:49:20", "url": "https://bbs.esnai.com/thread-5496930-1-1.html", "question": "本公司中标A工程项目的建筑劳务分包（7个区域的装修工程），然后在将A项目的装修工程分包给不同的班组（均为个人），与招标单位（以下统称为“发包方”）和班组签订合同的主要条款如下：\n\n1、与“发包方”签订合同的主要条款：\n\n（1）工作方式：实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理。\n\n（2）工期要求：本公司应按照发包方的要求进行施工作业，准时完成施工，以保证工程按期竣工验收交付使用。\n\n（3）质量要求：因本公司的原因造成工程质量达不到验收条件的，在合理时间内无偿返工直到达到验收标准，否则发包方有权单方解除合同并可要求本公司赔偿损失。\n\n（4）计价方式：a、计时制：按照中标单价执行；b、计量制：按施工据实计量；\n\n（5）计量方式：由发包方组织验收合格后，对合格的工程进行结算。\n\n（6）支付方式：由发包方统一验收后，对合格工程量进行计量支付，按完成工程量97%进行支付，项目完工并通过验收后，发包方一次性支付所有费用，同时提供相应金额数量劳务发票。\n\n（7）施工管理及安全：\n\na、施工中发包方方有权随机对本公司施工工艺质量等进行检查，如发现问题，本公司应在发包方规定的限期内整改至合格，如不能按时整改，所延误的工期及损失由本公司全额赔偿。\n\nb、本公司应遵守工程建设安全生产的有关管理规定，严格按安全标准组织施工，本公司负责对施工工人进行安全教育，采取必要的安全措施，安全责任由本公司负责。\n\nc、本公司需听从发包方工作安排，工人数量无条件达到工程需求，如因本公司原因造成工期延误，发包方有权对本公司进行处罚。\n\n2、与“班组”签订合同的 主要条款：\n\n（1）合同金额：按实际发生工程量计算(单包工)。\n\n（2）付款方式：施工费用按完成工程量支付(或按工程进度节点支付)，工程完工后，支付结算款的97%，余款3%待工程项目部验收合格后一次性付清。\n\n（3）工程质量标准：所施工范围内的工艺质量必须达到本公司要求，按照本公司要求实施，并接受随时抽查。\n\n（4）安全责任：a、班组与每个务工人员签订《劳动合同》，并支付工资（务工人员工资每月造册备案）。若因此带来的纠纷由班组承担。b、班组应遵守安全生产相关规定，严格按照安全施工标准进行施工，加强安全教育。若因此造成的事故由班组承担。\n\n（5）若中途无故停工、罢工，造成的损失由班组承担。\n\n本人的判断如下：\n\n1、由于该项目的建筑劳务分包，是通过投标所得，因此本公司无定价权；本公司按照发包方的要求进行施工，在整个过程中不能对该项装修工程进行更改。\n\n2、本公司与发包方、班组签订的合同，工程相关责任（安全事故、工程质量、停工损失等）转嫁给了班组。\n\n3、发包方与本公司、本公司与班组的付款方式均为，工程完工后支付97%，剩余3%，验收合格后一次性支付。因此本公司实质上不承担与班组的工程款项支付的违约风险。\n\n4、该项工程实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理，本公司不承担装修工程的主要风险。\n\n综上所述：本公司在转让商品前（装修工程），不能控制该商品（装修工程）。因此，本人认为该业务应当采用“净额法”核算。\n\n请陈老师指教！请各位大佬指教！", "reply": "https://bbs.esnai.com/thread-5496929-1-1.html", "searchText": "5496930 建筑劳务分包属于代理人还是主要责任人！！！ 收入确认/总额净额 wuzhilin_000 本公司中标a工程项目的建筑劳务分包（7个区域的装修工程），然后在将a项目的装修工程分包给不同的班组（均为个人），与招标单位（以下统称为“发包方”）和班组签订合同的主要条款如下：\n\n1、与“发包方”签订合同的主要条款：\n\n（1）工作方式：实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理。\n\n（2）工期要求：本公司应按照发包方的要求进行施工作业，准时完成施工，以保证工程按期竣工验收交付使用。\n\n（3）质量要求：因本公司的原因造成工程质量达不到验收条件的，在合理时间内无偿返工直到达到验收标准，否则发包方有权单方解除合同并可要求本公司赔偿损失。\n\n（4）计价方式：a、计时制：按照中标单价执行；b、计量制：按施工据实计量；\n\n（5）计量方式：由发包方组织验收合格后，对合格的工程进行结算。\n\n（6）支付方式：由发包方统一验收后，对合格工程量进行计量支付，按完成工程量97%进行支付，项目完工并通过验收后，发包方一次性支付所有费用，同时提供相应金额数量劳务发票。\n\n（7）施工管理及安全：\n\na、施工中发包方方有权随机对本公司施工工艺质量等进行检查，如发现问题，本公司应在发包方规定的限期内整改至合格，如不能按时整改，所延误的工期及损失由本公司全额赔偿。\n\nb、本公司应遵守工程建设安全生产的有关管理规定，严格按安全标准组织施工，本公司负责对施工工人进行安全教育，采取必要的安全措施，安全责任由本公司负责。\n\nc、本公司需听从发包方工作安排，工人数量无条件达到工程需求，如因本公司原因造成工期延误，发包方有权对本公司进行处罚。\n\n2、与“班组”签订合同的 主要条款：\n\n（1）合同金额：按实际发生工程量计算(单包工)。\n\n（2）付款方式：施工费用按完成工程量支付(或按工程进度节点支付)，工程完工后，支付结算款的97%，余款3%待工程项目部验收合格后一次性付清。\n\n（3）工程质量标准：所施工范围内的工艺质量必须达到本公司要求，按照本公司要求实施，并接受随时抽查。\n\n（4）安全责任：a、班组与每个务工人员签订《劳动合同》，并支付工资（务工人员工资每月造册备案）。若因此带来的纠纷由班组承担。b、班组应遵守安全生产相关规定，严格按照安全施工标准进行施工，加强安全教育。若因此造成的事故由班组承担。\n\n（5）若中途无故停工、罢工，造成的损失由班组承担。\n\n本人的判断如下：\n\n1、由于该项目的建筑劳务分包，是通过投标所得，因此本公司无定价权；本公司按照发包方的要求进行施工，在整个过程中不能对该项装修工程进行更改。\n\n2、本公司与发包方、班组签订的合同，工程相关责任（安全事故、工程质量、停工损失等）转嫁给了班组。\n\n3、发包方与本公司、本公司与班组的付款方式均为，工程完工后支付97%，剩余3%，验收合格后一次性支付。因此本公司实质上不承担与班组的工程款项支付的违约风险。\n\n4、该项工程实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理，本公司不承担装修工程的主要风险。\n\n综上所述：本公司在转让商品前（装修工程），不能控制该商品（装修工程）。因此，本人认为该业务应当采用“净额法”核算。\n\n请陈老师指教！请各位大佬指教！ https://bbs.esnai.com/thread-5496929-1-1.html"}, {"tid": "5496920", "title": "处置其他权益工具投资", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "iamclerk", "questionTime": "2026-04-28 13:19:39", "replyTime": "2026-05-05 12:48:32", "replySortTime": "2026-05-05 12:48:32", "url": "https://bbs.esnai.com/thread-5496920-1-1.html", "question": "处置在“其他权益工具投资”科目中核算的一项权益投资，平时核算视同成本法简化处理，未按公允价值核算。现在处置这个投资，处置收益能否计入投资收益中，还是必须计入留存收益。此项投资无活跃市场，年底能取得对方会计报表。", "reply": "因为是指定为其他权益工具投资核算，期末虽然未确认公允价值变动所导致的其他综合收益，但这是管理人认为成本可作为对期末公允价值的最佳估计所致，本质上仍是以公允价值计量且其变动计入其他综合收益的非交易性权益工具投资。故在处置时，应将处置价款与原账面价值之间的差额计入其他综合收益处理，再转入留存收益，不能计入损益。", "searchText": "5496920 处置其他权益工具投资 金融工具/外币/债务重组/abs iamclerk 处置在“其他权益工具投资”科目中核算的一项权益投资，平时核算视同成本法简化处理，未按公允价值核算。现在处置这个投资，处置收益能否计入投资收益中，还是必须计入留存收益。此项投资无活跃市场，年底能取得对方会计报表。 因为是指定为其他权益工具投资核算，期末虽然未确认公允价值变动所导致的其他综合收益，但这是管理人认为成本可作为对期末公允价值的最佳估计所致，本质上仍是以公允价值计量且其变动计入其他综合收益的非交易性权益工具投资。故在处置时，应将处置价款与原账面价值之间的差额计入其他综合收益处理，再转入留存收益，不能计入损益。"}, {"tid": "5496918", "title": "房屋建筑物转固时点", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "1314瓶瓶罐罐", "questionTime": "2026-04-28 10:14:56", "replyTime": "2026-05-05 12:46:52", "replySortTime": "2026-05-05 12:46:52", "url": "https://bbs.esnai.com/thread-5496918-1-1.html", "question": "陈老师，您好\n\n我公司新建一栋办公楼：公司内部已于25年12月完成建设单位、监理单位、施工单位、勘察单位、设计单位一起做的竣工验收（还没做好装修，基本算毛坯状态，水电也没通），26年3月已完成质量监督部门验收，预计26年6月完成消防、档案、规划验收后 就可以入住。\n\n想问下这种房屋的预定可使用状态如何确定？\n\n能够入住进去办公属于达到预定可使用状态 吗？（只有完成消防验收后 才可以入住，那是否可以按 消防验收的时点作为转固时点？）\n\n如果是生产车间的房屋 那对应的转固时点是否和办公楼一致？\n\n感谢！", "reply": "2025年末已完成竣工验收，但尚未接通水电，不具备开展装修的条件（更不具备入住条件），故2025年末尚未达到预定可使用状态，应继续在在建工程科目中核算。\n\n根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使用寿命或者以不同方式为企业提供经济利益，适用不同折旧率或折旧方法的，应当分别将各组成部分确认为单项固定资产。”。据此，房屋建筑物的主体结构和依附于该主体结构的装修是两项不同的固定资产。理论上，在主体结构完成，可以开展装修工程时，主体结构部分就应当转固（装修工程期间，主体结构已先行转固，此时主体结构部分计提的折旧可计入装修工程的成本）。", "searchText": "5496918 房屋建筑物转固时点 资产/存货/固定资产/无形资产 1314瓶瓶罐罐 陈老师，您好\n\n我公司新建一栋办公楼：公司内部已于25年12月完成建设单位、监理单位、施工单位、勘察单位、设计单位一起做的竣工验收（还没做好装修，基本算毛坯状态，水电也没通），26年3月已完成质量监督部门验收，预计26年6月完成消防、档案、规划验收后 就可以入住。\n\n想问下这种房屋的预定可使用状态如何确定？\n\n能够入住进去办公属于达到预定可使用状态 吗？（只有完成消防验收后 才可以入住，那是否可以按 消防验收的时点作为转固时点？）\n\n如果是生产车间的房屋 那对应的转固时点是否和办公楼一致？\n\n感谢！ 2025年末已完成竣工验收，但尚未接通水电，不具备开展装修的条件（更不具备入住条件），故2025年末尚未达到预定可使用状态，应继续在在建工程科目中核算。\n\n根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使用寿命或者以不同方式为企业提供经济利益，适用不同折旧率或折旧方法的，应当分别将各组成部分确认为单项固定资产。”。据此，房屋建筑物的主体结构和依附于该主体结构的装修是两项不同的固定资产。理论上，在主体结构完成，可以开展装修工程时，主体结构部分就应当转固（装修工程期间，主体结构已先行转固，此时主体结构部分计提的折旧可计入装修工程的成本）。"}, {"tid": "5496916", "title": "陈老师，求助关于项目公司融资租赁设备并与融资租赁公司之间的项目分成问题", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "AshenONE1", "questionTime": "2026-04-27 21:57:48", "replyTime": "2026-05-05 12:40:59", "replySortTime": "2026-05-05 12:40:59", "url": "https://bbs.esnai.com/thread-5496916-1-1.html", "question": "陈老师好:相关业务背景如下：\n\n（1）项目公司从母公司处采购光伏设备，并与融资租赁公司之间签订融资租赁合同，设备款的支付方式存在两种模式。①由融资租赁贵公司全额支付；②由融资祖灵公司支付80%，项目公司支付20%。\n\n（2）项目公司还款方式有两种：①完全采用项目分成（以上两种设备款的支付方式都有）,在设备租赁期间内（设备租赁为20-25年，基本为设备90%的使用寿命）项目公司享有收益的10%，融资租赁公司享有收益的20%。\n\n②固定租金+项目分成（以上两种设备款的支付方式都有），在设备租赁期间内（租期同上）项目公司享有收益的10%，融资租赁公司享有收益的20%。", "reply": "这种交易的实质是项目公司从母公司采购设备，并据此从融资租赁公司获取融资，后续按照固定和/或变动租金的方式对该融资还本付息。设备的控制权由供应商（母公司）直接转移给项目公司。融资租赁公司只是提供融资的角色，但可能通过收益分成的方式享有或承担项目公司的部分经营风险。\n\n建议的会计处理原则：\n\n1、项目公司将购入的设备确认为自身固定资产，金额为与母公司之间签订的合同总价，包含自身承担部分和融资租赁公司代付部分之和。\n\n2、在项目公司的负债端，如不涉及收益分成的，则确认为长期应付款（与租赁公司签订的合同约定的每年固定付款额折现，下同）；如涉及收益分成的，则固定价款部分确认为长期应付款，收益分成（浮动付款）部分属于以公允价值计量且其变动计入损益的金融负债，列报为其他非流动负债，预计将在一年内支付的部分列报为一年内到期的非流动负债。上述负债的公允价值为预计在剩余租赁期内后续需支付的分成款的折现值之和。", "searchText": "5496916 陈老师，求助关于项目公司融资租赁设备并与融资租赁公司之间的项目分成问题 租赁/使用权资产/融资租赁 ashenone1 陈老师好:相关业务背景如下：\n\n（1）项目公司从母公司处采购光伏设备，并与融资租赁公司之间签订融资租赁合同，设备款的支付方式存在两种模式。①由融资租赁贵公司全额支付；②由融资祖灵公司支付80%，项目公司支付20%。\n\n（2）项目公司还款方式有两种：①完全采用项目分成（以上两种设备款的支付方式都有）,在设备租赁期间内（设备租赁为20-25年，基本为设备90%的使用寿命）项目公司享有收益的10%，融资租赁公司享有收益的20%。\n\n②固定租金+项目分成（以上两种设备款的支付方式都有），在设备租赁期间内（租期同上）项目公司享有收益的10%，融资租赁公司享有收益的20%。 这种交易的实质是项目公司从母公司采购设备，并据此从融资租赁公司获取融资，后续按照固定和/或变动租金的方式对该融资还本付息。设备的控制权由供应商（母公司）直接转移给项目公司。融资租赁公司只是提供融资的角色，但可能通过收益分成的方式享有或承担项目公司的部分经营风险。\n\n建议的会计处理原则：\n\n1、项目公司将购入的设备确认为自身固定资产，金额为与母公司之间签订的合同总价，包含自身承担部分和融资租赁公司代付部分之和。\n\n2、在项目公司的负债端，如不涉及收益分成的，则确认为长期应付款（与租赁公司签订的合同约定的每年固定付款额折现，下同）；如涉及收益分成的，则固定价款部分确认为长期应付款，收益分成（浮动付款）部分属于以公允价值计量且其变动计入损益的金融负债，列报为其他非流动负债，预计将在一年内支付的部分列报为一年内到期的非流动负债。上述负债的公允价值为预计在剩余租赁期内后续需支付的分成款的折现值之和。"}, {"tid": "5496909", "title": "关于单边暂估挂账的问题", "category": "收入确认/总额净额", "questionAuthor": "shy730221me", "questionTime": "2026-04-27 16:23:11", "replyTime": "2026-05-05 11:48:19", "replySortTime": "2026-05-05 11:48:19", "url": "https://bbs.esnai.com/thread-5496909-1-1.html", "question": "求助各位老师：\n\n    集团内部两家子公司，B公司销售原材料给A公司，A公司年末未取得发票（集团内部平价销售无毛利，原材料未实现对外销售），A公司单边暂估挂账应付账款-B公司，B公司未做账务处理。在合并报表时，对于这类单边挂账的内部交易该如何进行抵销？", "reply": "首先，开具和取得发票并不是双方进行账务处理的条件。B公司作为销售方，应以收入准则规定的控制权转移作为能否确认收入的判断标准（例如A公司是否已验收入库）；A公司也应当依据同样的标准判断是否应进行暂估入库的会计处理。即双方的会计处理应当是同步、对称的，不应出现单边挂账情况。\n\n因此，A、B双方应根据截至期末的具体情况进行对账，确定哪一方未及时进行账务处理，对该方进行差错更正后，按照对平的往来和内部购销业务进行合并抵销处理。\n\n另外，在集团合并报表中，如果B（内部销售方）已达到增值税法规定的开具发票条件，则应及时开具发票；如果尚未达到开具发票条件但已满足会计上的收入确认条件，则B应按照《增值税会计处理规定》的相关规定确认“应交税费——待转销项税额”，此时A公司个别报表层面未暂估销项税额，但集团合并层面需暂估一项“其他流动资产——待取得抵扣凭证的增值税进项税额”以保持资产和负债两边的平衡。", "searchText": "5496909 关于单边暂估挂账的问题 收入确认/总额净额 shy730221me 求助各位老师：\n\n    集团内部两家子公司，b公司销售原材料给a公司，a公司年末未取得发票（集团内部平价销售无毛利，原材料未实现对外销售），a公司单边暂估挂账应付账款-b公司，b公司未做账务处理。在合并报表时，对于这类单边挂账的内部交易该如何进行抵销？ 首先，开具和取得发票并不是双方进行账务处理的条件。b公司作为销售方，应以收入准则规定的控制权转移作为能否确认收入的判断标准（例如a公司是否已验收入库）；a公司也应当依据同样的标准判断是否应进行暂估入库的会计处理。即双方的会计处理应当是同步、对称的，不应出现单边挂账情况。\n\n因此，a、b双方应根据截至期末的具体情况进行对账，确定哪一方未及时进行账务处理，对该方进行差错更正后，按照对平的往来和内部购销业务进行合并抵销处理。\n\n另外，在集团合并报表中，如果b（内部销售方）已达到增值税法规定的开具发票条件，则应及时开具发票；如果尚未达到开具发票条件但已满足会计上的收入确认条件，则b应按照《增值税会计处理规定》的相关规定确认“应交税费——待转销项税额”，此时a公司个别报表层面未暂估销项税额，但集团合并层面需暂估一项“其他流动资产——待取得抵扣凭证的增值税进项税额”以保持资产和负债两边的平衡。"}, {"tid": "5496908", "title": "物业公司收入确认", "category": "收入确认/总额净额", "questionAuthor": "wx_60764ff2e2a1", "questionTime": "2026-04-27 14:49:25", "replyTime": "2026-05-05 11:38:27", "replySortTime": "2026-05-05 11:38:27", "url": "https://bbs.esnai.com/thread-5496908-1-1.html", "question": "陈版您好，请教有关物业公司收入确认的问题。A物业公司服务的居民小区多为老旧小区，物业费收取难度较大，公司按照收到物业费时才确认收入，收到以前期间的物业费在收到当期确认收入，收到本期及以后期间的物业费，本期的当期确认收入，以后期间的分期在以后期间确认收入。请教下收到以前期间的物业费在收到当期确认收入是否可以。我认为这属于估计变更吧，因为当时不知道是否能收到，收到当期确认收入是可以的。请陈版帮指点下，谢谢！", "reply": "基本赞同主帖的处理意见。由于收款不确定性较大，故按实际收款确认收入，后续期间收到以前年度的物业费属于会计估计变更，并非前期差错更正。", "searchText": "5496908 物业公司收入确认 收入确认/总额净额 wx_60764ff2e2a1 陈版您好，请教有关物业公司收入确认的问题。a物业公司服务的居民小区多为老旧小区，物业费收取难度较大，公司按照收到物业费时才确认收入，收到以前期间的物业费在收到当期确认收入，收到本期及以后期间的物业费，本期的当期确认收入，以后期间的分期在以后期间确认收入。请教下收到以前期间的物业费在收到当期确认收入是否可以。我认为这属于估计变更吧，因为当时不知道是否能收到，收到当期确认收入是可以的。请陈版帮指点下，谢谢！ 基本赞同主帖的处理意见。由于收款不确定性较大，故按实际收款确认收入，后续期间收到以前年度的物业费属于会计估计变更，并非前期差错更正。"}, {"tid": "5496883", "title": "陈版，关于货物不动的是否是要净额法确认收入？", "category": "收入确认/总额净额", "questionAuthor": "642658990", "questionTime": "2026-04-24 14:25:04", "replyTime": "2026-05-05 11:37:16", "replySortTime": "2026-05-05 11:37:16", "url": "https://bbs.esnai.com/thread-5496883-1-1.html", "question": "中粮集团将粮食存放在仓储企业A,我公司参加中粮企业竞标，竞得存放在A企业的粮食，后再寻找客户准备就地将粮食给销售出去，最终A企业给的价格最高，请教陈版，我们从中粮买的粮销售给A是否必须按净额法确认收入？", "reply": "这种情况只是以货权凭证为载体的交易，对于承储企业而言只需要保证其库存量大于货权凭证上载明的数量，并不是特定的，所以本企业从未取得对特定商品的控制权，因此应采用净额法确认收入。根据具体情况，也不排除应直接运用金融工具准则的可能性，类似于财政部案例中的标准仓单交易。", "searchText": "5496883 陈版，关于货物不动的是否是要净额法确认收入？ 收入确认/总额净额 642658990 中粮集团将粮食存放在仓储企业a,我公司参加中粮企业竞标，竞得存放在a企业的粮食，后再寻找客户准备就地将粮食给销售出去，最终a企业给的价格最高，请教陈版，我们从中粮买的粮销售给a是否必须按净额法确认收入？ 这种情况只是以货权凭证为载体的交易，对于承储企业而言只需要保证其库存量大于货权凭证上载明的数量，并不是特定的，所以本企业从未取得对特定商品的控制权，因此应采用净额法确认收入。根据具体情况，也不排除应直接运用金融工具准则的可能性，类似于财政部案例中的标准仓单交易。"}, {"tid": "5496881", "title": "锁汇购置设备损益相关", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "木头chxj1986", "questionTime": "2026-04-24 11:01:23", "replyTime": "2026-05-05 11:30:01", "replySortTime": "2026-05-05 11:30:01", "url": "https://bbs.esnai.com/thread-5496881-1-1.html", "question": "求助陈版主，公司处于项目建设期，尚未完工，因需要购置大量国外设备，因此存在锁汇的业务，请问在资产负债表日，尚在执行中的外币合同按照锁汇计算应付的人民币金额与期末公允价值之间的差额是否可以作为资本化计入在建工程呢，感谢不吝赐教。", "reply": "不可以计入设备成本。这部分汇兑损失是由于企业的外汇管理活动造成（不论是否进行套期活动和运用套期会计方法），不属于固定资产准则规定的“使固定资产达到预定可使用状态的必要支出”和借款费用准则规定的可资本化的借款费用，故不能资本化计入固定资产成本。", "searchText": "5496881 锁汇购置设备损益相关 金融工具/外币/债务重组/abs 木头chxj1986 求助陈版主，公司处于项目建设期，尚未完工，因需要购置大量国外设备，因此存在锁汇的业务，请问在资产负债表日，尚在执行中的外币合同按照锁汇计算应付的人民币金额与期末公允价值之间的差额是否可以作为资本化计入在建工程呢，感谢不吝赐教。 不可以计入设备成本。这部分汇兑损失是由于企业的外汇管理活动造成（不论是否进行套期活动和运用套期会计方法），不属于固定资产准则规定的“使固定资产达到预定可使用状态的必要支出”和借款费用准则规定的可资本化的借款费用，故不能资本化计入固定资产成本。"}, {"tid": "5496880", "title": "无偿取得的碳排放权资产质押", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "lijiaan", "questionTime": "2026-04-24 10:57:36", "replyTime": "2026-05-05 11:28:16", "replySortTime": "2026-05-05 11:28:16", "url": "https://bbs.esnai.com/thread-5496880-1-1.html", "question": "求助陈版，公司从政府无偿取得碳排放权配额，取得时未进行账务处理，以评估价值100万元进行借款质押，请问期末受限资产是否应列示该项碳排放权资产？", "reply": "该项资产的状态是已被质押，虽然账面价值为零，但仍需披露其为受限资产。\n\n另外，建议咨询律师，已确定此类无偿取得的碳排放权是否只能用于自身的履约，而不能转让。", "searchText": "5496880 无偿取得的碳排放权资产质押 资产/存货/固定资产/无形资产 lijiaan 求助陈版，公司从政府无偿取得碳排放权配额，取得时未进行账务处理，以评估价值100万元进行借款质押，请问期末受限资产是否应列示该项碳排放权资产？ 该项资产的状态是已被质押，虽然账面价值为零，但仍需披露其为受限资产。\n\n另外，建议咨询律师，已确定此类无偿取得的碳排放权是否只能用于自身的履约，而不能转让。"}, {"tid": "5496919", "title": "求助陈版主", "category": "其他", "questionAuthor": "爬爬呀", "questionTime": "2026-04-28 10:18:14", "replyTime": "2026-04-28 12:08:08", "replySortTime": "2026-04-28 12:08:08", "url": "https://bbs.esnai.com/thread-5496919-1-1.html", "question": "辛苦陈版主多指导下:\n\n公司高管、实际控制人对公司客户的回款以及向公司借款进行担保，这个是否要进行公告呢？会涉及到哪些关注点呢？恳请陈版主多指导下。", "reply": "这种情况属于关联交易，需要公告。\n\n如果后续因高管、实控人履行担保承诺而向公司补偿损失的，则应考虑是否需作为权益性交易，贷记资本公积处理。\n\n如果是由非实控人的高管提供担保的，需关注这样安排是否具有商业合理性。\n\n另外，此类由实控人、高管提供担保的交易，一方面固然可以将其视为维护中小股东利益的举措，但另一方面也可能导致对相关销售交易的真实性的疑虑，建议关注对应的销售交易的背景，关注是否存在虚增业绩、完成业绩承诺等舞弊动机。", "searchText": "5496919 求助陈版主 其他 爬爬呀 辛苦陈版主多指导下:\n\n公司高管、实际控制人对公司客户的回款以及向公司借款进行担保，这个是否要进行公告呢？会涉及到哪些关注点呢？恳请陈版主多指导下。 这种情况属于关联交易，需要公告。\n\n如果后续因高管、实控人履行担保承诺而向公司补偿损失的，则应考虑是否需作为权益性交易，贷记资本公积处理。\n\n如果是由非实控人的高管提供担保的，需关注这样安排是否具有商业合理性。\n\n另外，此类由实控人、高管提供担保的交易，一方面固然可以将其视为维护中小股东利益的举措，但另一方面也可能导致对相关销售交易的真实性的疑虑，建议关注对应的销售交易的背景，关注是否存在虚增业绩、完成业绩承诺等舞弊动机。"}, {"tid": "5496831", "title": "在建期间缴纳的税费现金流", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "wx_62e62e1e9336", "questionTime": "2026-04-20 11:08:23", "replyTime": "2026-04-26 23:45:17", "replySortTime": "2026-04-26 23:45:17", "url": "https://bbs.esnai.com/thread-5496831-1-1.html", "question": "有个疑问想跟大家讨论下，在建项目期间缴纳的房产税、土地使用税、耕地占用税、植被恢复补偿费、印花税、契税，现金流哪些是计入投资活动，哪些是经营活动？\n\n我的理解是房产税、土地使用税与资产达到遇到可使用状态并不直接相关，应当计入“支付的各项税费”；耕地占用税、植被恢复补偿费、契税与资产相关，会计处理上通常也是资本化，应当计入“购建固定资产、无形资产和其他长期资产所支付的现金”；印花税是否区分资本化、费用化部分，分别计入“购建固定资产、无形资产和其他长期资产所支付的现金”、“支付的各项税费”。\n\n请问我的理解是否正确", "reply": "基本赞同主帖中的处理意见。", "searchText": "5496831 在建期间缴纳的税费现金流 政府补助/ppp/税费/现金流 wx_62e62e1e9336 有个疑问想跟大家讨论下，在建项目期间缴纳的房产税、土地使用税、耕地占用税、植被恢复补偿费、印花税、契税，现金流哪些是计入投资活动，哪些是经营活动？\n\n我的理解是房产税、土地使用税与资产达到遇到可使用状态并不直接相关，应当计入“支付的各项税费”；耕地占用税、植被恢复补偿费、契税与资产相关，会计处理上通常也是资本化，应当计入“购建固定资产、无形资产和其他长期资产所支付的现金”；印花税是否区分资本化、费用化部分，分别计入“购建固定资产、无形资产和其他长期资产所支付的现金”、“支付的各项税费”。\n\n请问我的理解是否正确 基本赞同主帖中的处理意见。"}, {"tid": "5496832", "title": "待退回的预收货款如何列报", "category": "列报/报表科目/其他", "questionAuthor": "腐草为萤", "questionTime": "2026-04-20 11:35:46", "replyTime": "2026-04-26 23:44:25", "replySortTime": "2026-04-26 23:44:25", "url": "https://bbs.esnai.com/thread-5496832-1-1.html", "question": "求助陈版主，公司年初收到一笔客户预收款，用于订单订货，由于出货周期较长，针对此笔预收款客户约定了支付一定的资金占用费，在中途出货一次后，由于出货时间较慢，经协商进行退款，但是退款实际发生在资产负债表日后，请问，资产负债表日，此项预收款是继续列示在“预收款项”还是分类为“其他应付款”？对应的现金流是列报为“销售商品收到的现金流”还是“收到的其他与经营活动有关的现金”？", "reply": "由于达成退款协议是在资产负债表日后，故在资产负债表中仍列报为合同负债，到达成退款协议后再转入其他应付款。退款的现金流量作为“支付其他与经营活动有关的现金”。", "searchText": "5496832 待退回的预收货款如何列报 列报/报表科目/其他 腐草为萤 求助陈版主，公司年初收到一笔客户预收款，用于订单订货，由于出货周期较长，针对此笔预收款客户约定了支付一定的资金占用费，在中途出货一次后，由于出货时间较慢，经协商进行退款，但是退款实际发生在资产负债表日后，请问，资产负债表日，此项预收款是继续列示在“预收款项”还是分类为“其他应付款”？对应的现金流是列报为“销售商品收到的现金流”还是“收到的其他与经营活动有关的现金”？ 由于达成退款协议是在资产负债表日后，故在资产负债表中仍列报为合同负债，到达成退款协议后再转入其他应付款。退款的现金流量作为“支付其他与经营活动有关的现金”。"}, {"tid": "5496834", "title": "求助，存货可变现净值的问题", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "小乐安1314", "questionTime": "2026-04-20 15:39:17", "replyTime": "2026-04-26 23:36:26", "replySortTime": "2026-04-26 23:36:26", "url": "https://bbs.esnai.com/thread-5496834-1-1.html", "question": "请教陈版，存货在做减值测试的时候，可变现净值是指估计售价减去至完工时估计将要发生的成本、估计的销售费用以及相关税费后的金额，这个相关税费是主要包括哪些税费呢，是税金及附加的明细吗", "reply": "可变现净值是不含增值税的，所以这里的“税费”不含增值税，但包括与处置相关的各项税费如消费税等，以及基于应交增值税、消费税金额计算的附加税费。", "searchText": "5496834 求助，存货可变现净值的问题 资产/存货/固定资产/无形资产 小乐安1314 请教陈版，存货在做减值测试的时候，可变现净值是指估计售价减去至完工时估计将要发生的成本、估计的销售费用以及相关税费后的金额，这个相关税费是主要包括哪些税费呢，是税金及附加的明细吗 可变现净值是不含增值税的，所以这里的“税费”不含增值税，但包括与处置相关的各项税费如消费税等，以及基于应交增值税、消费税金额计算的附加税费。"}, {"tid": "5496835", "title": "求助 陈版主 感谢陈版主", "category": "其他", "questionAuthor": "爬爬呀", "questionTime": "2026-04-20 17:01:42", "replyTime": "2026-04-26 23:35:12", "replySortTime": "2026-04-26 23:35:12", "url": "https://bbs.esnai.com/thread-5496835-1-1.html", "question": "向陈版主请教一下：上市公司的母公司A公司以及上市公司实控人甲，将持有上市公司的股份进行质押用于A公司借款融资，这块是否需要在报告中进行披露呢？如果需要披露的话，那么在哪里进行披露呢？这块会有哪些风险点需要关注呢？", "reply": "一般在上市公司报表附注的“其他重要事项”中披露。因为高比例质押表明A公司资金紧张，占用上市公司资金的舞弊风险显著增加，同时也表明上市公司存在控制权变更的风险。", "searchText": "5496835 求助 陈版主 感谢陈版主 其他 爬爬呀 向陈版主请教一下：上市公司的母公司a公司以及上市公司实控人甲，将持有上市公司的股份进行质押用于a公司借款融资，这块是否需要在报告中进行披露呢？如果需要披露的话，那么在哪里进行披露呢？这块会有哪些风险点需要关注呢？ 一般在上市公司报表附注的“其他重要事项”中披露。因为高比例质押表明a公司资金紧张，占用上市公司资金的舞弊风险显著增加，同时也表明上市公司存在控制权变更的风险。"}, {"tid": "5496853", "title": "求助陈版主，关于ABS账务处理问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "yuzsky", "questionTime": "2026-04-21 20:15:11", "replyTime": "2026-04-26 23:29:53", "replySortTime": "2026-04-26 23:29:53", "url": "https://bbs.esnai.com/thread-5496853-1-1.html", "question": "有一项应收账款资产支持专项计划，应收账款入池金额16亿元，募集资金14亿元，初始入账资产和权益同时入账14亿元；在第一年度总共收到4000万的应收账款，即现金流入4000万，但是在记账的时候资产成本减少=4000万/16亿*14亿=3500万，确认投资收益4000-3500=500万元，但是分配公告中，明确偿还本金1000万，分配本专项计划投资者时，", "reply": "对于ABS发行载体向其投资人分配的处理，当穿透后的底层资产为以公允价值计量且其变动计入损益的金融资产时，理论上因该项金融资产随时按公允价值计量调整，故不论是以分配收益还是收回本金的名义，都是冲减该项金融资产的账面价值。实务中如不具备随时获取和更新底层资产公允价值的条件的，则可以根据管理人的分配通知上载明的信息，分别冲减投资成本和确认投资收益。\n\n主帖案例中，应冲减投资资产的成本处理，在本金全部冲减为零之前不确认投资收益。", "searchText": "5496853 求助陈版主，关于abs账务处理问题 金融工具/外币/债务重组/abs yuzsky 有一项应收账款资产支持专项计划，应收账款入池金额16亿元，募集资金14亿元，初始入账资产和权益同时入账14亿元；在第一年度总共收到4000万的应收账款，即现金流入4000万，但是在记账的时候资产成本减少=4000万/16亿*14亿=3500万，确认投资收益4000-3500=500万元，但是分配公告中，明确偿还本金1000万，分配本专项计划投资者时， 对于abs发行载体向其投资人分配的处理，当穿透后的底层资产为以公允价值计量且其变动计入损益的金融资产时，理论上因该项金融资产随时按公允价值计量调整，故不论是以分配收益还是收回本金的名义，都是冲减该项金融资产的账面价值。实务中如不具备随时获取和更新底层资产公允价值的条件的，则可以根据管理人的分配通知上载明的信息，分别冲减投资成本和确认投资收益。\n\n主帖案例中，应冲减投资资产的成本处理，在本金全部冲减为零之前不确认投资收益。"}, {"tid": "5496905", "title": "多层投资主体，直接穿透，采用公允价值计量且其变动计入当期损益", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "HLK", "questionTime": "2026-04-26 22:04:52", "replyTime": "2026-04-26 23:11:53", "replySortTime": "2026-04-26 23:11:53", "url": "https://bbs.esnai.com/thread-5496905-1-1.html", "question": "多层投资主体，直接穿透，采用公允价值计量且其变动计入当期损益\n\nA控股有限公司对B基金管理公司控股70%，A与B成立C有限合伙企业，A是有限合伙人出资占比99%，B是普通合伙人出资占比1%。C作为风险投资者，投资D股份公司持股22%，但不具有重大影响，D在北交所挂牌上市，年末有收盘价。A、C都是投资性主体， C只做投资业务、不提供管理服务。有人讲，新投资金融准则，两层都是投资性主体，上层对下层也按公允价值计量。C合伙企业单体报表：对D的投资采用公允价值计量且其变动计入当期损益。A公司单体报表：A公司虽然实质上对C合伙企业控股，但不采用成本法核算，直接穿透到D公司，对D股票按99%*22%比例计算，按公允价值计量且其变动计入当期损益。\n\n      请教老师，A公司单体报表，对投资的会计处理是否适当？  谢谢", "reply": "根据《企业会计准则应用指南汇编2024》P51：本章中的权益性投资不包括风险投资机构、共同基金以及类似主体（如投资连结保险产品）持有的、在初始确认时以公允价值计量且其变动计入当期损益的金融资产，这类金融资产即使符合持有待售条件，也应继续按第二十二章金融工具确认和计量进行会计处理。投资性主体对不纳入合并财务报表的子公司的权益性投资，应按照公允价值计最且其变动计入当期损益。长期股权投资的披露，详见第四十一章在其他主体中权益的披露。\n\n因此，在主帖案例中，A在个别报表层面可对C的投资指定为以公允价值计量且其变动计入损益的金融资产，不再将C纳入合并范围（该项金融资产的公允价值即为根据C所持D股权的公允价值和C合伙企业的收益分配机制计算的应享有份额）。C层面持有D公司股份也是作为以公允价值计量且其变动计入损益的金融资产核算。", "searchText": "5496905 多层投资主体，直接穿透，采用公允价值计量且其变动计入当期损益 金融工具/外币/债务重组/abs hlk 多层投资主体，直接穿透，采用公允价值计量且其变动计入当期损益\n\na控股有限公司对b基金管理公司控股70%，a与b成立c有限合伙企业，a是有限合伙人出资占比99%，b是普通合伙人出资占比1%。c作为风险投资者，投资d股份公司持股22%，但不具有重大影响，d在北交所挂牌上市，年末有收盘价。a、c都是投资性主体， c只做投资业务、不提供管理服务。有人讲，新投资金融准则，两层都是投资性主体，上层对下层也按公允价值计量。c合伙企业单体报表：对d的投资采用公允价值计量且其变动计入当期损益。a公司单体报表：a公司虽然实质上对c合伙企业控股，但不采用成本法核算，直接穿透到d公司，对d股票按99%*22%比例计算，按公允价值计量且其变动计入当期损益。\n\n      请教老师，a公司单体报表，对投资的会计处理是否适当？  谢谢 根据《企业会计准则应用指南汇编2024》p51：本章中的权益性投资不包括风险投资机构、共同基金以及类似主体（如投资连结保险产品）持有的、在初始确认时以公允价值计量且其变动计入当期损益的金融资产，这类金融资产即使符合持有待售条件，也应继续按第二十二章金融工具确认和计量进行会计处理。投资性主体对不纳入合并财务报表的子公司的权益性投资，应按照公允价值计最且其变动计入当期损益。长期股权投资的披露，详见第四十一章在其他主体中权益的披露。\n\n因此，在主帖案例中，a在个别报表层面可对c的投资指定为以公允价值计量且其变动计入损益的金融资产，不再将c纳入合并范围（该项金融资产的公允价值即为根据c所持d股权的公允价值和c合伙企业的收益分配机制计算的应享有份额）。c层面持有d公司股份也是作为以公允价值计量且其变动计入损益的金融资产核算。"}, {"tid": "5496904", "title": "资产评估报告的有效期对验资报告日期不构成约束？", "category": "审计/报告表达", "questionAuthor": "HLK", "questionTime": "2026-04-26 21:56:31", "replyTime": "2026-04-26 23:01:23", "replySortTime": "2026-04-26 23:01:23", "url": "https://bbs.esnai.com/thread-5496904-1-1.html", "question": "1、        评估基准日为2020年11月30日，评估报告日期为2020年12月14日\n\n2、        本资产评估报告使用有效期为一年，即自本报告书载明的评估报告日2020年11月30日起至2021年11月29日止，超过本报告使用有效期不得使用本资产评估报告书。\n\n3、        股东专利出资日期为2021年7月31日，在资产评估报告使用有效期以内。\n\n4、        会计师事务所出具验资报告日期为2022年2月8日，在资产评估报告有效期之后。\n\n怎么理解超过报告使用有效期不得使用本资产评估报告书？\n\n评估报告有效期（评估基准日一年内）是对出资行为有效期的限制，而验资是基于评估价值结论实施的程序，验资是验证出资行为时间点（是否超期）的有效性。\n\n请问：依据上述评估报告价值出具的验资报告，是否不属于超期使用该资产评估报告？这个评估报告的有效日期对验资报告日期不构成约束？\n\n讲极端一点，只要出资行为时点在评估报告有效期（评估基准日一年内）以内，那怕在出资10年后才实施验资程序出具验资报告，形式上都没有问题？", "reply": "不属于超期使用该资产评估报告。只要出资到位日期仍在评估报告有效期内即可。验资报告日不受此约束。\n\n即，如主帖所述，“评估报告有效期（评估基准日一年内）是对出资行为有效期的限制，而验资是基于评估价值结论实施的程序，验资是验证出资行为时间点（是否超期）的有效性。”", "searchText": "5496904 资产评估报告的有效期对验资报告日期不构成约束？ 审计/报告表达 hlk 1、        评估基准日为2020年11月30日，评估报告日期为2020年12月14日\n\n2、        本资产评估报告使用有效期为一年，即自本报告书载明的评估报告日2020年11月30日起至2021年11月29日止，超过本报告使用有效期不得使用本资产评估报告书。\n\n3、        股东专利出资日期为2021年7月31日，在资产评估报告使用有效期以内。\n\n4、        会计师事务所出具验资报告日期为2022年2月8日，在资产评估报告有效期之后。\n\n怎么理解超过报告使用有效期不得使用本资产评估报告书？\n\n评估报告有效期（评估基准日一年内）是对出资行为有效期的限制，而验资是基于评估价值结论实施的程序，验资是验证出资行为时间点（是否超期）的有效性。\n\n请问：依据上述评估报告价值出具的验资报告，是否不属于超期使用该资产评估报告？这个评估报告的有效日期对验资报告日期不构成约束？\n\n讲极端一点，只要出资行为时点在评估报告有效期（评估基准日一年内）以内，那怕在出资10年后才实施验资程序出具验资报告，形式上都没有问题？ 不属于超期使用该资产评估报告。只要出资到位日期仍在评估报告有效期内即可。验资报告日不受此约束。\n\n即，如主帖所述，“评估报告有效期（评估基准日一年内）是对出资行为有效期的限制，而验资是基于评估价值结论实施的程序，验资是验证出资行为时间点（是否超期）的有效性。”"}, {"tid": "5496854", "title": "不支付对价的回收再利用的会计处理", "category": "其他", "questionAuthor": "summerrrr", "questionTime": "2026-04-21 21:50:45", "replyTime": "2026-04-26 22:59:11", "replySortTime": "2026-04-26 22:59:11", "url": "https://bbs.esnai.com/thread-5496854-1-1.html", "question": "求教陈版和各位大神：A公司生产并销售一种工业用消耗品，该产品的主要材料包括一种稀有金属，该稀有金属可以回收反复利用（有损耗）。A公司与客户签订销售合同，约定购买新的消耗品时，客户必须归还旧品才能购买新品，且归还时A公司不支付对价。A公司收回旧消耗品后会拆解出稀有金属，并继续用于新产品的生产。\n\n1、销售商品：按合同价全额确认收入，按存货账面价值确认成本\n\n2、收回稀有金属：按可利用的重量和市场单价确认为存货-原材料（公允价值），同时冲减当期成本\n\n3、再利用时：按原材料的账面价值（即回收时的公允价值）计入产成品\n\n求教上述会计处理是否正确？有无类似回收材料的案例？", "reply": "首先要确定此处的回收稀有金属和产品的销售交易是否对应，废料回收和产品销售是否形成一个闭环，即由A公司出售的产品，其对应的稀有金属也只能由A回收？另外该消耗品是否存在多个供应商供应类似产品，客户可以自由选择合作的供应商？\n\n如果产品销售和稀有金属回收并未形成闭环，特别是客户可以在多个供应商之间自由选择的，则采用主帖所述的处理方法；反之则参照受托加工处理（对于相当于稀有金属价值的部分，不确认采购和销售），", "searchText": "5496854 不支付对价的回收再利用的会计处理 其他 summerrrr 求教陈版和各位大神：a公司生产并销售一种工业用消耗品，该产品的主要材料包括一种稀有金属，该稀有金属可以回收反复利用（有损耗）。a公司与客户签订销售合同，约定购买新的消耗品时，客户必须归还旧品才能购买新品，且归还时a公司不支付对价。a公司收回旧消耗品后会拆解出稀有金属，并继续用于新产品的生产。\n\n1、销售商品：按合同价全额确认收入，按存货账面价值确认成本\n\n2、收回稀有金属：按可利用的重量和市场单价确认为存货-原材料（公允价值），同时冲减当期成本\n\n3、再利用时：按原材料的账面价值（即回收时的公允价值）计入产成品\n\n求教上述会计处理是否正确？有无类似回收材料的案例？ 首先要确定此处的回收稀有金属和产品的销售交易是否对应，废料回收和产品销售是否形成一个闭环，即由a公司出售的产品，其对应的稀有金属也只能由a回收？另外该消耗品是否存在多个供应商供应类似产品，客户可以自由选择合作的供应商？\n\n如果产品销售和稀有金属回收并未形成闭环，特别是客户可以在多个供应商之间自由选择的，则采用主帖所述的处理方法；反之则参照受托加工处理（对于相当于稀有金属价值的部分，不确认采购和销售），"}, {"tid": "5496867", "title": "PPP项目可用性付费年限与运营年限不同，建设成本摊销年限的选择", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "wzy20260423", "questionTime": "2026-04-23 12:00:48", "replyTime": "2026-04-26 22:40:12", "replySortTime": "2026-04-26 22:40:12", "url": "https://bbs.esnai.com/thread-5496867-1-1.html", "question": "我公司从事城市水环境治理，通过PPP模式，全过程设计、建设、运维城市雨污管网分流项目。会计处理采用无形资产模式，即建设成本计入无形资产，在进入运营期后按年摊销，项目收入来源于政府付费。在中部省份某个项目基本情况如下：PPP项目合作期30年，建设期3年，运营期27年。项目收入分为运维收入（成本加成模式，成本*（1+利润率））+可用性付费收入（行业内默认为投资回报，按年金方式支付），合同约定运维付费按年支付，付费年限即运维年限27年；可用性付费按15年支付，短于运维年限；项目成本分为运维成本+建设成本折旧摊销。现在项目已进入运营期，对建设成本摊销会计处理分歧：\n\n意见1：可用性付费收入按15年计算年金确认，建设成本按运维年限27年进行摊销。该核算前提下，项目运营期后12年项目收入为运维收入，项目成本为运维成本+折旧摊销成本，收入无法覆盖折旧摊销成本，为亏损状态。客观造成运营期前15年少计成本，项目全周期多交企业所得税。意见2：可用性付费收入按15年计算年金确认， 建设成本按15年进行摊销，达到收入、成本匹配（业务实际上可用性付费收入为项目建设成本投资回报）。个人认为，按15年摊销，税务上及可能要要求按27年摊销进行调整纳税。请问陈版主对成本摊销会计核算处理意见，以及税务上对摊销年限的认定。", "reply": "一般情况下，有明确的可用性付费安排，且预计可用性付费的折现值可弥补建造服务公允价值的，则应是金融资产模式（主帖中也提及“业务实际上可用性付费收入为项目建设成本投资回报”），这里建议谨慎判断关于采用无形资产模式是否符合准则规定。\n\n如果确定是采用无形资产模式，则无形资产的摊销年限应为可用性付费年限（15年），即意见2。", "searchText": "5496867 ppp项目可用性付费年限与运营年限不同，建设成本摊销年限的选择 政府补助/ppp/税费/现金流 wzy20260423 我公司从事城市水环境治理，通过ppp模式，全过程设计、建设、运维城市雨污管网分流项目。会计处理采用无形资产模式，即建设成本计入无形资产，在进入运营期后按年摊销，项目收入来源于政府付费。在中部省份某个项目基本情况如下：ppp项目合作期30年，建设期3年，运营期27年。项目收入分为运维收入（成本加成模式，成本*（1+利润率））+可用性付费收入（行业内默认为投资回报，按年金方式支付），合同约定运维付费按年支付，付费年限即运维年限27年；可用性付费按15年支付，短于运维年限；项目成本分为运维成本+建设成本折旧摊销。现在项目已进入运营期，对建设成本摊销会计处理分歧：\n\n意见1：可用性付费收入按15年计算年金确认，建设成本按运维年限27年进行摊销。该核算前提下，项目运营期后12年项目收入为运维收入，项目成本为运维成本+折旧摊销成本，收入无法覆盖折旧摊销成本，为亏损状态。客观造成运营期前15年少计成本，项目全周期多交企业所得税。意见2：可用性付费收入按15年计算年金确认， 建设成本按15年进行摊销，达到收入、成本匹配（业务实际上可用性付费收入为项目建设成本投资回报）。个人认为，按15年摊销，税务上及可能要要求按27年摊销进行调整纳税。请问陈版主对成本摊销会计核算处理意见，以及税务上对摊销年限的认定。 一般情况下，有明确的可用性付费安排，且预计可用性付费的折现值可弥补建造服务公允价值的，则应是金融资产模式（主帖中也提及“业务实际上可用性付费收入为项目建设成本投资回报”），这里建议谨慎判断关于采用无形资产模式是否符合准则规定。\n\n如果确定是采用无形资产模式，则无形资产的摊销年限应为可用性付费年限（15年），即意见2。"}, {"tid": "5496868", "title": "维修替换件入账问题", "category": "收入确认/总额净额", "questionAuthor": "奥迪特1986", "questionTime": "2026-04-23 15:04:45", "replyTime": "2026-04-26 22:33:30", "replySortTime": "2026-04-26 22:33:30", "url": "https://bbs.esnai.com/thread-5496868-1-1.html", "question": "公司为设备维修企业，维修过程中存在部分零件替换之后客户不再需要的情况，部分替换的零件经企业技术人员修理之后，还能继续使用。此类资产如何入账？计入营业外收入是否合适？", "reply": "此类客户不要的零部件，如修复后有使用价值（如作为替换备件使用），可确认为存货，对应确认营业收入。这也是提供维修服务的收入的一部分，其计量适用新收入准则关于非现金对价的规定，即以该部件的可变现净值（市场价格减去预计修复费用）进行初始计量。后续如果出售或者修理领用的，则从存货转入营业成本。", "searchText": "5496868 维修替换件入账问题 收入确认/总额净额 奥迪特1986 公司为设备维修企业，维修过程中存在部分零件替换之后客户不再需要的情况，部分替换的零件经企业技术人员修理之后，还能继续使用。此类资产如何入账？计入营业外收入是否合适？ 此类客户不要的零部件，如修复后有使用价值（如作为替换备件使用），可确认为存货，对应确认营业收入。这也是提供维修服务的收入的一部分，其计量适用新收入准则关于非现金对价的规定，即以该部件的可变现净值（市场价格减去预计修复费用）进行初始计量。后续如果出售或者修理领用的，则从存货转入营业成本。"}, {"tid": "5496823", "title": "请教陈版，审计报告意见类型的确定", "category": "审计/报告表达", "questionAuthor": "ZXCGHGT", "questionTime": "2026-04-19 11:22:56", "replyTime": "2026-04-26 22:23:30", "replySortTime": "2026-04-26 22:23:30", "url": "https://bbs.esnai.com/thread-5496823-1-2.html", "question": "请教陈版，A上市公司与其控股股东有三年的业绩承诺（2024-2026），A上市公司2024年未完成业绩承诺，A上市公司2024年财务报表表中将控股股东需要补偿金额确认了其他应收款，按照规定，A上市公司2024年度审计报告出具后三个月内控股股东需要将业绩补偿款偿还完毕，截止2025年末控股股东只归还了10%的业绩补偿款，剩余部分预计2026年5月全部偿还，A上市公司2025年未完成业绩承诺，基于谨慎A上市公司2025年财务报表中未将业绩补偿款确认为其他应收款，但是在报表附注中进行了披露。\n\n项目组认为2024年业绩补偿有明确的还款计划，2025年报表未确认业绩补偿这个事项对报告意见类型无影响。\n\n您对怎么看待控股股东业绩补偿未按时偿还，2025年未确认业绩补偿这个事项对报告意见类型的影响，是出具标准无保留意见报告还是出具带强调事项段的无保留意见报告？", "reply": "该事项是证券监管方面的违规行为（控股股东及其关联方资金占用），但并未直接导致被审计财务报表出现错报，因此在确认和计量恰当、披露充分合理的前提下，不会导致财务报表被发表非无保留意见（有可能添加强调事项段）。但被大股东占用资金是重大的财务报告内控缺陷，会影响内控审计意见（不排除被出具否定意见）。", "searchText": "5496823 请教陈版，审计报告意见类型的确定 审计/报告表达 zxcghgt 请教陈版，a上市公司与其控股股东有三年的业绩承诺（2024-2026），a上市公司2024年未完成业绩承诺，a上市公司2024年财务报表表中将控股股东需要补偿金额确认了其他应收款，按照规定，a上市公司2024年度审计报告出具后三个月内控股股东需要将业绩补偿款偿还完毕，截止2025年末控股股东只归还了10%的业绩补偿款，剩余部分预计2026年5月全部偿还，a上市公司2025年未完成业绩承诺，基于谨慎a上市公司2025年财务报表中未将业绩补偿款确认为其他应收款，但是在报表附注中进行了披露。\n\n项目组认为2024年业绩补偿有明确的还款计划，2025年报表未确认业绩补偿这个事项对报告意见类型无影响。\n\n您对怎么看待控股股东业绩补偿未按时偿还，2025年未确认业绩补偿这个事项对报告意见类型的影响，是出具标准无保留意见报告还是出具带强调事项段的无保留意见报告？ 该事项是证券监管方面的违规行为（控股股东及其关联方资金占用），但并未直接导致被审计财务报表出现错报，因此在确认和计量恰当、披露充分合理的前提下，不会导致财务报表被发表非无保留意见（有可能添加强调事项段）。但被大股东占用资金是重大的财务报告内控缺陷，会影响内控审计意见（不排除被出具否定意见）。"}, {"tid": "5496804", "title": "求助！关于PPP项目建设期和总投资的问题", "category": "收入确认/总额净额", "questionAuthor": "mojinke", "questionTime": "2026-04-17 15:45:59", "replyTime": "2026-04-26 22:13:42", "replySortTime": "2026-04-26 22:13:42", "url": "https://bbs.esnai.com/thread-5496804-1-2.html", "question": "老师，请教一个生态修复ppp项目（有景观门票收入）的问题，约定政府可行性缺口补助=总投资×（1+利润率）×（1+折现率）n-使用者付费，使用者付费为门票收入且约定的有下限。问题1：参考会计司3个案例，更符合混合模式，但是合同未约定使用者付费超过当年政府付费是否需要返还，而且按照案例中的分摊比例应全部分配给了长期应收款，无形资产为0，是否实质上还是金融资产模式呢？问题2：PPP项目竣工决算审计，会计核算与竣工决算审计规则不一致的地方是否以竣工决算审计规则为准，比如说企业将建设期利息计入了财务费用，竣工决算审计的时候应该是计入总投资（依据竣工决算规则504号文）？问题3：合同约定的建设期为项目验收通过日，运营期为次日，竣工决算审计的基准日是否应该为项目验收日，而不应该为其他日期？问题4：计入总投资的项目是否应该以权责发生制为准，而不以收付实现制为准？", "reply": "1、一般情况下，此类项目的门票收入较小，不能达到政府承诺的收款金额，因此可行性缺口补助应当是正数，这种情况应属于金融资产模式，即【可行性缺口补助+使用者付费】基本上是固定的金额，社会资本方不承担需求风险，只承担来源于政府方的信用风险。相应地，仅确认长期应收款（合同资产），没有无形资产。\n\n需注意：在金融资产模式下，可初始确认计入合同资产的只是未来每年保底收款额中用于回收建造服务对价的部分（不含用于弥补运营期内付现运营成本的部分）的折现值。\n\n2、竣工决算审计以《基本建设财务规则》等为依据，会计准则规定与之不一致的，以相关财务规则为准。\n\n3、是。竣工决算审计的基准日是否应该为项目验收日。\n\n4、是，以权责发生制为依据。", "searchText": "5496804 求助！关于ppp项目建设期和总投资的问题 收入确认/总额净额 mojinke 老师，请教一个生态修复ppp项目（有景观门票收入）的问题，约定政府可行性缺口补助=总投资×（1+利润率）×（1+折现率）n-使用者付费，使用者付费为门票收入且约定的有下限。问题1：参考会计司3个案例，更符合混合模式，但是合同未约定使用者付费超过当年政府付费是否需要返还，而且按照案例中的分摊比例应全部分配给了长期应收款，无形资产为0，是否实质上还是金融资产模式呢？问题2：ppp项目竣工决算审计，会计核算与竣工决算审计规则不一致的地方是否以竣工决算审计规则为准，比如说企业将建设期利息计入了财务费用，竣工决算审计的时候应该是计入总投资（依据竣工决算规则504号文）？问题3：合同约定的建设期为项目验收通过日，运营期为次日，竣工决算审计的基准日是否应该为项目验收日，而不应该为其他日期？问题4：计入总投资的项目是否应该以权责发生制为准，而不以收付实现制为准？ 1、一般情况下，此类项目的门票收入较小，不能达到政府承诺的收款金额，因此可行性缺口补助应当是正数，这种情况应属于金融资产模式，即【可行性缺口补助+使用者付费】基本上是固定的金额，社会资本方不承担需求风险，只承担来源于政府方的信用风险。相应地，仅确认长期应收款（合同资产），没有无形资产。\n\n需注意：在金融资产模式下，可初始确认计入合同资产的只是未来每年保底收款额中用于回收建造服务对价的部分（不含用于弥补运营期内付现运营成本的部分）的折现值。\n\n2、竣工决算审计以《基本建设财务规则》等为依据，会计准则规定与之不一致的，以相关财务规则为准。\n\n3、是。竣工决算审计的基准日是否应该为项目验收日。\n\n4、是，以权责发生制为依据。"}, {"tid": "5496803", "title": "请教陈版，购买日资产评估同时存在增值减值会计处理，递延所得税资产/负债如何确认？", "category": "合并/股权/权益法", "questionAuthor": "shuying7108", "questionTime": "2026-04-17 12:32:56", "replyTime": "2026-04-26 21:42:05", "replySortTime": "2026-04-26 21:42:05", "url": "https://bbs.esnai.com/thread-5496803-1-2.html", "question": "本帖最后由 shuying7108 于 2026-4-17 13:33 编辑\n\n背景：非同一控制下企业合并，购买日可辨认净资产评估时：\n\n1）固定资产-机器设备数量有1000个，其中700个增值、300个减值，但固定资产-机器设备整体合计为评估增值。\n\n2）无形资产有土地、专利技术，土地有5项，其中3项减值、2项增值，专利技术评估增值，无形资产整体评估为减值。\n\n向陈版主求教：\n\n1）固定资产-机器设备评估增值、减值如何调整公允价值？ 700项增值在合并层面调增值？300项减值在单体层面计提减值准备吗？  或按1000项合计为增值，整体在合并层调增值？\n\n2）无形资产公允价值如何调整？土地3项减值资产，在单体层面确认减值吗？或者按无形资产土地+专利技术合计为减值，在合并层面冲减资本公积？\n\n3）评估减值、增值的递延所得税资产、负债如何确认？递延所得税资产、负债需按净额列示吗？4）若单体资产计提减值，与合并层面确认大额商誉，矛盾吗？", "reply": "理论上，在购买方合并报表层面，增值、减值应按照单项资产为基础进行调整，而不是全部固定资产计算一个净增（减）值额。相应地，应分别就增（减）值额确认递延所得税负债和递延所得税资产（虽然报表上可能抵销后按净额列报，但确认和计量仍需分开）。\n\n对于评估减值，由于此时的评估通常采用资产基础法（成本法），而以减值测试为目的的资产评估不能采用资产基础法（成本法），因此有可能不能直接以此处的评估减值金额作为会计上的减值准备计提金额，而应将此处的评估减值作为一个减值迹象，按照市场法或者收益法对相关资产（或其所属的资产组）进行评估，据此测算可收回金额，确定需计提减值的金额。如果确需计提减值的，则被购买方个别报表层面即应计提减值，购买方合并报表层面按减值后的金额作为公允价值进行初始计量。\n\n单体层面特定可辨认资产的减值，如果涉及资产范围较小，减值金额较小，则对商誉的减值压力可能并不是很大，或者没有直接关系。", "searchText": "5496803 请教陈版，购买日资产评估同时存在增值减值会计处理，递延所得税资产/负债如何确认？ 合并/股权/权益法 shuying7108 本帖最后由 shuying7108 于 2026-4-17 13:33 编辑\n\n背景：非同一控制下企业合并，购买日可辨认净资产评估时：\n\n1）固定资产-机器设备数量有1000个，其中700个增值、300个减值，但固定资产-机器设备整体合计为评估增值。\n\n2）无形资产有土地、专利技术，土地有5项，其中3项减值、2项增值，专利技术评估增值，无形资产整体评估为减值。\n\n向陈版主求教：\n\n1）固定资产-机器设备评估增值、减值如何调整公允价值？ 700项增值在合并层面调增值？300项减值在单体层面计提减值准备吗？  或按1000项合计为增值，整体在合并层调增值？\n\n2）无形资产公允价值如何调整？土地3项减值资产，在单体层面确认减值吗？或者按无形资产土地+专利技术合计为减值，在合并层面冲减资本公积？\n\n3）评估减值、增值的递延所得税资产、负债如何确认？递延所得税资产、负债需按净额列示吗？4）若单体资产计提减值，与合并层面确认大额商誉，矛盾吗？ 理论上，在购买方合并报表层面，增值、减值应按照单项资产为基础进行调整，而不是全部固定资产计算一个净增（减）值额。相应地，应分别就增（减）值额确认递延所得税负债和递延所得税资产（虽然报表上可能抵销后按净额列报，但确认和计量仍需分开）。\n\n对于评估减值，由于此时的评估通常采用资产基础法（成本法），而以减值测试为目的的资产评估不能采用资产基础法（成本法），因此有可能不能直接以此处的评估减值金额作为会计上的减值准备计提金额，而应将此处的评估减值作为一个减值迹象，按照市场法或者收益法对相关资产（或其所属的资产组）进行评估，据此测算可收回金额，确定需计提减值的金额。如果确需计提减值的，则被购买方个别报表层面即应计提减值，购买方合并报表层面按减值后的金额作为公允价值进行初始计量。\n\n单体层面特定可辨认资产的减值，如果涉及资产范围较小，减值金额较小，则对商誉的减值压力可能并不是很大，或者没有直接关系。"}, {"tid": "5496802", "title": "汽车零部件客属模具如何会计处理", "category": "收入确认/总额净额", "questionAuthor": "15201858720", "questionTime": "2026-04-17 10:56:57", "replyTime": "2026-04-26 21:33:39", "replySortTime": "2026-04-26 21:33:39", "url": "https://bbs.esnai.com/thread-5496802-1-1.html", "question": "A公司系汽车零部件供应商，B公司系汽车整车厂\n\nA与B签订客户权属的模具合同金额84万元（合同约定84万元未来分摊到2万台零件产品中进行支付），A公司对应模具合同采购模具发生120万成本。该项目客户预计产品周期为4年。\n\n疑问点1：因为模具的收款权是与零件销量绑定，模具合同没有兜底条款的情况下（即未来销量如果达不到2万台，A公司无权向B公司要求支付未分摊完的模具款），模具合同与零件销售作为一个履约义务，是否可以按照4年的产品周期，在长期待摊费用中分摊120万的模具成本？\n\n疑问点2：如果1年内销量就达到的2万台（即模具合同约定的84万均已收回），该120万的模具成本是否要同步与收入一并确认，还是需要按照产品生命周期4年进行分摊更合理？", "reply": "由于该模具系外购，其公允价值即为其外购成本120万元。现客户承诺补偿84万元，但需以销量达到2万台为前提（相当于实际补偿42元/台，2万台封顶），无保底承诺。故建议将模具外购成本120万元计入合同履约成本（列报为其他非流动资产），按照产量法计提摊销（无法合理估计总销量的，也可按年限平均法摊销）。\n\n收入计量方面，理论上应将该模具补偿款（42元/套）按照预计销售量分摊，如预计总销售量大于2万台，则意味着有一部分需作为合同负债予以递延。如果无法合理估计总销量的，也可以根据实际加价情况，将模具补偿款对应的收入确认在最初的2万台中。", "searchText": "5496802 汽车零部件客属模具如何会计处理 收入确认/总额净额 15201858720 a公司系汽车零部件供应商，b公司系汽车整车厂\n\na与b签订客户权属的模具合同金额84万元（合同约定84万元未来分摊到2万台零件产品中进行支付），a公司对应模具合同采购模具发生120万成本。该项目客户预计产品周期为4年。\n\n疑问点1：因为模具的收款权是与零件销量绑定，模具合同没有兜底条款的情况下（即未来销量如果达不到2万台，a公司无权向b公司要求支付未分摊完的模具款），模具合同与零件销售作为一个履约义务，是否可以按照4年的产品周期，在长期待摊费用中分摊120万的模具成本？\n\n疑问点2：如果1年内销量就达到的2万台（即模具合同约定的84万均已收回），该120万的模具成本是否要同步与收入一并确认，还是需要按照产品生命周期4年进行分摊更合理？ 由于该模具系外购，其公允价值即为其外购成本120万元。现客户承诺补偿84万元，但需以销量达到2万台为前提（相当于实际补偿42元/台，2万台封顶），无保底承诺。故建议将模具外购成本120万元计入合同履约成本（列报为其他非流动资产），按照产量法计提摊销（无法合理估计总销量的，也可按年限平均法摊销）。\n\n收入计量方面，理论上应将该模具补偿款（42元/套）按照预计销售量分摊，如预计总销售量大于2万台，则意味着有一部分需作为合同负债予以递延。如果无法合理估计总销量的，也可以根据实际加价情况，将模具补偿款对应的收入确认在最初的2万台中。"}, {"tid": "5496793", "title": "求助陈版主：母子公司共同出资购置研发用固定资产的账务处理", "category": "合并/股权/权益法", "questionAuthor": "Roronoa-Afei", "questionTime": "2026-04-16 14:20:09", "replyTime": "2026-04-26 20:10:56", "replySortTime": "2026-04-26 20:10:56", "url": "https://bbs.esnai.com/thread-5496793-1-2.html", "question": "请教陈版主：母公司与子公司合作建设一个研发工作室（建个房子+采购研发设备），母公司出资3000万元，子公司出资1000万元，建成的工作室归子公司所有，母公司具有优先使用权，2026年该研发工作室已经建设完成。母公司将3000万元出资作为权益性投入计长期股权投资是否合适，优先使用权这部分，两家也没有约定说要支付设备使用费用，默认免费使用，建议两边签订有偿租赁协议是否合适？", "reply": "对此问题，需关注该项固定资产是否主要是根据子公司的需求定制的，其建成后的使用是否由子公司主导，母公司在其自身经营过程中用到该固定资产的可能性较小，“优先使用权”实际上主要是一项保护性权利。如果是，则企业目前的处理（母公司将投资款确认为对子公司的长投成本，子公司计入资本公积，相关资产确认在子公司）是合理的。\n\n如果母公司确实可能要用到该固定资产的，则需考虑双方预计占用的机器工时比例与出资比例是否明显不相称。对于母公司预计将占用的机器工时比例小于其出资比例的部分所对应的投资款，仍需确认对子公司的长投成本（子公司相应确认资本公积）；与母公司预计将占用的机器工时比例相称的这部分投资款，母公司可确认为无形资产（或者使用权资产），子公司计入合同负债（或预收账款），后续双方随着实际使用，母公司逐步将无形资产转入相关成本费用，子公司相应将合同负债（或预收账款）转为收入。", "searchText": "5496793 求助陈版主：母子公司共同出资购置研发用固定资产的账务处理 合并/股权/权益法 roronoa-afei 请教陈版主：母公司与子公司合作建设一个研发工作室（建个房子+采购研发设备），母公司出资3000万元，子公司出资1000万元，建成的工作室归子公司所有，母公司具有优先使用权，2026年该研发工作室已经建设完成。母公司将3000万元出资作为权益性投入计长期股权投资是否合适，优先使用权这部分，两家也没有约定说要支付设备使用费用，默认免费使用，建议两边签订有偿租赁协议是否合适？ 对此问题，需关注该项固定资产是否主要是根据子公司的需求定制的，其建成后的使用是否由子公司主导，母公司在其自身经营过程中用到该固定资产的可能性较小，“优先使用权”实际上主要是一项保护性权利。如果是，则企业目前的处理（母公司将投资款确认为对子公司的长投成本，子公司计入资本公积，相关资产确认在子公司）是合理的。\n\n如果母公司确实可能要用到该固定资产的，则需考虑双方预计占用的机器工时比例与出资比例是否明显不相称。对于母公司预计将占用的机器工时比例小于其出资比例的部分所对应的投资款，仍需确认对子公司的长投成本（子公司相应确认资本公积）；与母公司预计将占用的机器工时比例相称的这部分投资款，母公司可确认为无形资产（或者使用权资产），子公司计入合同负债（或预收账款），后续双方随着实际使用，母公司逐步将无形资产转入相关成本费用，子公司相应将合同负债（或预收账款）转为收入。"}, {"tid": "5496790", "title": "非政府补助打款疑惑（好处费？）", "category": "收入确认/总额净额", "questionAuthor": "阿里萨For", "questionTime": "2026-04-15 21:03:52", "replyTime": "2026-04-26 19:42:39", "replySortTime": "2026-04-26 19:42:39", "url": "https://bbs.esnai.com/thread-5496790-1-2.html", "question": "陈版主及各位同仁前辈好：\n\n实务中遇到一个比较奇怪的现象，A公司给B公司打款100万，业务实质是：A公司要求B公司帮助A公司申请政府的某某名单，类似高新或者羚羊企业那种，政府那边的要求之一是A公司必须孵化出来类似B公司这样的企业\n\nB公司需要做的就是帮助A提供资料并协助申请\n\n个人理解有点像好处费，这种处理会计处理站在B公司的角度不应该计入其他收益，但是营业外收入好像也不合适，应该计入其他业务收入？查了下准则似乎没有具体案例 这块实在是把握不住。", "reply": "A公司计入管理费用；B公司计入营业外收入。这不是B公司的正常营业活动，所以不能列入主营业务收入或者其他业务收入。同时也不是其他收益的核算范围。", "searchText": "5496790 非政府补助打款疑惑（好处费？） 收入确认/总额净额 阿里萨for 陈版主及各位同仁前辈好：\n\n实务中遇到一个比较奇怪的现象，a公司给b公司打款100万，业务实质是：a公司要求b公司帮助a公司申请政府的某某名单，类似高新或者羚羊企业那种，政府那边的要求之一是a公司必须孵化出来类似b公司这样的企业\n\nb公司需要做的就是帮助a提供资料并协助申请\n\n个人理解有点像好处费，这种处理会计处理站在b公司的角度不应该计入其他收益，但是营业外收入好像也不合适，应该计入其他业务收入？查了下准则似乎没有具体案例 这块实在是把握不住。 a公司计入管理费用；b公司计入营业外收入。这不是b公司的正常营业活动，所以不能列入主营业务收入或者其他业务收入。同时也不是其他收益的核算范围。"}, {"tid": "5496792", "title": "母公司投资性房地产在合并层面恢复固定资产递延所得税的问题", "category": "合并/股权/权益法", "questionAuthor": "YUANXIAOFANG", "questionTime": "2026-04-16 08:57:08", "replyTime": "2026-04-26 19:41:23", "replySortTime": "2026-04-26 19:41:23", "url": "https://bbs.esnai.com/thread-5496792-1-2.html", "question": "母公司投资性房地产租赁给子公司，并按资产原值和公允价值的差额计提了递延所得税负债，在合并层面，该房地产转回为固定资产，冲回了母公司计提的递延所得税负债，并补提了折旧，那这部分折旧需要考虑递延所得税吗？", "reply": "参考：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496780。", "searchText": "5496792 母公司投资性房地产在合并层面恢复固定资产递延所得税的问题 合并/股权/权益法 yuanxiaofang 母公司投资性房地产租赁给子公司，并按资产原值和公允价值的差额计提了递延所得税负债，在合并层面，该房地产转回为固定资产，冲回了母公司计提的递延所得税负债，并补提了折旧，那这部分折旧需要考虑递延所得税吗？ 参考：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496780。"}, {"tid": "5496783", "title": "吸收合并后无子公司 报表编制相关问题", "category": "合并/股权/权益法", "questionAuthor": "kaiiiii", "questionTime": "2026-04-15 11:49:09", "replyTime": "2026-04-26 19:40:11", "replySortTime": "2026-04-26 19:40:11", "url": "https://bbs.esnai.com/thread-5496783-1-2.html", "question": "请教陈版主\n\n背景：2025年5月，母公司A公司吸收合并了其全资子公司B、C、D、E，构成同一控制下企业合并。合并后仅剩A公司单独主体，无其他子公司。财政部会计司在2022年6月发布的《合并财务报表准则实施问答》回答：甲公司在报告期内处置了唯一的子公司，并且于报告期末已经没有子公司，甲公司仍然应当按照《企业会计准则第33号——合并财务报表》的有关规定，编制该年度合并财务报表。\n\n问题：上述背景下，A公司在出具2025年度财务报告时是否应当按照财政部会计司回复意见，出具合并及母公司报表，还是仅出具个别财务报表？以及报表上期参考数据应该如何选择？\n\n如可以，则出具时合并报表本期数与母公司报表本期数实质相同，参考数据使用合并及母公司各自上期数？\n\n如不可以，仅出具单体报告，上期数是选择母公司法人上期单体数据，还是选择更加具有可比性的上期合并数据。", "reply": "A公司在完成吸收合并的当年，其法定的全套完整财务报表中仍应包含个别报表和合并报表（期末资产负债表的个别报表和合并报表金额应相同，但利润表和现金流量表的合并数和母公司个别报表数不同）。对应的期初或上期比较数据分别使用各自的期初数和上期数。", "searchText": "5496783 吸收合并后无子公司 报表编制相关问题 合并/股权/权益法 kaiiiii 请教陈版主\n\n背景：2025年5月，母公司a公司吸收合并了其全资子公司b、c、d、e，构成同一控制下企业合并。合并后仅剩a公司单独主体，无其他子公司。财政部会计司在2022年6月发布的《合并财务报表准则实施问答》回答：甲公司在报告期内处置了唯一的子公司，并且于报告期末已经没有子公司，甲公司仍然应当按照《企业会计准则第33号——合并财务报表》的有关规定，编制该年度合并财务报表。\n\n问题：上述背景下，a公司在出具2025年度财务报告时是否应当按照财政部会计司回复意见，出具合并及母公司报表，还是仅出具个别财务报表？以及报表上期参考数据应该如何选择？\n\n如可以，则出具时合并报表本期数与母公司报表本期数实质相同，参考数据使用合并及母公司各自上期数？\n\n如不可以，仅出具单体报告，上期数是选择母公司法人上期单体数据，还是选择更加具有可比性的上期合并数据。 a公司在完成吸收合并的当年，其法定的全套完整财务报表中仍应包含个别报表和合并报表（期末资产负债表的个别报表和合并报表金额应相同，但利润表和现金流量表的合并数和母公司个别报表数不同）。对应的期初或上期比较数据分别使用各自的期初数和上期数。"}, {"tid": "5496781", "title": "受限资产", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "sybspxcpa", "questionTime": "2026-04-15 11:12:21", "replyTime": "2026-04-26 19:37:35", "replySortTime": "2026-04-26 19:37:35", "url": "https://bbs.esnai.com/thread-5496781-1-2.html", "question": "破产重整期间，企业持续经营，已解除抵押担保的资产是否属于会计上的受限资产？虽已解除担保，但债权人仍有优先受偿权，是否说明还是受限资产？", "reply": "主要考虑是：债权人能否在其债权无法通过其他途径受偿时，要求以该资产抵债或者拍卖该资产，以拍卖所得优先受偿？债权人的“优先受偿权”具体如何体现？该资产的出售是否受限？", "searchText": "5496781 受限资产 金融工具/外币/债务重组/abs sybspxcpa 破产重整期间，企业持续经营，已解除抵押担保的资产是否属于会计上的受限资产？虽已解除担保，但债权人仍有优先受偿权，是否说明还是受限资产？ 主要考虑是：债权人能否在其债权无法通过其他途径受偿时，要求以该资产抵债或者拍卖该资产，以拍卖所得优先受偿？债权人的“优先受偿权”具体如何体现？该资产的出售是否受限？"}, {"tid": "5496780", "title": "求助陈版主，集团内部租赁合并层面所得税的问题", "category": "合并/股权/权益法", "questionAuthor": "YUANXIAOFANG", "questionTime": "2026-04-15 11:01:37", "replyTime": "2026-04-26 19:27:50", "replySortTime": "2026-04-26 19:27:50", "url": "https://bbs.esnai.com/thread-5496780-1-2.html", "question": "集团母公司将房产租赁给子公司，子公司自用。母公司投资性房地产按公允价计量，母公司按公允价和资产原值之间的差额计提了递延。合并层面该房产转回固定资产并计提了折旧，也冲回了母公司计提的递延。那需要对计提的折旧考虑递延吗？", "reply": "取决于母公司能否在税前扣除投资性房地产（合并报表层面为固定资产）的折旧。\n\n如果可以税前扣除折旧，则该项固定资产在合并报表层面的账面价值和计税基础一致，无暂时性差异。\n\n如果不允许税前扣除折旧，则该项资产的计税基础（成本）大于合并报表层面的账面价值，产生可抵扣暂时性差异，需确认递延所得税资产（在母公司可预见的未来预计有足够多的应纳税所得额的前提下）。", "searchText": "5496780 求助陈版主，集团内部租赁合并层面所得税的问题 合并/股权/权益法 yuanxiaofang 集团母公司将房产租赁给子公司，子公司自用。母公司投资性房地产按公允价计量，母公司按公允价和资产原值之间的差额计提了递延。合并层面该房产转回固定资产并计提了折旧，也冲回了母公司计提的递延。那需要对计提的折旧考虑递延吗？ 取决于母公司能否在税前扣除投资性房地产（合并报表层面为固定资产）的折旧。\n\n如果可以税前扣除折旧，则该项固定资产在合并报表层面的账面价值和计税基础一致，无暂时性差异。\n\n如果不允许税前扣除折旧，则该项资产的计税基础（成本）大于合并报表层面的账面价值，产生可抵扣暂时性差异，需确认递延所得税资产（在母公司可预见的未来预计有足够多的应纳税所得额的前提下）。"}, {"tid": "5496749", "title": "求教陈版主，有这样一个涉及优先股利分配权的成本法转权益法的事项", "category": "合并/股权/权益法", "questionAuthor": "372916118", "questionTime": "2026-04-13 09:37:00", "replyTime": "2026-04-18 13:58:51", "replySortTime": "2026-04-18 13:58:51", "url": "https://bbs.esnai.com/thread-5496749-1-2.html", "question": "十年前，A公司投资设立全资子公司B公司，B公司账面不存在资本公积、其他综合收益等科目。其后A公司将持有的B公司50%股权转让给非关联方C公司，结合其他生产经营管理权利综合判断，A公司仍能控制B公司。\n\n同时约定A公司对B公司3亿元未来利润享有优先分配权，C公司先行支付1.5亿元，剩余1.5亿元待未来分配；且如A公司独享的B公司独享3亿元利润、B公司无法足额实现，C公司予以补偿50%；同时为确保A公司全部实现3亿元独享利润分配，C公司愿将50%股权质押给A公司直到A公司优先分得B公司3亿元独享利润分配。\n\n在扣除A公司享有的3亿元优先股利分配权后，A公司与C公司按50%:50%比例分配B公司剩余利润。\n\n十年后，因B公司所处经济环境发生变化，A公司与C公司约定，A公司向C公司处置其持有的B公司2%股权，A公司仍保留原3亿元对应相应持有比例的优先分配权(3/50*48)。当前，A公司对B公司由控制转为重大影响，持股比例由50%降至48%，主要因优先股利分配权存在的情况下，我们存在以下问题不能确定：\n\n1. A公司个别财务报表应如何进行会计处理？（主要疑虑个别报表是否完全无需考虑3亿元优先股利分配权，仅视同从取得投资时点即采用权益法核算即可）\n\n2. A公司合并财务报表应如何进行会计处理？（主要疑虑合并报表对长投公允价值的确认，在对应股权公允价值的基础上，如何考虑3亿元优先股利分配权对公允价值的影响及做账）\n\n3. A公司由成本法转为权益法核算后，长期股权投资账面价值大于计税基础产生的差异，个别报表与合并报表是否都会产生，是否应确认递延所得税负债？", "reply": "1、A对B具有控制权期间\n\n在存在优先分配权的情况下（并假设A公司仍可控制B公司），将A分得的收益超出其按照在B的持股比例和B公司净利润的乘积的差额部分，视同少数股东C对A的利益让渡处理。在A公司个别报表层面可确认为投资收益（假设A、C为非关联方，不涉及权益性交易和关联交易，下同），在A公司合并报表层面按权益性交易原则计入资本公积处理。\n\n2、A对B丧失控制权，改按权益法核算后，但仍有优先分红权期间\n\nA公司首先仍按正常的权益法核算确认对B的投资收益，并相应调整对B的长期股权投资账面价值。后续如果实际取得的分红超出对应年度（一般为上年度）按权益法确认的投资收益的，则相当于对应年度权益法投资收益的部分冲减“长期股权投资——损益调整”，超出部分确认为投资收益。\n\n长期股权投资的账面价值和计税基础之间如有暂时性差异的，则按所得税准则第十二条、第十四条规定判断是否应确认递延所得税资产或负债，这方面无特殊之处。因为居民企业之间的股息红利免税，故不需要特殊处理。", "searchText": "5496749 求教陈版主，有这样一个涉及优先股利分配权的成本法转权益法的事项 合并/股权/权益法 372916118 十年前，a公司投资设立全资子公司b公司，b公司账面不存在资本公积、其他综合收益等科目。其后a公司将持有的b公司50%股权转让给非关联方c公司，结合其他生产经营管理权利综合判断，a公司仍能控制b公司。\n\n同时约定a公司对b公司3亿元未来利润享有优先分配权，c公司先行支付1.5亿元，剩余1.5亿元待未来分配；且如a公司独享的b公司独享3亿元利润、b公司无法足额实现，c公司予以补偿50%；同时为确保a公司全部实现3亿元独享利润分配，c公司愿将50%股权质押给a公司直到a公司优先分得b公司3亿元独享利润分配。\n\n在扣除a公司享有的3亿元优先股利分配权后，a公司与c公司按50%:50%比例分配b公司剩余利润。\n\n十年后，因b公司所处经济环境发生变化，a公司与c公司约定，a公司向c公司处置其持有的b公司2%股权，a公司仍保留原3亿元对应相应持有比例的优先分配权(3/50*48)。当前，a公司对b公司由控制转为重大影响，持股比例由50%降至48%，主要因优先股利分配权存在的情况下，我们存在以下问题不能确定：\n\n1. a公司个别财务报表应如何进行会计处理？（主要疑虑个别报表是否完全无需考虑3亿元优先股利分配权，仅视同从取得投资时点即采用权益法核算即可）\n\n2. a公司合并财务报表应如何进行会计处理？（主要疑虑合并报表对长投公允价值的确认，在对应股权公允价值的基础上，如何考虑3亿元优先股利分配权对公允价值的影响及做账）\n\n3. a公司由成本法转为权益法核算后，长期股权投资账面价值大于计税基础产生的差异，个别报表与合并报表是否都会产生，是否应确认递延所得税负债？ 1、a对b具有控制权期间\n\n在存在优先分配权的情况下（并假设a公司仍可控制b公司），将a分得的收益超出其按照在b的持股比例和b公司净利润的乘积的差额部分，视同少数股东c对a的利益让渡处理。在a公司个别报表层面可确认为投资收益（假设a、c为非关联方，不涉及权益性交易和关联交易，下同），在a公司合并报表层面按权益性交易原则计入资本公积处理。\n\n2、a对b丧失控制权，改按权益法核算后，但仍有优先分红权期间\n\na公司首先仍按正常的权益法核算确认对b的投资收益，并相应调整对b的长期股权投资账面价值。后续如果实际取得的分红超出对应年度（一般为上年度）按权益法确认的投资收益的，则相当于对应年度权益法投资收益的部分冲减“长期股权投资——损益调整”，超出部分确认为投资收益。\n\n长期股权投资的账面价值和计税基础之间如有暂时性差异的，则按所得税准则第十二条、第十四条规定判断是否应确认递延所得税资产或负债，这方面无特殊之处。因为居民企业之间的股息红利免税，故不需要特殊处理。"}, {"tid": "5496754", "title": "求助陈老师，企业集团内部资金拆借合并抵消问题", "category": "合并/股权/权益法", "questionAuthor": "15030931181y", "questionTime": "2026-04-13 18:31:28", "replyTime": "2026-04-18 12:53:33", "replySortTime": "2026-04-18 12:53:33", "url": "https://bbs.esnai.com/thread-5496754-1-2.html", "question": "公司A从其母公司甲处以年利率6.5%借入资金后，同时此资金以年利率8%转借给下属子公司B用于经营活动，按季度计息的情况下，公司A第一季度收到其母公司甲开具的利息普票，计入财务费用16万，同时公司A开具利息普票给子公司B，计不含税利息收入19万，子公司B计财务费用含税20万，我的抵消思路为：由于该笔资金真正受益者为子公司B，因此先将公司A的利息收入及财务费用抵消，再将差额调整抵消B公司的财务费用，将B公司的财务费用还原至整个集团真实的融资成本，但是由于开具的发票为普通发票，存在税额差，此部分税差是要在合并底稿中从财务费用调整至管理费用吗，如果是，为什么这么调整呢，最终：\n\n借：利息收入   （公司A）19万\n\n       贷：财务费用   （公司A） 16万\n\n               财务费用     （子公司B）3万\n\n借：管理费用   （税额） 1万\n\n        贷：财务费用    （子公司B）1万\n\n最终，子公司的财务费用为16万元。\n\n其他条件不变，如果子公司B借入资金用途变为在建工程，且子公司B符合资本化条件的情况下，抵消分录是否为：\n\n借：利息收入   （公司A）19万\n\n       贷：财务费用   （公司A） 16万\n\n               在建工程     （子公司B）3万\n\n借：管理费用   （税额） 1万\n\n        贷：在建工程   （子公司B）1万\n\n辛苦陈老师解答一下疑惑", "reply": "对于合并报表的抵销分录，应首先明确要达到的抵销效果，然后才是为了达到该效果，如何编制抵销分录。\n\n在本案例中，应达到的效果就是在合并报表层面按照对外融资的利率（6.5%）确认利息支出，因母子公司之间转贷而发生的无法抵扣的增值税额计入管理费用。另外还要注意在合并报表层面该利息应当费用化还是资本化。\n\n总体上看，主帖的抵销分录还是合理的。", "searchText": "5496754 求助陈老师，企业集团内部资金拆借合并抵消问题 合并/股权/权益法 15030931181y 公司a从其母公司甲处以年利率6.5%借入资金后，同时此资金以年利率8%转借给下属子公司b用于经营活动，按季度计息的情况下，公司a第一季度收到其母公司甲开具的利息普票，计入财务费用16万，同时公司a开具利息普票给子公司b，计不含税利息收入19万，子公司b计财务费用含税20万，我的抵消思路为：由于该笔资金真正受益者为子公司b，因此先将公司a的利息收入及财务费用抵消，再将差额调整抵消b公司的财务费用，将b公司的财务费用还原至整个集团真实的融资成本，但是由于开具的发票为普通发票，存在税额差，此部分税差是要在合并底稿中从财务费用调整至管理费用吗，如果是，为什么这么调整呢，最终：\n\n借：利息收入   （公司a）19万\n\n       贷：财务费用   （公司a） 16万\n\n               财务费用     （子公司b）3万\n\n借：管理费用   （税额） 1万\n\n        贷：财务费用    （子公司b）1万\n\n最终，子公司的财务费用为16万元。\n\n其他条件不变，如果子公司b借入资金用途变为在建工程，且子公司b符合资本化条件的情况下，抵消分录是否为：\n\n借：利息收入   （公司a）19万\n\n       贷：财务费用   （公司a） 16万\n\n 益法", "questionAuthor": "15012930797", "questionTime": "2026-04-13 23:57:57", "replyTime": "2026-04-18 11:42:28", "replySortTime": "2026-04-18 11:42:28", "url": "https://bbs.esnai.com/thread-5496763-1-2.html", "question": "陈版主，您好，想向您请教股权激励修改相关事项，案例如下：\n\n     2022年1月，A公司的实际控制人设立持股平台B实施股权激励，认缴出资额为800万元。2022年7月，公司召开股东会，拟实施员工股权激励，并审议通过了《股权激励方案》，本次激励对象为公司管理层及核心员工合计27名员工，出资金额合计为576.00万元。2023年2月10日，鉴于多数激励对象因个人原因拟减少自身持有的激励份额，公司对本次股权激励的激励对象名单及授予份额进行调整；本次调整后，激励对象的认缴出资金额合计为380.10万元，激励对象按调整后的认缴份额进行出资。在实施本次股权激励后，实际控制人持有A公司股权比例由95.00%下降至90.75%（含通过持股平台B间接持有公司5.25%的股权比例），持股比例下降。公司已将本次股权激励修改，员工转让给实控人的份额（即员工减少的份额）加速确认全部股份支付费用，剩余部分继续按原规则计提费用。请问是否需要对实控人因股权激励方案的修改接受员工转让来的份额确认股份支付？是否与加速确认的费用重复？\n\n个人理解：股权激励的修改与原股权激励属于同一次增资。根据《监管规则适用指引——发行类第5号》之“5-1 增资或转让股份形成的股份支付”规定：“......为发行人提供服务的实际控制人/老股东以低于股份公允价值的价格增资入股，且超过其原持股比例而获得的新增股份，应属于股份支付......”，实控人通过持股平台的增资比例低于原持股比例95%，不属于股份支付。若对实控人因股权激励修改再次确认股份支付，因实控人无服务期，需一次性确认股份支付（实控人新增的份额即员工减少的份额），存在重复确认的嫌疑。\n\n望陈版主不吝赐教，万分感谢！", "reply": "根据《监管规则适用指引——发行类第5号》之“5-1 增资或转让股份形成的股份支付”：“为发行人提供服务的实际控制人/老股东以低于股份公允价值的价格增资入股，且超过其原持股比例而获得的新增股份，应属于股份支付。如果增资协议约定，所有股东均有权按各自原持股比例获得新增股份，但股东之间转让新增股份受让权且构成集团内股份支付，导致实际控制人/老股东超过其原持股比例获得的新增股份，也属于股份支付。实际控制人/老股东原持股比例，应按照相关股东直接持有与穿透控股平台后间接持有的股份比例合并计算。”。\n\n根据《上市公司执行企业会计准则案例解析2024》之“案例9-12 股份支付中‘非等比例增资’的计算原则”的倾向性意见：“老股东持股比例变化应仅考虑老股东之间的相对持股比例，而非相对于总股本的持股比例。即对千老股东获得的新增股份数量，应当扣除该老股东按原持股比例应享有的本次增发给所有原股东（不包括新增股东）的股份后的差额，作为股份支付。”。（见原书P600～603）\n\n本案例中所讨论的是激励对象因股份支付计划修改而转给实控人的激励股权，公司是否需按对实控人的股份支付处理。我理解此处应参照《股份支付准则应用案例——实际控制人受让股份是否构成新的股份支付》所述原则处理，即考虑后续实控人有无将这部分股份再次授出的明确计划，如无则需作为股份支付处理。", "searchText": "5496763 陈版主求助！关于股权激励方案修改 合并/股权/权益法 15012930797 陈版主，您好，想向您请教股权激励修改相关事项，案例如下：\n\n     2022年1月，a公司的实际控制人设立持股平台b实施股权激励，认缴出资额为800万元。2022年7月，公司召开股东会，拟实施员工股权激励，并审议通过了《股权激励方案》，本次激励对象为公司管理层及核心员工合计27名员工，出资金额合计为576.00万元。2023年2月10日，鉴于多数激励对象因个人原因拟减少自身持有的激励份额，公司对本次股权激励的激励对象名单及授予份额进行调整；本次调整后，激励对象的认缴出资金额合计为380.10万元，激励对象按调整后的认缴份额进行出资。在实施本次股权激励后，实际控制人持有a公司股权比例由95.00%下降至90.75%（含通过持股平台b间接持有公司5.25%的股权比例），持股比例下降。公司已将本次股权激励修改，员工转让给实控人的份额（即员工减少的份额）加速确认全部股份支付费用，剩余部分继续按原规则计提费用。请问是否需要对实控人因股权激励方案的修改接受员工转让来的份额确认股份支付？是否与加速确认的费用重复？\n\n个人理解：股权激励的修改与原股权激励属于同一次增资。根据《监管规则适用指引——发行类第5号》之“5-1 增资或转让股份形成的股份支付”规定：“......为发行人提供服务的实际控制人/老股东以低于股份公允价值的价格增资入股，且超过其原持股比例而获得的新增股份，应属于股份支付......”，实控人通过持股平台的增资比例低于原持股比例95%，不属于股份支付。若对实控人因股权激励修改再次确认股份支付，因实控人无服务期，需一次性确认股份支付（实控人新增的份额即员工减少的份额），存在重复确认的嫌疑。\n\n望陈版主不吝赐教，万分感谢！ 根据《监管规则适用指引——发行类第5号》之“5-1 增资或转让股份形成的股份支付”：“为发行人提供服务的实际控制人/老股东以低于股份公允价值的价格增资入股，且超过其原持股比例而获得的新增股份，应属于股份支付。如果增资协议约定，所有股东均有权按各自原持股比例获得新增股份，但股东之间转让新增股份受让权且构成集团内股份支付，导致实际控制人/老股东超过其原持股比例获得的新增股份，也属于股份支付。实际控制人/老股东原持股比例，应按照相关股东直接持有与穿透控股平台后间接持有的股份比例合并计算。”。\n\n根据《上市公司执行企业会计准则案例解析2024》之“案例9-12 股份支付中‘非等比例增资’的计算原则”的倾向性意见：“老股东持股比例变化应仅考虑老股东之间的相对持股比例，而非相对于总股本的持股比例。即对千老股东获得的新增股份数量，应当扣除该老股东按原持股比例应享有的本次增发给所有原股东（不包括新增股东）的股份后的差额，作为股份支付。”。（见原书p600～603）\n\n本案例中所讨论的是激励对象因股份支付计划修改而转给实控人的激励股权，公司是否需按对实控人的股份支付处理。我理解此处应参照《股份支付准则应用案例——实际控制人受让股份是否构成新的股份支付》所述原则处理，即考虑后续实控人有无将这部分股份再次授出的明确计划，如无则需作为股份支付处理。"}, {"tid": "5496770", "title": "建设期间缴纳的土地使用税能否计入在建工程", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "wx_62e62e1e9336", "questionTime": "2026-04-14 19:13:49", "replyTime": "2026-04-18 11:36:05", "replySortTime": "2026-04-18 11:36:05", "url": "https://bbs.esnai.com/thread-5496770-1-2.html", "question": "请问陈版主，《中审众环研究2020》中提到在建期间的土地使用税不建议资本化。财政部2016年7月，关于印发《基本建设项目建设成本管理规定》的通知(财建[2016]504号)文件中，待摊支出包括的内容涵盖了土地使用税，请问怎么理解。", "reply": "《基本建设项目建设成本管理规定》是财政部经济建设司发布的文件，并非企业会计准则的组成部分；并且该规定仅适用于“行政事业单位的基本建设财务行为，以及国有和国有控股企业使用财政资金的基本建设财务行为”。会计处理仍应以会计准则规定为准。", "searchText": "5496770 建设期间缴纳的土地使用税能否计入在建工程 资产/存货/固定资产/无形资产 wx_62e62e1e9336 请问陈版主，《中审众环研究2020》中提到在建期间的土地使用税不建议资本化。财政部2016年7月，关于印发《基本建设项目建设成本管理规定》的通知(财建[2016]504号)文件中，待摊支出包括的内容涵盖了土地使用税，请问怎么理解。 《基本建设项目建设成本管理规定》是财政部经济建设司发布的文件，并非企业会计准则的组成部分；并且该规定仅适用于“行政事业单位的基本建设财务行为，以及国有和国有控股企业使用财政资金的基本建设财务行为”。会计处理仍应以会计准则规定为准。"}, {"tid": "5496777", "title": "求助陈版主", "category": "合并/股权/权益法", "questionAuthor": "kyhj0314", "questionTime": "2026-04-14 20:18:55", "replyTime": "2026-04-18 11:34:24", "replySortTime": "2026-04-18 11:34:24", "url": "https://bbs.esnai.com/thread-5496777-1-2.html", "question": "非全资子公司进行股权激励，借:管理费用，贷：资本公积-其他，少数股东分摊损益，您提到少数股东权益不变，那就是母公司和少数股东进行权益性交易，借:资本公积-股权溢价，贷：少数股东权益，可不可以理解，这样资本公积-其他全部归属于母公司", "reply": "涉及非全资子公司的股份支付，需区分两种情况：\n\n1、母公司作为结算义务方，少数股东并未同比例分担结算义务。此时母公司和少数股东之间是有利益转移的，归母的资本公积减少，用于弥补少数股东权益。\n\n2、子公司自身作为结算义务方，或者母公司和少数股东按照其在子公司的股权比例分担结算义务。此时对子公司本身的报表而言，和情形1相同，但在合并报表层面，归属于少数股东的损益和资本公积是实现了完全闭环的，母公司并未向子公司的少数股东让渡利益，因此不会因归属于少数股东的股份支付费用而减少归母的资本公积。", "searchText": "5496777 求助陈版主 合并/股权/权益法 kyhj0314 非全资子公司进行股权激励，借:管理费用，贷：资本公积-其他，少数股东分摊损益，您提到少数股东权益不变，那就是母公司和少数股东进行权益性交易，借:资本公积-股权溢价，贷：少数股东权益，可不可以理解，这样资本公积-其他全部归属于母公司 涉及非全资子公司的股份支付，需区分两种情况：\n\n1、母公司作为结算义务方，少数股东并未同比例分担结算义务。此时母公司和少数股东之间是有利益转移的，归母的资本公积减少，用于弥补少数股东权益。\n\n2、子公司自身作为结算义务方，或者母公司和少数股东按照其在子公司的股权比例分担结算义务。此时对子公司本身的报表而言，和情形1相同，但在合并报表层面，归属于少数股东的损益和资本公积是实现了完全闭环的，母公司并未向子公司的少数股东让渡利益，因此不会因归属于少数股东的股份支付费用而减少归母的资本公积。"}, {"tid": "5496691", "title": "上市公司子公司附有回购条款的股权处置", "category": "合并/股权/权益法", "questionAuthor": "5馒头5", "questionTime": "2026-04-09 16:33:47", "replyTime": "2026-04-13 22:38:20", "replySortTime": "2026-04-13 22:38:20", "url": "https://bbs.esnai.com/thread-5496691-1-2.html", "question": "本帖最后由 5馒头5 于 2026-4-11 11:46 编辑\n\n背景：上市公司其全资子公司B，引进战略投资第三方股东C，3月31日增资2000万元，其中400万记入注册资本，增资后上市公司持股比例95%，c持股5%。投前4800万元。\n\n业绩目标：B承诺2025年、2026年、2027年三年累计业务收入不低于5亿元。2025 年、2026 年、2027年累计业务收入未达到5亿元的80%时，则视为触发回购事件；协议约定：“投资方有权就其持有标的公司每一元注册资本优先于其他股东获得如下“优先清算额”：投资方每单位认购价格×(1＋8%*n)（n=相应投资款支付之日至公司清算开始日的天数/365)”。“回购义务人需收到回购权人发出回购通知的3个月内完成回购并支付回购款。”\n\n会计处理如下\n\n26年3月接受投资时，为了兼顾法律形式和经济实质，先就收到的增资款增加实收资本和资本公积，以这笔分录作为验资的依据；同时再做一笔“借：库存股和资本公积，贷：长期应付款”的分录，以对冲前面一笔分录虚增权益的影响，并事实上达到将取得的增资款确认为负债的效果。以达到法律形式和经济实质兼顾的要求。\n\n1、3月31日B公司单体层面：\n\n借：银行存款            2000\n\n贷：实收资本            400\n\n贷：资本公积            1600\n\n同时：（不考虑折现）\n\n借：资本公积       2000\n\n贷：长期应付款       2000\n\n2、2026年9个月利息，年末计提利息时\n\n借：财务费用        120\n\n贷：长期应付款      120\n\n27-28年同理处理：\n\n借：财务费用        160\n\n贷：长期应付款   160\n\n3、28年3月假定触发回购，回购日为2028年3月30日。\n\n借：长期应付款     2440（2000+120+160+160）\n\n贷：银行存款               2440\n\n4、28年3月假定不触发回购\n\n借：长期应付款            2440\n\n贷：实收资本               400\n\n贷：资本公积-资本溢价                    1600\n\n贷：资本公积-其他资本公积                 440\n\n投入时点上市公司合并层面：股权认缴比例从100%降低至95%，未丧失控制权，因净资产一增一减无变化，合并层面不确认因被动稀释股权相关的资本公积，只确认合并日的少数股东权益。\n\n战略投资投入时点合并报表，如果有相应的分红权、表决权则需要计算少数股东权益\n\n投入时点前后B公司净资产=4800\n\n合并日少数股东权益=4800*5%=240万元\n\n如果不享受相应的分红权、表决权则投入时点不需要计算少股东权益\n\n年末上市公司合并：也需要考虑分红权、表决权，如果有则按照法律上认缴95%持股比例进行合并，确认5%的少数股东损益。如果没有则按照100%合并\n\n问题：\n\n1、协议未约定回购义务人，按照子公司回购处理是否合理\n\n2、上述账务单体、合并账务处理是否正确\n\n3、增资2000万元，由资本公积转入到长期应付款，资本公积会出现负数在冲盈余公积未分配利润？", "reply": "1、建议明确回购义务人。但除非明确排除B作为回购义务人，B在其个别报表层面一般均需要确认回购义务相关负债；除非明确排除A及其合并范围内各子公司作为回购义务人，否则A合并报表层面应确认回购义务相关负债。\n\n2、个别报表层面账务处理中，假设不触发回购，则只需将届时的长期应付款余额（含本金+累计利息）转入资本公积即可，同时将原先确认的库存股转入资本公积，不涉及对实收资本的调整。\n\n在A公司合并报表层面，因为回购标的是少数股权，故在确认回购义务相关负债时冲减资本公积。其他基本合理。\n\n3、这种情况下的资本公积应保持负数余额，不继续冲减盈余公积额未分配利润。", "searchText": "5496691 上市公司子公司附有回购条款的股权处置 合并/股权/权益法 5馒头5 本帖最后由 5馒头5 于 2026-4-11 11:46 编辑\n\n背景：上市公司其全资子公司b，引进战略投资第三方股东c，3月31日增资2000万元，其中400万记入注册资本，增资后上市公司持股比例95%，c持股5%。投前4800万元。\n\n业绩目标：b承诺2025年、2026年、2027年三年累计业务收入不低于5亿元。2025 年、2026 年、2027年累计业务收入未达到5亿元的80%时，则视为触发回购事件；协议约定：“投资方有权就其持有标的公司每一元注册资本优先于其他股东获得如下“优先清算额”：投资方每单位认购价格×(1＋8%*n)（n=相应投资款支付之日至公司清算开始日的天数/365)”。“回购义务人需收到回购权人发出回购通知的3个月内完成回购并支付回购款。”\n\n会计处理如下\n\n26年3月接受投资时，为了兼顾法律形式和经济实质，先就收到的增资款增加实收资本和资本公积，以这笔分录作为验资的依据；同时再做一笔“借：库存股和资本公积，贷：长期应付款”的分录，以对冲前面一笔分录虚增权益的影响，并事实上达到将取得的增资款确认为负债的效果。以达到法律形式和经济实质兼顾的要求。\n\n1、3月31日b公司单体层面：\n\n借：银行存款            2000\n\n贷：实收资本            400\n\n贷：资本公积            1600\n\n同时：（不考虑折现）\n\n借：资本公积       2000\n\n贷：长期应付款       2000\n\n2、2026年9个月利息，年末计提利息时\n\n借：财务费用        120\n\n贷：长期应付款      120\n\n27-28年同理处理：\n\n借：财务费用        160\n\n贷：长期应付款   160\n\n3、28年3月假定触发回购，回购日为2028年3月30日。\n\n借：长期应付款     2440（2000+120+160+160）\n\n贷：银行存款               2440\n\n4、28年3月假定不触发回购\n\n借：长期应付款            2440\n\n贷：实收资本               400\n\n贷：资本公积-资本溢价                    1600\n\n贷：资本公积-其他资本公积                 440\n\n投入时点上市公司合并层面：股权认缴比例从100%降低至95%，未丧失控制权，因净资产一增一减无变化，合并层面不确认因被动稀释股权相关的资本公积，只确认  公司与a公司签订租赁厂房合同，后租赁终止，重新与b公司签订租赁厂房合同，但在与b公司签订的合同中约定，对原与a公司签订厂房的装修进行补贴，即优惠了半年租金，请问这种情况下应怎么进行账务处理？ a和b是什么关系，为何在与b签订的租赁合同中约定对a的装修支出进行补贴？a原先的装修是否由b沿用？\n\n本企业作为出租人，此处涉及的两项租赁分别分类为经营租赁还是融资租赁？"}, {"tid": "5496693", "title": "房地产公司“小产权房”以租代售财务处理及税务处理问题", "category": "收入确认/总额净额", "questionAuthor": "小黑包", "questionTime": "2026-04-09 20:22:11", "replyTime": "2026-04-13 22:23:13", "replySortTime": "2026-04-13 22:23:13", "url": "https://bbs.esnai.com/thread-5496693-1-2.html", "question": "求助陈版主：业务背景：A公司原本是制造业公司，参与工改工项目，把自身厂房推到重建，建一个产业园用于出售，A公司也因此变更为房地产开发公司。因工改工项目，政府出台的政策文件有要求，厂房只有70%可分割出售，剩余30%不可分割出售，企业必须自持。A公司就把自持的30%，用以租代售的形式，“卖“出去，合同约定：租期20年送30年，A公司一次性收取全额租金，厂房每年的房产税由买家承担，厂房后续若拆迁等收益也归买家，厂房后续若发生其他费用等，也是有买家承担。也就是说，以租代售这部分的厂房，除了不能给买家办理产权证，买家不能办理抵押之外，其余权利跟厂房销售是一样的。我的问题是：1、A公司自持的30%厂房竣工后，是计入什么科目？2、以租代售收取租金后，A公司是一次性确认收入，同时一次性结转厂房成本，会计处理跟可以办证的厂房销售一样吗？还是说分年确认收入，同时通过折旧方式结转这部分成本？3、以租代售产权没有转移（不动产权证还是A公司），但是从实质看其实A公司已经把这个厂房的权利都转移给买家了，A公司对厂房已经没有控制权了。但是没有交土增税，是否要视同产权转移交土增税？4、等所有的30%以租代售，都“卖出去”之后，30%自持的产权证还是在A公司名下，A公司后续如果想注销公司，要如何解决30%自持的这个产权证？", "reply": "1、这部分30%厂房名义上是自持，但实际上是不能给本企业带来未来经济利益流入的，因此其会计处理实质上等同于用于出售的存货。\n\n2、A公司是一次性确认收入，同时一次性结转厂房成本，会计处理跟可以办证的厂房销售一样。\n\n3、是否视同产权转移缴纳土地增值税，建议咨询税务机关意见，个人理解因为没有产权转移，应该不用。", "searchText": "5496693 房地产公司“小产权房”以租代售财务处理及税务处理问题 收入确认/总额净额 小黑包 求助陈版主：业务背景：a公司原本是制造业公司，参与工改工项目，把自身厂房推到重建，建一个产业园用于出售，a公司也因此变更为房地产开发公司。因工改工项目，政府出台的政策文件有要求，厂房只有70%可分割出售，剩余30%不可分割出售，企业必须自持。a公司就把自持的30%，用以租代售的形式，“卖“出去，合同约定：租期20年送30年，a公司一次性收取全额租金，厂房每年的房产税由买家承担，厂房后续若拆迁等收益也归买家，厂房后续若发生其他费用等，也是有买家承担。也就是说，以租代售这部分的厂房，除了不能给买家办理产权证，买家不能办理抵押之外，其余权利跟厂房销售是一样的。我的问题是：1、a公司自持的30%厂房竣工后，是计入什么科目？2、以租代售收取租金后，a公司是一次性确认收入，同时一次性结转厂房成本，会计处理跟可以办证的厂房销售一样吗？还是说分年确认收入，同时通过折旧方式结转这部分成本？3、以租代售产权没有转移（不动产权证还是a公司），但是从实质看其实a公司已经把这个厂房的权利都转移给买家了，a公司对厂房已经没有控制权了。但是没有交土增税，是否要视同产权转移交土增税？4、等所有的30%以租代售，都“卖出去”之后，30%自持的产权证还是在a公司名下，a公司后续如果想注销公司，要如何解决30%自持的这个产权证？ 1、这部分30%厂房名义上是自持，但实际上是不能给本企业带来未来经济利益流入的，因此其会计处理实质上等同于用于出售的存货。\n\n2、a公司是一次性确认收入，同时一次性结转厂房成本，会计处理跟可以办证的厂房销售一样。\n\n3、是否视同产权转移缴纳土地增值税，建议咨询税务机关意见，个人理解因为没有产权转移，应该不用。"}, {"tid": "5496720", "title": "关于对免费使用的厂房改良支出会计处理。", "category": "收入确认/总额净额", "questionAuthor": "baibingbing132y", "questionTime": "2026-04-10 17:48:30", "replyTime": "2026-04-13 22:19:57", "replySortTime": "2026-04-13 22:19:57", "url": "https://bbs.esnai.com/thread-5496720-1-2.html", "question": "关于对免费使用的厂房改良支出会计处理。\n\n1、新成立公司，筹建期对免费使用的厂房改良支出，也是计入长期待摊费用吗？\n\n2、如果计入长期待摊费用，归集完毕，按照厂房的使用寿命摊销吗？\n\n3、摊销计入成本还是费用呢？是否考虑筹建期无对应收入则不计入成本，待筹建完毕计入制造费用呢？\n\n提前谢谢陈版回复了。", "reply": "1、对租入固定资产的改良支出计入长期待摊费用，不论是否发生在免租期间。\n\n2、摊销期限为以下两者孰短：（1）该装修本身的使用年限；（2）预计剩余的使用权年限。\n\n3、因为是厂房，所以摊销计入制造费用，再分摊计入产品成本，最终计入销售成本中。筹建期间的摊销可以计入管理费用。", "searchText": "5496720 关于对免费使用的厂房改良支出会计处理。 收入确认/总额净额 baibingbing132y 关于对免费使用的厂房改良支出会计处理。\n\n1、新成立公司，筹建期对免费使用的厂房改良支出，也是计入长期待摊费用吗？\n\n2、如果计入长期待摊费用，归集完毕，按照厂房的使用寿命摊销吗？\n\n3、摊销计入成本还是费用呢？是否考虑筹建期无对应收入则不计入成本，待筹建完毕计入制造费用呢？\n\n提前谢谢陈版回复了。 1、对租入固定资产的改良支出计入长期待摊费用，不论是否发生在免租期间。\n\n2、摊销期限为以下两者孰短：（1）该装修本身的使用年限；（2）预计剩余的使用权年限。\n\n3、因为是厂房，所以摊销计入制造费用，再分摊计入产品成本，最终计入销售成本中。筹建期间的摊销可以计入管理费用。"}, {"tid": "5496721", "title": "求助陈版主，协商提前退租的会计处理", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "熊猫王", "questionTime": "2026-04-10 17:50:39", "replyTime": "2026-04-13 22:17:45", "replySortTime": "2026-04-13 22:17:45", "url": "https://bbs.esnai.com/thread-5496721-1-1.html", "question": "陈版主您好，假设公司从24年1月租了一个办公室，租期是3年，到25年7月的时候，公司仍在该办公室办公，但是公司与出租人达成协议，约定24年11月-25年7月的租金退回，公司从25年7月底退租。\n\n请问该使用权资产终止确认的时点是25年7月还是24年10月？如果是24年10月，24年11月-25年7月相应的折旧和利息费用需要冲回吗？退回的租金要冲减费用还是租赁付款额呢？", "reply": "使用权资产终止确认的时点是实际完成退租的时点，即实际不再使用该项租赁资产的时点，即2025年7月底。在此期间，使用权资产仍需计提折旧。因为租赁变更和实际退租都发生在2025年7月，因此该项租赁变更的影响仅体现在2025年7月的会计处理中，此前各月的会计处理均按原租约执行，2024年11月至2025年7月已确认的使用权资产折旧和租赁负债相关利息支出不作调整。\n\n退回的租金首先冲减使用权资产的账面价值，再以冲减后的使用权资产账面价值和租赁负债账面价值为基础进行提前退租的会计处理，确认资产处置损益。", "searchText": "5496721 求助陈版主，协商提前退租的会计处理 租赁/使用权资产/融资租赁 熊猫王 陈版主您好，假设公司从24年1月租了一个办公室，租期是3年，到25年7月的时候，公司仍在该办公室办公，但是公司与出租人达成协议，约定24年11月-25年7月的租金退回，公司从25年7月底退租。\n\n请问该使用权资产终止确认的时点是25年7月还是24年10月？如果是24年10月，24年11月-25年7月相应的折旧和利息费用需要冲回吗？退回的租金要冲减费用还是租赁付款额呢？ 使用权资产终止确认的时点是实际完成退租的时点，即实际不再使用该项租赁资产的时点，即2025年7月底。在此期间，使用权资产仍需计提折旧。因为租赁变更和实际退租都发生在2025年7月，因此该项租赁变更的影响仅体现在2025年7月的会计处理中，此前各月的会计处理均按原租约执行，2024年11月至2025年7月已确认的使用权资产折旧和租赁负债相关利息支出不作调整。\n\n退回的租金首先冲减使用权资产的账面价值，再以冲减后的使用权资产账面价值和租赁负债账面价值为基础进行提前退租的会计处理，确认资产处置损益。"}, {"tid": "5496728", "title": "求助陈版主 关于资产在合并报表中的会计处理", "category": "合并/股权/权益法", "questionAuthor": "大ye木2", "questionTime": "2026-04-11 11:37:25", "replyTime": "2026-04-13 22:14:04", "replySortTime": "2026-04-13 22:14:04", "url": "https://bbs.esnai.com/thread-5496728-1-2.html", "question": "求助陈版主。母公司主营手机零配件制造，本期新设控股子公司，子公司主营业务为自动化设备制造。本期母公司需购入自动化设备，由子公司负责购买设备材料并组装调试，调试成功后再出售给母公司，在调试成功前，子公司在生产成本科目下进行财务核算，生产成本发生金额包含外购材料和子公司员工薪酬。\n\n求教陈版主，母公司向子公司买设备的情况会长期存在，在这种情况下，编制合并报表时，子公司的生产成本需不需要重分类到在建工程-在安装设备？在合并报表中子公司生产成本里的员工薪酬是否应直接计入主营业务成本或费用化，不应计入长期资产？", "reply": "子公司为母公司购建生产设备等固定资产，属于子公司的主营业务，在子公司自身报表中确认为存货，可确认营业收入和营业成本，但在合并报表层面，需将子公司账面的存货重分类为在建工程，以实际成本计量（通常情况下与子公司个别报表层面的存货计量金额不存在重大差异，一般无需特别调整）。\n\n子公司生产成本里的员工薪酬，在合并报表层面通常可以保留在在建工程成本中。因为同样属于使得固定资产达到预定可使用状态所必需的支出的一部分。", "searchText": "5496728 求助陈版主 关于资产在合并报表中的会计处理 合并/股权/权益法 大ye木2 求助陈版主。母公司主营手机零配件制造，本期新设控股子公司，子公司主营业务为自动化设备制造。本期母公司需购入自动化设备，由子公司负责购买设备材料并组装调试，调试成功后再出售给母公司，在调试成功前，子公司在生产成本科目下进行财务核算，生产成本发生金额包含外购材料和子公司员工薪酬。\n\n求教陈版主，母公司向子公司买设备的情况会长期存在，在这种情况下，编制合并报表时，子公司的生产成本需不需要重分类到在建工程-在安装设备？在合并报表中子公司生产成本里的员工薪酬是否应直接计入主营业务成本或费用化，不应计入长期资产？ 子公司为母公司购建生产设备等固定资产，属于子公司的主营业务，在子公司自身报表中确认为存货，可确认营业收入和营业成本，但在合并报表层面，需将子公司账面的存货重分类为在建工程，以实际成本计量（通常情况下与子公司个别报表层面的存货计量金额不存在重大差异，一般无需特别调整）。\n\n子公司生产成本里的员工薪酬，在合并报表层面通常可以保留在在建工程成本中。因为同样属于使得固定资产达到预定可使用状态所必需的支出的一部分。"}, {"tid": "5496730", "title": "投资房地产合并层面采用公允法计量对应的递延所得税问题", "category": "合并/股权/权益法", "questionAuthor": "爱喝冰美式", "questionTime": "2026-04-11 15:57:05", "replyTime": "2026-04-13 22:11:02", "replySortTime": "2026-04-13 22:11:02", "url": "https://bbs.esnai.com/thread-5496730-1-2.html", "question": "子公司投资性房地产单体层面采用成本模式计量，母公司采用公允模式，合并层面将子公司调整为公允模式计量。子公司原来计提的投资性房地产折旧在合并层面冲回，该部分在子公司层面已做税前扣除。合并层面子公司投资性房地产调整为公允模式计量后，账面价值与计税基础的差确认递延所得税资产/负债，这个计税基础为子公司计提折旧后的账面净值吗？以后期间递延所得税资产/负债的转回均要考虑子公司层面计提的投资性房地产折旧？", "reply": "参阅：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496675。", "searchText": "5496730 投资房地产合并层面采用公允法计量对应的递延所得税问题 合并/股权/权益法 爱喝冰美式 子公司投资性房地产单体层面采用成本模式计量，母公司采用公允模式，合并层面将子公司调整为公允模式计量。子公司原来计提的投资性房地产折旧在合并层面冲回，该部分在子公司层面已做税前扣除。合并层面子公司投资性房地产调整为公允模式计量后，账面价值与计税基础的差确认递延所得税资产/负债，这个计税基础为子公司计提折旧后的账面净值吗？以后期间递延所得税资产/负债的转回均要考虑子公司层面计提的投资性房地产折旧？ 参阅：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496675。"}, {"tid": "5496732", "title": "关注销售自建办公楼", "category": "收入确认/总额净额", "questionAuthor": "xiaoxiao@xia", "questionTime": "2026-04-11 17:03:24", "replyTime": "2026-04-13 22:10:22", "replySortTime": "2026-04-13 22:10:22", "url": "https://bbs.esnai.com/thread-5496732-1-2.html", "question": "陈版主您好，想咨询下，如果企业拟将建成后的办公楼作为商品房进行销售，那在建工程转固时点该如何处理？可以直接转入其他流动资产吗？", "reply": "如果企业没有房地产开发和销售资质，但确定将直接销售自建办公楼（不经过自用阶段）的，则在完工时从在建工程直接转其他非流动资产（如符合持有待售确认条件的，则转为持有待售资产），出售时按差额确认资产处置损益。", "searchText": "5496732 关注销售自建办公楼 收入确认/总额净额 xiaoxiao@xia 陈版主您好，想咨询下，如果企业拟将建成后的办公楼作为商品房进行销售，那在建工程转固时点该如何处理？可以直接转入其他流动资产吗？ 如果企业没有房地产开发和销售资质，但确定将直接销售自建办公楼（不经过自用阶段）的，则在完工时从在建工程直接转其他非流动资产（如符合持有待售确认条件的，则转为持有待售资产），出售时按差额确认资产处置损益。"}, {"tid": "5496680", "title": "服务换股权", "category": "合并/股权/权益法", "questionAuthor": "fld128", "questionTime": "2026-04-08 14:54:12", "replyTime": "2026-04-13 14:19:11", "replySortTime": "2026-04-13 14:19:11", "url": "https://bbs.esnai.com/thread-5496680-1-1.html", "question": "维亚生物提供一种以服务换股权（EFS模式），具体是向具备发展前景的生物科技公司提供药物发现的CRO服务，相应地获取这些公司的股权。换言之，其模式相当于pre-VC的更早期风险投资。就该等服务换股权的非现金交易而言，我们会在将相关研究成果的控制权转让予合作者时确认收入，同时在我们获得对该等权益的法定所有权或相关风险及奖励时，将相关股权计为采用权益法列账的投资及按公允价值计入损益的金融资产。具体而言，当我们把相关研究成果的控制权转让予合作者——被投资方，但尚未取得相关股权的法定所有权或相关风险及回报时，我们将该股权确认为应收款项；当我们取得合作者——被投资方股权的法定所有权或相关风险及回报，但尚未将相关研究成果的控制权转让予彼等时，我们将该股权确认为合约负债。\n\n维亚生物这种业务模式，收入金额如何确定？按照股权的公允价值吗？", "reply": "这属于收入准则规范的非现金对价（以被服务企业股权作为对价支付形式）。收入金额为标的股权在合同开始日（即各方就合同条款达成一致之日）的公允价值。", "searchText": "5496680 服务换股权 合并/股权/权益法 fld128 维亚生物提供一种以服务换股权（efs模式），具体是向具备发展前景的生物科技公司提供药物发现的cro服务，相应地获取这些公司的股权。换言之，其模式相当于pre-vc的更早期风险投资。就该等服务换股权的非现金交易而言，我们会在将相关研究成果的控制权转让予合作者时确认收入，同时在我们获得对该等权益的法定所有权或相关风险及奖励时，将相关股权计为采用权益法列账的投资及按公允价值计入损益的金融资产。具体而言，当我们把相关研究成果的控制权转让予合作者——被投资方，但尚未取得相关股权的法定所有权或相关风险及回报时，我们将该股权确认为应收款项；当我们取得合作者——被投资方股权的法定所有权或相关风险及回报，但尚未将相关研究成果的控制权转让予彼等时，我们将该股权确认为合约负债。\n\n维亚生物这种业务模式，收入金额如何确定？按照股权的公允价值吗？ 这属于收入准则规范的非现金对价（以被服务企业股权作为对价支付形式）。收入金额为标的股权在合同开始日（即各方就合同条款达成一致之日）的公允价值。"}, {"tid": "5496675", "title": "投资房地产合并层面采用公允法计量对应的递延所得税问题", "category": "合并/股权/权益法", "questionAuthor": "爱喝冰美式", "questionTime": "2026-04-08 10:19:37", "replyTime": "2026-04-13 14:07:02", "replySortTime": "2026-04-13 14:07:02", "url": "https://bbs.esnai.com/thread-5496675-1-2.html", "question": "子公司投资性房地产单体层面采用成本模式计量，母公司采用公允模式，合并层面将子公司调整为公允模式计量。子公司原来计提的投资性房地产折旧在合并层面冲回，该部分在子公司层面已做税前扣除。合并层面子公司投资性房地产调整为公允模式计量后，账面价值与计税基础的差确认递延所得税资产/负债，这个计税基础为子公司计提折旧后的账面净值吗？以后期间递延所得税资产/负债的转回均要考虑子公司层面计提的投资性房地产折旧？", "reply": "由于子公司在成本模式下计提的投资性房地产折旧已在税前扣除，且预计后续仍可获得税前扣除（因为子公司自身对投资性房地产的后续计量模式没有变化），故该项投资性房地产计税基础是扣减累计折旧后的净值。后续随着公允价值的变动和折旧的计提，该暂时性差异的金额也会相应发生变化。", "searchText": "5496675 投资房地产合并层面采用公允法计量对应的递延所得税问题 合并/股权/权益法 爱喝冰美式 子公司投资性房地产单体层面采用成本模式计量，母公司采用公允模式，合并层面将子公司调整为公允模式计量。子公司原来计提的投资性房地产折旧在合并层面冲回，该部分在子公司层面已做税前扣除。合并层面子公司投资性房地产调整为公允模式计量后，账面价值与计税基础的差确认递延所得税资产/负债，这个计税基础为子公司计提折旧后的账面净值吗？以后期间递延所得税资产/负债的转回均要考虑子公司层面计提的投资性房地产折旧？ 由于子公司在成本模式下计提的投资性房地产折旧已在税前扣除，且预计后续仍可获得税前扣除（因为子公司自身对投资性房地产的后续计量模式没有变化），故该项投资性房地产计税基础是扣减累计折旧后的净值。后续随着公允价值的变动和折旧的计提，该暂时性差异的金额也会相应发生变化。"}, {"tid": "5496747", "title": "拟IPO企业为购买集体土地，发生的土壤检测、环保评估等费用的会计出来", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "Byron12480", "questionTime": "2026-04-12 23:00:34", "replyTime": "2026-04-13 08:52:17", "replySortTime": "2026-04-13 08:52:17", "url": "https://bbs.esnai.com/thread-5496747-1-3.html", "question": "求教陈版主：\n\n背景：拟IPO企业，早年租赁了集体经营性建设用地，并在该租赁土地上建了厂房（未取得产证），现该企业拟上市，为了办理产证，准备通过集体土地入市的方式，购买该土地，并办理上述厂房的产证；现在发生了地灾评估费，土壤检测费、生态环保检测费、房屋鉴定费、测绘费、产证办理代理费；\n\n问题：\n\n上述能否资本化，计入土地成本或厂房成本？", "reply": "这些交易费用属于纠正历史形成的权属瑕疵，但本身并不改变该土地及其上房屋的状态，属于补救性质的支出。建议发生时直接费用化处理，计入管理费用。", "searchText": "5496747 拟ipo企业为购买集体土地，发生的土壤检测、环保评估等费用的会计出来 资产/存货/固定资产/无形资产 byron12480 求教陈版主：\n\n背景：拟ipo企业，早年租赁了集体经营性建设用地，并在该租赁土地上建了厂房（未取得产证），现该企业拟上市，为了办理产证，准备通过集体土地入市的方式，购买该土地，并办理上述厂房的产证；现在发生了地灾评估费，土壤检测费、生态环保检测费、房屋鉴定费、测绘费、产证办理代理费；\n\n问题：\n\n上述能否资本化，计入土地成本或厂房成本？ 这些交易费用属于纠正历史形成的权属瑕疵，但本身并不改变该土地及其上房屋的状态，属于补救性质的支出。建议发生时直接费用化处理，计入管理费用。"}, {"tid": "5496739", "title": "以矿产收入为基数缴纳的采矿权价款如何核算？", "category": "收入确认/总额净额", "questionAuthor": "柳寒秋", "questionTime": "2026-04-12 10:02:27", "replyTime": "2026-04-13 08:50:43", "replySortTime": "2026-04-13 08:50:43", "url": "https://bbs.esnai.com/thread-5496739-1-2.html", "question": "各位老师，我公司从事铝土矿开采，其采矿权价款以铝土矿销售收入未计算按一定方法折算计算缴纳矿业权出让费。请问我公司财务核算时，该矿业权出让收益是作为管理费用还是作为销售成本呢？", "reply": "应作为营业成本核算，即事实上构成矿产品生产成本的一部分，最终转入营业成本。", "searchText": "5496739 以矿产收入为基数缴纳的采矿权价款如何核算？ 收入确认/总额净额 柳寒秋 各位老师，我公司从事铝土矿开采，其采矿权价款以铝土矿销售收入未计算按一定方法折算计算缴纳矿业权出让费。请问我公司财务核算时，该矿业权出让收益是作为管理费用还是作为销售成本呢？ 应作为营业成本核算，即事实上构成矿产品生产成本的一部分，最终转入营业成本。"}, {"tid": "5496690", "title": "求助", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "爬爬呀", "questionTime": "2026-04-09 13:59:02", "replyTime": "2026-04-13 07:35:46", "replySortTime": "2026-04-13 07:35:46", "url": "https://bbs.esnai.com/thread-5496690-1-3.html", "question": "陈版主好：一家公司将收到的即征即退现金流计入“收到的税费返还”，会计科目计入其他收益；后来由于某种原因自查需要退回给政府，冲减了其他收益，这笔退回的现金流是计入“支付的税费”还是“支付其他与经营活动有关的现金流”呢？", "reply": "如果按照税收征管途径，重新由税务机关征收入库的，则列入“支付的各项税费”；如果返还给财政的，则为“支付其他与经营活动有关的现金”。", "searchText": "5496690 求助 政府补助/ppp/税费/现金流 爬爬呀 陈版主好：一家公司将收到的即征即退现金流计入“收到的税费返还”，会计科目计入其他收益；后来由于某种原因自查需要退回给政府，冲减了其他收益，这笔退回的现金流是计入“支付的税费”还是“支付其他与经营活动有关的现金流”呢？ 如果按照税收征管途径，重新由税务机关征收入库的，则列入“支付的各项税费”；如果返还给财政的，则为“支付其他与经营活动有关的现金”。"}, {"tid": "5496704", "title": "求助陈版主", "category": "合并/股权/权益法", "questionAuthor": "爬爬呀", "questionTime": "2026-04-10 15:01:19", "replyTime": "2026-04-13 07:33:58", "replySortTime": "2026-04-13 07:33:58", "url": "https://bbs.esnai.com/thread-5496704-1-3.html", "question": "《2025年度内部控制评价报告》中有这样的描述：纳入评价范围单位资产总额占公司合并财务报表资产总额的比例，营业收入合计占公司合并财务报表营业收入总额的比例情况，\n\n疑问：1、如果存在非全资子公司，这两个比例应该不是100%吧？那应该如何计算呢？\n\n2、如果非全资子公司的收入均为向合并范围内关联方销售，那么营业收入合计占公司合并财务报表营业收入总额的比例，是多少呢？", "reply": "1、非全资子公司不按照持股比例折算，同样按照100%纳入计算。否则，即使对全部母子公司均进行了评价，覆盖范围也达不到100%，这是不合理的。\n\n2、应抵销内部交易的影响，只算各子公司对合并范围外公司的销售占集团合并层面销售收入的比例。", "searchText": "5496704 求助陈版主 合并/股权/权益法 爬爬呀 《2025年度内部控制评价报告》中有这样的描述：纳入评价范围单位资产总额占公司合并财务报表资产总额的比例，营业收入合计占公司合并财务报表营业收入总额的比例情况，\n\n疑问：1、如果存在非全资子公司，这两个比例应该不是100%吧？那应该如何计算呢？\n\n2、如果非全资子公司的收入均为向合并范围内关联方销售，那么营业收入合计占公司合并财务报表营业收入总额的比例，是多少呢？ 1、非全资子公司不按照持股比例折算，同样按照100%纳入计算。否则，即使对全部母子公司均进行了评价，覆盖范围也达不到100%，这是不合理的。\n\n2、应抵销内部交易的影响，只算各子公司对合并范围外公司的销售占集团合并层面销售收入的比例。"}, {"tid": "5496729", "title": "急急急 陈版主", "category": "合并/股权/权益法", "questionAuthor": "爬爬呀", "questionTime": "2026-04-11 13:37:24", "replyTime": "2026-04-13 07:31:58", "replySortTime": "2026-04-13 07:31:58", "url": "https://bbs.esnai.com/thread-5496729-1-2.html", "question": "请陈版主指导下，当时回购库存股用于员工持股计划，后续库存股注销时，借：股本  借：资本公积-股本溢价 贷：库存股。对应的权益变动表如何列示呢？股本、资本公积-股本溢价、库存股如何填列呢，在权益变动表中？", "reply": "库存股的注销并不影响权益总额，作为所有者权益内部结转（其他）列报即可。", "searchText": "5496729 急急急 陈版主 合并/股权/权益法 爬爬呀 请陈版主指导下，当时回购库存股用于员工持股计划，后续库存股注销时，借：股本  借：资本公积-股本溢价 贷：库存股。对应的权益变动表如何列示呢？股本、资本公积-股本溢价、库存股如何填列呢，在权益变动表中？ 库存股的注销并不影响权益总额，作为所有者权益内部结转（其他）列报即可。"}, {"tid": "5496636", "title": "同一控制控股子公司收购全资子公司的合并及账务处理问题", "category": "合并/股权/权益法", "questionAuthor": "rickymost", "questionTime": "2026-04-04 17:24:26", "replyTime": "2026-04-13 07:30:46", "replySortTime": "2026-04-13 07:30:46", "url": "https://bbs.esnai.com/thread-5496636-1-3.html", "question": "本帖最后由 rickymost 于 2026-4-4 19:43 编辑\n\n陈老师您好：\n\n      甲集团为国有企业，甲集团持有A股份公司80%股份，20%为集团外少数股东。B公司为甲集团全资子公司，2025年A公司收购B公司100%股权，以2025年9月30日为基准日，该基准日B公司净资产2亿，A公司收购价为4亿，请问：一、甲集团及A公司单体分别如何进行账务处理？该项是同一控制下企业合并。A公司账务处理：借：长期股权投资——B公司 2亿元　　                资本公积/留存收益 2亿元贷：银行存款等 4亿元 甲集团账务处理：借：银行存款 4亿元贷：长期股权投资——B公司 XX　　                投资收益（差额） XX 二、在编制2025年合并报表上，甲集团及A股份公司各合并层面分别如何合并抵消？如果视同同一控制，则在甲集团层面是否也是直接合并A股份公司的合并报表，此时对B公司期初期末都是实际上只按80%合并，期初这20%要怎么处理，如何在附注中说明期初与上年差异？A公司层面合并B公司产生的商誉在甲集团合并层面是否要抵消，怎么抵消，但是A公司的少数股东的对这部分商誉在甲集团合并层面如何处理？上述各项有何具体准则等规定？（一）A公司合并报表的编制1、合并资产负债表——期初数调整A公司2025年12月31日合并资产负债表，需要调整期初数（即2025年1月1日的比较数据），将B公司的资产、负债纳入期初合并范围。具体操作：在2025年1月1日的合并资产负债表（期初数）中，并入B公司2025年1月1日的资产、负债；B公司的资产、负债按其在最终控制方合并报表中的账面价值并入；同时，因合并而增加的净资产在期初合并资产负债表中调整所有者权益项下的资本公积（资本溢价或股本溢价）。A公司2025年度合并利润表、现金流量表包含B公司2025年全年损益（1月1日至12月31日），其中1月1日至9月30日（合并日前）的损益应在合并利润表中单列项目\"被合并方在合并前实现的净利润\"反映，并计入非经常性损益；10月1日至12月31日（合并日后）的损益正常并入。比较期间合并利润表（2024年度）：应纳入B公司2024年度全年的收入、费用和利润，视同B公司自始即被A公司控制。A公司2025年度合并现金流量表包含B公司2025年全年现金流量（1月1日至12月31日）。在合并日（2025年9月30日），按实际支付的现金对价在合并现金流量表中列入\"支付的与投资活动有关的现金\"。比较期间合并现金流量表（2024年度）：应纳入B公司2024年度全年的现金流量。 （二）甲集团合并报表的编制合并后的主体中，A公司的20%集团外股东成为甲集团合并报表中的少数股东；这部分少数股东通过A公司间接享有B公司净资产的20%权益。1、合并资产负债表甲集团2025年12月31日合并资产负债表的期初数调整，涉及两个层面的处理：在比较期间（2024年度），甲集团合并报表中B公司的权益结构发生变化——交易前B公司为甲集团全资子公司，权益全部归属于母公司；交易后（视同自始即通过A公司控制），B公司净资产的20%应作为少数股东权益列报。在甲集团2025年12月31日的合并资产负债表中，需要确认A公司少数股东（20%）对B公司净资产的权益份额。根据权益性交易原则，这种在不丧失控制权前提下因集团内部重组导致的权益结构调整，应当作为权益性交易处理，不确认损益，差额直接调整权益。借：归属于母公司股东权益——B公司净资产20%份额（以2025年12月31日B公司净资产计算）贷：少数股东权益——A公司少数股东享有的B公司权益份额对于2025年1月1日的期初比较数据，甲集团同样需要进行权益性交易调整。假设B公司2025年1月1日净资产为2亿元，则期初应调整的金额为2亿元 × 20% = 0.4亿元：借：归属于母公司股东权益（期初） 0.4亿元贷：少数股东权益（期初） 0.4亿元2、合并利润表比较期间合并利润表（2024、2025年度）：应纳入B公司2024、205年度全年的损益，但需将20%的份额作为少数股东损益列报。请教陈老师，上述处理方式是否正确，谢谢", "reply": "1、A公司合并报表中，2025年支付的收购对价4亿元对应于资本公积的减少，所以应列报为“支付其他与筹资活动有关的现金”，不是投资活动。\n\n2、甲集团合并报表：虽然该事项对A而言是同一控制下合并，但对甲集团而言只是合并范围内的架构重组，其交易对象均在集团内部，无外部交易对手。交易前后，各子公司的直接外部少数股权比例均未发生变化。因此，该事项应作为一项普通的内部资产交易进行抵销处理，在甲集团合并报表中完全抵销其影响，视同该交易从未发生过。在交易发生时点，不应对甲集团合并报表层面的损益和权益（包括资本公积和少数股东权益）产生影响。", "searchText": "5496636 同一控制控股子公司收购全资子公司的合并及账务处理问题 合并/股权/权益法 rickymost 本帖最后由 rickymost 于 2026-4-4 19:43 编辑\n\n陈老师您好：\n\n      甲集团为国有企业，甲集团持有a股份公司80%股份，20%为集团外少数股东。b公司为甲集团全资子公司，2025年a公司收购b公司100%股权，以2025年9月30日为基准日，该基准日b公司净资产2亿，a公司收购价为4亿，请问：一、甲集团及a公司单体分别如何进行账务处理？该项是同一控制下企业合并。a公司账务处理：借：长期股权投资——b公司 2亿元　　                资本公积/留存收益 2亿元贷：银行存款等 4亿元 甲集团账务处理：借：银行存款 4亿元贷：长期股权投资——b公司 xx　　                投资收益（差额） xx 二、在编制2025年合并报表上，甲集团及a股份公司各合并层面分别如何合并抵消？如果视同同一控制，则在甲集团层面是否也是直接合并a股份公司的合并报表，此时对b公司期初期末都是实际上只按80%合并，期初这20%要怎么处理，如何在附注中说明期初与上年差异？a公司层面合并b公司产生的商誉在甲集团合并层面是否要抵
