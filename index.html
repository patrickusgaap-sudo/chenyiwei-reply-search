换日整体是评估增值的，对于这段期间确认的递延所得税负债625万元是否结转至2025年所得税费用？2017年末至2024年末累计评估增值的2000万元的公允价值变动损益，在住建局收回资产时怎么进行账务处理？", "reply": "根据《企业会计准则第18号——所得税》第二十一条规定，由于无偿划入、划出均属于权益性交易，即“直接在所有者权益中确认的交易或者事项”，故其相关的所得税影响也应直接调整权益。\n\n该企业在将投资性房地产划出时，应按划出资产的账面价值冲减权益，与划出资产相关的累积其他综合收益也应当转入资本公积（两者相抵，相当于按照划入时的入账价值进行划出处理）。与之相对应，与其他综合收益、累计公允价值变动损益相关的递延所得税负债也应当转入资本公积。", "searchText": "5495994 关于政府给国有企业无偿注入房屋，隔几年后又收回的账务处理问题 合并/股权/权益法 2471778478 请教陈版主及各位老师：\n\n      年报审计中遇到一个情况：2015年，住建局向国有企业无偿划入了一批资产（房屋建筑物），企业初始收到时按划入价值3000万元计入固定资产，同时确认了资本公积3000万元，2017年1月1日，该房屋建筑物用于出租，将其转换为以公允价值计量的投资性房地产，转换日前述房屋建筑物评估增值500万元，确认了其他综合收益375万和递延所得税负债125万，以后每年都按评估价调整公允价值并确认递延所得税。2024年末，递延所得税负债余额625万元，2017年末至2024年末累计公允价值增值2000万元。2025年末，住建局向该企业收回了这批资产，现在对于账务处理存在几项疑义。\n\n       该批资产2025年末的价值相对于2017年转换日整体是评估增值的，对于这段期间确认的递延所得税负债625万元是否结转至2025年所得税费用？2017年末至2024年末累计评估增值的2000万元的公允价值变动损益，在住建局收回资产时怎么进行账务处理？ 根据《企业会计准则第18号——所得税》第二十一条规定，由于无偿划入、划出均属于权益性交易，即“直接在所有者权益中确认的交易或者事项”，故其相关的所得税影响也应直接调整权益。\n\n该企业在将投资性房地产划出时，应按划出资产的账面价值冲减权益，与划出资产相关的累积其他综合收益也应当转入资本公积（两者相抵，相当于按照划入时的入账价值进行划出处理）。与之相对应，与其他综合收益、累计公允价值变动损益相关的递延所得税负债也应当转入资本公积。"}, {"tid": "5495992", "title": "请教融资担保公司递延所得税的问题", "category": "所得税/递延所得税", "questionAuthor": "chen979195", "questionTime": "2026-02-07 23:38:24", "replyTime": "2026-02-22 17:15:36", "replySortTime": "2026-02-22 17:15:36", "url": "https://bbs.esnai.com/thread-5495992-1-7.html", "question": "请教陈版主以及各位老师：\n\n首先，这个是目前的税收政策——\n\n1.按照不超过当年年末担保责任余额1%的比例计提的担保赔偿准备，允许在企业所得税税前扣除，同时将上年度计提的担保赔偿准备余额转为当期收入。\n\n2.按照不超过当年担保费收入50%的比例计提的未到期责任准备，允许在企业所得税税前扣除，同时将上年度计提的未到期责任准备余额转为当期收入。\n\n其次，公司目前是担保赔偿准备按规定比例计提并将上年计提的金额在汇算清缴时做纳税调增，账面金额不做结转收入，只在发生实际损失时冲减准备金；未到期责任准备按比例计提同时冲减上年计提金额。\n\n我的疑问是，这种情况下是否产生可抵扣暂时性差异？公司之前是期末按担保赔偿准备的期初余额计提递延所得税资产，搜了一些同行业公司的报告有提的也有不提的，计提标准也看不出来。个人感觉不存在暂时性差异，要有也是应纳税暂时性差异才对。", "reply": "由于税前扣除（或转回）时点与会计上计入损益的时点不同，因此两项准备金的账面价值和计税基础也是有差异的（如果计提的时间和比例，以及转回的时间完全相同，则无差异），需就相关差异确认递延所得税资产或负债。\n\n建议根据该企业的具体情况核对纳税调整情况，如存在纳税调整情况的，则表明多数可能下需要确认递延所得税资产或负债。", "searchText": "5495992 请教融资担保公司递延所得税的问题 所得税/递延所得税 chen979195 请教陈版主以及各位老师：\n\n首先，这个是目前的税收政策——\n\n1.按照不超过当年年末担保责任余额1%的比例计提的担保赔偿准备，允许在企业所得税税前扣除，同时将上年度计提的担保赔偿准备余额转为当期收入。\n\n2.按照不超过当年担保费收入50%的比例计提的未到期责任准备，允许在企业所得税税前扣除，同时将上年度计提的未到期责任准备余额转为当期收入。\n\n其次，公司目前是担保赔偿准备按规定比例计提并将上年计提的金额在汇算清缴时做纳税调增，账面金额不做结转收入，只在发生实际损失时冲减准备金；未到期责任准备按比例计提同时冲减上年计提金额。\n\n我的疑问是，这种情况下是否产生可抵扣暂时性差异？公司之前是期末按担保赔偿准备的期初余额计提递延所得税资产，搜了一些同行业公司的报告有提的也有不提的，计提标准也看不出来。个人感觉不存在暂时性差异，要有也是应纳税暂时性差异才对。 由于税前扣除（或转回）时点与会计上计入损益的时点不同，因此两项准备金的账面价值和计税基础也是有差异的（如果计提的时间和比例，以及转回的时间完全相同，则无差异），需就相关差异确认递延所得税资产或负债。\n\n建议根据该企业的具体情况核对纳税调整情况，如存在纳税调整情况的，则表明多数可能下需要确认递延所得税资产或负债。"}, {"tid": "5495987", "title": "研发形成固定资产是否属于研发支出资本化", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "尹峰", "questionTime": "2026-02-07 20:07:50", "replyTime": "2026-02-22 17:04:09", "replySortTime": "2026-02-22 17:04:09", "url": "https://bbs.esnai.com/thread-5495987-1-7.html", "question": "请教陈版，A公司从事专用设备的制造，研发中心有时会研制专用设备某些测试平台，这类平台不对外销售，未来持续用于研发活动。A公司账面通过在建工程核算其全周期的支出（主要是领料和人工），最终项目结项资产达到可使用状态后转入固定资产。个人判断这种研制平台行为应该是固定资产购建行为，与研发无关。但结合《企业会计准则解释第15号》，请问这种属于研发支出资本化吗？但研发支出资本化形成无形资产都是资本化阶段的支出才形成资产，这种如果属于研发支出资本化，不就是全周期的投入都资本化为固定资产了吗", "reply": "基本赞同主帖中的理解，此类研发平台属于固定资产购建行为，不属于研发活动，因此可以根据固定资产准则的规定，将购建过程中发生的必要、合理支出计入其原值。后续通过折旧方式将其成本分摊到各受益的研发项目中，计入各项目的研发支出，再根据相关折旧发生时对应的研发项目是否已经进入资本化阶段，与同时发生的该项目其他研发支出一并考虑其费用化/资本化问题。\n\n该事项不适用解释15号第一条规定。", "searchText": "5495987 研发形成固定资产是否属于研发支出资本化 资产/存货/固定资产/无形资产 尹峰 请教陈版，a公司从事专用设备的制造，研发中心有时会研制专用设备某些测试平台，这类平台不对外销售，未来持续用于研发活动。a公司账面通过在建工程核算其全周期的支出（主要是领料和人工），最终项目结项资产达到可使用状态后转入固定资产。个人判断这种研制平台行为应该是固定资产购建行为，与研发无关。但结合《企业会计准则解释第15号》，请问这种属于研发支出资本化吗？但研发支出资本化形成无形资产都是资本化阶段的支出才形成资产，这种如果属于研发支出资本化，不就是全周期的投入都资本化为固定资产了吗 基本赞同主帖中的理解，此类研发平台属于固定资产购建行为，不属于研发活动，因此可以根据固定资产准则的规定，将购建过程中发生的必要、合理支出计入其原值。后续通过折旧方式将其成本分摊到各受益的研发项目中，计入各项目的研发支出，再根据相关折旧发生时对应的研发项目是否已经进入资本化阶段，与同时发生的该项目其他研发支出一并考虑其费用化/资本化问题。\n\n该事项不适用解释15号第一条规定。"}, {"tid": "5495984", "title": "负商誉中关于递延所得税的确认", "category": "合并/股权/权益法", "questionAuthor": "zhaixd", "questionTime": "2026-02-07 19:44:49", "replyTime": "2026-02-22 17:01:31", "replySortTime": "2026-02-22 17:01:31", "url": "https://bbs.esnai.com/thread-5495984-1-6.html", "question": "陈版主，您好！向您请教一个问题：\n\n境内上市公司A，100%持有新加坡公司（SPV），SPV通过股权100%收购取得境外交易对手B持有的3家子公司（分别在美国、越南及深圳），由于SPV公司支付的对价小于收购日三家被购买方的可辨认净资产公允价值（经复核后没有问题），因此SPV合并层面整体确认了负商誉（营业外收入），其中美国、越南公司长期资产均是减值，深圳增值，请问陈老师：\n\n合并日在编制国内上市公司合并财务报表时，针对深圳公司增值，假设未来能够产生足够的应纳税所得额，是否应针对此部分增值资产确认递延所得税负债（贷方）和营业外收入（借方），并针对后续的折旧费用确认递延所得税费用，个人感觉有些奇怪，营业外收入系针对整个被购买方的净资产公允价值结果来看的，但是递延又是单独考虑，还请陈老师帮忙指点，需要注意哪些问题，非常感谢！", "reply": "与被收购方资产评估增值相关的递延所得税负债应以单个被收购方为单位，分别依据其适用的税率来确认，因此对于被收购的深圳公司的资产评估增值，需确认对应的递延所得税负债，相应减少负商誉或增加正商誉。\n\n首先应将SPV收购三家公司的总价按各自股权的相对公允价值比例分配给各被收购公司，再分别针对被收购公司确认商誉或负商誉，针对不同标的公司的商誉和负商誉不能互相抵减。\n\n关于确认负商誉应注意的事项，请参阅《中审众环研究2020》之“问题3-2-58（非同一控制下合并中负商誉确认应注意的问题）”。", "searchText": "5495984 负商誉中关于递延所得税的确认 合并/股权/权益法 zhaixd 陈版主，您好！向您请教一个问题：\n\n境内上市公司a，100%持有新加坡公司（spv），spv通过股权100%收购取得境外交易对手b持有的3家子公司（分别在美国、越南及深圳），由于spv公司支付的对价小于收购日三家被购买方的可辨认净资产公允价值（经复核后没有问题），因此spv合并层面整体确认了负商誉（营业外收入），其中美国、越南公司长期资产均是减值，深圳增值，请问陈老师：\n\n合并日在编制国内上市公司合并财务报表时，针对深圳公司增值，假设未来能够产生足够的应纳税所得额，是否应针对此部分增值资产确认递延所得税负债（贷方）和营业外收入（借方），并针对后续的折旧费用确认递延所得税费用，个人感觉有些奇怪，营业外收入系针对整个被购买方的净资产公允价值结果来看的，但是递延又是单独考虑，还请陈老师帮忙指点，需要注意哪些问题，非常感谢！ 与被收购方资产评估增值相关的递延所得税负债应以单个被收购方为单位，分别依据其适用的税率来确认，因此对于被收购的深圳公司的资产评估增值，需确认对应的递延所得税负债，相应减少负商誉或增加正商誉。\n\n首先应将spv收购三家公司的总价按各自股权的相对公允价值比例分配给各被收购公司，再分别针对被收购公司确认商誉或负商誉，针对不同标的公司的商誉和负商誉不能互相抵减。\n\n关于确认负商誉应注意的事项，请参阅《中审众环研究2020》之“问题3-2-58（非同一控制下合并中负商誉确认应注意的问题）”。"}, {"tid": "5495983", "title": "关于收入确认", "category": "收入确认/总额净额", "questionAuthor": "yanglei198704", "questionTime": "2026-02-07 16:12:20", "replyTime": "2026-02-22 16:53:22", "replySortTime": "2026-02-22 16:53:22", "url": "https://bbs.esnai.com/thread-5495983-1-7.html", "question": "事情背景：2024年5月，公司与客户签订设备销售合同，2024年12月，公司完成设备交付，并确认相应的收入。2024年11月，公司与客户签订另外一份合同，合同约定交付相应的设备同时需要承担安装义务，安装义务的范围包括该合同的相关设备，也包括前述合同的设备安装。公司收入确认原则为：承担安装义务的设备交付，在取得客户安装调试验收后确认收入，不承担安装义务的，签收后确认收入。\n\n问题：由于2024年11月，对原先合同的安装义务进行了重新约定，是否需要改变原合同的收入确认方式。从合同签订日期角度来看，2024年11月，公司已经知晓原先合同需要承担安装义务，应该可以按照安装调试后确认收入，但这是时间上的巧合，若第二份合同，签订在2025年11月，是否需要对2024年确认的收入进行更正呢？", "reply": "对于此前已签订的原合同，应关注其所涉及商品（设备）的安装是否构成单项履约义务。从主帖信息看，很可能安装服务与设备交付之间不存在紧密关联，两者各自构成独立履约义务的可能性更大。此时，如果原合同未约定由公司负责安装，而现在改由公司负责安装，但合同总价不变，就应当在识别履约义务的基础上，将合同总价按各自单独售价的比例重新分配到各单项履约义务，并各自在控制权转移时点确认收入。\n\n理论上说，如果设备交付和安装服务是两项履约义务，则与前者相关的收入在设备交付给客户时确认，与后者相关的收入在安装调试完成后确认。实务中如果设备交付时客户只有签收而无正式验收，则一般也是会递延到安装调试完成时一并确认收入。\n\n上述合同变更（不论是否发生于原合同的所有履约义务均已履行完毕之后）属于新收入准则第八条合同变更的第（二）种情形。由于新增的履约义务无对应的对价，故不调整此前已确认的收入，但对于新增的原合同下设备的安装义务纳入新合同下的对价分配。在完成原合同下设备安装时确认相应收入，相应减少了新合同下新增设备的销售和安装服务的收入。", "searchText": "5495983 关于收入确认 收入确认/总额净额 yanglei198704 事情背景：2024年5月，公司与客户签订设备销售合同，2024年12月，公司完成设备交付，并确认相应的收入。2024年11月，公司与客户签订另外一份合同，合同约定交付相应的设备同时需要承担安装义务，安装义务的范围包括该合同的相关设备，也包括前述合同的设备安装。公司收入确认原则为：承担安装义务的设备交付，在取得客户安装调试验收后确认收入，不承担安装义务的，签收后确认收入。\n\n问题：由于2024年11月，对原先合同的安装义务进行了重新约定，是否需要改变原合同的收入确认方式。从合同签订日期角度来看，2024年11月，公司已经知晓原先合同需要承担安装义务，应该可以按照安装调试后确认收入，但这是时间上的巧合，若第二份合同，签订在2025年11月，是否需要对2024年确认的收入进行更正呢？ 对于此前已签订的原合同，应关注其所涉及商品（设备）的安装是否构成单项履约义务。从主帖信息看，很可能安装服务与设备交付之间不存在紧密关联，两者各自构成独立履约义务的可能性更大。此时，如果原合同未约定由公司负责安装，而现在改由公司负责安装，但合同总价不变，就应当在识别履约义务的基础上，将合同总价按各自单独售价的比例重新分配到各单项履约义务，并各自在控制权转移时点确认收入。\n\n理论上说，如果设备交付和安装服务是两项履约义务，则与前者相关的收入在设备交付给客户时确认，与后者相关的收入在安装调试完成后确认。实务中如果设备交付时客户只有签收而无正式验收，则一般也是会递延到安装调试完成时一并确认收入。\n\n上述合同变更（不论是否发生于原合同的所有履约义务均已履行完毕之后）属于新收入准则第八条合同变更的第（二）种情形。由于新增的履约义务无对应的对价，故不调整此前已确认的收入，但对于新增的原合同下设备的安装义务纳入新合同下的对价分配。在完成原合同下设备安装时确认相应收入，相应减少了新合同下新增设备的销售和安装服务的收入。"}, {"tid": "5495981", "title": "关于权益法下，是按被投资方的单体报表还是合并报表确认净利润", "category": "合并/股权/权益法", "questionAuthor": "kuailemt808", "questionTime": "2026-02-07 11:53:03", "replyTime": "2026-02-22 16:27:06", "replySortTime": "2026-02-22 16:27:06", "url": "https://bbs.esnai.com/thread-5495981-1-7.html", "question": "陈老师好，A公司持有B公司20%的股权并派驻一董事，对B公司具有重大影响，因此该项长期股权投资采用权益法核算。B公司下属有几家控股子公司，因此B公司需编制合并报表。\n\n      问题：A公司在各会计期间是按B公司的合并报表还是B公司作为母公司的单体报表确认净利润及相关权益的变动？相关文件对该核算的处理是否有明确的要求？\n\n       请陈老师指导。谢谢", "reply": "通常情况下，权益法核算所依据的口径是被投资方合并报表层面的归属母公司普通股股东的净资产和净利润。在依据投资日被投资方可辨认净资产公允价值对折旧、摊销、成本结转等项目进行调整后，以调整后的该口径净利润乘以投资方持股比例确认投资收益。如涉及未实现顺流或逆流交易损益抵销的，还应按比例抵销未实现的顺流或逆流交易损益。", "searchText": "5495981 关于权益法下，是按被投资方的单体报表还是合并报表确认净利润 合并/股权/权益法 kuailemt808 陈老师好，a公司持有b公司20%的股权并派驻一董事，对b公司具有重大影响，因此该项长期股权投资采用权益法核算。b公司下属有几家控股子公司，因此b公司需编制合并报表。\n\n      问题：a公司在各会计期间是按b公司的合并报表还是b公司作为母公司的单体报表确认净利润及相关权益的变动？相关文件对该核算的处理是否有明确的要求？\n\n       请陈老师指导。谢谢 通常情况下，权益法核算所依据的口径是被投资方合并报表层面的归属母公司普通股股东的净资产和净利润。在依据投资日被投资方可辨认净资产公允价值对折旧、摊销、成本结转等项目进行调整后，以调整后的该口径净利润乘以投资方持股比例确认投资收益。如涉及未实现顺流或逆流交易损益抵销的，还应按比例抵销未实现的顺流或逆流交易损益。"}, {"tid": "5495978", "title": "急求陈版主_期权的公允价值", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "雲", "questionTime": "2026-02-06 21:07:49", "replyTime": "2026-02-22 16:01:36", "replySortTime": "2026-02-22 16:01:36", "url": "https://bbs.esnai.com/thread-5495978-1-6.html", "question": "某公司授予员工期权，当前公允价值为20元实际行权价格根据净利润的高低会调整，最高10元，最低1元，比如净利润到了4个亿，按照1元每股认购，比如净利润到了2亿，按照10元认购。\n\n想问下授予日公允价值如何确认。", "reply": "这种条款在实务中较为少见，个人理解可视为两项业务分别进行会计处理：\n\n1、一项行权价为10元的期权，可行权条件为净利润大于2亿元；\n\n2、一项金额为【（10-1）元*所授予股份数量】的现金奖励，可行权条件为净利润大于4亿元，等待期与1中的期权相同。\n\n上述1按权益结算的股份支付处理，2按照长期职工薪酬处理。2相关的职工薪酬费用也是在等待期内摊销计入各期职工薪酬费用，但应以预期可满足业绩条件（净利润大于4亿元）为前提。等待期内每个资产负债表日，俊英谨慎估计剩余等待期的业绩，根据修正后的盈利预测分别判断上述两项股份支付和职工薪酬对应的业绩条件能否满足。若相关会计估计发生变化的，则作为会计估计变更处理。", "searchText": "5495978 急求陈版主_期权的公允价值 金融工具/外币/债务重组/abs 雲 某公司授予员工期权，当前公允价值为20元实际行权价格根据净利润的高低会调整，最高10元，最低1元，比如净利润到了4个亿，按照1元每股认购，比如净利润到了2亿，按照10元认购。\n\n想问下授予日公允价值如何确认。 这种条款在实务中较为少见，个人理解可视为两项业务分别进行会计处理：\n\n1、一项行权价为10元的期权，可行权条件为净利润大于2亿元；\n\n2、一项金额为【（10-1）元*所授予股份数量】的现金奖励，可行权条件为净利润大于4亿元，等待期与1中的期权相同。\n\n上述1按权益结算的股份支付处理，2按照长期职工薪酬处理。2相关的职工薪酬费用也是在等待期内摊销计入各期职工薪酬费用，但应以预期可满足业绩条件（净利润大于4亿元）为前提。等待期内每个资产负债表日，俊英谨慎估计剩余等待期的业绩，根据修正后的盈利预测分别判断上述两项股份支付和职工薪酬对应的业绩条件能否满足。若相关会计估计发生变化的，则作为会计估计变更处理。"}, {"tid": "5495961", "title": "同一控制下无偿划转资本公积可以出现负数吗", "category": "合并/股权/权益法", "questionAuthor": "meix823", "questionTime": "2026-02-05 16:48:23", "replyTime": "2026-02-22 15:53:26", "replySortTime": "2026-02-22 15:53:26", "url": "https://bbs.esnai.com/thread-5495961-1-7.html", "question": "甲公司和乙公司同属于A集团，A集团通过无偿划转将乙公司股权划转到甲公司，形成长投和资本公积各增加100万，同时甲公司划转部分固定资产到A集团10万，甲公司单体冲减了资本公积10万，这种情况下甲公司合并层面资本公积可以出现负数吗？还是冲减留存收益，保持资本公积为0？", "reply": "准则规定是对于资本公积（资本溢价或股本溢价）如不够冲减，则不够冲减的缺口金额继续按顺序冲减盈余公积和未分配利润。\n\n但个人认为，合并报表主体不是法律主体而是经济主体，其中的权益明细分类并不具备像个别报表中那样特殊的法律意义，因此合并报表层面的资本公积应当是允许出现负数的。资本公积和留存收益分别是两种不同来源的股东权益。两者之间的界限应当明确，前者不足冲减时继续冲减后者，模糊了这两大类权益的界限，似乎并不恰当。", "searchText": "5495961 同一控制下无偿划转资本公积可以出现负数吗 合并/股权/权益法 meix823 甲公司和乙公司同属于a集团，a集团通过无偿划转将乙公司股权划转到甲公司，形成长投和资本公积各增加100万，同时甲公司划转部分固定资产到a集团10万，甲公司单体冲减了资本公积10万，这种情况下甲公司合并层面资本公积可以出现负数吗？还是冲减留存收益，保持资本公积为0？ 准则规定是对于资本公积（资本溢价或股本溢价）如不够冲减，则不够冲减的缺口金额继续按顺序冲减盈余公积和未分配利润。\n\n但个人认为，合并报表主体不是法律主体而是经济主体，其中的权益明细分类并不具备像个别报表中那样特殊的法律意义，因此合并报表层面的资本公积应当是允许出现负数的。资本公积和留存收益分别是两种不同来源的股东权益。两者之间的界限应当明确，前者不足冲减时继续冲减后者，模糊了这两大类权益的界限，似乎并不恰当。"}, {"tid": "5495935", "title": "权益法下不构成业务的处理", "category": "合并/股权/权益法", "questionAuthor": "no236bat", "questionTime": "2026-02-03 17:16:51", "replyTime": "2026-02-22 12:42:27", "replySortTime": "2026-02-22 12:42:27", "url": "https://bbs.esnai.com/thread-5495935-1-7.html", "question": "有以下一个问题想求助陈版：A公司收购B公司股权、B公司不构成业务，如果收购比例为80%达到控制、溢价部分不能作为商誉、应作为资产增值、后续摊销。但实际收购比例只有30%，未达到控制，按权益法核算，此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销吗？有无对应的准则依据？谢谢陈版~@chenyiwei", "reply": "如果被投资方不构成业务，则此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销，\n\n权益法长投核算中的购买对价分摊与合并报表层面对被购买方的购买对价分摊的原则类似。\n\nIAS 28.26: Many of the procedures that are appropriate for the application of the equity method are similar to the consolidation procedures described in IFRS 10. Furthermore, the concepts underlying the procedures used in accounting for the acquisition of a subsidiary are also adopted in accounting for the acquisition of an investment in an associate or a joint venture.", "searchText": "5495935 权益法下不构成业务的处理 合并/股权/权益法 no236bat 有以下一个问题想求助陈版：a公司收购b公司股权、b公司不构成业务，如果收购比例为80%达到控制、溢价部分不能作为商誉、应作为资产增值、后续摊销。但实际收购比例只有30%，未达到控制，按权益法核算，此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销吗？有无对应的准则依据？谢谢陈版~@chenyiwei 如果被投资方不构成业务，则此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销，\n\n权益法长投核算中的购买对价分摊与合并报表层面对被购买方的购买对价分摊的原则类似。\n\nias 28.26: many of the procedures that are appropriate for the application of the equity method are similar to the consolidation procedures described in ifrs 10. furthermore, the concepts underlying the procedures used in accounting for the acquisition of a subsidiary are also adopted in accounting for the acquisition of an investment in an associate or a joint venture."}, {"tid": "5495934", "title": "请教陈版主，政府部门给平台公司无偿划拨子公司，应该按同控还是其他方式处理呢", "category": "合并/股权/权益法", "questionAuthor": "15855161732", "questionTime": "2026-02-03 11:50:42", "replyTime": "2026-02-22 12:37:09", "replySortTime": "2026-02-22 12:37:09", "url": "https://bbs.esnai.com/thread-5495934-1-6.html", "question": "请教陈版主，政府部门给国企平台公司无偿划拨全资子公司，应该按同控还是其他方式处理呢？\n\n方式一：按同控。\n\n个表：按划拨日子公司账面净资产/清产核资结果/审计报告净资产作为入账价值，并确认资本公积。\n\n合表：追溯调整子公司权益，视同期初已纳入合并范围。\n\n方式二：行政性调整，非市场交易。\n\n个表同上。\n\n合表：视同划拨日起纳入合并范围，不追溯调整。", "reply": "如果被划转的标的公司和划入方同属于一个政府管理，则一般按同一控制下合并处理（方式一）；如果两者并不隶属于同一个政府（如将市属企业股权划拨给省属企业），则按三去一降一补的划转规定处理（方式二）。", "searchText": "5495934 请教陈版主，政府部门给平台公司无偿划拨子公司，应该按同控还是其他方式处理呢 合并/股权/权益法 15855161732 请教陈版主，政府部门给国企平台公司无偿划拨全资子公司，应该按同控还是其他方式处理呢？\n\n方式一：按同控。\n\n个表：按划拨日子公司账面净资产/清产核资结果/审计报告净资产作为入账价值，并确认资本公积。\n\n合表：追溯调整子公司权益，视同期初已纳入合并范围。\n\n方式二：行政性调整，非市场交易。\n\n个表同上。\n\n合表：视同划拨日起纳入合并范围，不追溯调整。 如果被划转的标的公司和划入方同属于一个政府管理，则一般按同一控制下合并处理（方式一）；如果两者并不隶属于同一个政府（如将市属企业股权划拨给省属企业），则按三去一降一补的划转规定处理（方式二）。"}, {"tid": "5495926", "title": "集团内无偿划转股权账务处理", "category": "合并/股权/权益法", "questionAuthor": "七夜の念", "questionTime": "2026-02-02 15:56:27", "replyTime": "2026-02-22 12:35:22", "replySortTime": "2026-02-22 12:35:22", "url": "https://bbs.esnai.com/thread-5495926-1-7.html", "question": "假设 A集团拥有B、C、D三个子公司，持股比例均为100%。由于业务规划，2025年11月份，A将B、C两个子公司无偿划转至D公司（专门新成立的子公司，用于接收B、C公司业务），A对B、C、D的长期股权投资账面价值分别为1亿、1.5亿、3000万。2025年10月31日B、C公司净资产分别为3亿元、0.55亿元；2024年12月31日B、C净资产分别为2.5亿元、0.5亿元。请教陈版以下问题及账务处理：\n\n1、股权划转基准日是否为10月31日比较合理，D公司以10月31日B、C公司账面净资产作为长投入账？\n\n2、单体账务处理：\n\n（1）A公司：\n\n    借：长期股权投资-D 2.5\n\n         贷：长期股权投资-B  1\n\n         贷：长期股权投资-C  1.5\n\n（2）B、C不作账务处理，只将股东名称变更并做变更工商登记即可。\n\n（3）D公司：\n\n  借：长期股权投资-B  3\n\n  借：长期股权投资-C  0.55\n\n         贷：资本公积-资本溢价  3.55\n\n3、合并账务处理\n\n（1）D公司：\n\n资产负债表期初追溯到2024年12月31日，即假设2024年12月31日D已合并B、C\n\n①第一种账务处理：(假设D按照2024年12月31日时点B和C的净资产作为长期股权投资入账成本)\n\n借：长期股权投资 -B 2.5\n\n借：长期股权投资 -C 0.5\n\n    贷：资本公积-资本溢价  3\n\n借：B公司权益 2.5\n\n借：C公司权益  0.5\n\n    贷：长期股权投资  3\n\n②第二种账务处理：(假设D按照A对B和C的长投账面价值长期股权投资入账成本)\n\n借：长期股权投资 -B 2.5\n\n借：长期股权投资 -C 0.5\n\n    贷：资本公积-资本溢价  3，然后按照2024年A合并B、C的处理进行调整\n\n请教陈版如下问题：\n\n（1）D公司合并日为2025年10月31日，我的理解是否正确？\n\n（2）对于各公司单体账务处理是否正确；若B公司当时是A收购形成，存在商誉，算B公司净资产份额是否考虑商誉减值，是商誉减值后净资产份额吗？\n\n（3）对于D公司合并，哪种处理是正确的，D公司调整的资本公积在合并报表也存在吗，需要还原到未分配利润吗？post_newreply", "reply": "1、无论基准日如何确定，涉及各方均在完成划转操作时进行账务处理。\n\n2、D公司的合并日可以确定为2025年10月31日。D公司按同一控制下合并进行账务处理，因此应以A合并报表层面B、C的净资产（含商誉）于合并日的账面价值（以原非同一控制下合并的购买日公允价值为基础持续计算到合并日的金额）为基础。\n\n3、如果B历史上是通过非同一控制下合并被纳入A的控制范围的，则此处作为D 同一控制下合并账务处理基础的净资产账面价值是A合并报表层面的净资产账面价值，包含A合并报表中关于B公司的商誉在内。", "searchText": "5495926 集团内无偿划转股权账务处理 合并/股权/权益法 七夜の念 假设 a集团拥有b、c、d三个子公司，持股比例均为100%。由于业务规划，2025年11月份，a将b、c两个子公司无偿划转至d公司（专门新成立的子公司，用于接收b、c公司业务），a对b、c、d的长期股权投资账面价值分别为1亿、1.5亿、3000万。2025年10月31日b、c公司净资产分别为3亿元、0.55亿元；2024年12月31日b、c净资产分别为2.5亿元、0.5亿元。请教陈版以下问题及账务处理：\n\n1、股权划转基准日是否为10月31日比较合理，d公司以10月31日b、c公司账面净资产作为长投入账？\n\n2、单体账务处理：\n\n（1）a公司：\n\n    借：长期股权投资-d 2.5\n\n         贷：长期股权投资-b  1\n\n         贷：长期股权投资-c  1.5\n\n（2）b、c不作账务处理，只将股东名称变更并做变更工商登记即可。\n\n（3）d公司：\n\n  借：长期股权投资-b  3\n\n  借：长期股权投资-c  0.55\n\n         贷：资本公积-资本溢价  3.55\n\n3、合并账务处理\n\n（1）d公司：\n\n资产负债表期初追溯到2024年12月31日，即假设2024年12月31日d已合并b、c\n\n①第一种账务处理：(假设d按照2024年12月31日时点b和c的净资产作为长期股权投资入账成本)\n\n借：长期股权投资 -b 2.5\n\n借：长期股权投资 -c 0.5\n\n    贷：资本公积-资本溢价  3\n\n借：b公司权益 2.5\n\n借：c公司权益  0.5\n\n    贷：长期股权投资  3\n\n②第二种账务处理：(假设d按照a对b和c的长投账面价值长期股权投资入账成本)\n\n借：长期股权投资 -b 2.5\n\n借：长期股权投资 -c 0.5\n\n    贷：资本公积-资本溢价  3，然后按照2024年a合并b、c的处理进行调整\n\n请教陈版如下问题：\n\n（1）d公司合并日为2025年10月31日，我的理解是否正确？\n\n（2）对于各公司单体账务处理是否正确；若b公司当时是a收购形成，存在商誉，算b公司净资产份额是否考虑商誉减值，是商誉减值后净资产份额吗？\n\n（3）对于d公司合并，哪种处理是正确的，d公司调整的资本公积在合并报表也存在吗，需要还原到未分配利润吗？post_newreply 1、无论基准日如何确定，涉及各方均在完成划转操作时进行账务处理。\n\n2、d公司的合并日可以确定为2025年10月31日。d公司按同一控制下合并进行账务处理，因此应以a合并报表层面b、c的净资产（含商誉）于合并日的账面价值（以原非同一控制下合并的购买日公允价值为基础持续计算到合并日的金额）为基础。\n\n3、如果b历史上是通过非同一控制下合并被纳入a的控制范围的，则此处作为d 同一控制下合并账务处理基础的净资产账面价值是a合并报表层面的净资产账面价值，包含a合并报表中关于b公司的商誉在内。"}, {"tid": "5495915", "title": "请教陈老师有关于合并报表外币折算差异", "category": "合并/股权/权益法", "questionAuthor": "wx_5dba3aa5b69b", "questionTime": "2026-02-01 18:56:37", "replyTime": "2026-02-22 12:20:36", "replySortTime": "2026-02-22 12:20:36", "url": "https://bbs.esnai.com/thread-5495915-1-7.html", "question": "外币折算的报表中未分配利润注销，但是累计的合并未分配利润在合并报表折算不是0，那这部分的未分配利润爱合并报表怎么结转，请教陈老师有无遇到这样子的案例", "reply": "具体是什么情况？请给出具体的例子。", "searchText": "5495915 请教陈老师有关于合并报表外币折算差异 合并/股权/权益法 wx_5dba3aa5b69b 外币折算的报表中未分配利润注销，但是累计的合并未分配利润在合并报表折算不是0，那这部分的未分配利润爱合并报表怎么结转，请教陈老师有无遇到这样子的案例 具体是什么情况？请给出具体的例子。"}, {"tid": "5495914", "title": "临床费用计入现金流量表的哪个科目？", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "sparkool", "questionTime": "2026-02-01 10:54:49", "replyTime": "2026-02-22 12:19:43", "replySortTime": "2026-02-22 12:19:43", "url": "https://bbs.esnai.com/thread-5495914-1-6.html", "question": "请教大神：\n\n公司研发项目过程中的CRO、临床试验、动物试验费用，是计入支付的其他与经营活动有关的现金，还是采购商品接受劳务支付的现金流呢？\n\n谢谢。", "reply": "这些项目都是计入营业成本的，因此对应的现金流量应列入“购买商品、接受劳务支付的现金”。", "searchText": "5495914 临床费用计入现金流量表的哪个科目？ 政府补助/ppp/税费/现金流 sparkool 请教大神：\n\n公司研发项目过程中的cro、临床试验、动物试验费用，是计入支付的其他与经营活动有关的现金，还是采购商品接受劳务支付的现金流呢？\n\n谢谢。 这些项目都是计入营业成本的，因此对应的现金流量应列入“购买商品、接受劳务支付的现金”。"}, {"tid": "5495906", "title": "求助陈版主，股权划转的疑问。", "category": "合并/股权/权益法", "questionAuthor": "liuweisheng", "questionTime": "2026-01-31 10:40:33", "replyTime": "2026-02-22 12:18:55", "replySortTime": "2026-02-22 12:18:55", "url": "https://bbs.esnai.com/thread-5495906-1-7.html", "question": "本帖最后由 liuweisheng 于 2026-1-31 10:44 编辑\n\n国有单位   A是母公司  B是子公司  C是孙公司；A持有B100%股权，A持有C80%股权（成本法），B持有C20%（权益法）；2025年8月，B将持有C公司20%股权无偿划转给A。 转让时B公司持有长投余额130万元（本金100万，损益调整30万），B公司  借：资本公积   130万元，贷：长投130万元；A公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；谢谢版主解惑。", "reply": "B将所持有C的20%股权划转给A，对A而言属于投资收回，故应冲减对B的长投成本，而不能贷记A本身的资本公积。\n\n该交易并不是A与更上层母公司之间的权益性交易，所以不能调整A自身的资本公积。\n\n权益性交易中，只有被投资方才是调整权益，投资方应调整对被投资方的长投成本。", "searchText": "5495906 求助陈版主，股权划转的疑问。 合并/股权/权益法 liuweisheng 本帖最后由 liuweisheng 于 2026-1-31 10:44 编辑\n\n国有单位   a是母公司  b是子公司  c是孙公司；a持有b100%股权，a持有c80%股权（成本法），b持有c20%（权益法）；2025年8月，b将持有c公司20%股权无偿划转给a。 转让时b公司持有长投余额130万元（本金100万，损益调整30万），b公司  借：资本公积   130万元，贷：长投130万元；a公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；谢谢版主解惑。 b将所持有c的20%股权划转给a，对a而言属于投资收回，故应冲减对b的长投成本，而不能贷记a本身的资本公积。\n\n该交易并不是a与更上层母公司之间的权益性交易，所以不能调整a自身的资本公积。\n\n权益性交易中，只有被投资方才是调整权益，投资方应调整对被投资方的长投成本。"}, {"tid": "5495898", "title": "求教：预收货款的外币折算问题", "category": "收入确认/总额净额", "questionAuthor": "scmhhh", "questionTime": "2026-01-30 17:44:45", "replyTime": "2026-02-22 12:16:04", "replySortTime": "2026-02-22 12:16:04", "url": "https://bbs.esnai.com/thread-5495898-1-6.html", "question": "根据《企业会计准则第19号——外币折算》，非货币性项目期末不进行汇率折算，而是以历史成本计量。\n\n问题1：预收货款应该属于非货币性项目，期末也不进行汇率折算？\n\n问题2：预收款实际发货时，确认收入和应收账款的入账汇率应该选择收款历史时点的汇率还是发货当天汇率？\n\n问题3：如果问题2的汇率选择是发货当天汇率，那么发货与收款两个时点的汇率差异是进汇兑损益吗？还是直接作为可变对价进收入？\n\n问题4：如果问题3的答案是进入汇兑损益，那么《外币折算》准则规定的非货币性项目不进行汇率折算的意义何在？\n\n如果期末汇率折算，汇兑损益影响=收款时点和期末时点汇率折算差异+期末时点和发货时点汇率折算差异；如果期末不进行汇率折算，汇兑损益影响=收款时点和发货时点汇率折算差异。两种算法对汇兑损益的影响理论上相同，准则这条规定预收货款期末不折汇对损益也就没有了影响。", "reply": "参考：https://kjs.mof.gov.cn/zt/kjzzss ... 210302_3664191.htm.\n\n由于外币预收、预付款项属于非货币性项目，故后续预付款项收到所订购的商品时，入账价值为原付款日的历史汇率折算的金额；预收账款或合同负债结转收入时，应按照原收款日的历史汇率进行结转，而不能采用收货日或者收入确认日的汇率进行调整。", "searchText": "5495898 求教：预收货款的外币折算问题 收入确认/总额净额 scmhhh 根据《企业会计准则第19号——外币折算》，非货币性项目期末不进行汇率折算，而是以历史成本计量。\n\n问题1：预收货款应该属于非货币性项目，期末也不进行汇率折算？\n\n问题2：预收款实际发货时，确认收入和应收账款的入账汇率应该选择收款历史时点的汇率还是发货当天汇率？\n\n问题3：如果问题2的汇率选择是发货当天汇率，那么发货与收款两个时点的汇率差异是进汇兑损益吗？还是直接作为可变对价进收入？\n\n问题4：如果问题3的答案是进入汇兑损益，那么《外币折算》准则规定的非货币性项目不进行汇率折算的意义何在？\n\n如果期末汇率折算，汇兑损益影响=收款时点和期末时点汇率折算差异+期末时点和发货时点汇率折算差异；如果期末不进行汇率折算，汇兑损益影响=收款时点和发货时点汇率折算差异。两种算法对汇兑损益的影响理论上相同，准则这条规定预收货款期末不折汇对损益也就没有了影响。 参考：https://kjs.mof.gov.cn/zt/kjzzss ... 210302_3664191.htm.\n\n由于外币预收、预付款项属于非货币性项目，故后续预付款项收到所订购的商品时，入账价值为原付款日的历史汇率折算的金额；预收账款或合同负债结转收入时，应按照原收款日的历史汇率进行结转，而不能采用收货日或者收入确认日的汇率进行调整。"}, {"tid": "5495897", "title": "请教陈版主关于政府补助相关的会计处理", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "jiaolifu", "questionTime": "2026-01-30 14:43:06", "replyTime": "2026-02-22 12:12:30", "replySortTime": "2026-02-22 12:12:30", "url": "https://bbs.esnai.com/thread-5495897-1-7.html", "question": "被审计单位为国企，资产有部分市政道路和基础设施，政府每年会拨付道路养护费用和运营补贴费用，资金拨付文件中也说资金需要进行专款专用。\n\n所以我想问下该笔政府给付的钱是属于政府补助还是属于专项应付款？\n\n从我的理解来看，我觉得两个好像都能说的过去。\n\n从政府补助定义来看，该笔款项来源于政府且是无偿取得。\n\n专项应付款则是因为该笔款项确实有专门用途，在使用的过程中同步将专项应付款转入资本公积。\n\n麻烦陈版主帮我答疑解惑！", "reply": "1、企业会计准则建立在市场经济基础上。A公司既然执行企业会计准则，那么会计上是否可以将这些不收费资产确认为公司的资产，并不是看是否具有法律上的产权，而是要看其是否符合《企业会计准则——基本准则》对“资产”这一会计要素的定义，以及相关会计准则对资产确认条件的规定。\n\n《企业会计准则——基本准则》规定，资产是指企业过去的交易或者事项形成的、由企业拥有或者控制的、预期会给企业带来经济利益的资源。预期会给企业带来经济利益，是指直接或者间接导致现金和现金等价物流入企业的潜力。因此，如果这些资产不能给企业带来经济利益流入，则不符合资产的定义。\n\n如果对这类不收费资产，政府不承担其全额的投资成本及后续的管护、改扩建、重建等支出，由于A公司为建造这些设施投入的资源并不能给企业带来经济利益，属于不能为A公司带来未来经济利益的公益性基础设施，不应确认为A公司的资产。\n\n2、在不将此类资产确认为被审计单位资产的前提下，如果政府每年定期拨款用于道路养护和运营补贴，且与企业签订了委托养护、运营管理合同的，则此类拨款有可能满足确认为被审计单位营业收入的条件，但前提是证明合同定价的公允性和合理性（成本+合理利润）。此时，被审计单位应根据其自身在养护和运营管理服务中是代理人还是主要责任人，采用适当的方式确认收入。", "searchText": "5495897 请教陈版主关于政府补助相关的会计处理 政府补助/ppp/税费/现金流 jiaolifu 被审计单位为国企，资产有部分市政道路和基础设施，政府每年会拨付道路养护费用和运营补贴费用，资金拨付文件中也说资金需要进行专款专用。\n\n所以我想问下该笔政府给付的钱是属于政府补助还是属于专项应付款？\n\n从我的理解来看，我觉得两个好像都能说的过去。\n\n从政府补助定义来看，该笔款项来源于政府且是无偿取得。\n\n专项应付款则是因为该笔款项确实有专门用途，在使用的过程中同步将专项应付款转入资本公积。\n\n麻烦陈版主帮我答疑解惑！ 1、企业会计准则建立在市场经济基础上。a公司既然执行企业会计准则，那么会计上是否可以将这些不收费资产确认为公司的资产，并不是看是否具有法律上的产权，而是要看其是否符合《企业会计准则——基本准则》对“资产”这一会计要素的定义，以及相关会计准则对资产确认条件的规定。\n\n《企业会计准则——基本准则》规定，资产是指企业过去的交易或者事项形成的、由企业拥有或者控制的、预期会给企业带来经济利益的资源。预期会给企业带来经济利益，是指直接或者间接导致现金和现金等价物流入企业的潜力。因此，如果这些资产不能给企业带来经济利益流入，则不符合资产的定义。\n\n如果对这类不收费资产，政府不承担其全额的投资成本及后续的管护、改扩建、重建等支出，由于a公司为建造这些设施投入的资源并不能给企业带来经济利益，属于不能为a公司带来未来经济利益的公益性基础设施，不应确认为a公司的资产。\n\n2、在不将此类资产确认为被审计单位资产的前提下，如果政府每年定期拨款用于道路养护和运营补贴，且与企业签订了委托养护、运营管理合同的，则此类拨款有可能满足确认为被审计单位营业收入的条件，但前提是证明合同定价的公允性和合理性（成本+合理利润）。此时，被审计单位应根据其自身在养护和运营管理服务中是代理人还是主要责任人，采用适当的方式确认收入。"}, {"tid": "5495896", "title": "多级合并的商誉确认问题", "category": "合并/股权/权益法", "questionAuthor": "pangzi123", "questionTime": "2026-01-30 13:24:54", "replyTime": "2026-02-22 11:58:13", "replySortTime": "2026-02-22 11:58:13", "url": "https://bbs.esnai.com/thread-5495896-1-6.html", "question": "背景：A和B共同新设子公司C，A持有C51%股权；设立后C通过非同一控制控股合并了D公司，C持有D100%股权；C合并报表层面确认了100万商誉；\n\n假如无其他事项，A合并报表层面需要确认多少商誉？", "reply": "商誉按照本合并集团直接持有被购买方股权的比例计算确定，即100万。但日后该商誉如发生减值，则商誉减值损失的49%应计入（冲减）少数股东损益。", "searchText": "5495896 多级合并的商誉确认问题 合并/股权/权益法 pangzi123 背景：a和b共同新设子公司c，a持有c51%股权；设立后c通过非同一控制控股合并了d公司，c持有d100%股权；c合并报表层面确认了100万商誉；\n\n假如无其他事项，a合并报表层面需要确认多少商誉？ 商誉按照本合并集团直接持有被购买方股权的比例计算确定，即100万。但日后该商誉如发生减值，则商誉减值损失的49%应计入（冲减）少数股东损益。"}, {"tid": "5495895", "title": "求助陈版主合并层面含返利情况下内部交易抵消的递延所得税处理", "category": "合并/股权/权益法", "questionAuthor": "qieziaaa666", "questionTime": "2026-01-30 10:55:09", "replyTime": "2026-02-22 11:56:30", "replySortTime": "2026-02-22 11:56:30", "url": "https://bbs.esnai.com/thread-5495895-1-7.html", "question": "本帖最后由 qieziaaa666 于 2026-1-30 11:02 编辑\n\n陈版主您好，我们现在遇到一个问题。我们是贸易公司的背景，由香港子公司向供应商采购10元，供应商会按照4元的返利给香港子公司，香港子公司按6元成本亏1元（即5元）卖给大陆公司，期末未实现对外销售，合并层面的内部交易抵消未实现内部损失1元，大陆公司的税率为25%，香港公司的税率为16.5%，我们在确认递延所得税的问题和审计产生了分歧：\n\n我们认为，合并层面的未实现内部损失1元由两部分构成：香港公司的返利4元和大陆公司未实现内部损失5元，返利是由香港的子公司去向供应商申请，所以在合并层面上应该按照香港公司返利4元的16.5%确认递延所得税资产，大陆公司按未实现内部损失5元的25%确认递延所得税负债，即：\n\n借：递延所得税资产 0.66元\n\n 贷：所得税费用 0.66元\n\n借：所得税费用 1.25元\n\n 贷：递延所得税负债 1.25元\n\n审计认为应该按未实现内部损失1元统一按大陆25%确认递延所得税负债，即：\n\n借：所得税费用 0.25元\n\n 贷：递延所得税负债 0.25元\n\n请问下陈版主认为哪边的处理更合理些，谢谢陈版主~~", "reply": "如果返利4元是香港子公司与第三方供应商之间的交易惯例，是可以合理预期可获得的，则香港子公司的采购成本是6元，与其计税基础一致；卖给大陆公司的价格为5元，即集团内部未实现损失是1元。由于该商品现在在大陆公司，故应按大陆公司的适用税率计算确认递延所得税负债，即审计的观点是合理的。\n\n如果截至资产负债表日，香港公司该商品的原计税基础是10，按5元卖给大陆公司，返利需由香港公司另行向第三方供应商申请，能否获取仍存在不确定性，因而尚不能将返利入账并冲减采购或内部销售成本的，则被审计单位（即你公司）的意见更合理。\n\n即，此问题的关键在于香港子公司对返利的确认情况，以及该返利对商品在香港子公司的原计税基础有何影响。", "searchText": "5495895 求助陈版主合并层面含返利情况下内部交易抵消的递延所得税处理 合并/股权/权益法 qieziaaa666 本帖最后由 qieziaaa666 于 2026-1-30 11:02 编辑\n\n陈版主您好，我们现在遇到一个问题。我们是贸易公司的背景，由香港子公司向供应商采购10元，供应商会按照4元的返利给香港子公司，香港子公司按6元成本亏1元（即5元）卖给大陆公司，期末未实现对外销售，合并层面的内部交易抵消未实现内部损失1元，大陆公司的税率为25%，香港公司的税率为16.5%，我们在确认递延所得税的问题和审计产生了分歧：\n\n我们认为，合并层面的未实现内部损失1元由两部分构成：香港公司的返利4元和大陆公司未实现内部损失5元，返利是由香港的子公司去向供应商申请，所以在合并层面上应该按照香港公司返利4元的16.5%确认递延所得税资产，大陆公司按未实现内部损失5元的25%确认递延所得税负债，即：\n\n借：递延所得税资产 0.66元\n\n 贷：所得税费用 0.66元\n\n借：所得税费用 1.25元\n\n 贷：递延所得税负债 1.25元\n\n审计认为应该按未实现内部损失1元统一按大陆25%确认递延所得税负债，即：\n\n借：所得税费用 0.25元\n\n 贷：递延所得税负债 0.25元\n\n请问下陈版主认为哪边的处理更合理些，谢谢陈版主~~ 如果返利4元是香港子公司与第三方供应商之间的交易惯例，是可以合理预期可获得的，则香港子公司的采购成本是6元，与其计税基础一致；卖给大陆公司的价格为5元，即集团内部未实现损失是1元。由于该商品现在在大陆公司，故应按大陆公司的适用税率计算确认递延所得税负债，即审计的观点是合理的。\n\n如果截至资产负债表日，香港公司该商品的原计税基础是10，按5元卖给大陆公司，返利需由香港公司另行向第三方供应商申请，能否获取仍存在不确定性，因而尚不能将返利入账并冲减采购或内部销售成本的，则被审计单位（即你公司）的意见更合理。\n\n即，此问题的关键在于香港子公司对返利的确认情况，以及该返利对商品在香港子公司的原计税基础有何影响。"}, {"tid": "5495894", "title": "请教陈版关于续租但作为一项新的单独租赁处理的疑惑", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "Cynthiaxxx", "questionTime": "2026-01-30 10:25:45", "replyTime": "2026-02-22 11:46:45", "replySortTime": "2026-02-22 11:46:45", "url": "https://bbs.esnai.com/thread-5495894-1-6.html", "question": "请教陈版，在您的不同帖子下都看到了这样一个观点：\n\n在原租赁期满的情况下签订新的租赁合同，新租赁合同的租赁期开始日是在原租赁合同的租赁期结束后，且两者互相衔接的，一般认为应作为一项新的单独租赁（尤其是在新租约约定的租金水平可代表新租约签订日的市场租金水平的情况下），故先终止确认原租赁下的使用权资产和租赁负债，再在新租赁的租赁期开始日确认新的使用权资产和租赁负债。\n\n有如下疑惑：\n\n1、为什么这种情形下的续租不作为租赁变更处理？因为按照租赁变更的定义，租期、租金的变更都属于租赁变更；\n\n2、如果可以作为租赁变更，是否为不构成单独租赁的租赁变更。因为延长期限+租赁变更不满足构成单独租赁条件中的扩大使用范围这一条。请教陈版可以这样理解吗？", "reply": "原租赁期满日，不论是否签订续租合同，都应当终止确认原租赁下的使用权资产和租赁负债。此时，在原租赁终止后续签新租赁合同，即使在租赁期、租赁范围等方面均与原合同衔接，也不可能调整原租赁的使用权资产和租赁负债的账面价值（因为此前已经终止确认），而只能作为一项全新租赁，在新租赁的租赁期开始日初始确认一项新的使用权资产和租赁负债。", "searchText": "5495894 请教陈版关于续租但作为一项新的单独租赁处理的疑惑 租赁/使用权资产/融资租赁 cynthiaxxx 请教陈版，在您的不同帖子下都看到了这样一个观点：\n\n在原租赁期满的情况下签订新的租赁合同，新租赁合同的租赁期开始日是在原租赁合同的租赁期结束后，且两者互相衔接的，一般认为应作为一项新的单独租赁（尤其是在新租约约定的租金水平可代表新租约签订日的市场租金水平的情况下），故先终止确认原租赁下的使用权资产和租赁负债，再在新租赁的租赁期开始日确认新的使用权资产和租赁负债。\n\n有如下疑惑：\n\n1、为什么这种情形下的续租不作为租赁变更处理？因为按照租赁变更的定义，租期、租金的变更都属于租赁变更；\n\n2、如果可以作为租赁变更，是否为不构成单独租赁的租赁变更。因为延长期限+租赁变更不满足构成单独租赁条件中的扩大使用范围这一条。请教陈版可以这样理解吗？ 原租赁期满日，不论是否签订续租合同，都应当终止确认原租赁下的使用权资产和租赁负债。此时，在原租赁终止后续签新租赁合同，即使在租赁期、租赁范围等方面均与原合同衔接，也不可能调整原租赁的使用权资产和租赁负债的账面价值（因为此前已经终止确认），而只能作为一项全新租赁，在新租赁的租赁期开始日初始确认一项新的使用权资产和租赁负债。"}, {"tid": "5495892", "title": "非同一控制下合并确认的递延所得税负债金额大于负商誉金额，导致营业外收入负数", "category": "合并/股权/权益法", "questionAuthor": "pangzi123", "questionTime": "2026-01-29 21:13:44", "replyTime": "2026-02-22 11:41:41", "replySortTime": "2026-02-22 11:41:41", "url": "https://bbs.esnai.com/thread-5495892-1-7.html", "question": "求助陈版：\n\n背景介绍：非同一控制下合并子公司，100%控股，账面净资产-100万，可辨认净资产公允价值200万，均为固定资产评估增值，增值额300万，购买时支付对价150万，所得税税率25%\n\n1、确认负商誉：150-200=-50万；\n\n合并抵消分录：\n\n借：净资产-100\n\n借：固定资产300\n\n贷：长期股权投资150\n\n贷：营业外收入（负商誉）50\n\n2、确认评估增值部分的递延所得税300*25%=75万\n\n借：营业外收入 75\n\n贷：递延所得税负债 75\n\n这样抵消后，导致营业外收入变成了-25万。\n\n请教陈版，\n\n1、上述计算及抵消是否有误；\n\n2、最终合并抵消后营业外收入变成了-25万，该种情况该如何处理。\n\n感谢", "reply": "与可辨认资产评估增值相关的递延所得税负债是计入被购买方可辨认净资产公允价值的，因此本案例中被购买方于购买日的可辨认净资产公允价值是（-100+300）-300*25%=125万元。\n\n因此合并报表层面应确认商誉：150-125=25万元，而不是确认为营业外支出或者营业外收入的负数。\n\n但这类商誉的后续减值风险较大，后续每年末均应当从严把握减值迹象的识别和可收回金额的测算问题。", "searchText": "5495892 非同一控制下合并确认的递延所得税负债金额大于负商誉金额，导致营业外收入负数 合并/股权/权益法 pangzi123 求助陈版：\n\n背景介绍：非同一控制下合并子公司，100%控股，账面净资产-100万，可辨认净资产公允价值200万，均为固定资产评估增值，增值额300万，购买时支付对价150万，所得税税率25%\n\n1、确认负商誉：150-200=-50万；\n\n合并抵消分录：\n\n借：净资产-100\n\n借：固定资产300\n\n贷：长期股权投资150\n\n贷：营业外收入（负商誉）50\n\n2、确认评估增值部分的递延所得税300*25%=75万\n\n借：营业外收入 75\n\n贷：递延所得税负债 75\n\n这样抵消后，导致营业外收入变成了-25万。\n\n请教陈版，\n\n1、上述计算及抵消是否有误；\n\n2、最终合并抵消后营业外收入变成了-25万，该种情况该如何处理。\n\n感谢 与可辨认资产评估增值相关的递延所得税负债是计入被购买方可辨认净资产公允价值的，因此本案例中被购买方于购买日的可辨认净资产公允价值是（-100+300）-300*25%=125万元。\n\n因此合并报表层面应确认商誉：150-125=25万元，而不是确认为营业外支出或者营业外收入的负数。\n\n但这类商誉的后续减值风险较大，后续每年末均应当从严把握减值迹象的识别和可收回金额的测算问题。"}, {"tid": "5495885", "title": "政府下属企业股权划转同控非同控判断", "category": "合并/股权/权益法", "questionAuthor": "审计小菜鸡", "questionTime": "2026-01-29 19:15:32", "replyTime": "2026-02-22 11:36:49", "replySortTime": "2026-02-22 11:36:49", "url": "https://bbs.esnai.com/thread-5495885-1-6.html", "question": "请教陈版，X市管委会下属A、B两家公司，B为融资平台公司，2025年管委会新成立A公司，以B下属甲公司95%股权对A进行出资，A委托中介机构对甲公司进行了审计评估，评估值较账面净资产减值2亿元，出资金额为评估值；同时A以评估价格8亿元收购了B下属乙公司100%股权，A、B公司之间存在大量关联担保及资金拆借行为，我们认为是同一控制下企业合并，企业认为是非同控合并，请问以上出资和收购交易是否属于同一控制下企业合并？", "reply": "从交易实质来看，该交易是在各方共同的最终控制方（管委会）主导下完成的，属于管委会所管辖范围内国资的战略性重组，而不是由各方自行谈判确定的市场化交易行为。管委会在交易中处于主导地位，所履行的是出资人（股东）职能而不是监管审批的行政管理职能，因此应作为同一控制下合并处理。", "searchText": "5495885 政府下属企业股权划转同控非同控判断 合并/股权/权益法 审计小菜鸡 请教陈版，x市管委会下属a、b两家公司，b为融资平台公司，2025年管委会新成立a公司，以b下属甲公司95%股权对a进行出资，a委托中介机构对甲公司进行了审计评估，评估值较账面净资产减值2亿元，出资金额为评估值；同时a以评估价格8亿元收购了b下属乙公司100%股权，a、b公司之间存在大量关联担保及资金拆借行为，我们认为是同一控制下企业合并，企业认为是非同控合并，请问以上出资和收购交易是否属于同一控制下企业合并？ 从交易实质来看，该交易是在各方共同的最终控制方（管委会）主导下完成的，属于管委会所管辖范围内国资的战略性重组，而不是由各方自行谈判确定的市场化交易行为。管委会在交易中处于主导地位，所履行的是出资人（股东）职能而不是监管审批的行政管理职能，因此应作为同一控制下合并处理。"}, {"tid": "5495884", "title": "请教陈老师销售订单未取消情况下设备意外损坏修复支出处理？", "category": "收入确认/总额净额", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-01-29 18:48:14", "replyTime": "2026-02-22 11:33:34", "replySortTime": "2026-02-22 11:33:34", "url": "https://bbs.esnai.com/thread-5495884-1-7.html", "question": "业务场景：某公司销售商品运输途中发生损坏，将设备运回后进行修复、替换。客户知晓该情形，且并未撤销合同，即合同继续有效，待修复后可继续将该商品交付给客户。于资产负债表日，修复工作尚未完全完成，发生相关支出主要包括来回运输费用、修复替换的投料、人工等三个部分。对于该事件，保险公司尚在定损中，公司与运输商之间的责任问题存在一定争议，资产负债表日尚无法合理确定保险预计赔偿金额。\n\n问题：对于已经发生的运费、投料、人工如何核算？\n\n①能否计入存货或其他资产项目，并结合合同销售价格、预计未来修复支出考虑跌价准备？\n\n②或者说只能计入营业外支出？如果如此，尚未发生的修复等支出是否也需要在资产负债表日估计计入营业外支出，同时，对保险公司的赔付难以合理估计的就不考虑其影响了，按谨慎性处理。", "reply": "对于发生相关支出（主要包括来回运输费用、修复替换的投料、人工等三个部分）应在发生时计入营业成本（或营业外支出）处理。主要考虑是：该事项属于意料之外的损耗，这些修复支出原本预计不会发生，并不是原计划中使得商品达到预定的可销售状态和地点的必要、合理支出。\n\n对于保险赔款和向运输商的索赔款，只有在基本确定可以收到且金额可以可靠计量时才能确认，对应贷记（冲减）上述运费和修复支出所计入的损益项目。（可能与修复支出的入账存在跨期）。", "searchText": "5495884 请教陈老师销售订单未取消情况下设备意外损坏修复支出处理？ 收入确认/总额净额 qingzhouygwcs 业务场景：某公司销售商品运输途中发生损坏，将设备运回后进行修复、替换。客户知晓该情形，且并未撤销合同，即合同继续有效，待修复后可继续将该商品交付给客户。于资产负债表日，修复工作尚未完全完成，发生相关支出主要包括来回运输费用、修复替换的投料、人工等三个部分。对于该事件，保险公司尚在定损中，公司与运输商之间的责任问题存在一定争议，资产负债表日尚无法合理确定保险预计赔偿金额。\n\n问题：对于已经发生的运费、投料、人工如何核算？\n\n①能否计入存货或其他资产项目，并结合合同销售价格、预计未来修复支出考虑跌价准备？\n\n②或者说只能计入营业外支出？如果如此，尚未发生的修复等支出是否也需要在资产负债表日估计计入营业外支出，同时，对保险公司的赔付难以合理估计的就不考虑其影响了，按谨慎性处理。 对于发生相关支出（主要包括来回运输费用、修复替换的投料、人工等三个部分）应在发生时计入营业成本（或营业外支出）处理。主要考虑是：该事项属于意料之外的损耗，这些修复支出原本预计不会发生，并不是原计划中使得商品达到预定的可销售状态和地点的必要、合理支出。\n\n对于保险赔款和向运输商的索赔款，只有在基本确定可以收到且金额可以可靠计量时才能确认，对应贷记（冲减）上述运费和修复支出所计入的损益项目。（可能与修复支出的入账存在跨期）。"}, {"tid": "5495883", "title": "求助陈版主关于外币交易融资成分销售利率的口径问题", "category": "收入确认/总额净额", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-01-29 18:37:13", "replyTime": "2026-02-22 11:29:48", "replySortTime": "2026-02-22 11:29:48", "url": "https://bbs.esnai.com/thread-5495883-1-7.html", "question": "业务背景：甲公司存在含有融资成分的销售，例如长账龄的分期销售。甲公司所在国家的法定货币为A货币，也是甲公司的记账本位币。甲公司可能发生外币销售，例如签订按B货币结算的销售合同。A货币、B货币的贷款利率存在一定差异。问题1：甲公司在确认收入融资利息成分时，是否认可基于其所在国家主权法定货币即A货币的市场贷款利率作为折现率计算现值？还是要按照不同交易币种的贷款利率折现？\n\n原因一是其经营主体所在国家的法定主权货币利率更能代表其经济环境的利率水平。\n\n原因二是甲公司的记账本位币本身也是法定货币A货币，即使有外币销售，确认收入时报表需要按本位币列报，所以按照A货币的利率折现是可以接受的。\n\n问题2：若甲公司的记账本位币为C货币，是否认可基于所在国家主权货币A货币的市场贷款利率进行折现？\n\n烦请陈老师予以解答。", "reply": "1、重大融资成分中的利率应采用交易计价币种（本案例中为货币B）的市场利率，同时这也是考虑了交易对手方的信用风险和融资成本后给出的报价利率。\n\n2、同上1，此问题更多地与交易的计价结算货币和交易对手方的信用风险、所处市场环境有关，与甲公司本身的记账本位币无直接关系。", "searchText": "5495883 求助陈版主关于外币交易融资成分销售利率的口径问题 收入确认/总额净额 qingzhouygwcs 业务背景：甲公司存在含有融资成分的销售，例如长账龄的分期销售。甲公司所在国家的法定货币为a货币，也是甲公司的记账本位币。甲公司可能发生外币销售，例如签订按b货币结算的销售合同。a货币、b货币的贷款利率存在一定差异。问题1：甲公司在确认收入融资利息成分时，是否认可基于其所在国家主权法定货币即a货币的市场贷款利率作为折现率计算现值？还是要按照不同交易币种的贷款利率折现？\n\n原因一是其经营主体所在国家的法定主权货币利率更能代表其经济环境的利率水平。\n\n原因二是甲公司的记账本位币本身也是法定货币a货币，即使有外币销售，确认收入时报表需要按本位币列报，所以按照a货币的利率折现是可以接受的。\n\n问题2：若甲公司的记账本位币为c货币，是否认可基于所在国家主权货币a货币的市场贷款利率进行折现？\n\n烦请陈老师予以解答。 1、重大融资成分中的利率应采用交易计价币种（本案例中为货币b）的市场利率，同时这也是考虑了交易对手方的信用风险和融资成本后给出的报价利率。\n\n2、同上1，此问题更多地与交易的计价结算货币和交易对手方的信用风险、所处市场环境有关，与甲公司本身的记账本位币无直接关系。"}, {"tid": "5495882", "title": "附回售条款的股权投资期末公允价值如何确定", "category": "合并/股权/权益法", "questionAuthor": "xiaomaijinwang", "questionTime": "2026-01-29 16:29:03", "replyTime": "2026-02-22 11:20:15", "replySortTime": "2026-02-22 11:20:15", "url": "https://bbs.esnai.com/thread-5495882-1-6.html", "question": "A公司参与B公司的股权投资，投资金额5000万元，占股权比例为5.06%，公司未委派董事等人员。协议约定：\n\n第十条 关于回购的相关约定\n\n1、各方同意，若标的公司2021年及以后任一年度经审计后的扣非净利润少于1亿元;或自投资款支付之日起满三年，若标的公司未完成首发上市或被上市公司收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购。\n\n2、本条项下的回购价格应当为:(1)投资方向标的公司支付的增资款本金;加上(2)就该等增资款本金、以10%年化利率(单利)计算的增资款利息;减去(3)投资持有期投资方从标的公司收到的分红款(如有)。\n\n回购方为B公司的股东。\n\n2024年，A公司与B公司股东重新签定：\n\n本途的公司202年及以后镇一年度经审计后的扣非净利润少于1亿元:或自投资款支付之日起满六年，若标的公司未完成首发上市或被上市公都收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购”。\n\n期限延长为六年。\n\n目前A公司的处理，每年按照保底收益10%确认公允价值的变动。但是其聘请的评估机构对该项股权进行评估，采用市场法，评估值最近一期末为1576.29万元。\n\n公司的理由是：\n\n公允价值采取标的公司的股权评估咨询估值和回售条款公允价值孰高原则确定具有合理性:\n\n(1)39号准则规定出售公允价值计量相关资产应当假定该交易在相关资产或负债的最有利市场进行。最有利市场指能够以最高金额出售相关资产的市场。对于A 公司而言，相关股权投资约定有回售条款，若触发回售条款，则回购方拥有退回投资本金及按固定年回报利率支付保底收益的义务。同时，A公司于每资产负债表日委托评估机构提供公允价值估值咨询服务(非评估报告)，最终以股权评估咨询估值和回售条款价值孰高原则确定公允价值，符合39号准则的规定。\n\n(2)股权投资约定有回售条款，而评估师受限于可取得资料详实程度限制，采用市场法(可比公司法)估值，评估模型计算估值并未考虑回售条款价值，不能简单认为市场法估值(参考估值案例未考虑回售条款)即代表标的股权公允价值，而忽视回售条款的经济价值。根据协议，在一定条件下A公司可按照约定的公式计算的价款向股权转让方出售相关股权，是一个典型的卖出期权，公允价值应当考虑卖出期权价值。\n\n(3)评估方法上市场法的应用并非没有限制，其评估结果的有效性取决于可比资产的数据质量和可获得性。虽然市场法是一种常用的资产评估方法，但其评估结果并不总是代表最终的评估值，特别是在数据不足或市场条件不理想的情况下。在实际应用中，需要根据具体情况综合考虑多种因素，包括市场条件、数据质量等，来确定最终的评估值。因公司所投投资标的均为非上市流通企业，市场法对非流通股权评估效果较弱。因此非流通股权的市场法估值不能简单代表该股权真正的价值。\n\n根据《监管规则适用指引——会计类第1号》“1-1 特殊股权投资的确认与分类”，情形1：\n\n从投资方角度看，投资方对被投资方没有重大影响，该项投资应适用金融工具准则。因该项投资不满足权益工具定义，合同现金流量特征不满足仅为对本金和以未偿付本金金额为基础的利息的支付，应分类为以公允价值计量且其变动计入当期损益的金融资产。\n\n按照《或有事项准则》，只有要基本确定才能确认为资产。\n\n请教，A公司每年确认保底收益是否合理。总觉得公司的理由有点牵强。", "reply": "该事项中，回购义务人是B的股东而不是被投资企业B本身，因此回售权并不是一项嵌入衍生工具，而是一项单独的衍生工具（衍生金融资产）。A应确认两项金融资产，一是对B的权益性投资，二是对B的股东的回售权，这两项金融资产分别作为以公允价值计量且其变动计入损益的金融资产，列报为其他非流动金融资产，但应分别核算和分别确定其公允价值（尽管前者的公允价值下跌可以的一定程度上由后者的公允价值上升来弥补，但一般理解不会是全额的弥补）。\n\n如果预计B可以实现业绩、上市等约定目标，则回售权的公允价值为零，B的股权按通常的公允价值估值方法进行估值。\n\n如果预计B不能实现业绩，A很可能行使回售权，则应分别计量这两项金融资产的公允价值。其中，回售权作为期权，应采用期权定价模型，其内在价值为约定回售价格大于预计届时标的股权公允价值的差额，同时还需考虑资金时间价值、回购义务人（B公司其他股东）的信用风险等因素。具体建议咨询估值方面的专业人士。\n\n该事项的会计处理应适用金融工具准则，与或有事项准则无关。", "searchText": "5495882 附回售条款的股权投资期末公允价值如何确定 合并/股权/权益法 xiaomaijinwang a公司参与b公司的股权投资，投资金额5000万元，占股权比例为5.06%，公司未委派董事等人员。协议约定：\n\n第十条 关于回购的相关约定\n\n1、各方同意，若标的公司2021年及以后任一年度经审计后的扣非净利润少于1亿元;或自投资款支付之日起满三年，若标的公司未完成首发上市或被上市公司收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的 "https://bbs.esnai.com/thread-5495881-1-6.html", "question": "对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固等等，通过什么科目核算呢？\n\n1、属于对租赁资产的改良支出，计入“长期待摊费用”\n\n2、还是租赁资产建造或设计相关的成本，计入“固定资产”，即每个系统独成一个固定资产呢？\n\n提前谢谢陈版回复啦。", "reply": "应计入长期待摊费用。\n\n参考：https://kjs.mof.gov.cn/zt/kjzzss ... 0210425_3691863.htm。", "searchText": "5495881 关于租入资产改良支出与建造设计的区分。 资产/存货/固定资产/无形资产 baibingbing132y 对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固等等，通过什么科目核算呢？\n\n1、属于对租赁资产的改良支出，计入“长期待摊费用”\n\n2、还是租赁资产建造或设计相关的成本，计入“固定资产”，即每个系统独成一个固定资产呢？\n\n提前谢谢陈版回复啦。 应计入长期待摊费用。\n\n参考：https://kjs.mof.gov.cn/zt/kjzzss ... 0210425_3691863.htm。"}, {"tid": "5495870", "title": "关于合伙企业收到管理费的账务处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "kdddd", "questionTime": "2026-01-28 16:50:54", "replyTime": "2026-02-22 10:56:56", "replySortTime": "2026-02-22 10:56:56", "url": "https://bbs.esnai.com/thread-5495870-1-4.html", "question": "求助陈版！!!@chenyiwei\n\n私募基金合伙企业在收到投资方支付的款项时，全部款项（投资款+需要承担的管理费）都作为实收资本入账，之后付给管理人的基金管理费仍然通过管理费用核算，但是最后保证认缴金额仍=实缴金额。 这种账务处理方式合理吗？是否可行？\n\n望陈版主解答！感谢!", "reply": "该做法总体上是合理的。因为合伙企业本身也是独立的法律主体和会计主体，合伙企业通过相关协议与管理人之间建立委托和服务关系，合伙企业是管理合伙人提供服务的受益对象，因此管理费应确认为合伙企业自身的费用，而不是简单的代收代付。", "searchText": "5495870 关于合伙企业收到管理费的账务处理 金融工具/外币/债务重组/abs kdddd 求助陈版！!!@chenyiwei\n\n私募基金合伙企业在收到投资方支付的款项时，全部款项（投资款+需要承担的管理费）都作为实收资本入账，之后付给管理人的基金管理费仍然通过管理费用核算，但是最后保证认缴金额仍=实缴金额。 这种账务处理方式合理吗？是否可行？\n\n望陈版主解答！感谢! 该做法总体上是合理的。因为合伙企业本身也是独立的法律主体和会计主体，合伙企业通过相关协议与管理人之间建立委托和服务关系，合伙企业是管理合伙人提供服务的受益对象，因此管理费应确认为合伙企业自身的费用，而不是简单的代收代付。"}, {"tid": "5495869", "title": "陈版主，在确认递延所得税时，采取未来税率的依据到底是什么？", "category": "所得税/递延所得税", "questionAuthor": "ywzx117", "questionTime": "2026-01-28 16:31:26", "replyTime": "2026-02-22 10:25:07", "replySortTime": "2026-02-22 10:25:07", "url": "https://bbs.esnai.com/thread-5495869-1-7.html", "question": "如果这是一家刚刚成立不满3年企业，主要从事芯片设计。因此尚未取得高新资质\n\n在确认递延时，前任会计师考虑到公司未来一定会取得高新资质，采用15%的税率进行了确认\n\n如果只按普通企业来看，公司在未来五年很可能没有足够的应纳税所得税。如果拉长到10年才有可能\n\n在实操中，到底何时采用15%的税率才是合规的", "reply": "应合理预测何时可取得高新认定，再将预计暂时性差异的转回时间与取得高新认定的预计时间相比较，预计在取得高新认定之前转回的暂时性差异采用普通税率25%；预计在高新认定取得后转回的暂时性差异用高新税率。\n\n当然，首先必须保证未来暂时性差异转回期间有足够多的应纳税所得额。\n\n如果无法合理估计可抵扣暂时性差异的预计转回时间和取得高新认定的时间，则基于谨慎考虑，如果暂时性差异的主要方向是可抵扣暂时性差异，则按15%税率计量递延所得税资产。\n\n如果无法合理估计企业何时应纳税所得额可以转正，则基于谨慎考虑，不确认递延所得税资产，包括与可抵扣暂时性差异和可抵扣亏损相关的递延所得税资产均不确认。", "searchText": "5495869 陈版主，在确认递延所得税时，采取未来税率的依据到底是什么？ 所得税/递延所得税 ywzx117 如果这是一家刚刚成立不满3年企业，主要从事芯片设计。因此尚未取得高新资质\n\n在确认递延时，前任会计师考虑到公司未来一定会取得高新资质，采用15%的税率进行了确认\n\n如果只按普通企业来看，公司在未来五年很可能没有足够的应纳税所得税。如果拉长到10年才有可能\n\n在实操中，到底何时采用15%的税率才是合规的 应合理预测何时可取得高新认定，再将预计暂时性差异的转回时间与取得高新认定的预计时间相比较，预计在取得高新认定之前转回的暂时性差异采用普通税率25%；预计在高新认定取得后转回的暂时性差异用高新税率。\n\n当然，首先必须保证未来暂时性差异转回期间有足够多的应纳税所得额。\n\n如果无法合理估计可抵扣暂时性差异的预计转回时间和取得高新认定的时间，则基于谨慎考虑，如果暂时性差异的主要方向是可抵扣暂时性差异，则按15%税率计量递延所得税资产。\n\n如果无法合理估计企业何时应纳税所得额可以转正，则基于谨慎考虑，不确认递延所得税资产，包括与可抵扣暂时性差异和可抵扣亏损相关的递延所得税资产均不确认。"}, {"tid": "5495436", "title": "请教陈版主，关于现货合同指定为金融工具的核算。", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "lijbo", "questionTime": "2025-12-26 22:48:52", "replyTime": "2026-02-21 21:09:13", "replySortTime": "2026-02-21 21:09:13", "url": "https://bbs.esnai.com/thread-5495436-1-7.html", "question": "@chenyiwei 请教陈版主，按照第22号金融工具准则第五条，对于能够以现金或其他金融工具净额结算，或者通过交换金融工具结算的买入或卖出非金融项目的合同，即使企业按照预定的购买、销售或使用要求签订并持有旨在收取或交付非金融项目的合同的，企业也可以将该合同指定为以公允价值计量且其变动计入当期损益的金融资产或金融负债。企业只能在合同开始时做出该指定，并且必须能够通过该指定消除或显著减少会计错配。该指定一经做出，不得撤销。\n\n例子如下：公司和供应商签订一个采购合同，约定采购一商品价格是100元。公司将该采购合同指定为金融工具，2月末该产品市场价格是150元。3月份公司与供应商进行了交割，购入该产品。\n\n分录处理如下:\n\n2月末:借:衍生工具50\n\n               贷:公允价值变动损益50\n\n对于三月份交割的处理，有如下两种方案\n\n方案一：借:库存商品100\n\n                     贷:银行存款100\n\n             借:衍生工具-50\n\n                     贷:公允价值变动损益-50\n\n方案二：:借:库存商品       150\n\n                  贷:银行存款           100\n\n                      衍生工具             50\n\n              借:公允价值变动收益           50\n\n                   贷:投资收益                          50\n\n具体那中方法对，还请陈版主帮忙解疑答惑。", "reply": "首先要注意此类指定的情况非常罕见，一般非金融企业极少有此类情况，故引用此类条款要谨慎；其次如果该项指定确实是合理的，则按方案二进行交割时点的会计处理。", "searchText": "5495436 请教陈版主，关于现货合同指定为金融工具的核算。 金融工具/外币/债务重组/abs lijbo @chenyiwei 请教陈版主，按照第22号金融工具准则第五条，对于能够以现金或其他金融工具净额结算，或者通过交换金融工具结算的买入或卖出非金融项目的合同，即使企业按照预定的购买、销售或使用要求签订并持有旨在收取或交付非金融项目的合同的，企业也可以将该合同指定为以公允价值计量且其变动计入当期损益的金融资产或金融负债。企业只能在合同开始时做出该指定，并且必须能够通过该指定消除或显著减少会计错配。该指定一经做出，不得撤销。\n\n例子如下：公司和供应商签订一个采购合同，约定采购一商品价格是100元。公司将该采购合同指定为金融工具，2月末该产品市场价格是150元。3月份公司与供应商进行了交割，购入该产品。\n\n分录处理如下:\n\n2月末:借:衍生工具50\n\n               贷:公允价值变动损益50\n\n对于三月份交割的处理，有如下两种方案\n\n方案一：借:库存商品100\n\n                     贷:银行存款100\n\n             借:衍生工具-50\n\n                     贷:公允价值变动损益-50\n\n方案二：:借:库存商品       150\n\n                  贷:银行存款           100\n\n                      衍生工具             50\n\n              借:公允价值变动收益           50\n\n                   贷:投资收益                          50\n\n具体那中方法对，还请陈版主帮忙解疑答惑。 首先要注意此类指定的情况非常罕见，一般非金融企业极少有此类情况，故引用此类条款要谨慎；其次如果该项指定确实是合理的，则按方案二进行交割时点的会计处理。"}, {"tid": "5495437", "title": "请教陈版主，信用证延期福费廷业务的核算", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "lijbo", "questionTime": "2025-12-26 22:54:05", "replyTime": "2026-02-21 21:07:03", "replySortTime": "2026-02-21 21:07:03", "url": "https://bbs.esnai.com/thread-5495437-1-3.html", "question": "@chenyiwei 请教陈版主，A公司基于与C公司的购销业务，通过B银行开具了信用证给C公司，同时A公司代理C公司在B银行做了买断福费廷贴现，C公司针对这笔信用是否能终止确认，出表？如果不能出表，是为什么呢，还请陈版主帮忙答疑解惑。（A公司和C公司不是关联方）", "reply": "此问题需结合具体情况分析，关键看所有权上的主要风险和报酬的保留和转移情况。B银行既是开证行，也是贴现行，在此情况下B银行是否完全承担来源于A公司的信用风险，后续不能再向C追索，也不存在根据后续A公司的偿还款项情况再对C公司退、补贴现差额的情况。如满足风险和报酬转移条件，C公司不再享有或承担相关风险和报酬的，则可以终止确认。", "searchText": "5495437 请教陈版主，信用证延期福费廷业务的核算 金融工具/外币/债务重组/abs lijbo @chenyiwei 请教陈版主，a公司基于与c公司的购销业务，通过b银行开具了信用证给c公司，同时a公司代理c公司在b银行做了买断福费廷贴现，c公司针对这笔信用是否能终止确认，出表？如果不能出表，是为什么呢，还请陈版主帮忙答疑解惑。（a公司和c公司不是关联方） 此问题需结合具体情况分析，关键看所有权上的主要风险和报酬的保留和转移情况。b银行既是开证行，也是贴现行，在此情况下b银行是否完全承担来源于a公司的信用风险，后续不能再向c追索，也不存在根据后续a公司的偿还款项情况再对c公司退、补贴现差额的情况。如满足风险和报酬转移条件，c公司不再享有或承担相关风险和报酬的，则可以终止确认。"}]</script>
  <script id="categoriesData" type="application/json">["其他", "列报/报表科目/其他", "合并/股权/权益法", "审计/报告表达", "所得税/递延所得税", "收入确认/总额净额", "政府补助/PPP/税费/现金流", "租赁/使用权资产/融资租赁", "资产/存货/固定资产/无形资产", "金融工具/外币/债务重组/ABS"]</script>
  <script>
    const records = JSON.parse(document.getElementById('recordsData').textContent);
    const categories = JSON.parse(document.getElementById('categoriesData').textContent);

    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const sortSelect = document.getElementById('sortSelect');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resultList = document.getElementById('resultList');
    const resultCount = document.getElementById('resultCount');
    const activeFilter = document.getElementById('activeFilter');
    const detailHead = document.getElementById('detailHead');
    const detailBody = document.getElementById('detailBody');
    const toast = document.getElementById('toast');

    let filtered = records.slice();
    let selectedTid = records[0]?.tid || '';
    let debounceTimer = null;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function splitTerms(value) {
      return value.trim().toLowerCase().split(/\s+/).filter(Boolean);
    }

    function highlight(text, terms) {
      let safe = escapeHtml(text || '');
      const unique = [...new Set(terms.filter(t => t.length > 0))].sort((a, b) => b.length - a.length);
      for (const term of unique) {
        const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(escaped, 'gi');
        safe = safe.replace(re, match => `<mark>${match}</mark>`);
      }
      return safe;
    }

    function compact(text, max = 150) {
      const normalized = String(text || '').replace(/\s+/g, ' ').trim();
      return normalized.length > max ? normalized.slice(0, max) + '...' : normalized;
    }

    function populateCategories() {
      const all = document.createElement('option');
      all.value = '';
      all.textContent = '全部类别';
      categorySelect.appendChild(all);
      for (const category of categories) {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      }
    }

    function applyFilters() {
      const terms = splitTerms(searchInput.value);
      const category = categorySelect.value;
      filtered = records.filter(item => {
        if (category && item.category !== category) return false;
        return terms.every(term => item.searchText.includes(term));
      });
      const sortValue = sortSelect.value;
      filtered.sort((a, b) => {
        if (sortValue === 'oldest') return a.replySortTime.localeCompare(b.replySortTime);
        if (sortValue === 'title') return a.title.localeCompare(b.title, 'zh-Hans-CN');
        return b.replySortTime.localeCompare(a.replySortTime);
      });
      if (!filtered.some(item => item.tid === selectedTid)) {
        selectedTid = filtered[0]?.tid || '';
      }
      renderResults(terms);
      renderDetail(terms);
    }

    function renderResults(terms) {
      resultCount.textContent = `${filtered.length} 条结果`;
      activeFilter.textContent = categorySelect.value || '';
      resultList.innerHTML = '';
      if (!filtered.length) {
        resultList.innerHTML = '<div class="empty">没有匹配结果</div>';
        return;
      }
      const frag = document.createDocumentFragment();
      for (const item of filtered) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'result-item' + (item.tid === selectedTid ? ' active' : '');
        button.dataset.tid = item.tid;
        const snippetSource = item.reply || item.question;
        button.innerHTML = `
          <div class="result-title">${highlight(item.title, terms)}</div>
          <div class="result-meta">
            <span class="badge">${escapeHtml(item.category)}</span>
            <span>${escapeHtml(item.replyTime)}</span>
            <span>${escapeHtml(item.questionAuthor)}</span>
          </div>
          <div class="snippet">${highlight(compact(snippetSource), terms)}</div>
        `;
        frag.appendChild(button);
      }
      resultList.appendChild(frag);
    }

    function renderDetail(terms) {
      const item = filtered.find(row => row.tid === selectedTid);
      if (!item) {
        detailHead.innerHTML = '<h2 class="detail-title">未选择主题</h2>';
        detailBody.innerHTML = '<div class="empty">请调整关键词或类别筛选</div>';
        return;
      }
      detailHead.innerHTML = `
        <h2 class="detail-title">${highlight(item.title, terms)}</h2>
        <div class="detail-meta">
          <span class="badge">${escapeHtml(item.category)}</span>
          <span>发帖人：${escapeHtml(item.questionAuthor)}</span>
          <span>发帖时间：${escapeHtml(item.questionTime)}</span>
          <span>回复时间：${escapeHtml(item.replyTime)}</span>
          <span>主题 ID：${escapeHtml(item.tid)}</span>
        </div>
        <div class="detail-actions">
          <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">打开原帖</a>
          <button type="button" id="copyLinkBtn">复制链接</button>
          <button type="button" id="copyReplyBtn">复制回复</button>
        </div>
      `;
      detailBody.innerHTML = `
        <div class="section">
          <h3>问题正文</h3>
          <div class="text-block">${highlight(item.question, terms)}</div>
        </div>
        <div class="section">
          <h3>chenyiwei 回复原文</h3>
          <div class="text-block">${highlight(item.reply, terms)}</div>
        </div>
      `;
      document.getElementById('copyLinkBtn').addEventListener('click', () => copyText(item.url, '已复制链接'));
      document.getElementById('copyReplyBtn').addEventListener('click', () => copyText(item.reply, '已复制回复'));
    }

    function copyText(text, message) {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast(message)).catch(() => fallbackCopy(text, message));
      } else {
        fallbackCopy(text, message);
      }
    }

    function fallbackCopy(text, message) {
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      showToast(message);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1400);
    }

    function exportCurrentResults() {
      const header = ['reply_time', 'category', 'tid', 'title', 'question_author', 'question_time', 'question', 'chenyiwei_reply', 'url'];
      const lines = [header.join('\t')];
      for (const item of filtered) {
        lines.push([
          item.replyTime,
          item.category,
          item.tid,
          item.title,
          item.questionAuthor,
          item.questionTime,
          item.question,
          item.reply,
          item.url
        ].map(value => String(value ?? '').replace(/\t/g, ' ').replace(/\r?\n/g, '\\n')).join('\t'));
      }
      const blob = new Blob([lines.join('\n')], { type: 'text/tab-separated-values;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `chenyiwei_search_results_${stamp}.tsv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    resultList.addEventListener('click', event => {
      const button = event.target.closest('.result-item');
      if (!button) return;
      selectedTid = button.dataset.tid;
      renderResults(splitTerms(searchInput.value));
      renderDetail(splitTerms(searchInput.value));
    });

    searchInput.addEventListener('input', () => {
      window.clearTimeout(debounceTimer);
      debounceTimer = window.setTimeout(applyFilters, 120);
    });
    categorySelect.addEventListener('change', applyFilters);
    sortSelect.addEventListener('change', applyFilters);
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      categorySelect.value = '';
      sortSelect.value = 'newest';
      selectedTid = records[0]?.tid || '';
      applyFilters();
      searchInput.focus();
    });
    exportBtn.addEventListener('click', exportCurrentResults);

    populateCategories();
    applyFilters();
  </script>
</body>
</html>
