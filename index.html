时作为租赁变更，按照《企业会计准则第21号——租赁》第四十九条规定：“自变更生效日起将其作为一项新租赁进行会计处理，与变更前租赁有关的预收或应收租赁收款额应当视为新租赁的收款额。”即根据变更后的租赁期重新测算租赁收入总额和变更后剩余租赁期内每月可确认的租金收入，并对此前确认的应收账款进行调整（如需要）。一般不应在退租时一次性冲减收入，除非是当月达成协议、当月即退租。\n\n2、直线法分摊到各月的租金用于确认收入，报税还是以合同约定的收款进度为准。根据《企业所得税法实施条例》第十九条规定：“租金收入，按照合同约定的承租人应付租金的日期确认收入的实现”。"}, {"tid": "5496557", "title": "关于土地性质变更的账务处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "ananand", "questionTime": "2026-03-29 22:26:59", "replyTime": "2026-03-31 11:52:57; 2026-04-06 19:39:20", "replySortTime": "2026-04-06 19:39:20", "url": "https://bbs.esnai.com/thread-5496557-1-3.html", "question": "@chenyiwei ,陈版，我想追问一个问题：\n\n背景：公司有一块土地，原土地性质为商业办公用地，因开发可能会亏损，企业与当地政府沟通变更规划，因当地住户同意变更规划，因此企业与政府沟通变更土地性质为商业住宅，但依据有关规定，土地性质变更需要收回原有土地，然后再挂牌，企业摘牌。因此企业与政府签订土地出让补充协议及竞买兜底协议，其中协议约定，土地性质变更后的土地出让金及公司兜底竞拍的条款。改土地在企业账面为2亿元，收回土地的价格为1.5亿元，土地性质变更后的土地价格为1.8亿元，收回土地款1.5亿元直接抵扣1.8亿中的1.5亿元，剩余3000万元公司用现金补齐。问题:最终土地的账面价值应该是多少?2.3亿(2+0.3)还是1.8亿，如果是1.8亿，与账面差额0.5亿作为退地损失计入营业外支出吗?\n\n回复：在有证据表明土地收回、变更规划、重新拍得这三个事项属于一揽子交易安排的情况下，应首先对原土地(开发成本)按照变更后的用途进行减值测试，必要时计提减值准备。再将计提减值准备(如需)后的原土地账面价值加上再次拍得时需补缴的差价3000万元作为重新取得土地使用权的入账价值。在这一过程中除了减值损失以外不确认其他损益。\n\n追问：该公司是一家房地产企业，在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用，在土地性质变更之后，如不存在减值，早期费用是否还能继续作为开发成本核算？", "reply": "【回复 1｜2026-03-31 11:52:57】\n“在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用”：这些前期成本在土地性质变更后是否仍需再次发生？即，这些成本对土地变性后的后续开发有无作用，能否减少后续开发过程中的经济资源流出（正常情况下按变性后的用途需发生的相关支出可无需重复发生）？\n\n如是，则可以保留这些支出并计入变性后土地的开发成本；反之应计入损益处理。\n\n【回复 2｜2026-04-06 19:39:20】\n由于开发规划和用途改变，原开发成本中归集的早期规划、资本化利息等应不再具备未来经济利益流入的潜力，应将这部分账面价值予以费用化。\n\n对于已发生的三通一平成本，如果规划和用途改变后，三通一平需要重新实施（或者至少进行重大改变），则应考虑将前期归集在开发成本中的此类支出转入损益处理；如果仍可使用，不需要进行重大改变的，则可以保留在开发成本账面价值中。", "searchText": "5496557 关于土地性质变更的账务处理 金融工具/外币/债务重组/abs ananand @chenyiwei ,陈版，我想追问一个问题：\n\n背景：公司有一块土地，原土地性质为商业办公用地，因开发可能会亏损，企业与当地政府沟通变更规划，因当地住户同意变更规划，因此企业与政府沟通变更土地性质为商业住宅，但依据有关规定，土地性质变更需要收回原有土地，然后再挂牌，企业摘牌。因此企业与政府签订土地出让补充协议及竞买兜底协议，其中协议约定，土地性质变更后的土地出让金及公司兜底竞拍的条款。改土地在企业账面为2亿元，收回土地的价格为1.5亿元，土地性质变更后的土地价格为1.8亿元，收回土地款1.5亿元直接抵扣1.8亿中的1.5亿元，剩余3000万元公司用现金补齐。问题:最终土地的账面价值应该是多少?2.3亿(2+0.3)还是1.8亿，如果是1.8亿，与账面差额0.5亿作为退地损失计入营业外支出吗?\n\n回复：在有证据表明土地收回、变更规划、重新拍得这三个事项属于一揽子交易安排的情况下，应首先对原土地(开发成本)按照变更后的用途进行减值测试，必要时计提减值准备。再将计提减值准备(如需)后的原土地账面价值加上再次拍得时需补缴的差价3000万元作为重新取得土地使用权的入账价值。在这一过程中除了减值损失以外不确认其他损益。\n\n追问：该公司是一家房地产企业，在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用，在土地性质变更之后，如不存在减值，早期费用是否还能继续作为开发成本核算？ 【回复 1｜2026-03-31 11:52:57】\n“在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用”：这些前期成本在土地性质变更后是否仍需再次发生？即，这些成本对土地变性后的后续开发有无作用，能否减少后续开发过程中的经济资源流出（正常情况下按变性后的用途需发生的相关支出可无需重复发生）？\n\n如是，则可以保留这些支出并计入变性后土地的开发成本；反之应计入损益处理。\n\n【回复 2｜2026-04-06 19:39:20】\n由于开发规划和用途改变，原开发成本中归集的早期规划、资本化利息等应不再具备未来经济利益流入的潜力，应将这部分账面价值予以费用化。\n\n对于已发生的三通一平成本，如果规划和用途改变后，三通一平需要重新实施（或者至少进行重大改变），则应考虑将前期归集在开发成本中的此类支出转入损益处理；如果仍可使用，不需要进行重大改变的，则可以保留在开发成本账面价值中。"}, {"tid": "5496556", "title": "子公司股份支付合并层面", "category": "合并/股权/权益法", "questionAuthor": "七夜の念", "questionTime": "2026-03-29 21:15:58", "replyTime": "2026-04-06 16:01:46", "replySortTime": "2026-04-06 16:01:46", "url": "https://bbs.esnai.com/thread-5496556-1-3.html", "question": "求助陈版主： 请教陈版主，\n\n      2025年我们集团下属非全资二级子公司存在以自身权益结算的股份支付，子公司账面处理为借：管理费用 贷：资本公积。母公司合并层面，按照持股比例计算少数股东损益，子公司层间确认的这部分资本公积合并层面是否还需要按照持股比例在资本公积和少数股东权益间分摊，也即恢复少数股东损益确认的那部分费用？", "reply": "子公司个别报表中确认的股份支付费用，在合并报表中应按少数股权比例分出部分到少数股东损益。但少数股东权益并未因此减少。所以在母公司的合并报表中，应体现一项权益性交易，即减少资本公积，增加少数股东权益。", "searchText": "5496556 子公司股份支付合并层面 合并/股权/权益法 七夜の念 求助陈版主： 请教陈版主，\n\n      2025年我们集团下属非全资二级子公司存在以自身权益结算的股份支付，子公司账面处理为借：管理费用 贷：资本公积。母公司合并层面，按照持股比例计算少数股东损益，子公司层间确认的这部分资本公积合并层面是否还需要按照持股比例在资本公积和少数股东权益间分摊，也即恢复少数股东损益确认的那部分费用？ 子公司个别报表中确认的股份支付费用，在合并报表中应按少数股权比例分出部分到少数股东损益。但少数股东权益并未因此减少。所以在母公司的合并报表中，应体现一项权益性交易，即减少资本公积，增加少数股东权益。"}, {"tid": "5496543", "title": "财务顾问费", "category": "合并/股权/权益法", "questionAuthor": "laigeng", "questionTime": "2026-03-28 22:43:29", "replyTime": "2026-04-06 15:56:45", "replySortTime": "2026-04-06 15:56:45", "url": "https://bbs.esnai.com/thread-5496543-1-4.html", "question": "为获取股权融资而支付给中介机构的财务顾问费，约定是在甲方确认乙方推荐的投资人，并收到投资后，才按融资规模的一定比例向乙方支付顾问费，管种情况下，是否可以认定这笔顾问费是为发行新的权益工具而发生的增量费用，冲减因融资而增加的资本公积？", "reply": "理论上可以。但实务中较少见到该做法。", "searchText": "5496543 财务顾问费 合并/股权/权益法 laigeng 为获取股权融资而支付给中介机构的财务顾问费，约定是在甲方确认乙方推荐的投资人，并收到投资后，才按融资规模的一定比例向乙方支付顾问费，管种情况下，是否可以认定这笔顾问费是为发行新的权益工具而发生的增量费用，冲减因融资而增加的资本公积？ 理论上可以。但实务中较少见到该做法。"}, {"tid": "5496527", "title": "请教陈版，员工赔偿是否属于非经？", "category": "其他", "questionAuthor": "l1090483430", "questionTime": "2026-03-27 17:08:06", "replyTime": "2026-04-06 15:54:36", "replySortTime": "2026-04-06 15:54:36", "url": "https://bbs.esnai.com/thread-5496527-1-4.html", "question": "工人中午在仓库休息发生猝死，女性57岁，和公司签订的劳务协议。由于是猝死，未出具死亡证明。后续公司和家人签订了补偿协议，协议中说明是非因工死亡，已正常支付。该笔支出是否属于非经？ 还是应该考虑是因公司管理不当，才导致该事件的发生从而计入管理费用，归类为经常性损益？", "reply": "如果是偶发性的，且主要与该工人自身基础性疾病相关，非职业病导致，则计入营业外支出处理，可列入非经常性损益。", "searchText": "5496527 请教陈版，员工赔偿是否属于非经？ 其他 l1090483430 工人中午在仓库休息发生猝死，女性57岁，和公司签订的劳务协议。由于是猝死，未出具死亡证明。后续公司和家人签订了补偿协议，协议中说明是非因工死亡，已正常支付。该笔支出是否属于非经？ 还是应该考虑是因公司管理不当，才导致该事件的发生从而计入管理费用，归类为经常性损益？ 如果是偶发性的，且主要与该工人自身基础性疾病相关，非职业病导致，则计入营业外支出处理，可列入非经常性损益。"}, {"tid": "5496526", "title": "请教陈版，分步实现同一控制下企业合并比较报表的编制", "category": "合并/股权/权益法", "questionAuthor": "shaoyue1021", "questionTime": "2026-03-27 15:33:43", "replyTime": "2026-04-06 15:51:32", "replySortTime": "2026-04-06 15:51:32", "url": "https://bbs.esnai.com/thread-5496526-1-4.html", "question": "请教陈版，分步实现同一控制下企业合并，比较合并现金流量表、比较合并利润表、比较合并所有者权益变动表如何编制，直接合并视同上期就达成同控进行编制吗，是否涉及调整抵销分录呢？", "reply": "同样按照同一控制下合并的基本处理原则，视同上期就达成同控进行编制。但因为合并日之前已持有被合并方的部分股权，相应地在合并方确认长期股权投资或金融资产，因此除了常规的合并步骤之外，还涉及合并日前对原持有的被合并方非控制股权投资的抵销处理。类似案例请参阅《应用指南汇编2024》P61～65。", "searchText": "5496526 请教陈版，分步实现同一控制下企业合并比较报表的编制 合并/股权/权益法 shaoyue1021 请教陈版，分步实现同一控制下企业合并，比较合并现金流量表、比较合并利润表、比较合并所有者权益变动表如何编制，直接合并视同上期就达成同控进行编制吗，是否涉及调整抵销分录呢？ 同样按照同一控制下合并的基本处理原则，视同上期就达成同控进行编制。但因为合并日之前已持有被合并方的部分股权，相应地在合并方确认长期股权投资或金融资产，因此除了常规的合并步骤之外，还涉及合并日前对原持有的被合并方非控制股权投资的抵销处理。类似案例请参阅《应用指南汇编2024》p61～65。"}, {"tid": "5496525", "title": "关于舞弊形成损失的计提科目", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "christinaq", "questionTime": "2026-03-27 09:54:29", "replyTime": "2026-04-06 15:47:46", "replySortTime": "2026-04-06 15:47:46", "url": "https://bbs.esnai.com/thread-5496525-1-3.html", "question": "背景：A公司因内部业务人员舞弊，构建虚假业务，套取公司资金，支付给并无实际业务的供应商，形成预付账款，无法收回；已经侦介入，向收款供应商及其上游追讨资金，或从涉案舞弊人员处追偿。\n\n对于此预付账款无法收回的可能形成的损益，应当如何会计处理？计入经营性的“资产减值损失”/”信用减值损失”，还是计入非经营性的“营业外支出”？\n\n请大神指教。谢谢！", "reply": "首先，对于虚构业务形成的预付账款，应进行差错更正，根据查明的交易经济实质还原正确的会计处理。\n\n其次，如果不再确认预付账款，该等款项汇出时即损失，则应在当初汇出时即确认营业外支出处理，后续按实际追回的金额确认营业外收入。", "searchText": "5496525 关于舞弊形成损失的计提科目 资产/存货/固定资产/无形资产 christinaq 背景：a公司因内部业务人员舞弊，构建虚假业务，套取公司资金，支付给并无实际业务的供应商，形成预付账款，无法收回；已经侦介入，向收款供应商及其上游追讨资金，或从涉案舞弊人员处追偿。\n\n对于此预付账款无法收回的可能形成的损益，应当如何会计处理？计入经营性的“资产减值损失”/”信用减值损失”，还是计入非经营性的“营业外支出”？\n\n请大神指教。谢谢！ 首先，对于虚构业务形成的预付账款，应进行差错更正，根据查明的交易经济实质还原正确的会计处理。\n\n其次，如果不再确认预付账款，该等款项汇出时即损失，则应在当初汇出时即确认营业外支出处理，后续按实际追回的金额确认营业外收入。"}, {"tid": "5496518", "title": "所得税费用与会计利润的关系", "category": "合并/股权/权益法", "questionAuthor": "xiaomaijinwang", "questionTime": "2026-03-26 20:09:13", "replyTime": "2026-04-06 15:38:55", "replySortTime": "2026-04-06 15:38:55", "url": "https://bbs.esnai.com/thread-5496518-1-3.html", "question": "陈老师，您好。请教一个问题。纳入合并范围的合伙企业，对外进行投资，其投资期末确认公允价值变动，在计算所得税费用与会计利润的关系的时候，这个公允价值的变动是列入未确认递延的暂时性差异还是母子税率差异呢。", "reply": "虽然合伙企业本身不是企业所得税的纳税人，但其法人合伙人是相应的所得税纳税人，并遵循“先分后税”处理原则，因此合伙人应就其所享有的合伙企业收益（含尚未实现的公允价值变动损益）的份额，在实际分回前确认递延所得税负债。主帖中未确认递延所得税负债的处理很可能是错误的，请首先核对。\n\n如果按照合伙人的适用税率确认了递延所得税负债，则在该调节表中没有特殊调节事项。其中，如果合伙人是子公司，且该子公司与母公司的适用税率不同的，则在“母子公司适用不同税率的影响”项目的计算中，应将该子公司享有的合伙企业收益份额所对应的母子公司税率差影响数包含在内。", "searchText": "5496518 所得税费用与会计利润的关系 合并/股权/权益法 xiaomaijinwang 陈老师，您好。请教一个问题。纳入合并范围的合伙企业，对外进行投资，其投资期末确认公允价值变动，在计算所得税费用与会计利润的关系的时候，这个公允价值的变动是列入未确认递延的暂时性差异还是母子税率差异呢。 虽然合伙企业本身不是企业所得税的纳税人，但其法人合伙人是相应的所得税纳税人，并遵循“先分后税”处理原则，因此合伙人应就其所享有的合伙企业收益（含尚未实现的公允价值变动损益）的份额，在实际分回前确认递延所得税负债。主帖中未确认递延所得税负债的处理很可能是错误的，请首先核对。\n\n如果按照合伙人的适用税率确认了递延所得税负债，则在该调节表中没有特殊调节事项。其中，如果合伙人是子公司，且该子公司与母公司的适用税率不同的，则在“母子公司适用不同税率的影响”项目的计算中，应将该子公司享有的合伙企业收益份额所对应的母子公司税率差影响数包含在内。"}, {"tid": "5496516", "title": "现金折扣包含的增值税处理", "category": "收入确认/总额净额", "questionAuthor": "sybspxcpa", "questionTime": "2026-03-26 11:31:53", "replyTime": "2026-04-06 15:31:10", "replySortTime": "2026-04-06 15:31:10", "url": "https://bbs.esnai.com/thread-5496516-1-4.html", "question": "例：某公司2022年9月1日销售一批商品，销售价格100000元（不含税价），税率13%，销售条件为2/10、1/20、n/30。买方于2022年9月9日付款，享受现金折扣2260元。\n\n确认销售商品收入时，先确定现金折扣作为可变对价的最佳估计数。假设根据交易对手的一贯情况，确认的最佳估计是2260元（享受最高折扣）。\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n合同负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n（2）收到货款时，买方在合同约定的10日付款，享受了2%的现金折扣。由于估计的“合同负债-可变对价”是不含税的，实际折扣是按照含税金额折扣的，因此差额可以计入“财务费用-现金折扣”。\n\n借：银行存款     110740元\n\n合同负债-可变对价  2000元\n\n财务费用-现金折扣   260元\n\n贷：应收账款   113000元\n\n对于上述处理，本人理解，有两处错误：\n\n1、“合同负债”核算的是企业已收或应收客户对价而应向客户转让商品的义务。现金折扣是价格的减少，不是企业的履约义务，合同负债科目适用不当，可以用“其他流动负债”或“其他应付款”科目反映；\n\n2、现金折扣包含的增值税差额部分计入“财务费用-现金折扣”科目使用不当，现金折扣作为可变对价，应调整“主营业务收入”（或冲减当期收入），而非计入财务费用。\n\n调整后分录应为：\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n其他流动负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2000元\n\n主营业务收入   260元\n\n贷：应收账款   113000元\n\n或2：\n\n借：应收账款   113000元\n\n贷：主营业务收入   97740元\n\n其他流动负债-可变对价  2260元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2260元\n\n贷：应收账款   113000元\n\n请教陈版，上述理解和调整是否正确？\n\n谢谢", "reply": "基本赞同主帖中的理解。", "searchText": "5496516 现金折扣包含的增值税处理 收入确认/总额净额 sybspxcpa 例：某公司2022年9月1日销售一批商品，销售价格100000元（不含税价），税率13%，销售条件为2/10、1/20、n/30。买方于2022年9月9日付款，享受现金折扣2260元。\n\n确认销售商品收入时，先确定现金折扣作为可变对价的最佳估计数。假设根据交易对手的一贯情况，确认的最佳估计是2260元（享受最高折扣）。\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n合同负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n（2）收到货款时，买方在合同约定的10日付款，享受了2%的现金折扣。由于估计的“合同负债-可变对价”是不含税的，实际折扣是按照含税金额折扣的，因此差额可以计入“财务费用-现金折扣”。\n\n借：银行存款     110740元\n\n合同负债-可变对价  2000元\n\n财务费用-现金折扣   260元\n\n贷：应收账款   113000元\n\n对于上述处理，本人理解，有两处错误：\n\n1、“合同负债”核算的是企业已收或应收客户对价而应向客户转让商品的义务。现金折扣是价格的减少，不是企业的履约义务，合同负债科目适用不当，可以用“其他流动负债”或“其他应付款”科目反映；\n\n2、现金折扣包含的增值税差额部分计入“财务费用-现金折扣”科目使用不当，现金折扣作为可变对价，应调整“主营业务收入”（或冲减当期收入），而非计入财务费用。\n\n调整后分录应为：\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n其他流动负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2000元\n\n主营业务收入   260元\n\n贷：应收账款   113000元\n\n或2：\n\n借：应收账款   113000元\n\n贷：主营业务收入   97740元\n\n其他流动负债-可变对价  2260元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2260元\n\n贷：应收账款   113000元\n\n请教陈版，上述理解和调整是否正确？\n\n谢谢 基本赞同主帖中的理解。"}, {"tid": "5496507", "title": "存货抵债", "category": "收入确认/总额净额", "questionAuthor": "GKl501", "questionTime": "2026-03-25 20:20:27", "replyTime": "2026-04-06 15:20:02", "replySortTime": "2026-04-06 15:20:02", "url": "https://bbs.esnai.com/thread-5496507-1-3.html", "question": "@chenyiwei 陈老师，实务中碰到这样一个问题，如何进行账务处理？\n\nA公司在2020年度向B公司销售商品时，因产品质量问题需向B公司支付70万的赔偿款，A公司当年已支付35万元，剩余35万未支付也未进行账务处理。2026年度，B公司向A公司进行了追偿，双方约定A公司以价值35万元的存货抵偿债务，该批存货的账面价值为30万元，请问A公司是按债务重组确认损益还是确认收入结转成本，具体的账务处理怎么做？", "reply": "1、2020年时，剩余赔偿款35万元未支付也未进行账务处理，属于前期差错，应予以更正。\n\n2、在将该35万补充入账的基础上，对于2026年的以货抵债应作为债务重组处理，抵债的作价金额35万元（假设该作价是公允的）与成本30万元之间的差额确认为其他收益。", "searchText": "5496507 存货抵债 收入确认/总额净额 gkl501 @chenyiwei 陈老师，实务中碰到这样一个问题，如何进行账务处理？\n\na公司在2020年度向b公司销售商品时，因产品质量问题需向b公司支付70万的赔偿款，a公司当年已支付35万元，剩余35万未支付也未进行账务处理。2026年度，b公司向a公司进行了追偿，双方约定a公司以价值35万元的存货抵偿债务，该批存货的账面价值为30万元，请问a公司是按债务重组确认损益还是确认收入结转成本，具体的账务处理怎么做？ 1、2020年时，剩余赔偿款35万元未支付也未进行账务处理，属于前期差错，应予以更正。\n\n2、在将该35万补充入账的基础上，对于2026年的以货抵债应作为债务重组处理，抵债的作价金额35万元（假设该作价是公允的）与成本30万元之间的差额确认为其他收益。"}, {"tid": "5496505", "title": "福利费账务处理", "category": "收入确认/总额净额", "questionAuthor": "阮晓优", "questionTime": "2026-03-25 17:22:13", "replyTime": "2026-04-06 15:16:22", "replySortTime": "2026-04-06 15:16:22", "url": "https://bbs.esnai.com/thread-5496505-1-3.html", "question": "陈版主，下午好\n\n请教下 ，目前公司自有食堂、宿舍楼，但是有偿提供给员工使用，每月会从员工工资里面扣除伙食费、宿舍租金、宿舍水电费，价格比市场价便宜一点，但是对于公司来说这块还是亏本的，26年前我们都是按照净额法核算，如支付该部分成本时入管理费用-福利费，收取这部分费用冲减管理费-福利费按照26年增值税法  单位给员工有偿提供服务需要缴纳增值税，故增值税报、所得税报表均有伙食收入等，此时每月伙食费、宿舍租金、宿舍水电账上还能采用净额法核算吗", "reply": "企业向员工提供食宿，并不是正常的对外经营业务，不应确认收入。即使税法规定发生改变，但会计上仍延续此前的处理方式，即把该业务的实际成本减去向员工收取的款项后按净额列入福利费支出。", "searchText": "5496505 福利费账务处理 收入确认/总额净额 阮晓优 陈版主，下午好\n\n请教下 ，目前公司自有食堂、宿舍楼，但是有偿提供给员工使用，每月会从员工工资里面扣除伙食费、宿舍租金、宿舍水电费，价格比市场价便宜一点，但是对于公司来说这块还是亏本的，26年前我们都是按照净额法核算，如支付该部分成本时入管理费用-福利费，收取这部分费用冲减管理费-福利费按照26年增值税法  单位给员工有偿提供服务需要缴纳增值税，故增值税报、所得税报表均有伙食收入等，此时每月伙食费、宿舍租金、宿舍水电账上还能采用净额法核算吗 企业向员工提供食宿，并不是正常的对外经营业务，不应确认收入。即使税法规定发生改变，但会计上仍延续此前的处理方式，即把该业务的实际成本减去向员工收取的款项后按净额列入福利费支出。"}, {"tid": "5496504", "title": "同一控制下企业合并划出方的账务处理", "category": "合并/股权/权益法", "questionAuthor": "二小撮分子", "questionTime": "2026-03-25 14:52:31", "replyTime": "2026-04-06 15:14:11", "replySortTime": "2026-04-06 15:14:11", "url": "https://bbs.esnai.com/thread-5496504-1-3.html", "question": "求助陈版主，A集团（省属国企）持有B平台100%股权，B平台持有C上市公司26%的股权，为其控股股东。B平台将C上市公司以长投账面成本价转让给A集团，该成本价远高于C上市公司公允价值（转让时点股价）。\n\nB平台因采用账面值转让，单体层面未产生投资收益，在B平台合并层面以公允价值持续计量形成的变动与处置价款之间的差额是否应该根据权益性交易原则计入资本公积？主要是该资产处置是基于A集团整体板块调整需要，且处置价款不公允。\n\n请陈版主赐教，谢谢！！@chenyiwei", "reply": "如果不是因为B是A的全资子公司，B按成本（远高于当前公允价值）出售C公司股权给A是不可能实现的，即该交易安排仅基于两者之间特殊的关联方关系才得以发生。因此，对于B公司而言，出售价格高于标的股权公允价值（市价）的差额应作为接受母公司A的资本性投入，贷记资本公积处理。相应地，A在其个别报表中，应将交易价格高于标的股权公允价值的差额作为对B的资本性投入，借记“长期股权投资——B”而不是“长期股权投资——C”。", "searchText": "5496504 同一控制下企业合并划出方的账务处理 合并/股权/权益法 二小撮分子 求助陈版主，a集团（省属国企）持有b平台100%股权，b平台持有c上市公司26%的股权，为其控股股东。b平台将c上市公司以长投账面成本价转让给a集团，该成本价远高于c上市公司公允价值（转让时点股价）。\n\nb平台因采用账面值转让，单体层面未产生投资收益，在b平台合并层面以公允价值持续计量形成的变动与处置价款之间的差额是否应该根据权益性交易原则计入资本公积？主要是该资产处置是基于a集团整体板块调整需要，且处置价款不公允。\n\n请陈版主赐教，谢谢！！@chenyiwei 如果不是因为b是a的全资子公司，b按成本（远高于当前公允价值）出售c公司股权给a是不可能实现的，即该交易安排仅基于两者之间特殊的关联方关系才得以发生。因此，对于b公司而言，出售价格高于标的股权公允价值（市价）的差额应作为接受母公司a的资本性投入，贷记资本公积处理。相应地，a在其个别报表中，应将交易价格高于标的股权公允价值的差额作为对b的资本性投入，借记“长期股权投资——b”而不是“长期股权投资——c”。"}, {"tid": "5496502", "title": "资产打包成股权进行处置", "category": "合并/股权/权益法", "questionAuthor": "dearty", "questionTime": "2026-03-25 00:23:23", "replyTime": "2026-04-06 15:05:58", "replySortTime": "2026-04-06 15:05:58", "url": "https://bbs.esnai.com/thread-5496502-1-4.html", "question": "请教陈版主，A公司（编制合并报表企业）为处置自身某项在建工程成立一家100%股权子公司，将自己该项在建工程按账面价值注资给该子公司后，极短时间内将该子公司转让给第三方，该子公司已通过集中度测试（子公司除该项资产外无任何其他资产及业务），对于A公司来说是否可以视同处置资产进行会计处理，如果可以按照处置资产进行处理，是否可以给出具体的依据。", "reply": "可以视同处置资产进行会计处理，在合并报表层面确认资产处置损益。\n\n主要考虑：将在建工程注入该子公司和处置该子公司股权是一揽子交易，旨在实现同一目的（处置该在建工程）；且该子公司不构成业务，因此在经济实质上，处置该子公司和直接处置该在建工程的经济影响完全相同。", "searchText": "5496502 资产打包成股权进行处置 合并/股权/权益法 dearty 请教陈版主，a公司（编制合并报表企业）为处置自身某项在建工程成立一家100%股权子公司，将自己该项在建工程按账面价值注资给该子公司后，极短时间内将该子公司转让给第三方，该子公司已通过集中度测试（子公司除该项资产外无任何其他资产及业务），对于a公司来说是否可以视同处置资产进行会计处理，如果可以按照处置资产进行处理，是否可以给出具体的依据。 可以视同处置资产进行会计处理，在合并报表层面确认资产处置损益。\n\n主要考虑：将在建工程注入该子公司和处置该子公司股权是一揽子交易，旨在实现同一目的（处置该在建工程）；且该子公司不构成业务，因此在经济实质上，处置该子公司和直接处置该在建工程的经济影响完全相同。"}, {"tid": "5496501", "title": "关于经营租赁中的租赁收入确认原则是否与收入准则的收入确认前提相通", "category": "收入确认/总额净额", "questionAuthor": "nh19861028", "questionTime": "2026-03-24 22:12:43", "replyTime": "2026-04-06 15:00:04", "replySortTime": "2026-04-06 15:00:04", "url": "https://bbs.esnai.com/thread-5496501-1-4.html", "question": "请教陈版主。\n\n最近遇到这样的问题：公司对外出租不动产并约定了租金和支付期数，但承租人出现了违约，并且后续法院判决出租人胜诉判承租人支付租金，但承租人仍然拒不支付并且名下无任何可执行的资产，但企业仍然按照法院判决确认了出租收入，理由是按照租赁准则有关承租人的规定和法院的判决，但实际根本无法收回。我也认为仅凭一纸判决不足以作为收入确认的依据，按照收入准则的相关理论基础实际在承租人出现违约的时候开始就应该谨慎确认收入了。但是租赁准则中有关承租人收入确认方面并没有明确指引应该参考收入准则或者其他有关谨慎性的规定。\n\n查了IFRS相关资料，只在IFRS16附录C中有“C1:企业应从2019年1月1日开始的年度报告期间起适用本准则。对于那些在本次准则首次生效之前已经适用国际财务报告准则第15号“客户合约的收入”的企业来说，它们可以提前适用本准则。如果企业选择提前适用本准则，那么必须披露这一事实。”附录D“企业不得在适用国际财务报告准则第15号“客户合约的收入”之前，同时适用国际财务报告准则第16号(见第C1段)。”是不是这里就表明了出租人收入确认的基础首先要符合收入准则中收入确认的相关基础规定，然后才按照租赁准则中出租人收入计量的规定会计处理。\n\n谢谢！", "reply": "根据《企业会计准则——基本准则》第三十一条：“收入只有在经济利益很可能流入从而导致企业资产增加或者负债减少、且经济利益的流入额能够可靠计量时才能予以确认。”这里的“收入”涵盖了由收入准则规范的营业收入、由租赁准则规范的租金收入，以及由金融工具准则规范的利息收入等。即，出租人对经营租赁的租金收入的确认，也应以“经济利益很可能流入”为前提。在明知承租人无支付能力的情况下，仅凭法院判决并不满足确认租金收入的条件，因为法院判决只是对该租金债权在法律上的确权，而不是对其可收回性的背书。\n\n依据：《应用指南2024》P16：\n\n(1) 收入是企业在日常活动中形成的。日常活动是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商业企业销售商品、保险公司签发保单、咨询公司提供咨询服务、软件企业为客户开发软件、安装公司提供安装服务、商业银行对外贷款、租赁公司出租资产等，均属于企业的日常活动。明确界定日常活动是为了将收入与利得相区分，因为企业非日常活动所形成的经济利益的流入不能确认为收入，而应当计入利得。例如，处置固定资产属于非日常活动，所形成的净利益就不应确认为收入，而应当确认为利得。又如，企业向客户授予知识产权等无形资产所取得的授权收入属千日常活动所形成的，应当确认为收入；但是处置无形资产属千非日常活动，所形成的净利益，不应确认为收入，而应当确认为利得。", "searchText": "5496501 关于经营租赁中的租赁收入确认原则是否与收入准则的收入确认前提相通 收入确认/总额净额 nh19861028 请教陈版主。\n\n最近遇到这样的问题：公司对外出租不动产并约定了租金和支付期数，但承租人出现了违约，并且后续法院判决出租人胜诉判承租人支付租金，但承租人仍然拒不支付并且名下无任何可执行的资产，但企业仍然按照法院判决确认了出租收入，理由是按照租赁准则有关承租人的规定和法院的判决，但实际根本无法收回。我也认为仅凭一纸判决不足以作为收入确认的依据，按照收入准则的相关理论基础实际在承租人出现违约的时候开始就应该谨慎确认收入了。但是租赁准则中有关承租人收入确认方面并没有明确指引应该参考收入准则或者其他有关谨慎性的规定。\n\n查了ifrs相关资料，只在ifrs16附录c中有“c1:企业应从2019年1月1日开始的年度报告期间起适用本准则。对于那些在本次准则首次生效之前已经适用国际财务报告准则第15号“客户合约的收入”的企业来说，它们可以提前适用本准则。如果企业选择提前适用本准则，那么必须披露这一事实。”附录d“企业不得在适用国际财务报告准则第15号“客户合约的收入”之前，同时适用国际财务报告准则第16号(见第c1段)。”是不是这里就表明了出租人收入确认的基础首先要符合收入准则中收入确认的相关基础规定，然后才按照租赁准则中出租人收入计量的规定会计处理。\n\n谢谢！ 根据《企业会计准则——基本准则》第三十一条：“收入只有在经济利益很可能流入从而导致企业资产增加或者负债减少、且经济利益的流入额能够可靠计量时才能予以确认。”这里的“收入”涵盖了由收入准则规范的营业收入、由租赁准则规范的租金收入，以及由金融工具准则规范的利息收入等。即，出租人对经营租赁的租金收入的确认，也应以“经济利益很可能流入”为前提。在明知承租人无支付能力的情况下，仅凭法院判决并不满足确认租金收入的条件，因为法院判决只是对该租金债权在法律上的确权，而不是对其可收回性的背书。\n\n依据：《应用指南2024》p16：\n\n(1) 收入是企业在日常活动中形成的。日常活动是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商业企业销售商品、保险公司签发保单、咨询公司提供咨询服务、软件企业为客户开发软件、安装公司提供安装服务、商业银行对外贷款、租赁公司出租资产等，均属于企业的日常活动。明确界定日常活动是为了将收入与利得相区分，因为企业非日常活动所形成的经济利益的流入不能确认为收入，而应当计入利得。例如，处置固定资产属于非日常活动，所形成的净利益就不应确认为收入，而应当确认为利得。又如，企业向客户授予知识产权等无形资产所取得的授权收入属千日常活动所形成的，应当确认为收入；但是处置无形资产属千非日常活动，所形成的净利益，不应确认为收入，而应当确认为利得。"}, {"tid": "5496491", "title": "生产型企业收到抵债房产后计提的减值准备能否计入非经常性损益？", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "shichengqi", "questionTime": "2026-03-24 16:53:57", "replyTime": "2026-04-06 14:52:39", "replySortTime": "2026-04-06 14:52:39", "url": "https://bbs.esnai.com/thread-5496491-1-4.html", "question": "请教陈版主，某生产型企业收到一些抵债房产，由于企业是被动接受抵债房产，该批抵债房产与公司的生产经营不直接相关，主要计入其他非流动资产，公司实际是以出售为目的而持有，那么对该部分房产计提的减值准备能否计入非经常性损益，以“不影响报表使用人对公司经营业绩和盈利能力做出正常判断”。谢谢！", "reply": "在债务重组完成，债权人取得对抵债资产的控制权之后，该抵债资产自身的市价下跌等损失不应认定为是非经常性损益。本质上这是应收账款坏账损失的延伸。\n\n另外，虽然《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》中，“（十二）债务重组损益”属于通常情况下属于非经常性损益的列举项目，但我们理解这主要是针对债务人所获得的债务重组收益而言的。对于债权人而言，因日常经营活动所产生的应收账款的债务重组损失原本就和坏账损失难以区分，也不能说与正常经营活动无关，且将损失作为非经常性本身就不谨慎，因此不建议债权人将债务重组损失列入非经常性损益。", "searchText": "5496491 生产型企业收到抵债房产后计提的减值准备能否计入非经常性损益？ 金融工具/外币/债务重组/abs shichengqi 请教陈版主，某生产型企业收到一些抵债房产，由于企业是被动接受抵债房产，该批抵债房产与公司的生产经营不直接相关，主要计入其他非流动资产，公司实际是以出售为目的而持有，那么对该部分房产计提的减值准备能否计入非经常性损益，以“不影响报表使用人对公司经营业绩和盈利能力做出正常判断”。谢谢！ 在债务重组完成，债权人取得对抵债资产的控制权之后，该抵债资产自身的市价下跌等损失不应认定为是非经常性损益。本质上这是应收账款坏账损失的延伸。\n\n另外，虽然《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》中，“（十二）债务重组损益”属于通常情况下属于非经常性损益的列举项目，但我们理解这主要是针对债务人所获得的债务重组收益而言的。对于债权人而言，因日常经营活动所产生的应收账款的债务重组损失原本就和坏账损失难以区分，也不能说与正常经营活动无关，且将损失作为非经常性本身就不谨慎，因此不建议债权人将债务重组损失列入非经常性损益。"}, {"tid": "5496490", "title": "商誉资产组分摊问题", "category": "合并/股权/权益法", "questionAuthor": "happycpv", "questionTime": "2026-03-24 16:24:11", "replyTime": "2026-04-06 14:47:30", "replySortTime": "2026-04-06 14:47:30", "url": "https://bbs.esnai.com/thread-5496490-1-3.html", "question": "甲公司为一集团公司，主要产品为A，A产品具有一定危险性，具体分为产品A1、A2。其中A1产品危险性低于A2，但其市场容量低，毛利也偏低。按照国家有关强制规定需在本期A1产品的产能达到A产品总量的一定比例，否则将减少A2产能批文，以使生产企业达标。甲公司为达到国家要求，又不想减少A2产能，则只能通过对外收购A1产能的公司来达标。本期非同一控制下收购乙公司，形成商誉，其产品全部为A1。在并购时甲公司已将如收购不成将减少A2产能的损失考虑到价格因素和收购方案当中。问题：商誉减值测试时甲公司将乙公司整体划分为资产组，对应收益法测算时除正常考虑乙公司自身的未来现金流外，是否应额外考虑因未减少A2产能从而减少的损失？乙公司如完全不考虑减产损失的因素，与实际收购时考虑因素不符，亦会造成较大的商誉减值。因为从甲公司并购目的来说，完全是冲着A1产能达标的目的去的，即使收购后完全不生产，也会产生较大的溢价。请陈版及论坛众位大神指教，应如何考虑商誉减值测试中未来现金流？或者认定甲公司与乙公司产生协商效应，将商誉在甲、乙公司之间分摊，不知是否合理？", "reply": "在本案例中，收购乙公司的溢价较高，其中包含了对于带入乙公司的A1产品产能相应可以不减少A2产品产能所产生的额外收益，即乙公司的A1产品资产组与甲公司原有的A1、A2资产组是作为一个整体进行管理的，彼此之间具有协同效应。因此，存在将乙公司的A1产品资产组与甲公司原有的A1、A2产品资产组构成一个组合进行整体考虑的可能性。具体看当时的测算依据以及现在收购后的实际运行情况。", "searchText": "5496490 商誉资产组分摊问题 合并/股权/权益法 happycpv 甲公司为一集团公司，主要产品为a，a产品具有一定危险性，具体分为产品a1、a2。其中a1产品危险性低于a2，但其市场容量低，毛利也偏低。按照国家有关强制规定需在本期a1产品的产能达到a产品总量的一定比例，否则将减少a2产能批文，以使生产企业达标。甲公司为达到国家要求，又不想减少a2产能，则只能通过对外收购a1产能的公司来达标。本期非同一控制下收购乙公司，形成商誉，其产品全部为a1。在并购时甲公司已将如收购不成将减少a2产能的损失考虑到价格因素和收购方案当中。问题：商誉减值测试时甲公司将乙公司整体划分为资产组，对应收益法测算时除正常考虑乙公司自身的未来现金流外，是否应额外考虑因未减少a2产能从而减少的损失？乙公司如完全不考虑减产损失的因素，与实际收购时考虑因素不符，亦会造成较大的商誉减值。因为从甲公司并购目的来说，完全是冲着a1产能达标的目的去的，即使收购后完全不生产，也会产生较大的溢价。请陈版及论坛众位大神指教，应如何考虑商誉减值测试中未来现金流？或者认定甲公司与乙公司产生协商效应，将商誉在甲、乙公司之间分摊，不知是否合理？ 在本案例中，收购乙公司的溢价较高，其中包含了对于带入乙公司的a1产品产能相应可以不减少a2产品产能所产生的额外收益，即乙公司的a1产品资产组与甲公司原有的a1、a2资产组是作为一个整体进行管理的，彼此之间具有协同效应。因此，存在将乙公司的a1产品资产组与甲公司原有的a1、a2产品资产组构成一个组合进行整体考虑的可能性。具体看当时的测算依据以及现在收购后的实际运行情况。"}, {"tid": "5496481", "title": "请教陈版，关于月中期间，被投资方的数据如何获取的问题", "category": "合并/股权/权益法", "questionAuthor": "gpqg", "questionTime": "2026-03-23 23:36:44", "replyTime": "2026-04-06 14:40:34", "replySortTime": "2026-04-06 14:40:34", "url": "https://bbs.esnai.com/thread-5496481-1-4.html", "question": "陈版，\n\nA 公司在 25 年年初与 B 公司投资设立甲公司，A 公司持有 20%股权，采用权益法核算。\n\n然后到了 25 年 12 月 16 日，C 公司也要投资甲公司，投资基准日就是 25 年 12 月 16 日，此时 A 公司持有甲公司的股权比例被稀释为 10%。\n\n我的问题是\n\nA 公司在计算从 25 年 1 月 1 日到 25 年 12 月 16 日期间所享有甲公司净利润的比例，要确认投资收益时，25 年 1 月 1 日至 25 年 12 月 16 日这段期间甲公司的净利润该怎么计算。因为是在月中，前不着村后不着店的，此时甲公司的净利润的数据也不好获取，此时在实务中该如何处理呢？\n\n谢谢陈版！", "reply": "理论上甲公司应在该日（2025.12.16）比照月末结账执行全套的结账流程，这样的结果最为准确。\n\n如果该做法不可行，则在2025年末结账的基础上确定12月全月的净利润和其他权益变动情况，从中可以明确识别发生日期的、性质特殊的交易的，根据其发生日期归入投资日之前或之后的期间；其他常规性，且单笔交易不明显重大的交易，可假设在全月均匀发生，按投资日前后两段时间的天数比例分拆12月净利润。", "searchText": "5496481 请教陈版，关于月中期间，被投资方的数据如何获取的问题 合并/股权/权益法 gpqg 陈版，\n\na 公司在 25 年年初与 b 公司投资设立甲公司，a 公司持有 20%股权，采用权益法核算。\n\n然后到了 25 年 12 月 16 日，c 公司也要投资甲公司，投资基准日就是 25 年 12 月 16 日，此时 a 公司持有甲公司的股权比例被稀释为 10%。\n\n我的问题是\n\na 公司在计算从 25 年 1 月 1 日到 25 年 12 月 16 日期间所享有甲公司净利润的比例，要确认投资收益时，25 年 1 月 1 日至 25 年 12 月 16 日这段期间甲公司的净利润该怎么计算。因为是在月中，前不着村后不着店的，此时甲公司的净利润的数据也不好获取，此时在实务中该如何处理呢？\n\n谢谢陈版！ 理论上甲公司应在该日（2025.12.16）比照月末结账执行全套的结账流程，这样的结果最为准确。\n\n如果该做法不可行，则在2025年末结账的基础上确定12月全月的净利润和其他权益变动情况，从中可以明确识别发生日期的、性质特殊的交易的，根据其发生日期归入投资日之前或之后的期间；其他常规性，且单笔交易不明显重大的交易，可假设在全月均匀发生，按投资日前后两段时间的天数比例分拆12月净利润。"}, {"tid": "5496472", "title": "将全资子公司承包出去，该如何账务处理？", "category": "合并/股权/权益法", "questionAuthor": "一云", "questionTime": "2026-03-23 14:37:37", "replyTime": "2026-04-06 14:24:36", "replySortTime": "2026-04-06 14:24:36", "url": "https://bbs.esnai.com/thread-5496472-1-4.html", "question": "本帖最后由 一云 于 2026-3-23 14:40 编辑\n\n      A公司将自己的全资子公司承包给自然人，承包期限5年，双方约定承包期间不管公司是否营利，承包人每年向A公司缴纳 20 万元承包费及上一年度营业额的 0.5%。该公司银行账户全部由承包人控制，A公司也不参与该公司经营管理。\n\n           请问承包期内，是否仍应将该子公司纳入合并范围？  如应纳入合并范围，那该如何核算该子公司的归母净资产和少数股东权益呢？   上缴的 20 万元承包费及上一年度营业额的 0.5%，在合并报表层面就别合并抵销掉了吧？", "reply": "承包期间内是否仍纳入合并范围的判断，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”之“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】。这些指引是从承包方角度写的，但出包方（原母公司）的处理原则与之对称，即承包方、出包方（原母公司）这两者中有且仅有一方对标的公司具有控制权。\n\n如果承包期限只有5年，承包期满后收回，不涉及股权转让等后续安排，则A公司大概率仍应将该子公司纳入合并报表范围。在合并报表中：（1）如果仍以该子公司名义对外经营，则承包方使用该子公司资产所形成的收入、成本、各项资产负债仍需纳入合并报表范围，只是将归属于承包方的收益计入各期成本费用；（2）如果以承包方名义对外经营，则相当于母公司将该子公司的相关资产出租给承包方，按经营租赁进行会计处理，取得的固定或收入0.5%的款项作为租金收入，但承包方通过使用子公司资产所形成的经营性收入和成本不需在合并利润表中体现。", "searchText": "5496472 将全资子公司承包出去，该如何账务处理？ 合并/股权/权益法 一云 本帖最后由 一云 于 2026-3-23 14:40 编辑\n\n      a公司将自己的全资子公司承包给自然人，承包期限5年，双方约定承包期间不管公司是否营利，承包人每年向a公司缴纳 20 万元承包费及上一年度营业额的 0.5%。该公司银行账户全部由承包人控制，a公司也不参与该公司经营管理。\n\n           请问承包期内，是否仍应将该子公司纳入合并范围？  如应纳入合并范围，那该如何核算该子公司的归母净资产和少数股东权益呢？   上缴的 20 万元承包费及上一年度营业额的 0.5%，在合并报表层面就别合并抵销掉了吧？ 承包期间内是否仍纳入合并范围的判断，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”之“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】。这些指引是从承包方角度写的，但出包方（原母公司）的处理原则与之对称，即承包方、出包方（原母公司）这两者中有且仅有一方对标的公司具有控制权。\n\n如果承包期限只有5年，承包期满后收回，不涉及股权转让等后续安排，则a公司大概率仍应将该子公司纳入合并报表范围。在合并报表中：（1）如果仍以该子公司名义对外经营，则承包方使用该子公司资产所形成的收入、成本、各项资产负债仍需纳入合并报表范围，只是将归属于承包方的收益计入各期成本费用；（2）如果以承包方名义对外经营，则相当于母公司将该子公司的相关资产出租给承包方，按经营租赁进行会计处理，取得的固定或收入0.5%的款项作为租金收入，但承包方通过使用子公司资产所形成的经营性收入和成本不需在合并利润表中体现。"}, {"tid": "5496471", "title": "这类买断房是否符合全额列收？", "category": "收入确认/总额净额", "questionAuthor": "jdyuan", "questionTime": "2026-03-23 10:22:38", "replyTime": "2026-04-06 14:14:58", "replySortTime": "2026-04-06 14:14:58", "url": "https://bbs.esnai.com/thread-5496471-1-3.html", "question": "公司与第三方单位A（非酒店）签定买断房1000间夜，合同约定A提供给我司的协议价保证最优惠政策，我司销售价不得高于酒店前台优惠价，若因A降价造成我司损失由A赔偿；非我司原因导致无法在约定时间内正常使用买断房源，A需负责为我司提供同等级别或更高级别、同等价位或更高价位的替代房源。", "reply": "建议考虑以下问题：\n\n1、第三方单位A不是酒店，那么也是代理商？其从酒店取得房源的方式是否同样是买断？\n\n2、本企业与A之间的结算方式是什么？在买断时是否已支付全款给A或酒店？\n\n3、该批买断房源的有效期是否足够长（例如超过一年或三个月）？买断数量是否小于正常情况下本企业销售的该酒店客房数量？\n\n4、实际操作中，本企业自主定价的实际空间是否足够大？因需求不足、价格变动等原因导致本企业回报的实际可变性情况如何？\n\n5、本企业的下游客户是终端客户，还是旅行社或其他代理商？与下游客户的结算条款如何设定？", "searchText": "5496471 这类买断房是否符合全额列收？ 收入确认/总额净额 jdyuan 公司与第三方单位a（非酒店）签定买断房1000间夜，合同约定a提供给我司的协议价保证最优惠政策，我司销售价不得高于酒店前台优惠价，若因a降价造成我司损失由a赔偿；非我司原因导致无法在约定时间内正常使用买断房源，a需负责为我司提供同等级别或更高级别、同等价位或更高价位的替代房源。 建议考虑以下问题：\n\n1、第三方单位a不是酒店，那么也是代理商？其从酒店取得房源的方式是否同样是买断？\n\n2、本企业与a之间的结算方式是什么？在买断时是否已支付全款给a或酒店？\n\n3、该批买断房源的有效期是否足够长（例如超过一年或三个月）？买断数量是否小于正常情况下本企业销售的该酒店客房数量？\n\n4、实际操作中，本企业自主定价的实际空间是否足够大？因需求不足、价格变动等原因导致本企业回报的实际可变性情况如何？\n\n5、本企业的下游客户是终端客户，还是旅行社或其他代理商？与下游客户的结算条款如何设定？"}, {"tid": "5496433", "title": "受托加工材料结余如何进行会计处理？", "category": "收入确认/总额净额", "questionAuthor": "鼻涕刺客", "questionTime": "2026-03-19 14:30:45", "replyTime": "2026-03-23 13:04:09", "replySortTime": "2026-03-23 13:04:09", "url": "https://bbs.esnai.com/thread-5496433-1-4.html", "question": "贵金属受托加工模式下，委托方提供材料，约定固定损耗率，受托方实际加工时，实际损耗率低于约定的固定损耗率，结余的材料归受托方，该部分结余材料对于受托方如何会计处理。\n\n3种方式：\n\n1、对于受托方，结余的材料按照公允价值入账、确认收入。借：原材料；贷：营业收入。\n\n2、对于受托方，结余的材料按照账面单位成本冲减成本。但可能导致加工成本为负。\n\n3、对于受托方，加工成本在同批次投入材料中分摊，结余材料入账价值=加工成本/材料投入量*结余量。\n\n请教陈版及各位大佬，哪种才符合会计准则及IPO审核要求？", "reply": "一般建议按主帖的方法一，即作为提供受托加工服务的交易对价的一部分，适用收入准则中的可变对价和非现金对价的处理原则。", "searchText": "5496433 受托加工材料结余如何进行会计处理？ 收入确认/总额净额 鼻涕刺客 贵金属受托加工模式下，委托方提供材料，约定固定损耗率，受托方实际加工时，实际损耗率低于约定的固定损耗率，结余的材料归受托方，该部分结余材料对于受托方如何会计处理。\n\n3种方式：\n\n1、对于受托方，结余的材料按照公允价值入账、确认收入。借：原材料；贷：营业收入。\n\n2、对于受托方，结余的材料按照账面单位成本冲减成本。但可能导致加工成本为负。\n\n3、对于受托方，加工成本在同批次投入材料中分摊，结余材料入账价值=加工成本/材料投入量*结余量。\n\n请教陈版及各位大佬，哪种才符合会计准则及ipo审核要求？ 一般建议按主帖的方法一，即作为提供受托加工服务的交易对价的一部分，适用收入准则中的可变对价和非现金对价的处理原则。"}, {"tid": "5496434", "title": "关于计提盈余公积的问题", "category": "列报/报表科目/其他", "questionAuthor": "ananand", "questionTime": "2026-03-19 16:00:12", "replyTime": "2026-03-23 13:02:26", "replySortTime": "2026-03-23 13:02:26", "url": "https://bbs.esnai.com/thread-5496434-1-4.html", "question": "请教陈版@chenyiwei 和各位，如果一家公司没有实收资本，本期弥补亏损后仍有盈利，是否需要计提盈余公积呢？", "reply": "这种情况下仍需计提盈余公积。\n\n根据《公司法》第210条：公司分配当年税后利润时，应当提取利润的百分之十列入公司法定公积金。公司法定公积金累计额为公司注册资本的百分之五十以上的，可以不再提取。\n\n因此，可以不再提取的条件是法定盈余公积的累计金额已达到注册资本的50%，而不是实收资本的50%。", "searchText": "5496434 关于计提盈余公积的问题 列报/报表科目/其他 ananand 请教陈版@chenyiwei 和各位，如果一家公司没有实收资本，本期弥补亏损后仍有盈利，是否需要计提盈余公积呢？ 这种情况下仍需计提盈余公积。\n\n根据《公司法》第210条：公司分配当年税后利润时，应当提取利润的百分之十列入公司法定公积金。公司法定公积金累计额为公司注册资本的百分之五十以上的，可以不再提取。\n\n因此，可以不再提取的条件是法定盈余公积的累计金额已达到注册资本的50%，而不是实收资本的50%。"}, {"tid": "5496435", "title": "同一控制下企业合并的界定", "category": "合并/股权/权益法", "questionAuthor": "傻傻的飞鸟", "questionTime": "2026-03-19 16:03:09", "replyTime": "2026-03-23 13:00:16", "replySortTime": "2026-03-23 13:00:16", "url": "https://bbs.esnai.com/thread-5496435-1-4.html", "question": "请教大家与陈版。省属国企一级单位A，100%控制二级单位B，B持有三级单位C51%股权，A持有三级单位C49%股权。以往年度由B编制与C单位的合并报表。现股权无偿划转，C的51%股权划转给A，由A来编制与C单位的合并报表。企业认为是同控，但我翻了19年的监管和陈版以前的回答，个人理解这是由间接控制变为直接控制的提级，不属于同控。想和陈版确认一下，对于A的账务处理只是长投换个明细就可以吗。谢谢大家以及陈版", "reply": "在划转前后，C都在A的合并报表范围之内。A并未因为该次划转而取得了对更多经济资源的控制权。对A而言，该次划转是其合并范围内的架构调整，而不是企业合并。主帖的理解是合理的。", "searchText": "5496435 同一控制下企业合并的界定 合并/股权/权益法 傻傻的飞鸟 请教大家与陈版。省属国企一级单位a，100%控制二级单位b，b持有三级单位c51%股权，a持有三级单位c49%股权。以往年度由b编制与c单位的合并报表。现股权无偿划转，c的51%股权划转给a，由a来编制与c单位的合并报表。企业认为是同控，但我翻了19年的监管和陈版以前的回答，个人理解这是由间接控制变为直接控制的提级，不属于同控。想和陈版确认一下，对于a的账务处理只是长投换个明细就可以吗。谢谢大家以及陈版 在划转前后，c都在a的合并报表范围之内。a并未因为该次划转而取得了对更多经济资源的控制权。对a而言，该次划转是其合并范围内的架构调整，而不是企业合并。主帖的理解是合理的。"}, {"tid": "5496445", "title": "请教陈版主：有关国资委划拨股权的合并报表的处理问题", "category": "合并/股权/权益法", "questionAuthor": "hahlee", "questionTime": "2026-03-20 10:31:28", "replyTime": "2026-03-23 12:58:46", "replySortTime": "2026-03-23 12:58:46", "url": "https://bbs.esnai.com/thread-5496445-1-4.html", "question": "国资委在2024年12月31日，将A集团的a公司、B集团的b公司等其他公司，分别按评估价值，划拨到完全新成立的C集团（该集团实际成立时间是在2025年3月），现编制2025年12月31日的合并报表，有几个问题想要请教陈版主：\n\n1.新成立的C集团的单体报表按照国资委批复的金额，期初（2024年12月31日）借记长期股权投资，贷记实收资本（批复有列明作为实收资本入账）的处理正确吗？\n\n2.国资委批复的a公司和b公司，其账面净资产均小于批复的划拨价值，原因是产生了评估增值，那么，合并报表的处理是按照评估增值的资产，借对应资产，贷资本公积吗？\n\n3.站在2025年12月31日，期初的合并资产负债表应包括各个划拨进来的子公司的账面价值，期初的利润表是否应该有各个子公司的数呢？那么合并的资产负债表的期初未分配利润是否应该有数？\n\n4.因为各个集团均属同一国资委的控制管理，分不清到底是按同控还是非同控处理。\n\n麻烦陈版主和各位老师了，谢谢！！", "reply": "1、C集团个别报表层面，因为接受国资委划拨的股权系按评估值作价出资，所以为了避免个别报表层面出现资本公积负数，可接受按国资委批复的金额（股权评估值）入账，对应贷记实收资本和资本公积的处理。\n\n2、C集团合并报表层面应遵循同一控制下合并的会计处理原则，以划入日作为合并日，以合并日取得A、B集团的账面净资产份额作为长期股权投资成本，与实收资本之间的差额借记或贷记资本公积。同时参照财政部会计司发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0211102_3762826.htm），C集团的合并报表应追溯至其成立日之前，视同A、B等被划入企业在最早期间期初已被纳入C集团的合并报表范围。\n\n3、基于上述2，2025年度C集团的合并报表是正常将A、B的全年数和上年比较数据纳入而编制的。前期的合并利润表中也包含A、B的上年数。合并资产负债表中应恢复被合并方A、B的留存收益，这是将A、B的前期利润表纳入合并范围所必然导致的留存收益滚存结果的体现。\n\n4、如上，属于同一控制下合并，只不过在C的个别报表层面为了避免资本公积出现负数而做了一些变通处理，在合并报表层面是严格遵循同一控制下合并的合并报表编制思路的。", "searchText": "5496445 请教陈版主：有关国资委划拨股权的合并报表的处理问题 合并/股权/权益法 hahlee 国资委在2024年12月31日，将a集团的a公司、b集团的b公司等其他公司，分别按评估价值，划拨到完全新成立的c集团（该集团实际成立时间是在2025年3月），现编制2025年12月31日的合并报表，有几个问题想要请教陈版主：\n\n1.新成立的c集团的单体报表按照国资委批复的金额，期初（2024年12月31日）借记长期股权投资，贷记实收资本（批复有列明作为实收资本入账）的处理正确吗？\n\n2.国资委批复的a公司和b公司，其账面净资产均小于批复的划拨价值，原因是产生了评估增值，那么，合并报表的处理是按照评估增值的资产，借对应资产，贷资本公积吗？\n\n3.站在2025年12月31日，期初的合并资产负债表应包括各个划拨进来的子公司的账面价值，期初的利润表是否应该有各个子公司的数呢？那么合并的资产负债表的期初未分配利润是否应该有数？\n\n4.因为各个集团均属同一国资委的控制管理，分不清到底是按同控还是非同控处理。\n\n麻烦陈版主和各位老师了，谢谢！！ 1、c集团个别报表层面，因为接受国资委划拨的股权系按评估值作价出资，所以为了避免个别报表层面出现资本公积负数，可接受按国资委批复的金额（股权评估值）入账，对应贷记实收资本和资本公积的处理。\n\n2、c集团合并报表层面应遵循同一控制下合并的会计处理原则，以划入日作为合并日，以合并日取得a、b集团的账面净资产份额作为长期股权投资成本，与实收资本之间的差额借记或贷记资本公积。同时参照财政部会计司发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0211102_3762826.htm），c集团的合并报表应追溯至其成立日之前，视同a、b等被划入企业在最早期间期初已被纳入c集团的合并报表范围。\n\n3、基于上述2，2025年度c集团的合并报表是正常将a、b的全年数和上年比较数据纳入而编制的。前期的合并利润表中也包含a、b的上年数。合并资产负债表中应恢复被合并方a、b的留存收益，这是将a、b的前期利润表纳入合并范围所必然导致的留存收益滚存结果的体现。\n\n4、如上，属于同一控制下合并，只不过在c的个别报表层面为了避免资本公积出现负数而做了一些变通处理，在合并报表层面是严格遵循同一控制下合并的合并报表编制思路的。"}, {"tid": "5496461", "title": "其他综合收益的递延所得税账务处理", "category": "合并/股权/权益法", "questionAuthor": "一云", "questionTime": "2026-03-21 23:36:02", "replyTime": "2026-03-23 12:50:37", "replySortTime": "2026-03-23 12:50:37", "url": "https://bbs.esnai.com/thread-5496461-1-4.html", "question": "请问:其他权益工具投资的公允价值变动确认的其他综合收益，是否和长期股权投资权益法确认的投资收益一样，如果计划长期持有该项投资，就不确认递延所得税负债？", "reply": "《企业会计准则第18号——所得税》第十二条的豁免规定仅适用于对子公司、合营企业和联营企业的长期股权投资。金融资产的公允价值变动不适用该项豁免规定。\n\n根据“足额确认递延所得税负债，谨慎确认递延所得税资产”的普遍原则，除了准则明确规定的豁免情形以外，其余情况下均应对应纳税暂时性差异足额确认递延所得税负债，不考虑其转回可能性和转回时预计有无足够多的应纳税所得额。所以对计划长期持有的其他权益工具投资的公允价值变动仍需确认递延所得税负债。", "searchText": "5496461 其他综合收益的递延所得税账务处理 合并/股权/权益法 一云 请问:其他权益工具投资的公允价值变动确认的其他综合收益，是否和长期股权投资权益法确认的投资收益一样，如果计划长期持有该项投资，就不确认递延所得税负债？ 《企业会计准则第18号——所得税》第十二条的豁免规定仅适用于对子公司、合营企业和联营企业的长期股权投资。金融资产的公允价值变动不适用该项豁免规定。\n\n根据“足额确认递延所得税负债，谨慎确认递延所得税资产”的普遍原则，除了准则明确规定的豁免情形以外，其余情况下均应对应纳税暂时性差异足额确认递延所得税负债，不考虑其转回可能性和转回时预计有无足够多的应纳税所得额。所以对计划长期持有的其他权益工具投资的公允价值变动仍需确认递延所得税负债。"}, {"tid": "5496426", "title": "请教陈版：关于对外投资的参股公司业务分拆的账务处理", "category": "合并/股权/权益法", "questionAuthor": "hy2608", "questionTime": "2026-03-18 19:59:59", "replyTime": "2026-03-20 07:13:53", "replySortTime": "2026-03-20 07:13:53", "url": "https://bbs.esnai.com/thread-5496426-1-4.html", "question": "陈版好，甲公司早期投资乙公司，在其他权益工具核算，假设2025年12月31日，公允价值3000万，此时，乙公司将有良好发展前景和较高估值的A业务单独拆分出来设立丙公司，甲公司作为乙公司老股东，又通过股权置换的方式，将对乙公司的股权下沉到丁有限合伙和戊有限合伙，这两个持股平台都只投资丙公司，合计持有丙公司的持股比例仍为原持股乙公司的比例，即甲公司将原对乙公司的投资转换成对两个持股平台的投资，穿透下去就是对丙公司的投资，假设公允价值还是3000万，想请教陈版，要怎么进行账务处理，因为现在直接持股的是两个有限合伙，是否要终止原来的其他权益工具的确认，然后增加两个其他非流动金融资产。但是实际上对这两个持股平台的投资，穿透下去就是将对原来甲公司的投资下沉到了对其子公司的投资，投资目的和实质应该算没有发生变化，这种情况下是不是还是只能在其他权益工具投资核算呢（直接穿透确认对丙公司的投资）。期盼陈版指教。", "reply": "如果这两个有限合伙企业是有限寿命主体，或者由其他原因导致其合伙份额不满足权益工具的定义，则如主帖所述，需终止确认原先对丙公司的“其他权益工具投资”，并初始确认对这两个有限合伙企业的投资（其他非流动金融资产）。虽然“投资目的和实质应该算没有发生变化”，但按照现行金融工具准则规定，也只能如此处理。", "searchText": "5496426 请教陈版：关于对外投资的参股公司业务分拆的账务处理 合并/股权/权益法 hy2608 陈版好，甲公司早期投资乙公司，在其他权益工具核算，假设2025年12月31日，公允价值3000万，此时，乙公司将有良好发展前景和较高估值的a业务单独拆分出来设立丙公司，甲公司作为乙公司老股东，又通过股权置换的方式，将对乙公司的股权下沉到丁有限合伙和戊有限合伙，这两个持股平台都只投资丙公司，合计持有丙公司的持股比例仍为原持股乙公司的比例，即甲公司将原对乙公司的投资转换成对两个持股平台的投资，穿透下去就是对丙公司的投资，假设公允价值还是3000万，想请教陈版，要怎么进行账务处理，因为现在直接持股的是两个有限合伙，是否要终止原来的其他权益工具的确认，然后增加两个其他非流动金融资产。但是实际上对这两个持股平台的投资，穿透下去就是将对原来甲公司的投资下沉到了对其子公司的投资，投资目的和实质应该算没有发生变化，这种情况下是不是还是只能在其他权益工具投资核算呢（直接穿透确认对丙公司的投资）。期盼陈版指教。 如果这两个有限合伙企业是有限寿命主体，或者由其他原因导致其合伙份额不满足权益工具的定义，则如主帖所述，需终止确认原先对丙公司的“其他权益工具投资”，并初始确认对这两个有限合伙企业的投资（其他非流动金融资产）。虽然“投资目的和实质应该算没有发生变化”，但按照现行金融工具准则规定，也只能如此处理。"}, {"tid": "5496423", "title": "请教版主关于关于公司新开的肯德基加盟店的收入，是按总额法还是净额法", "category": "收入确认/总额净额", "questionAuthor": "xiaoxiao1219", "questionTime": "2026-03-18 09:43:26", "replyTime": "2026-03-20 07:09:35", "replySortTime": "2026-03-20 07:09:35", "url": "https://bbs.esnai.com/thread-5496423-1-4.html", "question": "公司是一个在高速服务区经营的，包括加油站、便利店和餐饮区域，其中餐饮区域本年与肯德基合作，以加盟店的方式，所有环节都委托肯德基提供，包括装修、设备、人员、系统、采购、配送等，公司收取银行流水，同时按月支付授权费费用、各项服务费用。请问版主应该是总额法还是净额法确认收入。", "reply": "如果实际经营是归肯德基方面负责，本企业只是提供场地、收取资金流水，则按净额法核算，并需考虑该交易是否实质上构成一项租赁场地的安排。\n\n如果实际经营由本企业负责，肯德基只是负责提供经营标准和规范方面的指导，在符合肯德基经营标准的前提下，本企业仍有一定的自主经营权，则也有可能应采用总额法核算。\n\n总之具体取决于业务合作的具体模式。", "searchText": "5496423 请教版主关于关于公司新开的肯德基加盟店的收入，是按总额法还是净额法 收入确认/总额净额 xiaoxiao1219 公司是一个在高速服务区经营的，包括加油站、便利店和餐饮区域，其中餐饮区域本年与肯德基合作，以加盟店的方式，所有环节都委托肯德基提供，包括装修、设备、人员、系统、采购、配送等，公司收取银行流水，同时按月支付授权费费用、各项服务费用。请问版主应该是总额法还是净额法确认收入。 如果实际经营是归肯德基方面负责，本企业只是提供场地、收取资金流水，则按净额法核算，并需考虑该交易是否实质上构成一项租赁场地的安排。\n\n如果实际经营由本企业负责，肯德基只是负责提供经营标准和规范方面的指导，在符合肯德基经营标准的前提下，本企业仍有一定的自主经营权，则也有可能应采用总额法核算。\n\n总之具体取决于业务合作的具体模式。"}, {"tid": "5496421", "title": "请教陈版，培训机构考试费的处理", "category": "收入确认/总额净额", "questionAuthor": "不哎上班", "questionTime": "2026-03-17 22:44:56", "replyTime": "2026-03-20 07:06:36", "replySortTime": "2026-03-20 07:06:36", "url": "https://bbs.esnai.com/thread-5496421-1-4.html", "question": "请教陈版：\n\n我们公司是一家无人机培训机构，学费8000元，其中700元是考试费（培训协议也写明了培训费7300，考试费700元），学员经过二个月的培训达标后，我们公司给学员报考，然后由我们公司将700元的考试费交给考试机构，考试结束后考试机构将发票开给我们，考试机构不能给学员开票，另外学员如果挂科了，学员可以在合同有效期内继续免费学习，但是补考费需要另外向我们公司缴纳700元，补考时，再由我们公司向考试机构缴纳700元。\n\n请教陈版，收到和支付的考试费是分别计入收入成本呢？还是做代收代缴处理呢？", "reply": "从主帖信息来看， 此处的考试费的代收代付具有强制性（考试机构不能给学员开票），本企业也不承担因学员不通过考试而需再次考试的考试费支出；考试费标准由考试机构制定，本企业无自主定价权，平进平出。\n\n因此，考试费应按代收代付处理，通过往来款核算，不计入本机构的收入和成本。", "searchText": "5496421 请教陈版，培训机构考试费的处理 收入确认/总额净额 不哎上班 请教陈版：\n\n我们公司是一家无人机培训机构，学费8000元，其中700元是考试费（培训协议也写明了培训费7300，考试费700元），学员经过二个月的培训达标后，我们公司给学员报考，然后由我们公司将700元的考试费交给考试机构，考试结束后考试机构将发票开给我们，考试机构不能给学员开票，另外学员如果挂科了，学员可以在合同有效期内继续免费学习，但是补考费需要另外向我们公司缴纳700元，补考时，再由我们公司向考试机构缴纳700元。\n\n请教陈版，收到和支付的考试费是分别计入收入成本呢？还是做代收代缴处理呢？ 从主帖信息来看， 此处的考试费的代收代付具有强制性（考试机构不能给学员开票），本企业也不承担因学员不通过考试而需再次考试的考试费支出；考试费标准由考试机构制定，本企业无自主定价权，平进平出。\n\n因此，考试费应按代收代付处理，通过往来款核算，不计入本机构的收入和成本。"}, {"tid": "5496412", "title": "关于资产负债表日后事项", "category": "审计/报告表达", "questionAuthor": "踏雪无痕68", "questionTime": "2026-03-17 10:34:27", "replyTime": "2026-03-20 07:02:25", "replySortTime": "2026-03-20 07:02:25", "url": "https://bbs.esnai.com/thread-5496412-1-4.html", "question": "我公司有一笔长期借款10000万，借款期限2025.08.13-2028.08.12。合同约定2026.08.12偿还3000万，2027.08.12偿还3500万，2028.08.12偿还3500万。2025.12.31借款余额为10000万。2025.12.31时点，基于合同约定，将2026.08.12偿还的3000万重分类至“一年内到期的非流动负债”。\n\n但公司于2026.02.10公司提前偿还3332.64万，也未与银行就还款事项签署补充协议。\n\n请教陈版及各位老师，公司于2026.02.10提前偿还的3332.64万是否属于资产负债表日后调整事项（我公司2025年财务报告报出日为2026年4月25日），2025.12.31日报表是否应将该笔长期借款重分类至“一年内到期的非流动负债”金额调整为3332.64万？", "reply": "1、既然未与银行就还款事项签署补充协议，则为何提前偿还部分贷款？是因为2月份资金充足而临时作出的决定，或者其他？这个提前还款事项，站在2025年末时点，基于当时可获得的信息，能否合理预见？这是判断是否属于资产负债表日后调整事项的前提。\n\n2、负债流动性的判断应依据《企业会计准则第30号——财务报表列报（2014年修订）》和《企业会计准则解释第17号》第一条的规定。根据《企业会计准则解释第17号》第一条规定：“对于符合《企业会计准则第30号——财务报表列报》非流动负债划分条件的负债，即使企业有意图或者计划在资产负债表日后一年内（含一年，下同）提前清偿该负债，或者在资产负债表日至财务报告批准报出日之间已提前清偿该负债，该负债仍应归类为非流动负债。”。如果除了合同约定应于1年呢偿还的3000万元以外，额外多偿还的332.64万元并无合同约定，而是本企业自行行使提前还款权的结果，则该332.64万元在2025年末仍属于非流动负债。", "searchText": "5496412 关于资产负债表日后事项 审计/报告表达 踏雪无痕68 我公司有一笔长期借款10000万，借款期限2025.08.13-2028.08.12。合同约定2026.08.12偿还3000万，2027.08.12偿还3500万，2028.08.12偿还3500万。2025.12.31借款余额为10000万。2025.12.31时点，基于合同约定，将2026.08.12偿还的3000万重分类至“一年内到期的非流动负债”。\n\n但公司于2026.02.10公司提前偿还3332.64万，也未与银行就还款事项签署补充协议。\n\n请教陈版及各位老师，公司于2026.02.10提前偿还的3332.64万是否属于资产负债表日后调整事项（我公司2025年财务报告报出日为2026年4月25日），2025.12.31日报表是否应将该笔长期借款重分类至“一年内到期的非流动负债”金额调整为3332.64万？ 1、既然未与银行就还款事项签署补充协议，则为何提前偿还部分贷款？是因为2月份资金充足而临时作出的决定，或者其他？这个提前还款事项，站在2025年末时点，基于当时可获得的信息，能否合理预见？这是判断是否属于资产负债表日后调整事项的前提。\n\n2、负债流动性的判断应依据《企业会计准则第30号——财务报表列报（2014年修订）》和《企业会计准则解释第17号》第一条的规定。根据《企业会计准则解释第17号》第一条规定：“对于符合《企业会计准则第30号——财务报表列报》非流动负债划分条件的负债，即使企业有意图或者计划在资产负债表日后一年内（含一年，下同）提前清偿该负债，或者在资产负债表日至财务报告批准报出日之间已提前清偿该负债，该负债仍应归类为非流动负债。”。如果除了合同约定应于1年呢偿还的3000万元以外，额外多偿还的332.64万元并无合同约定，而是本企业自行行使提前还款权的结果，则该332.64万元在2025年末仍属于非流动负债。"}, {"tid": "5496411", "title": "长期股权投资核算问题", "category": "合并/股权/权益法", "questionAuthor": "踏雪无痕68", "questionTime": "2026-03-17 10:17:12", "replyTime": "2026-03-20 06:55:44", "replySortTime": "2026 uestionAuthor": "lbwl", "questionTime": "2026-03-17 09:23:16", "replyTime": "2026-03-17 20:12:56", "replySortTime": "2026-03-17 20:12:56", "url": "https://bbs.esnai.com/thread-5496408-1-5.html", "question": "我公司（下文中甲方）和A公司（下文中乙方）共同投资设立B公司，我公司占80%，A公司占20%，同时合作协议约定：\n\n 1 投资成本保障：甲方承诺，保障乙方的全部投资成本。若目标公司运营过程中产生亏 损，全部亏损由甲方独自承担，确保乙方的出资本金不受任何损失； 若目标公司清算后，乙方出资本金未能足额收回，差额部分由甲方在 清算完毕后30日内补足。\n\n 2 收益分配：基于甲方承担的投资成本保障责任，双方约定， 目标公司的可分配收益(指扣除目标公司全部运营成本、税费、法定 公积金、任意公积金及公司章程约定的其他扣除项后的净利润),按 如下比例分配：甲方享有80%的可分配收益，乙方享有20%的可分配 收益。                                                                                         想请教陈版，我方对合作方有投资成本保障的情况下，相当于对于B公司的风险都由我公司承担，但是分红我公司按照80%分配，我司对B公司的持股比例应该按多少计算，确认投资收益按多少比例计算", "reply": "主帖中的交易，相当于母公司（本企业，甲方）授予少数股东（乙方）一项卖出期权，行权价格等于乙方对B公司的实际投资成本。对该项期权，在个别报表层面作为一项以公允价值计量且其变动计入损益的金融负债处理。在合并报表层面需按照《企业会计准则第37号——金融工具列报》第十一条规定，确认一项回购自身权益工具（少数股东权益）的金融负债（对应借记资本公积）。\n\n除此之外，个别报表层面对B公司的长期股权投资按成本法核算；合并报表层面按常规方法确认少数股东损益和少数股东权益。", "searchText": "5496408 请教陈版，对合作方有投资保本的情况下如何处理问题 政府补助/ppp/税费/现金流 lbwl 我公司（下文中甲方）和a公司（下文中乙方）共同投资设立b公司，我公司占80%，a公司占20%，同时合作协议约定：\n\n 1 投资成本保障：甲方承诺，保障乙方的全部投资成本。若目标公司运营过程中产生亏 损，全部亏损由甲方独自承担，确保乙方的出资本金不受任何损失； 若目标公司清算后，乙方出资本金未能足额收回，差额部分由甲方在 清算完毕后30日内补足。\n\n 2 收益分配：基于甲方承担的投资成本保障责任，双方约定， 目标公司的可分配收益(指扣除目标公司全部运营成本、税费、法定 公积金、任意公积金及公司章程约定的其他扣除项后的净利润),按 如下比例分配：甲方享有80%的可分配收益，乙方享有20%的可分配 收益。                                                                                         想请教陈版，我方对合作方有投资成本保障的情况下，相当于对于b公司的风险都由我公司承担，但是分红我公司按照80%分配，我司对b公司的持股比例应该按多少计算，确认投资收益按多少比例计算 主帖中的交易，相当于母公司（本企业，甲方）授予少数股东（乙方）一项卖出期权，行权价格等于乙方对b公司的实际投资成本。对该项期权，在个别报表层面作为一项以公允价值计量且其变动计入损益的金融负债处理。在合并报表层面需按照《企业会计准则第37号——金融工具列报》第十一条规定，确认一项回购自身权益工具（少数股东权益）的金融负债（对应借记资本公积）。\n\n除此之外，个别报表层面对b公司的长期股权投资按成本法核算；合并报表层面按常规方法确认少数股东损益和少数股东权益。"}, {"tid": "5496406", "title": "求助陈版主 关于收入确认", "category": "收入确认/总额净额", "questionAuthor": "大ye木2", "questionTime": "2026-03-16 21:37:17", "replyTime": "2026-03-17 20:08:47", "replySortTime": "2026-03-17 20:08:47", "url": "https://bbs.esnai.com/thread-5496406-1-5.html", "question": "本帖最后由 大ye木2 于 2026-3-16 21:38 编辑\n\n请教陈版主。公司业务模式：客户要求先开模具，再生产产品，模具所有权归属客户，但放在公司用于生产产品。产品周期10个月，开发模具投入100万，模具按照10个月摊销计入生产成本，后客户给予模具补贴20万。这笔模具补贴20万该如何会计处理，是先计入合同负债，按照10个月摊销？还是一次性确认收入，同时从模具开发投入中取20万结转成本，余下80万按10个月分摊计入生产成本？", "reply": "这种情况下，模具制作一般构成单项履约义务。参考：《监管规则适用指引——会计类第2号》之“2-1 识别履约义务时商品或服务是否具有高度关联性的判断”。因此，理论上应在模具开发完成并经客户验收确认，即将转入产品量产阶段时，确认与该项履约义务对应的收入。除非金额不能可靠计量，取决于量产阶段的产品产量，否则此类收入不应递延到量产阶段确认。\n\n如果客户给予的模具补贴明显低于其开发成本，不能代表该项履约义务的单独售价，则应注意按照可变对价等原则合理、谨慎地估计对应于该项履约义务的合同价格（例如，如果能够合理保证其开发成本均可获得回收的，则按已发生的开发成本确认等额的收入），超出合同约定的模具补贴的差额确认为合同资产。后续量产期间内，采用系统、合理的方法区分产品售价中的“该项产品本身的售价”和“模具价款回收额”两部分。", "searchText": "5496406 求助陈版主 关于收入确认 收入确认/总额净额 大ye木2 本帖最后由 大ye木2 于 2026-3-16 21:38 编辑\n\n请教陈版主。公司业务模式：客户要求先开模具，再生产产品，模具所有权归属客户，但放在公司用于生产产品。产品周期10个月，开发模具投入100万，模具按照10个月摊销计入生产成本，后客户给予模具补贴20万。这笔模具补贴20万该如何会计处理，是先计入合同负债，按照10个月摊销？还是一次性确认收入，同时从模具开发投入中取20万结转成本，余下80万按10个月分摊计入生产成本？ 这种情况下，模具制作一般构成单项履约义务。参考：《监管规则适用指引——会计类第2号》之“2-1 识别履约义务时商品或服务是否具有高度关联性的判断”。因此，理论上应在模具开发完成并经客户验收确认，即将转入产品量产阶段时，确认与该项履约义务对应的收入。除非金额不能可靠计量，取决于量产阶段的产品产量，否则此类收入不应递延到量产阶段确认。\n\n如果客户给予的模具补贴明显低于其开发成本，不能代表该项履约义务的单独售价，则应注意按照可变对价等原则合理、谨慎地估计对应于该项履约义务的合同价格（例如，如果能够合理保证其开发成本均可获得回收的，则按已发生的开发成本确认等额的收入），超出合同约定的模具补贴的差额确认为合同资产。后续量产期间内，采用系统、合理的方法区分产品售价中的“该项产品本身的售价”和“模具价款回收额”两部分。"}, {"tid": "5496399", "title": "请教陈版主，关于商誉减值测试中持续计算的可辨认净资产", "category": "合并/股权/权益法", "questionAuthor": "wx_5fcf12e13db8", "questionTime": "2026-03-16 17:09:50", "replyTime": "2026-03-17 19:42:58", "replySortTime": "2026-03-17 19:42:58", "url": "https://bbs.esnai.com/thread-5496399-1-3.html", "question": "请教陈版，有个理论问题想请教下陈版主：\n\n企业在对商誉进行减值测试时，是用按照购买日公允价值持续计算的可辨认净资产的账面价值+完全商誉跟子公司的可收回金额比较。（假设子公司整体跟商誉相关）\n\n这里按照购买日公允价值持续计算的可辨认净资产的账面价值，需要考虑公不等于账的调整，是否需要考虑内部交易对净利润或者净资产的调整呢？\n\n顺流交易中子公司净资产中虚增，逆流交易中子公司利润虚增，从调整子公司净利润和净资产的角度视乎都可以考虑内部交易的影响，不知道实务中是否会考虑，还是只考虑顺流或者逆流中的某一种呢？\n\n感谢陈版主。", "reply": "“这里按照购买日公允价值持续计算的可辨认净资产的账面价值”也就是该资产组内各项资产、负债在合并报表层面的账面价值。如果其中某些资产属于内部交易的标的资产，则其账面价值应按抵销内部交易未实现损益后的余额确定。", "searchText": "5496399 请教陈版主，关于商誉减值测试中持续计算的可辨认净资产 合并/股权/权益法 wx_5fcf12e13db8 请教陈版，有个理论问题想请教下陈版主：\n\n企业在对商誉进行减值测试时，是用按照购买日公允价值持续计算的可辨认净资产的账面价值+完全商誉跟子公司的可收回金额比较。（假设子公司整体跟商誉相关）\n\n这里按照购买日公允价值持续计算的可辨认净资产的账面价值，需要考虑公不等于账的调整，是否需要考虑内部交易对净利润或者净资产的调整呢？\n\n顺流交易中子公司净资产中虚增，逆流交易中子公司利润虚增，从调整子公司净利润和净资产的角度视乎都可以考虑内部交易的影响，不知道实务中是否会考虑，还是只考虑顺流或者逆流中的某一种呢？\n\n感谢陈版主。 “这里按照购买日公允价值持续计算的可辨认净资产的账面价值”也就是该资产组内各项资产、负债在合并报表层面的账面价值。如果其中某些资产属于内部交易的标的资产，则其账面价值应按抵销内部交易未实现损益后的余额确定。"}, {"tid": "5496398", "title": "退回往年预收款支付的现金流如何列报？", "category": "收入确认/总额净额", "questionAuthor": "一云", "questionTime": "2026-03-16 16:18:10", "replyTime": "2026-03-17 19:41:20", "replySortTime": "2026-03-17 19:41:20", "url": "https://bbs.esnai.com/thread-5496398-1-5.html", "question": "陈老师：  A企业本年退回了一笔大额预收款（去年收到的），那这笔退款现金流是冲减“销售商品收到的现金”呢，还是列到“支付的其他与经营活动有关的现金”呢？   注：这笔预收款款金额很大，覆盖了本期销售商品收到的现金，如果冲减“销售商品收到的现金“后，会形成负数。\n\n                                                     一云", "reply": "一般情况下现金流量表正表中的项目是尽量避免出现负数的。如大额退款导致“销售商品、提供劳务收到的现金”出现负数的，则一般建议将该项退款列入“支付其他与经营活动有关的现金”，需注意在附注中披露其原因和具体内容。", "searchText": "5496398 退回往年预收款支付的现金流如何列报？ 收入确认/总额净额 一云 陈老师：  a企业本年退回了一笔大额预收款（去年收到的），那这笔退款现金流是冲减“销售商品收到的现金”呢，还是列到“支付的其他与经营活动有关的现金”呢？   注：这笔预收款款金额很大，覆盖了本期销售商品收到的现金，如果冲减“销售商品收到的现金“后，会形成负数。\n\n                                                     一云 一般情况下现金流量表正表中的项目是尽量避免出现负数的。如大额退款导致“销售商品、提供劳务收到的现金”出现负数的，则一般建议将该项退款列入“支付其他与经营活动有关的现金”，需注意在附注中披露其原因和具体内容。"}, {"tid": "5496391", "title": "无形资产摊销问题", "category": "收入确认/总额净额", "questionAuthor": "18819490381", "questionTime": "2026-03-16 09:26:05", "replyTime": "2026-03-17 19:39:50", "replySortTime": "2026-03-17 19:39:50", "url": "https://bbs.esnai.com/thread-5496391-1-4.html", "question": "A公司请服务商做了一个管理系统项目，该项目费用包含硬件设备费用、软件开发费用、软件维护费用、系统服务器费用，现项目已验收了，那是否要将硬件设备计入固定资产折旧、软件开发费用与软件维护费用及系统服务器费用计入无形资产摊销？另外软件的相关费用摊销的话，按多少年去摊销呢，按什么标准呢？", "reply": "1、除了嵌入式软件（与特定硬件平台绑定，仅可在该平台上运行，不能在其他平台运行的软件）应计入固定资产成本以外，其他情形下硬件和软件应分别确认为固定资产和无形资产，分别计提折旧和摊销。\n\n2、软件维护费属于每年都要发生的、旨在维持系统原有功能稳定运行的支出，故应在发生时直接费用化处理，不应资本化和摊销。\n\n服务器如采用租赁的，应考虑是否适用租赁准则（即是否具备“租赁三要素”）。如不属于租赁的，则参照软件维护费处理，直接费用化；如一次预付多年的服务器费用的，可确认为长期待摊费用并分年摊销。\n\n软件的摊销年限为其预计使用年限，一般按5-10年。", "searchText": "5496391 无形资产摊销问题 收入确认/总额净额 18819490381 a公司请服务商做了一个管理系统项目，该项目费用包含硬件设备费用、软件开发费用、软件维护费用、系统服务器费用，现项目已验收了，那是否要将硬件设备计入固定资产折旧、软件开发费用与软件维护费用及系统服务器费用计入无形资产摊销？另外软件的相关费用摊销的话，按多少年去摊销呢，按什么标准呢？ 1、除了嵌入式软件（与特定硬件平台绑定，仅可在该平台上运行，不能在其他平台运行的软件）应计入固定资产成本以外，其他情形下硬件和软件应分别确认为固定资产和无形资产，分别计提折旧和摊销。\n\n2、软件维护费属于每年都要发生的、旨在维持系统原有功能稳定运行的支出，故应在发生时直接费用化处理，不应资本化和摊销。\n\n服务器如采用租赁的，应考虑是否适用租赁准则（即是否具备“租赁三要素”）。如不属于租赁的，则参照软件维护费处理，直接费用化；如一次预付多年的服务器费用的，可确认为长期待摊费用并分年摊销。\n\n软件的摊销年限为其预计使用年限，一般按5-10年。"}, {"tid": "5496382", "title": "是保留还是否定？", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "xuxcpa", "questionTime": "2026-03-15 06:04:40", "replyTime": "2026-03-17 07:34:11", "replySortTime": "2026-03-17 07:34:11", "url": "https://bbs.esnai.com/thread-5496382-1-5.html", "question": "假如一小企业会计准则下，资产总额3000万，营收3000万，利润总额 80万，但有一项无形资产未摊销，应摊160万，超出重要性水平，摊后可能要亏80万，但企业不同意调报表，应在审计报告中出具什么意见（假如要出报告的话），是影响重大但不广泛吗？", "reply": "盈亏性质发生改变，通常认为该错报的影响重大且具有广泛性，故一般理解应出具否定意见报告。", "searchText": "5496382 是保留还是否定？ 资产/存货/固定资产/无形资产 xuxcpa 假如一小企业会计准则下，资产总额3000万，营收3000万，利润总额 80万，但有一项无形资产未摊销，应摊160万，超出重要性水平，摊后可能要亏80万，但企业不同意调报表，应在审计报告中出具什么意见（假如要出报告的话），是影响重大但不广泛吗？ 盈亏性质发生改变，通常认为该错报的影响重大且具有广泛性，故一般理解应出具否定意见报告。"}, {"tid": "5496372", "title": "同一控制下的企业合并，先控股卖给控制股东又从控股股东作全额购回，少数股东权益。", "category": "合并/股权/权益法", "questionAuthor": "Zero147524", "questionTime": "2026-03-14 09:24:20", "replyTime": "2026-03-17 07:28:07", "replySortTime": "2026-03-17 07:28:07", "url": "https://bbs.esnai.com/thread-5496372-1-5.html", "question": "A公司下面有一家子公司B公司，直接持股B公司90%的股权，另外一个股东是合伙企业C合伙企业，C合伙企业持有B公司10%的股份，C合伙企业的股东是A公司持有79.8969%，D股东（个人也是A公司的控股股东）持有19.0722%，E（个人）持有1.0309%，A公司于2024年6月30日，把B公司出售给股东D，D全资持有B公司，A公司于2025年12月又从D股东中购回100%的股份，问编制合并报表时，初期也就是2024年12月31日时点是否考虑到少数股东权益，还是考虑同一控制下的企业合并100%的股权。编制2025年合并报表，合并B公司的数是否要考虑少数股东的情况？", "reply": "在2024年6月30日、2025年12月两次股权交易不构成一揽子交易的前提下，2025年12月的股权购回构成同一控制下合并，相应地，在A的合并报表中，应追溯此前D持有的10%股权，视同在整个报告期间内不存在少数股权。在合并报表中，需抵销2024年6月30日处置B公司90%股权的损益，将股权转让款的收付按权益性交易予以调整（支付股权款冲减权益，收到股权款增加权益）。 接方。金融租赁公司只是资金提供方，并不取得商品（电站资产）的控制权。\n\n2、为最终股权承接方c。原理同上。"}, {"tid": "5493066", "title": "关于事务所代编会计分录的独立性问题", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "yuzhan0727", "questionTime": "2025-07-02 13:07:39", "replyTime": "2026-03-14 17:00:49", "replySortTime": "2026-03-14 17:00:49", "url": "https://bbs.esnai.com/thread-5493066-1-5.html", "question": "本帖最后由 yuzhan0727 于 2025-7-2 13:13 编辑\n\n请教陈版主：\n\n  今年7月1日执行的的中国注册会计师独立性准则第1号——财务报表审计和审阅业务对独立性的要求，如客户没做租赁准则规定的相关会计处理，签字CPA做的，属于这个108条第4项的内容“”吗？", "reply": "wjcpa9568 发表于 2026-3-12 13:38\n\n陈老师，请问中国注册会计师独立性准则第1号自 2025 年 7 月 1 日起施行，配套应用指南自发布之日2026年2 ...\n\n根据中注协发布应用指南的通知：“应用指南是对准则重要条款的进一步解释、说明和举例，旨在帮助注册会计师准确理解准则要求背后的目的和意图，讲解在实务中如何理解和执行这些要求，并在必要时提供相关举例。应用指南并不增加额外的要求。注册会计师应当掌握准则及应用指南的全部内容，以理解每项准则条款的目标并恰当遵守其要求。”\n\n因此，首次执行独立性准则的日期还是2025年7月1日，不应因为当时尚未发布应用指南而不执行。", "searchText": "5493066 关于事务所代编会计分录的独立性问题 租赁/使用权资产/融资租赁 yuzhan0727 本帖最后由 yuzhan0727 于 2025-7-2 13:13 编辑\n\n请教陈版主：\n\n  今年7月1日执行的的中国注册会计师独立性准则第1号——财务报表审计和审阅业务对独立性的要求，如客户没做租赁准则规定的相关会计处理，签字cpa做的，属于这个108条第4项的内容“”吗？ wjcpa9568 发表于 2026-3-12 13:38\n\n陈老师，请问中国注册会计师独立性准则第1号自 2025 年 7 月 1 日起施行，配套应用指南自发布之日2026年2 ...\n\n根据中注协发布应用指南的通知：“应用指南是对准则重要条款的进一步解释、说明和举例，旨在帮助注册会计师准确理解准则要求背后的目的和意图，讲解在实务中如何理解和执行这些要求，并在必要时提供相关举例。应用指南并不增加额外的要求。注册会计师应当掌握准则及应用指南的全部内容，以理解每项准则条款的目标并恰当遵守其要求。”\n\n因此，首次执行独立性准则的日期还是2025年7月1日，不应因为当时尚未发布应用指南而不执行。"}, {"tid": "5496351", "title": "应付客户对价还是销售费用-游戏玩家赛事奖金发放", "category": "收入确认/总额净额", "questionAuthor": "June111111", "questionTime": "2026-03-12 18:38:08", "replyTime": "2026-03-14 16:48:25", "replySortTime": "2026-03-14 16:48:25", "url": "https://bbs.esnai.com/thread-5496351-1-5.html", "question": "陈版主您好，请教一个游戏玩家赛事奖金发放会计处理的问题\n\n在游戏内举办赛事，邀请有一定武力值级别的玩家（这些玩家基本都是充值过的）用自身的账号参加比赛，比赛结束后根据赛事结果给这些玩家发放不同的现金奖励（例如前20强），请问这个赛事奖金是否属于应付客户对价？还是应该当作销售费用处理？核心判断要素：\n\n1.赛事目的也是为了给玩家促活\n\n2.玩家参加比赛有用户筛选行为，武力级别和充值有强相关，比赛胜负与武力值也有一定相关性", "reply": "建议作为应付客户对价处理，因为并未从这些玩家处获得可明确区分商品。", "searchText": "5496351 应付客户对价还是销售费用-游戏玩家赛事奖金发放 收入确认/总额净额 june111111 陈版主您好，请教一个游戏玩家赛事奖金发放会计处理的问题\n\n在游戏内举办赛事，邀请有一定武力值级别的玩家（这些玩家基本都是充值过的）用自身的账号参加比赛，比赛结束后根据赛事结果给这些玩家发放不同的现金奖励（例如前20强），请问这个赛事奖金是否属于应付客户对价？还是应该当作销售费用处理？核心判断要素：\n\n1.赛事目的也是为了给玩家促活\n\n2.玩家参加比赛有用户筛选行为，武力级别和充值有强相关，比赛胜负与武力值也有一定相关性 建议作为应付客户对价处理，因为并未从这些玩家处获得可明确区分商品。"}, {"tid": "5496326", "title": "房屋租赁开具普通发票的情况下租赁付款额的计算", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "SharryLi", "questionTime": "2026-03-11 14:21:23", "replyTime": "2026-03-13 04:02:42", "replySortTime": "2026-03-13 04:02:42", "url": "https://bbs.esnai.com/thread-5496326-1-4.html", "question": "请教陈老师，\n\n房屋租赁如果开具的是普通发票，租赁付款额计算时是按含税金额计算，还是自行计算扣除5%的税费后，按照不含税金额计算租赁付款额呢？", "reply": "此时租赁付款额仍按不含税金额计算，不能抵扣的增值税进项税额直接计入当期成本费用。", "searchText": "5496326 房屋租赁开具普通发票的情况下租赁付款额的计算 资产/存货/固定资产/无形资产 sharryli 请教陈老师，\n\n房屋租赁如果开具的是普通发票，租赁付款额计算时是按含税金额计算，还是自行计算扣除5%的税费后，按照不含税金额计算租赁付款额呢？ 此时租赁付款额仍按不含税金额计算，不能抵扣的增值税进项税额直接计入当期成本费用。"}, {"tid": "5496327", "title": "软件开发，收入确认", "category": "收入确认/总额净额", "questionAuthor": "freakyboom", "questionTime": "2026-03-11 14:51:54", "replyTime": "2026-03-13 04:01:13", "replySortTime": "2026-03-13 04:01:13", "url": "https://bbs.esnai.com/thread-5496327-1-5.html", "question": "客户与政府类、国有企业类单位签订了乡村大数据平台发开项目，合同月软件费用1000万，2025年1月初验之后，初验报告仅专家签字，现在已经一年多了还未进行终验，原因为该类单位审批流程长，中途又有领导更换。项目初验之后，后续发生零星成本。\n\n合同的验收条款：初验须在本合同项下软件全部安装调试后进行，报请监理单位进行初验。如因乙方原因初验未能达到验收方案要求，乙方应在【10】个工作日内整改并重新申请初验，并承担复验产生的相关费用。初验通过后进入试运行阶段，正常试运行一个月后，方可申请项目终验。\n\n请教陈版，根据合同约定应该是终验确认收入，从项目初验之后只发生零星成本，是否也可以判断初验已满足收入确认条件。客户上市公司，若以初验为确认依据，是否会引起监管质疑？", "reply": "理论上可以关注初验的内容和流程等，以及初验后是否已投入正常使用。参照《企业会计准则应用指南汇编2024》P396关于验收程序是否仅为一项”例行程序“的讨论，确定是否在初验时点已将控制权转移给客户，据此考虑能否在初验通过时点确认收入。\n\n因被审计单位为上市公司，需要谨慎对待，建议如果对利润和收入影响较大，先与交易所、证监局沟通。", "searchText": "5496327 软件开发，收入确认 收入确认/总额净额 freakyboom 客户与政府类、国有企业类单位签订了乡村大数据平台发开项目，合同月软件费用1000万，2025年1月初验之后，初验报告仅专家签字，现在已经一年多了还未进行终验，原因为该类单位审批流程长，中途又有领导更换。项目初验之后，后续发生零星成本。\n\n合同的验收条款：初验须在本合同项下软件全部安装调试后进行，报请监理单位进行初验。如因乙方原因初验未能达到验收方案要求，乙方应在【10】个工作日内整改并重新申请初验，并承担复验产生的相关费用。初验通过后进入试运行阶段，正常试运行一个月后，方可申请项目终验。\n\n请教陈版，根据合同约定应该是终验确认收入，从项目初验之后只发生零星成本，是否也可以判断初验已满足收入确认条件。客户上市公司，若以初验为确认依据，是否会引起监管质疑？ 理论上可以关注初验的内容和流程等，以及初验后是否已投入正常使用。参照《企业会计准则应用指南汇编2024》p396关于验收程序是否仅为一项”例行程序“的讨论，确定是否在初验时点已将控制权转移给客户，据此考虑能否在初验通过时点确认收入。\n\n因被审计单位为上市公司，需要谨慎对待，建议如果对利润和收入影响较大，先与交易所、证监局沟通。"}, {"tid": "5496332", "title": "请教股份支付超额抵扣未弥补亏损后续使用时的所得税二级类别", "category": "合并/股权/权益法", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-03-11 19:31:16", "replyTime": "2026-03-13 03:57:56", "replySortTime": "2026-03-13 03:57:56", "url": "https://bbs.esnai.com/thread-5496332-1-5.html", "question": "问题背景：股份支付超额抵扣，即税费认可的税前抵扣金额大于会计确认的股份支付费用金额形成的所得税利得，直接计入资本公积。即直接与权益相关，不影响利润表所得税费用。但对后续实际使用时的处理，存在争议。\n\n举例：假设某公司第N年当年授予当年行权的股份支付超额抵扣利得100，简化假设所得税税率10%。假设该公司当年若不考虑超额抵扣，应纳税所得额为0，也不存在任何递延所得税资产及负债。那么第N年由于超额抵扣，导致存在未弥补亏损。对于该亏损，做如下会计处理\n\n借：递延所得税资产 【100*10%=10】\n\n贷：资本公积-资本溢价【10】\n\n第N+1年，假设公司赚取利润1000，且不存在其他所得税调整事项，即公司应纳税所得税额为1000-100【期初未弥补亏损】=900。 应向税务部门的纳税义务即应交所得税为900*0.1=90\n\n观点1：期初递延所得税资产中10系与权益直接相关的事项导致，该项资产的后续变动不应该影响利润，仅为冲减应纳税额。若无超额抵扣，公司正常1000应纳税所得税对应的税金100为当期所得税费用。只是超额抵扣影响导致当期应缴纳税金90.故会计处理为。\n\n借：所得税费用-当前所得税  【1000*0.1=100】\n\n贷：应交税费-企业所得税   【100】\n\n借：应交税费-企业所得税  【10】\n\n贷：递延所得税资产          【10】\n\n利润表所得税费用100均为当期所得税，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.虽然表面上看递延所得税资产变化，利润表无对应勾稽的递延所得费用，但贯彻了超额抵扣事项的利得自始至终均不计入利润表的会计原则，是可以合理解释的。\n\n观点2：期初递延所得税资产中10系与权益直接相关的事项导致，但该项资产的后续变动可以影响利润。故会计处理为\n\n借：所得税费用-当期所得税费用  【900*0.1=90】\n\n贷：应交税费-企业所得税           【90】\n\n借：所得税费用-递延所得税费用 【10，结转来自期初超额抵扣相关的利得】\n\n贷：递延所得税资产                   【10】\n\n利润表所得税费用100，其中当期所得税90，递延所得税10，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.递延所得税资产变化与利润表递延所得税费勾稽。\n\n问题：上述观点哪种更合理？观点2下纵观两个年度的处理，是否实质上以递延所得税资产为过渡，该超额抵扣利得实质上进行了\n\n借：所得税费用  贷：资本公积的处理，进而导致该事项穿透看来影响了损益？", "reply": "观点2更合理。这实际上是与亏损相关的可抵扣亏损的后续利用，所以转回时影响损益。转回时利用可抵扣亏损这本身并不是权益性交易。\n\n另外还可以有第三种理解：第N年末应存在可抵扣亏损，故该年末应优先确认与可抵扣亏损相关的递延所得税资产，即：借：递延所得税资产 10，贷：所得税费用——递延所得税费用 10。这样，到下一年转回时计入损益就更好理解了。", "searchText": "5496332 请教股份支付超额抵扣未弥补亏损后续使用时的所得税二级类别 合并/股权/权益法 qingzhouygwcs 问题背景：股份支付超额抵扣，即税费认可的税前抵扣金额大于会计确认的股份支付费用金额形成的所得税利得，直接计入资本公积。即直接与权益相关，不影响利润表所得税费用。但对后续实际使用时的处理，存在争议。\n\n举例：假设某公司第n 会计期间与投资方不一致的，应当按照投资方的会计政策及会计期间对被投资单位的财务报表进行调整，并据以确认投资收益和其他综合收益等。”\n\n因此审计调整的做法是合理的。"}, {"tid": "5496350", "title": "求助 陈版主 急急急", "category": "合并/股权/权益法", "questionAuthor": "爬爬呀", "questionTime": "2026-03-12 16:44:36", "replyTime": "2026-03-13 03:49:42", "replySortTime": "2026-03-13 03:49:42", "url": "https://bbs.esnai.com/thread-5496350-1-5.html", "question": "报告附注内容：\n\n一、归入公允价值层级第三层次的公允价值计量的调节表中：1、什么时候会涉及到“转入第三层次”、“转出第三层次”；2、“出售”、“结算”有什么区别呢？3、“计入损益的当期利得或损失总额”、“对于在报告期末持有的资产，计入损益的当期未实现利得或损失的变动”这两块具体是什么含义呢？与哪些数据存在勾稽关系呢？\n\n二、重要联营企业的主要财务信息，有一个调整事项：减值准备，是什么内容呢？\n\n同时也想问一下，对于联营企业的损益调整与减值准备，这两个类别明细的优先适用情况是怎么样的呢？这两者是有会有什么区别呢？在被投资单位经营不善的情况下。", "reply": "一、\n\n1、可能是由于原先可获得可观察输入值，后续因情况变化而无法再获取，故转入第三层次；反之，如原先不能获取，后续因情况变化可获取的，则从第三层次中转出。\n\n2、出售是转移所有权（或相关的风险和报酬）给第三方；结算是原有的合同双方之间通过转移金融资产、承担金融负债或者其他方式结清原先的合同权利义务关系，不涉及第三方。\n\n3、一般指公允价值变动损益，个人理解不包括股利收益。\n\n二、用于将在联营企业、合营企业的净资产中所享有的份额调节到长期股权投资账面价值。\n\n参照《监管规则适用指引——会计类第1号》之“1-3 特殊事项下权益法的应用”：“采用权益法核算的长期股权投资，若因股权被动稀释而使得投资方产生损失，投资方首先应将产生股权稀释损失作为股权投资发生减值的迹象之一，对该笔股权投资进行减值测试。投资方对该笔股权投资进行减值测试后，若发生减值，应先对该笔股权投资确认减值损失并调减长期股权投资账面价值，再计算股权稀释产生的影响并进行相应会计处理。”。", "searchText": "5496350 求助 陈版主 急急急 合并/股权/权益法 爬爬呀 报告附注内容：\n\n一、归入公允价值层级第三层次的公允价值计量的调节表中：1、什么时候会涉及到“转入第三层次”、“转出第三层次”；2、“出售”、“结算”有什么区别呢？3、“计入损益的当期利得或损失总额”、“对于在报告期末持有的资产，计入损益的当期未实现利得或损失的变动”这两块具体是什么含义呢？与哪些数据存在勾稽关系呢？\n\n二、重要联营企业的主要财务信息，有一个调整事项：减值准备，是什么内容呢？\n\n同时也想问一下，对于联营企业的损益调整与减值准备，这两个类别明细的优先适用情况是怎么样的呢？这两者是有会有什么区别呢？在被投资单位经营不善的情况下。 一、\n\n1、可能是由于原先可获得可观察输入值，后续因情况变化而无法再获取，故转入第三层次；反之，如原先不能获取，后续因情况变化可获取的，则从第三层次中转出。\n\n2、出售是转移所有权（或相关的风险和报酬）给第三方；结算是原有的合同双方之间通过转移金融资产、承担金融负债或者其他方式结清原先的合同权利义务关系，不涉及第三方。\n\n3、一般指公允价值变动损益，个人理解不包括股利收益。\n\n二、用于将在联营企业、合营企业的净资产中所享有的份额调节到长期股权投资账面价值。\n\n参照《监管规则适用指引——会计类第1号》之“1-3 特殊事项下权益法的应用”：“采用权益法核算的长期股权投资，若因股权被动稀释而使得投资方产生损失，投资方首先应将产生股权稀释损失作为股权投资发生减值的迹象之一，对该笔股权投资进行减值测试。投资方对该笔股权投资进行减值测试后，若发生减值，应先对该笔股权投资确认减值损失并调减长期股权投资账面价值，再计算股权稀释产生的影响并进行相应会计处理。”。"}, {"tid": "5496348", "title": "求助 请教陈版主", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "爬爬呀", "questionTime": "2026-03-12 15:22:42", "replyTime": "2026-03-13 03:44:13", "replySortTime": "2026-03-13 03:44:13", "url": "https://bbs.esnai.com/thread-5496348-1-5.html", "question": "报告附注中：\n\n1、租赁事项中，作为承租人的披露：“与租赁相关的总现金流出”，是否包括计入筹资活动与经营活动相关的，即选择简化处理方法的短期租赁费用+选择简化处理方法的低价值资产租赁费用+计入租赁负债的现金流支出？\n\n2、供应商融资安排中，为何会有应付账款中供应商已从融资提供方收到的款项？这块应该是从供应商已从融资提供方收到的款项时，就会重分类到短期借款（长期借款）或是其他流动负债的吧。", "reply": "1、是。\n\n2、如你所述，一般不应有“应付账款中供应商已从融资提供方收到的款项”，因为一般会重分类到短期借款或者其他流动负债。实务中可理解为已重分类到这两个项目的尚未终止确认的金额。", "searchText": "5496348 求助 请教陈版主 租赁/使用权资产/融资租赁 爬爬呀 报告附注中：\n\n1、租赁事项中，作为承租人的披露：“与租赁相关的总现金流出”，是否包括计入筹资活动与经营活动相关的，即选择简化处理方法的短期租赁费用+选择简化处理方法的低价值资产租赁费用+计入租赁负债的现金流支出？\n\n2、供应商融资安排中，为何会有应付账款中供应商已从融资提供方收到的款项？这块应该是从供应商已从融资提供方收到的款项时，就会重分类到短期借款（长期借款）或是其他流动负债的吧。 1、是。\n\n2、如你所述，一般不应有“应付账款中供应商已从融资提供方收到的款项”，因为一般会重分类到短期借款或者其他流动负债。实务中可理解为已重分类到这两个项目的尚未终止确认的金额。"}, {"tid": "5496330", "title": "ipo发行失败那部分费用，可以算非经吗", "category": "其他", "questionAuthor": "zq18826103753", "questionTime": "2026-03-11 17:07:44", "replyTime": "2026-03-13 03:40:16", "replySortTime": "2026-03-13 03:40:16", "url": "https://bbs.esnai.com/thread-5496330-1-5.html", "question": "如题，前期IPO申报进程中已经资本化的发行费，在IPO失败撤材料后，将[size=9.60268pt]IPO[size=9.60268pt]发[size=9.60268pt]行费用一次性费用化，这部分费用能当作非经吗", "reply": "不属于非经常性损益。IPO是为了支持企业正常经营业务中的融资需求，所以不具备偶发性和性质特殊性。虽然金额可能较大，但无法证明其在可预见的未来不会重复发生，所以不满足认定为非经的条件。\n\n另外，建议后续对IPO申报期内发行费用资本化的问题要谨慎，到后期成功不确定性较小之后才考虑资本化，此前应全部费用化。", "searchText": "5496330 ipo发行失败那部分费用，可以算非经吗 其他 zq18826103753 如题，前期ipo申报进程中已经资本化的发行费，在ipo失败撤材料后，将[size=9.60268pt]ipo[size=9.60268pt]发[size=9.60268pt]行费用一次性费用化，这部分费用能当作非经吗 不属于非经常性损益。ipo是为了支持企业正常经营业务中的融资需求，所以不具备偶发性和性质特殊性。虽然金额可能较大，但无法证明其在可预见的未来不会重复发生，所以不满足认定为非经的条件。\n\n另外，建议后续对ipo申报期内发行费用资本化的问题要谨慎，到后期成功不确定性较小之后才考虑资本化，此前应全部费用化。"}, {"tid": "5496324", "title": "合同资产转入应收账款，减值准备与减值损失的列报逻辑如何处理", "category": "收入确认/总额净额", "questionAuthor": "wx_5da958a4acba", "questionTime": "2026-03-11 09:47:30", "replyTime": "2026-03-13 03:37:56", "replySortTime": "2026-03-13 03:37:56", "url": "https://bbs.esnai.com/thread-5496324-1-5.html", "question": "请问各位老师：\n\n合同资产计提减值时，计入资产减值损失；合同资产满足条件重分类为应收账款时，将对应的合同资产减值准备平移至坏账准备（及通过其他变动结转相关准备，不经过损益表做冲回资产减值损失再计提信用减值损失操作）；后续对应收账款补提、转回坏账时，计入信用减值损失。\n\n上述处理会导致同一笔应收款项，前期减值计入资产减值损失，后续变动计入信用减值损失，拉通看最终可能出现计提都在资产减值损失，而冲回都是信用减值损失，两个科目并列一正一负情况。\n\n想请教如何处理这种情况？", "reply": "可能会存在这个问题。这完全是由人为的科目分类所导致，应可以合理解释。将信用减值损失和资产减值损失中的合同资产减值损失并起来看即可。", "searchText": "5496324 合同资产转入应收账款，减值准备与减值损失的列报逻辑如何处理 收入确认/总额净额 wx_5da958a4acba 请问各位老师：\n\n合同资产计提减值时，计入资产减值损失；合同资产满足条件重分类为应收账款时，将对应的合同资产减值准备平移至坏账准备（及通过其他变动结转相关准备，不经过损益表做冲回资产减值损失再计提信用减值损失操作）；后续对应收账款补提、转回坏账时，计入信用减值损失。\n\n上述处理会导致同一笔应收款项，前期减值计入资产减值损失，后续变动计入信用减值损失，拉通看最终可能出现计提都在资产减值损失，而冲回都是信用减值损失，两个科目并列一正一负情况。\n\n想请教如何处理这种情况？ 可能会存在这个问题。这完全是由人为的科目分类所导致，应可以合理解释。将信用减值损失和资产减值损失中的合同资产减值损失并起来看即可。"}, {"tid": "5496322", "title": "一年内到期的租赁负债的做法！求助", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "RobbyZN", "questionTime": "2026-03-10 22:57:47", "replyTime": "2026-03-13 03:36:26", "replySortTime": "2026-03-13 03:36:26", "url": "https://bbs.esnai.com/thread-5496322-1-5.html", "question": "陈版主想请求指教一下对于一年内到期的租赁负债以下那种较为正确呀。 条件如下：租赁合同为2024/1/1日开启每年12月支付上年租金100,000元，报价利率4.65%，租赁付款期数为10期，无可变租金。\n\n一：站在2025/12/31的角度，确认了确认①租赁付款额折现的金额为：100,000/(1+4.65%/12)^12=95,465.03, 将26年12月应支付的付款额折现至资产负债表日的日期，②租赁付款额为：100,000，③未确认融资费用：8,864.27；\n\n二：确认租赁付款额折现的数字为①：100,000/(1+4.65%/12)^36=87,002.75 ，②租赁付款额为：100,000，③未确认融资费用：12,997.25。想请陈版主指教一下哪一种做法为正确的~", "reply": "根据《应用指南汇编2024》P692：一年内到期的非流动负债即资产负债表日后12个月内租赁负侦预期减少的金额，参考【例21-61】。即本年末租赁负债折现值与预计下一年末租赁负债折现值之差。", "searchText": "5496322 一年内到期的租赁负债的做法！求助 租赁/使用权资产/融资租赁 robbyzn 陈版主想请求指教一下对于一年内到期的租赁负债以下那种较为正确呀。 条件如下：租赁合同为2024/1/1日开启每年12月支付上年租金100,000元，报价利率4.65%，租赁付款期数为10期，无可变租金。\n\n一：站在2025/12/31的角度，确认了确认①租赁付款额折现的金额为：100,000/(1+4.65%/12)^12=95,465.03, 将26年12月应支付的付款额折现至资产负债表日的日期，②租赁付款额为：100,000，③未确认融资费用：8,864.27；\n\n二：确认租赁付款额折现的数字为①：100,000/(1+4.65%/12)^36=87,002.75 ，②租赁付款额为：100,000，③未确认融资费用：12,997.25。想请陈版主指教一下哪一种做法为正确的~ 根据《应用指南汇编2024》p692：一年内到期的非流动负债即资产负债表日后12个月内租赁负侦预期减少的金额，参考【例21-61】。即本年末租赁负债折现值与预计下一年末租赁负债折现值之差。"}, {"tid": "5496321", "title": "少数股权回购针对回购义务利息少数股东权益的归属", "category": "合并/股权/权益法", "questionAuthor": "19121751180", "questionTime": "2026-03-10 21:55:36", "replyTime": "2026-03-13 03:30:49", "replySortTime": "2026-03-13 03:30:49", "url": "https://bbs.esnai.com/thread-5496321-1-5.html", "question": "陈老师您好，我们在会计实务中遇到如下案例，想跟您请教下会计处理。\n\n假设2023年12月A公司和B公司分别出资80万元和20万元共同设立了C公司，约定双方的股权比例为：A持股80%，B持股20%。A公司实现对C公司的控制。同时协议中约定，三年后即2026年，A公司将无条件回购B公司所持C公司股份，回购价格为2026年评估时点的C公司的公允价值。截止2024年12月31日，C公司公允价值为22万。那么于2023年12月31日，A公司合并报表层面确认的金融负债是否存在税会差异需确认递延所得税资产？同时，于2024年12月31日时点，对C公司评估增值的2万块在A公司合并层面是否需分配给少数股东？具体的会计处理如何？少数股权权益怎么核算？公允价值变动的部分是否属于暂时性差异？", "reply": "1、于2023年12月31日，如这部分公允价值变动损益未税前扣除，则A公司合并报表层面确认的金融负债存在暂时性差异，需确认递延所得税资产。\n\n2、A合并报表中的少数股东权益仍以C公司在该合并报表中的账面净资产为基础计算，不将上述公允价值变动损益分配给少数股东。", "searchText": "5496321 少数股权回购针对回购义务利息少数股东权益的归属 合并/股权/权益法 19121751180 陈老师您好，我们在会计实务中遇到如下案例，想跟您请教下会计处理。\n\n假设2023年12月a公司和b公司分别出资80万元和20万元共同设立了c公司，约定双方的股权比例为：a持股80%，b持股20%。a公司实现对c公司的控制。同时协议中约定，三年后即2026年，a公司将无条件回购b公司所持c公司股份，回购价格为2026年评估时点的c公司的公允价值。截止2024年12月31日，c公司公允价值为22万。那么于2023年12月31日，a公司合并报表层面确认的金融负债是否存在税会差异需确认递延所得税资产？同时，于2024年12月31日时点，对c公司评估增值的2万块在a公司合并层面是否需分配给少数股东？具体的会计处理如何？少数股权权益怎么核算？公允价值变动的部分是否属于暂时性差异？ 1、于2023年12月31日，如这部分公允价值变动损益未税前扣除，则a公司合并报表层面确认的金融负债存在暂时性差异，需确认递延所得税资产。\n\n2、a合并报表中的少数股东权益仍以c公司在该合并报表中的账面净资产为基础计算，不将上述公允价值变动损益分配给少数股东。"}, {"tid": "5496314", "title": "关于土地补偿的账务处理", "category": "收入确认/总额净额", "questionAuthor": "腐草为萤", "questionTime": "2026-03-10 20:20:12", "replyTime": "2026-03-13 03:27:08", "replySortTime": "2026-03-13 03:27:08", "url": "https://bbs.esnai.com/thread-5496314-1-5.html", "question": "请教陈版主：因为省级道路改造，政府部门征用我公司现使用的部分“集体土地”（沥青埂化、路沿石、围墙）用于工程项目建设，并进行补偿，包括土地补偿、苗木、附属物、并于本期收到补偿款。由于是集体土地，是否可以作为“营业外收入”入账？是否属于政府补助？", "reply": "如果补偿金额是以被征收资产（包括租用集体土地形成的使用权资产）的公允价值为基础的，则该事项属于资产处置，可按照《监管规则适用指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理，确认资产处置损益或者营业外收支。", "searchText": "5496314 关于土地补偿的账务处理 收入确认/总额净额 腐草为萤 请教陈版主：因为省级道路改造，政府部门征用我公司现使用的部分“集体土地”（沥青埂化、路沿石、围墙）用于工程项目建设，并进行补偿，包括土地补偿、苗木、附属物、并于本期收到补偿款。由于是集体土地，是否可以作为“营业外收入”入账？是否属于政府补助？ 如果补偿金额是以被征收资产（包括租用集体土地形成的使用权资产）的公允价值为基础的，则该事项属于资产处置，可按照《监管规则适用指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理，确认资产处置损益或者营业外收支。"}, {"tid": "5496311", "title": "计入无形资产的样机支出后续销售", "category": "收入确认/总额净额", "questionAuthor": "sybspxcpa", "questionTime": "2026-03-10 14:19:32", "replyTime": "2026-03-13 03:24:37", "replySortTime": "2026-03-13 03:24:37", "url": "https://bbs.esnai.com/thread-5496311-1-5.html", "question": "研发过程中形成的样机不符合存货确认条件，样机形成阶段属于资本化阶段，连同样机的相关研发支出资本化后最终形成无形资产。后续在该自研无形资产摊销过程中，当初的样机具备了销售条件并对外销售，请教陈版，样机销售后是否需要调整无形资产价值？如何调整？\n\n谢谢！", "reply": "如是，则应根据《监管规则适用指引——会计类第3号》之“3-11 固定资产达到预定可使用状态前试运行产品的会计处理”中所述原则确定样机成本，将其从无形资产账面价值中转出（借：存货，贷：无形资产），再在确认样机销售收入同时，将存货成本结转销售成本。\n\n需注意：根据财政部发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0250417_3962191.htm），可转出的样机成本金额以已资本化的开发支出为限。", "searchText": "5496311 计入无形资产的样机支出后续销售 收入确认/总额净额 sybspxcpa 研发过程中形成的样机不符合存货确认条件，样机形成阶段属于资本化阶段，连同样机的相关研发支出资本化后最终形成无形资产。后续在该自研无形资产摊销过程中，当初的样机具备了销售条件并对外销售，请教陈版，样机销售后是否需要调整无形资产价值？如何调整？\n\n谢谢！ 如是，则应根据《监管规则适用指引——会计类第3号》之“3-11 固定资产达到预定可使用状态前试运行产品的会计处理”中所述原则确定样机成本，将其从无形资产账面价值中转出（借：存货，贷：无形资产），再在确认样机销售收入同时，将存货成本结转销售成本。\n\n需注意：根据财政部发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0250417_3962191.htm），可转出的样机成本金额以已资本化的开发支出为限。"}, {"tid": "5496310", "title": "请教版主：长期股权投资的初始计量", "category": "合并/股权/权益法", "questionAuthor": "syq7368", "questionTime": "2026-03-10 09:07:07", "replyTime": "2026-03-13 03:21:27", "replySortTime": "2026-03-13 03:21:27", "url": "https://bbs.esnai.com/thread-5496310-1-4.html", "question": "B公司和C公司都是A公司的全资子公司，B公司注册资本1000万元，未分配利润-600万元。2025年7月，C公司对B公司增资500万元，占比33.33%。请问，C公司如何对B公司长期股权核算。", "reply": "首先，因为B公司和C公司都是A公司的全资子公司，即B和C同受A控制，因此可能不能仅仅根据C持有B的33.33%股权即认定C对B具有重大影响。更大的可能是C对该项出资应作为金融资产核算。\n\n如果确定C确实对B有重大影响，且本次增资作价公允的，则C增资后占有B的净资产份额为：（1000-600+500）*1/3=300万元，小于投资成本，故长期股权投资成本为500，但因长投成本大于占被投资方净资产的份额，故后续除了按权益法确认在B的净利润、其他综合收益、其他权益变动中所享有或应分担的份额以外，对长投有无减值迹象及是否需计提减值的问题需特殊关注。", "searchText": "5496310 请教版主：长期股权投资的初始计量 合并/股权/权益法 syq7368 b公司和c公司都是a公司的全资子公司，b公司注册资本1000万元，未分配利润-600万元。2025年7月，c公司对b公司增资500万元，占比33.33%。请问，c公司如何对b公司长期股权核算。 首先，因为b公司和c公司都是a公司的全资子公司，即b和c同受a控制，因此可能不能仅仅根据c持有b的33.33%股权即认定c对b具有重大影响。更大的可能是c对该项出资应作为金融资产核算。\n\n如果确定c确实对b有重大影响，且本次增资作价公允的，则c增资后占有b的净资产份额为：（1000-600+500）*1/3=300万元，小于投资成本，故长期股权投资成本为500，但因长投成本大于占被投资方净资产的份额，故后续除了按权益法确认在b的净利润、其他综合收益、其他权益变动中所享有或应分担的份额以外，对长投有无减值迹象及是否需计提减值的问题需特殊关注。"}, {"tid": "5496302", "title": "固定资产减值问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "huangjiayong", "questionTime": "2026-03-09 17:48:18", "replyTime": "2026-03-11 14:52:42", "replySortTime": "2026-03-11 14:52:42", "url": "https://bbs.esnai.com/thread-5496302-1-5.html", "question": "陈版主您好，我们实务中碰到了一个问题，情况如下：\n\n      被审计单位现在推倒了一个房屋建筑物，账面价值大概100万，推倒后所回收的铁条对外出售，截止2026年2月底已对外出售3万元，但废墟中还有很多铁条被掩盖了，无法判断其后续出售价值。目前我们项目组的想法是，按照对外出售所回收的金额与账面价值之间的差异确认固定资产减值准备。但现在由于无法判断其后续出售价值，因此无法准确计量计提固定资产减值准备的金额\n\n       请教陈版主，上述情况应如何判断？或者有什么方式可以确认固定资产减值准备的金额", "reply": "按照一般理解，在作出拆除决定前，应可根据对当初设计图纸的查阅和对房屋现状的评估，合理估计其拆除费用和残料的可变现净值，完全无法合理估计的情况应很少见，并不合理。\n\n或者，如果虽然无法合理估计，但预计残料金额不重大的，则基于重要性原则予以简化处理。\n\n另外，关于此类旧房拆除、在原址建造新房的账务处理，应区分不同情况考虑，请参阅《中审众环研究2020》之“问题1-1-4（拆除旧房并建造新房时，旧房原账面价值的处理）”。", "searchText": "5496302 固定资产减值问题 金融工具/外币/债务重组/abs huangjiayong 陈版主您好，我们实务中碰到了一个问题，情况如下：\n\n      被审计单位现在推倒了一个房屋建筑物，账面价值大概100万，推倒后所回收的铁条对外出售，截止2026年2月底已对外出售3万元，但废墟中还有很多铁条被掩盖了，无法判断其后续出售价值。目前我们项目组的想法是，按照对外出售所回收的金额与账面价值之间的差异确认固定资产减值准备。但现在由于无法判断其后续出售价值，因此无法准确计量计提固定资产减值准备的金额\n\n       请教陈版主，上述情况应如何判断？或者有什么方式可以确认固定资产减值准备的金额 按照一般理解，在作出拆除决定前，应可根据对当初设计图纸的查阅和对房屋现状的评估，合理估计其拆除费用和残料的可变现净值，完全无法合理估计的情况应很少见，并不合理。\n\n或者，如果虽然无法合理估计，但预计残料金额不重大的，则基于重要性原则予以简化处理。\n\n另外，关于此类旧房拆除、在原址建造新房的账务处理，应区分不同情况考虑，请参阅《中审众环研究2020》之“问题1-1-4（拆除旧房并建造新房时，旧房原账面价值的处理）”。"}, {"tid": "5496300", "title": "[求助] 请教陈版，关于有限合伙企业是否纳入合并范围问题", "category": "合并/股权/权益法", "questionAuthor": "aaa5531", "questionTime": "2026-03-09 16:42:33", "replyTime": "2026-03-11 14:44:33", "replySortTime": "2026-03-11 14:44:33", "url": "https://bbs.esnai.com/thread-5496300-1-5.html", "question": "陈老师您好！\n\n       假设A公司主要经营非证券类股权投资业务，投资某个项目公司甲公司，预计后续甲公司上市，通过变卖甲公司股票实现资本增值。由于甲公司有投资门槛，A公司无法直接投资甲公司，需通过与B公司（具有基金协备案的合伙企业）成立合伙企业参与投资甲公司。\n\n      假设A公司与B公司成立C合伙企业，其中A公司作为唯一LP出资1亿元，B公司作为GP出资100万元，出资额仅用于投资甲公司。A公司作为单一合伙人，持有C合伙企业99%股比，根据合伙协议，A公司作为有限合伙人不执行合伙事务，合伙企业投资业务的管理、控制、运营的权益由执行事务合伙人B公司行使，普通合伙人B公司设投资决策委员会，有限合伙的投资及退出事宜由投资决策委员会决定。请问陈老师：\n\n      1.A公司是否将C合伙企业纳入合并范围内？\n\n      2.若C公司的投资决策委员会由B公司设立，B公司可以决定投资及退出事宜，A公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜。据此是否可以得出A公司对C合伙企业“无控制权”的结论？", "reply": "1、C合伙企业是专为了A投资于甲公司之目的而设立的，B作为GP属于代理人，C企业仍由A控制，A应将C纳入合并报表范围，相应地在合并报表层面直接体现出对甲公司的投资。\n\n2、虽然名义上“C公司的投资决策委员会由B公司设立，B公司可以决定投资及退出事宜，A公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜”，但B作为GP明显地是代理人身份。根据《企业会计准则第33号——合并财务报表（2014年修订）》第十八条规定：“代理人仅代表主要责任人行使决策权，不控制被投资方。投资方将被投资方相关活动的决策权委托给代理人的，应当将该决策权视为自身直接持有。”。故不影响A对C具有控制权的判断。", "searchText": "5496300 [求助] 请教陈版，关于有限合伙企业是否纳入合并范围问题 合并/股权/权益法 aaa5531 陈老师您好！\n\n       假设a公司主要经营非证券类股权投资业务，投资某个项目公司甲公司，预计后续甲公司上市，通过变卖甲公司股票实现资本增值。由于甲公司有投资门槛，a公司无法直接投资甲公司，需通过与b公司（具有基金协备案的合伙企业）成立合伙企业参与投资甲公司。\n\n      假设a公司与b公司成立c合伙企业，其中a公司作为唯一lp出资1亿元，b公司作为gp出资100万元，出资额仅用于投资甲公司。a公司作为单一合伙人，持有c合伙企业99%股比，根据合伙协议，a公司作为有限合伙人不执行合伙事务，合伙企业投资业务的管理、控制、运营的权益由执行事务合伙人b公司行使，普通合伙人b公司设投资决策委员会，有限合伙的投资及退出事宜由投资决策委员会决定。请问陈老师：\n\n      1.a公司是否将c合伙企业纳入合并范围内？\n\n      2.若c公司的投资决策委员会由b公司设立，b公司可以决定投资及退出事宜，a公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜。据此是否可以得出a公司对c合伙企业“无控制权”的结论？ 1、c合伙企业是专为了a投资于甲公司之目的而设立的，b作为gp属于代理人，c企业仍由a控制，a应将c纳入合并报表范围，相应地在合并报表层面直接体现出对甲公司的投资。\n\n2、虽然名义上“c公司的投资决策委员会由b公司设立，b公司可以决定投资及退出事宜，a公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜”，但b作为gp明显地是代理人身份。根据《企业会计准则第33号——合并财务报表（2014年修订）》第十八条规定：“代理人仅代表主要责任人行使决策权，不控制被投资方。投资方将被投资方相关活动的决策权委托给代理人的，应当将该决策权视为自身直接持有。”。故不影响a对c具有控制权的判断。"}, {"tid": "5496297", "title": "划拨地的会计处理", "category": "合并/股权/权益法", "questionAuthor": "小乐安1314", "questionTime": "2026-03-09 15:21:00", "replyTime": "2026-03-11 14:40:52", "replySortTime": "2026-03-11 14:40:52", "url": "https://bbs.esnai.com/thread-5496297-1-5.html", "question": "集团子公司收到了区政府划拨地一宗土地，无偿获得，请问该如何入账呢，还可以以名义价值1元入账吗", "reply": "需明确以下问题：\n\n1、该土地权证上注明的性质是否为划拨地？后续能否出租、转让？地块用途是什么？\n\n2、该子公司及其所属集团是否隶属于该区政府？\n\n3、无偿获得该土地的政策依据是什么？政府无偿授予土地的目的是什么？", "searchText": "5496297 划拨地的会计处理 合并/股权/权益法 小乐安1314 集团子公司收到了区政府划拨地一宗土地，无偿获得，请问该如何入账呢，还可以以名义价值1元入账吗 需明确以下问题：\n\n1、该土地权证上注明的性质是否为划拨地？后续能否出租、转让？地块用途是什么？\n\n2、该子公司及其所属集团是否隶属于该区政府？\n\n3、无偿获得该土地的政策依据是什么？政府无偿授予土地的目的是什么？"}, {"tid": "5496161", "title": "请教陈版主关于存在回购义务的外部股东增资对少数股东权益和金融负债的确认事项", "category": "合并/股权/权益法", "questionAuthor": "青砖作尘", "questionTime": "2026-02-26 19:11:12", "replyTime": "2026-03-09 13:49:16", "replySortTime": "2026-03-09 13:49:16", "url": "https://bbs.esnai.com/thread-5496161-1-5.html", "question": "本帖最后由 青砖作尘 于 2026-3-2 09:49 编辑\n\n案例背景：本公司外部股东增资1000万（公司本身附有不可避免的回购义务），在单体及合并层面都需要将收到的增资款确认股本和资本公积（股本溢价）；同时按照回购所需支付金额的现值，将回购义务从权益重分类为一项金融负债,会计分录为借:资本公积 贷:金融负债；需请教陈版主指导如下问题，感谢！\n\n1.金融负债的现值该如何折现，以及后续各期利息费用如何确认？\n\n以如下数据做测算：本金1000万，约定回购期限为5年，回购利率为5%，单利计息，公司无借款，参考5年期LPR3.5%作为折现率，到期回购义务本息和为1250万，现值为1052.47万=1250/（1+3.5%）^5  ，各期确认利息费用考虑折现后合计数=197.53万比不考虑折现前的利息和250万要小，折现模型如下：\n\n 时间    现金流  回购义务现值  利息费用  不考虑折现利息费用起始日                   1,052.47\n\n第一年         0        1,089.30      36.83               50\n\n第二年         0        1,127.43      38.13               50\n\n第三年         0        1,166.89      39.46               50\n\n第四年         0        1,207.73      40.84               50\n\n第五年    1250        1,250.00     42.27                50\n\n合计                                      197.53              250\n\n2.在本公司的母公司合并报表层面因子公司少数股东增资导致母公司股权稀释但未丧失控制权时，合并层面少数股东权益的计算是否要考虑应确认回购义务对本公司净资产的影响（增资后本公司的净资产如果考虑回购义务的确认，比增资前净资产更低）\n\n假设增资前母公司应享有本公司账面净资产的份额为-1个亿（100%控股），本公司外部投资者增资1000万（持股比例为5%），增资后本公司账面净资产份额为-1个亿+1000万-1052.47万=-10052.47万，母公司应享有的本公司净资产份额为-10052.47万*95%=-9549.85万，确认少数股东权益-502.62万。", "reply": "1、实务中一般直接按照回购协议约定的计息利率折现，企业的增量融资成本不可能恰好等于LPR，一般都会高于LPR。\n\n2、合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额，在此基础上乘以少数股东对子公司的持股比例计算少数股东权益）。\n\n在很多案例中，被增资的子公司和母公司对回购股权是承担连带责任的，此时该子公司个别报表层面已经确认过回购义务相关负债，母公司合并报表层面就没有必要重复反映了，直接将子公司报表中的该项回购义务相关负债平移到合并报表层面即可。", "searchText": "5496161 请教陈版主关于存在回购义务的外部股东增资对少数股东权益和金融负债的确认事项 合并/股权/权益法 青砖作尘 本帖最后由 青砖作尘 于 2026-3-2 09:49 编辑\n\n案例背景：本公司外部股东增资1000万（公司本身附有不可避免的回购义务），在单体及合并层面都需要将收到的增资款确认股本和资本公积（股本溢价）；同时按照回购所需支付金额的现值，将回购义务从权益重分类为一项金融负债,会计分录为借:资本公积 贷:金融负债；需请教陈版主指导如下问题，感谢！\n\n1.金融负债的现值该如何折现，以及后续各期利息费用如何确认？\n\n以如下数据做测算：本金1000万，约定回购期限为5年，回购利率为5%，单利计息，公司无借款，参考5年期lpr3.5%作为折现率，到期回购义务本息和为1250万，现值为1052.47万=1250/（1+3.5%）^5  ，各期确认利息费用考虑折现后合计数=197.53万比不考虑折现前的利息和250万要小，折现模型如下：\n\n 时间    现金流  回购义务现值  利息费用  不考虑折现利息费用起始日                   1,052.47\n\n第一年         0        1,089.30      36.83               50\n\n第二年         0        1,127.43      38.13               50\n\n第三年         0        1,166.89      39.46               50\n\n第四年         0        1,207.73      40.84               50\n\n第五年    1250        1,250.00     42.27                50\n\n合计                                      197.53              250\n\n2.在本公司的母公司合并报表层面因子公司少数股东增资导致母公司股权稀释但未丧失控制权时，合并层面少数股东权益的计算是否要考虑应确认回购义务对本公司净资产的影响（增资后本公司的净资产如果考虑回购义务的确认，比增资前净资产更低）\n\n假设增资前母公司应享有本公司账面净资产的份额为-1个亿（100%控股），本公司外部投资者增资1000万（持股比例为5%），增资后本公司账面净资产份额为-1个亿+1000万-1052.47万=-10052.47万，母公司应享有的本公司净资产份额为-10052.47万*95%=-9549.85万，确认少数股东权益-502.62万。 1、实务中一般直接按照回购协议约定的计息利率折现，企业的增量融资成本不可能恰好等于lpr，一般都会高于lpr。\n\n2、合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额，在此基础上乘以少数股东对子公司的持股比例计算少数股东权益）。\n\n在很多案例中，被增资的子公司和母公司对回购股权是承担连带责任的，此时该子公司个别报表层面已经确认过回购义务相关负债，母公司合并报表层面就没有必要重复反映了，直接将子公司报表中的该项回购义务相关负债平移到合并报表层面即可。"}, {"tid": "5496273", "title": "债务重组中债权人的会计处理", "category": "合并/股权/权益法", "questionAuthor": "shichengqi", "questionTime": "2026-03-06 20:52:12", "replyTime": "2026-03-09 13:32:05", "replySortTime": "2026-03-09 13:32:05", "url": "https://bbs.esnai.com/thread-5496273-1-5.html", "question": "本帖最后由 shichengqi 于 2026-3-7 08:40 编辑\n\n请教陈版主，背景：\n\n1.截至2025年12月31日，A公司账面对B公司、C公司（同属于D集团）以应收账款核算，应收账款余额为2700万元，坏账准备2400万元，账面价值为300万元。\n\n2.2024年4月，D集团被申请破产重整，A公司债权申报金额为2700万元。根据2025年1月D集团重整计划，A公司受偿方案为：（1）现金受偿5万元，截至2026年3月尚未收到；（2）以股票受偿：2025年11月10日，A公司收到D集团股票70万股；（3）信托受益权份额抵债：根据重整计划，每家（户）普通债权人超过5万元的债权部分，每100元债权可分得100份信托受益权份额，根据计算A公司将获取2700万份信托份额（每份信托份额估值预计为0.02元），2025年12月31日，A公司尚未签署信托份额协议。2026年3月1日，A公司根据《D集团重整计划》的规定不可更改、不可撤销的领受信托受益权，成为本信托受益人。根据规定，A公司可依法享有《D集团重整专项服务信托信托合同》约定的受益人权利，同时也承诺将妥善履行各项受益人义务。\n\n3.A公司会计处理：\n\n1.2025年11月20日，A公司收到股票70万股，按照收盘价2元/股，以140万元计入交易性金融资产核算，并同时抵销应收账款原值140万元；\n\n2.2026年3月1日，A公司将收到的信托计划，未作为期后事项调整。\n\n问题：\n\n方案一：A公司理解由于收到股票、信托、现金后，才能视为按照重整计划执行，取得相应权利才能终止确认应收账款原值，从而确认债务重组损失。\n\n故A公司在收到股票时相应抵减应收账款原值，收到信托计划时未作为期后事项调整，且同时抵消应收账款原值，并在收到最后清偿的现金时再确认重组损失是否合适？\n\n或者是否是方案二：即结合了解的信息，截至2025年12月31日，D集团将尚未分配的信托、现金等已经划转至管理人账户，尽管A公司尚未领受，但预计取得该部分资产所有权不具有重大不确定性，从而在2025年12月31日确认交易性金融资产或其他非流动金融资产（股票、信托份额）及其他应收款-现金5万元，并且终止确认应收账款，确认债务重组损失。\n\n以上哪种处理方式更合适，谢谢！", "reply": "截至2025年末，D集团的重整尚未完成，此时A不能终止确认涉及重整的应收账款，已收到的现金、股票等暂挂负债处理（到重整的全部步骤完成后再对冲应收账款）。\n\n期末A对重整涉及的应收账款仍需计提坏账准备，但计提坏账准备后的账面价值不高于已收到的现金和股票的公允价值，以及预计可收到的信托受益权份额的公允价值之和。基于谨慎考虑，此前已计提的坏账准备暂不转回。到重整全部完成后，如收到抵债资产的公允价值高于2025年末计提坏账准备后债权的账面价值的，再在2026年内确认信用减值损失转回金额（债权人一般不建议确认债务重组收益）。", "searchText": "5496273 债务重组中债权人的会计处理 合并/股权/权益法 shichengqi 本帖最后由 shichengqi 于 2026-3-7 08:40 编辑\n\n请教陈版主，背景：\n\n1.截至2025年12月31日，a公司账面对b公司、c公司（同属于d集团）以应收账款核算，应收账款余额为2700万元，坏账准备2400万元，账面价值为300万元。\n\n2.2024年4月，d集团被申请破产重整，a公司债权申报金额为2700万元。根据2025年1月d集团重整计划，a公司受偿方案为：（1）现金受偿5万元，截至2026年3月尚未收到；（2）以股票受偿：2025年11月10日，a公司收到d集团股票70万股；（3）信托受益权份额抵债：根据重整计划，每家（户）普通债权人超过5万元的债权部分，每100元债权可分得100份信托受益权份额，根据计算a公司将获取2700万份信托份额（每份信托份额估值预计为0.02元），2025年12月31日，a公司尚未签署信托份额协议。2026年3月1日，a公司根据《d集团重整计划》的规定不可更改、不可撤销的领受信托受益权，成为本信托受益人。根据规定，a公司可依法享有《d集团重整专项服务信托信托合同》约定的受益人权利，同时也承诺将妥善履行各项受益人义务。\n\n3.a公司会计处理：\n\n1.2025年11月20日，a公司收到股票70万股，按照收盘价2元/股，以140万元计入交易性金融资产核算，并同时抵销应收账款原值140万元；\n\n2.2026年3月1日，a公司将收到的信托计划，未作为期后事项调整。\n\n问题：\n\n方案一：a公司理解由于收到股票、信托、现金后，才能视为按照重整计划执行，取得相应权利才能终止确认应收账款原值，从而确认债务重组损失。\n\n故a公司在收到股票时相应抵减应收账款原值，收到信托计划时未作为期后事项调整，且同时抵消应收账款原值，并在收到最后清偿的现金时再确认重组损失是否合适？\n\n或者是否是方案二：即结合了解的信息，截至2025年12月31日，d集团将尚未分配的信托、现金等已经划转至管理人账户，尽管a公司尚未领受，但预计取得该部分资产所有权不具有重大不确定性，从而在2025年12月31日确认交易性金融资产或其他非流动金融资产（股票、信托份额）及其他应收款-现金5万元，并且终止确认应收账款，确认债务重组损失。\n\n以上哪种处理方式更合适，谢谢！ 截至2025年末，d集团的重整尚未完成，此时a不能终止确认涉及重整的应收账款，已收到的现金、股票等暂挂负债处理 即节能服务公司每年分享的节能效益收益为2000万元，节能分享期为4年。请问：用能单位每年支付的节能效益收益如何进行账务处理，谢谢！ 因为节能效益分享额为固定，故该事项相当于用能单位以融资租赁方式从节能服务公司租入节能设备，故按照每年需支付的固定分享额的折现值确认使用权资产和租赁负债。使用权资产的折旧年限为该节能设备自身的可使用年限。节能效益分享期满，用能单位取得节能设备所有权时，按照届时使用权资产的原值和累计折旧平移为固定资产的原值和累计折旧。"}, {"tid": "5496228", "title": "长期待摊费用确认", "category": "收入确认/总额净额", "questionAuthor": "三毛113", "questionTime": "2026-03-03 16:05:08", "replyTime": "2026-03-08 19:01:22", "replySortTime": "2026-03-08 19:01:22", "url": "https://bbs.esnai.com/thread-5496228-1-5.html", "question": "求助版主，企业属于传统化工制造企业，在产品生产过程需要添加一种催化剂，该催化剂在生产中不会被消耗，但由于长期使用会使其反映效率降低，企业一般会使用两年后更新反应炉中的催化剂，通常添加一次需要600万元。根据固定资产准则“固定资产投入使用之后，由于固定资产磨损、各组成部分耐用程度不同，可能导致固定资产的局部损坏，为了维护固定资产的正常运转和使用，充分发挥其使用效能，企业将对固定资产进行必要的维护。不符合固定资产资本化后续支出条件的固定资产日常修理费用，在发生时应当按照受益对象计入当期损益或计入相关资产的成本。与存货的生产和加工相关的固定资产日常修理费用按照第二章存货规定的存货成本确定原则进行处理，行政管理部门、企业专设的销售机构等发生的固定资产日常修理费用按照功能分类计入管理费用或销售费用”的规定，我个人理解企业在生产过程增加的催化剂属于“维护固定资产的正常运转和使用，充分发挥其使用效能”相关支出应先计入长期待摊费用并在两年内分期摊销计入存货成本。想问陈老师这样的理解是否合理？谢谢您！@chenyiwei", "reply": "根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使用寿命或者以不同方式为企业提供经济利益，适用不同折旧率或折旧方法的，应当分别将各组成部分确认为单项固定资产。”\n\n虽然该反应装置整体使用年限较长，但催化剂需每2年更换一次，故催化剂应单独确认为一项固定资产，在其自身的可使用年限（2年）内计提折旧。\n\n如果替换下来的催化剂经过一定的净化处理后可恢复最初的使用效能，因而可以重复利用的，则也可以将预计每2年需发生一次的净化成本作为一项长期待摊费用，在两年间隔期内计提摊销，而该催化剂本身的折旧年限与反应装置整体的折旧年限相同（但最终反应装置拆除时的最后一批催化剂的可变现净值应纳入该项固定资产整体的预计净残值中）。", "searchText": "5496228 长期待摊费用确认 收入确认/总额净额 三毛113 求助版主，企业属于传统化工制造企业，在产品生产过程需要添加一种催化剂，该催化剂在生产中不会被消耗，但由于长期使用会使其反映效率降低，企业一般会使用两年后更新反应炉中的催化剂，通常添加一次需要600万元。根据固定资产准则“固定资产投入使用之后，由于固定资产磨损、各组成部分耐用程度不同，可能导致固定资产的局部损坏，为了维护固定资产的正常运转和使用，充分发挥其使用效能，企业将对固定资产进行必要的维护。不符合固定资产资本化后续支出条件的固定资产日常修理费用，在发生时应当按照受益对象计入当期损益或计入相关资产的成本。与存货的生产和加工相关的固定资产日常修理费用按照第二章存货规定的存货成本确定原则进行处理，行政管理部门、企业专设的销售机构等发生的固定资产日常修理费用按照功能分类计入管理费用或销售费用”的规定，我个人理解企业在生产过程增加的催化剂属于“维护固定资产的正常运转和使用，充分发挥其使用效能”相关支出应先计入长期待摊费用并在两年内分期摊销计入存货成本。想问陈老师这样的理解是否合理？谢谢您！@chenyiwei 根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使用寿命或者以不同方式为企业提供经济利益，适用不同折旧率或折旧方法的，应当分别将各组成部分确认为单项固定资产。”\n\n虽然该反应装置整体使用年限较长，但催化剂需每2年更换一次，故催化剂应单独确认为一项固定资产，在其自身的可使用年限（2年）内计提折旧。\n\n如果替换下来的催化剂经过一定的净化处理后可恢复最初的使用效能，因而可以重复利用的，则也可以将预计每2年需发生一次的净化成本作为一项长期待摊费用，在两年间隔期内计提摊销，而该催化剂本身的折旧年限与反应装置整体的折旧年限相同（但最终反应装置拆除时的最后一批催化剂的可变现净值应纳入该项固定资产整体的预计净残值中）。"}, {"tid": "5496231", "title": "合并层面资产评估增值", "category": "合并/股权/权益法", "questionAuthor": "硫酸贝123", "questionTime": "2026-03-03 17:12:01", "replyTime": "2026-03-08 18:33:25", "replySortTime": "2026-03-08 18:33:25", "url": "https://bbs.esnai.com/thread-5496231-1-5.html", "question": "本帖最后由 硫酸贝123 于 2026-3-3 17:16 编辑\n\n陈老师，公司以前年度吸收合并形成资产评估增值，合并层面一直进行折旧调整，今年子公司进行清产核资，将这部分资产处置，国资委下发文件直接核减权益的减少，未调整当期利润，请问合并层面应该如何做会计处理？根据跟子公司一惯性做法，是不是应该直接将固定资产账面价值核减权益呢？如果直接核减权益，那合并层面最开始增值对应增加的资本公积是不是要一直滚调了@chenyiwei", "reply": "合并报表层面应按照该项固定资产于划出日的账面价值（含评估增值的摊余金额）冲减权益。即依次冲减资本公积、盈余公积、未分配利润。不考虑这部分资本公积是否最初系来源于该项资产自身的评估增值。", "searchText": "5496231 合并层面资产评估增值 合并/股权/权益法 硫酸贝123 本帖最后由 硫酸贝123 于 2026-3-3 17:16 编辑\n\n陈老师，公司以前年度吸收合并形成资产评估增值，合并层面一直进行折旧调整，今年子公司进行清产核资，将这部分资产处置，国资委下发文件直接核减权益的减少，未调整当期利润，请问合并层面应该如何做会计处理？根据跟子公司一惯性做法，是不是应该直接将固定资产账面价值核减权益呢？如果直接核减权益，那合并层面最开始增值对应增加的资本公积是不是要一直滚调了@chenyiwei 合并报表层面应按照该项固定资产于划出日的账面价值（含评估增值的摊余金额）冲减权益。即依次冲减资本公积、盈余公积、未分配利润。不考虑这部分资本公积是否最初系来源于该项资产自身的评估增值。"}, {"tid": "5496243", "title": "求教陈版主，唯一子公司注销后合并报表的会计处理问题", "category": "合并/股权/权益法", "questionAuthor": "372916118", "questionTime": "2026-03-04 09:23:53", "replyTime": "2026-03-08 18:30:27", "replySortTime": "2026-03-08 18:30:27", "url": "https://bbs.esnai.com/thread-5496243-1-5.html", "question": "A公司以800账面价值的固定资产x，评估值为1000投资唯一子公司B，在B公司实收资本中按1000入账；几年后，B公司拟注销，注销前B公司再次评估固定资产x评估值为900，将此固定资产x按900抵偿欠A公司的债务， B公司注销手续和财务事项全部在当期完成，现在需要编制期末合并报表，A公司合并资产负债表如何处理该固定资产？\n\n　　我的理解是根据《上市公司执行企业会计准则案例解析2024》（案例12-10 合并抵销调整-【相关案例之一】），虽然固定资产x经过了从A到B再到A的过程，但在处置（注销）子公司的时点，该固定资产x的内部交易最终以900价值实现，应在合并报表中以900列示，差异作为“投资收益”在本期合并报表实现，合并报表与A公司个别报表固定资产x账面价值均为900。（暂不考虑最后几个月折旧等其他事项的影响）\n\n       还是不考虑《上市公司执行企业会计准则案例解析2024》，合并报表仍以最开始的800为基础持续计算更合适呢？这样合并报表与母公司个别报表即存在差异。", "reply": "如果参照《监管规则适用指引——会计类第5号》之“5-7 处置或视同处置子公司时逆流交易产生的未实现内部交易损益的会计处理”中的观点，则A公司个别报表和合并报表层面对该项固定资产的账面价值都是900。但从实体理论的合理性出发，800是更合理的。个人也一直支持800的处理方式。", 只针对实现损益部分进行抵消；2、抵消是否涉及应付职工薪酬-福利费发生额。如果不抵消应付职工薪酬-福利费发生额。附注与主表的勾稽差额也是合理的吗？谢谢陈版以及大家的指正", "reply": "在合并报表层面，子公司A实际上是集团的内设职工福利部门，应将A公司实际发生的食堂运营成本作为职工福利支出的实际发生额，相应调整职工福利费的计提数和使用数，即抵销分录为：\n\n借：营业收入（A公司个别报表层面的食堂业务收入）\n\n贷：营业成本（A公司个别报表层面的食堂业务成本）\n\n贷：管理费用——福利费（A公司个别报表层面的毛利）\n\n相应地，附注中“应付职工薪酬——福利费”的计提额和使用额都应同步调整减少，期初期末余额不变。", "searchText": "5496245 集团内部职工福利费问题 合并/股权/权益法 傻傻的飞鸟 请教陈版。集团公司下设二级公司a作为食堂管理者，主营业务专为集团内部其他单位提供职工餐并收取餐费，其余单位每月给员工餐卡打款并在食堂进行消费。a公司确认收入，其余单位确认费用并作为职工福利费。现编制合并报表，有2个地方感觉不理解：1、站在合并报表层面来看，福利费是真实发生，那么交易抵消和现金流抵消时是否不应抵消全额，而是只针对实现损益部分进行抵消；2、抵消是否涉及应付职工薪酬-福利费发生额。如果不抵消应付职工薪酬-福利费发生额。附注与主表的勾稽差额也是合理的吗？谢谢陈版以及大家的指正 在合并报表层面，子公司a实际上是集团的内设职工福利部门，应将a公司实际发生的食堂运营成本作为职工福利支出的实际发生额，相应调整职工福利费的计提数和使用数，即抵销分录为：\n\n借：营业收入（a公司个别报表层面的食堂业务收入）\n\n贷：营业成本（a公司个别报表层面的食堂业务成本）\n\n贷：管理费用——福利费（a公司个别报表层面的毛利）\n\n相应地，附注中“应付职工薪酬——福利费”的计提额和使用额都应同步调整减少，期初期末余额不变。"}, {"tid": "5496247", "title": "回购少数股东股权构成一揽子交易的会计处理", "category": "合并/股权/权益法", "questionAuthor": "DavidDe", "questionTime": "2026-03-04 17:27:50", "replyTime": "2026-03-08 18:16:53", "replySortTime": "2026-03-08 18:16:53", "url": "https://bbs.esnai.com/thread-5496247-1-5.html", "question": "请教陈版主回购少数股东股权构成一揽子交易的会计处理。A公司为有限责任公司，由B公司持股70%、C公司持股30%，现在A公司（非其母公司B公司出面）为了回购C公司持有的其30%股份，将其持有的另外一个子公司D（账面净资产7千余万）以1元的价格转让给C公司并已于2025年完成工商变更，A公司还会付出一部分现金对价给C公司（2025年已经支付一部分、2026年还会支付一部分），我们认为这个安排构成一揽子交易，因为子公司D净资产很高且利润较好，1元出售显然不公允。综合看，该一揽子交易存在跨年的情况。\n\nA公司在2025年末应该如何进行会计处理？按照一揽子交易处理，我们认为不应该确认长投的处置投资收益，即不影响2025年的损益。A公司对D公司的长期股权投资应转出，按照收购少数股东股权的角度出发，准则说应该冲减资本公积，不足冲减的冲减留存收益；还是说A公司将长投转出的差额作为库存股（类似于股份公司回购自身股份），或者说差额放在其他综合收益，待2026年整个交易完成后再由库存股或其他综合收益转至资本公积和留存收益？", "reply": "A公司为有限责任公司，该交易的实质是以D公司股权和现金作为对价进行减资，实现股东C的退出。在此情况下，A的个别报表层面应以其对D的长投成本与名义价格1元之间的差额冲减资本公积（仅指资本溢价，下同），合并报表层面则以处置日D公司账面净资产的相应比例冲减资本公积，并将尚待支付的现金对价确认为负债并冲减资本公积。\n\n到A的减资手续办理完毕后，按照C原持有的实收资本金额借记实收资本，贷记资本公积；如果原先冲减资本公积的金额超出了资本公积的原有余额的，则将超出部分调整为依次冲减盈余公积和未分配利润。\n\n有限责任公司不使用库存股科目。", "searchText": "5496247 回购少数股东股权构成一揽子交易的会计处理 合并/股权/权益法 davidde 请教陈版主回购少数股东股权构成一揽子交易的会计处理。a公司为有限责任公司，由b公司持股70%、c公司持股30%，现在a公司（非其母公司b
