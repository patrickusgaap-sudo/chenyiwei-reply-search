陈老师，在上述结构安排下，a公司是否可将出售给reits产品的项目出表确认收入？如可以出表，该reits产品主体是否认定为a公司的关联方而披露关联交易？ 1、首先要解决能否将光伏电站不再纳入合并报表范围（即“出表”）的问题。就主帖所列信息，在核查“承担收益补足的可能性极低”的基础上，关注运维服务费的收取金额和收取方式，以及回购承诺等，分析是否通过运维服务费、回购承诺等方式保留了大部分剩余风险和报酬。\n\n2、如果可以出表的，则能否在合并报表层面确认营业收入，可参考《上市公司执行企业会计准则案例解析2024》之案例6-31。即需满足以下条件：（1）企业以出售项目公司股权形式出售资产属于企业的日常活动，为公司的业务模式之一；（2）企业应持有所出售子公司100％的股权，并将其全部对外转让；（3）所出售项目公司不构成业务。\n\n3、如满足终止确认条件，则该reits产品主体应认定为a公司的关联方而披露关联交易。"}, {"tid": "5496145", "title": "客户关系摊销年限变更", "category": "合并/股权/权益法", "questionAuthor": "xiaolukuaipao1", "questionTime": "2026-02-25 18:06:31", "replyTime": "2026-02-27 15:07:01", "replySortTime": "2026-02-27 15:07:01", "url": "https://bbs.esnai.com/thread-5496145-1-6.html", "question": "陈版主好！我们是一家港股的上市公司A，A公司在2023年收购公司B时产生商誉和客户关系，依据当时的会计估计，客户关系按10年摊销，今年由于B公司经营出现问题，对商誉进行了减值，请问是否要考虑客户关系摊销年限的变更呢，实务中可以从哪些方面去考虑，谢谢。", "reply": "商誉减值表明B公司的经营业绩不如预期，相应地对未来期间B公司的经营业绩预测向下修正。在这种情况下，确实存在客户关系的受益年限缩短的可能性。建议对照最初确定摊销年限为10年时的主要考虑因素，分析当前这些因素的变化情况，确定是否需调整缩短摊销年限。但另一方面，即使摊销年限无需缩短，但与商誉一并计提减值仍是大概率事件。\n\n参照《监管规则适用指引——发行类第5号》之“5-3 客户资源或客户关系及企业合并涉及无形资产的判断”：“客户资源或客户关系，只有源自合同性权利或其他法定权利且确保能在较长时期内获得稳定收益，才能确认为无形资产。发行人无法控制客户资源或客户关系带来的未来经济利益的，不应确认无形资产。发行人开拓市场过程中支付的营销费用，或仅购买相关客户资料，而客户并未与出售方签订独家或长期买卖合同，有关\"客户资源\"或\"客户关系\"支出通常应为发行人获取客户渠道的费用。发行人已将客户资源或客户关系确认为无形资产的，应详细说明确认的依据，是否符合无形资产的确认条件。发行人应在资产负债表日判断是否存在可能发生减值的迹象，如考虑上述无形资产对应合同的实际履行情况与确认时设定的相关参数是否存在明显差异等。保荐机构及申报会计师应针对上述事项发表明确意见。”。据此，实务中对于将客户关系确认为无形资产的门槛较高，本身就要求有一定的未来经济利益流入的证据。在后续调整摊销年限时，可对照这些证据的后续变化情况加以分析。", "searchText": "5496145 客户关系摊销年限变更 合并/股权/权益法 xiaolukuaipao1 陈版主好！我们是一家港股的上市公司a，a公司在2023年收购公司b时产生商誉和客户关系，依据当时的会计估计，客户关系按10年摊销，今年由于b公司经营出现问题，对商誉进行了减值，请问是否要考虑客户关系摊销年限的变更呢，实务中可以从哪些方面去考虑，谢谢。 商誉减值表明b公司的经营业绩不如预期，相应地对未来期间b公司的经营业绩预测向下修正。在这种情况下，确实存在客户关系的受益年限缩短的可能性。建议对照最初确定摊销年限为10年时的主要考虑因素，分析当前这些因素的变化情况，确定是否需调整缩短摊销年限。但另一方面，即使摊销年限无需缩短，但与商誉一并计提减值仍是大概率事件。\n\n参照《监管规则适用指引——发行类第5号》之“5-3 客户资源或客户关系及企业合并涉及无形资产的判断”：“客户资源或客户关系，只有源自合同性权利或其他法定权利且确保能在较长时期内获得稳定收益，才能确认为无形资产。发行人无法控制客户资源或客户关系带来的未来经济利益的，不应确认无形资产。发行人开拓市场过程中支付的营销费用，或仅购买相关客户资料，而客户并未与出售方签订独家或长期买卖合同，有关\"客户资源\"或\"客户关系\"支出通常应为发行人获取客户渠道的费用。发行人已将客户资源或客户关系确认为无形资产的，应详细说明确认的依据，是否符合无形资产的确认条件。发行人应在资产负债表日判断是否存在可能发生减值的迹象，如考虑上述无形资产对应合同的实际履行情况与确认时设定的相关参数是否存在明显差异等。保荐机构及申报会计师应针对上述事项发表明确意见。”。据此，实务中对于将客户关系确认为无形资产的门槛较高，本身就要求有一定的未来经济利益流入的证据。在后续调整摊销年限时，可对照这些证据的后续变化情况加以分析。"}, {"tid": "5496153", "title": "求助陈版主，固定资产转投房公允价值，原摊销结转的补助递延收益余额如何账务处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "mochenni", "questionTime": "2026-02-25 23:36:05", "replyTime": "2026-02-27 14:56:29", "replySortTime": "2026-02-27 14:56:29", "url": "https://bbs.esnai.com/thread-5496153-1-6.html", "question": "企业原自用的固定资产在2025年度出租，转入按公允价值计量的投资性房地产列报。之前该项资产取得的政府补助，账面计入递延收益并按折I旧年限进行摊销计入其他收益。那固定资产转入投房公允价值时，这部分递延收益余额是不是应在2025年一次性转入其他收益。但一次性转入到期影响当期利润金额重大。求助陈版主。", "reply": "参阅：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496154。", "searchText": "5496153 求助陈版主，固定资产转投房公允价值，原摊销结转的补助递延收益余额如何账务处理 金融工具/外币/债务重组/abs mochenni 企业原自用的固定资产在2025年度出租，转入按公允价值计量的投资性房地产列报。之前该项资产取得的政府补助，账面计入递延收益并按折i旧年限进行摊销计入其他收益。那固定资产转入投房公允价值时，这部分递延收益余额是不是应在2025年一次性转入其他收益。但一次性转入到期影响当期利润金额重大。求助陈版主。 参阅：https://bbs.esnai.com/forum.php?mod=viewthread&tid=5496154。"}, {"tid": "5496154", "title": "求助陈版主 原固定资产转投房公允价值递延收益如何处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "mochenni", "questionTime": "2026-02-25 23:43:41", "replyTime": "2026-02-27 14:55:30", "replySortTime": "2026-02-27 14:55:30", "url": "https://bbs.esnai.com/thread-5496154-1-6.html", "question": "企业原自用的固定资产在2025年度出租，转入按公允价值计量的投资性房地产列报。之前该项资产取得的政府补助，账面计入递延收益并按折I旧年限进行摊销计入其他收益。那现在转入投房时，这部分递延收益是不是应该一次性记入2025年其他收益？一次性记入当期影响当期利润重大。应如何账务处理？求助陈版主。", "reply": "对此问题无明确规定，但鉴于对政府补助可以采用总额法或净额法处理，如采用净额法处理则事实上相当于将未摊销完毕的政府补助余额转入了其他综合收益，待后续处置时转入损益；故为了使得总额法下也达成类似的处理效果，应将总额法下的递延收益余额转入其他综合收益，到后续处置时转入损益。\n\n不应在转换为投资性房地产时一次性计入损益。", "searchText": "5496154 求助陈版主 原固定资产转投房公允价值递延收益如何处理 金融工具/外币/债务重组/abs mochenni 企业原自用的固定资产在2025年度出租，转入按公允价值计量的投资性房地产列报。之前该项资产取得的政府补助，账面计入递延收益并按折i旧年限进行摊销计入其他收益。那现在转入投房时，这部分递延收益是不是应该一次性记入2025年其他收益？一次性记入当期影响当期利润重大。应如何账务处理？求助陈版主。 对此问题无明确规定，但鉴于对政府补助可以采用总额法或净额法处理，如采用净额法处理则事实上相当于将未摊销完毕的政府补助余额转入了其他综合收益，待后续处置时转入损益；故为了使得总额法下也达成类似的处理效果，应将总额法下的递延收益余额转入其他综合收益，到后续处置时转入损益。\n\n不应在转换为投资性房地产时一次性计入损益。"}, {"tid": "5496156", "title": "研发设备计入固定资产还是研发支出", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "会计Fang1226", "questionTime": "2026-02-26 08:44:48", "replyTime": "2026-02-27 14:51:37", "replySortTime": "2026-02-27 14:51:37", "url": "https://bbs.esnai.com/thread-5496156-1-6.html", "question": "A公司购入一台专用的研发设备，A公司计入研发支出，根据固定资产的定义，该研发设备为经营管理持有并且使用年限超一年，符合固定资产的定义，求教陈版主，请问A公司购置的 研发设备应该计入研发支出还是计入固定资产，是否有相应的准则依据？", "reply": "要考虑：该设备是否专为某个特定研发项目而购建。除了该研发项目之外，无法判断还有无其他用途，或者可以预见很长时间不会再用到？\n\n如果是，则该设备的购建支出直接计入该项目的研发支出，根据该购建支出发生时该对应的研发项目是否已进入资本化阶段，确定该部分研发支出是予以费用化还是资本化。\n\n如果不是，即并非专门为某个特定研发项目而购建，具有一定通用性，后续还可以用于其他研发项目或者生产用途，则应确认为固定资产，采用系统、合理的方式将其折旧额计入各相关受益项目的研发支出，或者商业化生产的产品的生产成本。", "searchText": "5496156 研发设备计入固定资产还是研发支出 资产/存货/固定资产/无形资产 会计fang1226 a公司购入一台专用的研发设备，a公司计入研发支出，根据固定资产的定义，该研发设备为经营管理持有并且使用年限超一年，符合固定资产的定义，求教陈版主，请问a公司购置的 研发设备应该计入研发支出还是计入固定资产，是否有相应的准则依据？ 要考虑：该设备是否专为某个特定研发项目而购建。除了该研发项目之外，无法判断还有无其他用途，或者可以预见很长时间不会再用到？\n\n如果是，则该设备的购建支出直接计入该项目的研发支出，根据该购建支出发生时该对应的研发项目是否已进入资本化阶段，确定该部分研发支出是予以费用化还是资本化。\n\n如果不是，即并非专门为某个特定研发项目而购建，具有一定通用性，后续还可以用于其他研发项目或者生产用途，则应确认为固定资产，采用系统、合理的方式将其折旧额计入各相关受益项目的研发支出，或者商业化生产的产品的生产成本。"}, {"tid": "5496157", "title": "其他非流动金融资产公允价值确认", "category": "合并/股权/权益法", "questionAuthor": "shichengqi", "questionTime": "2026-02-26 08:56:21", "replyTime": "2026-02-27 14:48:34", "replySortTime": "2026-02-27 14:48:34", "url": "https://bbs.esnai.com/thread-5496157-1-4.html", "question": "A上市公司持有某B上市公司下属平台公司股权，列示科目为其他非流动金融资产，该股权以债务重组方式获得，由于无法取得下属平台公司财务报表，平台经营情况只能从上市公司年报披露中知晓，但无法获取具体财务数据，从而账面未确认公允价值变动。现由于：（1）B上市公司预计净资产2025年12月31日净资产为负，且被裁定预重整，未来是否重整成功具有很大不确定性，在此情形下，可能难以确定其对下属平台公司的管理以及下属平台公司的有效运营；（2）同时考虑无法取得上述平台公司公允价值的财务报表，经咨询评估师，也难以评估，公司账面列报的其他非流动金融资产能否直接全额确认投资损失？谢谢！", "reply": "只能说存在公允价值为零或者接近于零的可能性，但不能直接判断其公允价值为零。理论上应作为审计范围受限处理，根据其对被审计财务报表的影响程度考虑审计范围受限是否具有重大性和广泛性，据此判断应出具何种类型的审计意见。", "searchText": "5496157 其他非流动金融资产公允价值确认 合并/股权/权益法 shichengqi a上市公司持有某b上市公司下属平台公司股权，列示科目为其他非流动金融资产，该股权以债务重组方式获得，由于无法取得下属平台公司财务报表，平台经营情况只能从上市公司年报披露中知晓，但无法获取具体财务数据，从而账面未确认公允价值变动。现由于：（1）b上市公司预计净资产2025年12月31日净资产为负，且被裁定预重整，未来是否重整成功具有很大不确定性，在此情形下，可能难以确定其对下属平台公司的管理以及下属平台公司的有效运营；（2）同时考虑无法取得上述平台公司公允价值的财务报表，经咨询评估师，也难以评估，公司账面列报的其他非流动金融资产能否直接全额确认投资损失？谢谢！ 只能说存在公允价值为零或者接近于零的可能性，但不能直接判断其公允价值为零。理论上应作为审计范围受限处理，根据其对被审计财务报表的影响程度考虑审计范围受限是否具有重大性和广泛性，据此判断应出具何种类型的审计意见。"}, {"tid": "5496158", "title": "国企之间的并购事项请教", "category": "合并/股权/权益法", "questionAuthor": "zhebukexue", "questionTime": "2026-02-26 09:29:54", "replyTime": "2026-02-27 14:44:40", "replySortTime": "2026-02-27 14:44:40", "url": "https://bbs.esnai.com/thread-5496158-1-6.html", "question": "最近有个这样的案子，请各位朋友麻烦给点指导意见。\n\nA、B公司合计持有C公司百分百股权（AB无关联关系，都是政府控制，但也不是同一政府），现经过政府统一规划调整。需要将C公司的100%股权转入D公司（A公司非全资子公司），转入方式为A、B公司以增资D公司的形式完成股权转让，转让价为100万元，C公司在2023年9月评估值也为100万元，\n\nD公司的账务处理为  借：长投-C 100  贷：实收资本 100\n\n实际控制权转移是在2024年3月，交接过渡期间C公司实现损益-20万元，股权转让协议有约定过渡期间的损益归受让方，整个交易过程介绍完毕。\n\n按照正常的做法是D公司应该体现20万的商誉，但是整个交易过程中，我们判断不具备一般的商业实质，理由：因为交易过来的资产是不具备盈利能力的，每年是必定亏损的，而且对于D公司或者A公司来讲只是因为政府的干预行为被迫接受C公司的股权，不具备交易合理性。\n\n一旦过渡期间的损益形成商誉，必定要计提减值，所以我们认为这个能不能有其他方式处理，我目前还没找到类似案例，特来求助各位朋友指点一下，感谢", "reply": "鉴于该事项是在政府主导下的非市场化交易，虽然此处采用作价入股的方式，但实际上与“三去一降一补”情况下的无偿划转无本质区别，建议考虑参照财会[2016]17号文（《规范“三去一降一补”有关业务的会计处理规定》）第一条对划入方的规定进行会计处理。", "searchText": "5496158 国企之间的并购事项请教 合并/股权/权益法 zhebukexue 最近有个这样的案子，请各位朋友麻烦给点指导意见。\n\na、b公司合计持有c公司百分百股权（ab无关联关系，都是政府控制，但也不是同一政府），现经过政府统一规划调整。需要将c公司的100%股权转入d公司（a公司非全资子公司），转入方式为a、b公司以增资d公司的形式完成股权转让，转让价为100万元，c公司在2023年9月评估值也为100万元，\n\nd公司的账务处理为  借：长投-c 100  贷：实收资本 100\n\n实际控制权转移是在2024年3月，交接过渡期间c公司实现损益-20万元，股权转让协议有约定过渡期间的损益归受让方，整个交易过程介绍完毕。\n\n按照正常的做法是d公司应该体现20万的商誉，但是整个交易过程中，我们判断不具备一般的商业实质，理由：因为交易过来的资产是不具备盈利能力的，每年是必定亏损的，而且对于d公司或者a公司来讲只是因为政府的干预行为被迫接受c公司的股权，不具备交易合理性。\n\n一旦过渡期间的损益形成商誉，必定要计提减值，所以我们认为这个能不能有其他方式处理，我目前还没找到类似案例，特来求助各位朋友指点一下，感谢 鉴于该事项是在政府主导下的非市场化交易，虽然此处采用作价入股的方式，但实际上与“三去一降一补”情况下的无偿划转无本质区别，建议考虑参照财会[2016]17号文（《规范“三去一降一补”有关业务的会计处理规定》）第一条对划入方的规定进行会计处理。"}, {"tid": "5496159", "title": "请教陈版主关于股东给公司借款用于购买资产现金流指定及账务处理问题", "category": "合并/股权/权益法", "questionAuthor": "wx_5abe02573bf7", "questionTime": "2026-02-26 12:26:41", "replyTime": "2026-02-27 14:36:57", "replySortTime": "2026-02-27 14:36:57", "url": "https://bbs.esnai.com/thread-5496159-1-6.html", "question": "本帖最后由 wx_5abe02573bf7 于 2026-2-26 12:38 编辑\n\n      A公司是集团公司，与子公司B公司（持股60%）、参股公司C公司（持股40%）及一家外部股东D投资设立一家公司E，持股分别为30%，30%，35%，5%。现各股东按持股比例给E公司借款。协议约定此借款为专项借款，用于购买一项资产（资产金额约2000万），协议约定借款为无息借款。关于此业务E公司现金流及账务处理应该怎么做？\n\n    1、现金流指定：\n\n      处理方式一：\n\n      由于为无息借款，现金流应指定为“收到的其他与经营活动有关的现金”\n\n      处理方式二：\n\n      由于此项股东借款，是用于E公司购买专项资产，应根据业务的实质指定至“收到的其他与筹资活动有关的现金”\n\n    2、账务处理\n\n        收到借款，E公司应确认“其他应付款”\n\n   请教陈版主，现金流指定应选择处理方式一还是二；账务处理方式是否正确？", "reply": "1、由于此项股东借款，是用于E公司购买专项资产，应根据业务的实质指定至“收到的其他与筹资活动有关的现金”。\n\n2、应根据《企业会计准则第30号——财务报表列报（2014年修订）》第十九条和《企业会计准则解释第17号》第一条规定判断其属于流动负债还是非流动负债。属于流动负债的，列报为其他应付款；属于非流动负债的，应按市场利率进行折现，并将折现值与名义本金之间的差额按权益性交易原则计入资本公积。需偿还金额的折现值列报为长期应付款或一年内到期的非流动负债。", "searchText": "5496159 请教陈版主关于股东给公司借款用于购买资产现金流指定及账务处理问题 合并/股权/权益法 wx_5abe02573bf7 本帖最后由 wx_5abe02573bf7 于 2026-2-26 12:38 编辑\n\n      a公司是集团公司，与子公司b公司（持股60%）、参股公司c公司（持股40%）及一家外部股东d投资设立一家公司e，持股分别为30%，30%，35%，5%。现各股东按持股比例给e公司借款。协议约定此借款为专项借款，用于购买一项资产（资产金额约2000万），协议约定借款为无息借款。关于此业务e公司现金流及账务处理应该怎么做？\n\n    1、现金流指定：\n\n      处理方式一：\n\n      由于为无息借款，现金流应指定为“收到的其他与经营活动有关的现金”\n\n      处理方式二：\n\n      由于此项股东借款，是用于e公司购买专项资产，应根据业务的实质指定至“收到的其他与筹资活动有关的现金”\n\n    2、账务处理\n\n        收到借款，e公司应确认“其他应付款”\n\n   请教陈版主，现金流指定应选择处理方式一还是二；账务处理方式是否正确？ 1、由于此项股东借款，是用于e公司购买专项资产，应根据业务的实质指定至“收到的其他与筹资活动有关的现金”。\n\n2、应根据《企业会计准则第30号——财务报表列报（2014年修订）》第十九条和《企业会计准则解释第17号》第一条规定判断其属于流动负债还是非流动负债。属于流动负债的，列报为其他应付款；属于非流动负债的，应按市场利率进行折现，并将折现值与名义本金之间的差额按权益性交易原则计入资本公积。需偿还金额的折现值列报为长期应付款或一年内到期的非流动负债。"}, {"tid": "5496146", "title": "求助陈版主，股权划转相关疑问", "category": "合并/股权/权益法", "questionAuthor": "liuweisheng", "questionTime": "2026-02-25 20:03:09", "replyTime": "2026-02-25 23:57:04", "replySortTime": "2026-02-25 23:57:04", "url": "https://bbs.esnai.com/thread-5496146-1-1.html", "question": "国有单位   A是母公司  B是子公司  C是孙公司；A持有B100%股权，A持有C80%股权（成本法），B持有C20%（权益法）；2025年8月，B将持有C公司20%股权无偿划转给A。 转让时B公司持有长投余额130万元（本金100万，损益调整30万），B公司  借：资本公积   130万元，贷：长投130万元；A公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；多谢版主解惑。", "reply": "A公司实际上是收回对B公司的投资，而不是与更上层母公司之间发生权益性交易。因此A公司个别报表中应当贷记“长期股权投资——B”130万元，而不是贷记资本公积。", "searchText": "5496146 求助陈版主，股权划转相关疑问 合并/股权/权益法 liuweisheng 国有单位   a是母公司  b是子公司  c是孙公司；a持有b100%股权，a持有c80%股权（成本法），b持有c20%（权益法）；2025年8月，b将持有c公司20%股权无偿划转给a。 转让时b公司持有长投余额130万元（本金100万，损益调整30万），b公司  借：资本公积   130万元，贷：长投130万元；a公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；多谢版主解惑。 a公司实际上是收回对b公司的投资，而不是与更上层母公司之间发生权益性交易。因此a公司个别报表中应当贷记“长期股权投资——b”130万元，而不是贷记资本公积。"}, {"tid": "5495701", "title": "求助陈版主，相关收入账务处理方式", "category": "收入确认/总额净额", "questionAuthor": "wx_635633abe783", "questionTime": "2026-01-16 10:49:25", "replyTime": "2026-02-22 23:49:26", "replySortTime": "2026-02-22 23:49:26", "url": "https://bbs.esnai.com/thread-5495701-1-7.html", "question": "业务背景：A、B两个酒店展开康乐中心合作经营，2025年6月合作初期，A酒店将自己发展的康乐会员移交给B酒店，此时A酒店需要支付B酒店100万元会员费（还未实际支付，假定100个会员），2025年12月A酒店出于自己经营管理考虑，终止了康乐中心合作经营，此时B酒店将康乐会员移交给A酒店，B酒店需要支付120万元会员费给A酒店（款项也还未实际支付，假定移交给B酒店后，B酒店自己又发展了20个会员），联合这两次来看A酒店账面挂账净收益20万元，由于A主动终止了合作，经双方协商，A需要对解除协议赔偿损失500万元（在拟定解除协议时有考虑以上移交康乐会员产生净收益因素，但是当时该因素的具体金额无法知悉，仅仅是考虑了一点该因素，在拟定赔偿金时无法对该因素进行量化），B收到500万赔偿金后也不在支付A任何款项了（即以上所述净收益20万元B酒店不在支付了），基于A酒店的做账惯例，会将康乐会员费入营业收入，但是这20万元的净收益，A酒店并未实际收到款项以后也不会收到。\n\n       请教陈版主，在以上背景事项中，A酒店对于赔偿金计入营业外支出，那么对于这20万元不能实际收到的款项应该如何入账？", "reply": "既然预计今后不会收到，表明不存在预期的未来经济利益流入，故不能虚挂资产。最多表外记录一项债权，实际收到时按实际收到的金额计入营业外收入，其他无需特殊账务处理。如果此前已确认收益的，应考虑是否需进行前期差错更正。", "searchText": "5495701 求助陈版主，相关收入账务处理方式 收入确认/总额净额 wx_635633abe783 业务背景：a、b两个酒店展开康乐中心合作经营，2025年6月合作初期，a酒店将自己发展的康乐会员移交给b酒店，此时a酒店需要支付b酒店100万元会员费（还未实际支付，假定100个会员），2025年12月a酒店出于自己经营管理考虑，终止了康乐中心合作经营，此时b酒店将康乐会员移交给a酒店，b酒店需要支付120万元会员费给a酒店（款项也还未实际支付，假定移交给b酒店后，b酒店自己又发展了20个会员），联合这两次来看a酒店账面挂账净收益20万元，由于a主动终止了合作，经双方协商，a需要对解除协议赔偿损失500万元（在拟定解除协议时有考虑以上移交康乐会员产生净收益因素，但是当时该因素的具体金额无法知悉，仅仅是考虑了一点该因素，在拟定赔偿金时无法对该因素进行量化），b收到500万赔偿金后也不在支付a任何款项了（即以上所述净收益20万元b酒店不在支付了），基于a酒店的做账惯例，会将康乐会员费入营业收入，但是这20万元的净收益，a酒店并未实际收到款项以后也不会收到。\n\n       请教陈版主，在以上背景事项中，a酒店对于赔偿金计入营业外支出，那么对于这20万元不能实际收到的款项应该如何入账？ 既然预计今后不会收到，表明不存在预期的未来经济利益流入，故不能虚挂资产。最多表外记录一项债权，实际收到时按实际收到的金额计入营业外收入，其他无需特殊账务处理。如果此前已确认收益的，应考虑是否需进行前期差错更正。"}, {"tid": "5495688", "title": "重要性水平基准选择", "category": "收入确认/总额净额", "questionAuthor": "freakyboom", "questionTime": "2026-01-15 16:07:13", "replyTime": "2026-02-22 23:39:53", "replySortTime": "2026-02-22 23:39:53", "url": "https://bbs.esnai.com/thread-5495688-1-5.html", "question": "本帖最后由 freakyboom 于 2026-1-15 18:01 编辑\n\n被审计单历年数据如下：\n\n项目20252024202320222021平均值重要性总产总额135,000.00140,000.00160,000.00160,000.00170,000.00 153,000.00  765.00 营业收入50,000.0055,000.0067,000.0062,000.0080,000.00 62,800.00  314.00 经常性业务税前利润（扣非之后）-1,000.00-6,000.00-2,200.00-18,000.00-1,500.00-5,740.00 287.00 以前年度均是使用经常性业务税前利润作为基准，历年的重要性水平均在500万左右。考虑到经常性业务税前利润波动性较大，本年想使用其他基准，以营业收入和资产总额作为基准与历年的重要性差异较大。\n\n请教陈版，如何选择较为合适呢？", "reply": "1、经常性业务税前利润一直处于亏损状态，故不适合于作为重要性水平的计算基数。\n\n2、如果被审计单位是上市公司或挂牌公司，则在这种情况下建议以营业收入的0.5%以下作为财务报表整体重要性水平的确定方式。如果是政府融资平台公司等发债企业，则可以采用净资产作为计算基数。", "searchText": "5495688 重要性水平基准选择 收入确认/总额净额 freakyboom 本帖最后由 freakyboom 于 2026-1-15 18:01 编辑\n\n被审计单历年数据如下：\n\n项目20252024202320222021平均值重要性总产总额135,000.00140,000.00160,000.00160,000.00170,000.00 153,000.00  765.00 营业收入50,000.0055,000.0067,000.0062,000.0080,000.00 62,800.00  314.00 经常性业务税前利润（扣非之后）-1,000.00-6,000.00-2,200.00-18,000.00-1,500.00-5,740.00 287.00 以前年度均是使用经常性业务税前利润作为基准，历年的重要性水平均在500万左右。考虑到经常性业务税前利润波动性较大，本年想使用其他基准，以营业收入和资产总额作为基准与历年的重要性差异较大。\n\n请教陈版，如何选择较为合适呢？ 1、经常性业务税前利润一直处于亏损状态，故不适合于作为重要性水平的计算基数。\n\n2、如果被审计单位是上市公司或挂牌公司，则在这种情况下建议以营业收入的0.5%以下作为财务报表整体重要性水平的确定方式。如果是政府融资平台公司等发债企业，则可以采用净资产作为计算基数。"}, {"tid": "5495686", "title": "请教老师，收入是按净额还是总额", "category": "收入确认/总额净额", "questionAuthor": "halo阿毛", "questionTime": "2026-01-15 15:49:14", "replyTime": "2026-02-22 23:37:35", "replySortTime": "2026-02-22 23:37:35", "url": "https://bbs.esnai.com/thread-5495686-1-7.html", "question": "公司本年新增一项电商业务，在平台上买珠宝（玉石），由于前期流量不好，公司租借了一个供应商的平台店铺（无需费用，只需优先从供应商那里拿货），公司自己运营，（目前公司也有一个自己的店铺，也是从该供应商进行采购），然后与供应商签订合同，合同约定：乙方将货物运输至甲方指点仓库或指定地址，运输费用由乙方负责，目前公司账上无存货，就是客户下单，公司就从供应商进行采购，进行发货（以销定产）。同时合同约定：非因乙方出厂质量原因导致的售后争议(包括但不限于:物流致损、仓储管理不当、二次销售人为损坏等),由甲方依据销售合同或平台协议规则独立承担责任。目前如果客户在没有收到货物时就进行退款，我们会优先退给供应商进行置换（如果他那边有顾客要，能卖出去，我们会进行退货或者置换。无法置换的就是我们自己承担的库存，目前公司账上是没有存货的），这种情况可以按总额法确认收入吗？", "reply": "建议净额法，典型的以销定采业务模式，对商品缺乏实质控制权。", "searchText": "5495686 请教老师，收入是按净额还是总额 收入确认/总额净额 halo阿毛 公司本年新增一项电商业务，在平台上买珠宝（玉石），由于前期流量不好，公司租借了一个供应商的平台店铺（无需费用，只需优先从供应商那里拿货），公司自己运营，（目前公司也有一个自己的店铺，也是从该供应商进行采购），然后与供应商签订合同，合同约定：乙方将货物运输至甲方指点仓库或指定地址，运输费用由乙方负责，目前公司账上无存货，就是客户下单，公司就从供应商进行采购，进行发货（以销定产）。同时合同约定：非因乙方出厂质量原因导致的售后争议(包括但不限于:物流致损、仓储管理不当、二次销售人为损坏等),由甲方依据销售合同或平台协议规则独立承担责任。目前如果客户在没有收到货物时就进行退款，我们会优先退给供应商进行置换（如果他那边有顾客要，能卖出去，我们会进行退货或者置换。无法置换的就是我们自己承担的库存，目前公司账上是没有存货的），这种情况可以按总额法确认收入吗？ 建议净额法，典型的以销定采业务模式，对商品缺乏实质控制权。"}, {"tid": "5495685", "title": "请教陈版及各位老师，债务重组相关问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "踏雪无痕68", "questionTime": "2026-01-15 15:43:42", "replyTime": "2026-02-22 23:36:31", "replySortTime": "2026-02-22 23:36:31", "url": "https://bbs.esnai.com/thread-5495685-1-7.html", "question": "请教陈版，我公司有一笔2015年产生的应收账款306万，截至2020年已全额计提了坏账损失（25年底坏账余额依然未306万）。  2020年就该笔应收账款与债务方签署协议，约定债务方打85折即260万给我方付款，协议签署当年业务未将该协议传递给财务，导致财务25年才收到协议。打85折后的260万截至25年底债务方仍未给我方支付。\n\n请教陈版及各位老师，上述事项，我公司25年应如何进行账务处理？是采用方法一还是方法二？\n\n方法一：借：坏账准备               306万\n\n                      贷：应收账款                 46万\n\n                             投资收益               260万\n\n方法二：借：坏账准备                46万\n\n                      贷：应收账款                 46万", "reply": "2020年签订的债务重组协议，到2025年仍未实质履行，表明对方的履约意愿和能力存在很大疑问。\n\n在此情况下，除非有明确证据表明对方具备相应的还款意愿和财务能力，否则不建议进行账务处理，继续保持原先的全额计提坏账准备的处理。", "searchText": "5495685 请教陈版及各位老师，债务重组相关问题 金融工具/外币/债务重组/abs 踏雪无痕68 请教陈版，我公司有一笔2015年产生的应收账款306万，截至2020年已全额计提了坏账损失（25年底坏账余额依然未306万）。  2020年就该笔应收账款与债务方签署协议，约定债务方打85折即260万给我方付款，协议签署当年业务未将该协议传递给财务，导致财务25年才收到协议。打85折后的260万截至25年底债务方仍未给我方支付。\n\n请教陈版及各位老师，上述事项，我公司25年应如何进行账务处理？是采用方法一还是方法二？\n\n方法一：借：坏账准备               306万\n\n                      贷：应收账款                 46万\n\n                             投资收益               260万\n\n方法二：借：坏账准备                46万\n\n                      贷：应收账款                 46万 2020年签订的债务重组协议，到2025年仍未实质履行，表明对方的履约意愿和能力存在很大疑问。\n\n在此情况下，除非有明确证据表明对方具备相应的还款意愿和财务能力，否则不建议进行账务处理，继续保持原先的全额计提坏账准备的处理。"}, {"tid": "5495703", "title": "外币注册资本这算", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "QWE12355", "questionTime": "2026-01-16 13:51:31", "replyTime": "2026-02-22 22:03:39", "replySortTime": "2026-02-22 22:03:39", "url": "https://bbs.esnai.com/thread-5495703-1-7.html", "question": "请教陈版主：\n\n海外A公司100%控股境内B公司（外国法人独资）和境内C公司（外国法人独资），C公司营业执照为1600万美元，按照实际收到全额注册资本的当日汇率折算计入实收资本，2025年海外A公司与境内B公司进行同一控制下的股权转让100%C公司股权，营业执照相应按照2025-12-31的即期汇率折算为11246.08万元人民币并办理登记，导致目前C公司单体账面人民币实收资本与营业执照人民币注册资本存在差异。\n\n请问：\n\n1.C公司是否需要对单体报表的实收资本进行调整？\n\n2.如需调整应当如何入账？\n\n非常期待陈版主的回复，万分感谢！", "reply": "C公司需要在其个别报表中就换发营业执照中对注册资本的变动进行相应调整，使得实收资本的余额与变动后的注册资本一致。分录为：借：资本公积——资本溢价，贷：实收资本。", "searchText": "5495703 外币注册资本这算 金融工具/外币/债务重组/abs qwe12355 请教陈版主：\n\n海外a公司100%控股境内b公司（外国法人独资）和境内c公司（外国法人独资），c公司营业执照为1600万美元，按照实际收到全额注册资本的当日汇率折算计入实收资本，2025年海外a公司与境内b公司进行同一控制下的股权转让100%c公司股权，营业执照相应按照2025-12-31的即期汇率折算为11246.08万元人民币并办理登记，导致目前c公司单体账面人民币实收资本与营业执照人民币注册资本存在差异。\n\n请问：\n\n1.c公司是否需要对单体报表的实收资本进行调整？\n\n2.如需调整应当如何入账？\n\n非常期待陈版主的回复，万分感谢！ c公司需要在其个别报表中就换发营业执照中对注册资本的变动进行相应调整，使得实收资本的余额与变动后的注册资本一致。分录为：借：资本公积——资本溢价，贷：实收资本。"}, {"tid": "5495705", "title": "【求助】股改审计报告正文的表述问题", "category": "审计/报告表达", "questionAuthor": "姜姜jj", "questionTime": "2026-01-16 16:57:22", "replyTime": "2026-02-22 22:01:36", "replySortTime": "2026-02-22 22:01:36", "url": "https://bbs.esnai.com/thread-5495705-1-7.html", "question": "向陈老师求助：股改审计报告正文的表述问题\n\n      1、背景\n\n①执行A公司股改审计；\n\n②仅出具A公司单体资产负债表；\n\n③A公司有子公司。\n\n       2、问题：在使用审计准则1603号附录审计报告格式模板时：\n\n①是否要增加特殊目的编制基础的强调事项段（同时附注二编制基础部分说明未编制合并资产负债表、仅编制个别资产负债表）；\n\n②是否要去掉审计意见段“公允反映……”的内容、去掉管理层的责任段“使其公允反映”的内容；\n\n③审计报告正文中的“资产负债表”，是否应全部修改为“个别资产负债表”。\n\n       有劳陈老师解惑，谢谢！", "reply": "1、是；\n\n2、如果编制基础表述为“企业会计准则中与编制个别资产负债表相关的规定”，则仍可以保留“公允列报”的相关表述。\n\n3、如果已经在编制基础部分中强调了未编制合并报表，则无需将“资产负债表”全部改为“个别资产负债表”。", "searchText": "5495705 【求助】股改审计报告正文的表述问题 审计/报告表达 姜姜jj 向陈老师求助：股改审计报告正文的表述问题\n\n      1、背景\n\n①执行a公司股改审计；\n\n②仅出具a公司单体资产负债表；\n\n③a公司有子公司。\n\n       2、问题：在使用审计准则1603号附录审计报告格式模板时：\n\n①是否要增加特殊目的编制基础的强调事项段（同时附注二编制基础部分说明未编制合并资产负债表、仅编制个别资产负债表）；\n\n②是否要去掉审计意见段“公允反映……”的内容、去掉管理层的责任段“使其公允反映”的内容；\n\n③审计报告正文中的“资产负债表”，是否应全部修改为“个别资产负债表”。\n\n       有劳陈老师解惑，谢谢！ 1、是；\n\n2、如果编制基础表述为“企业会计准则中与编制个别资产负债表相关的规定”，则仍可以保留“公允列报”的相关表述。\n\n3、如果已经在编制基础部分中强调了未编制合并报表，则无需将“资产负债表”全部改为“个别资产负债表”。"}, {"tid": "5495730", "title": "股权出表业务", "category": "合并/股权/权益法", "questionAuthor": "Ralph小王子", "questionTime": "2026-01-18 14:31:02", "replyTime": "2026-02-22 21:58:06", "replySortTime": "2026-02-22 21:58:06", "url": "https://bbs.esnai.com/thread-5495730-1-7.html", "question": "陈版及各位大神好\n\nA公司将其100%控股的项目公司B的业务经营所需资产全部出售给A公司的另一个全资控股子公司C，C将该部分资产全部对外出售给融资租赁公司D，并收取了资产转让款项。\n\n融资租赁公司D将上述资产以租赁方式租回给项目公司B，并由B向D支付租金。\n\n同时A公司又将B公司股权转让于第三方。\n\nA公司与融资租赁公司D及项目公司B三方签订运维协议，约定由A公司向B公司提供运维服务，收费模式为固定+浮动，浮动收益为该项目的发电收益扣除融资租赁公司固定收益、电站租金、固定运维费等之外的收益。\n\n基于上述协议安排，A公司拟将处置B公司股权进行出表，并确认相关出表损益。\n\n请问陈版及各位网友，B公司是否满足出表的条件？", "reply": "受让的第三方是否为REITs基金？作为一项通过REITs融资的安排？\n\n这个情况比较复杂，需综合分析各方面因素才能判断能否出表。尤其是该股权受让方的背景、第三方承担的回报量级和可变动性的分析、A公司通过提供运维服务和收取运维服务费所保留的风险和报酬情况。融资租赁公司D是否为单纯的资金提供方，是否仅承担信用风险等。", "searchText": "5495730 股权出表业务 合并/股权/权益法 ralph小王子 陈版及各位大神好\n\na公司将其100%控股的项目公司b的业务经营所需资产全部出售给a公司的另一个全资控股子公司c，c将该部分资产全部对外出售给融资租赁公司d，并收取了资产转让款项。\n\n融资租赁公司d将上述资产以租赁方式租回给项目公司b，并由b向d支付租金。\n\n同时a公司又将b公司股权转让于第三方。\n\na公司与融资租赁公司d及项目公司b三方签订运维协议，约定由a公司向b公司提供运维服务，收费模式为固定+浮动，浮动收益为该项目的发电收益扣除融资租赁公司固定收益、电站租金、固定运维费等之外的收益。\n\n基于上述协议安排，a公司拟将处置b公司股权进行出表，并确认相关出表损益。\n\n请问陈版及各位网友，b公司是否满足出表的条件？ 受让的第三方是否为reits基金？作为一项通过reits融资的安排？\n\n这个情况比较复杂，需综合分析各方面因素才能判断能否出表。尤其是该股权受让方的背景、第三方承担的回报量级和可变动性的分析、a公司通过提供运维服务和收取运维服务费所保留的风险和报酬情况。融资租赁公司d是否为单纯的资金提供方，是否仅承担信用风险等。"}, {"tid": "5495728", "title": "售电公司净额法收入负数如何处理", "category": "收入确认/总额净额", "questionAuthor": "lldbest", "questionTime": "2026-01-18 09:39:25", "replyTime": "2026-02-22 21:39:16", "replySortTime": "2026-02-22 21:39:16", "url": "https://bbs.esnai.com/thread-5495728-1-4.html", "question": "情况介绍：售电公司每月跟电网按照净额结算收益，月清月结，该结算仅能看出结果电量和净收益，无法区分购入电价和出售电价。由于个别月度会出现负收益，电网公司要求将负收益支付给电网公司，并开具供电发票给售电公司。\n\n请教陈版：会计处理上，能否将净收益为正的在营业收入列报，净收益为负的在营业成本列报？还是需要按总额法想办法拆分购电成本作为营业成本，售电收入作为营业收入，但是该交易具有瞬时性，似乎也应按净额法确认收入。", "reply": "按照相同的处理原则。净收益为负数的，列报为收入的负数，而不是营业成本。附注中对产生负数收入的原因予以说明。", "searchText": "5495728 售电公司净额法收入负数如何处理 收入确认/总额净额 lldbest 情况介绍：售电公司每月跟电网按照净额结算收益，月清月结，该结算仅能看出结果电量和净收益，无法区分购入电价和出售电价。由于个别月度会出现负收益，电网公司要求将负收益支付给电网公司，并开具供电发票给售电公司。\n\n请教陈版：会计处理上，能否将净收益为正的在营业收入列报，净收益为负的在营业成本列报？还是需要按总额法想办法拆分购电成本作为营业成本，售电收入作为营业收入，但是该交易具有瞬时性，似乎也应按净额法确认收入。 按照相同的处理原则。净收益为负数的，列报为收入的负数，而不是营业成本。附注中对产生负数收入的原因予以说明。"}, {"tid": "5495725", "title": "外资母公司出售境内子公司100%股权的大背景下，豁免子公司债务是否属于权益性交易", "category": "合并/股权/权益法", "questionAuthor": "wx_5dbe93c82c99", "questionTime": "2026-01-17 22:17:54", "replyTime": "2026-02-22 21:38:16", "replySortTime": "2026-02-22 21:38:16", "url": "https://bbs.esnai.com/thread-5495725-1-7.html", "question": "请教陈版：\n\n1、境外A公司在香港设立B公司（无实质业务），B公司在国内设立C、E、D、F四家全资子公司，主要从事定制化软件开发和咨询服务。A公司每年向C、E、D、F四家公司收取一定特许权使用费（假设交易价格公允），同时A公司和A公司境外的其他子公司与国内C、E、D、F四家公司之间关联交易较为频繁（假设关联交易定价方式公允）。\n\n2、出于国内市场竞争加剧、国际贸易管控以及亚太地区业务整合等考虑，同时C、E、D、F公司持续亏损，截至2025年9月30日已资不抵债（包括对A公司及A公司的其他境外子公司负有大额经营性债务），A公司计划清算C、E、D、F公司并退出国内市场，相关人员清退工作已陆续开展，并已着手将IT等其他后台部门从国内迁移至新加波、印度等地。\n\n3、后因国内私募基金G公司有意增加“软件开发和咨询”类投资组合，故提出以1美元价格向A公司收购香港B公司100%股权，之后由B公司以500万美元的“低价”向取得C、E、D、F四家公司100%股权。A公司本着能赚一笔是一笔的态度，以债务重组方式免除了C、E、D、F无法偿还的债务，同时C、E、D、F已就重组收益缴纳企业所得税，以促成交易达成。（如没有这笔股权交易，C、E、D、F仍会注销清算，并就无法偿还债务而形成的收益缴纳企业所得税。）\n\n4、因国内C、E、D、F四家公司对A公司及A公司的其他境外子公司所负债务大于C、E、D、F四家公司对A公司及A公司的其他境外子公司持有的债权，国内C、E、D、F四家公司在此次债务重组中取得近5亿元人民币债务重组收益，净资产因此大于500万美元。因涉及外资企业，外管局和省商务厅对此次交易价格远小于C、E、D、F债务重组后净资产一事进行问询，A公司回复其原计划免除C、E、D、F对于A公司的债务，并清算注销C、E、D、F，退出国内市场。因G公司愿意出价购买，故A公司本着能赚一笔是一笔的态度，以债务重组方式免除了C、E、D、F无法偿还的债务，同时C、E、D、F已就重组收益缴纳企业所得税。\n\n对于上述债务重组交易，结合前文所述的一系列交易背景，是否可以将C、E、D、F公司的债务重组的经济实质不认定为资本性投入？\n\n基于上述情形，项目组认为：上述债务重组的经济实质并非对于子公司的资本性投入（否则无法解释彻底退出中国市场前为何还要增加对扭亏无望的国内子公司的资本性投入），而是具有正常商业实质，即企业基于市场未来发展趋势判断和国际贸易政策风险做出的正常业务退出决策（彻底退出），而非为了增强子公司财务实力、降低子公司资产负债率、支持子公司拓展新业务等常见资本性投入的目的，不应机械的仅依据A公司为股东这一原因，将上述重组收益认定为资本性投入而计入资本公积。\n\n请教陈版，项目组上述观点是否合理？", "reply": "由于豁免对象是子公司（母公司豁免子公司的债务），且放在母公司转让该子公司股权给第三方的情况下，因此可以合理判断这两者属于一揽子交易（母公司豁免子公司的债务是第三方受让子公司股权的前提条件）。目前没有证据表明非关联的独立第三方之间会按照同样的条件达成债务豁免交易，因此，子公司个别报表中应将母公司所豁免的债务从负债转入资本公积处理。", "searchText": "5495725 外资母公司出售境内子公司100%股权的大背景下，豁免子公司债务是否属于权益性交易 合并/股权/权益法 wx_5dbe93c82c99 请教陈版：\n\n1、境外a公司在香港设立b公司（无实质业务），b公司在国内设立c、e、d、f四家全资子公司，主要从事定制化软件开发和咨询服务。a公司每年向c、e、d、f四家公司收取一定特许权使用费（假设交易价格公允），同时a公司和a公司境外的其他子公司与国内c、e、d、f四家公司之间关联交易较为频繁（假设关联交易定价方式公允）。\n\n2、出于国内市场竞争加剧、国际贸易管控以及亚太地区业务整合等考虑，同时c、e、d、f公司持续亏损，截至2025年9月30日已资不抵债（包括对a公司及a公司的其他境外子公司负有大额经营性债务），a公司计划清算c、e、d、f公司并退出国内市场，相关人员清退工作已陆续开展，并已着手将it等其他后台部门从国内迁移至新加波、印度等地。\n\n3、后因国内私募基金g公司有意增加“软件开发和咨询”类投资组合，故提出以1美元价格向a公司收购香港b公司100%股权，之后由b公司以500万美元的“低价”向取得c、e、d、f四家公司100%股权。a公司本着能赚一笔是一笔的态度，以债务重组方式免除了c、e、d、f无法偿还的债务，同时c、e、d、f已就重组收益缴纳企业所得税，以促成交易达成。（如没有这笔股权交易，c、e、d、f仍会注销清算，并就无法偿还债务而形成的收益缴纳企业所得税。）\n\n4、因国内c、e、d、f四家公司对a公司及a公司的其他境外子公司所负债务大于c、e、d、f四家公司对a公司及a公司的其他境外子公司持有的债权，国内c、e、d、f四家公司在此次债务重组中取得近5亿元人民币债务重组收益，净资产因此大于500万美元。因涉及外资企业，外管局和省商务厅对此次交易价格远小于c、e、d、f债务重组后净资产一事进行问询，a公司回复其原计划免除c、e、d、f对于a公司的债务，并清算注销c、e、d、f，退出国内市场。因g公司愿意出价购买，故a公司本着能赚一笔是一笔的态度，以债务重组方式免除了c、e、d、f无法偿还的债务，同时c、e、d、f已就重组收益缴纳企业所得税。\n\n对于上述债务重组交易，结合前文所述的一系列交易背景，是否可以将c、e、d、f公司的债务重组的经济实质不认定为资本性投入？\n\n基于上述情形，项目组认为：上述债务重组的经济实质并非对于子公司的资本性投入（否则无法解释彻底退出中国市场前为何还要增加对扭亏无望的国内子公司的资本性投入），而是具有正常商业实质，即企业基于市场未来发展趋势判断和国际贸易政策风险做出的正常业务退出决策（彻底退出），而非为了增强子公司财务实力、降低子公司资产负债率、支持子公司拓展新业务等常见资本性投入的目的，不应机械的仅依据a公司为股东这一原因，将上述重组收益认定为资本性投入而计入资本公积。\n\n请教陈版，项目组上述观点是否合理？ 由于豁免对象是子公司（母公司豁免子公司的债务），且放在母公司转让该子公司股权给第三方的情况下，因此可以合理判断这两者属于一揽子交易（母公司豁免子公司的债务是第三方受让子公司股权的前提条件）。目前没有证据表明非关联的独立第三方之间会按照同样的条件达成债务豁免交易，因此，子公司个别报表中应将母公司所豁免的债务从负债转入资本公积处理。"}, {"tid": "5495718", "title": "新租赁准则下基于企业行为的租金返回，承租方如何处理", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "zhucebuliaosid", "questionTime": "2026-01-17 16:28:07", "replyTime": "2026-02-22 21:33:40", "replySortTime": "2026-02-22 21:33:40", "url": "https://bbs.esnai.com/thread-5495718-1-7.html", "question": "A公司将自有房产出租给B公司，B公司独立对外出租运营该房产。2023年1月1日至2027年12月31日，租期5年，年租金1000万，每年年初支付，该房产已确认使用权资产。因该项目处于孵化期，空置率高且运营成本较大，2025年12月31日双方协商一致，A公司向B公司返还2025年租金200万。\n\n该笔租金返还是否可以直接冲减25年营业成本？还是应当重新计量租赁负债并调整使用权资产？", "reply": "应作为租赁变更处理，调整使用权资产和租赁负债，不会直接体现在被减免当期的损益中。此前新冠疫情期间租金减让的特别规定已不再执行。", "searchText": "5495718 新租赁准则下基于企业行为的租金返回，承租方如何处理 租赁/使用权资产/融资租赁 zhucebuliaosid a公司将自有房产出租给b公司，b公司独立对外出租运营该房产。2023年1月1日至2027年12月31日，租期5年，年租金1000万，每年年初支付，该房产已确认使用权资产。因该项目处于孵化期，空置率高且运营成本较大，2025年12月31日双方协商一致，a公司向b公司返还2025年租金200万。\n\n该笔租金返还是否可以直接冲减25年营业成本？还是应当重新计量租赁负债并调整使用权资产？ 应作为租赁变更处理，调整使用权资产和租赁负债，不会直接体现在被减免当期的损益中。此前新冠疫情期间租金减让的特别规定已不再执行。"}, {"tid": "5496057", "title": "求助陈版主：中间层合并少数股权权益的确认", "category": "合并/股权/权益法", "questionAuthor": "cxh770302", "questionTime": "2026-02-14 12:30:09", "replyTime": "2026-02-22 19:58:22", "replySortTime": "2026-02-22 19:58:22", "url": "https://bbs.esnai.com/thread-5496057-1-6.html", "question": "甲公司是A公司的母公司；B集团的控股股东是A公司持股80%；另一股东是甲公司持股20%，B集团是合并报表、合并报表中有少数股东权益。问题：1、站在A公司合并B集团层面是否要确认B集团甲公司的少数股权权益？2、如果确认计算基数是B集团的归属于母公司的所有者权益，还是B集团的所有者权益总计？", "reply": "1、A公司合并报表中应将甲直接享有B公司的权益列入少数股东权益，因为不是通过A公司间接享有这部分权益，而是直接以子公司股东身份持有，所以在母公司合并报表中应作为少数股权列报。\n\n2、计算基数是B公司合并报表中的归母权益，不含少数股东权益。否则会导致重复计算。", "searchText": "5496057 求助陈版主：中间层合并少数股权权益的确认 合并/股权/权益法 cxh770302 甲公司是a公司的母公司；b集团的控股股东是a公司持股80%；另一股东是甲公司持股20%，b集团是合并报表、合并报表中有少数股东权益。问题：1、站在a公司合并b集团层面是否要确认b集团甲公司的少数股权权益？2、如果确认计算基数是b集团的归属于母公司的所有者权益，还是b集团的所有者权益总计？ 1、a公司合并报表中应将甲直接享有b公司的权益列入少数股东权益，因为不是通过a公司间接享有这部分权益，而是直接以子公司股东身份持有，所以在母公司合并报表中应作为少数股权列报。\n\n2、计算基数是b公司合并报表中的归母权益，不含少数股东权益。否则会导致重复计算。"}, {"tid": "5496055", "title": "子公司购买第三方对母公司债权的列报", "category": "合并/股权/权益法", "questionAuthor": "nh19861028", "questionTime": "2026-02-14 09:43:58", "replyTime": "2026-02-22 19:54:08", "replySortTime": "2026-02-22 19:54:08", "url": "https://bbs.esnai.com/thread-5496055-1-7.html", "question": "请教陈版主，实务遇到这样一个问题：\n\n为帮助母公司A化债，决定A公司的子公司B公司通过第三方资产管理公司D投标购买了外部第三方C公司对母公司A的债权，资产管理公司D作为债权的代持人（代持期限2年），实际受益人是子公司B。B公司支付D公司1000万用于其购买C公司对A公司的债权，并支付给D公司相关资产管理服务费用等10万。\n\nB公司支付的1000万和相关的资产管理费用10万是否应该列报到其他非流动资产或者其他非流动金融资产。内部有意见是应该放到对母公司的应收账款列报，但我感觉这个并非是按照摊余成本计量的，放在应收账款列报不太合适。", "reply": "该部分1000万元+10万元应计入子公司B账面取得对母公司债权的成本，但因为该项债权系从外部购入，故不应在B公司自身报表中列报为应收账款，而应列报为其他应收款或者其他流动资产。\n\n在母公司A的合并报表层面，由子公司B承接外部第三方C对母公司A的债权，相当于母公司对应的债务获得结算，故该1010万元应作为结算该笔债务的对价，纳入债务重组收益的计算。", "searchText": "5496055 子公司购买第三方对母公司债权的列报 合并/股权/权益法 nh19861028 请教陈版主，实务遇到这样一个问题：\n\n为帮助母公司a化债，决定a公司的子公司b公司通过第三方资产管理公司d投标购买了外部第三方c公司对母公司a的债权，资产管理公司d作为债权的代持人（代持期限2年），实际受益人是子公司b。b公司支付d公司1000万用于其购买c公司对a公司的债权，并支付给d公司相关资产管理服务费用等10万。\n\nb公司支付的1000万和相关的资产管理费用10万是否应该列报到其他非流动资产或者其他非流动金融资产。内部有意见是应该放到对母公司的应收账款列报，但我感觉这个并非是按照摊余成本计量的，放在应收账款列报不太合适。 该部分1000万元+10万元应计入子公司b账面取得对母公司债权的成本，但因为该项债权系从外部购入，故不应在b公司自身报表中列报为应收账款，而应列报为其他应收款或者其他流动资产。\n\n在母公司a的合并报表层面，由子公司b承接外部第三方c对母公司a的债权，相当于母公司对应的债务获得结算，故该1010万元应作为结算该笔债务的对价，纳入债务重组收益的计算。"}, {"tid": "5496047", "title": "关联租赁抵消", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "欧tomorrow27", "questionTime": "2026-02-13 16:05:45", "replyTime": "2026-02-22 19:49:14", "replySortTime": "2026-02-22 19:49:14", "url": "https://bbs.esnai.com/thread-5496047-1-7.html", "question": "在集团合并层面，如果一家子公司将房屋出租给另一家子公司，承租方确认了使用权资产、租赁负债、使用权资产累计折旧，以及递延所得税等，那么在合并抵消层面，将出租方收到的租金抵掉，承租方确认的使用权资产、使用权资产累计折旧、租赁负债、递延所得税资产、递延所得税负债的期末数抵掉、因折旧计入费用类科目的发生额以及计入财务费用-未确认融资费用的发生额以及确认的递延所得税费用发生额抵消掉以后，借贷双方并不是平衡的，请问差额怎么处理", "reply": "假设本案例中的集团内部租赁是经营租赁，则鉴于在新租赁准则下，经营租赁的双方对该交易的会计处理是不对称的，因此为了合并抵销之目的，需先对承租人报表中体现的该项内部租赁事项的会计处理进行模拟调整，冲回承租人在新租赁准则下的会计处理（使用权资产及其折旧、减值，租赁负债及其利息支出），再按原租赁准则下对经营租赁承租人的会计处理进行调整，然后才能进行合并抵销处理。\n\n在上述对承租人报表的模拟调整过程中，随着使用权资产和租赁负债被冲销，与之相关的递延所得税资产、负债也一并被转销，合并财务报表层面不再有使用权资产和租赁负债，以及与之相关的递延所得税资产和负债。\n\n从另一个角度，模拟调整后，子公司税前扣除的金额是各年的合同租金（假设各年相等），合并财务报表层面是将租赁资产还原为自用固定资产计提折旧。租金和资产折旧额之间的差额是内部交易利润，但不属于未实现损益。所以该事项在合并财务报表层面无递延所得税影响。", "searchText": "5496047 关联租赁抵消 租赁/使用权资产/融资租赁 欧tomorrow27 在集团合并层面，如果一家子公司将房屋出租给另一家子公司，承租方确认了使用权资产、租赁负债、使用权资产累计折旧，以及递延所得税等，那么在合并抵消层面，将出租方收到的租金抵掉，承租方确认的使用权资产、使用权资产累计折旧、租赁负债、递延所得税资产、递延所得税负债的期末数抵掉、因折旧计入费用类科目的发生额以及计入财务费用-未确认融资费用的发生额以及确认的递延所得税费用发生额抵消掉以后，借贷双方并不是平衡的，请问差额怎么处理 假设本案例中的集团内部租赁是经营租赁，则鉴于在新租赁准则下，经营租赁的双方对该交易的会计处理是不对称的，因此为了合并抵销之目的，需先对承租人报表中体现的该项内部租赁事项的会计处理进行模拟调整，冲回承租人在新租赁准则下的会计处理（使用权资产及其折旧、减值，租赁负债及其利息支出），再按原租赁准则下对经营租赁承租人的会计处理进行调整，然后才能进行合并抵销处理。\n\n在上述对承租人报表的模拟调整过程中，随着使用权资产和租赁负债被冲销，与之相关的递延所得税资产、负债也一并被转销，合并财务报表层面不再有使用权资产和租赁负债，以及与之相关的递延所得税资产和负债。\n\n从另一个角度，模拟调整后，子公司税前扣除的金额是各年的合同租金（假设各年相等），合并财务报表层面是将租赁资产还原为自用固定资产计提折旧。租金和资产折旧额之间的差额是内部交易利润，但不属于未实现损益。所以该事项在合并财务报表层面无递延所得税影响。"}, {"tid": "5496046", "title": "合同履约成本余额的问题", "category": "收入确认/总额净额", "questionAuthor": "小改smile", "questionTime": "2026-02-13 11:07:15", "replyTime": "2026-02-22 19:46:46", "replySortTime": "2026-02-22 19:46:46", "url": "https://bbs.esnai.com/thread-5496046-1-6.html", "question": "求助各位老师，A企业是epc总包的公司，按照施工方开票金额计入合同履约成本，年末会根据各分包的结算确认当年的成本，转入主营业务成本，按照投入法确认收入，如果已开票金额小于结算金额会暂估成本和应付账款，如果开票金额大于了年末计算金额那么合同履约成本科目会有余额，请问这部分余额报表是在存货列报么？？\n\n新收入准则第二十六条作为资产的条件是（一）该成本与一份当前或预期取得的合同直接相关，包括直接人工、直接材料、制造费用（或类似费用）、明确由客户承担的成本以及仅因该合同而发生的其他成本； （二）该成本增加了企业未来用于履行履约义务的资源； （三）该成本预期能够收回。\n\n年末合同履约成本的余额是作为预付款列报 还是  存货呢？？", "reply": "一般情况下，按时段法确认收入的履约义务，其期末对应的合同履约成本在资产中挂账的金额应当不大。如果存在大额挂账或者长期挂账，可能表明存在前期差错，也是监管部门重点关注的一类错报。\n\n此类暂估的成本都是对应于截至目前已完成的履约进度，而不是针对未来的履约，因此不满足新收入准则第二十六条之（二）规定的条件，不能作为资产挂账，应直接计入当期的营业成本处理。", "searchText": "5496046 合同履约成本余额的问题 收入确认/总额净额 小改smile 求助各位老师，a企业是epc总包的公司，按照施工方开票金额计入合同履约成本，年末会根据各分包的结算确认当年的成本，转入主营业务成本，按照投入法确认收入，如果已开票金额小于结算金额会暂估成本和应付账款，如果开票金额大于了年末计算金额那么合同履约成本科目会有余额，请问这部分余额报表是在存货列报么？？\n\n新收入准则第二十六条作为资产的条件是（一）该成本与一份当前或预期取得的合同直接相关，包括直接人工、直接材料、制造费用（或类似费用）、明确由客户承担的成本以及仅因该合同而发生的其他成本； （二）该成本增加了企业未来用于履行履约义务的资源； （三）该成本预期能够收回。\n\n年末合同履约成本的余额是作为预付款列报 还是  存货呢？？ 一般情况下，按时段法确认收入的履约义务，其期末对应的合同履约成本在资产中挂账的金额应当不大。如果存在大额挂账或者长期挂账，可能表明存在前期差错，也是监管部门重点关注的一类错报。\n\n此类暂估的成本都是对应于截至目前已完成的履约进度，而不是针对未来的履约，因此不满足新收入准则第二十六条之（二）规定的条件，不能作为资产挂账，应直接计入当期的营业成本处理。"}, {"tid": "5496038", "title": "求问陈版主：房产税免税及退税会计处理问题", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "2829093lcg", "questionTime": "2026-02-12 16:11:05", "replyTime": "2026-02-22 19:43:07", "replySortTime": "2026-02-22 19:43:07", "url": "https://bbs.esnai.com/thread-5496038-1-6.html", "question": "A公司于2023年度、2024年度均符合纳税困难减免房产税的条件。2023年度、2024年度均按期申报并全额缴纳房产税，每年约600万元。\n\n情况1：A公司于2025年2月向税局申请退回2023年度房产税，并于2025年2月收到税局下发的《税务事项通知书》，批准退回2023年度房产税600万元，并于同月收到全额退回税费。\n\n情况2：A公司于2025年12月向税局申请减免2024年度房产税，并于2025年12月收到税局下发的《税务事项通知书》，批准减征2024年度房产税600万元，并于同月收到退回税费300万元，有300万元未收回。\n\n问题：A公司是否符合先征后退的政府补助定义，按2025年度收到的税局批准文件，将退回2023年度房产税600万元、减免2024年度房产税600万元均确认为2025年度损益，冲减税金及附加或确认其他收益？或者基于比较报表和重要性原则，调整冲减房产税所属期损益？\n\n谢谢陈版主的解答", "reply": "主帖案例属于依据税法规定享受的税收减免，不是政府补助。可在收到《税务事项通知书》当期进行减免税的会计处理，即把批准退还的税款冲减当月的税金及附加。已获批但尚未实际收到的退税款可确认为其他应收款或者其他流动资产。不应追溯冲减前期报表中的税金及附加。", "searchText": "5496038 求问陈版主：房产税免税及退税会计处理问题 政府补助/ppp/税费/现金流 2829093lcg a公司于2023年度、2024年度均符合纳税困难减免房产税的条件。2023年度、2024年度均按期申报并全额缴纳房产税，每年约600万元。\n\n情况1：a公司于2025年2月向税局申请退回2023年度房产税，并于2025年2月收到税局下发的《税务事项通知书》，批准退回2023年度房产税600万元，并于同月收到全额退回税费。\n\n情况2：a公司于2025年12月向税局申请减免2024年度房产税，并于2025年12月收到税局下发的《税务事项通知书》，批准减征2024年度房产税600万元，并于同月收到退回税费300万元，有300万元未收回。\n\n问题：a公司是否符合先征后退的政府补助定义，按2025年度收到的税局批准文件，将退回2023年度房产税600万元、减免2024年度房产税600万元均确认为2025年度损益，冲减税金及附加或确认其他收益？或者基于比较报表和重要性原则，调整冲减房产税所属期损益？\n\n谢谢陈版主的解答 主帖案例属于依据税法规定享受的税收减免，不是政府补助。可在收到《税务事项通知书》当期进行减免税的会计处理，即把批准退还的税款冲减当月的税金及附加。已获批但尚未实际收到的退税款可确认为其他应收款或者其他流动资产。不应追溯冲减前期报表中的税金及附加。"}, {"tid": "5496037", "title": "关于使用权资产的租赁开始日", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "寒江雪71", "questionTime": "2026-02-12 16:03:30", "replyTime": "2026-02-22 19:40:33", "replySortTime": "2026-02-22 19:40:33", "url": "https://bbs.esnai.com/thread-5496037-1-7.html", "question": "请教陈版：公司于2025年8月25日与客户签订了房屋租赁合同，租期自2025年9月1日起，公司自9月1日起开始进行了装修，至2025年底已完成装修。因该房产是新的办公楼，一直未能完成消防验收（非装修的消防验收），公司无法入住。于2026年1月，公司与客户重新签订了租赁协议，租期自2026年5月1日起，其他条款不变。协议中未约定装修期、免租期等。那是从2025年9月1日算起租期呢，还是从2026年5月1日？", "reply": "根据《企业会计准则第21号——租赁（2018年修订）》（以下简称租赁准则）第十四条规定：“在租赁期开始日，承租人应当对租赁确认使用权资产和租赁负债，应用本准则第三章第三节进行简化处理的短期租赁和低价值资产租赁除外。”“租赁期开始日，是指出租人提供租赁资产使其可供承租人使用的起始日期”。\n\n据此，虽然原合同约定的租赁期是从2025年9月1日起，承租人也确实自该日起实施装修工程并已完成，但由于出租人方面的原因导致承租人无法在约定的起租日入住，事实上出租人并未在该日“提供租赁资产使其可供承租人使用”，因此不能将2025年9月1日算作租赁期开始日，而应根据后续实际完成消防验收和发出入住通知的情况确定租赁期开始日。", "searchText": "5496037 关于使用权资产的租赁开始日 租赁/使用权资产/融资租赁 寒江雪71 请教陈版：公司于2025年8月25日与客户签订了房屋租赁合同，租期自2025年9月1日起，公司自9月1日起开始进行了装修，至2025年底已完成装修。因该房产是新的办公楼，一直未能完成消防验收（非装修的消防验收），公司无法入住。于2026年1月，公司与客户重新签订了租赁协议，租期自2026年5月1日起，其他条款不变。协议中未约定装修期、免租期等。那是从2025年9月1日算起租期呢，还是从2026年5月1日？ 根据《企业会计准则第21号——租赁（2018年修订）》（以下简称租赁准则）第十四条规定：“在租赁期开始日，承租人应当对租赁确认使用权资产和租赁负债，应用本准则第三章第三节进行简化处理的短期租赁和低价值资产租赁除外。”“租赁期开始日，是指出租人提供租赁资产使其可供承租人使用的起始日期”。\n\n据此，虽然原合同约定的租赁期是从2025年9月1日起，承租人也确实自该日起实施装修工程并已完成，但由于出租人方面的原因导致承租人无法在约定的起租日入住，事实上出租人并未在该日“提供租赁资产使其可供承租人使用”，因此不能将2025年9月1日算作租赁期开始日，而应根据后续实际完成消防验收和发出入住通知的情况确定租赁期开始日。"}, {"tid": "5496035", "title": "求助，关于AI人工智能的软件企业销售软硬件问题", "category": "收入确认/总额净额", "questionAuthor": "腐草为萤", "questionTime": "2026-02-12 13:52:12", "replyTime": "2026-02-22 17:56:06", "replySortTime": "2026-02-22 17:56:06", "url": "https://bbs.esnai.com/thread-5496035-1-7.html", "question": "求助陈版主：\n\n我公司为一家AI人工智能为主要业务的公司，目前经营模式为：外购硬件，公司在硬件上进行设计软件、如动画放映、视频效果展示等，硬件为软件的载体，然后形成产品对外销售，成本金额中，硬件成本超过50%，目前正在IPO计划，关于前述产品是否可以作为“销售软件产品”形成公司的主营业务？是否必须要拆分“软件加硬件”作为销售分类为两大类（按照13%税率）？\n\n谢谢！", "reply": "要考虑软件和硬件是否高度绑定（例如软件能否单独出售，能否在多个不同的硬件平台上运行），即软件和硬件是整合为一个整体的履约义务，还是分别作为两项履约义务。如果分别作为两项履约义务的，则硬件业务大概率需采用净额法，即业务模式确定为硬件贸易和软件开发销售这两项相对独立的业务。\n\n如果存在高度关联性和重大整合，则构成一个单项履约义务（销售硬件和相关的嵌入式软件），此时硬件的外购成本作为该项履约义务的投入，在实现收入时结转成本。\n\n税务问题建议咨询税务专业人士意见。", "searchText": "5496035 求助，关于ai人工智能的软件企业销售软硬件问题 收入确认/总额净额 腐草为萤 求助陈版主：\n\n我公司为一家ai人工智能为主要业务的公司，目前经营模式为：外购硬件，公司在硬件上进行设计软件、如动画放映、视频效果展示等，硬件为软件的载体，然后形成产品对外销售，成本金额中，硬件成本超过50%，目前正在ipo计划，关于前述产品是否可以作为“销售软件产品”形成公司的主营业务？是否必须要拆分“软件加硬件”作为销售分类为两大类（按照13%税率）？\n\n谢谢！ 要考虑软件和硬件是否高度绑定（例如软件能否单独出售，能否在多个不同的硬件平台上运行），即软件和硬件是整合为一个整体的履约义务，还是分别作为两项履约义务。如果分别作为两项履约义务的，则硬件业务大概率需采用净额法，即业务模式确定为硬件贸易和软件开发销售这两项相对独立的业务。\n\n如果存在高度关联性和重大整合，则构成一个单项履约义务（销售硬件和相关的嵌入式软件），此时硬件的外购成本作为该项履约义务的投入，在实现收入时结转成本。\n\n税务问题建议咨询税务专业人士意见。"}, {"tid": "5496031", "title": "工程类企业审计率的变更，属于会计估计变更吗", "category": "审计/报告表达", "questionAuthor": "刘洪强", "questionTime": "2026-02-11 23:46:43", "replyTime": "2026-02-22 17:52:10", "replySortTime": "2026-02-22 17:52:10", "url": "https://bbs.esnai.com/thread-5496031-1-6.html", "question": "请教：工程类企业审计率的变更，属于会计估计变更吗？有家工程类企业，2024年预计审减率为10%，2025年预计审减率为2%，上述审减率的变更属于会计估计变更吗，应用指南中描述会计估计变更包括收人金额中交易价格的确定，是否包含这类情况？", "reply": "此处的审减率涉及对可变对价的会计估计，因此有可能属于会计估计变更（《企业会计准则第14号——收入（2017年修订）》第十六条）。但在实际操作中需注意区分是前期差错更正还是会计估计变更。\n\n参照《监管规则适用指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”：“企业不应简单将会计估计与实际结果对比认定存在差错。如果企业前期作出会计估计时，未能合理使用报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适用前期差错更正的会计处理方法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。”。\n\n因此，在主帖案例中，需要分析以往的10%预计审减率有何依据，是否符合当时的实际情况；现在将审减率改为2%的依据是什么，例如是否本企业的预算更加谨慎，或者改进了编制预算的方法；在目前经济形势下，甲方为何愿意调减审减率，是否具有商业合理性等。只有当本次变更前的审减率符合当初的实际情况，且本次变更具有合理理由，变更后的审减率符合当前实际情况的前提下，才能认可该项会计估计变更。", "searchText": "5496031 工程类企业审计率的变更，属于会计估计变更吗 审计/报告表达 刘洪强 请教：工程类企业审计率的变更，属于会计估计变更吗？有家工程类企业，2024年预计审减率为10%，2025年预计审减率为2%，上述审减率的变更属于会计估计变更吗，应用指南中描述会计估计变更包括收人金额中交易价格的确定，是否包含这类情况？ 此处的审减率涉及对可变对价的会计估计，因此有可能属于会计估计变更（《企业会计准则第14号——收入（2017年修订）》第十六条）。但在实际操作中需注意区分是前期差错更正还是会计估计变更。\n\n参照《监管规则适用指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”：“企业不应简单将会计估计与实际结果对比认定存在差错。如果企业前期作出会计估计时，未能合理使用报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适用前期差错更正的会计处理方法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。”。\n\n因此，在主帖案例中，需要分析以往的10%预计审减率有何依据，是否符合当时的实际情况；现在将审减率改为2%的依据是什么，例如是否本企业的预算更加谨慎，或者改进了编制预算的方法；在目前经济形势下，甲方为何愿意调减审减率，是否具有商业合理性等。只有当本次变更前的审减率符合当初的实际情况，且本次变更具有合理理由，变更后的审减率符合当前实际情况的前提下，才能认可该项会计估计变更。"}, {"tid": "5496005", "title": "固定资产内部交易", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "1432092334q和", "questionTime": "2026-02-09 20:10:56", "replyTime": "2026-02-22 17:40:10", "replySortTime": "2026-02-22 17:40:10", "url": "https://bbs.esnai.com/thread-5496005-1-7.html", "question": "固定资产内部交易，受让方作为在建工程入账，合并层面需要还原为固定资产吗", "reply": "在合并报表层面，如果只是将固定资产从一个子公司转移到另一个子公司，不增加其产生未来经济利益流入的能力，则相关支出应直接费用化，该设备应继续在合并报表的固定资产项目中列报（如运输和重新安装周期较长的，也可以转入其他非流动资产，暂停计提折旧）。\n\n安装调试完毕重新启用时，可根据届时该项设备的具体状况，重新估计确定剩余的预计可使用（折旧）年限。", "searchText": "5496005 固定资产内部交易 资产/存货/固定资产/无形资产 1432092334q和 固定资产内部交易，受让方作为在建工程入账，合并层面需要还原为固定资产吗 在合并报表层面，如果只是将固定资产从一个子公司转移到另一个子公司，不增加其产生未来经济利益流入的能力，则相关支出应直接费用化，该设备应继续在合并报表的固定资产项目中列报（如运输和重新安装周期较长的，也可以转入其他非流动资产，暂停计提折旧）。\n\n安装调试完毕重新启用时，可根据届时该项设备的具体状况，重新估计确定剩余的预计可使用（折旧）年限。"}, {"tid": "5496003", "title": "电费发票代收政府性基金", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "wx_646d7639c0ee", "questionTime": "2026-02-09 15:00:27", "replyTime": "2026-02-22 17:36:46", "replySortTime": "2026-02-22 17:36:46", "url": "https://bbs.esnai.com/thread-5496003-1-7.html", "question": "老师您好，我们是物业类企业，2026增值税法后，收到的电力发票把不征税的代收政府性基金单独列示出来了，这部分我们账面需要单独列示出来核算吗，还是像以前一样计入在电费成本里，如果单独核算入哪个科目合适。后续我们给业主开票的话，这部分不征税的要单独列出来么，算什么收入呢？谢谢", "reply": "由于2026年内只发生了税法的变化，企业与供电公司、下游用户之间的交易条款并未发生变化，故不应改变会计处理方法。\n\n根据财政部、证监会在会计监管报告、分析报告等多处提示，物业公司向租户转售水电应按净额法核算，不能采用总额法。这是会计核算方面的要求，与此次增值税立法无关。如果以前对转售水电按总额法核算的，应作为前期差错更正处理。对于包含在电费中的政府性基金不应计入转供电业务的收入和成本，应按代收代付处理，通过往来科目核算（如其他应收款、其他应付款）。\n\n开票问题建议咨询税务专业人士意见，并与主管税务机关沟通确认。", "searchText": "5496003 电费发票代收政府性基金 政府补助/ppp/税费/现金流 wx_646d7639c0ee 老师您好，我们是物业类企业，2026增值税法后，收到的电力发票把不征税的代收政府性基金单独列示出来了，这部分我们账面需要单独列示出来核算吗，还是像以前一样计入在电费成本里，如果单独核算入哪个科目合适。后续我们给业主开票的话，这部分不征税的要单独列出来么，算什么收入呢？谢谢 由于2026年内只发生了税法的变化，企业与供电公司、下游用户之间的交易条款并未发生变化，故不应改变会计处理方法。\n\n根据财政部、证监会在会计监管报告、分析报告等多处提示，物业公司向租户转售水电应按净额法核算，不能采用总额法。这是会计核算方面的要求，与此次增值税立法无关。如果以前对转售水电按总额法核算的，应作为前期差错更正处理。对于包含在电费中的政府性基金不应计入转供电业务的收入和成本，应按代收代付处理，通过往来科目核算（如其他应收款、其他应付款）。\n\n开票问题建议咨询税务专业人士意见，并与主管税务机关沟通确认。"}, {"tid": "5495994", "title": "关于政府给国有企业无偿注入房屋，隔几年后又收回的账务处理问题", "category": "合并/股权/权益法", "questionAuthor": "2471778478", "questionTime": "2026-02-08 19:30:58", "replyTime": "2026-02-22 17:30:44", "replySortTime": "2026-02-22 17:30:44", "url": "https://bbs.esnai.com/thread-5495994-1-6.html", "question": "请教陈版主及各位老师：\n\n      年报审计中遇到一个情况：2015年，住建局向国有企业无偿划入了一批资产（房屋建筑物），企业初始收到时按划入价值3000万元计入固定资产，同时确认了资本公积3000万元，2017年1月1日，该房屋建筑物用于出租，将其转换为以公允价值计量的投资性房地产，转换日前述房屋建筑物评估增值500万元，确认了其他综合收益375万和递延所得税负债125万，以后每年都按评估价调整公允价值并确认递延所得税。2024年末，递延所得税负债余额625万元，2017年末至2024年末累计公允价值增值2000万元。2025年末，住建局向该企业收回了这批资产，现在对于账务处理存在几项疑义。\n\n       该批资产2025年末的价值相对于2017年转换日整体是评估增值的，对于这段期间确认的递延所得税负债625万元是否结转至2025年所得税费用？2017年末至2024年末累计评估增值的2000万元的公允价值变动损益，在住建局收回资产时怎么进行账务处理？", "reply": "根据《企业会计准则第18号——所得税》第二十一条规定，由于无偿划入、划出均属于权益性交易，即“直接在所有者权益中确认的交易或者事项”，故其相关的所得税影响也应直接调整权益。\n\n该企业在将投资性房地产划出时，应按划出资产的账面价值冲减权益，与划出资产相关的累积其他综合收益也应当转入资本公积（两者相抵，相当于按照划入时的入账价值进行划出处理）。与之相对应，与其他综合收益、累计公允价值变动损益相关的递延所得税负债也应当转入资本公积。", "searchText": "5495994 关于政府给国有企业无偿注入房屋，隔几年后又收回的账务处理问题 合并/股权/权益法 2471778478 请教陈版主及各位老师：\n\n      年报审计中遇到一个情况：2015年，住建局向国有企业无偿划入了一批资产（房屋建筑物），企业初始收到时按划入价值3000万元计入固定资产，同时确认了资本公积3000万元，2017年1月1日，该房屋建筑物用于出租，将其转换为以公允价值计量的投资性房地产，转换日前述房屋建筑物评估增值500万元，确认了其他综合收益375万和递延所得税负债125万，以后每年都按评估价调整公允价值并确认递延所得税。2024年末，递延所得税负债余额625万元，2017年末至2024年末累计公允价值增值2000万元。2025年末，住建局向该企业收回了这批资产，现在对于账务处理存在几项疑义。\n\n       该批资产2025年末的价值相对于2017年转换日整体是评估增值的，对于这段期间确认的递延所得税负债625万元是否结转至2025年所得税费用？2017年末至2024年末累计评估增值的2000万元的公允价值变动损益，在住建局收回资产时怎么进行账务处理？ 根据《企业会计准则第18号——所得税》第二十一条规定，由于无偿划入、划出均属于权益性交易，即“直接在所有者权益中确认的交易或者事项”，故其相关的所得税影响也应直接调整权益。\n\n该企业在将投资性房地产划出时，应按划出资产的账面价值冲减权益，与划出资产相关的累积其他综合收益也应当转入资本公积（两者相抵，相当于按照划入时的入账价值进行划出处理）。与之相对应，与其他综合收益、累计公允价值变动损益相关的递延所得税负债也应当转入资本公积。"}, {"tid": "5495992", "title": "请教融资担保公司递延所得税的问题", "category": "所得税/递延所得税", "questionAuthor": "chen979195", "questionTime": "2026-02-07 23:38:24", "replyTime": "2026-02-22 17:15:36", "replySortTime": "2026-02-22 17:15:36", "url": "https://bbs.esnai.com/thread-5495992-1-7.html", "question": "请教陈版主以及各位老师：\n\n首先，这个是目前的税收政策——\n\n1.按照不超过当年年末担保责任余额1%的比例计提的担保赔偿准备，允许在企业所得税税前扣除，同时将上年度计提的担保赔偿准备余额转为当期收入。\n\n2.按照不超过当年担保费收入50%的比例计提的未到期责任准备，允许在企业所得税税前扣除，同时将上年度计提的未到期责任准备余额转为当期收入。\n\n其次，公司目前是担保赔偿准备按规定比例计提并将上年计提的金额在汇算清缴时做纳税调增，账面金额不做结转收入，只在发生实际损失时冲减准备金；未到期责任准备按比例计提同时冲减上年计提金额。\n\n我的疑问是，这种情况下是否产生可抵扣暂时性差异？公司之前是期末按担保赔偿准备的期初余额计提递延所得税资产，搜了一些同行业公司的报告有提的也有不提的，计提标准也看不出来。个人感觉不存在暂时性差异，要有也是应纳税暂时性差异才对。", "reply": "由于税前扣除（或转回）时点与会计上计入损益的时点不同，因此两项准备金的账面价值和计税基础也是有差异的（如果计提的时间和比例，以及转回的时间完全相同，则无差异），需就相关差异确认递延所得税资产或负债。\n\n建议根据该企业的具体情况核对纳税调整情况，如存在纳税调整情况的，则表明多数可能下需要确认递延所得税资产或负债。", "searchText": "5495992 请教融资担保公司递延所得税的问题 所得税/递延所得税 chen979195 请教陈版主以及各位老师：\n\n首先，这个是目前的税收政策——\n\n1.按照不超过当年年末担保责任余额1%的比例计提的担保赔偿准备，允许在企业所得税税前扣除，同时将上年度计提的担保赔偿准备余额转为当期收入。\n\n2.按照不超过当年担保费收入50%的比例计提的未到期责任准备，允许在企业所得税税前扣除，同时将上年度计提的未到期责任准备余额转为当期收入。\n\n其次，公司目前是担保赔偿准备按规定比例计提并将上年计提的金额在汇算清缴时做纳税调增，账面金额不做结转收入，只在发生实际损失时冲减准备金；未到期责任准备按比例计提同时冲减上年计提金额。\n\n我的疑问是，这种情况下是否产生可抵扣暂时性差异？公司之前是期末按担保赔偿准备的期初余额计提递延所得税资产，搜了一些同行业公司的报告有提的也有不提的，计提标准也看不出来。个人感觉不存在暂时性差异，要有也是应纳税暂时性差异才对。 由于税前扣除（或转回）时点与会计上计入损益的时点不同，因此两项准备金的账面价值和计税基础也是有差异的（如果计提的时间和比例，以及转回的时间完全相同，则无差异），需就相关差异确认递延所得税资产或负债。\n\n建议根据该企业的具体情况核对纳税调整情况，如存在纳税调整情况的，则表明多数可能下需要确认递延所得税资产或负债。"}, {"tid": "5495987", "title": "研发形成固定资产是否属于研发支出资本化", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "尹峰", "questionTime": "2026-02-07 20:07:50", "replyTime": "2026-02-22 17:04:09", "replySortTime": "2026-02-22 17:04:09", "url": "https://bbs.esnai.com/thread-5495987-1-7.html", "question": "请教陈版，A公司从事专用设备的制造，研发中心有时会研制专用设备某些测试平台，这类平台不对外销售，未来持续用于研发活动。A公司账面通过在建工程核算其全周期的支出（主要是领料和人工），最终项目结项资产达到可使用状态后转入固定资产。个人判断这种研制平台行为应该是固定资产购建行为，与研发无关。但结合《企业会计准则解释第15号》，请问这种属于研发支出资本化吗？但研发支出资本化形成无形资产都是资本化阶段的支出才形成资产，这种如果属于研发支出资本化，不就是全周期的投入都资本化为固定资产了吗", "reply": "基本赞同主帖中的理解，此类研发平台属于固定资产购建行为，不属于研发活动，因此可以根据固定资产准则的规定，将购建过程中发生的必要、合理支出计入其原值。后续通过折旧方式将其成本分摊到各受益的研发项目中，计入各项目的研发支出，再根据相关折旧发生时对应的研发项目是否已经进入资本化阶段，与同时发生的该项目其他研发支出一并考虑其费用化/资本化问题。\n\n该事项不适用解释15号第一条规定。", "searchText": "5495987 研发形成固定资产是否属于研发支出资本化 资产/存货/固定资产/无形资产 尹峰 请教陈版，a公司从事专用设备的制造，研发中心有时会研制专用设备某些测试平台，这类平台不对外销售，未来持续用于研发活动。a公司账面通过在建工程核算其全周期的支出（主要是领料和人工），最终项目结项资产达到可使用状态后转入固定资产。个人判断这种研制平台行为应该是固定资产购建行为，与研发无关。但结合《企业会计准则解释第15号》，请问这种属于研发支出资本化吗？但研发支出资本化形成无形资产都是资本化阶段的支出才形成资产，这种如果属于研发支出资本化，不就是全周期的投入都资本化为固定资产了吗 基本赞同主帖中的理解，此类研发平台属于固定资产购建行为，不属于研发活动，因此可以根据固定资产准则的规定，将购建过程中发生的必要、合理支出计入其原值。后续通过折旧方式将其成本分摊到各受益的研发项目中，计入各项目的研发支出，再根据相关折旧发生时对应的研发项目是否已经进入资本化阶段，与同时发生的该项目其他研发支出一并考虑其费用化/资本化问题。\n\n该事项不适用解释15号第一条规定。"}, {"tid": "5495984", "title": "负商誉中关于递延所得税的确认", "category": "合并/股权/权益法", "questionAuthor": "zhaixd", "questionTime": "2026-02-07 19:44:49", "replyTime": "2026-02-22 17:01:31", "replySortTime": "2026-02-22 17:01:31", "url": "https://bbs.esnai.com/thread-5495984-1-6.html", "question": "陈版主，您好！向您请教一个问题：\n\n境内上市公司A，100%持有新加坡公司（SPV），SPV通过股权100%收购取得境外交易对手B持有的3家子公司（分别在美国、越南及深圳），由于SPV公司支付的对价小于收购日三家被购买方的可辨认净资产公允价值（经复核后没有问题），因此SPV合并层面整体确认了负商誉（营业外收入），其中美国、越南公司长期资产均是减值，深圳增值，请问陈老师：\n\n合并日在编制国内上市公司合并财务报表时，针对深圳公司增值，假设未来能够产生足够的应纳税所得额，是否应针对此部分增值资产确认递延所得税负债（贷方）和营业外收入（借方），并针对后续的折旧费用确认递延所得税费用，个人感觉有些奇怪，营业外收入系针对整个被购买方的净资产公允价值结果来看的，但是递延又是单独考虑，还请陈老师帮忙指点，需要注意哪些问题，非常感谢！", "reply": "与被收购方资产评估增值相关的递延所得税负债应以单个被收购方为单位，分别依据其适用的税率来确认，因此对于被收购的深圳公司的资产评估增值，需确认对应的递延所得税负债，相应减少负商誉或增加正商誉。\n\n首先应将SPV收购三家公司的总价按各自股权的相对公允价值比例分配给各被收购公司，再分别针对被收购公司确认商誉或负商誉，针对不同标的公司的商誉和负商誉不能互相抵减。\n\n关于确认负商誉应注意的事项，请参阅《中审众环研究2020》之“问题3-2-58（非同一控制下合并中负商誉确认应注意的问题）”。", "searchText": "5495984 负商誉中关于递延所得税的确认 合并/股权/权益法 zhaixd 陈版主，您好！向您请教一个问题：\n\n境内上市公司a，100%持有新加坡公司（spv），spv通过股权100%收购取得境外交易对手b持有的3家子公司（分别在美国、越南及深圳），由于spv公司支付的对价小于收购日三家被购买方的可辨认净资产公允价值（经复核后没有问题），因此spv合并层面整体确认了负商誉（营业外收入），其中美国、越南公司长期资产均是减值，深圳增值，请问陈老师：\n\n合并日在编制国内上市公司合并财务报表时，针对深圳公司增值，假设未来能够产生足够的应纳税所得额，是否应针对此部分增值资产确认递延所得税负债（贷方）和营业外收入（借方），并针对后续的折旧费用确认递延所得税费用，个人感觉有些奇怪，营业外收入系针对整个被购买方的净资产公允价值结果来看的，但是递延又是单独考虑，还请陈老师帮忙指点，需要注意哪些问题，非常感谢！ 与被收购方资产评估增值相关的递延所得税负债应以单个被收购方为单位，分别依据其适用的税率来确认，因此对于被收购的深圳公司的资产评估增值，需确认对应的递延所得税负债，相应减少负商誉或增加正商誉。\n\n首先应将spv收购三家公司的总价按各自股权的相对公允价值比例分配给各被收购公司，再分别针对被收购公司确认商誉或负商誉，针对不同标的公司的商誉和负商誉不能互相抵减。\n\n关于确认负商誉应注意的事项，请参阅《中审众环研究2020》之“问题3-2-58（非同一控制下合并中负商誉确认应注意的问题）”。"}, {"tid": "5495983", "title": "关于收入确认", "category": "收入确认/总额净额", "questionAuthor": "yanglei198704", "questionTime": "2026-02-07 16:12:20", "replyTime": "2026-02-22 16:53:22", "replySortTime": "2026-02-22 16:53:22", "url": "https://bbs.esnai.com/thread-5495983-1-7.html", "question": "事情背景：2024年5月，公司与客户签订设备销售合同，2024年12月，公司完成设备交付，并确认相应的收入。2024年11月，公司与客户签订另外一份合同，合同约定交付相应的设备同时需要承担安装义务，安装义务的范围包括该合同的相关设备，也包括前述合同的设备安装。公司收入确认原则为：承担安装义务的设备交付，在取得客户安装调试验收后确认收入，不承担安装义务的，签收后确认收入。\n\n问题：由于2024年11月，对原先合同的安装义务进行了重新约定，是否需要改变原合同的收入确认方式。从合同签订日期角度来看，2024年11月，公司已经知晓原先合同需要承担安装义务，应该可以按照安装调试后确认收入，但这是时间上的巧合，若第二份合同，签订在2025年11月，是否需要对2024年确认的收入进行更正呢？", "reply": "对于此前已签订的原合同，应关注其所涉及商品（设备）的安装是否构成单项履约义务。从主帖信息看，很可能安装服务与设备交付之间不存在紧密关联，两者各自构成独立履约义务的可能性更大。此时，如果原合同未约定由公司负责安装，而现在改由公司负责安装，但合同总价不变，就应当在识别履约义务的基础上，将合同总价按各自单独售价的比例重新分配到各单项履约义务，并各自在控制权转移时点确认收入。\n\n理论上说，如果设备交付和安装服务是两项履约义务，则与前者相关的收入在设备交付给客户时确认，与后者相关的收入在安装调试完成后确认。实务中如果设备交付时客户只有签收而无正式验收，则一般也是会递延到安装调试完成时一并确认收入。\n\n上述合同变更（不论是否发生于原合同的所有履约义务均已履行完毕之后）属于新收入准则第八条合同变更的第（二）种情形。由于新增的履约义务无对应的对价，故不调整此前已确认的收入，但对于新增的原合同下设备的安装义务纳入新合同下的对价分配。在完成原合同下设备安装时确认相应收入，相应减少了新合同下新增设备的销售和安装服务的收入。", "searchText": "5495983 关于收入确认 收入确认/总额净额 yanglei198704 事情背景：2024年5月，公司与客户签订设备销售合同，2024年12月，公司完成设备交付，并确认相应的收入。2024年11月，公司与客户签订另外一份合同，合同约定交付相应的设备同时需要承担安装义务，安装义务的范围包括该合同的相关设备，也包括前述合同的设备安装。公司收入确认原则为：承担安装义务的设备交付，在取得客户安装调试验收后确认收入，不承担安装义务的，签收后确认收入。\n\n问题：由于2024年11月，对原先合同的安装义务进行了重新约定，是否需要改变原合同的收入确认方式。从合同签订日期角度来看，2024年11月，公司已经知晓原先合同需要承担安装义务，应该可以按照安装调试后确认收入，但这是时间上的巧合，若第二份合同，签订在2025年11月，是否需要对2024年确认的收入进行更正呢？ 对于此前已签订的原合同，应关注其所涉及商品（设备）的安装是否构成单项履约义务。从主帖信息看，很可能安装服务与设备交付之间不存在紧密关联，两者各自构成独立履约义务的可能性更大。此时，如果原合同未约定由公司负责安装，而现在改由公司负责安装，但合同总价不变，就应当在识别履约义务的基础上，将合同总价按各自单独售价的比例重新分配到各单项履约义务，并各自在控制权转移时点确认收入。\n\n理论上说，如果设备交付和安装服务是两项履约义务，则与前者相关的收入在设备交付给客户时确认，与后者相关的收入在安装调试完成后确认。实务中如果设备交付时客户只有签收而无正式验收，则一般也是会递延到安装调试完成时一并确认收入。\n\n上述合同变更（不论是否发生于原合同的所有履约义务均已履行完毕之后）属于新收入准则第八条合同变更的第（二）种情形。由于新增的履约义务无对应的对价，故不调整此前已确认的收入，但对于新增的原合同下设备的安装义务纳入新合同下的对价分配。在完成原合同下设备安装时确认相应收入，相应减少了新合同下新增设备的销售和安装服务的收入。"}, {"tid": "5495981", "title": "关于权益法下，是按被投资方的单体报表还是合并报表确认净利润", "category": "合并/股权/权益法", "questionAuthor": "kuailemt808", "questionTime": "2026-02-07 11:53:03", "replyTime": "2026-02-22 16:27:06", "replySortTime": "2026-02-22 16:27:06", "url": "https://bbs.esnai.com/thread-5495981-1-7.html", "question": "陈老师好，A公司持有B公司20%的股权并派驻一董事，对B公司具有重大影响，因此该项长期股权投资采用权益法核算。B公司下属有几家控股子公司，因此B公司需编制合并报表。\n\n      问题：A公司在各会计期间是按B公司的合并报表还是B公司作为母公司的单体报表确认净利润及相关权益的变动？相关文件对该核算的处理是否有明确的要求？\n\n       请陈老师指导。谢谢", "reply": "通常情况下，权益法核算所依据的口径是被投资方合并报表层面的归属母公司普通股股东的净资产和净利润。在依据投资日被投资方可辨认净资产公允价值对折旧、摊销、成本结转等项目进行调整后，以调整后的该口径净利润乘以投资方持股比例确认投资收益。如涉及未实现顺流或逆流交易损益抵销的，还应按比例抵销未实现的顺流或逆流交易损益。", "searchText": "5495981 关于权益法下，是按被投资方的单体报表还是合并报表确认净利润 合并/股权/权益法 kuailemt808 陈老师好，a公司持有b公司20%的股权并派驻一董事，对b公司具有重大影响，因此该项长期股权投资采用权益法核算。b公司下属有几家控股子公司，因此b公司需编制合并报表。\n\n      问题：a公司在各会计期间是按b公司的合并报表还是b公司作为母公司的单体报表确认净利润及相关权益的变动？相关文件对该核算的处理是否有明确的要求？\n\n       请陈老师指导。谢谢 通常情况下，权益法核算所依据的口径是被投资方合并报表层面的归属母公司普通股股东的净资产和净利润。在依据投资日被投资方可辨认净资产公允价值对折旧、摊销、成本结转等项目进行调整后，以调整后的该口径净利润乘以投资方持股比例确认投资收益。如涉及未实现顺流或逆流交易损益抵销的，还应按比例抵销未实现的顺流或逆流交易损益。"}, {"tid": "5495978", "title": "急求陈版主_期权的公允价值", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "雲", "questionTime": "2026-02-06 21:07:49", "replyTime": "2026-02-22 16:01:36", "replySortTime": "2026-02-22 16:01:36", "url": "https://bbs.esnai.com/thread-5495978-1-6.html", "question": "某公司授予员工期权，当前公允价值为20元实际行权价格根据净利润的高低会调整，最高10元，最低1元，比如净利润到了4个亿，按照1元每股认购，比如净利润到了2亿，按照10元认购。\n\n想问下授予日公允价值如何确认。", "reply": "这种条款在实务中较为少见，个人理解可视为两项业务分别进行会计处理：\n\n1、一项行权价为10元的期权，可行权条件为净利润大于2亿元；\n\n2、一项金额为【（10-1）元*所授予股份数量】的现金奖励，可行权条件为净利润大于4亿元，等待期与1中的期权相同。\n\n上述1按权益结算的股份支付处理，2按照长期职工薪酬处理。2相关的职工薪酬费用也是在等待期内摊销计入各期职工薪酬费用，但应以预期可满足业绩条件（净利润大于4亿元）为前提。等待期内每个资产负债表日，俊英谨慎估计剩余等待期的业绩，根据修正后的盈利预测分别判断上述两项股份支付和职工薪酬对应的业绩条件能否满足。若相关会计估计发生变化的，则作为会计估计变更处理。", "searchText": "5495978 急求陈版主_期权的公允价值 金融工具/外币/债务重组/abs 雲 某公司授予员工期权，当前公允价值为20元实际行权价格根据净利润的高低会调整，最高10元，最低1元，比如净利润到了4个亿，按照1元每股认购，比如净利润到了2亿，按照10元认购。\n\n想问下授予日公允价值如何确认。 这种条款在实务中较为少见，个人理解可视为两项业务分别进行会计处理：\n\n1、一项行权价为10元的期权，可行权条件为净利润大于2亿元；\n\n2、一项金额为【（10-1）元*所授予股份数量】的现金奖励，可行权条件为净利润大于4亿元，等待期与1中的期权相同。\n\n上述1按权益结算的股份支付处理，2按照长期职工薪酬处理。2相关的职工薪酬费用也是在等待期内摊销计入各期职工薪酬费用，但应以预期可满足业绩条件（净利润大于4亿元）为前提。等待期内每个资产负债表日，俊英谨慎估计剩余等待期的业绩，根据修正后的盈利预测分别判断上述两项股份支付和职工薪酬对应的业绩条件能否满足。若相关会计估计发生变化的，则作为会计估计变更处理。"}, {"tid": "5495961", "title": "同一控制下无偿划转资本公积可以出现负数吗", "category": "合并/股权/权益法", "questionAuthor": "meix823", "questionTime": "2026-02-05 16:48:23", "replyTime": "2026-02-22 15:53:26", "replySortTime": "2026-02-22 15:53:26", "url": "https://bbs.esnai.com/thread-5495961-1-7.html", "question": "甲公司和乙公司同属于A集团，A集团通过无偿划转将乙公司股权划转到甲公司，形成长投和资本公积各增加100万，同时甲公司划转部分固定资产到A集团10万，甲公司单体冲减了资本公积10万，这种情况下甲公司合并层面资本公积可以出现负数吗？还是冲减留存收益，保持资本公积为0？", "reply": "准则规定是对于资本公积（资本溢价或股本溢价）如不够冲减，则不够冲减的缺口金额继续按顺序冲减盈余公积和未分配利润。\n\n但个人认为，合并报表主体不是法律主体而是经济主体，其中的权益明细分类并不具备像个别报表中那样特殊的法律意义，因此合并报表层面的资本公积应当是允许出现负数的。资本公积和留存收益分别是两种不同来源的股东权益。两者之间的界限应当明确，前者不足冲减时继续冲减后者，模糊了这两大类权益的界限，似乎并不恰当。", "searchText": "5495961 同一控制下无偿划转资本公积可以出现负数吗 合并/股权/权益法 meix823 甲公司和乙公司同属于a集团，a集团通过无偿划转将乙公司股权划转到甲公司，形成长投和资本公积各增加100万，同时甲公司划转部分固定资产到a集团10万，甲公司单体冲减了资本公积10万，这种情况下甲公司合并层面资本公积可以出现负数吗？还是冲减留存收益，保持资本公积为0？ 准则规定是对于资本公积（资本溢价或股本溢价）如不够冲减，则不够冲减的缺口金额继续按顺序冲减盈余公积和未分配利润。\n\n但个人认为，合并报表主体不是法律主体而是经济主体，其中的权益明细分类并不具备像个别报表中那样特殊的法律意义，因此合并报表层面的资本公积应当是允许出现负数的。资本公积和留存收益分别是两种不同来源的股东权益。两者之间的界限应当明确，前者不足冲减时继续冲减后者，模糊了这两大类权益的界限，似乎并不恰当。"}, {"tid": "5495935", "title": "权益法下不构成业务的处理", "category": "合并/股权/权益法", "questionAuthor": "no236bat", "questionTime": "2026-02-03 17:16:51", "replyTime": "2026-02-22 12:42:27", "replySortTime": "2026-02-22 12:42:27", "url": "https://bbs.esnai.com/thread-5495935-1-7.html", "question": "有以下一个问题想求助陈版：A公司收购B公司股权、B公司不构成业务，如果收购比例为80%达到控制、溢价部分不能作为商誉、应作为资产增值、后续摊销。但实际收购比例只有30%，未达到控制，按权益法核算，此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销吗？有无对应的准则依据？谢谢陈版~@chenyiwei", "reply": "如果被投资方不构成业务，则此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销，\n\n权益法长投核算中的购买对价分摊与合并报表层面对被购买方的购买对价分摊的原则类似。\n\nIAS 28.26: Many of the procedures that are appropriate for the application of the equity method are similar to the consolidation procedures described in IFRS 10. Furthermore, the concepts underlying the procedures used in accounting for the acquisition of a subsidiary are also adopted in accounting for the acquisition of an investment in an associate or a joint venture.", "searchText": "5495935 权益法下不构成业务的处理 合并/股权/权益法 no236bat 有以下一个问题想求助陈版：a公司收购b公司股权、b公司不构成业务，如果收购比例为80%达到控制、溢价部分不能作为商誉、应作为资产增值、后续摊销。但实际收购比例只有30%，未达到控制，按权益法核算，此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销吗？有无对应的准则依据？谢谢陈版~@chenyiwei 如果被投资方不构成业务，则此时支付对价中的30%股权对应的溢价部分，也需要视为资产增值、后续摊销，\n\n权益法长投核算中的购买对价分摊与合并报表层面对被购买方的购买对价分摊的原则类似。\n\nias 28.26: many of the procedures that are appropriate for the application of the equity method are similar to the consolidation procedures described in ifrs 10. furthermore, the concepts underlying the procedures used in accounting for the acquisition of a subsidiary are also adopted in accounting for the acquisition of an investment in an associate or a joint venture."}, {"tid": "5495934", "title": "请教陈版主，政府部门给平台公司无偿划拨子公司，应该按同控还是其他方式处理呢", "category": "合并/股权/权益法", "questionAuthor": "15855161732", "questionTime": "2026-02-03 11:50:42", "replyTime": "2026-02-22 12:37:09", "replySortTime": "2026-02-22 12:37:09", "url": "https://bbs.esnai.com/thread-5495934-1-6.html", "question": "请教陈版主，政府部门给国企平台公司无偿划拨全资子公司，应该按同控还是其他方式处理呢？\n\n方式一：按同控。\n\n个表：按划拨日子公司账面净资产/清产核资结果/审计报告净资产作为入账价值，并确认资本公积。\n\n合表：追溯调整子公司权益，视同期初已纳入合并范围。\n\n方式二：行政性调整，非市场交易。\n\n个表同上。\n\n合表：视同划拨日起纳入合并范围，不追溯调整。", "reply": "如果被划转的标的公司和划入方同属于一个政府管理，则一般按同一控制下合并处理（方式一）；如果两者并不隶属于同一个政府（如将市属企业股权划拨给省属企业），则按三去一降一补的划转规定处理（方式二）。", "searchText": "5495934 请教陈版主，政府部门给平台公司无偿划拨子公司，应该按同控还是其他方式处理呢 合并/股权/权益法 15855161732 请教陈版主，政府部门给国企平台公司无偿划拨全资子公司，应该按同控还是其他方式处理呢？\n\n方式一：按同控。\n\n个表：按划拨日子公司账面净资产/清产核资结果/审计报告净资产作为入账价值，并确认资本公积。\n\n合表：追溯调整子公司权益，视同期初已纳入合并范围。\n\n方式二：行政性调整，非市场交易。\n\n个表同上。\n\n合表：视同划拨日起纳入合并范围，不追溯调整。 如果被划转的标的公司和划入方同属于一个政府管理，则一般按同一控制下合并处理（方式一）；如果两者并不隶属于同一个政府（如将市属企业股权划拨给省属企业），则按三去一降一补的划转规定处理（方式二）。"}, {"tid": "5495926", "title": "集团内无偿划转股权账务处理", "category": "合并/股权/权益法", "questionAuthor": "七夜の念", "questionTime": "2026-02-02 15:56:27", "replyTime": "2026-02-22 12:35:22", "replySortTime": "2026-02-22 12:35:22", "url": "https://bbs.esnai.com/thread-5495926-1-7.html", "question": "假设 A集团拥有B、C、D三个子公司，持股比例均为100%。由于业务规划，2025年11月份，A将B、C两个子公司无偿划转至D公司（专门新成立的子公司，用于接收B、C公司业务），A对B、C、D的长期股权投资账面价值分别为1亿、1.5亿、3000万。2025年10月31日B、C公司净资产分别为3亿元、0.55亿元；2024年12月31日B、C净资产分别为2.5亿元、0.5亿元。请教陈版以下问题及账务处理：\n\n1、股权划转基准日是否为10月31日比较合理，D公司以10月31日B、C公司账面净资产作为长投入账？\n\n2、单体账务处理：\n\n（1）A公司：\n\n    借：长期股权投资-D 2.5\n\n         贷：长期股权投资-B  1\n\n         贷：长期股权投资-C  1.5\n\n（2）B、C不作账务处理，只将股东名称变更并做变更工商登记即可。\n\n（3）D公司：\n\n  借：长期股权投资-B  3\n\n  借：长期股权投资-C  0.55\n\n         贷：资本公积-资本溢价  3.55\n\n3、合并账务处理\n\n（1）D公司：\n\n资产负债表期初追溯到2024年12月31日，即假设2024年12月31日D已合并B、C\n\n①第一种账务处理：(假设D按照2024年12月31日时点B和C的净资产作为长期股权投资入账成本)\n\n借：长期股权投资 -B 2.5\n\n借：长期股权投资 -C 0.5\n\n    贷：资本公积-资本溢价  3\n\n借：B公司权益 2.5\n\n借：C公司权益  0.5\n\n    贷：长期股权投资  3\n\n②第二种账务处理：(假设D按照A对B和C的长投账面价值长期股权投资入账成本)\n\n借：长期股权投资 -B 2.5\n\n借：长期股权投资 -C 0.5\n\n    贷：资本公积-资本溢价  3，然后按照2024年A合并B、C的处理进行调整\n\n请教陈版如下问题：\n\n（1）D公司合并日为2025年10月31日，我的理解是否正确？\n\n（2）对于各公司单体账务处理是否正确；若B公司当时是A收购形成，存在商誉，算B公司净资产份额是否考虑商誉减值，是商誉减值后净资产份额吗？\n\n（3）对于D公司合并，哪种处理是正确的，D公司调整的资本公积在合并报表也存在吗，需要还原到未分配利润吗？post_newreply", "reply": "1、无论基准日如何确定，涉及各方均在完成划转操作时进行账务处理。\n\n2、D公司的合并日可以确定为2025年10月31日。D公司按同一控制下合并进行账务处理，因此应以A合并报表层面B、C的净资产（含商誉）于合并日的账面价值（以原非同一控制下合并的购买日公允价值为基础持续计算到合并日的金额）为基础。\n\n3、如果B历史上是通过非同一控制下合并被纳入A的控制范围的，则此处作为D 同一控制下合并账务处理基础的净资产账面价值是A合并报表层面的净资产账面价值，包含A合并报表中关于B公司的商誉在内。", "searchText": "5495926 集团内无偿划转股权账务处理 合并/股权/权益法 七夜の念 假设 a集团拥有b、c、d三个子公司，持股比例均为100%。由于业务规划，2025年11月份，a将b、c两个子公司无偿划转至d公司（专门新成立的子公司，用于接收b、c公司业务），a对b、c、d的长期股权投资账面价值分别为1亿、1.5亿、3000万。2025年10月31日b、c公司净资产分别为3亿元、0.55亿元；2024年12月31日b、c净资产分别为2.5亿元、0.5亿元。请教陈版以下问题及账务处理：\n\n1、股权划转基准日是否为10月31日比较合理，d公司以10月31日b、c公司账面净资产作为长投入账？\n\n2、单体账务处理：\n\n（1）a公司：\n\n    借：长期股权投资-d 2.5\n\n         贷：长期股权投资-b  1\n\n         贷：长期股权投资-c  1.5\n\n（2）b、c不作账务处理，只将股东名称变更并做变更工商登记即可。\n\n（3）d公司：\n\n  借：长期股权投资-b  3\n\n  借：长期股权投资-c  0.55\n\n         贷：资本公积-资本溢价  3.55\n\n3、合并账务处理\n\n（1）d公司：\n\n资产负债表期初追溯到2024年12月31日，即假设2024年12月31日d已合并b、c\n\n①第一种账务处理：(假设d按照2024年12月31日时点b和c的净资产作为长期股权投资入账成本)\n\n借：长期股权投资 -b 2.5\n\n借：长期股权投资 -c 0.5\n\n    贷：资本公积-资本溢价  3\n\n借：b公司权益 2.5\n\n借：c公司权益  0.5\n\n    贷：长期股权投资  3\n\n②第二种账务处理：(假设d按照a对b和c的长投账面价值长期股权投资入账成本)\n\n借：长期股权投资 -b 2.5\n\n借：长期股权投资 -c 0.5\n\n    贷：资本公积-资本溢价  3，然后按照2024年a合并b、c的处理进行调整\n\n请教陈版如下问题：\n\n（1）d公司合并日为2025年10月31日，我的理解是否正确？\n\n（2）对于各公司单体账务处理是否正确；若b公司当时是a收购形成，存在商誉，算b公司净资产份额是否考虑商誉减值，是商誉减值后净资产份额吗？\n\n（3）对于d公司合并，哪种处理是正确的，d公司调整的资本公积在合并报表也存在吗，需要还原到未分配利润吗？post_newreply 1、无论基准日如何确定，涉及各方均在完成划转操作时进行账务处理。\n\n2、d公司的合并日可以确定为2025年10月31日。d公司按同一控制下合并进行账务处理，因此应以a合并报表层面b、c的净资产（含商誉）于合并日的账面价值（以原非同一控制下合并的购买日公允价值为基础持续计算到合并日的金额）为基础。\n\n3、如果b历史上是通过非同一控制下合并被纳入a的控制范围的，则此处作为d 同一控制下合并账务处理基础的净资产账面价值是a合并报表层面的净资产账面价值，包含a合并报表中关于b公司的商誉在内。"}, {"tid": "5495915", "title": "请教陈老师有关于合并报表外币折算差异", "category": "合并/股权/权益法", "questionAuthor": "wx_5dba3aa5b69b", "questionTime": "2026-02-01 18:56:37", "replyTime": "2026-02-22 12:20:36", "replySortTime": "2026-02-22 12:20:36", "url": "https://bbs.esnai.com/thread-5495915-1-7.html", "question": "外币折算的报表中未分配利润注销，但是累计的合并未分配利润在合并报表折算不是0，那这部分的未分配利润爱合并报表怎么结转，请教陈老师有无遇到这样子的案例", "reply": "具体是什么情况？请给出具体的例子。", "searchText": "5495915 请教陈老师有关于合并报表外币折算差异 合并/股权/权益法 wx_5dba3aa5b69b 外币折算的报表中未分配利润注销，但是累计的合并未分配利润在合并报表折算不是0，那这部分的未分配利润爱合并报表怎么结转，请教陈老师有无遇到这样子的案例 具体是什么情况？请给出具体的例子。"}, {"tid": "5495914", "title": "临床费用计入现金流量表的哪个科目？", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "sparkool", "questionTime": "2026-02-01 10:54:49", "replyTime": "2026-02-22 12:19:43", "replySortTime": "2026-02-22 12:19:43", "url": "https://bbs.esnai.com/thread-5495914-1-6.html", "question": "请教大神：\n\n公司研发项目过程中的CRO、临床试验、动物试验费用，是计入支付的其他与经营活动有关的现金，还是采购商品接受劳务支付的现金流呢？\n\n谢谢。", "reply": "这些项目都是计入营业成本的，因此对应的现金流量应列入“购买商品、接受劳务支付的现金”。", "searchText": "5495914 临床费用计入现金流量表的哪个科目？ 政府补助/ppp/税费/现金流 sparkool 请教大神：\n\n公司研发项目过程中的cro、临床试验、动物试验费用，是计入支付的其他与经营活动有关的现金，还是采购商品接受劳务支付的现金流呢？\n\n谢谢。 这些项目都是计入营业成本的，因此对应的现金流量应列入“购买商品、接受劳务支付的现金”。"}, {"tid": "5495906", "title": "求助陈版主，股权划转的疑问。", "category": "合并/股权/权益法", "questionAuthor": "liuweisheng", "questionTime": "2026-01-31 10:40:33", "replyTime": "2026-02-22 12:18:55", "replySortTime": "2026-02-22 12:18:55", "url": "https://bbs.esnai.com/thread-5495906-1-7.html", "question": "本帖最后由 liuweisheng 于 2026-1-31 10:44 编辑\n\n国有单位   A是母公司  B是子公司  C是孙公司；A持有B100%股权，A持有C80%股权（成本法），B持有C20%（权益法）；2025年8月，B将持有C公司20%股权无偿划转给A。 转让时B公司持有长投余额130万元（本金100万，损益调整30万），B公司  借：资本公积   130万元，贷：长投130万元；A公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；谢谢版主解惑。", "reply": "B将所持有C的20%股权划转给A，对A而言属于投资收回，故应冲减对B的长投成本，而不能贷记A本身的资本公积。\n\n该交易并不是A与更上层母公司之间的权益性交易，所以不能调整A自身的资本公积。\n\n权益性交易中，只有被投资方才是调整权益，投资方应调整对被投资方的长投成本。", "searchText": "5495906 求助陈版主，股权划转的疑问。 合并/股权/权益法 liuweisheng 本帖最后由 liuweisheng 于 2026-1-31 10:44 编辑\n\n国有单位   a是母公司  b是子公司  c是孙公司；a持有b100%股权，a持有c80%股权（成本法），b持有c20%（权益法）；2025年8月，b将持有c公司20%股权无偿划转给a。 转让时b公司持有长投余额130万元（本金100万，损益调整30万），b公司  借：资本公积   130万元，贷：长投130万元；a公司借：长投130万元，贷：资本公积130万元，这样处理是否正确；谢谢版主解惑。 b将所持有c的20%股权划转给a，对a而言属于投资收回，故应冲减对b的长投成本，而不能贷记a本身的资本公积。\n\n该交易并不是a与更上层母公司之间的权益性交易，所以不能调整a自身的资本公积。\n\n权益性交易中，只有被投资方才是调整权益，投资方应调整对被投资方的长投成本。"}, {"tid": "5495898", "title": "求教：预收货款的外币折算问题", "category": "收入确认/总额净额", "questionAuthor": "scmhhh", "questionTime": "2026-01-30 17:44:45", "replyTime": "2026-02-22 12:16:04", "replySortTime": "2026-02-22 12:16:04", "url": "https://bbs.esnai.com/thread-5495898-1-6.html", "question": "根据《企业会计准则第19号——外币折算》，非货币性项目期末不进行汇率折算，而是以历史成本计量。\n\n问题1：预收货款应该属于非货币性项目，期末也不进行汇率折算？\n\n问题2：预收款实际发货时，确认收入和应收账款的入账汇率应该选择收款历史时点的汇率还是发货当天汇率？\n\n问题3：如果问题2的汇率选择是发货当天汇率，那么发货与收款两个时点的汇率差异是进汇兑损益吗？还是直接作为可变对价进收入？\n\n问题4：如果问题3的答案是进入汇兑损益，那么《外币折算》准则规定的非货币性项目不进行汇率折算的意义何在？\n\n如果期末汇率折算，汇兑损益影响=收款时点和期末时点汇率折算差异+期末时点和发货时点汇率折算差异；如果期末不进行汇率折算，汇兑损益影响=收款时点和发货时点汇率折算差异。两种算法对汇兑损益的影响理论上相同，准则这条规定预收货款期末不折汇对损益也就没有了影响。", "reply": "参考：https://kjs.mof.gov.cn/zt/kjzzss ... 210302_3664191.htm.\n\n由于外币预收、预付款项属于非货币性项目，故后续预付款项收到所订购的商品时，入账价值为原付款日的历史汇率折算的金额；预收账款或合同负债结转收入时，应按照原收款日的历史汇率进行结转，而不能采用收货日或者收入确认日的汇率进行调整。", "searchText": "5495898 求教：预收货款的外币折算问题 收入确认/总额净额 scmhhh 根据《企业会计准则第19号——外币折算》，非货币性项目期末不进行汇率折算，而是以历史成本计量。\n\n问题1：预收货款应该属于非货币性项目，期末也不进行汇率折算？\n\n问题2：预收款实际发货时，确认收入和应收账款的入账汇率应该选择收款历史时点的汇率还是发货当天汇率？\n\n问题3：如果问题2的汇率选择是发货当天汇率，那么发货与收款两个时点的汇率差异是进汇兑损益吗？还是直接作为可变对价进收入？\n\n问题4：如果问题3的答案是进入汇兑损益，那么《外币折算》准则规定的非货币性项目不进行汇率折算的意义何在？\n\n如果期末汇率折算，汇兑损益影响=收款时点和期末时点汇率折算差异+期末时点和发货时点汇率折算差异；如果期末不进行汇率折算，汇兑损益影响=收款时点和发货时点汇率折算差异。两种算法对汇兑损益的影响理论上相同，准则这条规定预收货款期末不折汇对损益也就没有了影响。 参考：https://kjs.mof.gov.cn/zt/kjzzss ... 210302_3664191.htm.\n\n由于外币预收、预付款项属于非货币性项目，故后续预付款项收到所订购的商品时，入账价值为原付款日的历史汇率折算的金额；预收账款或合同负债结转收入时，应按照原收款日的历史汇率进行结转，而不能采用收货日或者收入确认日的汇率进行调整。"}, {"tid": "5495897", "title": "请教陈版主关于政府补助相关的会计处理", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "jiaolifu", "questionTime": "2026-01-30 14:43:06", "replyTime": "2026-02-22 12:12:30", "replySortTime": "2026-02-22 12:12:30", "url": "https://bbs.esnai.com/thread-5495897-1-7.html", "question": "被审计单位为国企，资产有部分市政道路和基础设施，政府每年会拨付道路养护费用和运营补贴费用，资金拨付文件中也说资金需要进行专款专用。\n\n所以我想问下该笔政府给付的钱是属于政府补助还是属于专项应付款？\n\n从我的理解来看，我觉得两个好像都能说的过去。\n\n从政府补助定义来看，该笔款项来源于政府且是无偿取得。\n\n专项应付款则是因为该笔款项确实有专门用途，在使用的过程中同步将专项应付款转入资本公积。\n\n麻烦陈版主帮我答疑解惑！", "reply": "1、企业会计准则建立在市场经济基础上。A公司既然执行企业会计准则，那么会计上是否可以将这些不收费资产确认为公司的资产，并不是看是否具有法律上的产权，而是要看其是否符合《企业会计准则——基本准则》对“资产”这一会计要素的定义，以及相关会计准则对资产确认条件的规定。\n\n《企业会计准则——基本准则》规定，资产是指企业过去的交易或者事项形成的、由企业拥有或者控制的、预期会给企业带来经济利益的资源。预期会给企业带来经济利益，是指直接或者间接导致现金和现金等价物流入企业的潜力。因此，如果这些资产不能给企业带来经济利益流入，则不符合资产的定义。\n\n如果对这类不收费资产，政府不承担其全额的投资成本及后续的管护、改扩建、重建等支出，由于A公司为建造这些设施投入的资源并不能给企业带来经济利益，属于不能为A公司带来未来经济利益的公益性基础设施，不应确认为A公司的资产。\n\n2、在不将此类资产确认为被审计单位资产的前提下，如果政府每年定期拨款用于道路养护和运营补贴，且与企业签订了委托养护、运营管理合同的，则此类拨款有可能满足确认为被审计单位营业收入的条件，但前提是证明合同定价的公允性和合理性（成本+合理利润）。此时，被审计单位应根据其自身在养护和运营管理服务中是代理人还是主要责任人，采用适当的方式确认收入。", "searchText": "5495897 请教陈版主关于政府补助相关的会计处理 政府补助/ppp/税费/现金流 jiaolifu 被审计单位为国企，资产有部分市政道路和基础设施，政府每年会拨付道路养护费用和运营补贴费用，资金拨付文件中也说资金需要进行专款专用。\n\n所以我想问下该笔政府给付的钱是属于政府补助还是属于专项应付款？\n\n从我的理解来看，我觉得两个好像都能说的过去。\n\n从政府补助定义来看，该笔款项来源于政府且是无偿取得。\n\n专项应付款则是因为该笔款项确实有专门用途，在使用的过程中同步将专项应付款转入资本公积。\n\n麻烦陈版主帮我答疑解惑！ 1、企业会计准则建立在市场经济基础上。a公司既然执行企业会计准则，那么会计上是否可以将这些不收费资产确认为公司的资产，并不是看是否具有法律上的产权，而是要看其是否符合《企业会计准则——基本准则》对“资产”这一会计要素的定义，以及相关会计准则对资产确认条件的规定。\n\n《企业会计准则——基本准则》规定，资产是指企业过去的交易或者事项形成的、由企业拥有或者控制的、预期会给企业带来经济利益的资源。预期会给企业带来经济利益，是指直接或者间接导致现金和现金等价物流入企业的潜力。因此，如果这些资产不能给企业带来经济利益流入，则不符合资产的定义。\n\n如果对这类不收费资产，政府不承担其全额的投资成本及后续的管护、改扩建、重建等支出，由于a公司为建造这些设施投入的资源并不能给企业带来经济利益，属于不能为a公司带来未来经济利益的公益性基础设施，不应确认为a公司的资产。\n\n2、在不将此类资产确认为被审计单位资产的前提下，如果政府每年定期拨款用于道路养护和运营补贴，且与企业签订了委托养护、运营管理合同的，则此类拨款有可能满足确认为被审计单位营业收入的条件，但前提是证明合同定价的公允性和合理性（成本+合理利润）。此时，被审计单位应根据其自身在养护和运营管理服务中是代理人还是主要责任人，采用适当的方式确认收入。"}, {"tid": "5495896", "title": "多级合并的商誉确认问题", "category": "合并/股权/权益法", "questionAuthor": "pangzi123", "questionTime": "2026-01-30 13:24:54", "replyTime": "2026-02-22 11:58:13", "replySortTime": "2026-02-22 11:58:13", "url": "https://bbs.esnai.com/thread-5495896-1-6.html", "question": "背景：A和B共同新设子公司C，A持有C51%股权；设立后C通过非同一控制控股合并了D公司，C持有D100%股权；C合并报表层面确认了100万商誉；\n\n假如无其他事项，A合并报表层面需要确认多少商誉？", "reply": "商誉按照本合并集团直接持有被购买方股权的比例计算确定，即100万。但日后该商誉如发生减值，则商誉减值损失的49%应计入（冲减）少数股东损益。", "searchText": "5495896 多级合并的商誉确认问题 合并/股权/权益法 pangzi123 背景：a和b共同新设子公司c，a持有c51%股权；设立后c通过非同一控制控股合并了d公司，c持有d100%股权；c合并报表层面确认了100万商誉；\n\n假如无其他事项，a合并报表层面需要确认多少商誉？ 商誉按照本合并集团直接持有被购买方股权的比例计算确定，即100万。但日后该商誉如发生减值，则商誉减值损失的49%应计入（冲减）少数股东损益。"}, {"tid": "5495895", "title": "求助陈版主合并层面含返利情况下内部交易抵消的递延所得税处理", "category": "合并/股权/权益法", "questionAuthor": "qieziaaa666", "questionTime": "2026-01-30 10:55:09", "replyTime": "2026-02-22 11:56:30", "replySortTime": "2026-02-22 11:56:30", "url": "https://bbs.esnai.com/thread-5495895-1-7.html", "question": "本帖最后由 qieziaaa666 于 2026-1-30 11:02 编辑\n\n陈版主您好，我们现在遇到一个问题。我们是贸易公司的背景，由香港子公司向供应商采购10元，供应商会按照4元的返利给香港子公司，香港子公司按6元成本亏1元（即5元）卖给大陆公司，期末未实现对外销售，合并层面的内部交易抵消未实现内部损失1元，大陆公司的税率为25%，香港公司的税率为16.5%，我们在确认递延所得税的问题和审计产生了分歧：\n\n我们认为，合并层面的未实现内部损失1元由两部分构成：香港公司的返利4元和大陆公司未实现内部损失5元，返利是由香港的子公司去向供应商申请，所以在合并层面上应该按照香港公司返利4元的16.5%确认递延所得税资产，大陆公司按未实现内部损失5元的25%确认递延所得税负债，即：\n\n借：递延所得税资产 0.66元\n\n 贷：所得税费用 0.66元\n\n借：所得税费用 1.25元\n\n 贷：递延所得税负债 1.25元\n\n审计认为应该按未实现内部损失1元统一按大陆25%确认递延所得税负债，即：\n\n借：所得税费用 0.25元\n\n 贷：递延所得税负债 0.25元\n\n请问下陈版主认为哪边的处理更合理些，谢谢陈版主~~", "reply": "如果返利4元是香港子公司与第三方供应商之间的交易惯例，是可以合理预期可获得的，则香港子公司的采购成本是6元，与其计税基础一致；卖给大陆公司的价格为5元，即集团内部未实现损失是1元。由于该商品现在在大陆公司，故应按大陆公司的适用税率计算确认递延所得税负债，即审计的观点是合理的。\n\n如果截至资产负债表日，香港公司该商品的原计税基础是10，按5元卖给大陆公司，返利需由香港公司另行向第三方供应商申请，能否获取仍存在不确定性，因而尚不能将返利入账并冲减采购或内部销售成本的，则被审计单位（即你公司）的意见更合理。\n\n即，此问题的关键在于香港子公司对返利的确认情况，以及该返利对商品在香港子公司的原计税基础有何影响。", "searchText": "5495895 求助陈版主合并层面含返利情况下内部交易抵消的递延所得税处理 合并/股权/权益法 qieziaaa666 本帖最后由 qieziaaa666 于 2026-1-30 11:02 编辑\n\n陈版主您好，我们现在遇到一个问题。我们是贸易公司的背景，由香港子公司向供应商采购10元，供应商会按照4元的返利给香港子公司，香港子公司按6元成本亏1元（即5元）卖给大陆公司，期末未实现对外销售，合并层面的内部交易抵消未实现内部损失1元，大陆公司的税率为25%，香港公司的税率为16.5%，我们在确认递延所得税的问题和审计产生了分歧：\n\n我们认为，合并层面的未实现内部损失1元由两部分构成：香港公司的返利4元和大陆公司未实现内部损失5元，返利是由香港的子公司去向供应商申请，所以在合并层面上应该按照香港公司返利4元的16.5%确认递延所得税资产，大陆公司按未实现内部损失5元的25%确认递延所得税负债，即：\n\n借：递延所得税资产 0.66元\n\n 贷：所得税费用 0.66元\n\n借：所得税费用 1.25元\n\n 贷：递延所得税负债 1.25元\n\n审计认为应该按未实现内部损失1元统一按大陆25%确认递延所得税负债，即：\n\n借：所得税费用 0.25元\n\n 贷：递延所得税负债 0.25元\n\n请问下陈版主认为哪边的处理更合理些，谢谢陈版主~~ 如果返利4元是香港子公司与第三方供应商之间的交易惯例，是可以合理预期可获得的，则香港子公司的采购成本是6元，与其计税基础一致；卖给大陆公司的价格为5元，即集团内部未实现损失是1元。由于该商品现在在大陆公司，故应按大陆公司的适用税率计算确认递延所得税负债，即审计的观点是合理的。\n\n如果截至资产负债表日，香港公司该商品的原计税基础是10，按5元卖给大陆公司，返利需由香港公司另行向第三方供应商申请，能否获取仍存在不确定性，因而尚不能将返利入账并冲减采购或内部销售成本的，则被审计单位（即你公司）的意见更合理。\n\n即，此问题的关键在于香港子公司对返利的确认情况，以及该返利对商品在香港子公司的原计税基础有何影响。"}, {"tid": "5495894", "title": "请教陈版关于续租但作为一项新的单独租赁处理的疑惑", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "Cynthiaxxx", "questionTime": "2026-01-30 10:25:45", "replyTime": "2026-02-22 11:46:45", "replySortTime": "2026-02-22 11:46:45", "url": "https://bbs.esnai.com/thread-5495894-1-6.html", "question": "请教陈版，在您的不同帖子下都看到了这样一个观点：\n\n在原租赁期满的情况下签订新的租赁合同，新租赁合同的租赁期开始日是在原租赁合同的租赁期结束后，且两者互相衔接的，一般认为应作为一项新的单独租赁（尤其是在新租约约定的租金水平可代表新租约签订日的市场租金水平的情况下），故先终止确认原租赁下的使用权资产和租赁负债，再在新租赁的租赁期开始日确认新的使用权资产和租赁负债。\n\n有如下疑惑：\n\n1、为什么这种情形下的续租不作为租赁变更处理？因为按照租赁变更的定义，租期、租金的变更都属于租赁变更；\n\n2、如果可以作为租赁变更，是否为不构成单独租赁的租赁变更。因为延长期限+租赁变更不满足构成单独租赁条件中的扩大使用范围这一条。请教陈版可以这样理解吗？", "reply": "原租赁期满日，不论是否签订续租合同，都应当终止确认原租赁下的使用权资产和租赁负债。此时，在原租赁终止后续签新租赁合同，即使在租赁期、租赁范围等方面均与原合同衔接，也不可能调整原租赁的使用权资产和租赁负债的账面价值（因为此前已经终止确认），而只能作为一项全新租赁，在新租赁的租赁期开始日初始确认一项新的使用权资产和租赁负债。", "searchText": "5495894 请教陈版关于续租但作为一项新的单独租赁处理的疑惑 租赁/使用权资产/融资租赁 cynthiaxxx 请教陈版，在您的不同帖子下都看到了这样一个观点：\n\n在原租赁期满的情况下签订新的租赁合同，新租赁合同的租赁期开始日是在原租赁合同的租赁期结束后，且两者互相衔接的，一般认为应作为一项新的单独租赁（尤其是在新租约约定的租金水平可代表新租约签订日的市场租金水平的情况下），故先终止确认原租赁下的使用权资产和租赁负债，再在新租赁的租赁期开始日确认新的使用权资产和租赁负债。\n\n有如下疑惑：\n\n1、为什么这种情形下的续租不作为租赁变更处理？因为按照租赁变更的定义，租期、租金的变更都属于租赁变更；\n\n2、如果可以作为租赁变更，是否为不构成单独租赁的租赁变更。因为延长期限+租赁变更不满足构成单独租赁条件中的扩大使用范围这一条。请教陈版可以这样理解吗？ 原租赁期满日，不论是否签订续租合同，都应当终止确认原租赁下的使用权资产和租赁负债。此时，在原租赁终止后续签新租赁合同，即使在租赁期、租赁范围等方面均与原合同衔接，也不可能调整原租赁的使用权资产和租赁负债的账面价值（因为此前已经终止确认），而只能作为一项全新租赁，在新租赁的租赁期开始日初始确认一项新的使用权资产和租赁负债。"}, {"tid": "5495892", "title": "非同一控制下合并确认的递延所得税负债金额大于负商誉金额，导致营业外收入负数", "category": "合并/股权/权益法", "questionAuthor": "pangzi123", "questionTime": "2026-01-29 21:13:44", "replyTime": "2026-02-22 11:41:41", "replySortTime": "2026-02-22 11:41:41", "url": "https://bbs.esnai.com/thread-5495892-1-7.html", "question": "求助陈版：\n\n背景介绍：非同一控制下合并子公司，100%控股，账面净资产-100万，可辨认净资产公允价值200万，均为固定资产评估增值，增值额300万，购买时支付对价150万，所得税税率25%\n\n1、确认负商誉：150-200=-50万；\n\n合并抵消分录：\n\n借：净资产-100\n\n借：固定资产300\n\n贷：长期股权投资150\n\n贷：营业外收入（负商誉）50\n\n2、确认评估增值部分的递延所得税300*25%=75万\n\n借：营业外收入 75\n\n贷：递延所得税负债 75\n\n这样抵消后，导致营业外收入变成了-25万。\n\n请教陈版，\n\n1、上述计算及抵消是否有误；\n\n2、最终合并抵消后营业外收入变成了-25万，该种情况该如何处理。\n\n感谢", "reply": "与可辨认资产评估增值相关的递延所得税负债是计入被购买方可辨认净资产公允价值的，因此本案例中被购买方于购买日的可辨认净资产公允价值是（-100+300）-300*25%=125万元。\n\n因此合并报表层面应确认商誉：150-125=25万元，而不是确认为营业外支出或者营业外收入的负数。\n\n但这类商誉的后续减值风险较大，后续每年末均应当从严把握减值迹象的识别和可收回金额的测算问题。", "searchText": "5495892 非同一控制下合并确认的递延所得税负债金额大于负商誉金额，导致营业外收入负数 合并/股权/权益法 pangzi123 求助陈版：\n\n背景介绍：非同一控制下合并子公司，100%控股，账面净资产-100万，可辨认净资产公允价值200万，均为固定资产评估增值，增值额300万，购买时支付对价150万，所得税税率25%\n\n1、确认负商誉：150-200=-50万；\n\n合并抵消分录：\n\n借：净资产-100\n\n借：固定资产300\n\n贷：长期股权投资150\n\n贷：营业外收入（负商誉）50\n\n2、确认评估增值部分的递延所得税300*25%=75万\n\n借：营业外收入 75\n\n贷：递延所得税负债 75\n\n这样抵消后，导致营业外收入变成了-25万。\n\n请教陈版，\n\n1、上述计算及抵消是否有误；\n\n2、最终合并抵消后营业外收入变成了-25万，该种情况该如何处理。\n\n感谢 与可辨认资产评估增值相关的递延所得税负债是计入被购买方可辨认净资产公允价值的，因此本案例中被购买方于购买日的可辨认净资产公允价值是（-100+300）-300*25%=125万元。\n\n因此合并报表层面应确认商誉：150-125=25万元，而不是确认为营业外支出或者营业外收入的负数。\n\n但这类商誉的后续减值风险较大，后续每年末均应当从严把握减值迹象的识别和可收回金额的测算问题。"}, {"tid": "5495885", "title": "政府下属企业股权划转同控非同控判断", "category": "合并/股权/权益法", "questionAuthor": "审计小菜鸡", "questionTime": "2026-01-29 19:15:32", "replyTime": "2026-02-22 11:36:49", "replySortTime": "2026-02-22 11:36:49", "url": "https://bbs.esnai.com/thread-5495885-1-6.html", "question": "请教陈版，X市管委会下属A、B两家公司，B为融资平台公司，2025年管委会新成立A公司，以B下属甲公司95%股权对A进行出资，A委托中介机构对甲公司进行了审计评估，评估值较账面净资产减值2亿元，出资金额为评估值；同时A以评估价格8亿元收购了B下属乙公司100%股权，A、B公司之间存在大量关联担保及资金拆借行为，我们认为是同一控制下企业合并，企业认为是非同控合并，请问以上出资和收购交易是否属于同一控制下企业合并？", "reply": "从交易实质来看，该交易是在各方共同的最终控制方（管委会）主导下完成的，属于管委会所管辖范围内国资的战略性重组，而不是由各方自行谈判确定的市场化交易行为。管委会在交易中处于主导地位，所履行的是出资人（股东）职能而不是监管审批的行政管理职能，因此应作为同一控制下合并处理。", "searchText": "5495885 政府下属企业股权划转同控非同控判断 合并/股权/权益法 审计小菜鸡 请教陈版，x市管委会下属a、b两家公司，b为融资平台公司，2025年管委会新成立a公司，以b下属甲公司95%股权对a进行出资，a委托中介机构对甲公司进行了审计评估，评估值较账面净资产减值2亿元，出资金额为评估值；同时a以评估价格8亿元收购了b下属乙公司100%股权，a、b公司之间存在大量关联担保及资金拆借行为，我们认为是同一控制下企业合并，企业认为是非同控合并，请问以上出资和收购交易是否属于同一控制下企业合并？ 从交易实质来看，该交易是在各方共同的最终控制方（管委会）主导下完成的，属于管委会所管辖范围内国资的战略性重组，而不是由各方自行谈判确定的市场化交易行为。管委会在交易中处于主导地位，所履行的是出资人（股东）职能而不是监管审批的行政管理职能，因此应作为同一控制下合并处理。"}, {"tid": "5495884", "title": "请教陈老师销售订单未取消情况下设备意外损坏修复支出处理？", "category": "收入确认/总额净额", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-01-29 18:48:14", "replyTime": "2026-02-22 11:33:34", "replySortTime": "2026-02-22 11:33:34", "url": "https://bbs.esnai.com/thread-5495884-1-7.html", "question": "业务场景：某公司销售商品运输途中发生损坏，将设备运回后进行修复、替换。客户知晓该情形，且并未撤销合同，即合同继续有效，待修复后可继续将该商品交付给客户。于资产负债表日，修复工作尚未完全完成，发生相关支出主要包括来回运输费用、修复替换的投料、人工等三个部分。对于该事件，保险公司尚在定损中，公司与运输商之间的责任问题存在一定争议，资产负债表日尚无法合理确定保险预计赔偿金额。\n\n问题：对于已经发生的运费、投料、人工如何核算？\n\n①能否计入存货或其他资产项目，并结合合同销售价格、预计未来修复支出考虑跌价准备？\n\n②或者说只能计入营业外支出？如果如此，尚未发生的修复等支出是否也需要在资产负债表日估计计入营业外支出，同时，对保险公司的赔付难以合理估计的就不考虑其影响了，按谨慎性处理。", "reply": "对于发生相关支出（主要包括来回运输费用、修复替换的投料、人工等三个部分）应在发生时计入营业成本（或营业外支出）处理。主要考虑是：该事项属于意料之外的损耗，这些修复支出原本预计不会发生，并不是原计划中使得商品达到预定的可销售状态和地点的必要、合理支出。\n\n对于保险赔款和向运输商的索赔款，只有在基本确定可以收到且金额可以可靠计量时才能确认，对应贷记（冲减）上述运费和修复支出所计入的损益项目。（可能与修复支出的入账存在跨期）。", "searchText": "5495884 请教陈老师销售订单未取消情况下设备意外损坏修复支出处理？ 收入确认/总额净额 qingzhouygwcs 业务场景：某公司销售商品运输途中发生损坏，将设备运回后进行修复、替换。客户知晓该情形，且并未撤销合同，即合同继续有效，待修复后可继续将该商品交付给客户。于资产负债表日，修复工作尚未完全完成，发生相关支出主要包括来回运输费用、修复替换的投料、人工等三个部分。对于该事件，保险公司尚在定损中，公司与运输商之间的责任问题存在一定争议，资产负债表日尚无法合理确定保险预计赔偿金额。\n\n问题：对于已经发生的运费、投料、人工如何核算？\n\n①能否计入存货或其他资产项目，并结合合同销售价格、预计未来修复支出考虑跌价准备？\n\n②或者说只能计入营业外支出？如果如此，尚未发生的修复等支出是否也需要在资产负债表日估计计入营业外支出，同时，对保险公司的赔付难以合理估计的就不考虑其影响了，按谨慎性处理。 对于发生相关支出（主要包括来回运输费用、修复替换的投料、人工等三个部分）应在发生时计入营业成本（或营业外支出）处理。主要考虑是：该事项属于意料之外的损耗，这些修复支出原本预计不会发生，并不是原计划中使得商品达到预定的可销售状态和地点的必要、合理支出。\n\n对于保险赔款和向运输商的索赔款，只有在基本确定可以收到且金额可以可靠计量时才能确认，对应贷记（冲减）上述运费和修复支出所计入的损益项目。（可能与修复支出的入账存在跨期）。"}, {"tid": "5495883", "title": "求助陈版主关于外币交易融资成分销售利率的口径问题", "category": "收入确认/总额净额", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-01-29 18:37:13", "replyTime": "2026-02-22 11:29:48", "replySortTime": "2026-02-22 11:29:48", "url": "https://bbs.esnai.com/thread-5495883-1-7.html", "question": "业务背景：甲公司存在含有融资成分的销售，例如长账龄的分期销售。甲公司所在国家的法定货币为A货币，也是甲公司的记账本位币。甲公司可能发生外币销售，例如签订按B货币结算的销售合同。A货币、B货币的贷款利率存在一定差异。问题1：甲公司在确认收入融资利息成分时，是否认可基于其所在国家主权法定货币即A货币的市场贷款利率作为折现率计算现值？还是要按照不同交易币种的贷款利率折现？\n\n原因一是其经营主体所在国家的法定主权货币利率更能代表其经济环境的利率水平。\n\n原因二是甲公司的记账本位币本身也是法定货币A货币，即使有外币销售，确认收入时报表需要按本位币列报，所以按照A货币的利率折现是可以接受的。\n\n问题2：若甲公司的记账本位币为C货币，是否认可基于所在国家主权货币A货币的市场贷款利率进行折现？\n\n烦请陈老师予以解答。", "reply": "1、重大融资成分中的利率应采用交易计价币种（本案例中为货币B）的市场利率，同时这也是考虑了交易对手方的信用风险和融资成本后给出的报价利率。\n\n2、同上1，此问题更多地与交易的计价结算货币和交易对手方的信用风险、所处市场环境有关，与甲公司本身的记账本位币无直接关系。", "searchText": "5495883 求助陈版主关于外币交易融资成分销售利率的口径问题 收入确认/总额净额 qingzhouygwcs 业务背景：甲公司存在含有融资成分的销售，例如长账龄的分期销售。甲公司所在国家的法定货币为a货币，也是甲公司的记账本位币。甲公司可能发生外币销售，例如签订按b货币结算的销售合同。a货币、b货币的贷款利率存在一定差异。问题1：甲公司在确认收入融资利息成分时，是否认可基于其所在国家主权法定货币即a货币的市场贷款利率作为折现率计算现值？还是要按照不同交易币种的贷款利率折现？\n\n原因一是其经营主体所在国家的法定主权货币利率更能代表其经济环境的利率水平。\n\n原因二是甲公司的记账本位币本身也是法定货币a货币，即使有外币销售，确认收入时报表需要按本位币列报，所以按照a货币的利率折现是可以接受的。\n\n问题2：若甲公司的记账本位币为c货币，是否认可基于所在国家主权货币a货币的市场贷款利率进行折现？\n\n烦请陈老师予以解答。 1、重大融资成分中的利率应采用交易计价币种（本案例中为货币b）的市场利率，同时这也是考虑了交易对手方的信用风险和融资成本后给出的报价利率。\n\n2、同上1，此问题更多地与交易的计价结算货币和交易对手方的信用风险、所处市场环境有关，与甲公司本身的记账本位币无直接关系。"}, {"tid": "5495882", "title": "附回售条款的股权投资期末公允价值如何确定", "category": "合并/股权/权益法", "questionAuthor": "xiaomaijinwang", "questionTime": "2026-01-29 16:29:03", "replyTime": "2026-02-22 11:20:15", "replySortTime": "2026-02-22 11:20:15", "url": "https://bbs.esnai.com/thread-5495882-1-6.html", "question": "A公司参与B公司的股权投资，投资金额5000万元，占股权比例为5.06%，公司未委派董事等人员。协议约定：\n\n第十条 关于回购的相关约定\n\n1、各方同意，若标的公司2021年及以后任一年度经审计后的扣非净利润少于1亿元;或自投资款支付之日起满三年，若标的公司未完成首发上市或被上市公司收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购。\n\n2、本条项下的回购价格应当为:(1)投资方向标的公司支付的增资款本金;加上(2)就该等增资款本金、以10%年化利率(单利)计算的增资款利息;减去(3)投资持有期投资方从标的公司收到的分红款(如有)。\n\n回购方为B公司的股东。\n\n2024年，A公司与B公司股东重新签定：\n\n本途的公司202年及以后镇一年度经审计后的扣非净利润少于1亿元:或自投资款支付之日起满六年，若标的公司未完成首发上市或被上市公都收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购”。\n\n期限延长为六年。\n\n目前A公司的处理，每年按照保底收益10%确认公允价值的变动。但是其聘请的评估机构对该项股权进行评估，采用市场法，评估值最近一期末为1576.29万元。\n\n公司的理由是：\n\n公允价值采取标的公司的股权评估咨询估值和回售条款公允价值孰高原则确定具有合理性:\n\n(1)39号准则规定出售公允价值计量相关资产应当假定该交易在相关资产或负债的最有利市场进行。最有利市场指能够以最高金额出售相关资产的市场。对于A 公司而言，相关股权投资约定有回售条款，若触发回售条款，则回购方拥有退回投资本金及按固定年回报利率支付保底收益的义务。同时，A公司于每资产负债表日委托评估机构提供公允价值估值咨询服务(非评估报告)，最终以股权评估咨询估值和回售条款价值孰高原则确定公允价值，符合39号准则的规定。\n\n(2)股权投资约定有回售条款，而评估师受限于可取得资料详实程度限制，采用市场法(可比公司法)估值，评估模型计算估值并未考虑回售条款价值，不能简单认为市场法估值(参考估值案例未考虑回售条款)即代表标的股权公允价值，而忽视回售条款的经济价值。根据协议，在一定条件下A公司可按照约定的公式计算的价款向股权转让方出售相关股权，是一个典型的卖出期权，公允价值应当考虑卖出期权价值。\n\n(3)评估方法上市场法的应用并非没有限制，其评估结果的有效性取决于可比资产的数据质量和可获得性。虽然市场法是一种常用的资产评估方法，但其评估结果并不总是代表最终的评估值，特别是在数据不足或市场条件不理想的情况下。在实际应用中，需要根据具体情况综合考虑多种因素，包括市场条件、数据质量等，来确定最终的评估值。因公司所投投资标的均为非上市流通企业，市场法对非流通股权评估效果较弱。因此非流通股权的市场法估值不能简单代表该股权真正的价值。\n\n根据《监管规则适用指引——会计类第1号》“1-1 特殊股权投资的确认与分类”，情形1：\n\n从投资方角度看，投资方对被投资方没有重大影响，该项投资应适用金融工具准则。因该项投资不满足权益工具定义，合同现金流量特征不满足仅为对本金和以未偿付本金金额为基础的利息的支付，应分类为以公允价值计量且其变动计入当期损益的金融资产。\n\n按照《或有事项准则》，只有要基本确定才能确认为资产。\n\n请教，A公司每年确认保底收益是否合理。总觉得公司的理由有点牵强。", "reply": "该事项中，回购义务人是B的股东而不是被投资企业B本身，因此回售权并不是一项嵌入衍生工具，而是一项单独的衍生工具（衍生金融资产）。A应确认两项金融资产，一是对B的权益性投资，二是对B的股东的回售权，这两项金融资产分别作为以公允价值计量且其变动计入损益的金融资产，列报为其他非流动金融资产，但应分别核算和分别确定其公允价值（尽管前者的公允价值下跌可以的一定程度上由后者的公允价值上升来弥补，但一般理解不会是全额的弥补）。\n\n如果预计B可以实现业绩、上市等约定目标，则回售权的公允价值为零，B的股权按通常的公允价值估值方法进行估值。\n\n如果预计B不能实现业绩，A很可能行使回售权，则应分别计量这两项金融资产的公允价值。其中，回售权作为期权，应采用期权定价模型，其内在价值为约定回售价格大于预计届时标的股权公允价值的差额，同时还需考虑资金时间价值、回购义务人（B公司其他股东）的信用风险等因素。具体建议咨询估值方面的专业人士。\n\n该事项的会计处理应适用金融工具准则，与或有事项准则无关。", "searchText": "5495882 附回售条款的股权投资期末公允价值如何确定 合并/股权/权益法 xiaomaijinwang a公司参与b公司的股权投资，投资金额5000万元，占股权比例为5.06%，公司未委派董事等人员。协议约定：\n\n第十条 关于回购的相关约定\n\n1、各方同意，若标的公司2021年及以后任一年度经审计后的扣非净利润少于1亿元;或自投资款支付之日起满三年，若标的公司未完成首发上市或被上市公司收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购。\n\n2、本条项下的回购价格应当为:(1)投资方向标的公司支付的增资款本金;加上(2)就该等增资款本金、以10%年化利率(单利)计算的增资款利息;减去(3)投资持有期投资方从标的公司收到的分红款(如有)。\n\n回购方为b公司的股东。\n\n2024年，a公司与b公司股东重新签定：\n\n本途的公司202年及以后镇一年度经审计后的扣非净利润少于1亿元:或自投资款支付之日起满六年，若标的公司未完成首发上市或被上市公都收购，则投资方有权要求现有(或届时)股东以法律允许的方式回购其持有标的公司的全部或者部分权益，且现有(或届时)股东应同意并促使标的公司股东会和董事会批准该等回购”。\n\n期限延长为六年。\n\n目前a公司的处理，每年按照保底收益10%确认公允价值的变动。但是其聘请的评估机构对该项股权进行评估，采用市场法，评估值最近一期末为1576.29万元。\n\n公司的理由是：\n\n公允价值采取标的公司的股权评估咨询估值和回售条款公允价值孰高原则确定具有合理性:\n\n(1)39号准则规定出售公允价值计量相关资产应当假定该交易在相关资产或负债的最有利市场进行。最有利市场指能够以最高金额出售相关资产的市场。对于a 公司而言，相关股权投资约定有回售条款，若触发回售条款，则回购方拥有退回投资本金及按固定年回报利率支付保底收益的义务。同时，a公司于每资产负债表日委托评估机构提供公允价值估值咨询服务(非评估报告)，最终以股权评估咨询估值和回售条款价值孰高原则确定公允价值，符合39号准则的规定。\n\n(2)股权投资约定有回售条款，而评估师受限于可取得资料详实程度限制，采用市场法(可比公司法)估值，评估模型计算估值并未考虑回售条款价值，不能简单认为市场法估值(参考估值案例未考虑回售条款)即代表标的股权公允价值，而忽视回售条款的经济价值。根据协议，在一定条件下a公司可按照约定的公式计算的价款向股权转让方出售相关股权，是一个典型的卖出期权，公允价值应当考虑卖出期权价值。\n\n(3)评估方法上市场法的应用并非没有限制，其评估结果的有效性取决于可比资产的数据质量和可获得性。虽然市场法是一种常用的资产评估方法，但其评估结果并不总是代表最终的评估值，特别是在数据不足或市场条件不理想的情况下。在实际应用中，需要根据具体情况综合考虑多种因素，包括市场条件、数据质量等，来确定最终的评估值。因公司所投投资标的均为非上市流通企业，市场法对非流通股权评估效果较弱。因此非流通股权的市场法估值不能简单代表该股权真正的价值。\n\n根据《监管规则适用指引——会计类第1号》“1-1 特殊股权投资的确认与分类”，情形1：\n\n从投资方角度看，投资方对被投资方没有重大影响，该项投资应适用金融工具准则。因该项投资不满足权益工具定义，合同现金流量特征不满足仅为对本金和以未偿付本金金额为基础的利息的支付，应分类为以公允价值计量且其变动计入当期损益的金融资产。\n\n按照《或有事项准则》，只有要基本确定才能确认为资产。\n\n请教，a公司每年确认保底收益是否合理。总觉得公司的理由有点牵强。 该事项中，回购义务人是b的股东而不是被投资企业b本身，因此回售权并不是一项嵌入衍生工具，而是一项单独的衍生工具（衍生金融资产）。a应确认两项金融资产，一是对b的权益性投资，二是对b的股东的回售权，这两项金融资产分别作为以公允价值计量且其变动计入损益的金融资产，列报为其他非流动金融资产，但应分别核算和分别确定其公允价值（尽管前者的公允价值下跌可以的一定程度上由后者的公允价值上升来弥补，但一般理解不会是全额的弥补）。\n\n如果预计b可以实现业绩、上市等约定目标，则回售权的公允价值为零，b的股权按通常的公允价值估值方法进行估值。\n\n如果预计b不能实现业绩，a很可能行使回售权，则应分别计量这两项金融资产的公允价值。其中，回售权作为期权，应采用期权定价模型，其内在价值为约定回售价格大于预计届时标的股权公允价值的差额，同时还需考虑资金时间价值、回购义务人（b公司其他股东）的信用风险等因素。具体建议咨询估值方面的专业人士。\n\n该事项的会计处理应适用金融工具准则，与或有事项准则无关。"}, {"tid": "5495881", "title": "关于租入资产改良支出与建造设计的区分。", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "baibingbing132y", "questionTime": "2026-01-29 16:27:47", "replyTime": "2026-02-22 10:59:26", "replySortTime": "2026-02-22 10:59:26", "url": "https://bbs.esnai.com/thread-5495881-1-6.html", "question": "对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固等等，通过什么科目核算呢？\n\n1、属于对租赁资产的改良支出，计入“长期待摊费用”\n\n2、还是租赁资产建造或设计相关的成本，计入“固定资产”，即每个系统独成一个固定资产呢？\n\n提前谢谢陈版回复啦。", "reply": "应计入长期待摊费用。\n\n参考：https://kjs.mof.gov.cn/zt/kjzzss ... 0210425_3691863.htm。", "searchText": "5495881 关于租入资产改良支出与建造设计的区分。 资产/存货/固定资产/无形资产 baibingbing132y 对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固等等，通过什么科目核算呢？\n\n1、属于对租赁资产的改良支出，计入“长期待摊费用”\n\n2、还是租赁资产建造或设计相关的成本，计入“固定资产”，即每个系统独成一个固定资产呢？\n\n提前谢谢陈版回复啦。 应计入长期待摊费用。\n\n参考：https://kjs.mof.gov.cn/zt/kjzzss ... 0210425_3691863.htm。"}, {"tid": "5495870", "title": "关于合伙企业收到管理费的账务处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "kdddd", "questionTime": "2026-01-28 16:50:54", "replyTime": "2026-02-22 10:56:56", "replySortTime": "2026-02-22 10:56:56", "url": "https://bbs.esnai.com/thread-5495870-1-4.html", "question": "求助陈版！!!@chenyiwei\n\n私募基金合伙企业在收到投资方支付的款项时，全部款项（投资款+需要承担的管理费）都作为实收资本入账，之后付给管理人的基金管理费仍然通过管理费用核算，但是最后保证认缴金额仍=实缴金额。 这种账务处理方式合理吗？是否可行？\n\n望陈版主解答！感谢!", "reply": "该做法总体上是合理的。因为合伙企业本身也是独立的法律主体和会计主体，合伙企业通过相关协议与管理人之间建立委托和服务关系，合伙企业是管理合伙人提供服务的受益对象，因此管理费应确认为合伙企业自身的费用，而不是简单的代收代付。", "searchText": "5495870 关于合伙企业收到管理费的账务处理 金融工具/外币/债务重组/abs kdddd 求助陈版！!!@chenyiwei\n\n私募基金合伙企业在收到投资方支付的款项时，全部款项（投资款+需要承担的管理费）都作为实收资本入账，之后付给管理人的基金管理费仍然通过管理费用核算，但是最后保证认缴金额仍=实缴金额。 这种账务处理方式合理吗？是否可行？\n\n望陈版主解答！感谢! 该做法总体上是合理的。因为合伙企业本身也是独立的法律主体和会计主体，合伙企业通过相关协议与管理人之间建立委托和服务关系，合伙企业是管理合伙人提供服务的受益对象，因此管理费应确认为合伙企业自身的费用，而不是简单的代收代付。"}, {"tid": "5495869", "title": "陈版主，在确认递延所得税时，采取未来税率的依据到底是什么？", "category": "所得税/递延所得税", "questionAuthor": "ywzx117", "questionTime": "2026-01-28 16:31:26", "replyTime": "2026-02-22 10:25:07", "replySortTime": "2026-02-22 10:25:07", "url": "https://bbs.esnai.com/thread-5495869-1-7.html", "question": "如果这是一家刚刚成立不满3年企业，主要从事芯片设计。因此尚未取得高新资质\n\n在确认递延时，前任会计师考虑到公司未来一定会取得高新资质，采用15%的税率进行了确认\n\n如果只按普通企业来看，公司在未来五年很可能没有足够的应纳税所得税。如果拉长到10年才有可能\n\n在实操中，到底何时采用15%的税率才是合规的", "reply": "应合理预测何时可取得高新认定，再将预计暂时性差异的转回时间与取得高新认定的预计时间相比较，预计在取得高新认定之前转回的暂时性差异采用普通税率25%；预计在高新认定取得后转回的暂时性差异用高新税率。\n\n当然，首先必须保证未来暂时性差异转回期间有足够多的应纳税所得额。\n\n如果无法合理估计可抵扣暂时性差异的预计转回时间和取得高新认定的时间，则基于谨慎考虑，如果暂时性差异的主要方向是可抵扣暂时性差异，则按15%税率计量递延所得税资产。\n\n如果无法合理估计企业何时应纳税所得额可以转正，则基于谨慎考虑，不确认递延所得税资产，包括与可抵扣暂时性差异和可抵扣亏损相关的递延所得税资产均不确认。", "searchText": "5495869 陈版主，在确认递延所得税时，采取未来税率的依据到底是什么？ 所得税/递延所得税 ywzx117 如果这是一家刚刚成立不满3年企业，主要从事芯片设计。因此尚未取得高新资质\n\n在确认递延时，前任会计师考虑到公司未来一定会取得高新资质，采用15%的税率进行了确认\n\n如果只按普通企业来看，公司在未来五年很可能没有足够的应纳税所得税。如果拉长到10年才有可能\n\n在实操中，到底何时采用15%的税率才是合规的 应合理预测何时可取得高新认定，再将预计暂时性差异的转回时间与取得高新认定的预计时间相比较，预计在取得高新认定之前转回的暂时性差异采用普通税率25%；预计在高新认定取得后转回的暂时性差异用高新税率。\n\n当然，首先必须保证未来暂时性差异转回期间有足够多的应纳税所得额。\n\n如果无法合理估计可抵扣暂时性差异的预计转回时间和取得高新认定的时间，则基于谨慎考虑，如果暂时性差异的主要方向是可抵扣暂时性差异，则按15%税率计量递延所得税资产。\n\n如果无法合理估计企业何时应纳税所得额可以转正，则基于谨慎考虑，不确认递延所得税资产，包括与可抵扣暂时性差异和可抵扣亏损相关的递延所得税资产均不确认。"}, {"tid": "5495436", "title": "请教陈版主，关于现货合同指定为金融工具的核算。", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "lijbo", "questionTime": "2025-12-26 22:48:52", "replyTime": "2026-02-21 21:09:13", "replySortTime": "2026-02-21 21:09:13", "url": "https://bbs.esnai.com/thread-5495436-1-7.html", "question": "@chenyiwei 请教陈版主，按照第22号金融工具准则第五条，对于能够以现金或其他金融工具净额结算，或者通过交换金融工具结算的买入或卖出非金融项目的合同，即使企业按照预定的购买、销售或使用要求签订并持有旨在收取或交付非金融项目的合同的，企业也可以将该合同指定为以公允价值计量且其变动计入当期损益的金融资产或金融负债。企业只能在合同开始时做出该指定，并且必须能够通过该指定消除或显著减少会计错配。该指定一经做出，不得撤销。\n\n例子如下：公司和供应商签订一个采购合同，约定采购一商品价格是100元。公司将该采购合同指定为金融工具，2月末该产品市场价格是150元。3月份公司与供应商进行了交割，购入该产品。\n\n分录处理如下:\n\n2月末:借:衍生工具50\n\n               贷:公允价值变动损益50\n\n对于三月份交割的处理，有如下两种方案\n\n方案一：借:库存商品100\n\n                     贷:银行存款100\n\n             借:衍生工具-50\n\n                     贷:公允价值变动损益-50\n\n方案二：:借:库存商品       150\n\n                  贷:银行存款           100\n\n                      衍生工具             50\n\n              借:公允价值变动收益           50\n\n                   贷:投资收益                          50\n\n具体那中方法对，还请陈版主帮忙解疑答惑。", "reply": "首先要注意此类指定的情况非常罕见，一般非金融企业极少有此类情况，故引用此类条款要谨慎；其次如果该项指定确实是合理的，则按方案二进行交割时点的会计处理。", "searchText": "5495436 请教陈版主，关于现货合同指定为金融工具的核算。 金融工具/外币/债务重组/abs lijbo @chenyiwei 请教陈版主，按照第22号金融工具准则第五条，对于能够以现金或其他金融工具净额结算，或者通过交换金融工具结算的买入或卖出非金融项目的合同，即使企业按照预定的购买、销售或使用要求签订并持有旨在收取或交付非金融项目的合同的，企业也可以将该合同指定为以公允价值计量且其变动计入当期损益的金融资产或金融负债。企业只能在合同开始时做出该指定，并且必须能够通过该指定消除或显著减少会计错配。该指定一经做出，不得撤销。\n\n例子如下：公司和供应商签订一个采购合同，约定采购一商品价格是100元。公司将该采购合同指定为金融工具，2月末该产品市场价格是150元。3月份公司与供应商进行了交割，购入该产品。\n\n分录处理如下:\n\n2月末:借:衍生工具50\n\n               贷:公允价值变动损益50\n\n对于三月份交割的处理，有如下两种方案\n\n方案一：借:库存商品100\n\n                     贷:银行存款100\n\n             借:衍生工具-50\n\n                     贷:公允价值变动损益-50\n\n方案二：:借:库存商品       150\n\n                  贷:银行存款           100\n\n                      衍生工具             50\n\n              借:公允价值变动收益           50\n\n                   贷:投资收益                          50\n\n具体那中方法对，还请陈版主帮忙解疑答惑。 首先要注意此类指定的情况非常罕见，一般非金融企业极少有此类情况，故引用此类条款要谨慎；其次如果该项指定确实是合理的，则按方案二进行交割时点的会计处理。"}, {"tid": "5495437", "title": "请教陈版主，信用证延期福费廷业务的核算", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "lijbo", "questionTime": "2025-12-26 22:54:05", "replyTime": "2026-02-21 21:07:03", "replySortTime": "2026-02-21 21:07:03", "url": "https://bbs.esnai.com/thread-5495437-1-3.html", "question": "@chenyiwei 请教陈版主，A公司基于与C公司的购销业务，通过B银行开具了信用证给C公司，同时A公司代理C公司在B银行做了买断福费廷贴现，C公司针对这笔信用是否能终止确认，出表？如果不能出表，是为什么呢，还请陈版主帮忙答疑解惑。（A公司和C公司不是关联方）", "reply": "此问题需结合具体情况分析，关键看所有权上的主要风险和报酬的保留和转移情况。B银行既是开证行，也是贴现行，在此情况下B银行是否完全承担来源于A公司的信用风险，后续不能再向C追索，也不存在根据后续A公司的偿还款项情况再对C公司退、补贴现差额的情况。如满足风险和报酬转移条件，C公司不再享有或承担相关风险和报酬的，则可以终止确认。", "searchText": "5495437 请教陈版主，信用证延期福费廷业务的核算 金融工具/外币/债务重组/abs lijbo @chenyiwei 请教陈版主，a公司基于与c公司的购销业务，通过b银行开具了信用证给c公司，同时a公司代理c公司在b银行做了买断福费廷贴现，c公司针对这笔信用是否能终止确认，出表？如果不能出表，是为什么呢，还请陈版主帮忙答疑解惑。（a公司和c公司不是关联方） 此问题需结合具体情况分析，关键看所有权上的主要风险和报酬的保留和转移情况。b银行既是开证行，也是贴现行，在此情况下b银行是否完全承担来源于a公司的信用风险，后续不能再向c追索，也不存在根据后续a公司的偿还款项情况再对c公司退、补贴现差额的情况。如满足风险和报酬转移条件，c公司不再享有
