额”两部分。", "searchText": "5496406 求助陈版主 关于收入确认 收入确认/总额净额 大ye木2 本帖最后由 大ye木2 于 2026-3-16 21:38 编辑\n\n请教陈版主。公司业务模式：客户要求先开模具，再生产产品，模具所有权归属客户，但放在公司用于生产产品。产品周期10个月，开发模具投入100万，模具按照10个月摊销计入生产成本，后客户给予模具补贴20万。这笔模具补贴20万该如何会计处理，是先计入合同负债，按照10个月摊销？还是一次性确认收入，同时从模具开发投入中取20万结转成本，余下80万按10个月分摊计入生产成本？ 这种情况下，模具制作一般构成单项履约义务。参考：《监管规则适用指引——会计类第2号》之“2-1 识别履约义务时商品或服务是否具有高度关联性的判断”。因此，理论上应在模具开发完成并经客户验收确认，即将转入产品量产阶段时，确认与该项履约义务对应的收入。除非金额不能可靠计量，取决于量产阶段的产品产量，否则此类收入不应递延到量产阶段确认。\n\n如果客户给予的模具补贴明显低于其开发成本，不能代表该项履约义务的单独售价，则应注意按照可变对价等原则合理、谨慎地估计对应于该项履约义务的合同价格（例如，如果能够合理保证其开发成本均可获得回收的，则按已发生的开发成本确认等额的收入），超出合同约定的模具补贴的差额确认为合同资产。后续量产期间内，采用系统、合理的方法区分产品售价中的“该项产品本身的售价”和“模具价款回收额”两部分。"}, {"tid": "5496399", "title": "请教陈版主，关于商誉减值测试中持续计算的可辨认净资产", "category": "合并/股权/权益法", "questionAuthor": "wx_5fcf12e13db8", "questionTime": "2026-03-16 17:09:50", "replyTime": "2026-03-17 19:42:58", "replySortTime": "2026-03-17 19:42:58", "url": "https://bbs.esnai.com/thread-5496399-1-3.html", "question": "请教陈版，有个理论问题想请教下陈版主：\n\n企业在对商誉进行减值测试时，是用按照购买日公允价值持续计算的可辨认净资产的账面价值+完全商誉跟子公司的可收回金额比较。（假设子公司整体跟商誉相关）\n\n这里按照购买日公允价值持续计算的可辨认净资产的账面价值，需要考虑公不等于账的调整，是否需要考虑内部交易对净利润或者净资产的调整呢？\n\n顺流交易中子公司净资产中虚增，逆流交易中子公司利润虚增，从调整子公司净利润和净资产的角度视乎都可以考虑内部交易的影响，不知道实务中是否会考虑，还是只考虑顺流或者逆流中的某一种呢？\n\n感谢陈版主。", "reply": "“这里按照购买日公允价值持续计算的可辨认净资产的账面价值”也就是该资产组内各项资产、负债在合并报表层面的账面价值。如果其中某些资产属于内部交易的标的资产，则其账面价值应按抵销内部交易未实现损益后的余额确定。", "searchText": "5496399 请教陈版主，关于商誉减值测试中持续计算的可辨认净资产 合并/股权/权益法 wx_5fcf12e13db8 请教陈版，有个理论问题想请教下陈版主：\n\n企业在对商誉进行减值测试时，是用按照购买日公允价值持续计算的可辨认净资产的账面价值+完全商誉跟子公司的可收回金额比较。（假设子公司整体跟商誉相关）\n\n这里按照购买日公允价值持续计算的可辨认净资产的账面价值，需要考虑公不等于账的调整，是否需要考虑内部交易对净利润或者净资产的调整呢？\n\n顺流交易中子公司净资产中虚增，逆流交易中子公司利润虚增，从调整子公司净利润和净资产的角度视乎都可以考虑内部交易的影响，不知道实务中是否会考虑，还是只考虑顺流或者逆流中的某一种呢？\n\n感谢陈版主。 “这里按照购买日公允价值持续计算的可辨认净资产的账面价值”也就是该资产组内各项资产、负债在合并报表层面的账面价值。如果其中某些资产属于内部交易的标的资产，则其账面价值应按抵销内部交易未实现损益后的余额确定。"}, {"tid": "5496398", "title": "退回往年预收款支付的现金流如何列报？", "category": "收入确认/总额净额", "questionAuthor": "一云", "questionTime": "2026-03-16 16:18:10", "replyTime": "2026-03-17 19:41:20", "replySortTime": "2026-03-17 19:41:20", "url": "https://bbs.esnai.com/thread-5496398-1-5.html", "question": "陈老师：  A企业本年退回了一笔大额预收款（去年收到的），那这笔退款现金流是冲减“销售商品收到的现金”呢，还是列到“支付的其他与经营活动有关的现金”呢？   注：这笔预收款款金额很大，覆盖了本期销售商品收到的现金，如果冲减“销售商品收到的现金“后，会形成负数。\n\n                                                     一云", "reply": "一般情况下现金流量表正表中的项目是尽量避免出现负数的。如大额退款导致“销售商品、提供劳务收到的现金”出现负数的，则一般建议将该项退款列入“支付其他与经营活动有关的现金”，需注意在附注中披露其原因和具体内容。", "searchText": "5496398 退回往年预收款支付的现金流如何列报？ 收入确认/总额净额 一云 陈老师：  a企业本年退回了一笔大额预收款（去年收到的），那这笔退款现金流是冲减“销售商品收到的现金”呢，还是列到“支付的其他与经营活动有关的现金”呢？   注：这笔预收款款金额很大，覆盖了本期销售商品收到的现金，如果冲减“销售商品收到的现金“后，会形成负数。\n\n                                                     一云 一般情况下现金流量表正表中的项目是尽量避免出现负数的。如大额退款导致“销售商品、提供劳务收到的现金”出现负数的，则一般建议将该项退款列入“支付其他与经营活动有关的现金”，需注意在附注中披露其原因和具体内容。"}, {"tid": "5496391", "title": "无形资产摊销问题", "category": "收入确认/总额净额", "questionAuthor": "18819490381", "questionTime": "2026-03-16 09:26:05", "replyTime": "2026-03-17 19:39:50", "replySortTime": "2026-03-17 19:39:50", "url": "https://bbs.esnai.com/thread-5496391-1-4.html", "question": "A公司请服务商做了一个管理系统项目，该项目费用包含硬件设备费用、软件开发费用、软件维护费用、系统服务器费用，现项目已验收了，那是否要将硬件设备计入固定资产折旧、软件开发费用与软件维护费用及系统服务器费用计入无形资产摊销？另外软件的相关费用摊销的话，按多少年去摊销呢，按什么标准呢？", "reply": "1、除了嵌入式软件（与特定硬件平台绑定，仅可在该平台上运行，不能在其他平台运行的软件）应计入固定资产成本以外，其他情形下硬件和软件应分别确认为固定资产和无形资产，分别计提折旧和摊销。\n\n2、软件维护费属于每年都要发生的、旨在维持系统原有功能稳定运行的支出，故应在发生时直接费用化处理，不应资本化和摊销。\n\n服务器如采用租赁的，应考虑是否适用租赁准则（即是否具备“租赁三要素”）。如不属于租赁的，则参照软件维护费处理，直接费用化；如一次预付多年的服务器费用的，可确认为长期待摊费用并分年摊销。\n\n软件的摊销年限为其预计使用年限，一般按5-10年。", "searchText": "5496391 无形资产摊销问题 收入确认/总额净额 18819490381 a公司请服务商做了一个管理系统项目，该项目费用包含硬件设备费用、软件开发费用、软件维护费用、系统服务器费用，现项目已验收了，那是否要将硬件设备计入固定资产折旧、软件开发费用与软件维护费用及系统服务器费用计入无形资产摊销？另外软件的相关费用摊销的话，按多少年去摊销呢，按什么标准呢？ 1、除了嵌入式软件（与特定硬件平台绑定，仅可在该平台上运行，不能在其他平台运行的软件）应计入固定资产成本以外，其他情形下硬件和软件应分别确认为固定资产和无形资产，分别计提折旧和摊销。\n\n2、软件维护费属于每年都要发生的、旨在维持系统原有功能稳定运行的支出，故应在发生时直接费用化处理，不应资本化和摊销。\n\n服务器如采用租赁的，应考虑是否适用租赁准则（即是否具备“租赁三要素”）。如不属于租赁的，则参照软件维护费处理，直接费用化；如一次预付多年的服务器费用的，可确认为长期待摊费用并分年摊销。\n\n软件的摊销年限为其预计使用年限，一般按5-10年。"}, {"tid": "5496382", "title": "是保留还是否定？", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "xuxcpa", "questionTime": "2026-03-15 06:04:40", "replyTime": "2026-03-17 07:34:11", "replySortTime": "2026-03-17 07:34:11", "url": "https://bbs.esnai.com/thread-5496382-1-5.html", "question": "假如一小企业会计准则下，资产总额3000万，营收3000万，利润总额 80万，但有一项无形资产未摊销，应摊160万，超出重要性水平，摊后可能要亏80万，但企业不同意调报表，应在审计报告中出具什么意见（假如要出报告的话），是影响重大但不广泛吗？", "reply": "盈亏性质发生改变，通常认为该错报的影响重大且具有广泛性，故一般理解应出具否定意见报告。", "searchText": "5496382 是保留还是否定？ 资产/存货/固定资产/无形资产 xuxcpa 假如一小企业会计准则下，资产总额3000万，营收3000万，利润总额 80万，但有一项无形资产未摊销，应摊160万，超出重要性水平，摊后可能要亏80万，但企业不同意调报表，应在审计报告中出具什么意见（假如要出报告的话），是影响重大但不广泛吗？ 盈亏性质发生改变，通常认为该错报的影响重大且具有广泛性，故一般理解应出具否定意见报告。"}, {"tid": "5496372", "title": "同一控制下的企业合并，先控股卖给控制股东又从控股股东作全额购回，少数股东权益。", "category": "合并/股权/权益法", "questionAuthor": "Zero147524", "questionTime": "2026-03-14 09:24:20", "replyTime": "2026-03-17 07:28:07", "replySortTime": "2026-03-17 07:28:07", "url": "https://bbs.esnai.com/thread-5496372-1-5.html", "question": "A公司下面有一家子公司B公司，直接持股B公司90%的股权，另外一个股东是合伙企业C合伙企业，C合伙企业持有B公司10%的股份，C合伙企业的股东是A公司持有79.8969%，D股东（个人也是A公司的控股股东）持有19.0722%，E（个人）持有1.0309%，A公司于2024年6月30日，把B公司出售给股东D，D全资持有B公司，A公司于2025年12月又从D股东中购回100%的股份，问编制合并报表时，初期也就是2024年12月31日时点是否考虑到少数股东权益，还是考虑同一控制下的企业合并100%的股权。编制2025年合并报表，合并B公司的数是否要考虑少数股东的情况？", "reply": "在2024年6月30日、2025年12月两次股权交易不构成一揽子交易的前提下，2025年12月的股权购回构成同一控制下合并，相应地，在A的合并报表中，应追溯此前D持有的10%股权，视同在整个报告期间内不存在少数股权。在合并报表中，需抵销2024年6月30日处置B公司90%股权的损益，将股权转让款的收付按权益性交易予以调整（支付股权款冲减权益，收到股权款增加权益）。", "searchText": "5496372 同一控制下的企业合并，先控股卖给控制股东又从控股股东作全额购回，少数股东权益。 合并/股权/权益法 zero147524 a公司下面有一家子公司b公司，直接持股b公司90%的股权，另外一个股东是合伙企业c合伙企业，c合伙企业持有b公司10%的股份，c合伙企业的股东是a公司持有79.8969%，d股东（个人也是a公司的控股股东）持有19.0722%，e（个人）持有1.0309%，a公司于2024年6月30日，把b公司出售给股东d，d全资持有b公司，a公司于2025年12月又从d股东中购回100%的股份，问编制合并报表时，初期也就是2024年12月31日时点是否考虑到少数股东权益，还是考虑同一控制下的企业合并100%的股权。编制2025年合并报表，合并b公司的数是否要考虑少数股东的情况？ 在2024年6月30日、2025年12月两次股权交易不构成一揽子交易的前提下，2025年12月的股权购回构成同一控制下合并，相应地，在a的合并报表中，应追溯此前d持有的10%股权，视同在整个报告期间内不存在少数股权。在合并报表中，需抵销2024年6月30日处置b公司90%股权的损益，将股权转让款的收付按权益性交易予以调整（支付股权款冲减权益，收到股权款增加权益）。"}, {"tid": "5496363", "title": "关于销售客户的认定", "category": "合并/股权/权益法", "questionAuthor": "zsmj", "questionTime": "2026-03-13 16:11:09", "replyTime": "2026-03-17 07:20:07", "replySortTime": "2026-03-17 07:20:07", "url": "https://bbs.esnai.com/thread-5496363-1-5.html", "question": "本帖最后由 zsmj 于 2026-3-13 16:12 编辑\n\n劳烦各位老师帮忙对如下两种不同的情形下的销售客户进行认定\n\n情形1、A公司主要从事分布式户用光伏电站开发，B公司为A公司所属项目公司，B公司主要负责项目备案，电站资产均在A公司账面。A公司将电站销售给金融租赁公司后（款项由金融租赁公司支付，发票开给金融租赁公司），由B公司租回（租赁期限为整个电站生命周期）合并报表层面为售后回租不构成销售，待B公司股权完成对外转让后实现电站资产销售，确认收入。实现收入时A公司的销售客户为金融租赁公司还是B公司股权承接方？\n\n情形2、A公司主要从事分布式户用光伏电站开发，B公司为A公司所属项目公司，B公司主要负责项目备案，电站资产均在A公司账面。A公司将电站销售给金融租赁公司（款项由金融租赁公司支付，发票开给金融租赁公司），B公司与金融租赁公司签订电站租赁合同（租赁期限为整个电站生命周期），同时B公司的股权转让给第三方C。此业务过程中A公司的销售客户为金融租赁公司还是股权承接方C。", "reply": "1、假设满足《上市公司执行企业会计准则案例解析2024》之案例6-31规定的在合并报表层面确认营业收入的条件，则其“客户”为项目公司股权的最终承接方。金融租赁公司只是资金提供方，并不取得商品（电站资产）的控制权。\n\n2、为最终股权承接方C。原理同上。", "searchText": "5496363 关于销售客户的认定 合并/股权/权益法 zsmj 本帖最后由 zsmj 于 2026-3-13 16:12 编辑\n\n劳烦各位老师帮忙对如下两种不同的情形下的销售客户进行认定\n\n情形1、a公司主要从事分布式户用光伏电站开发，b公司为a公司所属项目公司，b公司主要负责项目备案，电站资产均在a公司账面。a公司将电站销售给金融租赁公司后（款项由金融租赁公司支付，发票开给金融租赁公司），由b公司租回（租赁期限为整个电站生命周期）合并报表层面为售后回租不构成销售，待b公司股权完成对外转让后实现电站资产销售，确认收入。实现收入时a公司的销售客户为金融租赁公司还是b公司股权承接方？\n\n情形2、a公司主要从事分布式户用光伏电站开发，b公司为a公司所属项目公司，b公司主要负责项目备案，电站资产均在a公司账面。a公司将电站销售给金融租赁公司（款项由金融租赁公司支付，发票开给金融租赁公司），b公司与金融租赁公司签订电站租赁合同（租赁期限为整个电站生命周期），同时b公司的股权转让给第三方c。此业务过程中a公司的销售客户为金融租赁公司还是股权承接方c。 1、假设满足《上市公司执行企业会计准则案例解析2024》之案例6-31规定的在合并报表层面确认营业收入的条件，则其“客户”为项目公司股权的最终承接方。金融租赁公司只是资金提供方，并不取得商品（电站资产）的控制权。\n\n2、为最终股权承接方c。原理同上。"}, {"tid": "5493066", "title": "关于事务所代编会计分录的独立性问题", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "yuzhan0727", "questionTime": "2025-07-02 13:07:39", "replyTime": "2026-03-14 17:00:49", "replySortTime": "2026-03-14 17:00:49", "url": "https://bbs.esnai.com/thread-5493066-1-5.html", "question": "本帖最后由 yuzhan0727 于 2025-7-2 13:13 编辑\n\n请教陈版主：\n\n  今年7月1日执行的的中国注册会计师独立性准则第1号——财务报表审计和审阅业务对独立性的要求，如客户没做租赁准则规定的相关会计处理，签字CPA做的，属于这个108条第4项的内容“”吗？", "reply": "wjcpa9568 发表于 2026-3-12 13:38\n\n陈老师，请问中国注册会计师独立性准则第1号自 2025 年 7 月 1 日起施行，配套应用指南自发布之日202 ply": "此时租赁付款额仍按不含税金额计算，不能抵扣的增值税进项税额直接计入当期成本费用。", "searchText": "5496326 房屋租赁开具普通发票的情况下租赁付款额的计算 资产/存货/固定资产/无形资产 sharryli 请教陈老师，\n\n房屋租赁如果开具的是普通发票，租赁付款额计算时是按含税金额计算，还是自行计算扣除5%的税费后，按照不含税金额计算租赁付款额呢？ 此时租赁付款额仍按不含税金额计算，不能抵扣的增值税进项税额直接计入当期成本费用。"}, {"tid": "5496327", "title": "软件开发，收入确认", "category": "收入确认/总额净额", "questionAuthor": "freakyboom", "questionTime": "2026-03-11 14:51:54", "replyTime": "2026-03-13 04:01:13", "replySortTime": "2026-03-13 04:01:13", "url": "https://bbs.esnai.com/thread-5496327-1-5.html", "question": "客户与政府类、国有企业类单位签订了乡村大数据平台发开项目，合同月软件费用1000万，2025年1月初验之后，初验报告仅专家签字，现在已经一年多了还未进行终验，原因为该类单位审批流程长，中途又有领导更换。项目初验之后，后续发生零星成本。\n\n合同的验收条款：初验须在本合同项下软件全部安装调试后进行，报请监理单位进行初验。如因乙方原因初验未能达到验收方案要求，乙方应在【10】个工作日内整改并重新申请初验，并承担复验产生的相关费用。初验通过后进入试运行阶段，正常试运行一个月后，方可申请项目终验。\n\n请教陈版，根据合同约定应该是终验确认收入，从项目初验之后只发生零星成本，是否也可以判断初验已满足收入确认条件。客户上市公司，若以初验为确认依据，是否会引起监管质疑？", "reply": "理论上可以关注初验的内容和流程等，以及初验后是否已投入正常使用。参照《企业会计准则应用指南汇编2024》P396关于验收程序是否仅为一项”例行程序“的讨论，确定是否在初验时点已将控制权转移给客户，据此考虑能否在初验通过时点确认收入。\n\n因被审计单位为上市公司，需要谨慎对待，建议如果对利润和收入影响较大，先与交易所、证监局沟通。", "searchText": "5496327 软件开发，收入确认 收入确认/总额净额 freakyboom 客户与政府类、国有企业类单位签订了乡村大数据平台发开项目，合同月软件费用1000万，2025年1月初验之后，初验报告仅专家签字，现在已经一年多了还未进行终验，原因为该类单位审批流程长，中途又有领导更换。项目初验之后，后续发生零星成本。\n\n合同的验收条款：初验须在本合同项下软件全部安装调试后进行，报请监理单位进行初验。如因乙方原因初验未能达到验收方案要求，乙方应在【10】个工作日内整改并重新申请初验，并承担复验产生的相关费用。初验通过后进入试运行阶段，正常试运行一个月后，方可申请项目终验。\n\n请教陈版，根据合同约定应该是终验确认收入，从项目初验之后只发生零星成本，是否也可以判断初验已满足收入确认条件。客户上市公司，若以初验为确认依据，是否会引起监管质疑？ 理论上可以关注初验的内容和流程等，以及初验后是否已投入正常使用。参照《企业会计准则应用指南汇编2024》p396关于验收程序是否仅为一项”例行程序“的讨论，确定是否在初验时点已将控制权转移给客户，据此考虑能否在初验通过时点确认收入。\n\n因被审计单位为上市公司，需要谨慎对待，建议如果对利润和收入影响较大，先与交易所、证监局沟通。"}, {"tid": "5496332", "title": "请教股份支付超额抵扣未弥补亏损后续使用时的所得税二级类别", "category": "合并/股权/权益法", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-03-11 19:31:16", "replyTime": "2026-03-13 03:57:56", "replySortTime": "2026-03-13 03:57:56", "url": "https://bbs.esnai.com/thread-5496332-1-5.html", "question": "问题背景：股份支付超额抵扣，即税费认可的税前抵扣金额大于会计确认的股份支付费用金额形成的所得税利得，直接计入资本公积。即直接与权益相关，不影响利润表所得税费用。但对后续实际使用时的处理，存在争议。\n\n举例：假设某公司第N年当年授予当年行权的股份支付超额抵扣利得100，简化假设所得税税率10%。假设该公司当年若不考虑超额抵扣，应纳税所得额为0，也不存在任何递延所得税资产及负债。那么第N年由于超额抵扣，导致存在未弥补亏损。对于该亏损，做如下会计处理\n\n借：递延所得税资产 【100*10%=10】\n\n贷：资本公积-资本溢价【10】\n\n第N+1年，假设公司赚取利润1000，且不存在其他所得税调整事项，即公司应纳税所得税额为1000-100【期初未弥补亏损】=900。 应向税务部门的纳税义务即应交所得税为900*0.1=90\n\n观点1：期初递延所得税资产中10系与权益直接相关的事项导致，该项资产的后续变动不应该影响利润，仅为冲减应纳税额。若无超额抵扣，公司正常1000应纳税所得税对应的税金100为当期所得税费用。只是超额抵扣影响导致当期应缴纳税金90.故会计处理为。\n\n借：所得税费用-当前所得税  【1000*0.1=100】\n\n贷：应交税费-企业所得税   【100】\n\n借：应交税费-企业所得税  【10】\n\n贷：递延所得税资产          【10】\n\n利润表所得税费用100均为当期所得税，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.虽然表面上看递延所得税资产变化，利润表无对应勾稽的递延所得费用，但贯彻了超额抵扣事项的利得自始至终均不计入利润表的会计原则，是可以合理解释的。\n\n观点2：期初递延所得税资产中10系与权益直接相关的事项导致，但该项资产的后续变动可以影响利润。故会计处理为\n\n借：所得税费用-当期所得税费用  【900*0.1=90】\n\n贷：应交税费-企业所得税           【90】\n\n借：所得税费用-递延所得税费用 【10，结转来自期初超额抵扣相关的利得】\n\n贷：递延所得税资产                   【10】\n\n利润表所得税费用100，其中当期所得税90，递延所得税10，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.递延所得税资产变化与利润表递延所得税费勾稽。\n\n问题：上述观点哪种更合理？观点2下纵观两个年度的处理，是否实质上以递延所得税资产为过渡，该超额抵扣利得实质上进行了\n\n借：所得税费用  贷：资本公积的处理，进而导致该事项穿透看来影响了损益？", "reply": "观点2更合理。这实际上是与亏损相关的可抵扣亏损的后续利用，所以转回时影响损益。转回时利用可抵扣亏损这本身并不是权益性交易。\n\n另外还可以有第三种理解：第N年末应存在可抵扣亏损，故该年末应优先确认与可抵扣亏损相关的递延所得税资产，即：借：递延所得税资产 10，贷：所得税费用——递延所得税费用 10。这样，到下一年转回时计入损益就更好理解了。", "searchText": "5496332 请教股份支付超额抵扣未弥补亏损后续使用时的所得税二级类别 合并/股权/权益法 qingzhouygwcs 问题背景：股份支付超额抵扣，即税费认可的税前抵扣金额大于会计确认的股份支付费用金额形成的所得税利得，直接计入资本公积。即直接与权益相关，不影响利润表所得税费用。但对后续实际使用时的处理，存在争议。\n\n举例：假设某公司第n年当年授予当年行权的股份支付超额抵扣利得100，简化假设所得税税率10%。假设该公司当年若不考虑超额抵扣，应纳税所得额为0，也不存在任何递延所得税资产及负债。那么第n年由于超额抵扣，导致存在未弥补亏损。对于该亏损，做如下会计处理\n\n借：递延所得税资产 【100*10%=10】\n\n贷：资本公积-资本溢价【10】\n\n第n+1年，假设公司赚取利润1000，且不存在其他所得税调整事项，即公司应纳税所得税额为1000-100【期初未弥补亏损】=900。 应向税务部门的纳税义务即应交所得税为900*0.1=90\n\n观点1：期初递延所得税资产中10系与权益直接相关的事项导致，该项资产的后续变动不应该影响利润，仅为冲减应纳税额。若无超额抵扣，公司正常1000应纳税所得税对应的税金100为当期所得税费用。只是超额抵扣影响导致当期应缴纳税金90.故会计处理为。\n\n借：所得税费用-当前所得税  【1000*0.1=100】\n\n贷：应交税费-企业所得税   【100】\n\n借：应交税费-企业所得税  【10】\n\n贷：递延所得税资产          【10】\n\n利润表所得税费用100均为当期所得税，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.虽然表面上看递延所得税资产变化，利润表无对应勾稽的递延所得费用，但贯彻了超额抵扣事项的利得自始至终均不计入利润表的会计原则，是可以合理解释的。\n\n观点2：期初递延所得税资产中10系与权益直接相关的事项导致，但该项资产的后续变动可以影响利润。故会计处理为\n\n借：所得税费用-当期所得税费用  【900*0.1=90】\n\n贷：应交税费-企业所得税           【90】\n\n借：所得税费用-递延所得税费用 【10，结转来自期初超额抵扣相关的利得】\n\n贷：递延所得税资产                   【10】\n\n利润表所得税费用100，其中当期所得税90，递延所得税10，资产负债表递延所得税资产从期初10，变为期末0.应交税费从期初0变为期末90.递延所得税资产变化与利润表递延所得税费勾稽。\n\n问题：上述观点哪种更合理？观点2下纵观两个年度的处理，是否实质上以递延所得税资产为过渡，该超额抵扣利得实质上进行了\n\n借：所得税费用  贷：资本公积的处理，进而导致该事项穿透看来影响了损益？ 观点2更合理。这实际上是与亏损相关的可抵扣亏损的后续利用，所以转回时影响损益。转回时利用可抵扣亏损这本身并不是权益性交易。\n\n另外还可以有第三种理解：第n年末应存在可抵扣亏损，故该年末应优先确认与可抵扣亏损相关的递延所得税资产，即：借：递延所得税资产 10，贷：所得税费用——递延所得税费用 10。这样，到下一年转回时计入损益就更好理解了。"}, {"tid": "5496339", "title": "房地产企业调整联营合营企业的投资性房地产计量方式", "category": "合并/股权/权益法", "questionAuthor": "asdzht", "questionTime": "2026-03-12 00:29:50", "replyTime": "2026-03-13 03:52:16", "replySortTime": "2026-03-13 03:52:16", "url": "https://bbs.esnai.com/thread-5496339-1-5.html", "question": "陈版主，求助，遇到一个情况。是香港准则的条件下。\n\n公司为房地产企业，投资性房地产以公允价值模式计量，持有一家联营公司，对方账面投资性房地产是以成本模式计量，审计在计算享有权益时，将联营公司的投资性房地产改为公允价值计量，冲回所有折旧，这是否合理？是否有准则的支撑。", "reply": "根据《企业会计准则第2号——长期股权投资》第十一条：“被投资单位采用的会计政策及会计期间与投资方不一致的，应当按照投资方的会计政策及会计期间对被投资单位的财务报表进行调整，并据以确认投资收益和其他综合收益等。”\n\n因此审计调整的做法是合理的。", "searchText": "5496339 房地产企业调整联营合营企业的投资性房地产计量方式 合并/股权/权益法 asdzht 陈版主，求助，遇到一个情况。是香港准则的条件下。\n\n公司为房地产企业，投资性房地产以公允价值模式计量，持有一家联营公司，对方账面投资性房地产是以成本模式计量，审计在计算享有权益时，将联营公司的投资性房地产改为公允价值计量，冲回所有折旧，这是否合理？是否有准则的支撑。 根据《企业会计准则第2号——长期股权投资》第十一条：“被投资单位采用的会计政策及会计期间与投资方不一致的，应当按照投资方的会计政策及会计期间对被投资单位的财务报表进行调整，并据以确认投资收益和其他综合收益等。”\n\n因此审计调整的做法是合理的。"}, {"tid": "5496350", "title": "求助 陈版主 急急急", "category": "合并/股权/权益法", "questionAuthor": "爬爬呀", "questionTime": "2026-03-12 16:44:36", "replyTime": "2026-03-13 03:49:42", "replySortTime": "2026-03-13 03:49:42", "url": "https://bbs.esnai.com/thread-5496350-1-5.html", "question": "报告附注内容：\n\n一、归入公允价值层级第三层次的公允价值计量的调节表中：1、什么时候会涉及到“转入第三层次”、“转出第三层次”；2、“出售”、“结算”有什么区别呢？3、“计入损益的当期利得或损失总额”、“对于在报告期末持有的资产，计入损益的当期未实现利得或损失的变动”这两块具体是什么含义呢？与哪些数据存在勾稽关系呢？\n\n二、重要联营企业的主要财务信息，有一个调整事项：减值准备，是什么内容呢？\n\n同时也想问一下，对于联营企业的损益调整与减值准备，这两个类 +计入租赁负债的现金流支出？\n\n2、供应商融资安排中，为何会有应付账款中供应商已从融资提供方收到的款项？这块应该是从供应商已从融资提供方收到的款项时，就会重分类到短期借款（长期借款）或是其他流动负债的吧。 1、是。\n\n2、如你所述，一般不应有“应付账款中供应商已从融资提供方收到的款项”，因为一般会重分类到短期借款或者其他流动负债。实务中可理解为已重分类到这两个项目的尚未终止确认的金额。"}, {"tid": "5496330", "title": "ipo发行失败那部分费用，可以算非经吗", "category": "其他", "questionAuthor": "zq18826103753", "questionTime": "2026-03-11 17:07:44", "replyTime": "2026-03-13 03:40:16", "replySortTime": "2026-03-13 03:40:16", "url": "https://bbs.esnai.com/thread-5496330-1-5.html", "question": "如题，前期IPO申报进程中已经资本化的发行费，在IPO失败撤材料后，将[size=9.60268pt]IPO[size=9.60268pt]发[size=9.60268pt]行费用一次性费用化，这部分费用能当作非经吗", "reply": "不属于非经常性损益。IPO是为了支持企业正常经营业务中的融资需求，所以不具备偶发性和性质特殊性。虽然金额可能较大，但无法证明其在可预见的未来不会重复发生，所以不满足认定为非经的条件。\n\n另外，建议后续对IPO申报期内发行费用资本化的问题要谨慎，到后期成功不确定性较小之后才考虑资本化，此前应全部费用化。", "searchText": "5496330 ipo发行失败那部分费用，可以算非经吗 其他 zq18826103753 如题，前期ipo申报进程中已经资本化的发行费，在ipo失败撤材料后，将[size=9.60268pt]ipo[size=9.60268pt]发[size=9.60268pt]行费用一次性费用化，这部分费用能当作非经吗 不属于非经常性损益。ipo是为了支持企业正常经营业务中的融资需求，所以不具备偶发性和性质特殊性。虽然金额可能较大，但无法证明其在可预见的未来不会重复发生，所以不满足认定为非经的条件。\n\n另外，建议后续对ipo申报期内发行费用资本化的问题要谨慎，到后期成功不确定性较小之后才考虑资本化，此前应全部费用化。"}, {"tid": "5496324", "title": "合同资产转入应收账款，减值准备与减值损失的列报逻辑如何处理", "category": "收入确认/总额净额", "questionAuthor": "wx_5da958a4acba", "questionTime": "2026-03-11 09:47:30", "replyTime": "2026-03-13 03:37:56", "replySortTime": "2026-03-13 03:37:56", "url": "https://bbs.esnai.com/thread-5496324-1-5.html", "question": "请问各位老师：\n\n合同资产计提减值时，计入资产减值损失；合同资产满足条件重分类为应收账款时，将对应的合同资产减值准备平移至坏账准备（及通过其他变动结转相关准备，不经过损益表做冲回资产减值损失再计提信用减值损失操作）；后续对应收账款补提、转回坏账时，计入信用减值损失。\n\n上述处理会导致同一笔应收款项，前期减值计入资产减值损失，后续变动计入信用减值损失，拉通看最终可能出现计提都在资产减值损失，而冲回都是信用减值损失，两个科目并列一正一负情况。\n\n想请教如何处理这种情况？", "reply": "可能会存在这个问题。这完全是由人为的科目分类所导致，应可以合理解释。将信用减值损失和资产减值损失中的合同资产减值损失并起来看即可。", "searchText": "5496324 合同资产转入应收账款，减值准备与减值损失的列报逻辑如何处理 收入确认/总额净额 wx_5da958a4acba 请问各位老师：\n\n合同资产计提减值时，计入资产减值损失；合同资产满足条件重分类为应收账款时，将对应的合同资产减值准备平移至坏账准备（及通过其他变动结转相关准备，不经过损益表做冲回资产减值损失再计提信用减值损失操作）；后续对应收账款补提、转回坏账时，计入信用减值损失。\n\n上述处理会导致同一笔应收款项，前期减值计入资产减值损失，后续变动计入信用减值损失，拉通看最终可能出现计提都在资产减值损失，而冲回都是信用减值损失，两个科目并列一正一负情况。\n\n想请教如何处理这种情况？ 可能会存在这个问题。这完全是由人为的科目分类所导致，应可以合理解释。将信用减值损失和资产减值损失中的合同资产减值损失并起来看即可。"}, {"tid": "5496322", "title": "一年内到期的租赁负债的做法！求助", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "RobbyZN", "questionTime": "2026-03-10 22:57:47", "replyTime": "2026-03-13 03:36:26", "replySortTime": "2026-03-13 03:36:26", "url": "https://bbs.esnai.com/thread-5496322-1-5.html", "question": "陈版主想请求指教一下对于一年内到期的租赁负债以下那种较为正确呀。 条件如下：租赁合同为2024/1/1日开启每年12月支付上年租金100,000元，报价利率4.65%，租赁付款期数为10期，无可变租金。\n\n一：站在2025/12/31的角度，确认了确认①租赁付款额折现的金额为：100,000/(1+4.65%/12)^12=95,465.03, 将26年12月应支付的付款额折现至资产负债表日的日期，②租赁付款额为：100,000，③未确认融资费用：8,864.27；\n\n二：确认租赁付款额折现的数字为①：100,000/(1+4.65%/12)^36=87,002.75 ，②租赁付款额为：100,000，③未确认融资费用：12,997.25。想请陈版主指教一下哪一种做法为正确的~", "reply": "根据《应用指南汇编2024》P692：一年内到期的非流动负债即资产负债表日后12个月内租赁负侦预期减少的金额，参考【例21-61】。即本年末租赁负债折现值与预计下一年末租赁负债折现值之差。", "searchText": "5496322 一年内到期的租赁负债的做法！求助 租赁/使用权资产/融资租赁 robbyzn 陈版主想请求指教一下对于一年内到期的租赁负债以下那种较为正确呀。 条件如下：租赁合同为2024/1/1日开启每年12月支付上年租金100,000元，报价利率4.65%，租赁付款期数为10期，无可变租金。\n\n一：站在2025/12/31的角度，确认了确认①租赁付款额折现的金额为：100,000/(1+4.65%/12)^12=95,465.03, 将26年12月应支付的付款额折现至资产负债表日的日期，②租赁付款额为：100,000，③未确认融资费用：8,864.27；\n\n二：确认租赁付款额折现的数字为①：100,000/(1+4.65%/12)^36=87,002.75 ，②租赁付款额为：100,000，③未确认融资费用：12,997.25。想请陈版主指教一下哪一种做法为正确的~ 根据《应用指南汇编2024》p692：一年内到期的非流动负债即资产负债表日后12个月内租赁负侦预期减少的金额，参考【例21-61】。即本年末租赁负债折现值与预计下一年末租赁负债折现值之差。"}, {"tid": "5496321", "title": "少数股权回购针对回购义务利息少数股东权益的归属", "category": "合并/股权/权益法", "questionAuthor": "19121751180", "questionTime": "2026-03-10 21:55:36", "replyTime": "2026-03-13 03:30:49", "replySortTime": "2026-03-13 03:30:49", "url": "https://bbs.esnai.com/thread-5496321-1-5.html", "question": "陈老师您好，我们在会计实务中遇到如下案例，想跟您请教下会计处理。\n\n假设2023年12月A公司和B公司分别出资80万元和20万元共同设立了C公司，约定双方的股权比例为：A持股80%，B持股20%。A公司实现对C公司的控制。同时协议中约定，三年后即2026年，A公司将无条件回购B公司所持C公司股份，回购价格为2026年评估时点的C公司的公允价值。截止2024年12月31日，C公司公允价值为22万。那么于2023年12月31日，A公司合并报表层面确认的金融负债是否存在税会差异需确认递延所得税资产？同时，于2024年12月31日时点，对C公司评估增值的2万块在A公司合并层面是否需分配给少数股东？具体的会计处理如何？少数股权权益怎么核算？公允价值变动的部分是否属于暂时性差异？", "reply": "1、于2023年12月31日，如这部分公允价值变动损益未税前扣除，则A公司合并报表层面确认的金融负债存在暂时性差异，需确认递延所得税资产。\n\n2、A合并报表中的少数股东权益仍以C公司在该合并报表中的账面净资产为基础计算，不将上述公允价值变动损益分配给少数股东。", "searchText": "5496321 少数股权回购针对回购义务利息少数股东权益的归属 合并/股权/权益法 19121751180 陈老师您好，我们在会计实务中遇到如下案例，想跟您请教下会计处理。\n\n假设2023年12月a公司和b公司分别出资80万元和20万元共同设立了c公司，约定双方的股权比例为：a持股80%，b持股20%。a公司实现对c公司的控制。同时协议中约定，三年后即2026年，a公司将无条件回购b公司所持c公司股份，回购价格为2026年评估时点的c公司的公允价值。截止2024年12月31日，c公司公允价值为22万。那么于2023年12月31日，a公司合并报表层面确认的金融负债是否存在税会差异需确认递延所得税资产？同时，于2024年12月31日时点，对c公司评估增值的2万块在a公司合并层面是否需分配给少数股东？具体的会计处理如何？少数股权权益怎么核算？公允价值变动的部分是否属于暂时性差异？ 1、于2023年12月31日，如这部分公允价值变动损益未税前扣除，则a公司合并报表层面确认的金融负债存在暂时性差异，需确认递延所得税资产。\n\n2、a合并报表中的少数股东权益仍以c公司在该合并报表中的账面净资产为基础计算，不将上述公允价值变动损益分配给少数股东。"}, {"tid": "5496314", "title": "关于土地补偿的账务处理", "category": "收入确认/总额净额", "questionAuthor": "腐草为萤", "questionTime": "2026-03-10 20:20:12", "replyTime": "2026-03-13 03:27:08", "replySortTime": "2026-03-13 03:27:08", "url": "https://bbs.esnai.com/thread-5496314-1-5.html", "question": "请教陈版主：因为省级道路改造，政府部门征用我公司现使用的部分“集体土地”（沥青埂化、路沿石、围墙）用于工程项目建设，并进行补偿，包括土地补偿、苗木、附属物、并于本期收到补偿款。由于是集体土地，是否可以作为“营业外收入”入账？是否属于政府补助？", "reply": "如果补偿金额是以被征收资产（包括租用集体土地形成的使用权资产）的公允价值为基础的，则该事项属于资产处置，可按照《监管规则适用指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理，确认资产处置损益或者营业外收支。", "searchText": "5496314 关于土地补偿的账务处理 收入确认/总额净额 腐草为萤 请教陈版主：因为省级道路改造，政府部门征用我公司现使用的部分“集体土地”（沥青埂化、路沿石、围墙）用于工程项目建设，并进行补偿，包括土地补偿、苗木、附属物、并于本期收到补偿款。由于是集体土地，是否可以作为“营业外收入”入账？是否属于政府补助？ 如果补偿金额是以被征收资产（包括租用集体土地形成的使用权资产）的公允价值为基础的，则该事项属于资产处置，可按照《监管规则适用指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理，确认资产处置损益或者营业外收支。"}, {"tid": "5496311", "title": "计入无形资产的样机支出后续销售", "category": "收入确认/总额净额", "questionAuthor": "sybspxcpa", "questionTime": "2026-03-10 14:19:32", "replyTime": "2026-03-13 03:24:37", "replySortTime": "2026-03-13 03:24:37", "url": "https://bbs.esnai.com/thread-5496311-1-5.html", "question": "研发过程中形成的样机不符合存货确认条件，样机形成阶段属于资本化阶段，连同样机的相关研发支出资本化后最终形成无形资产。后续在该自研无形资产摊销过程中，当初的样机具备了销售条件并对外销售，请教陈版，样机销售后是否需要调整无形资产价值？如何调整？\n\n谢谢！", "reply": "如是，则应根据《监管规则适用指引——会计类第3号》之“3-11 固定资产达到预定可使用状态前试运行产品的会计处理”中所述原则确定样机成本，将其从无形资产账面价值中转出（借：存货，贷：无形资产），再在确认样机销售收入同时，将存货成本结转销售成本。\n\n需注意：根据财政部发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0250417_3962191.htm），可转出的样机成本金额以已资本化的开发支出为限。", "searchText": "5496311 计入无形资产的样机支出后续销售 收入确认/总额净额 sybspxcpa 研发过程中形成的样机不符合存货确认条件，样机形成阶段属于资本化阶段，连同样机的相关研发支出资本化后最终形成无形资产。后续在该自研无形资产摊销过程中，当初的样机具备了销售条件并对外销售，请教陈版，样机销售后是否需要调整无形资产价值？如何调整？\n\n谢谢！ 如是，则应根据《监管规则适用指引——会计类第3号》之“3-11 固定资产达到预定可使用状态前试运行产品的会计处理”中所述原则确定样机成本，将其从无形资产账面价值中转出（借：存货，贷：无形资产），再在确认样机销售收入同时，将存货成本结转销售成本。\n\n需注意：根据财政部发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0250417_3962191.htm），可转出的样机成本金额以已资本化的开发支出为限。"}, {"tid": "5496310", "title": "请教版主：长期股权投资的初始计量", "category": "合并/股权/权益法", "questionAuthor": "syq7368", "questionTime": "2026-03-10 09:07:07", "replyTime": "2026-03-13 03:21:27", "replySortTime": "2026-03-13 03:21:27", "url": "https://bbs.esnai.com/thread-5496310-1-4.html", "question": "B公司和C公司都是A公司的全资子公司，B公司注册资本1000万元，未分配利润-600万元。2025年7月，C公司对B公司增资500万元，占比33.33%。请问，C公司如何对B公司长期股权核算。", "reply": "首先，因为B公司和C公司都是A公司的全资子公司，即B和C同受A控制，因此可能不能仅仅根据C持有B的33.33%股权即认定C对B具有重大影响。更大的可能是C对该项出资应作为金融资产核算。\n\n如果确定C确实对B有重大影响，且本次增资作价公允的，则C增资后占有B的净资产份额为：（1000-600+500）*1/3=300万元，小于投资成本，故长期股权投资成本为500，但因长投成本大于占被投资方净资产的份额，故后续除了按权益法确认在B的净利润、其他综合收益、其他权益变动中所享有或应分担的份额以外，对长投有无减值迹象及是否需计提减值的问题需特殊关注。", "searchText": "5496310 请教版主：长期股权投资的初始计量 合并/股权/权益法 syq7368 b公司和c公司都是a公司的全资子公司，b公司注册资本1000万元，未分配利润-600万元。2025年7月，c公司对b公司增资500万元，占比33.33%。请问，c公司如何对b公司长期股权核算。 首先，因为b公司和c公司都是a公司的全资子公司，即b和c同受a控制，因此可能不能仅仅根据c持有b的33.33%股权即认定c对b具有重大影响。更大的可能是c对该项出资应作为金融资产核算。\n\n如果确定c确实对b有重大影响，且本次增资作价公允的，则c增资后占有b的净资产份额为：（1000-600+500）*1/3=300万元，小于投资成本，故长期股权投资成本为500，但因长投成本大于占被投资方净资产的份额，故后续除了按权益法确认在b的净利润、其他综合收益、其他权益变动中所享有或应分担的份额以外，对长投有无减值迹象及是否需计提减值的问题需特殊关注。"}, {"tid": "5496302", "title": "固定资产减值问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "huangjiayong", "questionTime": "2026-03-09 17:48:18", "replyTime": "2026-03-11 14:52:42", "replySortTime": "2026-03-11 14:52:42", "url": "https://bbs.esnai.com/thread-5496302-1-5.html", "question": "陈版主您好，我们实务中碰到了一个问题，情况如下：\n\n      被审计单位现在推倒了一个房屋建筑物，账面价值大概100万，推倒后所回收的铁条对外出售，截止2026年2月底已对外出售3万元，但废墟中还有很多铁条被掩盖了，无法判断其后续出售价值。目前我们项目组的想法是，按照对外出售所回收的金额与账面价值之间的差异确认固定资产减值准备。但现在由于无法判断其后续出售价值，因此无法准确计量计提固定资产减值准备的金额\n\n       请教陈版主，上述情况应如何判断？或者有什么方式可以确认固定资产减值准备的金额", "reply": "按照一般理解，在作出拆除决定前，应可根据对当初设计图纸的查阅和对房屋现状的评估，合理估计其拆除费用和残料的可变现净值，完全无法合理估计的情况应很少见，并不合理。\n\n或者，如果虽然无法合理估计，但预计残料金额不重大的，则基于重要性原则予以简化处理。\n\n另外，关于此类旧房拆除、在原址建造新房的账务处理，应区分不同情况考虑，请参阅《中审众环研究2020》之“问题1-1-4（拆除旧房并建造新房时，旧房原账面价值的处理）”。", "searchText": "5496302 固定资产减值问题 金融工具/外币/债务重组/abs huangjiayong 陈版主您好，我们实务中碰到了一个问题，情况如下：\n\n      被审计单位现在推倒了一个房屋建筑物，账面价值大概100万，推倒后所回收的铁条对外出售，截止2026年2月底已对外出售3万元，但废墟中还有很多铁条被掩盖了，无法判断其后续出售价值。目前我们项目组的想法是，按照对外出售所回收的金额与账面价值之间的差异确认固定资产减值准备。但现在由于无法判断其后续出售价值，因此无法准确计量计提固定资产减值准备的金额\n\n       请教陈版主，上述情况应如何判断？或者有什么方式可以确认固定资产减值准备的金额 按照一般理解，在作出拆除决定前，应可根据对当初设计图纸的查阅和对房屋现状的评估，合理估计其拆除费用和残料的可变现净值，完全无法合理估计的情况应很少见，并不合理。\n\n或者，如果虽然无法合理估计，但预计残料金额不重大的，则基于重要性原则予以简化处理。\n\n另外，关于此类旧房拆除、在原址建造新房的账务处理，应区分不同情况考虑，请参阅《中审众环研究2020》之“问题1-1-4（拆除旧房并建造新房时，旧房原账面价值的处理）”。"}, {"tid": "5496300", "title": "[求助] 请教陈版，关于有限合伙企业是否纳入合并范围问题", "category": "合并/股权/权益法", "questionAuthor": "aaa5531", "questionTime": "2026-03-09 16:42:33", "replyTime": "2026-03-11 14:44:33", "replySortTime": "2026-03-11 14:44:33", "url": "https://bbs.esnai.com/thread-5496300-1-5.html", "question": "陈老师您好！\n\n       假设A公司主要经营非证券类股权投资业务，投资某个项目公司甲公司，预计后续甲公司上市，通过变卖甲公司股票实现资本增值。由于甲公司有投资门槛，A公司无法直接投资甲公司，需通过与B公司（具有基金协备案的合伙企业）成立合伙企业参与投资甲公司。\n\n      假设A公司与B公司成立C合伙企业，其中A公司作为唯一LP出资1亿元，B公司作为GP出资100万元，出资额仅用于投资甲公司。A公司作为单一合伙人，持有C合伙企业99%股比，根据合伙协议，A公司作为有限合伙人不执行合伙事务，合伙企业投资业务的管理、控制、运营的权益由执行事务合伙人B公司行使，普通合伙人B公司设投资决策委员会，有限合伙的投资及退出事宜由投资决策委员会决定。请问陈老师：\n\n      1.A公司是否将C合伙企业纳入合并范围内？\n\n      2.若C公司的投资决策委员会由B公司设立，B公司可以决定投资及退出事宜，A公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜。据此是否可以得出A公司对C合伙企业“无控制权”的结论？", "reply": "1、C合伙企业是专为了A投资于甲公司之目的而设立的，B作为GP属于代理人，C企业仍由A控制，A应将C纳入合并报表范围，相应地在合并报表层面直接体现出对甲公司的投资。\n\n2、虽然名义上“C公司的投资决策委员会由B公司设立，B公司可以决定投资及退出事宜，A公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜”，但B作为GP明显地是代理人身份。根据《企业会计准则第33号——合并财务报表（2014年修订）》第十八条规定：“代理人仅代表主要责任人行使决策权，不控制被投资方。投资方将被投资方相关活动的决策权委托给代理人的，应当将该决策权视为自身直接持有。”。故不影响A对C具有控制权的判断。", "searchText": "5496300 [求助] 请教陈版，关于有限合伙企业是否纳入合并范围问题 合并/股权/权益法 aaa5531 陈老师您好！\n\n       假设a公司主要经营非证券类股权投资业务，投资某个项目公司甲公司，预计后续甲公司上市，通过变卖甲公司股票实现资本增值。由于甲公司有投资门槛，a公司无法直接投资甲公司，需通过与b公司（具有基金协备案的合伙企业）成立合伙企业参与投资甲公司。\n\n      假设a公司与b公司成立c合伙企业，其中a公司作为唯一lp出资1亿元，b公司作为gp出资100万元，出资额仅用于投资甲公司。a公司作为单一合伙人，持有c合伙企业99%股比，根据合伙协议，a公司作为有限合伙人不执行合伙事务，合伙企业投资业务的管理、控制、运营的权益由执行事务合伙人b公司行使，普通合伙人b公司设投资决策委员会，有限合伙的投资及退出事宜由投资决策委员会决定。请问陈老师：\n\n      1.a公司是否将c合伙企业纳入合并范围内？\n\n      2.若c公司的投资决策委员会由b公司设立，b公司可以决定投资及退出事宜，a公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜。据此是否可以得出a公司对c合伙企业“无控制权”的结论？ 1、c合伙企业是专为了a投资于甲公司之目的而设立的，b作为gp属于代理人，c企业仍由a控制，a应将c纳入合并报表范围，相应地在合并报表层面直接体现出对甲公司的投资。\n\n2、虽然名义上“c公司的投资决策委员会由b公司设立，b公司可以决定投资及退出事宜，a公司仅对权益标的项目相关事务有知情权且可以提出合理建议，并无法决定投资退出事宜”，但b作为gp明显地是代理人身份。根据《企业会计准则第33号——合并财务报表（2014年修订）》第十八条规定：“代理人仅代表主要责任人行使决策权，不控制被投资方。投资方将被投资方相关活动的决策权委托给代理人的，应当将该决策权视为自身直接持有。”。故不影响a对c具有控制权的判断。"}, {"tid": "5496297", "title": "划拨地的会计处理", "category": "合并/股权/权益法", "questionAuthor": "小乐安1314", "questionTime": "2026-03-09 15:21:00", "replyTime": "2026-03-11 14:40:52", "replySortTime": "2026-03-11 14:40:52", "url": "https://bbs.esnai.com/thread-5496297-1-5.html", "question": "集团子公司收到了区政府划拨地一宗土地，无偿获得，请问该如何入账呢，还可以以名义价值1元入账吗", "reply": "需明确以下问题：\n\n1、该土地权证上注明的性质是否为划拨地？后续能否出租、转让？地块用途是什么？\n\n2、该子公司及其所属集团是否隶属于该区政府？\n\n3、无偿获得该土地的政策依据是什么？政府无偿授予土地的目的是什么？", "searchText": "5496297 划拨地的会计处理 合并/股权/权益法 小乐安1314 集团子公司收到了区政府划拨地一宗土地，无偿获得，请问该如何入账呢，还可以以名义价值1元入账吗 需明确以下问题：\n\n1、该土地权证上注明的性质是否为划拨地？后续能否出租、转让？地块用途是什么？\n\n2、该子公司及其所属集团是否隶属于该区政府？\n\n3、无偿获得该土地的政策依据是什么？政府无偿授予土地的目的是什么？"}, {"tid": "5496273", "title": "债务重组中债权人的会计处理", "category": "合并/股权/权益法", "questionAuthor": "shichengqi", "questionTime": "2026-03-06 20:52:12", "replyTime": "2026-03-09 13:32:05", "replySortTime": "2026-03-09 13:32:05", "url": "https://bbs.esnai.com/thread-5496273-1-5.html", "question": "本帖最后由 shichengqi 于 2026-3-7 08:40 编辑\n\n请教陈版主，背景：\n\n1.截至2025年12月31日，A公司账面对B公司、C公司（同属于D集团）以应收账款核算，应收账款余额为2700万元，坏账准备2400万元，账面价值为300万元。\n\n2.2024年4月，D集团被申请破产重整，A公司债权申报金额为2700万元。根据2025年1月D集团重整计划，A公司受偿方案为：（1）现金受偿5万元，截至2026年3月尚未收到；（2）以股票受偿：2025年11月10日，A公司收到D集团股票70万股；（3）信托受益权份额抵债：根据重整计划，每家（户）普通债权人超过5万元的债权部分，每100元债权可分得100份信托受益权份额，根据计算A公司将获取2700万份信托份额（每份信托份额估值预计为0.02元），2025年12月31日，A公司尚未签署信托份额协议。2026年3月1日，A公司根据《D集团重整计划》的规定不可更改、不可撤销的领受信托受益权，成为本信托受益人。根据规定，A公司可依法享有《D集团重整专项服务信托信托合同》约定的受益人权利，同时也承诺将妥善履行各项受益人义务。\n\n3.A公司会计处理：\n\n1.2025年11月20日，A公司收到股票70万股，按照收盘价2元/股，以140万元计入交易性金融资产核算，并同时抵销应收账款原值140万元；\n\n2.2026年3月1日，A公司将收到的信托计划，未作为期后事项调整。\n\n问题：\n\n方案一：A公司理解由于收到股票、信托、现金后，才能视为按照重整计划执行，取得相应权利才能终止确认应收账款原值，从而确认债务重组损失。\n\n故A公司在收到股票时相应抵减应收账款原值，收到信托计划时未作为期后事项调整，且同时抵消应收账款原值，并在收到最后清偿的现金时再确认重组损失是否合适？\n\n或者是否是方案二：即结合了解的信息，截至2025年12月31日，D集团将尚未分配的信托、现金等已经划转至管理人账户，尽管A公司尚未领受，但预计取得该部分资产所有权不具有重大不确定性，从而在2025年12月31日确认交易性金融资产或其他非流动金融资产（股票、信托份额）及其他应收款-现金5万元，并且终止确认应收账款，确认债务重组损失。\n\n以上哪种处理方式更合适，谢谢！", "reply": "截至2025年末，D集团的重整尚未完成，此时A不能终止确认涉及重整的应收账款，已收到的现金、股票等暂挂负债处理（到重整的全部步骤完成后再对冲应收账款）。\n\n期末A对重整涉及的应收账款仍需计提坏账准备，但计提坏账准备后的账面价值不高于已收到的现金和股票的公允价值，以及预计可收到的信托受益权份额的公允价值之和。基于谨慎考虑，此前已计提的坏账准备暂不转回。到重整全部完成后，如收到抵债资产的公允价值高于2025年末计提坏账准备后债权的账面价值的，再在2026年内确认信用减值损失转回金额（债权人一般不建议确认债务重组收益）。", "searchText": "5496273 债务重组中债权人的会计处理 合并/股权/权益法 shichengqi 本帖最后由 shichengqi 于 2026-3-7 08:40 编辑\n\n请教陈版主，背景：\n\n1.截至2025年12月31日，a公司账面对b公司、c公司（同属于d集团）以应收账款核算，应收账款余额为2700万元，坏账准备2400万元，账面价值为300万元。\n\n2.2024年4月，d集团被申请破产重整，a公司债权申报金额为2700万元。根据2025年1月d集团重整计划，a公司受偿方案为：（1）现金受偿5万元，截至2026年3月尚未收到；（2）以股票受偿：2025年11月10日，a公司收到d集团股票70万股；（3）信托受益权份额抵债：根据重整计划，每家（户）普通债权人超过5万元的债权部分，每100元债权可分得100份信托受益权份额，根据计算a公司将获取2700万份信托份额（每份信托份额估值预计为0.02元），2025年12月31日，a公司尚未签署信托份额协议。2026年3月1日，a公司根据《d集团重整计划》的规定不可更改、不可撤销的领受信托受益权，成为本信托受益人。根据规定，a公司可依法享有《d集团重整专项服务信托信托合同》约定的受益人权利，同时也承诺将妥善履行各项受益人义务。\n\n3.a公司会计处理：\n\n1.2025年11月20日，a公司收到股票70万股，按照收盘价2元/股，以140万元计入交易性金融资产核算，并同时抵销应收账款原值140万元；\n\n2.2026年3月1日，a公司将收到的信托计划，未作为期后事项调整。\n\n问题：\n\n方案一：a公司理解由于收到股票、信托、现金后，才能视为按照重整计划执行，取得相应权利才能终止确认应收账款原值，从而确认债务重组损失。\n\n故a公司在收到股票时相应抵减应收账款原值，收到信托计划时未作为期后事项调整，且同时抵消应收账款原值，并在收到最后清偿的现金时再确认重组损失是否合适？\n\n或者是否是方案二：即结合了解的信息，截至2025年12月31日，d集团将尚未分配的信托、现金等已经划转至管理人账户，尽管a公司尚未领受，但预计取得该部分资产所有权不具有重大不确定性，从而在2025年12月31日确认交易性金融资产或其他非流动金融资产（股票、信托份额）及其他应收款-现金5万元，并且终止确认应收账款，确认债务重组损失。\n\n以上哪种处理方式更合适，谢谢！ 截至2025年末，d集团的重整尚未完成，此时a不能终止确认涉及重整的应收账款，已收到的现金、股票等暂挂负债处理（到重整的全部步骤完成后再对冲应收账款）。\n\n期末a对重整涉及的应收账款仍需计提坏账准备，但计提坏账准备后的账面价值不高于已收到的现金和股票的公允价值，以及预计可收到的信托受益权份额的公允价值之和。基于谨慎考虑，此前已计提的坏账准备暂不转回。到重整全部完成后，如收到抵债资产的公允价值高于2025年末计提坏账准备后债权的账面价值的，再在2026年内确认信用减值损失转回金额（债权人一般不建议确认债务重组收益）。"}, {"tid": "5496278", "title": "请教陈版主，少数股东增资后，丧失控制，同年度再次出售剩余股权", "category": "合并/股权/权益法", "questionAuthor": "halo阿毛", "questionTime": "2026-03-07 16:29:10", "replyTime": "2026-03-09 13:14:20", "replySortTime": "2026-03-09 13:14:20", "url": "https://bbs.esnai.com/thread-5496278-1-4.html", "question": "母公司持有子公司60%的股权，出资300万，5月份少数股东按照实收资本的份额增资200万元，母公司稀释为42.86%，按照新的持股比例确认本投资方应享有的原子公司因增资扩股而增加净资产的份额，与应结转持股比例下降部分所对应的长期股权投资原账面价值之间的差额为0，丧控时点母公司按照新的持股比例视同自取得投资时即采用权益法核算进行调整，追溯损益调整为-10万，本年损益调整-20万，合并层面对于剩余股权，应当按照其在丧失控制权日的公允价值进行重新计量（公允价就是700*42.86%=300万）。同年10月份公司又将剩余股权全部出售给了之前的少数股东：\n\n1、合并层面对个别财务报表中部分处置收益的归属期间进行调整，本年净利润的调整应该进未分配利润还是投资收益？（如果进投资收益的话，是不是合并层面的投资收益就不等于处置股权取得对价+剩余股权公允价值-原持股比例计算应享有原有子公司自购买日开始持续计算的可辨认净资产的份额了？\n\n2、5月份丧失控制时点，单体跟合并层面确认的投资收益应该是非经常损益还是经常损益？6-10月份按权益法确认的投资收益应该是非经常损益还是经常损益？\n\n3、站在11月份出售剩余股权的角度，整年确认的投资收益，是不是就应该是追溯上年损益调整的-10万，因为是之前出资300万元，然后出售也是按300万元？这几块的投资收益在附注里面应该如何披露？处置长期股权投资产生的投资收益？权益法核算的长期股权投资收益？丧失控制权后，剩余股权按公允价值重新计量产生的利得？需要区分吗？", "reply": "首先明确讨论前提：5月少数股东增资和10月处置剩余股权给少数股东不是一揽子交易。如果是一揽子交易，则有可能10月才丧失控制权，5月应将处置对价与对应权益份额之间的差额计入其他综合收益，到10月丧失控制权时一并转入投资收益。\n\n在两步交易不是一揽子交易的前提下：\n\n1、个别报表层面在5月丧失控制权时应按解释7号第一条规定进行处理，其中涉及按剩余股权比例对前期损益的权益法调整，但根据《应用指南汇编2024》P82，涉及以前年度的损益调整直接调整年初未分配利润，不再调整前期比较数据。\n\n2、5月份丧失控制权时点，合并报表层面的丧失控制权损益属于非经常性损益。个别报表层面通常不单独披露非经常性损益。\n\n3、将两个步骤结合起来看，合并报表层面全年的投资收益相当于最后一笔处置价款减去年初该子公司的归母净资产份额，但这其中包含了处置损益（2次）和权益法下的投资收益，并不全都是处置损益。附注中仍需区分处置损益（含第一步完成后剩余股权按公允价值重新计量的差额）、权益法投资收益分别披露。", "searchText": "5496278 请教陈版主，少数股东增资后，丧失控制，同年度再次出售剩余股权 合并/股权/权益法 halo阿毛 母公司持有子公司60%的股权，出资300万，5月份少数股东按照实收资本的份额增资200万元， 其使用效能”相关支出应先计入长期待摊费用并在两年内分期摊销计入存货成本。想问陈老师这样的理解是否合理？谢谢您！@chenyiwei 根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使用寿命或者以不同方式为企业提供经济利益，适用不同折旧率或折旧方法的，应当分别将各组成部分确认为单项固定资产。”\n\n虽然该反应装置整体使用年限较长，但催化剂需每2年更换一次，故催化剂应单独确认为一项固定资产，在其自身的可使用年限（2年）内计提折旧。\n\n如果替换下来的催化剂经过一定的净化处理后可恢复最初的使用效能，因而可以重复利用的，则也可以将预计每2年需发生一次的净化成本作为一项长期待摊费用，在两年间隔期内计提摊销，而该催化剂本身的折旧年限与反应装置整体的折旧年限相同（但最终反应装置拆除时的最后一批催化剂的可变现净值应纳入该项固定资产整体的预计净残值中）。"}, {"tid": "5496231", "title": "合并层面资产评估增值", "category": "合并/股权/权益法", "questionAuthor": "硫酸贝123", "questionTime": "2026-03-03 17:12:01", "replyTime": "2026-03-08 18:33:25", "replySortTime": "2026-03-08 18:33:25", "url": "https://bbs.esnai.com/thread-5496231-1-5.html", "question": "本帖最后由 硫酸贝123 于 2026-3-3 17:16 编辑\n\n陈老师，公司以前年度吸收合并形成资产评估增值，合并层面一直进行折旧调整，今年子公司进行清产核资，将这部分资产处置，国资委下发文件直接核减权益的减少，未调整当期利润，请问合并层面应该如何做会计处理？根据跟子公司一惯性做法，是不是应该直接将固定资产账面价值核减权益呢？如果直接核减权益，那合并层面最开始增值对应增加的资本公积是不是要一直滚调了@chenyiwei", "reply": "合并报表层面应按照该项固定资产于划出日的账面价值（含评估增值的摊余金额）冲减权益。即依次冲减资本公积、盈余公积、未分配利润。不考虑这部分资本公积是否最初系来源于该项资产自身的评估增值。", "searchText": "5496231 合并层面资产评估增值 合并/股权/权益法 硫酸贝123 本帖最后由 硫酸贝123 于 2026-3-3 17:16 编辑\n\n陈老师，公司以前年度吸收合并形成资产评估增值，合并层面一直进行折旧调整，今年子公司进行清产核资，将这部分资产处置，国资委下发文件直接核减权益的减少，未调整当期利润，请问合并层面应该如何做会计处理？根据跟子公司一惯性做法，是不是应该直接将固定资产账面价值核减权益呢？如果直接核减权益，那合并层面最开始增值对应增加的资本公积是不是要一直滚调了@chenyiwei 合并报表层面应按照该项固定资产于划出日的账面价值（含评估增值的摊余金额）冲减权益。即依次冲减资本公积、盈余公积、未分配利润。不考虑这部分资本公积是否最初系来源于该项资产自身的评估增值。"}, {"tid": "5496243", "title": "求教陈版主，唯一子公司注销后合并报表的会计处理问题", "category": "合并/股权/权益法", "questionAuthor": "372916118", "questionTime": "2026-03-04 09:23:53", "replyTime": "2026-03-08 18:30:27", "replySortTime": "2026-03-08 18:30:27", "url": "https://bbs.esnai.com/thread-5496243-1-5.html", "question": "A公司以800账面价值的固定资产x，评估值为1000投资唯一子公司B，在B公司实收资本中按1000入账；几年后，B公司拟注销，注销前B公司再次评估固定资产x评估值为900，将此固定资产x按900抵偿欠A公司的债务， B公司注销手续和财务事项全部在当期完成，现在需要编制期末合并报表，A公司合并资产负债表如何处理该固定资产？\n\n　　我的理解是根据《上市公司执行企业会计准则案例解析2024》（案例12-10 合并抵销调整-【相关案例之一】），虽然固定资产x经过了从A到B再到A的过程，但在处置（注销）子公司的时点，该固定资产x的内部交易最终以900价值实现，应在合并报表中以900列示，差异作为“投资收益”在本期合并报表实现，合并报表与A公司个别报表固定资产x账面价值均为900。（暂 ": "2026-03-08 18:22:24", "url": "https://bbs.esnai.com/thread-5496245-1-5.html", "question": "请教陈版。集团公司下设二级公司A作为食堂管理者，主营业务专为集团内部其他单位提供职工餐并收取餐费，其余单位每月给员工餐卡打款并在食堂进行消费。A公司确认收入，其余单位确认费用并作为职工福利费。现编制合并报表，有2个地方感觉不理解：1、站在合并报表层面来看，福利费是真实发生，那么交易抵消和现金流抵消时是否不应抵消全额，而是只针对实现损益部分进行抵消；2、抵消是否涉及应付职工薪酬-福利费发生额。如果不抵消应付职工薪酬-福利费发生额。附注与主表的勾稽差额也是合理的吗？谢谢陈版以及大家的指正", "reply": "在合并报表层面，子公司A实际上是集团的内设职工福利部门，应将A公司实际发生的食堂运营成本作为职工福利支出的实际发生额，相应调整职工福利费的计提数和使用数，即抵销分录为：\n\n借：营业收入（A公司个别报表层面的食堂业务收入）\n\n贷：营业成本（A公司个别报表层面的食堂业务成本）\n\n贷：管理费用——福利费（A公司个别报表层面的毛利）\n\n相应地，附注中“应付职工薪酬——福利费”的计提额和使用额都应同步调整减少，期初期末余额不变。", "searchText": "5496245 集团内部职工福利费问题 合并/股权/权益法 傻傻的飞鸟 请教陈版。集团公司下设二级公司a作为食堂管理者，主营业务专为集团内部其他单位提供职工餐并收取餐费，其余单位每月给员工餐卡打款并在食堂进行消费。a公司确认收入，其余单位确认费用并作为职工福利费。现编制合并报表，有2个地方感觉不理解：1、站在合并报表层面来看，福利费是真实发生，那么交易抵消和现金流抵消时是否不应抵消全额，而是只针对实现损益部分进行抵消；2、抵消是否涉及应付职工薪酬-福利费发生额。如果不抵消应付职工薪酬-福利费发生额。附注与主表的勾稽差额也是合理的吗？谢谢陈版以及大家的指正 在合并报表层面，子公司a实际上是集团的内设职工福利部门，应将a公司实际发生的食堂运营成本作为职工福利支出的实际发生额，相应调整职工福利费的计提数和使用数，即抵销分录为：\n\n借：营业收入（a公司个别报表层面的食堂业务收入）\n\n贷：营业成本（a公司个别报表层面的食堂业务成本）\n\n贷：管理费用——福利费（a公司个别报表层面的毛利）\n\n相应地，附注中“应付职工薪酬——福利费”的计提额和使用额都应同步调整减少，期初期末余额不变。"}, {"tid": "5496247", "title": "回购少数股东股权构成一揽子交易的会计处理", "category": "合并/股权/权益法", "questionAuthor": "DavidDe", "questionTime": "2026-03-04 17:27:50", "replyTime": "2026-03-08 18:16:53", "replySortTime": "2026-03-08 18:16:53", "url": "https://bbs.esnai.com/thread-5496247-1-5.html", "question": "请教陈版主回购少数股东股权构成一揽子交易的会计处理。A公司为有限责任公司，由B公司持股70%、C公司持股30%，现在A公司（非其母公司B公司出面）为了回购C公司持有的其30%股份，将其持有的另外一个子公司D（账面净资产7千余万）以1元的价格转让给C公司并已于2025年完成工商变更，A公司还会付出一部分现金对价给C公司（2025年已经支付一部分、2026年还会支付一部分），我们认为这个安排构成一揽子交易，因为子公司D净资产很高且利润较好，1元出售显然不公允。综合看，该一揽子交易存在跨年的情况。\n\nA公司在2025年末应该如何进行会计处理？按照一揽子交易处理，我们认为不应该确认长投的处置投资收益，即不影响2025年的损益。A公司对D公司的长期股权投资应转出，按照收购少数股东股权的角度出发，准则说应该冲减资本公积，不足冲减的冲减留存收益；还是说A公司将长投转出的差额作为库存股（类似于股份公司回购自身股份），或者说差额放在其他综合收益，待2026年整个交易完成后再由库存股或其他综合收益转至资本公积和留存收益？", "reply": "A公司为有限责任公司，该交易的实质是以D公司股权和现金作为对价进行减资，实现股东C的退出。在此情况下，A的个别报表层面应以其对D的长投成本与名义价格1元之间的差额冲减资本公积（仅指资本溢价，下同），合并报表层面则以处置日D公司账面净资产的相应比例冲减资本公积，并将尚待支付的现金对价确认为负债并冲减资本公积。\n\n到A的减资手续办理完毕后，按照C原持有的实收资本金额借记实收资本，贷记资本公积；如果原先冲减资本公积的金额超出了资本公积的原有余额的，则将超出部分调整为依次冲减盈余公积和未分配利润。\n\n有限责任公司不使用库存股科目。", "searchText": "5496247 回购少数股东股权构成一揽子交易的会计处理 合并/股权/权益法 davidde 请教陈版主回购少数股东股权构成一揽子交易的会计处理。a公司为有限责任公司，由b公司持股70%、c公司持股30%，现在a公司（非其母公司b公司出面）为了回购c公司持有的其30%股份，将其持有的另外一个子公司d（账面净资产7千余万）以1元的价格转让给c公司并已于2025年完成工商变更，a公司还会付出一部分现金对价给c公司（2025年已经支付一部分、2026年还会支付一部分），我们认为这个安排构成一揽子交易，因为子公司d净资产很高且利润较好，1元出售显然不公允。综合看，该一揽子交易存在跨年的情况。\n\na公司在2025年末应该如何进行会计处理？按照一揽子交易处理，我们认为不应该确认长投的处置投资收益，即不影响2025年的损益。a公司对d公司的长期股权投资应转出，按照收购少数股东股权的角度出发，准则说应该冲减资本公积，不足冲减的冲减留存收益；还是说a公司将长投转出的差额作为库存股（类似于股份公司回购自身股份），或者说差额放在其他综合收益，待2026年整个交易完成后再由库存股或其他综合收益转至资本公积和留存收益？ a公司为有限责任公司，该交易的实质是以d公司股权和现金作为对价进行减资，实现股东c的退出。在此情况下，a的个别报表层面应以其对d的长投成本与名义价格1元之间的差额冲减资本公积（仅指资本溢价，下同），合并报表层面则以处置日d公司账面净资产的相应比例冲减资本公积，并将尚待支付的现金对价确认为负债并冲减资本公积。\n\n到a的减资手续办理完毕后，按照c原持有的实收资本金额借记实收资本，贷记资本公积；如果原先冲减资本公积的金额超出了资本公积的原有余额的，则将超出部分调整为依次冲减盈余公积和未分配利润。\n\n有限责任公司不使用库存股科目。"}, {"tid": "5496248", "title": "信用证、保函什么情况下需要作为承诺事项披露", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "zlxxjg1212", "questionTime": "2026-03-04 20:23:12", "replyTime": "2026-03-08 14:55:51", "replySortTime": "2026-03-08 14:55:51", "url": "https://bbs.esnai.com/thread-5496248-1-5.html", "question": "求助陈版：\n\n1、假设公司保函保证金200万被冻结，但是有800万的保函。\n\n2、假设公司开具信用证额度1000万，已经使用800万，剩余200万未使用。\n\n3、假设票据保证金200万，票据额度300万，超出的100万属于风险敞口。\n\n以上三种情况是否都需要在审计报告，承诺事项中进行披露？还是只在受限中披露就可以", "reply": "这类情况基本不作为承诺事项披露。作为受限资金披露，以及在所涉及报表项目的注释中说明即可。", "searchText": "5496248 信用证、保函什么情况下需要作为承诺事项披露 金融工具/外币/债务重组/abs zlxxjg1212 求助陈版：\n\n1、假设公司保函保证金200万被冻结，但是有800万的保函。\n\n2、假设公司开具信用证额度1000万，已经使用800万，剩余200万未使用。\n\n3、假设票据保证金200万，票据额度300万，超出的100万属于风险敞口。\n\n以上三种情况是否都需要在审计报告，承诺事项中进行披露？还是只在受限中披露就可以 这类情况基本不作为承诺事项披露。作为受限资金披露，以及在所涉及报表项目的注释中说明即可。"}, {"tid": "5496195", "title": "附有向融资租赁公司回购应收款项义务的产品销售收入确认时点问题", "category": "收入确认/总额净额", "questionAuthor": "奔跑城里", "questionTime": "2026-03-01 19:49:46", "replyTime": "2026-03-04 12:27:16", "replySortTime": "2026-03-04 12:27:16", "url": "https://bbs.esnai.com/thread-5496195-1-5.html", "question": "求助版主：基本事项：  甲上市公司是一家大型设备定制生产企业，甲公司（出卖人）、租赁公司（买受人）、最终客户（租赁人）签订《产品销售合同》，合同主要约定：1、租赁公司根据最终客户对甲公司和租赁物的完全自主选择，向出卖人购买设备，作为租赁合同项下租赁物，并出租给最终客户使用。2、设备的质量、技术规范、技术经济指标、性能、技术服务、保管、运输、交货时间与地点、验收标准、维修及保险等由出卖人和最终客户双方确定。租赁公司不承担本合同项下与接收、验收设备相关的任何责任。最终客户接受租赁公司转让的其在本合同项下与受领设备有关的买受人的权利。3设备购买价款的支付安排：（核心条款）租赁公司已收到《租赁物件接收证书》、最终客户向租赁人提出《付款通知书》，租赁公司一次支付设备全部价款。4、融资租赁合同主要条款：租赁物购买价款：与《买卖合同》约定的金额一致；租赁期限36个月、租赁利率：固定利率4.5%；每3个月支付一期租金；名义货价:壹佰元整。5、出租人除取得租赁物所有权的权利和承担向出卖人支付租赁物购买价款的义务外，与租赁物购买相关的买方其他的权利和义务在合同期限内均由出租人转让给承租人享有和承担。甲公司（上市公司、出卖人、回购义务人）与租赁公司签订《回购协议》，主要条款：1、回购标的物：《租赁合同》项下的租赁物和/或租赁债权2、回购条件：承租人未按时，足额向出租人支付任何一期到期租金，或承租人未向出租人支付的租金及其他应付款项累计达到一定金额，或承租人在租赁期限届满时未付清全部租金及其他应付款。3、回购价款与价款支付：回购价款为《租赁合同》项下的全部应付租赁款，逾期利息，违约金，提前还款补偿金，特定损失赔偿金，租赁物使用费，资金占用费以及其他应付款项等承租人在《租赁合同》项下所有应付款项之和，甲公司不得对出租人按照上述内容确定的回购价款提出任何异议。4、甲公司向出租人支付的回购价款金额仅由上述条款确定，与回购之日该租赁物本身的状态或当时的市场公允价格无关。5、出租人收到甲公司支付的全部回购价款之日，租赁物所有权以及租赁债权按届时现状自动转移至甲公司方，无需出租人向甲公司方进行物理交付租赁物。鉴于租赁物由承租人占有和使用，双方一致同意，由甲公司方自行与承租人协商租赁物交付事宜，出租人不承担向甲公司方交付租赁物的义务。 项目组倾向性意见的理论依据：依据：《企业会计准则第14号——收入》（财会[2017]22号）第五条  当企业与客户之间的合同同时满足下列条件时，企业应当在客户取得相关商品控制权时确认收入：（一）合同各方已批准该合同并承诺将履行各自义务；（二）该合同明确了合同各方与所转让商品或提供劳务（以下简称“转让商品”）相关的权利和义务；（三）该合同有明确的与所转让商品相关的支付条款；（四）该合同具有商业实质，即履行该合同将改变企业未来现金流量的风险、时间分布或金额；（五）企业因向客户转让商品而有权取得的对价很可能收回。 项目组队该业务的分析：首先，甲公司与融资租赁公司、承租人（最终客户）签订的三方买卖合同，甲公司承担设备交付前的所有风险，承租人承担设备交付后的所有风险。因此，在甲公司将设备运送至融资租赁合同指定的承租人地点并指导其安装调试后，由最终客户验收确认，即已表明相关产品的控制权、风险与报酬已经转移。 其次，在设备交付安装调试后，承租人出具验收单据时，甲公司收取融资租赁公司支付的全部货款，因转让商品而有权取得的对价已很可能收回；并且该设备的所有权已转移给融资租赁公司、控制权也已转移给承租人，即融资租赁公司及承租人能够主导该商品的使用并从中获得几乎全部的经济利益。 再次，在设备交付并完成安装验收时，销售商品收入确认条件均已满足，并且预计承租人的违约风险较低、未来承担回购的可能性极小，可以在货物交付验收时确认收入。按照一般的商业合理性分析，甲公司会对最终客户的回款情况进行分析是否能够回款，另外，租赁公司同样会对最终客户进行分析，如果最终客户存在重大的回款风险，即：转让商品而有权取得的对价很可能收回，的情况下，租赁公司签订租赁合同。 对于甲公司附有回购租赁公司的应收款项，而不是回购向最终客户交付的产品，该事项可以参照：附有追诉权的“金融资产”转移相关规则处理，不能终止确认金融资产。依据《企业会计准则第23号——金融资产转移》第十一条 企业在判断金融资产转移是否满足本准则规定的金融资产终止确认条件时，应当注重金融资产转移的实质。（一）在附回购协议的金融资产出售中，转出方将予回购的资产与售出的金融资产相同或实质上相同、回购价格固定或是原售价加上合理回报的，不应当终止确认所出售的金融资产，如采用买断式回购、质押式回购交易卖出债券等。 在产品交付给最终客户，客户向甲公司/租赁公司出具“租赁物件 me": "2026-03-04 12:11:07", "url": "https://bbs.esnai.com/thread-5496205-1-5.html", "question": "版主您好！       实务中遇到这样一个租赁问题，A公司于2024年从B公司处租赁一处房产用于办公，租赁期间2024年2月至2027年2月，年租金100万元，押金100万元（若提前退租，押金不予退还）。2025年下半年，A公司的母公司统一安排，A公司需对目前租赁的办公地点退租，并预计于2026年4月前搬入母公司所建设的写字楼。A公司于2025年末，将使用权资产账面价值和租赁负债账面价值转至资产处置损益科目（借：租赁负债  贷：使用权资产  差额计入资产处置损益），并预提100万元违约金损失（预计押金将全额损失，借：营业外支出 100万元 贷：预计负债 100万元）。\n\n我理解：\n\n（1）该租赁事项应按照缩短租赁期限进行会计处理，即在2025年12月31日，将缩短期限占总租赁期限的比例调减使用权资产价值；并将租赁负债按照预计2026年4月份到期进行重新计算，差额调整使用权资产原值？\n\n（2）鉴于该押金预计已不可收回，计提减值损失，对方科目为营业外收入-违约金支出？", "reply": "主帖中的处理意见（1）是合理的。\n\n处理意见（2）有误，对于预计将因提前退租而无法收回的押金，应增加使用权资产（借：使用权资产，贷：长期应收款——押金），纳入上述（1）中调整后的使用权资产账面价值中，在缩短后的剩余租赁期内计提折旧，并关注其减值问题。不应直接将被没收押金的损失计入营业外支出。", "searchText": "5496205 求助版主！提前退租的会计处理 合并/股权/权益法 李华2013 版主您好！       实务中遇到这样一个租赁问题，a公司于2024年从b公司处租赁一处房产用于办公，租赁期间2024年2月至2027年2月，年租金100万元，押金100万元（若提前退租，押金不予退还）。2025年下半年，a公司的母公司统一安排，a公司需对目前租赁的办公地点退租，并预计于2026年4月前搬入母公司所建设的写字楼。a公司于2025年末，将使用权资产账面价值和租赁负债账面价值转至资产处置损益科目（借：租赁负债  贷：使用权资产  差额计入资产处置损益），并预提100万元违约金损失（预计押金将全额损失，借：营业外支出 100万元 贷：预计负债 100万元）。\n\n我理解：\n\n（1）该租赁事项应按照缩短租赁期限进行会计处理，即在2025年12月31日，将缩短期限占总租赁期限的比例调减使用权资产价值；并将租赁负债按照预计2026年4月份到期进行重新计算，差额调整使用权资产原值？\n\n（2）鉴于该押金预计已不可收回，计提减值损失，对方科目为营业外收入-违约金支出？ 主帖中的处理意见（1）是合理的。\n\n处理意见（2）有误，对于预计将因提前退租而无法收回的押金，应增加使用权资产（借：使用权资产，贷：长期应收款——押金），纳入上述（1）中调整后的使用权资产账面价值中，在缩短后的剩余租赁期内计提折旧，并关注其减值问题。不应直接将被没收押金的损失计入营业外支出。"}, {"tid": "5496203", "title": "陈版，我这样对于递延所得税的理解是否正确？", "category": "收入确认/总额净额", "questionAuthor": "642658990", "questionTime": "2026-03-02 08:33:22", "replyTime": "2026-03-04 12:01:30", "replySortTime": "2026-03-04 12:01:30", "url": "https://bbs.esnai.com/thread-5496203-1-6.html", "question": "对于递延所得税这块，我记得好像有这条“按照税法规定可以结转以后年度的未弥补亏损和税款抵减,若企业预计未来有足够的应税所得,应视同可抵扣暂时性差异处理,确认递延所得税资产”，假如上一年确认减值1000万元，利润总额为0，确认递延所得税资产100*25=250，所得税费用为负250，税法上调减1000万成本，调增应纳税所得额1000万，应纳所得税250，第二年全销售了，假如利润总额还是0，会计上营业成本减少1000万元，转回递延所得税资产250万元，因此影响所得税费用为250万元，税法上调增1000万成本，应纳税所得额为-1000万，用于结转以后年度未弥补亏损，假如未来预计能够盈利，对于这个亏损是不是可以再确认递延所得税资产1000*25=250万，影响所得税费用负250万元，这样正负抵消基本不用调,我这么理解正确吗&#8197;", "reply": "基本可以这样理解。具体见你上一个帖子后面的回复。", "searchText": "5496203 陈版，我这样对于递延所得税的理解是否正确？ 收入确认/总额净额 642658990 对于递延所得税这块，我记得好像有这条“按照税法规定可以结转以后年度的未弥补亏损和税款抵减,若企业预计未来有足够的应税所得,应视同可抵扣暂时性差异处理,确认递延所得税资产”，假如上一年确认减值1000万元，利润总额为0，确认递延所得税资产100*25=250，所得税费用为负250，税法上调减1000万成本，调增应纳税所得额1000万，应纳所得税250，第二年全销售了，假如利润总额还是0，会计上营业成本减少1000万元，转回递延所得税资产250万元，因此影响所得税费用为250万元，税法上调增1000万成本，应纳税所得额为-1000万，用于结转以后年度未弥补亏损，假如未来预计能够盈利，对于这个亏损是不是可以再确认递延所得税资产1000*25=250万，影响所得税费用负250万元，这样正负抵消基本不用调,我这么理解正确吗&#8197; 基本可以这样理解。具体见你上一个帖子后面的回复。"}, {"tid": "5496184", "title": "陈版或各位版主，关于递延所得税资产问题请教下？", "category": "收入确认/总额净额", "questionAuthor": "642658990", "questionTime": "2026-02-28 13:43:38", "replyTime": "2026-03-04 12:00:16", "replySortTime": "2026-03-04 12:00:16", "url": "https://bbs.esnai.com/thread-5496184-1-6.html", "question": "本帖最后由 642658990 于 2026-2-28 14:42 编辑\n\n1、公司正常经营亏损1000万，无税会差异，老板预计未来5年能盈利，可否计提递延所得税资产1000*25%？（老板的依据是：按照税法规定可以结转以后年度的未弥补亏损和税款抵减,若企业预计未来有足够的应税所得,应视同可抵扣暂时性差异处理,确认递延所得税资产）\n\n2、如果公司上年由于存货减值导致亏损1000万，计提了递延所得税资产，今年该存货全部销售，但还是没有盈利，上年由于存货提的递延所得税资产是否可以不转回，待5年内有盈利了再转回？以上如果第1条可以，第2条是不是更应该可以？", "reply": "1、如果预计未来5年内累积可获得的净应纳税所得额超过1000万元，则可以就本期末的可抵扣亏损1000万元确认递延所得税资产。\n\n2、因为相关存货在本期内已售出，故原先确认递延所得税资产所依据的可抵扣暂时性差异已不存在，相应地递延所得税资产应予以转销。如果预计未来亏损弥补年限内可获得足够多的应纳税所得额的，则在本期末重新确认与可抵扣亏损相关的递延所得税资产。", "searchText": "5496184 陈版或各位版主，关于递延所得税资产问题请教下？ 收入确认/总额净额 642658990 本帖最后由 642658990 于 2026-2-28 14:42 编辑\n\n1、公司正常经营亏损1000万，无税会差异，老板预计未来5年能盈利，可否计提递延所得税资产1000*25%？（老板的依据是：按照税法规定可以结转以后年度的未弥补亏损和税款抵减,若企业预计未来有足够的应税所得,应视同可抵扣暂时性差异处理,确认递延所得税资产）\n\n2、如果公司上年由于存货减值导致亏损1000万，计提了递延所得税资产，今年该存货全部销售，但还是没有盈利，上年由于存货提的递延所得税资产是否可以不转回，待5年内有盈利了再转回？以上如果第1条可以，第2条是不是更应该可以？ 1、如果预计未来5年内累积可获得的净应纳税所得额超过1000万元，则可以就本期末的可抵扣亏损1000万元确认递延所得税资产。\n\n2、因为相关存货在本期内已售出，故原先确认递延所得税资产所依据的可抵扣暂时性差异已不存在，相应地递延所得税资产应予以转销。如果预计未来亏损弥补年限内可获得足够多的应纳税所得额的，则在本期末重新确认与可抵扣亏损相关的递延所得税资产。"}, {"tid": "5496208", "title": "求助陈版，关于按照逾期账龄计提坏账的问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "dalianmao1990", "questionTime": "2026-03-02 15:28:02", "replyTime": "2026-03-04 11:55:45", "replySortTime": "2026-03-04 11:55:45", "url": "https://bbs.esnai.com/thread-5496208-1-6.html", "question": "上市公司应收账款按照逾期账龄及相应比例计提坏账。\n\n在实际业务中，会有客户资金紧张，无法按期还款的情况，这时候双方重新协商签订新的还款协议，延长付款期限，并按一定比例支付逾期利息。这种情况导致逾期账龄存在可操作空间，体现在财务报表上减少了坏账计提，增加了利润。从监管的角度来看，是否有操纵上市公司利润的嫌疑，是否有相应的监管案例。", "reply": "这种情况下的“逾期”应根据原始合同条款约定的还款期限计算，不能根据延期情况重新计算逾期账龄。这是对客户信用风险的评估，与豁免、延期等债务重组事项导致的还款期限重新计算无关。并且客户未能按期还款本身就是信用风险显著增加、甚至已发生信用损失的标志，在此情况下少提坏账准备更不恰当。", "searchText": "5496208 求助陈版，关于按照逾期账龄计提坏账的问题 金融工具/外币/债务重组/abs dalianmao1990 上市公司应收账款按照逾期账龄及相应比例计提坏账。\n\n在实际业务中，会有客户资金紧张，无法按期还款的情况，这时候双方重新协商签订新的还款协议，延长付款期限，并按一定比例支付逾期利息。这种情况导致逾期账龄存在可操作空间，体现在财务报表上减少了坏账计提，增加了利润。从监管的角度来看，是否有操纵上市公司利润的嫌疑，是否有相应的监管案例。 这种情况下的“逾期”应根据原始合同条款约定的还款期限计算，不能根据延期情况重新计算逾期账龄。这是对客户信用风险的评估，与豁免、延期等债务重组事项导致的还款期限重新计算无关。并且客户未能按期还款本身就是信用风险显著增加、甚至已发生信用损失的标志，在此情况下少提坏账准备更不恰当。"}, {"tid": "5496216", "title": "光伏企业租赁农户屋顶，是否应确认使用权资产和租赁负债？", "category": "收入确认/总额净额", "questionAuthor": "一云", "questionTime": "2026-03-02 17:04:35", "replyTime": "2026-03-04 11:53:46", "replySortTime": "2026-03-04 11:53:46", "url": "https://bbs.esnai.com/thread-5496216-1-6.html", "question": "本帖最后由 一云 于 2026-3-2 17:16 编辑\n\n请问，某光伏企业企业租赁大量农户的屋顶，合作建设、安装、运营光伏电站项目：甲方提供满足户用光伏电站建设的屋顶/宅基地，乙方租赁使用甲方自有屋顶/宅基地投资建设户用光伏分布式电站，通过全额上网的方式并入国家电网，电站发电收益全部归属于乙方，包括乙方电站建成并网后运营期内获得的全部售电收益，国家及地方电价补贴（如有）、绿色能源补贴及碳排放、碳交易等所有收入。乙方按照本租赁合同约定按时足额向甲方支付租金。租赁期一般20年。       项目组认为，农户屋顶价值很低，超不过4万，该类业务可以按低价值租赁处理，选择不确认使用权资产和租赁负债。\n\n---------------------请问：该项租赁，是否需要确认使用权资产和租赁负债？", "reply": "该交易实际上是获得特定的已识别资产（屋顶）在一定年限（如20年）内的使用权，因此包含租赁。虽然单个屋顶的租金可能较低，但屋顶是房屋的一部分，而房屋的总体价值较大；且此类企业通常成批一次性租赁大量农户屋顶，是其业务模式的核心组成部分，故仍需确认使用权资产和租赁负债，不适用低价值资产租赁的简化处理规定。", "searchText": "5496216 光伏企业租赁农户屋顶，是否应确认使用权资产和租赁负债？ 收入确认/总额净额 一云 本帖最后由 一云 于 2026-3-2 17:16 编辑\n\n请问，某光伏企业企业租赁大量农户的屋顶，合作建设、安装、运营光伏电站项目：甲方提供满足户用光伏电站建设的屋顶/宅基地，乙方租赁使用甲方自有屋顶/宅基地投资建设户用光伏分布式电站，通过全额上网的方式并入国家电网，电站发电收益全部归属于乙方，包括乙方电站建成并网后运营期内获得的全部售电收益，国家及地方电价补贴（如有）、绿色能源补贴及碳排放、碳交易等所有收入。乙方按照本租赁合同约定按时足额向甲方支付租金。租赁期一般20年。       项目组认为，农户屋顶价值很低，超不过4万，该类业务可以按低价值租赁处理，选择不确认使用权资产和租赁负债。\n\n---------------------请问：该项租赁，是否需要确认使用权资产和租赁负债？ 该交易实际上是获得特定的已识别资产（屋顶）在一定年限（如20年）内的使用权，因此包含租赁。虽然单个屋顶的租金可能较低，但屋顶是房屋的一部分，而房屋的总体价值较大；且此类企业通常成批一次性租赁大量农户屋顶，是其业务模式的核心组成部分，故仍需确认使用权资产和租赁负债，不适用低价值资产租赁的简化处理规定。"}, {"tid": "5496170", "title": "关于可抵扣亏损确认递延所得税资产问题", "category": "政府补助/PPP/税费/现金流", "questionAuthor": "wx_62eb1d381f04", "questionTime": "2026-02-27 10:41:39", "replyTime": "2026-03-01 06:38:11", "replySortTime": "2026-03-01 06:38:11", "url": "https://bbs.esnai.com/thread-5496170-1-6.html", "question": "陈版主您好，我现在遇到一个问题还请您指点一下。\n\n我们有个客户23年成立，目前产生的可抵扣亏损预计5000万元左右，客户想在今年确认递延所得税资产。但是按照准则“递延所得税资产的确认应以未来期间很可能取得的用来抵扣可抵扣暂时性差异的应纳税所得额为限”，客户确定未来可能无法获取足额的应纳税所得额用以利用目前的可抵扣亏损，但是也无法准确预计未来可获得的应纳税所得额。\n\n基于对会计核算的准确性的期望，他们想按照董事会确认的下一年的业绩目标作为应纳税所得额（按照目前的情况，该业绩目标偏差不大），确认递延所得税资产。请问这样是否可行？\n\n期待您的回复，感谢陈总。", "reply": "如果无法合理预计未来5年可获得的应纳税所得额，但对下一年度的应纳税所得额可以可靠估计的，则也可以在能够可靠估计的下一年度应纳税所得额的限度内确认与可抵扣亏损相关的递延所得税资产，尽可能确保这些递延所得税资产在未来一年内全部转回耗用。此时“可预见的未来”仅为下一年。", "searchText": "5496170 关于可抵扣亏损确认递延所得税资产问题 政府补助/ppp/税费/现金流 wx_62eb1d381f04 陈版主您好，我现在遇到一个问题还请您指点一下。\n\n我们有个客户23年成立，目前产生的可抵扣亏损预计5000万元左右，客户想在今年确认递延所得税资产。但是按照准则“递延所得税资产的确认应以未来期间很可能取得的用来抵扣可抵扣暂时性差异的应纳税所得额为限”，客户确定未来可能无法获取足额的应纳税所得额用以利用目前的可抵扣亏损，但是也无法准确预计未来可获得的应纳税所得额。\n\n基于对会计核算的准确性的期望，他们想按照董事会确认的下一年的业绩目标作为应纳税所得额（按照目前的情况，该业绩目标偏差不大），确认递延所得税资产。请问这样是否可行？\n\n期待您的回复，感谢陈总。 如果无法合理预计未来5年可获得的应纳税所得额，但对下一年度的应纳税所得额可以可靠估计的，则也可以在能够可靠估计的下一年度应纳税所得额的限度内确认与可抵扣亏损相关的递延所得税资产，尽可能确保这些递延所得税资产在未来一年内全部转回耗用。此时“可预见的未来”仅为下一年。"}, {"tid": "5496171", "title": "被代管单位是否纳入合并范围", "category": "合并/股权/权益法", "questionAuthor": "柳寒秋", "questionTime": "2026-02-27 16:21:38", "replyTime": "2026-03-01 06:32:43", "replySortTime": "2026-03-01 06:32:43", "url": "https://bbs.esnai.com/thread-5496171-1-5.html", "question": "A公司、B公司均为政府下属平台公司。A公司有C、D、E三个子公司，B公司有F、G、H三个子公司。2025年，政府进行调整产业调整，将C、D划入其他单位，将F划入A公司且将G、H交由A单位代管，A公司管理层薪酬按A公司及其子公司与被代管企业业绩确定。请问各位老师，G、H能否纳入A公司合并范围，如可以，能否作为同一控制下企业合并？", "reply": "G、H能否纳入A的合并报表范围，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”中“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】（P1269-1270），建议对照这些指引谨慎作出判断。一般情况下托管方将被托管企业纳入其合并报表范围的门槛较高，总体上可能性不大。", "searchText": "5496171 被代管单位是否纳入合并范围 合并/股权/权益法 柳寒秋 a公司、b公司均为政府下属平台公司。a公司有c、d、e三个子公司，b公司有f、g、h三个子公司。2025年，政府进行调整产业调整，将c、d划入其他单位，将f划入a公司且将g、h交由a单位代管，a公司管理层薪酬按a公司及其子公司与被代管企业业绩确定。请问各位老师，g、h能否纳入a公司合并范围，如可以，能否作为同一控制下企业合并？ g、h能否纳入a的合并报表范围，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”中“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】（p1269-1270），建议对照这些指引谨慎作出判断。一般情况下托管方将被托管企业纳入其合并报表范围的门槛较高，总体上可能性不大。"}, {"tid": "5496172", "title": "关于合并层面处置子公司是否属于终止经营的疑问", "category": "合并/股权/权益法", "questionAuthor": "咸鱼来也1", "questionTime": "2026-02-27 16:35:23", "replyTime": "2026-03-01 06:27:08", "replySortTime": "2026-03-01 06:27:08", "url": "https://bbs.esnai.com/thread-5496172-1-6.html", "question": "42号准则对于终止经营的定义如下：\n\n第四条 终止经营，是指企业满足下列条件之一的、能够单独区分的组成部分，且该组成部分已经处置或划分为持有待售类别：\n\n（一）该组成部分代表一项独立的主要业务或一个单独的主要经营地区；\n\n（二）该组成部分是拟对一项独立的主要业务或一个单独的主要经营地区进行处置的一项相关联计划的部分；\n\n（三）该组成部分是专为转售而取得的子公司\n\n在合并层面我有两个矛盾的观点不知道如何取舍：\n\n观点一：合并报表采用“实体理论”即将合并报表假设为一个会计主体，那么其中的一个子公司需要用一“该组成部分代表一项独立的主要业务“来进行判断，若符合应该视为终止经营。而”三 该组成部分是转为转售而取得的子公司“是针对单体报表而言的，即指代单体报表中的“长投”\n\n观点二：无论合并层面还是单体层面，对于子公司均应参照“三”进行判断，即如果是持续经营后处置的子公司不应视为“终止经营”\n\n我原先一直是偏向观点一的，但一直没有经历过实务。但这次修订了30号准则，其中附件4合并利润表说明中有如下原为：（2）在合并利润表中，处置子公司产生的损益，在经营类别的“经营类投资收益”项目中反映。30号准则正文中明确过终止经营参考42号准则，那么此条规定与观点一就出现了重大矛盾了。\n\n那是否是我原来的认知出现了问题，对于终止经营的判断应该参考观点二？\n\n另外，即使使用观点二，其实也有略微的矛盾，因为没有单独考虑为处置而收购的资产，所以这是否会是30号修订稿的一处纰漏？", "reply": "总体上赞同主帖的“观点一”，但（三）也并非仅针对个别报表层面。合并报表中针对“专为转售而取得的子公司”的各项资产负债也应列报为持有待售，并作为终止经营披露。\n\n不属于（三）但属于情形（一）（二）的子公司，其在个别报表和合并报表层面的列报和披露也适用持有待售和终止经营的相关规定。\n\n目前的财务报表列报准则仍在征求意见阶段，可能与其他准则存在矛盾，可以作为意见提出。", "searchText": "5496172 关于合并层面处置子公司是否属于终止经营的疑问 合并/股权/权益法 咸鱼来也1 42号准则对于终止经营的定义如下：\n\n第四条 终止经营，是指企业满足下列条件之一的、能够单独区分的组成部分，且该组成部分已经处置或划分为持有待售类别：\n\n（一）该组成部分代表一项独立的主要业务或一个单独的主要经营地区；\n\n（二）该组成部分是拟对一项独立的主要业务或一个单独的主要经营地区进行处置的一项相关联计划的部分；\n\n（三）该组成部分是专为转售而取得的子公司\n\n在合并层面我有两个矛盾的观点不知道如何取舍：\n\n观点一：合并报表采用“实体理论”即将合并报表假设为一个会计主体，那么其中的一个子公司需要用一“该组成部分代表一项独立的主要业务“来进行判断，若符合应该视为终止经营。而”三 该组成部分是转为转售而取得的子公司“是针对单体报表而言的，即指代单体报表中的“长投”\n\n观点二：无论合并层面还是单体层面，对于子公司均应参照“三”进行判断，即如果是持续经营后处置的子公司不应视为“终止经营”\n\n我原先一直是偏向观点一的，但一直没有经历过实务。但这次修订了30号准则，其中附件4合并利润表说明中有如下原为：（2）在合并利润表中，处置子公司产生的损益，在经营类别的“经营类投资收益”项目中反映。30号准则正文中明确过终止经营参考42号准则，那么此条规定与观点一就出现了重大矛盾了。\n\n那是否是我原来的认知出现了问题，对于终止经营的判断应该参考观点二？\n\n另外，即使使用观点二，其实也有略微的矛盾，因为没有单独考虑为处置而收购的资产，所以这是否会是30号修订稿的一处纰漏？ 总体上赞同主帖的“观点一”，但（三）也并非仅针对个别报表层面。合并报表中针对“专为转售而取得的子公司”的各项资产负债也应列报为持有待售，并作为终止经营披露。\n\n不属于（三）但属于情形（一）（二）的子公司，其在个别报表和合并报表层面的列报和披露也适用持有待售和终止经营的相关规定。\n\n目前的财务报表列报准则仍在征求意见阶段，可能与其他准则存在矛盾，可以作为意见提出。"}, {"tid": "5496173", "title": "虚开发票，补缴税款及滞纳金全部由公司法人等相关高管承担，公司不承担该部分损失。", "category": "合并/股权/权益法", "questionAuthor": "刘在在", "questionTime": "2026-02-27 17:38:21", "replyTime": "2026-03-01 06:15:47", "replySortTime": "2026-03-01 06:15:47", "url": "https://bbs.esnai.com/thread-5496173-1-6.html", "question": "本帖最后由 刘在在 于 2026-2-27 17:58 编辑\n\n某分公司因涉及历史虚开发票事项，需补缴以前年度企业所得税及相应滞纳金。经内部决议，上述补缴税款及滞纳金全部由分公司负责人、财务负责人等相关高管承担（非公司股东），总公司及分公司不承担该部分损失。现就以下会计处理问题咨询：\n\n1、对于补缴的以前年度企业所得税，公司是否需要计入当期所得税费用或以前年度损益调整？如需确认相关损益，由法人及高管承担的该部分支出，公司应计入营业外收入还是资本公积？\n\n2、税务稽查产生的滞纳金是否需要进行账务处理？如需入账，滞纳金应计入营业外支出，对应由法人及高管承担的滞纳金部分，应计入营业外收入还是资本公积？\n\n3、本次发票问题中，税务认定为虚开发票，但相关业务实际发生，仅因历史久远、原始资料缺失，无法准确区分真实成本金额。经内部确定：账面挂账的应付账款余额不再支付，前期已支付款项亦不再追回。请问该部分无需支付的应付账款，能否直接冲减营业成本，还是应结转至营业外收入处理？\n\n希望大佬解答 或分享相关案例", "reply": "1、对于补缴的以前年度企业所得税，公司仍需计入当期所得税费用或以前年度损益调整。由法人及高管承担的该部分支出，公司首先冲减对应人员的薪酬支出，法人及高管的赔偿款超出其职工薪酬支出的差额计入营业外收入。\n\n2、税务稽查产生的滞纳金也需要参照上述1中的税金进行账务处理。滞纳金应计入营业外支出，对应由法人及高管承担的滞纳金部分，参照上述1中的相关原则处理。\n\n3、本次发票问题中，税务认定为虚开发票，但相关业务实际发生，仅因历史久远、原始资料缺失，无法准确区分真实成本金额。经内部确定：账面挂账的应付账款余额不再支付，前期已支付款项亦不再追回。请问该部分无需支付的应付账款，应结转至营业外收入处理。", "searchText": "5496173 虚开发票，补缴税款及滞纳金全部由公司法人等相关高管承担，公司不承担该部分损失。 合并/股权/权益法 刘在在 本帖最后由 刘在在 于 2026-2-27 17:58 编辑\n\n某分公司因涉及历史虚开发票事项，需补缴以前年度企业所得税及相应滞纳金。经内部决议，上述补缴税款及滞纳金全部由分公司负责人、财务负责人等相关高管承担（非公司股东），总公司及分公司不承担该部分损失。现就以下会计处理问题咨询：\n\n1、对于补缴的以前年度企业所得税，公司是否需要计入当期所得税费用或以前年度损益调整？如需确认相关损益，由法人及高管承担的该部分支出，公司应计入营业外收入还是资本公积？\n\n2、税务稽查产生的滞纳金是否需要进行账务处理？如需入账，滞纳金应计入营业外支出，对应由法人及高管承担的滞纳金部分，应计入营业外收入还是资本公积？\n\n3、本次发票问题中，税务认定为虚开发票，但相关业务实际发生，仅因历史久远、原始资料缺失，无法准确区分真实成本金额。经内部确定：账面挂账的应付账款余额不再支付，前期已支付款项亦不再追回。请问该部分无需支付的应付账款，能否直接冲减营业成本，还是应结转至营业外收入处理？\n\n希望大佬解答 或分享相关案例 1、对于补缴的以前年度企业所得税，公司仍需计入当期所得税费用或以前年度损益调整。由法人及高管承担的该部分支出，公司首先冲减对应人员的薪酬支出，法人及高管的赔偿款超出其职工薪酬支出的差额计入营业外收入。\n\n2、税务稽查产生的滞纳金也需要参照上述1中的税金进行账务处理。滞纳金应计入营业外支出，对应由法人及高管承担的滞纳金部分，参照上述1中的相关原则处理。\n\n3、本次发票问题中，税务认定为虚开发票，但相关业务实际发生，仅因历史久远、原始资料缺失，无法准确区分真实成本金额。经内部确定：账面挂账的应付账款余额不再支付，前期已支付款项亦不再追回。请问该部分无需支付的应付账款，应结转至营业外收入处理。"}, {"tid": "5496120", "title": "请教陈版主，关于补偿性资产", "category": "合并/股权/权益法", "questionAuthor": "熬夜狗113", "questionTime": "2026-02-23 10:26:27", "replyTime": "2026-02-27 16:21:06", "replySortTime": "2026-02-27 16:21:06", "url": "https://bbs.esnai.com/thread-5496120-1-6.html", "question": "准则规定：当补偿与在购买日未以公允价值计量的被购买方资产（如被购买方的递延所得税资产）相关时，购买方应采用与该资产相同的基础，确认相应的补偿性资产。\n\n这里关于递延所得税，我理解如下，还请看下会计分录是否正确？\n\n假设A公司收购了C公司。在购买日，C公司账面有一笔因应收款减值准备等产生的递延所得税资产，价值1000万元。现在，问题来了，这笔递延所得税资产的未来能否实现，即能否用来抵扣未来的应纳税所得额，本身就存在不确定性。为了促成交易，出售方向购买方做出补偿承诺：如果C公司的这笔递延所得税资产在未来因无法实现而被冲销，出售方将对因此造成的损失进行补偿1000。在这种情况下，这笔补偿承诺就构成了与“被购买方的递延所得税资产 相关的补偿性资产。\n\n具体会计分录\n\n借：递延所得税资产　　　　　　　　1000　\n\n　贷：应收账款　　　　　　　　　　4000\n\n　　　资本公积　　　　　　　　　　3000\n\n借：补偿性资产 1000\n\n贷：递延所得税资产1000\n\n后续由于公司盈利状况不佳，预计只有600万的递延所得税资产能够实现，因此递延所得税资产需减记至600万（减少400万）。\n\n根据 相同的基础 ，补偿性资产也应同步调整，减少可获赔的金额。假设补偿减少300万。\n\n分录：\n\n借：递延所得税费用 400万\n\n贷：递延所得税资产 400万\n\n借：投资收益 300万\n\n贷：补偿性资产 300万", "reply": "按照解释19号的现有规定，补偿性资产在个别报表层面初始确认时应冲减长期股权投资，而不是贷记资本公积。除此之外，主帖所列A公司个别报表层面的处理基本合理。\n\n由于补偿性资产的会计处理还有较多不清晰之处，建议财政部会计司考虑就此问题发布一个或若干个应用案例，明确实务操作的细节。", "searchText": "5496120 请教陈版主，关于补偿性资产 合并/股权/权益法 熬夜狗113 准则规定：当补偿与在购买日未以公允价值计量的被购买方资产（如被购买方的递延所得税资产）相关时，购买方应采用与该资产相同的基础，确认相应的补偿性资产。\n\n这里关于递延所得税，我理解如下，还请看下会计分录是否正确？\n\n假设a公司收购了c公司。在购买日，c公司账面有一笔因应收款减值准备等产生的递延所得税资产，价值1000万元。现在，问题来了，这笔递延所得税资产的未来能否实现，即能否用来抵扣未来的应纳税所得额，本身就存在不确定性。为了促成交易，出售方向购买方做出补偿承诺：如果c公司的这笔递延所得税资产在未来因无法实现而被冲销，出售方将对因此造成的损失进行补偿1000。在这种情况下，这笔补偿承诺就构成了与“被购买方的递延所得税资产 相关的补偿性资产。\n\n具体会计分录\n\n借：递延所得税资产　　　　　　　　1000　\n\n　贷：应收账款　　　　　　　　　　4000\n\n　　　资本公积　　　　　　　　　　3000\n\n借：补偿性资产 1000\n\n贷：递延所得税资产1000\n\n后续由于公司盈利状况不佳，预计只有600万的递延所得税资产能够实现，因此递延所得税资产需减记至600万（减少400万）。\n\n根据 相同的基础 ，补偿性资产也应同步调整，减少可获赔的金额。假设补偿减少300万。\n\n分录：\n\n借：递延所得税费用 400万\n\n贷：递延所得税资产 400万\n\n借：投资收益 300万\n\n贷：补偿性资产 300万 按照解释19号的现有规定，补偿性资产在个别报表层面初始确认时应冲减长期股权投资，而不是贷记资本公积。除此之外，主帖所列a公司个别报表层面的处理基本合理。\n\n由于补偿性资产的会计处理还有较多不清晰之处，建议财政部会计司考虑就此问题发布一个或若干个应用案例，明确实务操作的细节。"}, {"tid": "5496121", "title": "分公司转子公司，分公司可以评估值投资子公司吗？", "category": "合并/股权/权益法", "questionAuthor": "wellyn", "questionTime": "2026-02-23 15:53:35", "replyTime": "2026-02-27 16:15:10", "replySortTime": "2026-02-27 16:15:10", "url": "https://bbs.esnai.com/thread-5496121-1-6.html", "question": "@chenyiwei 陈版主您好，请教您一个问题\n\n分公司转子公司，分公司可以评估值投资子公司吗？如果可以的话，在合并报表层面，再应该抵消评估增值的部分吗？", "reply": "从《公司法》的规定来说，以非现金资产对外投资都是需要进行评估的，在法律上可以按评估值作价。但会计上各方的账务处理都是以账面价值为基础，与评估值无关。", "searchText": "5496121 分公司转子公司，分公司可以评估值投资子公司吗？ 合并/股权/权益法 wellyn @chenyiwei 陈版主您好，请教您一个问题\n\n分公司转子公司，分公司可以评估值投资子公司吗？如果可以的话，在合并报表层面，再应该抵消评估增值的部分吗？ 从《公司法》的规定来说，以非现金资产对外投资都是需要进行评估的，在法律上可以按评估值作价。但会计上各方的账务处理都是以账面价值为基础，与评估值无关。"}, {"tid": "5496130", "title": "搬迁导致闲置设备计提减值损失是否可以判断为非经常性损益~", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "幽梦影1985", "questionTime": "2026-02-24 11:51:49", "replyTime": "2026-02-27 16:14:12", "replySortTime": "2026-02-27 16:14:12", "url": "https://bbs.esnai.com/thread-5496130-1-6.html", "question": "求助陈版及各位群友~~\n\nA公司因生产产生异味及噪音扰民，被当地政府出具文件要求“请你司务必在2025年5月30日前不再生产并启动搬迁”。公司于2025年8月底全面停产，2025年9月正式启动搬迁工作”。A公司于2025年11月完成搬迁，该项搬迁后，A公司还剩余部分设备、生产线不能继续使用，后续拟进行处置，因处置协议和对象尚未找到，A公司于2025对于剩余设备、生产线等计提减值准备。\n\n问题：因上述设备后续拟处置，处置预计按照报废变卖废钢等价值进行，若实际处置则处置损益经计入非经常性损益，但由于实际尚未处置而产生了明显的减值迹象，A公司根据预计处置价款先行计提了减值准备，可否将计提的资产减值准备计入非经常性损益~", "reply": "从主帖信息来看，即使A公司不搬迁，也会因为环保问题而被政府责令停产，导致这些设备闲置。因此搬迁并不是导致设备闲置的直接原因，导致这些设备计提减值的直接原因是环保要求的升级，而这种情况不能认为是偶发性的。因此不应将此类暂时闲置设备的减值认为是非经常性损益。", "searchText": "5496130 搬迁导致闲置设备计提减值损失是否可以判断为非经常性损益~ 金融工具/外币/债务重组/abs 幽梦影1985 求助陈版及各位群友~~\n\na公司因生产产生异味及噪音扰民，被当地政府出具文件要求“请你司务必在2025年5月30日前不再生产并启动搬迁”。公司于2025年8月底全面停产，2025年9月正式启动搬迁工作”。a公司于2025年11月完成搬迁，该项搬迁后，a公司还剩余部分设备、生产线不能继续使用，后续拟进行处置，因处置协议和对象尚未找到，a公司于2025对于剩余设备、生产线等计提减值准备。\n\n问题：因上述设备后续拟处置，处置预计按照报废变卖废钢等价值进行，若实际处置则处置损益经计入非经常性损益，但由于实际尚未处置而产生了明显的减值迹象，a公司根据预计处置价款先行计提了减值准备，可否将计提的资产减值准备计入非经常性损益~ 从主帖信息来看，即使a公司不搬迁，也会因为环保问题而被政府责令停产，导致这些设备闲置。因此搬迁并不是导致设备闲置的直接原因，导致这些设备计提减值的直接原因是环保要求的升级，而这种情况不能认为是偶发性的。因此不应将此类暂时闲置设备的减值认为是非经常性损益。"}, {"tid": "5496131", "title": "关于承租人发生的租赁资产改良支出入长摊，建造设计成本入固资？", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "baibingbing132y", "questionTime": "2026-02-24 13:47:28", "replyTime": "2026-02-27 16:06:38", "replySortTime": "2026-02-27 16:06:38", "url": "https://bbs.esnai.com/thread-5496131-1-6.html", "question": "在某些情况下，承租人可能在租赁期开始前就发生了与租赁资产相关的经济业务或事项。例如，租赁合同双方经协商约定，租赁资产需经建造或重新设计后方可供承租人使用；根据合同条款与条件，承租人需支付与资产建造或设计相关的成本。承租人如发生与租赁资产建造或设计相关的成本，应适用其他相关准则（如《企业会计准则第4号一一固定资产》）进行会计处理。需要注意的是，与租赁资产建造或设计相关的成本不包括承租人为获收租赁资产使用权而支付的款项，此类款项无论在何时支付，均属于租赁付款额。——摘自2025年cpa《会计》教材317页。\n\n上述“与资产建造或设计相关的成本”和计入“长期待摊费用”的“承租人发生的租赁资产改良支出”，有什么区别呢？", "reply": "上述“与资产建造或设计相关的成本”一般理解为是在租赁期开始日之前（即承租人尚未主导资产使用时，包括尚未达到预定可使用状态时）发生的，与租赁资产本身的设计和购建相关的支出；而租入固定资产改良支出是发生于承租人取得租赁资产使用权之后（例如装修期间，有可能为此设定免租期），且其所购建的是租赁资产以外的另一项资产。", "searchText": "5496131 关于承租人发生的租赁资产改良支出入长摊，建造设计成本入固资？ 资产/存货/固定资产/无形资产 baibingbing132y 在某些情况下，承租人可能在租赁期开始前就发生了与租赁资产相关的经济业务或事项。例如，租赁合同双方经协商约定，租赁资产需经建造或重新设计后方可供承租人使用；根据合同条款与条件，承租人需支付与资产建造或设计相关的成本。承租人如发生与租赁资产建造或设计相关的成本，应适用其他相关准则（如《企业会计准则第4号一一固定资产》）进行会计处理。需要注意的是，与租赁资产建造或设计相关的成本不包括承租人为获收租赁资产使用权而支付的款项，此类款项无论在何时支付，均属于租赁付款额。——摘自2025年cpa《会计》教材317页。\n\n上述“与资产建造或设计相关的成本”和计入“长期待摊费用”的“承租人发生的租赁资产改良支出”，有什么区别呢？ 上述“与资产建造或设计相关的成本”一般理解为是在租赁期开始日之前（即承租人尚未主导资产使用时，包括尚未达到预定可使用状态时）发生的，与租赁资产本身的设计和购建相关的支出；而租入固定资产改良支出是发生于承租人取得租赁资产使用权之后（例如装修期间，有可能为此设定免租期），且其所购建的是租赁资产以外的另一项资产。"}, {"tid": "5496132", "title": "关于特殊编制基础的疑惑", "category": "合并/股权/权益法", "questionAuthor": "LouisZrj", "questionTime": "2026-02-24 15:42:26", "replyTime": "2026-02-27 15:57:02", "replySortTime": "2026-02-27 15:57:02", "url": "https://bbs.esnai.com/thread-5496132-1-6.html", "question": "请教陈版：\n\n我目前遇到一个业务，该公司与股东签订了股权对赌协议，按照准则的要求需要将相关权益重分类至负债，但这样处理后企业就处于资不抵债的状态了。想请教陈版，该案例是否可以适用1601号准则进行处理？在附注编制基础部分说明报表编制过程中未考虑对赌条款对财务报表的影响，并在报告正文着重提醒报告使用者该特殊之处？", "reply": "这个问题首先要考虑预期的报表使用者是谁，该报表使用者的信息需求是什么，其是否知晓该项对赌回购协议并能够恰当评估其财务影响。很重要的一点是：不能通过滥用不恰当的报表编制基础来误导报表使用者。\n\n一般情况下，如果该专项报表是仅供被审计单位的股东参考的，则在股东知晓该对赌回购协议，且能够合理估计回购义务被触发的可能性，以及履行回购义务的财务影响的情况下，上述特殊目的编制基础可能是恰当的。但在其他情况下，主帖中所建议的报表编制基础很可能是不恰当的，即使在报表附注和审计报告正文中对该编制基础都作出了提示和强调，也很可能是不足够的。", "searchText": "5496132 关于特殊编制基础的疑惑 合并/股权/权益法 louiszrj 请教陈版：\n\n我目前遇到一个业务，该公司与股东签订了股权对赌协议，按照准则的要求需要将相关权益重分类至负债，但这样处理后企业就处于资不抵债的状态了。想请教陈版，该案例是否可以适用1601号准则进行处理？在附注编制基础部分说明报表编制过程中未考虑对赌条款对财务报表的影响，并在报告正文着重提醒报告使用者该特殊之处？ 这个问题首先要考虑预期的报表使用者是谁，该报表使用者的信息需求是什么，其是否知晓该项对赌回购协议并能够恰当评估其财务影响。很重要的一点是：不能通过滥用不恰当的报表编制基础来误导报表使用者。\n\n一般情况下，如果该专项报表是仅供被审计单位的股东参考的，则在股东知晓该对赌回购协议，且能够合理估计回购义务被触发的可能性，以及履行回购义务的财务影响的情况下，上述特殊目的编制基础可能是恰当的。但在其他情况下，主帖中所建议的报表编制基础很可能是不恰当的，即使在报表附注和审计报告正文中对该编制基础都作出了提示和强调，也很可能是不足够的。"}, {"tid": "5496134", "title": "附带政府补贴性质的租赁", "category": "收入确认/总额净额", "questionAuthor": "cherrylchen66", "questionTime": "2026-02-24 16:53:44", "replyTime": "2026-02-27 15:52:28", "replySortTime": "2026-02-27 15:52:28", "url": "https://bbs.esnai.com/thread-5496134-1-6.html", "question": "陈版好，这是一个附带政府补贴性质的租赁业务，想请您帮忙解答，谢谢。\n\n我司与一个产业园签订了厂房租赁协议，包含主协议和补充协议，其中涉及政府补贴，具体情况如下：\n\n1）主协议约定了房租租赁期限和租金，租期5年，租金1.5元/平米/天；\n\n2）补充协议中约定，结合重点产业园发展支持政策等文件，双方友好协商，租金享受补贴：\n\na 租赁期内，若我方（承租方）符合相关政策及考核要求，可享受房租补贴\n\nb  承租方完成每年度约定的考核任务，出租方于考核通过后15个工作日内，完成租金补贴的政策申请与核销，并按约定结算年度租金差额补贴\n\n&#8203;c 租金补贴形式为“差额抵扣型”，即承租方无需向出租房单独支付租金补贴资金，出租方先行降低承租方实缴租金标准实现租金补贴，补贴租金金额与房租差额等额\n\nd 出租方在收到相关部门拨付的政策补贴资金后，并完成该年度对出租方补贴资格的考核，于每个考核结果完成后15日内，将该年度补贴租金金额由出租方直接用于抵消对应年度承租方依照主协议约定应付的房租差额；\n\n&#8203;e 若承租方当年度未通过考核，则不享受该年度租金补贴，且需按主协议约定的对应租期租金标准，足额补齐该年度租金差额\n\nf 考核主要是 营收 规上产值 产能 研发投入等指标；因第一年非完整年度，按合同优惠条款确定能达标，后续年度不确定\n\n想确认下，这种情况，承租方是否应该按优惠前价格核算，待确定通过考核后将差额部分计入其他收益（我司按总额法核算政府补助）？因第一年确定可以通过考核，是否第一年可按补贴后价格核算？如业务判断后续都可达到考核条件，是否可按优惠价格核算？\n\n谢谢陈版。", "reply": "从主帖信息看，出租人并不是该政府本身，而是产业园运营方；补贴是当地政府给予的，通过产业园代收代付，故可以认为该补贴的受益方是本企业，故本企业作为政府补助处理。\n\n参照财政部会计司2022年6月发布的“政府补助准则实施问答”，此类与租金相关的政府补助，虽然承租人确认了使用权资产
