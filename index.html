公司作为签发方需承担到期付款的义务。有几个问题：\n\n    1、账务处理。期末我们认为还没有到期的供应链金融余额应计提预计负债，并挂其他应收款-实际控制人，然后根据实控人的可偿还情况计提坏账准备，虽然报告期内实控人已经对到期的票据还款了，但期末未到期的部分实控人已无法还款，导致公司承担到期必须还款的义务，所以需要计提预计负债。这样子账务处理是否合适？\n\n    2、上期末是否需要做差错更正将上期末未到期供应链金融余额做计提预计负债？因为上期末的余额在本期都已经到期并由实控人进行了归还，站在本期来看，不存在公司的经济利益流出，上期末做差更计提预计负债是否不合适呢？若计提，其他应收款是否可根据已偿还，不计提坏账准备？\n\n    3、这种模式是否算资金占用？因为如果实控人都能正常还款，公司没有利益流出，但还不上的时候公司才会有经济利益流出，个人是觉得这种算资金占用，在签发的时候就导致公司存在到期还款的义务，就可以算资金占用的发生额，整个资金占用的发生额应按本期开具票据的总额来统计，实控人已还款部分当做归还占用资金，未还部分刚好与计提的其他应收款对应，陈老师觉得这样子处理可以吗？", "reply": "1、账务处理基本合理。\n\n2、上期末同样需按照该原则进行差错更正。对实控人的应收款项可按个别认定法计提坏账准备。在前期实控人具有还款能力的情况下，可以少提或不提坏账准备；在目前实控人已无法还款的情况下，从严、从高计提坏账准备。\n\n3、该情况虽然没有资金直接进出上市公司账户，但也属于《会计监管风险提示第9号——上市公司控股股东资金占用及其审计》中规定的资金占用的“发生额模式”中的“利用无商业实质的购销业务，直接或间接向控股股东支付采购资金或者开具汇票供其贴现、背书等”，因此仍属于资金占用行为。你的理解基本合理。", "searchText": "5496643 供应链金融与大股东资金占用 金融工具/外币/债务重组/abs wx_5e11bded959a 陈老师，有碰到个公司实控人通过开具供应链金融的票据来进行资金占用，具体情况如下：公司作为供应链金融票据的签发方，开具票据给实控人的关联方，关联方拿着票据去银行保理套钱，票据到期后实控人的关联方直接打款到银行的指定还款账户，全程未通过公司的任何银行账户，且供应链金融票据未在信用报告体现及银行函证也无体现，合同约定如果到期票据签收方保理无法还款给银行，则公司作为签发方需承担到期付款的义务。有几个问题：\n\n    1、账务处理。期末我们认为还没有到期的供应链金融余额应计提预计负债，并挂其他应收款-实际控制人，然后根据实控人的可偿还情况计提坏账准备，虽然报告期内实控人已经对到期的票据还款了，但期末未到期的部分实控人已无法还款，导致公司承担到期必须还款的义务，所以需要计提预计负债。这样子账务处理是否合适？\n\n    2、上期末是否需要做差错更正将上期末未到期供应链金融余额做计提预计负债？因为上期末的余额在本期都已经到期并由实控人进行了归还，站在本期来看，不存在公司的经济利益流出，上期末做差更计提预计负债是否不合适呢？若计提，其他应收款是否可根据已偿还，不计提坏账准备？\n\n    3、这种模式是否算资金占用？因为如果实控人都能正常还款，公司没有利益流出，但还不上的时候公司才会有经济利益流出，个人是觉得这种算资金占用，在签发的时候就导致公司存在到期还款的义务，就可以算资金占用的发生额，整个资金占用的发生额应按本期开具票据的总额来统计，实控人已还款部分当做归还占用资金，未还部分刚好与计提的其他应收款对应，陈老师觉得这样子处理可以吗？ 1、账务处理基本合理。\n\n2、上期末同样需按照该原则进行差错更正。对实控人的应收款项可按个别认定法计提坏账准备。在前期实控人具有还款能力的情况下，可以少提或不提坏账准备；在目前实控人已无法还款的情况下，从严、从高计提坏账准备。\n\n3、该情况虽然没有资金直接进出上市公司账户，但也属于《会计监管风险提示第9号——上市公司控股股东资金占用及其审计》中规定的资金占用的“发生额模式”中的“利用无商业实质的购销业务，直接或间接向控股股东支付采购资金或者开具汇票供其贴现、背书等”，因此仍属于资金占用行为。你的理解基本合理。"}, {"tid": "5496645", "title": "求助陈版主和大家，咨询你们一个问题", "category": "合并/股权/权益法", "questionAuthor": "1234瑞", "questionTime": "2026-04-05 16:11:12", "replyTime": "2026-04-13 07:13:02", "replySortTime": "2026-04-13 07:13:02", "url": "https://bbs.esnai.com/thread-5496645-1-3.html", "question": "陈版主和各位老师们好，咨询你们一个问题\n\n业务背景：25年11月子公司B因资不抵债申请破产清算（此时点母公司已对其丧失控制权），B公司净资产为-10万元，母公司长投B为6万元，其他应收B为4万元，母公司单体层面全额确认了长投减值准备和其他应收坏账准备-6万和-4万元，同时确认递延所得税1.5万元和1万元。注：子公司B公司已于26年1月已注销。\n\n问题1：合并层面因该破产丧失控制权形成的投资收益10万元（超额亏损的翻回），是否要确认递延所得税？（个人理解：该笔收益10万元，应该是不需要缴纳所得税的，但是合并层面又形成了投资收益，是否产生了税会差异？是否要确认递延？）\n\n问题2：合并层面需要对母公司单体层面确认的减值准备和坏账准备予以冲回，但对应母公司单体层面确认的递延所得税1.5+1=2.5万是否需要保留，不能冲回？（个人理解：子公司B于26年1月注销，母公司对其的长投和其他应收就是真正的损失，且在26年该笔损失可在母公司税前扣除，站在25年末是否就是可抵扣亏损，合并层面是否就要保留这2.5万的递延所得税资产而不随之冲回？）", "reply": "1、丧失对子公司控制权后，在子公司尚未注销的情况下，合并报表层面需确认一项价值为零的金融资产或长期股权投资（非控制），其账面价值（零）小于计税基础（原投资成本）。如果对清算的预计结束时间能有明确预期，且预计母公司届时将有足够多的应纳税所得额，则可就该项可抵扣暂时性差异确认递延所得税资产。\n\n2、上述分析是站在合并报表层面的独立分析，与母公司个别报表层面的递延所得税资产的存续或转回无关。即使个别报表和合并报表层面都确认递延所得税资产，但其所针对的可抵扣暂时性差异是不同的。", "searchText": "5496645 求助陈版主和大家，咨询你们一个问题 合并/股权/权益法 1234瑞 陈版主和各位老师们好，咨询你们一个问题\n\n业务背景：25年11月子公司b因资不抵债申请破产清算（此时点母公司已对其丧失控制权），b公司净资产为-10万元，母公司长投b为6万元，其他应收b为4万元，母公司单体层面全额确认了长投减值准备和其他应收坏账准备-6万和-4万元，同时确认递延所得税1.5万元和1万元。注：子公司b公司已于26年1月已注销。\n\n问题1：合并层面因该破产丧失控制权形成的投资收益10万元（超额亏损的翻回），是否要确认递延所得税？（个人理解：该笔收益10万元，应该是不需要缴纳所得税的，但是合并层面又形成了投资收益，是否产生了税会差异？是否要确认递延？）\n\n问题2：合并层面需要对母公司单体层面确认的减值准备和坏账准备予以冲回，但对应母公司单体层面确认的递延所得税1.5+1=2.5万是否需要保留，不能冲回？（个人理解：子公司b于26年1月注销，母公司对其的长投和其他应收就是真正的损失，且在26年该笔损失可在母公司税前扣除，站在25年末是否就是可抵扣亏损，合并层面是否就要保留这2.5万的递延所得税资产而不随之冲回？） 1、丧失对子公司控制权后，在子公司尚未注销的情况下，合并报表层面需确认一项价值为零的金融资产或长期股权投资（非控制），其账面价值（零）小于计税基础（原投资成本）。如果对清算的预计结束时间能有明确预期，且预计母公司届时将有足够多的应纳税所得额，则可就该项可抵扣暂时性差异确认递延所得税资产。\n\n2、上述分析是站在合并报表层面的独立分析，与母公司个别报表层面的递延所得税资产的存续或转回无关。即使个别报表和合并报表层面都确认递延所得税资产，但其所针对的可抵扣暂时性差异是不同的。"}, {"tid": "5496646", "title": "企业合并", "category": "合并/股权/权益法", "questionAuthor": "xuekuaiji2011", "questionTime": "2026-04-05 16:57:09", "replyTime": "2026-04-13 07:06:34", "replySortTime": "2026-04-13 07:06:34", "url": "https://bbs.esnai.com/thread-5496646-1-3.html", "question": "请教各位老师\n\n       母公司持有有限合伙企业30%股权，有限合伙企业持有A公司20%股权，母公司持有A公司80%股权，控制A公司。假设，母公司对A公司投资用长期股权投资权益法核算，有限合伙企业对A公司投资用长期股权投资权益法核算，那么母公司编制合并报表，少损股东持股比例是不是14%。", "reply": "少数股东权益是母公司不能控制的子公司权益。虽然母公司对于少数股东（合伙企业）具有重大影响，穿透来看是拥有这部分权益的，但因为不能控制该合伙企业，事实上对该部分权益不具备控制权。这种“穿透拥有但不控制”的权益仍属于少数股东权益。\n\n参阅：《中审众环研究2020》之“问题3-2-142（合并报表中对合营、联营企业所持子公司股权的处理问题）”。", "searchText": "5496646 企业合并 合并/股权/权益法 xuekuaiji2011 请教各位老师\n\n       母公司持有有限合伙企业30%股权，有限合伙企业持有a公司20%股权，母公司持有a公司80%股权，控制a公司。假设，母公司对a公司投资用长期股权投资权益法核算，有限合伙企业对a公司投资用长期股权投资权益法核算，那么母公司编制合并报表，少损股东持股比例是不是14%。 少数股东权益是母公司不能控制的子公司权益。虽然母公司对于少数股东（合伙企业）具有重大影响，穿透来看是拥有这部分权益的，但因为不能控制该合伙企业，事实上对该部分权益不具备控制权。这种“穿透拥有但不控制”的权益仍属于少数股东权益。\n\n参阅：《中审众环研究2020》之“问题3-2-142（合并报表中对合营、联营企业所持子公司股权的处理问题）”。"}, {"tid": "5496666", "title": "请教陈版并表SPV费用是否可以重分类？", "category": "合并/股权/权益法", "questionAuthor": "reversal", "questionTime": "2026-04-07 15:45:15", "replyTime": "2026-04-13 07:03:21", "replySortTime": "2026-04-13 07:03:21", "url": "https://bbs.esnai.com/thread-5496666-1-2.html", "question": "此处SPV指的是因资产证券化等融资项目所形成的SPV。\n\n在公司需要并表该类SPV的情况下，一般在SPV个别报表，所发生的管理费、律师费、交易所费用等等均确认为管理费用；除增值税外的税费均确认为税金及附加。\n\n想请问下能否在合并报表中作为视角调整，将SPV的这类成本费用均调整为合并报表层面的财务费用？是否符合合并报表准则规定？\n\n其次是金融资产出表与否影响该类判定？\n\n比如涉及继续涉入的情况下，有可能存在金融资产出表+继续涉入，但又需要并表SPV", "reply": "不应将SPV自身发生的旨在维持其自身作为一个独立法人的日常运转的管理费、律师费、交易所费用等在合并报表中进行重分类。站在集团角度而言，虽然SPV目的单一，但这些费用并不与融资本金挂钩，也不是支付给提供融资的机构，因此仍属于管理费用性质。\n\n金融资产是否出表的判断不影响该问题的结论。", "searchText": "5496666 请教陈版并表spv费用是否可以重分类？ 合并/股权/权益法 reversal 此处spv指的是因资产证券化等融资项目所形成的spv。\n\n在公司需要并表该类spv的情况下，一般在spv个别报表，所发生的管理费、律师费、交易所费用等等均确认为管理费用；除增值税外的税费均确认为税金及附加。\n\n想请问下能否在合并报表中作为视角调整，将spv的这类成本费用均调整为合并报表层面的财务费用？是否符合合并报表准则规定？\n\n其次是金融资产出表与否影响该类判定？\n\n比如涉及继续涉入的情况下，有可能存在金融资产出表+继续涉入，但又需要并表spv 不应将spv自身发生的旨在维持其自身作为一个独立法人的日常运转的管理费、律师费、交易所费用等在合并报表中进行重分类。站在集团角度而言，虽然spv目的单一，但这些费用并不与融资本金挂钩，也不是支付给提供融资的机构，因此仍属于管理费用性质。\n\n金融资产是否出表的判断不影响该问题的结论。"}, {"tid": "5496668", "title": "关于筹建期厂房建设支出，资本化还是费用化的问题？", "category": "收入确认/总额净额", "questionAuthor": "baibingbing132y", "questionTime": "2026-04-07 16:25:00", "replyTime": "2026-04-13 07:00:31", "replySortTime": "2026-04-13 07:00:31", "url": "https://bbs.esnai.com/thread-5496668-1-3.html", "question": "新成立公司，筹建期租入厂房，对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固后，才能投入使用，这期间发生的支出，通过长期待摊费用归集，没有对应的收入，摊销时计入成本还是费用呢？\n\n提前谢谢陈版回复啦。", "reply": "如果在筹建期内该改造项目（租入资产装修）已完工并开始摊销的，而此时尚未投入生产经营，尚未产生收入，则此时的摊销可以计入管理费用。到正式投产后，厂房使用权资产的折旧和长期待摊费用（装修）的摊销计入产品成本，最终转入营业成本。", "searchText": "5496668 关于筹建期厂房建设支出，资本化还是费用化的问题？ 收入确认/总额净额 baibingbing132y 新成立公司，筹建期租入厂房，对租入厂房的电气系统、弱电系统、暖通系统、给排水系统、消防系统、装修系统等多个子系统设计、施工、承重加固后，才能投入使用，这期间发生的支出，通过长期待摊费用归集，没有对应的收入，摊销时计入成本还是费用呢？\n\n提前谢谢陈版回复啦。 如果在筹建期内该改造项目（租入资产装修）已完工并开始摊销的，而此时尚未投入生产经营，尚未产生收入，则此时的摊销可以计入管理费用。到正式投产后，厂房使用权资产的折旧和长期待摊费用（装修）的摊销计入产品成本，最终转入营业成本。"}, {"tid": "5496740", "title": "出售在建工程的会计分录", "category": "收入确认/总额净额", "questionAuthor": "yjhly2011", "questionTime": "2026-04-12 10:54:14", "replyTime": "2026-04-13 06:58:21", "replySortTime": "2026-04-13 06:58:21", "url": "https://bbs.esnai.com/thread-5496740-1-3.html", "question": "大家好！公司有一项在建工程，金额100万，现将其出售，作价110万，均为不含税价，税率为9%，请问会计分录如何处理，是通过固定资产清理，还是计入其他业务收入，损益计入哪个科目，目前准则是如何规定的，谢谢！", "reply": "在建工程的处置一般不通过“固定资产清理”核算（如果通过该科目核算，也不是原则性问题）。处置价款减去处置时点在建工程原账面价值、处置费用和应由出售方负担的税费后的差额，计入资产处置损益。即：\n\n借：银行存款\n\n贷：在建工程（原账面价值）\n\n贷：应交税费（处置环节的税费）\n\n贷：银行存款/其他应付款等（处置环节的交易费用）\n\n借/贷：资产处置损益（差额）。", "searchText": "5496740 出售在建工程的会计分录 收入确认/总额净额 yjhly2011 大家好！公司有一项在建工程，金额100万，现将其出售，作价110万，均为不含税价，税率为9%，请问会计分录如何处理，是通过固定资产清理，还是计入其他业务收入，损益计入哪个科目，目前准则是如何规定的，谢谢！ 在建工程的处置一般不通过“固定资产清理”核算（如果通过该科目核算，也不是原则性问题）。处置价款减去处置时点在建工程原账面价值、处置费用和应由出售方负担的税费后的差额，计入资产处置损益。即：\n\n借：银行存款\n\n贷：在建工程（原账面价值）\n\n贷：应交税费（处置环节的税费）\n\n贷：银行存款/其他应付款等（处置环节的交易费用）\n\n借/贷：资产处置损益（差额）。"}, {"tid": "5496634", "title": "求助陈版主，减值的问题", "category": "合并/股权/权益法", "questionAuthor": "18243187003", "questionTime": "2026-04-04 12:56:00", "replyTime": "2026-04-09 16:00:53", "replySortTime": "2026-04-09 16:00:53", "url": "https://bbs.esnai.com/thread-5496634-1-3.html", "question": "企业2017年发生工程项目前期费用，可研及设计费支付355万，企业计入在建工程，但项目相关立项审批手续未执行完成，且未开工建设，2018年母公司下达项目暂缓建设文件，现停止8年，2024年设计公司起诉本公司需要支付前期设计费用尾款350万，法院已判决，本公司2024年10月份支付该笔设计费，金额350万，截止2024年12月31日该项目已支付金额715万。该项业务财务如何处理？企业2024年将350万设计费及355万在建全部转入成本，是否合理？现内审提出问题，认为应该全额计入在建工程，然后计提减值。", "reply": "这个问题取决于该项目是否彻底终止，是否处于冻结状态但还存在日后重启的可能性。\n\n如果是处于冻结状态，仍有日后重启的可能性（需有相应的计划，证明该判断的合理性），则可以计入在建工程并根据具体情况计提减值（可能是全额减值，也可能不是全额减值）。\n\n如果基于集团的发展战略、国家政策、市场情况等发生变化，预计的可预见的未来不会重启该项目的，则建议及时办理资产核销手续，将资产账面价值转入营业外支出处理。", "searchText": "5496634 求助陈版主，减值的问题 合并/股权/权益法 18243187003 企业2017年发生工程项目前期费用，可研及设计费支付355万，企业计入在建工程，但项目相关立项审批手续未执行完成，且未开工建设，2018年母公司下达项目暂缓建设文件，现停止8年，2024年设计公司起诉本公司需要支付前期设计费用尾款350万，法院已判决，本公司2024年10月份支付该笔设计费，金额350万，截止2024年12月31日该项目已支付金额715万。该项业务财务如何处理？企业2024年将350万设计费及355万在建全部转入成本，是否合理？现内审提出问题，认为应该全额计入在建工程，然后计提减值。 这个问题取决于该项目是否彻底终止，是否处于冻结状态但还存在日后重启的可能性。\n\n如果是处于冻结状态，仍有日后重启的可能性（需有相应的计划，证明该判断的合理性），则可以计入在建工程并根据具体情况计提减值（可能是全额减值，也可能不是全额减值）。\n\n如果基于集团的发展战略、国家政策、市场情况等发生变化，预计的可预见的未来不会重启该项目的，则建议及时办理资产核销手续，将资产账面价值转入营业外支出处理。"}, {"tid": "5496626", "title": "以前年度损益调整", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "芒果爱学习", "questionTime": "2026-04-03 19:49:42", "replyTime": "2026-04-09 15:54:30", "replySortTime": "2026-04-09 15:54:30", "url": "https://bbs.esnai.com/thread-5496626-1-3.html", "question": "求助陈版主，我们公司有深圳与香港的内部交易，深圳主体确认应收原币是美元，香港回款是非美元币种。由于历史原因，香港公司25年回款的时候财务没有及时识别到是货款结算就入到了其他应付款科目，挂到至今。我的疑问是现在清账，对于这种清理历史外币账户产生的汇兑损益，应该计入到当期财务费用还是因为计入以前年度损益调整呢", "reply": "考虑是否实质上属于前期差错，以及（如果属于前期差错）该差错是否重大。如果属于重大前期差错的，则应采用追溯重述法予以更正。\n\n从你说的情况看，属于前期差错的可能性较大，至于该差错是否重大，需要结合定性和定量的因素进行综合判断。", "searchText": "5496626 以前年度损益调整 金融工具/外币/债务重组/abs 芒果爱学习 求助陈版主，我们公司有深圳与香港的内部交易，深圳主体确认应收原币是美元，香港回款是非美元币种。由于历史原因，香港公司25年回款的时候财务没有及时识别到是货款结算就入到了其他应付款科目，挂到至今。我的疑问是现在清账，对于这种清理历史外币账户产生的汇兑损益，应该计入到当期财务费用还是因为计入以前年度损益调整呢 考虑是否实质上属于前期差错，以及（如果属于前期差错）该差错是否重大。如果属于重大前期差错的，则应采用追溯重述法予以更正。\n\n从你说的情况看，属于前期差错的可能性较大，至于该差错是否重大，需要结合定性和定量的因素进行综合判断。"}, {"tid": "5496624", "title": "关于专用设备销售验收确认前因客户管理责任导致设备毁损灭失，应如何做账务处理？", "category": "收入确认/总额净额", "questionAuthor": "饼干猴", "questionTime": "2026-04-03 09:57:03", "replyTime": "2026-04-09 15:51:55", "replySortTime": "2026-04-09 15:51:55", "url": "https://bbs.esnai.com/thread-5496624-1-3.html", "question": "本帖最后由 饼干猴 于 2026-4-3 14:59 编辑\n\n陈版主好，请问：\n\n如果公司21年签订订单，销售一批设备给客户，合同约定公司负责安装调试，试运行一段时间后予以验收，公司按验收确认收入。22年9月末此批设备刚安装完，尚未开始试运行、客户未验收，因客户内部管理原因厂区失火，导致公司销售的设备大部分也被烧毁了，火灾是客户全责，与公司无关，但公司无法确定客户是否会继续支付剩余货款。22年末公司应当如何做账户处理？24年，客户确定继续向公司支付剩余货款，收款时，公司应当如何做账务处理？假设22年末，公司账面预收账款30万，设备销售价格100万，发出商品60万，公司应该怎么做账？可以通过签署补充协议或客户提供说明确认收入吗？还是应该将发出商品和预收账款的差额计入营业外支出，后续收到的货款计入营业外收入？\n\n感谢解答！", "reply": "2022年末，由于非本企业责任的原因导致合同事实上无法继续履行，货物灭失，但无法判断后续发展，此时按当时已收到的款项确认收入，将发出商品成本结转至营业成本。\n\n2024年客户确定将继续支付剩余货款，可在合理保证剩余货款可收回的情况下确认应收账款和营业收入。如不能合理保证可收回性的，则在实际收到时确认收入。", "searchText": "5496624 关于专用设备销售验收确认前因客户管理责任导致设备毁损灭失，应如何做账务处理？ 收入确认/总额净额 饼干猴 本帖最后由 饼干猴 于 2026-4-3 14:59 编辑\n\n陈版主好，请问：\n\n如果公司21年签订订单，销售一批设备给客户，合同约定公司负责安装调试，试运行一段时间后予以验收，公司按验收确认收入。22年9月末此批设备刚安装完，尚未开始试运行、客户未验收，因客户内部管理原因厂区失火，导致公司销售的设备大部分也被烧毁了，火灾是客户全责，与公司无关，但公司无法确定客户是否会继续支付剩余货款。22年末公司应当如何做账户处理？24年，客户确定继续向公司支付剩余货款，收款时，公司应当如何做账务处理？假设22年末，公司账面预收账款30万，设备销售价格100万，发出商品60万，公司应该怎么做账？可以通过签署补充协议或客户提供说明确认收入吗？还是应该将发出商品和预收账款的差额计入营业外支出，后续收到的货款计入营业外收入？\n\n感谢解答！ 2022年末，由于非本企业责任的原因导致合同事实上无法继续履行，货物灭失，但无法判断后续发展，此时按当时已收到的款项确认收入，将发出商品成本结转至营业成本。\n\n2024年客户确定将继续支付剩余货款，可在合理保证剩余货款可收回的情况下确认应收账款和营业收入。如不能合理保证可收回性的，则在实际收到时确认收入。"}, {"tid": "5496622", "title": "请教非全资子公司冲销专项储备合并处理疑问", "category": "合并/股权/权益法", "questionAuthor": "helenpqh", "questionTime": "2026-04-03 00:44:59", "replyTime": "2026-04-09 15:48:52", "replySortTime": "2026-04-09 15:48:52", "url": "https://bbs.esnai.com/thread-5496622-1-2.html", "question": "您好老师，想请教一个合并报表问题：\n\n非全资子公司期初所有者权益仅为专项储备 100 万元，本期全额冲销（借：专项储备 100，贷：营业成本 100），期末所有者权益仅为未分配利润 100 万元，少数股东持股 20%。\n\n少数股东损益是否为100×20%=20 万元？期初期末少数股东权益均为100×20%=20 万元，总额无变化；按公式：期初少数股东权益 + 本期少数股东损益 = 40 万元，与期末 20 万元不符。\n\n想请教：\n\n（1）该少数股东损益 20 万元在合并层面应如何抵消？\n\n是不是应该借：少数股东损益 -20 贷：未分配利润 （归母） -20\n\n这样期初期末的合并报表权益类分别为:\n\n期初：少数股东权益20 专项储备（归母）80\n\n期末：少数股东权益20 未分配利润（归母）-20\n\n（2）如果不是上述处理，为何期初期末少数股东权益不变？差额原因是什么？麻烦老师指点，谢谢！", "reply": "专项储备冲销导致的子公司净利润增加，应按比例确认少数股东损益；但该冲回不会导致少数股东权益的变化。在合并报表中，期初少数股东权益20，本期少数股东损益20，期末少数股东权益20。并不平衡。事实上这个问题在以往历年子公司计提专项储备在合并层面处理时也存在，因为计提减少了子公司的净利润，但并未减少子公司的权益总额和少数股东权益。\n\n因此，在当初计提时，合并报表层面就要做一些特殊处理。如果将子公司计提或转回专项储备的损益影响按比例分配给少数股东，则只能通过减少或增加归母的资本公积或未分配利润来平衡。但我们从未见过合并报表中因专项储备的计提或转回方面的原因导致资本公积或者未分配利润发生变动的实际例子，那就只能把计提或转回专项储备的损益影响全部在归母净利润中消化。但专项储备实际支用导致子公司的权益变动是可以按比例分配给少数股东的。", "searchText": "5496622 请教非全资子公司冲销专项储备合并处理疑问 合并/股权/权益法 helenpqh 您好老师，想请教一个合并报表问题：\n\n非全资子公司期初所有者权益仅为专项储备 100 万元，本期全额冲销（借：专项储备 100，贷：营业成本 100），期末所有者权益仅为未分配利润 100 万元，少数股东持股 20%。\n\n少数股东损益是否为100×20%=20 万元？期初期末少数股东权益均为100×20%=20 万元，总额无变化；按公式：期初少数股东权益 + 本期少数股东损益 = 40 万元，与期末 20 万元不符。\n\n想请教：\n\n（1）该少数股东损益 20 万元在合并层面应如何抵消？\n\n是不是应该借：少数股东损益 -20 贷：未分配利润 （归母） -20\n\n这样期初期末的合并报表权益类分别为:\n\n期初：少数股东权益20 专项储备（归母）80\n\n期末：少数股东权益20 未分配利润（归母）-20\n\n（2）如果不是上述处理，为何期初期末少数股东权益不变？差额原因是什么？麻烦老师指点，谢谢！ 专项储备冲销导致的子公司净利润增加，应按比例确认少数股东损益；但该冲回不会导致少数股东权益的变化。在合并报表中，期初少数股东权益20，本期少数股东损益20，期末少数股东权益20。并不平衡。事实上这个问题在以往历年子公司计提专项储备在合并层面处理时也存在，因为计提减少了子公司的净利润，但并未减少子公司的权益总额和少数股东权益。\n\n因此，在当初计提时，合并报表层面就要做一些特殊处理。如果将子公司计提或转回专项储备的损益影响按比例分配给少数股东，则只能通过减少或增加归母的资本公积或未分配利润来平衡。但我们从未见过合并报表中因专项储备的计提或转回方面的原因导致资本公积或者未分配利润发生变动的实际例子，那就只能把计提或转回专项储备的损益影响全部在归母净利润中消化。但专项储备实际支用导致子公司的权益变动是可以按比例分配给少数股东的。"}, {"tid": "5496616", "title": "同一控制下企业合并中，股权处置方该如何进行账务处理？", "category": "合并/股权/权益法", "questionAuthor": "kuishe945", "questionTime": "2026-04-02 16:52:20", "replyTime": "2026-04-09 15:25:46", "replySortTime": "2026-04-09 15:25:46", "url": "https://bbs.esnai.com/thread-5496616-1-3.html", "question": "陈版主，你好，A公司和B公司同是C公司的全资子公司，D公司是A公司的全资子公司，B公司向A公司支付现金1亿元购买D公司股权（D公司在A公司的账面价值3000万元，D公司净资产1.1亿元，评估价值1.2亿元），A公司如何进行账务处理？A公司是按正常的处置长期股权投资，确认投资收益7000万吗？", "reply": "A公司按正常处置子公司处理，在个别报表和合并报表层面确认投资收益。", "searchText": "5496616 同一控制下企业合并中，股权处置方该如何进行账务处理？ 合并/股权/权益法 kuishe945 陈版主，你好，a公司和b公司同是c公司的全资子公司，d公司是a公司的全资子公司，b公司向a公司支付现金1亿元购买d公司股权（d公司在a公司的账面价值3000万元，d公司净资产1.1亿元，评估价值1.2亿元），a公司如何进行账务处理？a公司是按正常的处置长期股权投资，确认投资收益7000万吗？ a公司按正常处置子公司处理，在个别报表和合并报表层面确认投资收益。"}, {"tid": "5496614", "title": "请教陈版主及各位大神，关于作为LP投资设立非上市股权投资基金后续计量问题", "category": "合并/股权/权益法", "questionAuthor": "我就是我5", "questionTime": "2026-04-02 11:34:27", "replyTime": "2026-04-09 15: 公司，持有子公司B公司75%的股权。A公司持有C公司30%的股权，可对C公司施加重大影响，因此C公司是A公司的联营企业。C公司持有B公司20%的股权。B公司的另外5%股权由非关联股东持有。A公司在编制合并财务报表时，确定B公司的少数股东权益比例应该是25%还是19%（=25%－20%×30%）？\n\n解答：\n\n1、按照《企业会计准则第33号——合并财务报表（2014年修订）》第三十一条的规定，并参考IFRS体系下《国际财务报告准则第10号——合并财务报表》对“非控制权益“的定义，合并报表中对“少数股东权益”的界定是“子公司的权益中不能直接或者间接归属于母公司的部分”，同时基于“合并财务报表的合并范围应当以控制为基础予以确定”这一基本原则，可以推导出：“少数股东”是指不在母公司可控制范围内的股东（即，该股东自身不能被纳入母公司的合并报表范围）。因此，母公司按照权益法核算的联营或合营企业所持有的子公司股权，在合并报表层面也作为少数股权看待，不能按照母公司对该合营、联营企业的股权比例将部分股权调整到“归属母公司股东的权益”，因为母公司仅仅是间接享有权益，但不能控制这部分权益及其所代表的在子公司股东会、董事会上的表决权。\n\n在本案例中，A公司在编制合并财务报表时，B公司的少数股东权益比例应为25%，而不是19%。\n\n2、对联营企业作为少数股东在子公司的净利润中所占的份额，应全部作为少数股东损益，不能按照母公司在该联营企业中的持股比例将部分调整到归属母公司股东的权益和损益。\n\n3、对于子公司分配给作为少数股东的联营企业的股利，如果该联营企业对该子公司的长期股权投资采用成本法核算的（即分得股利确认投资收益），则该部分投资收益就与合并净利润中的少数股东损益存在重复，母公司在对该联营企业的长期股权投资进行权益法核算时，应作为内部交易予以抵销，即需从其净利润中扣除该部分因从子公司分得股利而确认的投资收益；如果该联营企业对该子公司的长期股权投资采用权益法核算的，则该联营企业收到子公司分配的股利不影响其净资产和净利润，但因为该联营企业的净利润中已经包含了按权益法核算的在该子公司净利润中所享有的份额，与合并报表层面已确认的少数股东损益存在重复情况，所以母公司在对该联营企业进行权益法核算时需从其净利润中扣除该部分对子公司进行权益法核算而确认的投资收益。\n\n关于解答的 3 有如下问题不理解想请教一下陈版和各位老师，感谢解答！\n\n       联营企业对该子公司的长期股权投资采用权益法核算，联营企业的净利润中已经包含了按权益法核算的在该子公司净利润中所享有的份额，与合并报表层面已确认的少数股东损益存在重复情况。\n\n       这个重复是需要在母公司个体层面调整还是在合并层面调整？\n\n如联营企业净利润为100（其中包含确认的子公司投资收益20），母公司对联营企业持股比例为30%，以下哪种方法处理正确，为何？\n\n方法一：母公司个体层面确认投资收益100*30%，合并层面再确认-20*30%\n\n方法二：母公司个体层面确认（100-20）*30%", "reply": "母公司个别报表层面不用调整，其对联营企业进行权益法核算时，作为核算基数的联营企业净利润中应包含联营企业在子公司中的持股所对应的子公司净利润份额。在编制合并报表时，对该权益法核算结果进行调整，冲回重复部分（借：投资收益，贷：长期股权投资）。即主帖中所述“方法一”。", "searchText": "5496613 问题3-2-142 合并报表中对合营、联营企业所持子公司股权的处理问题 合并/股权/权益法 踏雪无痕68 《中审众环研究·实务案例卷（2020）》“问题3-2-142 合并报表中对合营、联营企业所持子公司股权的处理问题”\n\n问题：\n\n当合营企业或者联营企业持有子公司股权时，母公司编制合并报表时少数股东权益、少数股东损益如何确认？\n\n背景：\n\na公司为母公司，持有子公司b公司75%的股权。a公司持有c公司30%的股权，可对c公司施加重大影响，因此c公司是a公司的联营企业。c公司持有b公司20%的股权。b公司的另外5%股权由非关联股东持有。a公司在编制合并财务报表时，确定b公司的少数股东权益比例应该是25%还是19%（=25%－20%×30%）？\n\n解答：\n\n1、按照《企业会计准则第33号——合并财务报表（2014年修订）》第三十一条的规定，并参考ifrs体系下《国际财务报告准则第10号——合并财务报表》对“非控制权益“的定义，合并报表中对“少数股东权益”的界定是“子公司的权益中不能直接或者间接归属于母公司的部分”，同时基于“合并财务报表的合并范围应当以控制为基础予以确定”这一基本原则，可以推导出：“少数股东”是指不在母公司可控制范围内的股东（即，该股东自身不能被纳入母公司的合并报表范围）。因此，母公司按照权益法核算的联营或合营企业所持有的子公司股权，在合并报表层面也作为少数股权看待，不能按照母公司对该合营、联营企业的股权比例将部分股权调整到“归属母公司股东的权益”，因为母公司仅仅是间接享有权益，但不能控制这部分权益及其所代表的在子公司股东会、董事会上的表决权。\n\n在本案例中，a公司在编制合并财务报表时，b公司的少数股东权益比例应为25%，而不是19%。\n\n2、对联营企业作为少数股东在子公司的净利润中所占的份额，应全部作为少数股东损益，不能按照母公司在该联营企业中的持股比例将部分调整到归属母公司股东的权益和损益。\n\n3、对于子公司分配给作为少数股东的联营企业的股利，如果该联营企业对该子公司的长期股权投资采用成本法核算的（即分得股利确认投资收益），则该部分投资收益就与合并净利润中的少数股东损益存在重复，母公司在对该联营企业的长期股权投资进行权益法核算时，应作为内部交易予以抵销，即需从其净利润中扣除该部分因从子公司分得股利而确认的投资收益；如果该联营企业对该子公司的长期股权投资采用权益法核算的，则该联营企业收到子公司分配的股利不影响其净资产和净利润，但因为该联营企业的净利润中已经包含了按权益法核算的在该子公司净利润中所享有的份额，与合并报表层面已确认的少数股东损益存在重复情况，所以母公司在对该联营企业进行权益法核算时需从其净利润中扣除该部分对子公司进行权益法核算而确认的投资收益。\n\n关于解答的 3 有如下问题不理解想请教一下陈版和各位老师，感谢解答！\n\n       联营企业对该子公司的长期股权投资采用权益法核算，联营企业的净利润中已经包含了按权益法核算的在该子公司净利润中所享有的份额，与合并报表层面已确认的少数股东损益存在重复情况。\n\n       这个重复是需要在母公司个体层面调整还是在合并层面调整？\n\n如联营企业净利润为100（其中包含确认的子公司投资收益20），母公司对联营企业持股比例为30%，以下哪种方法处理正确，为何？\n\n方法一：母公司个体层面确认投资收益100*30%，合并层面再确认-20*30%\n\n方法二：母公司个体层面确认（100-20）*30% 母公司个别报表层面不用调整，其对联营企业进行权益法核算时，作为核算基数的联营企业净利润中应包含联营企业在子公司中的持股所对应的子公司净利润份额。在编制合并报表时，对该权益法核算结果进行调整，冲回重复部分（借：投资收益，贷：长期股权投资）。即主帖中所述“方法一”。"}, {"tid": "5496607", "title": "如何区分营业收入和其他收益", "category": "收入确认/总额净额", "questionAuthor": "田翠翠", "questionTime": "2026-04-02 08:52:15", "replyTime": "2026-04-09 13:02:08", "replySortTime": "2026-04-09 13:02:08", "url": "https://bbs.esnai.com/thread-5496607-1-3.html", "question": "请问一下信息产业公司收到财政拨过来的运维经费，挂什么科目比较合适，其他收益还是营业收入，因为没有签订合同不好判断。一部分是有偿一部分是无偿，他们要提供运维服务呢，运维的资产有一部分是自己的，有一部分是人家的帮忙给运维，请问老师如何区分是主营业务还是其他收益，他们既提供服务，又享有补贴，能否可以以资产是否属于自己区分主营业务收入和其他收益，资产归自己的记入其他收益，资产帮人家运维的记入营业收入。", "reply": "https://bbs.esnai.com/thread-5496596-1-1.html", "searchText": "5496607 如何区分营业收入和其他收益 收入确认/总额净额 田翠翠 请问一下信息产业公司收到财政拨过来的运维经费，挂什么科目比较合适，其他收益还是营业收入，因为没有签订合同不好判断。一部分是有偿一部分是无偿，他们要提供运维服务呢，运维的资产有一部分是自己的，有一部分是人家的帮忙给运维，请问老师如何区分是主营业务还是其他收益，他们既提供服务，又享有补贴，能否可以以资产是否属于自己区分主营业务收入和其他收益，资产归自己的记入其他收益，资产帮人家运维的记入营业收入。 https://bbs.esnai.com/thread-5496596-1-1.html"}, {"tid": "5496597", "title": "联营企业存在股权回购义务情况下如何进行权益法核算", "category": "合并/股权/权益法", "questionAuthor": "lxhzlbysp", "questionTime": "2026-04-01 20:18:18", "replyTime": "2026-04-09 12:02:38", "replySortTime": "2026-04-09 12:02:38", "url": "https://bbs.esnai.com/thread-5496597-1-3.html", "question": "请教陈版：创始股东原持有甲公司100%股权，本期甲公司增资扩股引进投资者A和B，增资后，A和B分别持有甲公司20%、10%股权，A为战略投资者，B为财务投资者，投资协议约定公司需在2029年12月31日前完成合格上市，若未完成合格上市，A和B有权要求甲公司按年化8%收益率回购持有甲公司股权。由于甲公司存在回购义务，将收到的投资款确认为股本后，同时确认一笔金融负债，并按年化8%利率计算利息。问题1：A对甲公司存在重大影响，对甲公司按权益法时是否需要将报表净利润进行调整后确认投资收益，调整过程加上甲公司计提的利息？\n\n问题2：A对甲公司存在重大影响，后续甲公司继续增资扩股引入投资C，甲公司仍然存在回购义务。甲公司如何进行权益法核算，是否需考虑其他权益变动的影响？由于投资者C引入后，甲公司仍存在回购义务，权益未发生变化，A能否仍按20%的持股比例计算投资收益？净利润调整过程仅加上甲公司对A和B计提的利息？\n\n谢谢！", "reply": "1、本案例中A对甲公司具有重大影响，但又享有对甲公司的卖出期权。在这种情况下，A应将股权投资和卖出期权分解为两项资产（其中卖出期权的初始公允价值通常为零），分别作为长期股权投资和FVTPL金融资产（其他非流动金融资产）核算。\n\n其中，在上述权益法核算中，A公司应对甲公司报表进行模拟调整，冲回针对A自身的回购义务所确认的金融负债及其对应的利息支出；同时将甲层面原先针对B的回购义务相关金融负债及其利息支出冲回，改为按照一项衍生金融负债（FVTPL金融负债）核算甲公司签出给B的卖出期权的公允价值变动。以模拟调整后甲的净资产和净利润为基础进行权益法核算。\n\n2、后续甲公司引入投资者C，同样存在回购义务，A公司虽然股权被稀释但仍有重大影响，此时A公司应参照上述对B的回购义务的处理，对甲公司的报表进行模拟调整，即把全额确认回购义务相关负债改为确认一项签出期权负债，在此基础上进行权益法核算，包括确认因股权比例被稀释导致的其他权益变动。\n\n上述处理的考虑是“视角差异调整”，因为站在被投资方甲公司自身的角度，其负有回购自身权益工具的合同义务，故需按照金融工具列报准则第十一条规定全额确认回购义务相关负债。但站在投资者A公司的视角，其回购标的并不是自身权益工具，所以无需按照金融工具列报准则第十一条规定全额确认回购义务相关负债，只需确认一项签出期权负债即可。", "searchText": "5496597 联营企业存在股权回购义务情况下如何进行权益法核算 合并/股权/权益法 lxhzlbysp 请教陈版：创始股东原持有甲公司100%股权，本期甲公司增资扩股引进投资者a和b，增资后，a和b分别持有甲公司20%、10%股权，a为战略投资者，b为财务投资者，投资协议约定公司需在2029年12月31日前完成合格上市，若未完成合格上市，a和b有权要求甲公司按年化8%收益率回购持有甲公司股权。由于甲公司存在回购义务，将收到的投资款确认为股本后，同时确认一笔金融负债，并按年化8%利率计算利息。问题1：a对甲公司存在重大影响，对甲公司按权益法时是否需要将报表净利润进行调整后确认投资收益，调整过程加上甲公司计提的利息？\n\n问题2：a对甲公司存在重大影响，后续甲公司继续增资扩股引入投资c，甲公司仍然存在回购义务。甲公司如何进行权益法核算，是否需考虑其他权益变动的影响？由于投资者c引入后，甲公司仍存在回购义务，权益未发生变化，a能否仍按20%的持股比例计算投资收益？净利润调整过程仅加上甲公司对a和b计提的利息？\n\n谢谢！ 1、本案例中a对甲公司具有重大影响，但又享有对甲公司的卖出期权。在这种情况下，a应将股权投资和卖出期权分解为两项资产（其中卖出期权的初始公允价值通常为零），分别作为长期股权投资和fvtpl金融资产（其他非流动金融资产）核算。\n\n其中，在上述权益法核算中，a公司应对甲公司报表进行模拟调整，冲回针对a自身的回购义务所确认的金融负债及其对应的利息支出；同时将甲层面原先针对b的回购义务相关金融负债及其利息支出冲回，改为按照一项衍生金融负债（fvtpl金融负债）核算甲公司签出给b的卖出期权的公允价值变动。以模拟调整后甲的净资产和净利润为基础进行权益法核算。\n\n2、后续甲公司引入投资者c，同样存在回购义务，a公司虽然股权被稀释但仍有重大影响，此时a公司应参照上述对b的回购义务的处理，对甲公司的报表进行模拟调整，即把全额确认回购义务相关负债改为确认一项签出期权负债，在此基础上进行权益法核算，包括确认因股权比例被稀释导致的其他权益变动。\n\n上述处理的考虑是“视角差异调整”，因为站在被投资方甲公司自身的角度，其负有回购自身权益工具的合同义务，故需按照金融工具列报准则第十一条规定全额确认回购义务相关负债。但站在投资者a公司的视角，其回购标的并不是自身权益工具，所以无需按照金融工具列报准则第十一条规定全额确认回购义务相关负债，只需确认一项签出期权负债即可。"}, {"tid": "5496596", "title": "政府网络运维补贴如何区分是收入还是营业收入", "category": "收入确认/总额净额", "questionAuthor": "田翠翠", "questionTime": "2026-04-01 15:17:39", "replyTime": "2026-04-09 11:50:40", "replySortTime": "2026-04-09 11:50:40", "url": "https://bbs.esnai.com/thread-5496596-1-3.html", "question": "请问一下信息产业公司收到财政拨过来的运维经费，挂什么科目比较合适，其他收益还是营业收入，因为没有签订合同不好判断。要提供运维服务呢，运维的资产有一部分是自己的，有一部分是不属于自己的帮忙给运维，企业将部分和自有资产相关的政府补助记入其他收益，将帮助别人运维部分补助的记入的营业收入，请问营业收入和其他收益如何区分。被审计单位属于软件开发企业，部分运维业务是基于前期开发的系统进行运维服务，因客户多数为党政机关，有严格的预算限制，从而导致公司存在较多在正式合同签订前即开始提供运维服务的项目。", "reply": "此问题属于政府补助和营业收入的区分问题。《上市公司执行企业会计准则案例解析2024》（以下简称《案例解析2024》）中涉及到的政府补助和营业收入区分的案例如下：\n\n案例        分析        结论\n\n案例7-01 政府补助的认定        A公司从国外进口M材料，按照政府限定的价格销售给指定企业，并从政府取得的差价补偿。（1）该补偿与其销售商品或提供服务等活动密切相关，属于企业商品或服务的对价或者是对价的组成部分；（2）该补偿实际上是补贴的下游企业（含最终消费者）。        不属于政府补助，应作为收入处理。\n\n案例7-05新能源汽车财政补贴的会计处理（注1）        新能源汽车厂商从政府取得的补贴（按照特定车型和一定补助标准发放），企业在销售新能源汽车产品时按照扣减补助后的价格与消费者进行结算。（1）该补贴与企业销售新能源车密切相关，是新能源车对价的组成部分；（2）中央和地方财政补贴实质上是为消费者购买新能源汽车承担和支付了部分销售价款。        不属于政府补助，应作为收入处理。\n\n案例7-06废弃电子产品处理基金补贴的会计处理        政府对企业按照实际完成拆解处理的废弃电器电子产品数量给予定额补贴。企业按季度上报完成拆解处理的废弃电器电子产品种类、数量，政府按照补贴标准，核定对每个处理企业的补贴金额并支付资金。        作为政府补助或者收入，在实务中均具有合理性。（注2）\n\n注1：在案例7-05中，由于实际销售过程是新能源汽车生产厂商将新能源汽车销售给4S店之后，再由4S 店销售给最终消费者，同时新能源汽车的补贴标准自2017年起执行逐步退坡政策。整车生产企业将新能源轿车销售给4S店并到达产品销售收入确认时点时，并不能准确判断4S店何时可实现新能源轿车的对外销售，可能无法准确计算可申报新能源汽车补贴的时间和金额。针对此情形，《案例解析2024》提示实务处理方法“汽车生产企业应当根据中央和地方的相关补贴政策合理估计未来可收取补贴款的金额。当政策可能出现变化的情况下（如补贴比例逐年退坡），还需合理预计相关车辆最终出售给消费者的时间，根据相应年度的补贴标准确定补贴款的最佳估计数，计入销售价款。”总之，应合理运用会计估计。在这方面，我们理解，对收入金额的估计，应遵循《企业会计准则第14号——收入（2017年修订）》第十六条对可变对价的处理原则，尤其是确保遵循“极可能不会发生重大转回”的限制条件。\n\n注2：在案例7-06中，相关拆解业务应按照政府补助准则还是收入准则进行会计处理，关键在于政府在拆解业务中扮演什么角色。如果认为企业自身从事拆解业务并从其相关活动中获取经济利益，政府仅为鼓励其从事该项业务并给予其资金补助，则应按政府补助准则进行会计处理；如果认为政府是拆解业务的服务接受方并支付服务对价，则应按收入准则进行会计处理。《案例解析2024》认可两种会计处理在实务中均具有合理性。\n\n此外，在《案例解析2024》中可确认为营业收入的案例中，政府拨付的款项金额都是按照企业提供商品或服务的数量，依据政府确定的单位定额标准计算确定的。在实务中，此类金额计算方法也可以作为区分政府补助和营业收入的辅助参考因素之一，但并非唯一的或者决定性的判断依据。\n\n《会计类1号》之“1-23政府补贴收入的性质和确认条件”之“一、新能源汽车财政补贴”，与《案列解析2024》之“案例7-05新能源汽车财政补贴的会计处理”的分析和结论是一致的。\n\n18.2.1.2 相关提示\n\n政府与企业之间的经济关系，主要可分为以下三种类型：（1）政府作为社会公共事务管理者，从企业无偿取得经济资源（向企业征收税费），或者无偿向企业提供经济资源（政府补助）；（2）政府作为企业的所有者，对企业进行资本性投入，以及从企业获得利润分配；（3）政府与企业作为平等的交易主体，政府按照市场交易条件向企业采购商品或服务。对企业一方而言，这三类不同性质的经济关系分别适用不同的企业会计准则进行处理。\n\n如何区分企业从政府取得的经济资源是属于“政府补助”还是“收入”，应关注：\n\n（1）政府补助具有“无偿性”的特点，一般来说，政府作为公共事务管理者，向企业无偿提供资源，应作为政府补助；如果政府和企业是平等的交易主体，经济资源与企业销售商品或提供服务等活动密切相关，且是企业商品或服务的对价或者是对价的组成部分，则企业应作为收入处理。\n\n（2）在满足“无偿性”的特点的前提下，还需具体分析该经济资源在实质上是为了补助企业（作为商品或服务的提供商）本身，还是补助最终消费者（或下游顾客，下同）。如果是为了补助最终消费者，只是为了结算方便而采用政府向商品或服务提供商直接拨付款项的方式，同时要求企业对最终消费者降价或政府限定售价，则企业所收到的补助款项的金额是与最终消费者对本企业所提供的商品或劳务的消费情况直接相关的，应作为收入处理。\n\n目前实际操作中可确认为营业收入的补助款项（如可再生能源电价补助、新能源汽车等降价销售补助、高效节能产品价格补助等）的共同特点如下，下述各项条件应全部满足，才能认可将补助款计入营业收入。\n\n① 这些补助款项从经济实质上看都是政府对最终消费者（或下游顾客，下同）的补助，而不是对销售企业（作为商品或服务的提供商）的补助。相当于政府（或事实上具有政府职能的机构，或受政府委托的机构，下同）把款项支付给最终消费者，最终消费者再用这些款项购买销售企业提供的商品或服务，因此销售企业可以确认为向最终消费者提供商品或劳务的营业收入，只不过为了结算方便而采用政府向商品或服务提供商直接拨付款项的方式，同时要求企业对最终消费者降价。\n\n② 所涉及的行业通常为以下两种情况之一：一是涉及国计民生的基础公共服务（公用事业、基本生活必需品等），政府对其实施价格管制，导致企业发生政策性亏损的；二是属于国家重点扶持的新兴行业（如新能源等），在初创期因成本较高、市场尚未打开等原因导致亏损的。\n\n③ 相关款项的拨付具有规范、权威的政策依据。所依据的应当是当地财政部门正式发布并按照《政府信息公开条例》的规定予以主动公开的财政扶持项目及其财政资金管理办法，且该管理办法应当是普惠性的（任何符合规定条件的企业均可申请），而不是专门针对特定企业制定的优惠。在操作程序上，应履行规范的政府购买服务（如通过招投标确定服务提供者等，并严格核实其成本）的程序。\n\n此外，政府补贴资金是否属于增值税应税范围的问题，根据《国家税务总局关于取消增值税扣税凭证认证确认期限等增值税征管问题的公告》（国家税务总局公告2019年第45号）的规定，自2020年1月1日起，政府补贴也要根据补助类型分别处理：\n\n补贴类型        增值税处理\n\n（1）与纳税人销售货物、劳务、服务、无形资产、不动产的收入或者数量直接挂钩的财政补贴收入        按规定计算缴纳增值税\n\n（2）其他情形的财政补贴收入        不属于增值税应税收入，不征收增值税\n\n上表中第（1）种补助实际上也是将该补助作为销售对价的一部分需要缴纳增值税；只有第（2）种补助才是政府无偿拨付给企业、无需企业提供商品或服务，因此企业未发生增值税应税行为。", "searchText": "5496596 政府网络运维补贴如何区分是收入还是营业收入 收入确认/总额净额 田翠翠 请问一下信息产业公司收到财政拨过来的运维经费，挂什么科目比较合适，其他收益还是营业收入，因为没有签订合同不好判断。要提供运维服务呢，运维的资产有一部分是自己的，有一部分是不属于自己的帮忙给运维，企业将部分和自有资产相关的政府补助记入其他收益，将帮助别人运维部分补助的记入的营业收入，请问营业收入和其他收益如何区分。被审计单位属于软件开发企业，部分运维业务是基于前期开发的系统进行运维服务，因客户多数为党政机关，有严格的预算限制，从而导致公司存在较多在正式合同签订前即开始提供运维服务的项目。 此问题属于政府补助和营业收入的区分问题。《上市公司执行企业会计准则案例解析2024》（以下简称《案例解析2024》）中涉及到的政府补助和营业收入区分的案例如下：\n\n案例        分析        结论\n\n案例7-01 政府补助的认定        a公司从国外进口m材料，按照政府限定的价格销售给指定企业，并从政府取得的差价补偿。（1）该补偿与其销售商品或提供服务等活动密切相关，属于企业商品或服务的对价或者是对价的组成部分；（2）该补偿实际上是补贴的下游企业（含最终消费者）。        不属于政府补助，应作为收入处理。\n\n案例7-05新能源汽车财政补贴的会计处理（注1）        新能源汽车厂商从政府取得的补贴（按照特定车型和一定补助标准发放），企业在销售新能源汽车产品时按照扣减补助后的价格与消费者进行结算。（1）该补贴与企业销售新能源车密切相关，是新能源车对价的组成部分；（2）中央和地方财政补贴实质上是为消费者购买新能源汽车承担和支付了部分销售价款。        不属于政府补助，应作为收入处理。\n\n案例7-06废弃电子产品处理基金补贴的会计处理        政府对企业按照实际完成拆解处理的废弃电器电子产品数量给予定额补贴。企业按季度上报完成拆解处理的废弃电器电子产品种类、数量，政府按照补贴标准，核定对每个处理企业的补贴金额并支付资金。        作为政府补助或者收入，在实务中均具有合理性。（注2）\n\n注1：在案例7-05中，由于实际销售过程是新能源汽车生产厂商将新能源汽车销售给4s店之后，再由4s 店销售给最终消费者，同时新能源汽车的补贴标准自2017年起执行逐步退坡政策。整车生产企业将新能源轿车销售给4s店并到达产品销售收入确认时点时，并不能准确判断4s店何时可实现新能源轿车的对外销售，可能无法准确计算可申报新能源汽车补贴的时间和金额。针对此情形，《案例解析2024》提示实务处理方法“汽车生产企业应当根据中央和地方的相关补贴政策合理估计未来可收取补贴款的金额。当政策可能出现变化的情况下（如补贴比例逐年退坡），还需合理预计相关车辆最终出售给消费者的时间，根据相应年度的补贴标准确定补贴款的最佳估计数，计入销售价款。”总之，应合理运用会计估计。在这方面，我们理解，对收入金额的估计，应遵循《企业会计准则第14号——收入（2017年修订）》第十六条对可变对价的处理原则，尤其是确保遵循“极可能不会发生重大转回”的限制条件。\n\n注2：在案例7-06中，相关拆解业务应按照政府补助准则还是收入准则进行会计处理，关键在于政府在拆解业务中扮演什么角色。如果认为企业自身从事拆解业务并从其相关活动中获取经济利益，政府仅为鼓励其从事该项业务并给予其资金补助，则应按政府补助准则进行会计处理；如果认为政府是拆解业务的服务接受方并支付服务对价，则应按收入准则进行会计处理。《案例解析2024》认可两种会计处理在实务中均具有合理性。\n\n此外，在《案例解析2024》中可确认为营业收入的案例中，政府拨付的款项金额都是按照企业提供商品或服务的数量，依据政府确定的单位定额标准计算确定的。在实务中，此类金额计算方法也可以作为区分政府补助和营业收入的辅助参考因素之一，但并非唯一的或者决定性的判断依据。\n\n《会计类1号》之“1-23政府补贴收入的性质和确认条件”之“一、新能源汽车财政补贴”，与《案列解析2024》之“案例7-05新能源汽车财政补贴的会计处理”的分析和结论是一致的。\n\n18.2.1.2 相关提示\n\n政府与企业之间的经济关系，主要可分为以下三种类型：（1）政府作为社会公共事务管理者，从企业无偿取得经济资源（向企业征收税费），或者无偿向企业提供经济资源（政府补助）；（2）政府作为企业的所有者，对企业进行资本性投入，以及从企业获得利润分配；（3）政府与企业作为平等的交易主体，政府按照市场交易条件向企业采购商品或服务。对企业一方而言，这三类不同性质的经济关系分别适用不同的企业会计准则进行处理。\n\n如何区分企业从政府取得的经济资源是属于“政府补助”还是“收入”，应关注：\n\n（1）政府补助具有“无偿性”的特点，一般来说，政府作为公共事务管理者，向企业无偿提供资源，应作为政府补助；如果政府和企业是平等的交易主体，经济资源与企业销售商品或提供服务等活动密切相关，且是企业商品或服务的对价或者是对价的组成部分，则企业应作为收入处理。\n\n（2）在满足“无偿性”的特点的前提下，还需具体分析该经济资源在实质上是为了补助企业（作为商品或服务的提供商）本身，还是补助最终消费者（或下游顾客，下同）。如果是为了补助最终消费者，只是为了结算方便而采用政府向商品或服务提供商直接拨付款项的方式，同时要求企业对最终消费者降价或政府限定售价，则企业所收到的补助款项的金额是与最终消费者对本企业所提供的商品或劳务的消费情况直接相关的，应作为收入处理。\n\n目前实际操作中可确认为营业收入的补助款项（如可再生能源电价补助、新能源汽车等降价销售补助、高效节能产品价格补助等）的共同特点如下，下述各项条件应全部满足，才能认可将补助款计入营业收入。\n\n① 这些补助款项从经济实质上看都是政府对最终消费者（或下游顾客，下同）的补助，而不是对销售企业（作为商品或服务的提供商）的补助。相当于政府（或事实上具有政府职能的机构，或受政府委托的机构，下同）把款项支付给最终消费者，最终消费者再用这些款项购买销售企业提供的商品或服务，因此销售企业可以确认为向最终消费者提供商品或劳务的营业收入，只不过为了结算方便而采用政府向商品或服务提供商直接拨付款项的方式，同时要求企业对最终消费者降价。\n\n② 所涉及的行业通常为以下两种情况之一：一是涉及国计民生的基础公共服务（公用事业、基本生活必需品等），政府对其实施价格管制，导致企业发生政策性亏损的；二是属于国家重点扶持的新兴行业（如新能源等），在初创期因成本较高、市场尚未打开等原因导致亏损的。\n\n③ 相关款项的拨付具有规范、权威的政策依据。所依据的应当是当地财政部门正式发布并按照《政府信息公开条例》的规定予以主动公开的财政扶持项目及其财政资金管理办法，且该管理办法应当是普惠性的（任何符合规定条件的企业均可申请），而不是专门针对特定企业制定的优惠。在操作程序上，应履行规范的政府购买服务（如通过招投标确定服务提供者等，并严格核实其成本）的程序。\n\n此外，政府补贴资金是否属于增值税应税范围的问题，根据《国家税务总局关于取消增值税扣税凭证认证确认期限等增值税征管问题的公告》（国家税务总局公告2019年第45号）的规定，自2020年1月1日起，政府补贴也要根据补助类型分别处理：\n\n补贴类型        增值税处理\n\n（1）与纳税人销售货物、劳务、服务、无形资产、不动产的收入或者数量直接挂钩的财政补贴收入        按规定计算缴纳增值税\n\n（2）其他情形的财政补贴收入        不属于增值税应税收入，不征收增值税\n\n上表中第（1）种补助实际上也是将该补助作为销售对价的一部分需要缴纳增值税；只有第（2）种补助才是政府无偿拨付给企业、无需企业提供商品或服务，因此企业未发生增值税应税行为。"}, {"tid": "5496595", "title": "处置其他权益工具投资的所得税问题。", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "wx_5a965c779b33", "questionTime": "2026-04-01 14:40:16", "replyTime": "2026-04-09 11:31:16", "replySortTime": "2026-04-09 11:31:16", "url": "https://bbs.esnai.com/thread-5496595-1-3.html", "question": "请教。\n\n一个其他权益工具投资。成本金额100元，上年发生公允价值增值10元，计入其他综合收益7.5元，递延所得税负债2.5元。本年发生处置。处置金额为130元。那其他综合收益的变动，就是期初7.5+15(20*75%)-30(留存收益）-7.5税（30*25%）。企业巨亏导致企业不缴纳企业所得税。请问，这个7.5的税应当计入哪个科目？所内老师说应当计入所得税费用（负数），但是其他权益工具投资的所得税应该不影响利润表（？）；但是如果不计入利润表的话，所有者权益结构变动会有差额（因为其他综合收益一贯是不含税，而计入留存收益的部分是30含税）", "reply": "由于企业巨亏，实际无需缴纳企业所得税，所以在当初确认与其他权益工具投资公允价值变动相关的递延所得税负债同时，还应当以已确认的递延所得税负债为限确认与可抵扣亏损有关的递延所得税资产。本年度处置其他权益工具投资，在税法上产生应纳税所得额30（130-100）但实际无需缴纳企业所得税，故相应的与可抵扣亏损相关的递延所得税资产转回，借记“所得税费用——递延所得税费用”。与此同时与其他权益工具投资公允价值变动相关的递延所得税负债转回，转回时先计入其他综合收益，再一并转入留存收益。\n\n如果前期未确认与可抵扣亏损相关的递延所得税资产的，则不做递延所得税资产的转回分录，其他同上。", "searchText": "5496595 处置其他权益工具投资的所得税问题。 金融工具/外币/债务重组/abs wx_5a965c779b33 请教。\n\n一个其他权益工具投资。成本金额100元，上年发生公允价值增值10元，计入其他综合收益7.5元，递延所得税负债2.5元。本年发生处置。处置金额为130元。那其他综合收益的变动，就是期初7.5+15(20*75%)-30(留存收益）-7.5税（30*25%）。企业巨亏导致企业不缴纳企业所得税。请问，这个7.5的税应当计入哪个科目？所内老师说应当计入所得税费用（负数），但是其他权益工具投资的所得税应该不影响利润表（？）；但是如果不计入利润表的话，所有者权益结构变动会有差额（因为其他综合收益一贯是不含税，而计入留存收益的部分是30含税） 由于企业巨亏，实际无需缴纳企业所得税，所以在当初确认与其他权益工具投资公允价值变动相关的递延所得税负债同时，还应当以已确认的递延所得税负债为限确认与可抵扣亏损有关的递延所得税资产。本年度处置其他权益工具投资，在税法上产生应纳税所得额30（130-100）但实际无需缴纳企业所得税，故相应的与可抵扣亏损相关的递延所得税资产转回，借记“所得税费用——递延所得税费用”。与此同时与其他权益工具投资公允价值变动相关的递延所得税负债转回，转回时先计入其他综合收益，再一并转入留存收益。\n\n如果前期未确认与可抵扣亏损相关的递延所得税资产的，则不做递延所得税资产的转回分录，其他同上。"}, {"tid": "5496594", "title": "外购房屋的初始确认", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "桂红艳", "questionTime": "2026-04-01 13:51:24", "replyTime": "2026-04-09 11:22:33", "replySortTime": "2026-04-09 11:22:33", "url": "https://bbs.esnai.com/thread-5496594-1-3.html", "question": "请教各位老师：一家企业外购一处房屋，发生的印花税、购房佣金是否应当资本化计入房屋原值？", "reply": "通常理解是直接相关的增量成本（如不进行该次交易就不会发生的成本）可以计入相关资产的取得成本，但计入后的资产成本不应高于其可收回金额。", "searchText": "5496594 外购房屋的初始确认 资产/存货/固定资产/无形资产 桂红艳 请教各位老师：一家企业外购一处房屋，发生的印花税、购房佣金是否应当资本化计入房屋原值？ 通常理解是直接相关的增量成本（如不进行该次交易就不会发生的成本）可以计入相关资产的取得成本，但计入后的资产成本不应高于其可收回金额。"}, {"tid": "5496593", "title": "关于新媒体固定费用的分摊", "category": "其他", "questionAuthor": "寒江雪71", "questionTime": "2026-04-01 11:41:03", "replyTime": "2026-04-09 11:21:27", "replySortTime": "2026-04-09 11:21:27", "url": "https://bbs.esnai.com/thread-5496593-1-3.html", "question": "公司与某媒体平台签订合作协议，公司被授权作为做为该平台的一级代理商，负责可以在该平台的抖音号上发布广告、带货直播等。合同约定的期限是1年，期间内，可以发布广告信息300条，直播带货100场。同时约定，如上述资源在1年内未消耗完毕，合同可延期1年，延期一年仍未消耗完毕的，视同已消耗完毕，对方也不会退款。合同约定固定的授权费用为2000万元，但未分别约定广告、直播带货的价格。请问陈总：\n\n（1）成本如何分摊？是按照两年平均分摊吗？\n\n（2）由于对方原因，直播带货于11月份暂停，公司只直播了40场，但广告项目不受影响，目前公司正在与客户进行新的谈判，公司预付年中会重启直播，合同会延期到28年底（直播部分），那这种情况下，又该如何确认成本呢？\n\n谢谢陈版。", "reply": "1、理论上应当首先根据广告服务和直播带货服务的相对公允价值比例，以及合同约定的各自场次数，将2000万元总价合理分摊到每条广告和每次直播带货，确定每条广告和每次直播带货应分摊的成本，再按次（提供对应服务的次数）摊销成本。如无法合理确定的，则按年限分摊也是可以接受的，但通常情况下第一年的服务次数会多于第二年，故完全的直线法摊销可能也并不完全合理，建议借鉴行业经验确定更合理的摊销模式。\n\n2、如采用上述方法的，则带货直播的暂停对其对应成本的摊销不产生实质影响。如果简单地按年限分摊，此时就要合理估计剩余的直播带货场次和广告发布条数的相对公允价值比例，就剩余的无形资产账面价值的摊销方法参照上述1中的提示作出必要调整。", "searchText": "5496593 关于新媒体固定费用的分摊 其他 寒江雪71 公司与某媒体平台签订合作协议，公司被授权作为做为该平台的一级代理商，负责可以在该平台的抖音号上发布广告、带货直播等。合同约定的期限是1年，期间内，可以发布广告信息300条，直播带货100场。同时约定，如上述资源在1年内未消耗完毕，合同可延期1年，延期一年仍未消耗完毕的，视同已消耗完毕，对方也不会退款。合同约定固定的授权费用为2000万元，但未分别约定广告、直播带货的价格。请问陈总：\n\n（1）成本如何分摊？是按照两年平均分摊吗？\n\n（2）由于对方原因，直播带货于11月份暂停，公司只直播了40场，但广告项目不受影响，目前公司正在与客户进行新的谈判，公司预付年中会重启直播，合同会延期到28年底（直播部分），那这种情况下，又该如何确认成本呢？\n\n谢谢陈版。 1、理论上应当首先根据广告服务和直播带货服务的相对公允价值比例，以及合同约定的各自场次数，将2000万元总价合理分摊到每条广告和每次直播带货，确定每条广告和每次直播带货应分摊的成本，再按次（提供对应服务的次数）摊销成本。如无法合理确定的，则按年限分摊也是可以接受的，但通常情况下第一年的服务次数会多于第二年，故完全的直线法摊销可能也并不完全合理，建议借鉴行业经验确定更合理的摊销模式。\n\n2、如采用上述方法的，则带货直播的暂停对其对应成本的摊销不产生实质影响。如果简单地按年限分摊，此时就要合理估计剩余的直播带货场次和广告发布条数的相对公允价值比例，就剩余的无形资产账面价值的摊销方法参照上述1中的提示作出必要调整。"}, {"tid": "5496591", "title": "租赁负债列示", "category": "租赁/使用权资产/融资租赁", "questionAuthor": "wjcpa9568", "questionTime": "2026-04-01 10:11:48", "replyTime": "2026-04-09 11:05:21", "replySortTime": "2026-04-09 11:05:21", "url": "https://bbs.esnai.com/thread-5496591-1-3.html", "question": "请教陈总，本期新发生租赁，附注披露时，租赁负债/新增租赁、本年利息分别是租赁付款现值和当年利息，本年减少是本期的租赁付款额，流量表附注/支付其他与筹资活动的现金等于本期的租赁付款额，是否正确？", "reply": "一般可以这样理解。（在不存在简化处理的短期租赁或低价值资产租赁，以及不存在可变租赁付款额的前提下）。", "searchText": "5496591 租赁负债列示 租赁/使用权资产/融资租赁 wjcpa9568 请教陈总，本期新发生租赁，附注披露时，租赁负债/新增租赁、本年利息分别是租赁付款现值和当年利息，本年减少是本期的租赁付款额，流量表附注/支付其他与筹资活动的现金等于本期的租赁付款额，是否正确？ 一般可以这样理解。（在不存在简化处理的短期租赁或低价值资产租赁，以及不存在可变租赁付款额的前提下）。"}, {"tid": "5496589", "title": "球员能作为资产核算吗", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "18819490381", "questionTime": "2026-04-01 00:15:41", "replyTime": "2026-04-09 11:04:27", "replySortTime": "2026-04-09 11:04:27", "url": "https://bbs.esnai.com/thread-5496589-1-3.html", "question": "A公司是一个经营足球赛的公司，A公司买了一个球员，这个球员能作为A公司的资产核算吗？如果想要将该球员作为A公司的资产核算，需要满足什么条件，是计入无形资产吗?如何计量该资产的初始入账价值和后续核算,需要进行摊销吗？", "reply": "可借鉴国内外足球俱乐部对于球员转会费的会计处理方式，一般是类似于无形资产，条件是签订了明确的转会合同，明确约定转会价格、服务年限等，且通过高额违约金等条款保证该协议得到切实履行，不可能在到期前轻易撤销。\n\n相关支出确认为资产后，在合同约定的转会服务年限内摊销，如出现减值迹象的，则需对其进行减值测试和计提减值准备，即采用“摊销+减值准备”的后续计量模式。", "searchText": "5496589 球员能作为资产核算吗 资产/存货/固定资产/无形资产 18819490381 a公司是一个经营足球赛的公司，a公司买了一个球员，这个球员能作为a公司的资产核算吗？如果想要将该球员作为a公司的资产核算，需要满足什么条件，是计入无形资产吗?如何计量该资产的初始入账价值和后续核算,需要进行摊销吗？ 可借鉴国内外足球俱乐部对于球员转会费的会计处理方式，一般是类似于无形资产，条件是签订了明确的转会合同，明确约定转会价格、服务年限等，且通过高额违约金等条款保证该协议得到切实履行，不可能在到期前轻易撤销。\n\n相关支出确认为资产后，在合同约定的转会服务年限内摊销，如出现减值迹象的，则需对其进行减值测试和计提减值准备，即采用“摊销+减值准备”的后续计量模式。"}, {"tid": "5496559", "title": "求教陈版主，因股权无偿划转5%，自15%至20%，从而产生重大影响，的相关会计处理", "category": "合并/股权/权益法", "questionAuthor": "372916118", "questionTime": "2026-03-30 11:22:23", "replyTime": "2026-04-06 22:23:53", "replySortTime": "2026-04-06 22:23:53", "url": "https://bbs.esnai.com/thread-5496559-1-3.html", "question": "A公司B公司同在某地国资委下属，B公司原持有A公司15%股权，本年，某地国资委将A公司5%股权无偿划给B公司，两次股权的获得间隔时间足够长，没有直接关系。划入前A对B无重大影响，划入后A对B有重大影响，划入时A公司公允价值有较大增加。B公司应如何做账，对原15股权和新增5%股权应如何做账：\n\n目前我们有老给给了这样的分析，其中第二步按三去一补一降，个人是很认同的。但第一步和第三步，因为这一笔权益性交易5%，导致从无重大影响变成重大影响继而出现了对损益的影响是否合适十分拿不准，是否要调第一步和第三步的账面价值，如果调的话，是不是调损益，还是应该调资本公积呢。\n\n第一步：对原持有的15%股权进行重新计量在取得新增5%股权的交易日（即划拨日），B公司需要视同先将原15%的股权出售，再按公允价值买回。因此，需要将原金融资产的账面价值调整至该日的公允价值，差额计入投资收益。会计分录：借：长期股权投资——投资成本 （原15%股权在划拨日的公允价值）贷：交易性金融资产 / 其他权益工具投资 （原15%股权的账面价值）贷：投资收益 （公允价值与账面价值的差额，或借记）如果原股权分类为“其他权益工具投资”，其持有期间计入“其他综合收益”的累计公允价值变动，需要转入留存收益（盈余公积、利润分配-未分配利润），而不是投资收益。第二步：确认新增的5%股权由于本次5%股权是无偿划转取得，根据《规范“三去一降一补”有关业务的会计处理规定》（财会〔2016〕17号）等文件，对于国家控制机构主导的无偿划转，接受方应作为权益性交易处理，不确认损益。会计分录：借：长期股权投资——投资成本 （A公司5%股权在划拨日的公允价值或经批复的净资产份额）贷：资本公积——资本溢价 第三步：权益法核算的初始调整完成上述两步后，“长期股权投资——投资成本”科目的金额为原15%股权公允价值与新增5%股权入账价值之和。B公司需要比较这个初始投资成本，与应享有的A公司在划拨日可辨认净资产公允价值总额的20%份额：如果初始投资成本大于应享有份额，差额为内含商誉，不调整长期股权投资的账面价值。如果初始投资成本小于应享有份额，差额应调整增加长期股权投资，并计入营业外收入。", "reply": "总体上赞同主帖的处理方式。\n\n虽然导致获得重大影响的原因是上级无偿划入股权，但在划入股权之前，原持有的15%股权投资按金融资产模式核算，应在各期末按公允价值计量并确认公允价值变动损益（或其他综合收益），并在取得重大影响时视同处置原先的金融资产，确认投资收益或者转入留存收益。无偿划入的权益性交易影响仅体现在第二步，第一步和第三步按照企业会计准则规定的常规处理。", "searchText": "5496559 求教陈版主，因股权无偿划转5%，自15%至20%，从而产生重大影响，的相关会计 调整资本公积——股本溢价。"}, {"tid": "5496561", "title": "信托基金", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "jiuzhou010", "questionTime": "2026-03-30 15:16:03", "replyTime": "2026-04-06 22:12:13", "replySortTime": "2026-04-06 22:12:13", "url": "https://bbs.esnai.com/thread-5496561-1-3.html", "question": "陈版，我们投资了一个信托基金，两个投资者，我们是优先级（投了2亿），对方是劣后级（投了9亿），我们优先级是本金+5%收益，信托又投资了个基金，基金投资的股票，我们作为优先级，目前股价没有跌破劣后级，但是基于投资的最终是股票，我们计入了交易性金融资产，但是不知道能不能保证收益，故而公允价值变动我们本着谨慎性，而且信托给我们的报告净值是1，穿透的基金的净值是0.64，我们是按1算还是0.64算合理了呀，或者公允价值我们应该怎么取了呀？", "reply": "信托基金份额的公允价值计算，理论上需穿透到底层资产，先确定底层资产的公允价值，再根据相关协议、合同中对于收益分配、权益享有的约定，逐层倒算本企业所持有的信托基金份额。\n\n由于本企业所持有的信托受益权份额是优先级，而另一投资人持有的劣后级是起到保证作用的，因此在确定本企业所持优先级份额的公允价值时，应关注劣后级份额的净值情况，确定有无提供有效保障的能力，必要时可参考信托产品设计中的安全线、警戒线、止损线等指标。", "searchText": "5496561 信托基金 金融工具/外币/债务重组/abs jiuzhou010 陈版，我们投资了一个信托基金，两个投资者，我们是优先级（投了2亿），对方是劣后级（投了9亿），我们优先级是本金+5%收益，信托又投资了个基金，基金投资的股票，我们作为优先级，目前股价没有跌破劣后级，但是基于投资的最终是股票，我们计入了交易性金融资产，但是不知道能不能保证收益，故而公允价值变动我们本着谨慎性，而且信托给我们的报告净值是1，穿透的基金的净值是0.64，我们是按1算还是0.64算合理了呀，或者公允价值我们应该怎么取了呀？ 信托基金份额的公允价值计算，理论上需穿透到底层资产，先确定底层资产的公允价值，再根据相关协议、合同中对于收益分配、权益享有的约定，逐层倒算本企业所持有的信托基金份额。\n\n由于本企业所持有的信托受益权份额是优先级，而另一投资人持有的劣后级是起到保证作用的，因此在确定本企业所持优先级份额的公允价值时，应关注劣后级份额的净值情况，确定有无提供有效保障的能力，必要时可参考信托产品设计中的安全线、警戒线、止损线等指标。"}, {"tid": "5496563", "title": "请教陈老师，关于合同履约成本及预提应付款的问题", "category": "收入确认/总额净额", "questionAuthor": "狗眼", "questionTime": "2026-03-30 17:06:55", "replyTime": "2026-04-06 21:57:52", "replySortTime": "2026-04-06 21:57:52", "url": "https://bbs.esnai.com/thread-5496563-1-3.html", "question": "陈老师您好，想请教一下产出法下，合同履约成本余额小于按履约进度计算的成本，预提暂估应付的相关问题，具体如下：\n\nA公司作为乙方签订了一份100w技术服务合同，毛利率30%，预计成本70w,识别为一项履约义务，按照产出法确认收入，2025年12月确认30%即30w的收入，对应的合同履约成本只有18w,按履约进度计算的成本21w,于是账务处理为预提3w的应付款，与18w的合同履约成本合计21w计入营业成本。\n\n我的疑问是：（1）这样账务处理像是仍旧沿用完工百分比的做法，新收入准则下还这样处理是否可以？\n\n（2）若项目全部完成时，实际发生的成本小于预计成本的部分，那么已经预提的应付款是要冲成本，还是将预提部分转入营业外收入，以及这样会不会存在跨期调节利润的嫌疑？\n\n恳请陈老师拨冗指导，麻烦您了，谢谢陈老师{:1_358:}", "reply": "主帖中的做法仍是延续原建造合同准则下的完工百分比法，新准则下是不恰当的，即只有对应于已确认收入的成本才能计入营业成本，不能为了人为平滑各期利润而预提成本。\n\n对此情况，应关注此处按产出法确定的履约进度是否合理（例如是否单纯依据合同约定的付款进度），必要时对产出法下的履约进度进行修正。", "searchText": "5496563 请教陈老师，关于合同履约成本及预提应付款的问题 收入确认/总额净额 狗眼 陈老师您好，想请教一下产出法下，合同履约成本余额小于按履约进度计算的成本，预提暂估应付的相关问题，具体如下：\n\na公司作为乙方签订了一份100w技术服务合同，毛利率30%，预计成本70w,识别为一项履约义务，按照产出法确认收入，2025年12月确认30%即30w的收入，对应的合同履约成本只有18w,按履约进度计算的成本21w,于是账务处理为预提3w的应付款，与18w的合同履约成本合计21w计入营业成本。\n\n我的疑问是：（1）这样账务处理像是仍旧沿用完工百分比的做法，新收入准则下还这样处理是否可以？\n\n（2）若项目全部完成时，实际发生的成本小于预计成本的部分，那么已经预提的应付款是要冲成本，还是将预提部分转入营业外收入，以及这样会不会存在跨期调节利润的嫌疑？\n\n恳请陈老师拨冗指导，麻烦您了，谢谢陈老师{:1_358:} 主帖中的做法仍是延续原建造合同准则下的完工百分比法，新准则下是不恰当的，即只有对应于已确认收入的成本才能计入营业成本，不能为了人为平滑各期利润而预提成本。\n\n对此情况，应关注此处按产出法确定的履约进度是否合理（例如是否单纯依据合同约定的付款进度），必要时对产出法下的履约进度进行修正。"}, {"tid": "5496564", "title": "逾期债权投资报表列示问题", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "Caaa1231", "questionTime": "2026-03-30 19:11:16", "replyTime": "2026-04-06 21:55:23", "replySortTime": "2026-04-06 21:55:23", "url": "https://bbs.esnai.com/thread-5496564-1-3.html", "question": "本帖最后由 Caaa1231 于 2026-3-30 19:14 编辑\n\n求助陈版，公司于2025年12月末持有一笔债权投资，协议约定到期日为2025年12月31日。到期后对方未归还，公司也未办理展期，双方一直在协商还款计划，直至2026年3月底对方才提出一份分期还款的方案。请问在2025年财务报表中，该笔债权投资应如何列示？是作为“一年内到期的非流动资产”或者“其他流动资产”，还是考虑到实际可能要一年以上才能完全收回，应继续列示为“债权投资”或重分类至“其他非流动资产”？谢谢！", "reply": "根据主帖中信息，应列报为“一年内到期的非流动资产”，因为初始期限大于1年，且截至资产负债表日的实际剩余期限不足1年。资产负债表日后达成的债务重组不影响其在资产负债表日的列报。", "searchText": "5496564 逾期债权投资报表列示问题 金融工具/外币/债务重组/abs caaa1231 本帖最后由 caaa1231 于 2026-3-30 19:14 编辑\n\n求助陈版，公司于2025年12月末持有一笔债权投资，协议约定到期日为2025年12月31日。到期后对方未归还，公司也未办理展期，双方一直在协商还款计划，直至2026年3月底对方才提出一份分期还款的方案。请问在2025年财务报表中，该笔债权投资应如何列示？是作为“一年内到期的非流动资产”或者“其他流动资产”，还是考虑到实际可能要一年以上才能完全收回，应继续列示为“债权投资”或重分类至“其他非流动资产”？谢谢！ 根据主帖中信息，应列报为“一年内到期的非流动资产”，因为初始期限大于1年，且截至资产负债表日的实际剩余期限不足1年。资产负债表日后达成的债务重组不影响其在资产负债表日的列报。"}, {"tid": "5496565", "title": "非房地产开发企业开发的房地产成本如何入账", "category": "合并/股权/权益法", "questionAuthor": "DavidDe", "questionTime": "2026-03-30 20:18:31", "replyTime": "2026-04-06 21:53:30", "replySortTime": "2026-04-06 21:53:30", "url": "https://bbs.esnai.com/thread-5496565-1-3.html", "question": "陈版主，当地政府出具了“研发、工业项目转让”相关的红头文件，允许当地无房地产开发资质的公司建设研发、工业厂房并对外出售，我们审计的上市公司成立了一家子公司并依照该政策买了一大块地建设厂房，建好后对外出售，完全不会自用，目前已发生成本3千余万，但是公司并无房地产开发资质，税务局那边回复企业说到时出售时按照转让固定资产处理（不动产9%的税率）。\n\n项目的买地费用8千万上期已计入无形资产并对外披露，土地以外的开发成本预计1.6个亿。\n\n请问归集的成本是否应该列示为开发成本，后期按照房地产企业的口径来做相关账务处理？我们查了很多资料，未发现有文件明确说明只有有房地产开发资质的公司才能使用开发成本和开发产品等科目；还是可以按照在建工程归集，建设完成后计入固定资产，卖掉时再做其他业务收入和其他业务成本，如果做固定资产，建设完成与卖掉又存在时间差，是否应计提折旧？这两种处理方式还会影响现金流的列报。", "reply": "由于没有房地产开发资质，此类业务也不是常规性的业务，因此建议不计入开发成本，而是列入其他流动资产或其他非流动资产（根据开发和销售周期是否预计超过一年确定），日后实现出售时也不确认营业收入和成本，而是确认资产处置损益。\n\n由于该项目不是自用的，因此不适合于通过在建工程和固定资产科目核算。", "searchText": "5496565 非房地产开发企业开发的房地产成本如何入账 合并/股权/权益法 davidde 陈版主，当地政府出具了“研发、工业项目转让”相关的红头文件，允许当地无房地产开发资质的公司建设研发、工业厂房并对外出售，我们审计的上市公司成立了一家子公司并依照该政策买了一大块地建设厂房，建好后对外出售，完全不会自用，目前已发生成本3千余万，但是公司并无房地产开发资质，税务局那边回复企业说到时出售时按照转让固定资产处理（不动产9%的税率）。\n\n项目的买地费用8千万上期已计入无形资产并对外披露，土地以外的开发成本预计1.6个亿。\n\n请问归集的成本是否应该列示为开发成本，后期按照房地产企业的口径来做相关账务处理？我们查了很多资料，未发现有文件明确说明只有有房地产开发资质的公司才能使用开发成本和开发产品等科目；还是可以按照在建工程归集，建设完成后计入固定资产，卖掉时再做其他业务收入和其他业务成本，如果做固定资产，建设完成与卖掉又存在时间差，是否应计提折旧？这两种处理方式还会影响现金流的列报。 由于没有房地产开发资质，此类业务也不是常规性的业务，因此建议不计入开发成本，而是列入其他流动资产或其他非流动资产（根据开发和销售周期是否预计超过一年确定），日后实现出售时也不确认营业收入和成本，而是确认资产处置损益。\n\n由于该项目不是自用的，因此不适合于通过在建工程和固定资产科目核算。"}, {"tid": "5496573", "title": "抵债房计提减值准备是否可以进入非经常性损益", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "一枚种花兔", "questionTime": "2026-03-31 10:07:02", "replyTime": "2026-04-06 21:49:44", "replySortTime": "2026-04-06 21:49:44", "url": "https://bbs.esnai.com/thread-5496573-1-3.html", "question": "公司出借给其他公司的借款无法收回，经诉讼，借款人以房产进行抵债，今年对房产进行减值，减值准备可以进入非经常性损益么", "reply": "不属于非经常性损益。\n\n参阅：https://bbs.esnai.com/thread-5496491-1-1.html。", "searchText": "5496573 抵债房计提减值准备是否可以进入非经常性损益 金融工具/外币/债务重组/abs 一枚种花兔 公司出借给其他公司的借款无法收回，经诉讼，借款人以房产进行抵债，今年对房产进行减值，减值准备可以进入非经常性损益么 不属于非经常性损益。\n\n参阅：https://bbs.esnai.com/thread-5496491-1-1.html。"}, {"tid": "5496533", "title": "上市公司子公司股权激励少数股东损益和少数股东权益计算", "category": "合并/股权/权益法", "questionAuthor": "helenpqh", "questionTime": "2026-03-27 21:25:04", "replyTime": "2026-04-06 20:01:00", "replySortTime": "2026-04-06 20:01:00", "url": "https://bbs.esnai.com/thread-5496533-1-2.html", "question": "本帖最后由 helenpqh 于 2026-3-29 01:56 编辑\n\nA 原持有子公司 B 100% 股权。B 公司计划做IPO，并于 2025 年 12 月 27 日对员工实施股权激励，员工以持股平台增资方式取得 B 公司 20% 股权，12月27日持股平台出资到账2,700 万元（比认缴出资少，协议约定一个月内需将认缴出资完毕，新增股东从第一笔出资到账开始就可以按照认缴比例享受股东权利），其中计入股本 1,300 万元，计入资本公积 — 资本溢价 1,400 万元，增资后员工持股平台成为更为B公司少数股东，B公司变为A公司的非全资子公司。2025 年 12 月 27 日至 2025 年 12 月 31 日B公司按日摊销股权激励费用 1,100 万元，计入资本公积 — 其他资本公积。在做A公司2025年12月31日的合并报表时：\n\n（1）怎么计算最后5天的少数股东损益？是否需要考虑股权激励费用摊销的影响？假设最后5天损益表就只有这笔资本公积的摊销，那少数股东损益是不是=-1100万*20%？还是说要全年平均计算=-1110万*20%*5/365？\n\n（2）假设最后5天除了股权激励费用摊销的影响，还有其他利润产生？怎么计算这部分净利润对应的少数股东损益？是不是按照（B公司全年净利润+股权按激励费用1100万）*20%*5/365来计算？最后5天的业务很多，比如全年一次性奖金、按月计提坏账等，是不是要区分具体项目来计算？如全年奖金是按365分摊后乘以5？坏账损失按照31天分摊后乘以5？有点复杂。\n\n（3）请问应如何计算 B 公司 2025 年 12 月 31 日的少数股东权益？是否等于持股平台全部增资款2700万+最后5天的少数股东损益？还是按照B公司的期末净资产全额乘以20%的比例计算少数股东权益？\n\n(4) 如果B公司在股权激励之前还有未分配利润和盈余公积流转到2025年12月31日，这部分未分配利润和盈余公积在2025年12月31日是否可以计算股东权益？\n\n（5）B公司因为股权激励形成的资本公积1100万，在A公司2025年12月31日的合并报表层面如何调整？是分别按照80%和20%计入资本公积和少数股东权益吗？如何做抵消分录？", "reply": "一般情况下，最后5天内的损益多数是不重大的，因此实务中一般对于最后仅几天的发生额为了简化起见不予以计算。而且需要注意：在最后5天入账的收入、成本费用等损益项目不等于这5天内的发生额，因为大部分企业习惯在年末结账时对一些事项进行集中处理调整。\n\n如果确实有必要单独确定子公司最后5天内的损益的，则理论上应首先针对2025年12月27日单独执行等同于年末结账的全套账务处理、调整程序，再单独识别出该5天的损益发生额。如果该做法不切实可行的，则首先根据年末和11月末结账的结果测算出12月全月的利润表发生额，再对其中性质特殊、金额重大的项目核实其确切的发生日期，根据其发生日期是在27日之前还是之后，确定是否归入该最后5天的损益，对于其他发生笔数较多、性质无特殊性、单笔金额不重大的损益项目，则假设在全月均衡发生，按天数比例分别计入前26天和后5天的损益。", "searchText": "5496533 上市公司子公司股权激励少数股东损益和少数股东权益计算 合并/股权/权益法 helenpqh 本帖最后由 helenpqh 于 2026-3-29 01:56 编辑\n\na 原持有子公司 b 100% 股权。b 公司计划做ipo，并于 2025 年 12 月 27 日对员工实施股权激励，员工以持股平台增资方式取得 b 公司 20% 股权，12月27日持股平台出资到账2,700 万元（比认缴出资少，协议约定一个月内需将认缴出资完毕，新增股东从第一笔出资到账开始就可以按照认缴比例享受股东权利），其中计入股本 1,300 万元，计入资本公积 — 资本溢价 1,400 万元，增资后员工持股平台成为更为b公司少数股东，b公司变为a公司的非全资子公司。2025 年 12 月 27 日至 2025 年 12 月 31 日b公司按日摊销股权激励费用 1,100 万元，计入资本公积 — 其他资本公积。在做a公司2025年12月31日的合并报表时：\n\n（1）怎么计算最后5天的少数股东损益？是否需要考虑股权激励费用摊销的影响？假设最后5天损益表就只有这笔资本公积的摊销，那少数股东损益是不是=-1100万*20%？还是说要全年平均计算=-1110万*20%*5/365？\n\n（2）假设最后5天除了股权激励费用摊销的影响，还有其他利润产生？怎么计算这部分净利润对应的少数股东损益？是不是按照（b公司全年净利润+股权按激励费用1100万）*20%*5/365来计算？最后5天的业务很多，比如全年一次性奖金、按月计提坏账等，是不是要区分具体项目来计算？如全年奖金是按365分摊后乘以5？坏账损失按照31天分摊后乘以5？有点复杂。\n\n（3）请问应如何计算 b 公司 2025 年 12 月 31 日的少数股东权益？是否等于持股平台全部增资款2700万+最后5天的少数股东损益？还是按照b公司的期末净资产全额乘以20%的比例计算少数股东权益？\n\n(4) 如果b公司在股权激励之前还有未分配利润和盈余公积流转到2025年12月31日，这部分未分配利润和盈余公积在2025年12月31日是否可以计算股东权益？\n\n（5）b公司因为股权激励形成的资本公积1100万，在a公司2025年12月31日的合并报表层面如何调整？是分别按照80%和20%计入资本公积和少数股东权益吗？如何做抵消分录？ 一般情况下，最后5天内的损益多数是不重大的，因此实务中一般对于最后仅几天的发生额为了简化起见不予以计算。而且需要注意：在最后5天入账的收入、成本费用等损益项目不等于这5天内的发生额，因为大部分企业习惯在年末结账时对一些事项进行集中处理调整。\n\n如果确实有必要单独确定子公司最后5天内的损益的，则理论上应首先针对2025年12月27日单独执行等同于年末结账的全套账务处理、调整程序，再单独识别出该5天的损益发生额。如果该做法不切实可行的，则首先根据年末和11月末结账的结果测算出12月全月的利润表发生额，再对其中性质特殊、金额重大的项目核实其确切的发生日期，根据其发生日期是在27日之前还是之后，确定是否归入该最后5天的损益，对于其他发生笔数较多、性质无特殊性、单笔金额不重大的损益项目，则假设在全月均衡发生，按天数比例分别计入前26天和后5天的损益。"}, {"tid": "5496534", "title": "经营租赁业务合同变更会计处理", "category": "收入确认/总额净额", "questionAuthor": "古月强", "questionTime": "2026-03-28 07:10:06", "replyTime": "2026-04-06 19:51:21", "replySortTime": "2026-04-06 19:51:21", "url": "https://bbs.esnai.com/thread-5496534-1-3.html", "question": "陈版主，您好我公司出租自持的商业办公楼给A公司，租赁面积1400平方米，租期2025年1月-2027年12月，免租期2个月（2025年1-2月），第一年租金单价为40元/平方米，第二年租金单价为41.5元/平方米，第三年租金单价为42元/平方米，租金支付周期为3个月，履约保证金为16.8万元，合同签订后支付履约保证金和第一个支付周期的租金，合同约定如承租人无故退租履约保证金和已收取的租金不退还。按新准则要求，我司将整个合同租赁期间的租金总额按直线法分摊在每月确认租金收入，每月确认的租金收入为50234.45元（不含税）。2025年1月-12月每月的会计分录如下：借：应收帐款  50234.45   贷：其他业务收入-租赁收入   50234.452025年度累计确认租赁收入602813.46元2025年累计收到租金560000元=1400*40*10分录如下：借：银行存款  560000   贷：应收帐款 513761.47        应交税费-增值税  46238.53 2025年末应收帐款余额89051.99元=602813.46- 513761.47 假如租户确定在2026年3月底租户退租，未收取下个季度的租金，按直线法2026年1-3月份累计确认租金收入150703.36元=50234.45*3，分录如下：借：应收帐款  150703.36    贷：其他业务收入-租赁收入  150703.36  2026年1-3月份收到租金174300元=1400*41.5*3，分录如下借：银行存款  174300   贷：应收帐款  159908.26        应交税费-增值税 14391.74 截止20266年3月底应收帐款余额79847.09 元=89051.99+150703.36 - 159908.26 问题1：2026年3月份需要调整按直线法累计到2026年3月确认的租金收入和按合同约定累计到2026年3月份租金的差额79847.09吗？借：应收账款  -79847.09   贷：其他业务收入-租赁收入 -79847.09问题2：按税法相关规定，租金增值税纳税义务发生时间为收到租金、开具发票和合同约定的收款时间孰早者， 57", "title": "关于土地性质变更的账务处理", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "ananand", "questionTime": "2026-03-29 22:26:59", "replyTime": "2026-03-31 11:52:57; 2026-04-06 19:39:20", "replySortTime": "2026-04-06 19:39:20", "url": "https://bbs.esnai.com/thread-5496557-1-3.html", "question": "@chenyiwei ,陈版，我想追问一个问题：\n\n背景：公司有一块土地，原土地性质为商业办公用地，因开发可能会亏损，企业与当地政府沟通变更规划，因当地住户同意变更规划，因此企业与政府沟通变更土地性质为商业住宅，但依据有关规定，土地性质变更需要收回原有土地，然后再挂牌，企业摘牌。因此企业与政府签订土地出让补充协议及竞买兜底协议，其中协议约定，土地性质变更后的土地出让金及公司兜底竞拍的条款。改土地在企业账面为2亿元，收回土地的价格为1.5亿元，土地性质变更后的土地价格为1.8亿元，收回土地款1.5亿元直接抵扣1.8亿中的1.5亿元，剩余3000万元公司用现金补齐。问题:最终土地的账面价值应该是多少?2.3亿(2+0.3)还是1.8亿，如果是1.8亿，与账面差额0.5亿作为退地损失计入营业外支出吗?\n\n回复：在有证据表明土地收回、变更规划、重新拍得这三个事项属于一揽子交易安排的情况下，应首先对原土地(开发成本)按照变更后的用途进行减值测试，必要时计提减值准备。再将计提减值准备(如需)后的原土地账面价值加上再次拍得时需补缴的差价3000万元作为重新取得土地使用权的入账价值。在这一过程中除了减值损失以外不确认其他损益。\n\n追问：该公司是一家房地产企业，在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用，在土地性质变更之后，如不存在减值，早期费用是否还能继续作为开发成本核算？", "reply": "【回复 1｜2026-03-31 11:52:57】\n“在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用”：这些前期成本在土地性质变更后是否仍需再次发生？即，这些成本对土地变性后的后续开发有无作用，能否减少后续开发过程中的经济资源流出（正常情况下按变性后的用途需发生的相关支出可无需重复发生）？\n\n如是，则可以保留这些支出并计入变性后土地的开发成本；反之应计入损益处理。\n\n【回复 2｜2026-04-06 19:39:20】\n由于开发规划和用途改变，原开发成本中归集的早期规划、资本化利息等应不再具备未来经济利益流入的潜力，应将这部分账面价值予以费用化。\n\n对于已发生的三通一平成本，如果规划和用途改变后，三通一平需要重新实施（或者至少进行重大改变），则应考虑将前期归集在开发成本中的此类支出转入损益处理；如果仍可使用，不需要进行重大改变的，则可以保留在开发成本账面价值中。", "searchText": "5496557 关于土地性质变更的账务处理 金融工具/外币/债务重组/abs ananand @chenyiwei ,陈版，我想追问一个问题：\n\n背景：公司有一块土地，原土地性质为商业办公用地，因开发可能会亏损，企业与当地政府沟通变更规划，因当地住户同意变更规划，因此企业与政府沟通变更土地性质为商业住宅，但依据有关规定，土地性质变更需要收回原有土地，然后再挂牌，企业摘牌。因此企业与政府签订土地出让补充协议及竞买兜底协议，其中协议约定，土地性质变更后的土地出让金及公司兜底竞拍的条款。改土地在企业账面为2亿元，收回土地的价格为1.5亿元，土地性质变更后的土地价格为1.8亿元，收回土地款1.5亿元直接抵扣1.8亿中的1.5亿元，剩余3000万元公司用现金补齐。问题:最终土地的账面价值应该是多少?2.3亿(2+0.3)还是1.8亿，如果是1.8亿，与账面差额0.5亿作为退地损失计入营业外支出吗?\n\n回复：在有证据表明土地收回、变更规划、重新拍得这三个事项属于一揽子交易安排的情况下，应首先对原土地(开发成本)按照变更后的用途进行减值测试，必要时计提减值准备。再将计提减值准备(如需)后的原土地账面价值加上再次拍得时需补缴的差价3000万元作为重新取得土地使用权的入账价值。在这一过程中除了减值损失以外不确认其他损益。\n\n追问：该公司是一家房地产企业，在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用，在土地性质变更之后，如不存在减值，早期费用是否还能继续作为开发成本核算？ 【回复 1｜2026-03-31 11:52:57】\n“在土地退回之前，账面除土地成本外，还有早期规划、三通一平、资本化利息等费用”：这些前期成本在土地性质变更后是否仍需再次发生？即，这些成本对土地变性后的后续开发有无作用，能否减少后续开发过程中的经济资源流出（正常情况下按变性后的用途需发生的相关支出可无需重复发生）？\n\n如是，则可以保留这些支出并计入变性后土地的开发成本；反之应计入损益处理。\n\n【回复 2｜2026-04-06 19:39:20】\n由于开发规划和用途改变，原开发成本中归集的早期规划、资本化利息等应不再具备未来经济利益流入的潜力，应将这部分账面价值予以费用化。\n\n对于已发生的三通一平成本，如果规划和用途改变后，三通一平需要重新实施（或者至少进行重大改变），则应考虑将前期归集在开发成本中的此类支出转入损益处理；如果仍可使用，不需要进行重大改变的，则可以保留在开发成本账面价值中。"}, {"tid": "5496556", "title": "子公司股份支付合并层面", "category": "合并/股权/权益法", "questionAuthor": "七夜の念", "questionTime": "2026-03-29 21:15:58", "replyTime": "2026-04-06 16:01:46", "replySortTime": "2026-04-06 16:01:46", "url": "https://bbs.esnai.com/thread-5496556-1-3.html", "question": "求助陈版主： 请教陈版主，\n\n      2025年我们集团下属非全资二级子公司存在以自身权益结算的股份支付，子公司账面处理为借：管理费用 贷：资本公积。母公司合并层面，按照持股比例计算少数股东损益，子公司层间确认的这部分资本公积合并层面是否还需要按照持股比例在资本公积和少数股东权益间分摊，也即恢复少数股东损益确认的那部分费用？", "reply": "子公司个别报表中确认的股份支付费用，在合并报表中应按少数股权比例分出部分到少数股东损益。但少数股东权益并未因此减少。所以在母公司的合并报表中，应体现一项权益性交易，即减少资本公积，增加少数股东权益。", "searchText": "5496556 子公司股份支付合并层面 合并/股权/权益法 七夜の念 求助陈版主： 请教陈版主，\n\n      2025年我们集团下属非全资二级子公司存在以自身权益结算的股份支付，子公司账面处理为借：管理费用 贷：资本公积。母公司合并层面，按照持股比例计算少数股东损益，子公司层间确认的这部分资本公积合并层面是否还需要按照持股比例在资本公积和少数股东权益间分摊，也即恢复少数股东损益确认的那部分费用？ 子公司个别报表中确认的股份支付费用，在合并报表中应按少数股权比例分出部分到少数股东损益。但少数股东权益并未因此减少。所以在母公司的合并报表中，应体现一项权益性交易，即减少资本公积，增加少数股东权益。"}, {"tid": "5496543", "title": "财务顾问费", "category": "合并/股权/权益法", "questionAuthor": "laigeng", "questionTime": "2026-03-28 22:43:29", "replyTime": "2026-04-06 15:56:45", "replySortTime": "2026-04-06 15:56:45", "url": "https://bbs.esnai.com/thread-5496543-1-4.html", "question": "为获取股权融资而支付给中介机构的财务顾问费，约定是在甲方确认乙方推荐的投资人，并收到投资后，才按融资规模的一定比例向乙方支付顾问费，管种情况下，是否可以认定这笔顾问费是为发行新的权益工具而发生的增量费用，冲减因融资而增加的资本公积？", "reply": "理论上可以。但实务中较少见到该做法。", "searchText": "5496543 财务顾问费 合并/股权/权益法 laigeng 为获取股权融资而支付给中介机构的财务顾问费，约定是在甲方确认乙方推荐的投资人，并收到投资后，才按融资规模的一定比例向乙方支付顾问费，管种情况下，是否可以认定这笔顾问费是为发行新的权益工具而发生的增量费用，冲减因融资而增加的资本公积？ 理论上可以。但实务中较少见到该做法。"}, {"tid": "5496527", "title": "请教陈版，员工赔偿是否属于非经？", "category": "其他", "questionAuthor": "l1090483430", "questionTime": "2026-03-27 17:08:06", "replyTime": "2026-04-06 15:54:36", "replySortTime": "2026-04-06 15:54:36", "url": "https://bbs.esnai.com/thread-5496527-1-4.html", "question": "工人中午在仓库休息发生猝死，女性57岁，和公司签订的劳务协议。由于是猝死，未出具死亡证明。后续公司和家人签订了补偿协议，协议中说明是非因工死亡，已正常支付。该笔支出是否属于非经？ 还是应该考虑是因公司管理不当，才导致该事件的发生从而计入管理费用，归类为经常性损益？", "reply": "如果是偶发性的，且主要与该工人自身基础性疾病相关，非职业病导致，则计入营业外支出处理，可列入非经常性损益。", "searchText": "5496527 请教陈版，员工赔偿是否属于非经？ 其他 l1090483430 工人中午在仓库休息发生猝死，女性57岁，和公司签订的劳务协议。由于是猝死，未出具死亡证明。后续公司和家人签订了补偿协议，协议中说明是非因工死亡，已正常支付。该笔支出是否属于非经？ 还是应该考虑是因公司管理不当，才导致该事件的发生从而计入管理费用，归类为经常性损益？ 如果是偶发性的，且主要与该工人自身基础性疾病相关，非职业病导致，则计入营业外支出处理，可列入非经常性损益。"}, {"tid": "5496526", "title": "请教陈版，分步实现同一控制下企业合并比较报表的编制", "category": "合并/股权/权益法", "questionAuthor": "shaoyue1021", "questionTime": "2026-03-27 15:33:43", "replyTime": "2026-04-06 15:51:32", "replySortTime": "2026-04-06 15:51:32", "url": "https://bbs.esnai.com/thread-5496526-1-4.html", "question": "请教陈版，分步实现同一控制下企业合并，比较合并现金流量表、比较合并利润表、比较合并所有者权益变动表如何编制，直接合并视同上期就达成同控进行编制吗，是否涉及调整抵销分录呢？", "reply": "同样按照同一控制下合并的基本处理原则，视同上期就达成同控进行编制。但因为合并日之前已持有被合并方的部分股权，相应地在合并方确认长期股权投资或金融资产，因此除了常规的合并步骤之外，还涉及合并日前对原持有的被合并方非控制股权投资的抵销处理。类似案例请参阅《应用指南汇编2024》P61～65。", "searchText": "5496526 请教陈版，分步实现同一控制下企业合并比较报表的编制 合并/股权/权益法 shaoyue1021 请教陈版，分步实现同一控制下企业合并，比较合并现金流量表、比较合并利润表、比较合并所有者权益变动表如何编制，直接合并视同上期就达成同控进行编制吗，是否涉及调整抵销分录呢？ 同样按照同一控制下合并的基本处理原则，视同上期就达成同控进行编制。但因为合并日之前已持有被合并方的部分股权，相应地在合并方确认长期股权投资或金融资产，因此除了常规的合并步骤之外，还涉及合并日前对原持有的被合并方非控制股权投资的抵销处理。类似案例请参阅《应用指南汇编2024》p61～65。"}, {"tid": "5496525", "title": "关于舞弊形成损失的计提科目", "category": "资产/存货/固定资产/无形资产", "questionAuthor": "christinaq", "questionTime": "2026-03-27 09:54:29", "replyTime": "2026-04-06 15:47:46", "replySortTime": "2026-04-06 15:47:46", "url": "https://bbs.esnai.com/thread-5496525-1-3.html", "question": "背景：A公司因内部业务人员舞弊，构建虚假业务，套取公司资金，支付给并无实际业务的供应商，形成预付账款，无法收回；已经侦介入，向收款供应商及其上游追讨资金，或从涉案舞弊人员处追偿。\n\n对于此预付账款无法收回的可能形成的损益，应当如何会计处理？计入经营性的“资产减值损失”/”信用减值损失”，还是计入非经营性的“营业外支出”？\n\n请大神指教。谢谢！", "reply": "首先，对于虚构业务形成的预付账款，应进行差错更正，根据查明的交易经济实质还原正确的会计处理。\n\n其次，如果不再确认预付账款，该等款项汇出时即损失，则应在当初汇出时即确认营业外支出处理，后续按实际追回的金额确认营业外收入。", "searchText": "5496525 关于舞弊形成损失的计提科目 资产/存货/固定资产/无形资产 christinaq 背景：a公司因内部业务人员舞弊，构建虚假业务，套取公司资金，支付给并无实际业务的供应商，形成预付账款，无法收回；已经侦介入，向收款供应商及其上游追讨资金，或从涉案舞弊人员处追偿。\n\n对于此预付账款无法收回的可能形成的损益，应当如何会计处理？计入经营性的“资产减值损失”/”信用减值损失”，还是计入非经营性的“营业外支出”？\n\n请大神指教。谢谢！ 首先，对于虚构业务形成的预付账款，应进行差错更正，根据查明的交易经济实质还原正确的会计处理。\n\n其次，如果不再确认预付账款，该等款项汇出时即损失，则应在当初汇出时即确认营业外支出处理，后续按实际追回的金额确认营业外收入。"}, {"tid": "5496518", "title": "所得税费用与会计利润的关系", "category": "合并/股权/权益法", "questionAuthor": "xiaomaijinwang", "questionTime": "2026-03-26 20:09:13", "replyTime": "2026-04-06 15:38:55", "replySortTime": "2026-04-06 15:38:55", "url": "https://bbs.esnai.com/thread-5496518-1-3.html", "question": "陈老师，您好。请教一个问题。纳入合并范围的合伙企业，对外进行投资，其投资期末确认公允价值变动，在计算所得税费用与会计利润的关系的时候，这个公允价值的变动是列入未确认递延的暂时性差异还是母子税率差异呢。", "reply": "虽然合伙企业本身不是企业所得税的纳税人，但其法人合伙人是相应的所得税纳税人，并遵循“先分后税”处理原则，因此合伙人应就其所享有的合伙企业收益（含尚未实现的公允价值变动损益）的份额，在实际分回前确认递延所得税负债。主帖中未确认递延所得税负债的处理很可能是错误的，请首先核对。\n\n如果按照合伙人的适用税率确认了递延所得税负债，则在该调节表中没有特殊调节事项。其中，如果合伙人是子公司，且该子公司与母公司的适用税率不同的，则在“母子公司适用不同税率的影响”项目的计算中，应将该子公司享有的合伙企业收益份额所对应的母子公司税率差影响数包含在内。", "searchText": "5496518 所得税费用与会计利润的关系 合并/股权/权益法 xiaomaijinwang 陈老师，您好。请教一个问题。纳入合并范围的合伙企业，对外进行投资，其投资期末确认公允价值变动，在计算所得税费用与会计利润的关系的时候，这个公允价值的变动是列入未确认递延的暂时性差异还是母子税率差异呢。 虽然合伙企业本身不是企业所得税的纳税人，但其法人合伙人是相应的所得税纳税人，并遵循“先分后税”处理原则，因此合伙人应就其所享有的合伙企业收益（含尚未实现的公允价值变动损益）的份额，在实际分回前确认递延所得税负债。主帖中未确认递延所得税负债的处理很可能是错误的，请首先核对。\n\n如果按照合伙人的适用税率确认了递延所得税负债，则在该调节表中没有特殊调节事项。其中，如果合伙人是子公司，且该子公司与母公司的适用税率不同的，则在“母子公司适用不同税率的影响”项目的计算中，应将该子公司享有的合伙企业收益份额所对应的母子公司税率差影响数包含在内。"}, {"tid": "5496516", "title": "现金折扣包含的增值税处理", "category": "收入确认/总额净额", "questionAuthor": "sybspxcpa", "questionTime": "2026-03-26 11:31:53", "replyTime": "2026-04-06 15:31:10", "replySortTime": "2026-04-06 15:31:10", "url": "https://bbs.esnai.com/thread-5496516-1-4.html", "question": "例：某公司2022年9月1日销售一批商品，销售价格100000元（不含税价），税率13%，销售条件为2/10、1/20、n/30。买方于2022年9月9日付款，享受现金折扣2260元。\n\n确认销售商品收入时，先确定现金折扣作为可变对价的最佳估计数。假设根据交易对手的一贯情况，确认的最佳估计是2260元（享受最高折扣）。\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n合同负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n（2）收到货款时，买方在合同约定的10日付款，享受了2%的现金折扣。由于估计的“合同负债-可变对价”是不含税的，实际折扣是按照含税金额折扣的，因此差额可以计入“财务费用-现金折扣”。\n\n借：银行存款     110740元\n\n合同负债-可变对价  2000元\n\n财务费用-现金折扣   260元\n\n贷：应收账款   113000元\n\n对于上述处理，本人理解，有两处错误：\n\n1、“合同负债”核算的是企业已收或应收客户对价而应向客户转让商品的义务。现金折扣是价格的减少，不是企业的履约义务，合同负债科目适用不当，可以用“其他流动负债”或“其他应付款”科目反映；\n\n2、现金折扣包含的增值税差额部分计入“财务费用-现金折扣”科目使用不当，现金折扣作为可变对价，应调整“主营业务收入”（或冲减当期收入），而非计入财务费用。\n\n调整后分录应为：\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n其他流动负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2000元\n\n主营业务收入   260元\n\n贷：应收账款   113000元\n\n或2：\n\n借：应收账款   113000元\n\n贷：主营业务收入   97740元\n\n其他流动负债-可变对价  2260元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2260元\n\n贷：应收账款   113000元\n\n请教陈版，上述理解和调整是否正确？\n\n谢谢", "reply": "基本赞同主帖中的理解。", "searchText": "5496516 现金折扣包含的增值税处理 收入确认/总额净额 sybspxcpa 例：某公司2022年9月1日销售一批商品，销售价格100000元（不含税价），税率13%，销售条件为2/10、1/20、n/30。买方于2022年9月9日付款，享受现金折扣2260元。\n\n确认销售商品收入时，先确定现金折扣作为可变对价的最佳估计数。假设根据交易对手的一贯情况，确认的最佳估计是2260元（享受最高折扣）。\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n合同负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n（2）收到货款时，买方在合同约定的10日付款，享受了2%的现金折扣。由于估计的“合同负债-可变对价”是不含税的，实际折扣是按照含税金额折扣的，因此差额可以计入“财务费用-现金折扣”。\n\n借：银行存款     110740元\n\n合同负债-可变对价  2000元\n\n财务费用-现金折扣   260元\n\n贷：应收账款   113000元\n\n对于上述处理，本人理解，有两处错误：\n\n1、“合同负债”核算的是企业已收或应收客户对价而应向客户转让商品的义务。现金折扣是价格的减少，不是企业的履约义务，合同负债科目适用不当，可以用“其他流动负债”或“其他应付款”科目反映；\n\n2、现金折扣包含的增值税差额部分计入“财务费用-现金折扣”科目使用不当，现金折扣作为可变对价，应调整“主营业务收入”（或冲减当期收入），而非计入财务费用。\n\n调整后分录应为：\n\n借：应收账款   113000元\n\n贷：主营业务收入   98000元\n\n其他流动负债-可变对价  2000元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2000元\n\n主营业务收入   260元\n\n贷：应收账款   113000元\n\n或2：\n\n借：应收账款   113000元\n\n贷：主营业务收入   97740元\n\n其他流动负债-可变对价  2260元\n\n应交税费-应交增值税（销项税额） 13000元\n\n收到货款时\n\n借：银行存款     110740元\n\n其他流动负债-可变对价  2260元\n\n贷：应收账款   113000元\n\n请教陈版，上述理解和调整是否正确？\n\n谢谢 基本赞同主帖中的理解。"}, {"tid": "5496507", "title": "存货抵债", "category": "收入确认/总额净额", "questionAuthor": "GKl501", "questionTime": "2026-03-25 20:20:27", "replyTime": "2026-04-06 15:20:02", "replySortTime": "2026-04-06 15:20:02", "url": "https://bbs.esnai.com/thread-5496507-1-3.html", "question": "@chenyiwei 陈老师，实务中碰到这样一个问题，如何进行账务处理？\n\nA公司在2020年度向B公司销售商品时，因产品质量问题需向B公司支付70万的赔偿款，A公司当年已支付35万元，剩余35万未支付也未进行账务处理。2026年度，B公司向A公司进行了追偿，双方约定A公司以价值35万元的存货抵偿债务，该批存货的账面价值为30万元，请问A公司是按债务重组确认损益还是确认收入结转成本，具体的账务处理怎么做？", "reply": "1、2020年时，剩余赔偿款35万元未支付也未进行账务处理，属于前期差错，应予以更正。\n\n2、在将该35万补充入账的基础上，对于2026年的以货抵债应作为债务重组处理，抵债的作价金额35万元（假设该作价是公允的）与成本30万元之间的差额确认为其他收益。", "searchText": "5496507 存货抵债 收入确认/总额净额 gkl501 @chenyiwei 陈老师，实务中碰到这样一个问题，如何进行账务处理？\n\na公司在2020年度向b公司销售商品时，因产品质量问题需向b公司支付70万的赔偿款，a公司当年已支付35万元，剩余35万未支付也未进行账务处理。2026年度，b公司向a公司进行了追偿，双方约定a公司以价值35万元的存货抵偿债务，该批存货的账面价值为30万元，请问a公司是按债务重组确认损益还是确认收入结转成本，具体的账务处理怎么做？ 1、2020年时，剩余赔偿款35万元未支付也未进行账务处理，属于前期差错，应予以更正。\n\n2、在将该35万补充入账的基础上，对于2026年的以货抵债应作为债务重组处理，抵债的作价金额35万元（假设该作价是公允的）与成本30万元之间的差额确认为其他收益。"}, {"tid": "5496505", "title": "福利费账务处理", "category": "收入确认/总额净额", "questionAuthor": "阮晓优", "questionTime": "2026-03-25 17:22:13", "replyTime": "2026-04-06 15:16:22", "replySortTime": "2026-04-06 15:16:22", "url": "https://bbs.esnai.com/thread-5496505-1-3.html", "question": "陈版主，下午好\n\n请教下 ，目前公司自有食堂、宿舍楼，但是有偿提供给员工使用，每月会从员工工资里面扣除伙食费、宿舍租金、宿舍水电费，价格比市场价便宜一点，但是对于公司来说这块还是亏本的，26年前我们都是按照净额法核算，如支付该部分成本时入管理费用-福利费，收取这部分费用冲减管理费-福利费按照26年增值税法  单位给员工有偿提供服务需要缴纳增值税，故增值税报、所得税报表均有伙食收入等，此时每月伙食费、宿舍租金、宿舍水电账上还能采用净额法核算吗", "reply": "企业向员工提供食宿，并不是正常的对外经营业务，不应确认收入。即使税法规定发生改变，但会计上仍延续此前的处理方式，即把该业务的实际成本减去向员工收取的款项后按净额列入福利费支出。", "searchText": "5496505 福利费账务处理 收入确认/总额净额 阮晓优 陈版主，下午好\n\n请教下 ，目前公司自有食堂、宿舍楼，但是有偿提供给员工使用，每月会从员工工资里面扣除伙食费、宿舍租金、宿舍水电费，价格比市场价便宜一点，但是对于公司来说这块还是亏本的，26年前我们都是按照净额法核算，如支付该部分成本时入管理费用-福利费，收取这部分费用冲减管理费-福利费按照26年增值税法  单位给员工有偿提供服务需要缴纳增值税，故增值税报、所得税报表均有伙食收入等，此时每月伙食费、宿舍租金、宿舍水电账上还能采用净额法核算吗 企业向员工提供食宿，并不是正常的对外经营业务，不应确认收入。即使税法规定发生改变，但会计上仍延续此前的处理方式，即把该业务的实际成本减去向员工收取的款项后按净额列入福利费支出。"}, {"tid": "5496504", "title": "同一控制下企业合并划出方的账务处理", "category": "合并/股权/权益法", "questionAuthor": "二小撮分子", "questionTime": "2026-03-25 14:52:31", "replyTime": "2026-04-06 15:14:11", "replySortTime": "2026-04-06 15:14:11", "url": "https://bbs.esnai.com/thread-5496504-1-3.html", "question": "求助陈版主，A集团（省属国企）持有B平台100%股权，B平台持有C上市公司26%的股权，为其控股股东。B平台将C上市公司以长投账面成本价转让给A集团，该成本价远高于C上市公司公允价值（转让时点股价）。\n\nB平台因采用账面值转让，单体层面未产生投资收益，在B平台合并层面以公允价值持续计量形成的变动与处置价款之间的差额是否应该根据权益性交易原则计入资本公积？主要是该资产处置是基于A集团整体板块调整需要，且处置价款不公允。\n\n请陈版主赐教，谢谢！！@chenyiwei", "reply": "如果不是因为B是A的全资子公司，B按成本（远高于当前公允价值）出售C公司股权给A是不可能实现的，即该交易安排仅基于两者之间特殊的关联方关系才得以发生。因此，对于B公司而言，出售价格高于标的股权公允价值（市价）的差额应作为接受母公司A的资本性投入，贷记资本公积处理。相应地，A在其个别报表中，应将交易价格高于标的股权公允价值的差额作为对B的资本性投入，借记“长期股权投资——B”而不是“长期股权投资——C”。", "searchText": "5496504 同一控制下企业合并划出方的账务处理 合并/股权/权益法 二小撮分子 求助陈版主，a集团（省属国企）持有b平台100%股权，b平台持有c上市公司26%的股权，为其控股股东。b平台将c上市公司以长投账面成本价转让给a集团，该成本价远高于c上市公司公允价值（转让时点股价）。\n\nb平台因采用账面值转让，单体层面未产生投资收益，在b平台合并层面以公允价值持续计量形成的变动与处置价款之间的差额是否应该根据权益性交易原则计入资本公积？主要是该资产处置是基于a集团整体板块调整需要，且处置价款不公允。\n\n请陈版主赐教，谢谢！！@chenyiwei 如果不是因为b是a的全资子公司，b按成本（远高于当前公允价值）出售c公司股权给a是不可能实现的，即该交易安排仅基于两者之间特殊的关联方关系才得以发生。因此，对于b公司而言，出售价格高于标的股权公允价值（市价）的差额应作为接受母公司a的资本性投入，贷记资本公积处理。相应地，a在其个别报表中，应将交易价格高于标的股权公允价值的差额作为对b的资本性投入，借记“长期股权投资——b”而不是“长期股权投资——c”。"}, {"tid": "5496502", "title": "资产打包成股权进行处置", "category": "合并/股权/权益法", "questionAuthor": "dearty", "questionTime": "2026-03-25 00:23:23", "replyTime": "2026-04-06 15:05:58", "replySortTime": "2026-04-06 15:05:58", "url": "https://bbs.esnai.com/thread-5496502-1-4.html", "question": "请教陈版主，A公司（编制合并报表企业）为处置自身某项在建工程成立一家100%股权子公司，将自己该项在建工程按账面价值注资给该子公司后，极短时间内将该子公司转让给第三方，该子公司已通过集中度测试（子公司除该项资产外无任何其他资产及业务），对于A公司来说是否可以视同处置资产进行会计处理，如果可以按照处置资产进行处理，是否可以给出具体的依据。", "reply": "可以视同处置资产进行会计处理，在合并报表层面确认资产处置损益。\n\n主要考虑：将在建工程注入该子公司和处置该子公司股权是一揽子交易，旨在实现同一目的（处置该在建工程）；且该子公司不构成业务，因此在经济实质上，处置该子公司和直接处置该在建工程的经济影响完全相同。", "searchText": "5496502 资产打包成股权进行处置 合并/股权/权益法 dearty 请教陈版主，a公司（编制合并报表企业）为处置自身某项在建工程成立一家100%股权子公司，将自己该项在建工程按账面价值注资给该子公司后，极短时间内将该子公司转让给第三方，该子公司已通过集中度测试（子公司除该项资产外无任何其他资产及业务），对于a公司来说是否可以视同处置资产进行会计处理，如果可以按照处置资产进行处理，是否可以给出具体的依据。 可以视同处置资产进行会计处理，在合并报表层面确认资产处置损益。\n\n主要考虑：将在建工程注入该子公司和处置该子公司股权是一揽子交易，旨在实现同一目的（处置该在建工程）；且该子公司不构成业务，因此在经济实质上，处置该子公司和直接处置该在建工程的经济影响完全相同。"}, {"tid": "5496501", "title": "关于经营租赁中的租赁收入确认原则是否与收入准则的收入确认前提相通", "category": "收入确认/总额净额", "questionAuthor": "nh19861028", "questionTime": "2026-03-24 22:12:43", "replyTime": "2026-04-06 15:00:04", "replySortTime": "2026-04-06 15:00:04", "url": "https://bbs.esnai.com/thread-5496501-1-4.html", "question": "请教陈版主。\n\n最近遇到这样的问题：公司对外出租不动产并约定了租金和支付期数，但承租人出现了违约，并且后续法院判决出租人胜诉判承租人支付租金，但承租人仍然拒不支付并且名下无任何可执行的资产，但企业仍然按照法院判决确认了出租收入，理由是按照租赁准则有关承租人的规定和法院的判决，但实际根本无法收回。我也认为仅凭一纸判决不足以作为收入确认的依据，按照收入准则的相关理论基础实际在承租人出现违约的时候开始就应该谨慎确认收入了。但是租赁准则中有关承租人收入确认方面并没有明确指引应该参考收入准则或者其他有关谨慎性的规定。\n\n查了IFRS相关资料，只在IFRS16附录C中有“C1:企业应从2019年1月1日开始的年度报告期间起适用本准则。对于那些在本次准则首次生效之前已经适用国际财务报告准则第15号“客户合约的收入”的企业来说，它们可以提前适用本准则。如果企业选择提前适用本准则，那么必须披露这一事实。”附录D“企业不得在适用国际财务报告准则第15号“客户合约的收入”之前，同时适用国际财务报告准则第16号(见第C1段)。”是不是这里就表明了出租人收入确认的基础首先要符合收入准则中收入确认的相关基础规定，然后才按照租赁准则中出租人收入计量的规定会计处理。\n\n谢谢！", "reply": "根据《企业会计准则——基本准则》第三十一条：“收入只有在经济利益很可能流入从而导致企业资产增加或者负债减少、且经济利益的流入额能够可靠计量时才能予以确认。”这里的“收入”涵盖了由收入准则规范的营业收入、由租赁准则规范的租金收入，以及由金融工具准则规范的利息收入等。即，出租人对经营租赁的租金收入的确认，也应以“经济利益很可能流入”为前提。在明知承租人无支付能力的情况下，仅凭法院判决并不满足确认租金收入的条件，因为法院判决只是对该租金债权在法律上的确权，而不是对其可收回性的背书。\n\n依据：《应用指南2024》P16：\n\n(1) 收入是企业在日常活动中形成的。日常活动是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商业企业销售商品、保险公司签发保单、咨询公司提供咨询服务、软件企业为客户开发软件、安装公司提供安装服务、商业银行对外贷款、租赁公司出租资产等，均属于企业的日常活动。明确界定日常活动是为了将收入与利得相区分，因为企业非日常活动所形成的经济利益的流入不能确认为收入，而应当计入利得。例如，处置固定资产属于非日常活动，所形成的净利益就不应确认为收入，而应当确认为利得。又如，企业向客户授予知识产权等无形资产所取得的授权收入属千日常活动所形成的，应当确认为收入；但是处置无形资产属千非日常活动，所形成的净利益，不应确认为收入，而应当确认为利得。", "searchText": "5496501 关于经营租赁中的租赁收入确认原则是否与收入准则的收入确认前提相通 收入确认/总额净额 nh19861028 请教陈版主。\n\n最近遇到这样的问题：公司对外出租不动产并约定了租金和支付期数，但承租人出现了违约，并且后续法院判决出租人胜诉判承租人支付租金，但承租人仍然拒不支付并且名下无任何可执行的资产，但企业仍然按照法院判决确认了出租收入，理由是按照租赁准则有关承租人的规定和法院的判决，但实际根本无法收回。我也认为仅凭一纸判决不足以作为收入确认的依据，按照收入准则的相关理论基础实际在承租人出现违约的时候开始就应该谨慎确认收入了。但是租赁准则中有关承租人收入确认方面并没有明确指引应该参考收入准则或者其他有关谨慎性的规定。\n\n查了ifrs相关资料，只在ifrs16附录c中有“c1:企业应从2019年1月1日开始的年度报告期间起适用本准则。对于那些在本次准则首次生效之前已经适用国际财务报告准则第15号“客户合约的收入”的企业来说，它们可以提前适用本准则。如果企业选择提前适用本准则，那么必须披露这一事实。”附录d“企业不得在适用国际财务报告准则第15号“客户合约的收入”之前，同时适用国际财务报告准则第16号(见第c1段)。”是不是这里就表明了出租人收入确认的基础首先要符合收入准则中收入确认的相关基础规定，然后才按照租赁准则中出租人收入计量的规定会计处理。\n\n谢谢！ 根据《企业会计准则——基本准则》第三十一条：“收入只有在经济利益很可能流入从而导致企业资产增加或者负债减少、且经济利益的流入额能够可靠计量时才能予以确认。”这里的“收入”涵盖了由收入准则规范的营业收入、由租赁准则规范的租金收入，以及由金融工具准则规范的利息收入等。即，出租人对经营租赁的租金收入的确认，也应以“经济利益很可能流入”为前提。在明知承租人无支付能力的情况下，仅凭法院判决并不满足确认租金收入的条件，因为法院判决只是对该租金债权在法律上的确权，而不是对其可收回性的背书。\n\n依据：《应用指南2024》p16：\n\n(1) 收入是企业在日常活动中形成的。日常活动是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商业企业销售商品、保险公司签发保单、咨询公司提供咨询服务、软件企业为客户开发软件、安装公司提供安装服务、商业银行对外贷款、租赁公司出租资产等，均属于企业的日常活动。明确界定日常活动是为了将收入与利得相区分，因为企业非日常活动所形成的经济利益的流入不能确认为收入，而应当计入利得。例如，处置固定资产属于非日常活动，所形成的净利益就不应确认为收入，而应当确认为利得。又如，企业向客户授予知识产权等无形资产所取得的授权收入属千日常活动所形成的，应当确认为收入；但是处置无形资产属千非日常活动，所形成的净利益，不应确认为收入，而应当确认为利得。"}, {"tid": "5496491", "title": "生产型企业收到抵债房产后计提的减值准备能否计入非经常性损益？", "category": "金融工具/外币/债务重组/ABS", "questionAuthor": "shichengqi", "questionTime": "2026-03-24 16:53:57", "replyTime": "2026-04-06 14:52:39", "replySortTime": "2026-04-06 14:52:39", "url": "https://bbs.esnai.com/thread-5496491-1-4.html", "question": "请教陈版主，某生产型企业收到一些抵债房产，由于企业是被动接受抵债房产，该批抵债房产与公司的生产经营不直接相关，主要计入其他非流动资产，公司实际是以出售为目的而持有，那么对该部分房产计提的减值准备能否计入非经常性损益，以“不影响报表使用人对公司经营业绩和盈利能力做出正常判断”。谢谢！", "reply": "在债务重组完成，债权人取得对抵债资产的控制权之后，该抵债资产自身的市价下跌等损失不应认定为是非经常性损益。本质上这是应收账款坏账损失的延伸。\n\n另外，虽然《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》中，“（十二）债务重组损益”属于通常情况下属于非经常性损益的列举项目，但我们理解这主要是针对债务人所获得的债务重组收益而言的。对于债权人而言，因日常经营活动所产生的应收账款的债务重组损失原本就和坏账损失难以区分，也不能说与正常经营活动无关，且将损失作为非经常性本身就不谨慎，因此不建议债权人将债务重组损失列入非经常性损益。", "searchText": "5496491 生产型企业收到抵债房产后计提的减值准备能否计入非经常性损益？ 金融工具/外币/债务重组/abs shichengqi 请教陈版主，某生产型企业收到一些抵债房产，由于企业是被动接受抵债房产，该批抵债房产与公司的生产经营不直接相关，主要计入其他非流动资产，公司实际是以出售为目的而持有，那么对该部分房产计提的减值准备能否计入非经常性损益，以“不影响报表使用人对公司经营业绩和盈利能力做出正常判断”。谢谢！ 在债务重组完成，债权人取得对抵债资产的控制权之后，该抵债资产自身的市价下跌等损失不应认定为是非经常性损益。本质上这是应收账款坏账损失的延伸。\n\n另外，虽然《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》中，“（十二）债务重组损益”属于通常情况下属于非经常性损益的列举项目，但我们理解这主要是针对债务人所获得的债务重组收益而言的。对于债权人而言，因日常经营活动所产生的应收账款的债务重组损失原本就和坏账损失难以区分，也不能说与正常经营活动无关，且将损失作为非经常性本身就不谨慎，因此不建议债权人将债务重组损失列入非经常性损益。"}, {"tid": "5496490", "title": "商誉资产组分摊问题", "category": "合并/股权/权益法", "questionAuthor": "happycpv", "questionTime": "2026-03-24 16:24:11", "replyTime": "2026-04-06 14:47:30", "replySortTime": "2026-04-06 14:47:30", "url": "https://bbs.esnai.com/thread-5496490-1-3.html", "question": "甲公司为一集团公司，主要产品为A，A产品具有一定危险性，具体分为产品A1、A2。其中A1产品危险性低于A2，但其市场容量低，毛利也偏低。按照国家有关强制规定需在本期A1产品的产能达到A产品总量的一定比例，否则将减少A2产能批文，以使生产企业达标。甲公司为达到国家要求，又不想减少A2产能，则只能通过对外收购A1产能的公司来达标。本期非同一控制下收购乙公司，形成商誉，其产品全部为A1。在并购时甲公司已将如收购不成将减少A2产能的损失考虑到价格因素和收购方案当中。问题：商誉减值测试时甲公司将乙公司整体划分为资产组，对应收益法测算时除正常考虑乙公司自身的未来现金流外，是否应额外考虑因未减少A2产能从而减少的损失？乙公司如完全不考虑减产损失的因素，与实际收购时考虑因素不符，亦会造成较大的商誉减值。因为从甲公司并购目的来说，完全是冲着A1产能达标的目的去的，即使收购后完全不生产，也会产生较大的溢价。请陈版及论坛众位大神指教，应如何考虑商誉减值测试中未来现金流？或者认定甲公司与乙公司产生协商效应，将商誉在甲、乙公司之间分摊，不知是否合理？", "reply": "在本案例中，收购乙公司的溢价较高，其中包含了对于带入乙公司的A1产品产能相应可以不减少A2产品产能所产生的额外收益，即乙公司的A1产品资产组与甲公司原有的A1、A2资产组是作为一个整体进行管理的，彼此之间具有协同效应。因此，存在将乙公司的A1产品资产组与甲公司原有的A1、A2产品资产组构成一个组合进行整体考虑的可能性。具体看当时的测算依据以及现在收购后的实际运行情况。", "searchText": "5496490 商誉资产组分摊问题 合并/股权/权益法 happycpv 甲公司为一集团公司，主要产品为a，a产品具有一定危险性，具体分为产品a1、a2。其中a1产品危险性低于a2，但其市场容量低，毛利也偏低。按照国家有关强制规定需在本期a1产品的产能达到a产品总量的一定比例，否则将减少a2产能批文，以使生产企业达标。甲公司为达到国家要求，又不想减少a2产能，则只能通过对外收购a1产能的公司来达标。本期非同一控制下收购乙公司，形成商誉，其产品全部为a1。在并购时甲公司已将如收购不成将减少a2产能的损失考虑到价格因素和收购方案当中。问题：商誉减值测试时甲公司将乙公司整体划分为资产组，对应收益法测算时除正常考虑乙公司自身的未来现金流外，是否应额外考虑因未减少a2产能从而减少的损失？乙公司如完全不考虑减产损失的因素，与实际收购时考虑因素不符，亦会造成较大的商誉减值。因为从甲公司并购目的来说，完全是冲着a1产能达标的目的去的，即使收购后完全不生产，也会产生较大的溢价。请陈版及论坛众位大神指教，应如何考虑商誉减值测试中未来现金流？或者认定甲公司与乙公司产生协商效应，将商誉在甲、乙公司之间分摊，不知是否合理？ 在本案例中，收购乙公司的溢价较高，其中包含了对于带入乙公司的a1产品产能相应可以不减少a2产品产能所产生的额外收益，即乙公司的a1产品资产组与甲公司原有的a1、a2资产组是作为一个整体进行管理的，彼此之间具有协同效应。因此，存在将乙公司的a1产品资产组与甲公司原有的a1、a2产品资产组构成一个组合进行整体考虑的可能性。具体看当时的测算依据以及现在收购后的实际运行情况。"}, {"tid": "5496481", "title": "请教陈版，关于月中期间，被投资方的数据如何获取的问题", "category": "合并/股权/权益法", "questionAuthor": "gpqg", "questionTime": "2026-03-23 23:36:44", "replyTime": "2026-04-06 14:40:34", "replySortTime": "2026-04-06 14:40:34", "url": "https://bbs.esnai.com/thread-5496481-1-4.html", "question": "陈版，\n\nA 公司在 25 年年初与 B 公司投资设立甲公司，A 公司持有 20%股权，采用权益法核算。\n\n然后到了 25 年 12 月 16 日，C 公司也要投资甲公司，投资基准日就是 25 年 12 月 16 日，此时 A 公司持有甲公司的股权比例被稀释为 10%。\n\n我的问题是\n\nA 公司在计算从 25 年 1 月 1 日到 25 年 12 月 16 日期间所享有甲公司净利润的比例，要确认投资收益时，25 年 1 月 1 日至 25 年 12 月 16 日这段期间甲公司的净利润该怎么计算。因为是在月中，前不着村后不着店的，此时甲公司的净利润的数据也不好获取，此时在实务中该如何处理呢？\n\n谢谢陈版！", "reply": "理论上甲公司应在该日（2025.12.16）比照月末结账执行全套的结账流程，这样的结果最为准确。\n\n如果该做法不可行，则在2025年末结账的基础上确定12月全月的净利润和其他权益变动情况，从中可以明确识别发生日期的、性质特殊的交易的，根据其发生日期归入投资日之前或之后的期间；其他常规性，且单笔交易不明显重大的交易，可假设在全月均匀发生，按投资日前后两段时间的天数比例分拆12月净利润。", "searchText": "5496481 请教陈版，关于月中期间，被投资方的数据如何获取的问题 合并/股权/权益法 gpqg 陈版，\n\na 公司在 25 年年初与 b 公司投资设立甲公司，a 公司持有 20%股权，采用权益法核算。\n\n然后到了 25 年 12 月 16 日，c 公司也要投资甲公司，投资基准日就是 25 年 12 月 16 日，此时 a 公司持有甲公司的股权比例被稀释为 10%。\n\n我的问题是\n\na 公司在计算从 25 年 1 月 1 日到 25 年 12 月 16 日期间所享有甲公司净利润的比例，要确认投资收益时，25 年 1 月 1 日至 25 年 12 月 16 日这段期间甲公司的净利润该怎么计算。因为是在月中，前不着村后不着店的，此时甲公司的净利润的数据也不好获取，此时在实务中该如何处理呢？\n\n谢谢陈版！ 理论上甲公司应在该日（2025.12.16）比照月末结账执行全套的结账流程，这样的结果最为准确。\n\n如果该做法不可行，则在2025年末结账的基础上确定12月全月的净利润和其他权益变动情况，从中可以明确识别发生日期的、性质特殊的交易的，根据其发生日期归入投资日之前或之后的期间；其他常规性，且单笔交易不明显重大的交易，可假设在全月均匀发生，按投资日前后两段时间的天数比例分拆12月净利润。"}, {"tid": "5496472", "title": "将全资子公司承包出去，该如何账务处理？", "category": "合并/股权/权益法", "questionAuthor": "一云", "questionTime": "2026-03-23 14:37:37", "replyTime": "2026-04-06 14:24:36", "replySortTime": "2026-04-06 14:24:36", "url": "https://bbs.esnai.com/thread-5496472-1-4.html", "question": "本帖最后由 一云 于 2026-3-23 14:40 编辑\n\n      A公司将自己的全资子公司承包给自然人，承包期限5年，双方约定承包期间不管公司是否营利，承包人每年向A公司缴纳 20 万元承包费及上一年度营业额的 0.5%。该公司银行账户全部由承包人控制，A公司也不参与该公司经营管理。\n\n           请问承包期内，是否仍应将该子公司纳入合并范围？  如应纳入合并范围，那该如何核算该子公司的归母净资产和少数股东权益呢？   上缴的 20 万元承包费及上一年度营业额的 0.5%，在合并报表层面就别合并抵销掉了吧？", "reply": "承包期间内是否仍纳入合并范围的判断，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”之“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】。这些指引是从承包方角度写的，但出包方（原母公司）的处理原则与之对称，即承包方、出包方（原母公司）这两者中有且仅有一方对标的公司具有控制权。\n\n如果承包期限只有5年，承包期满后收回，不涉及股权转让等后续安排，则A公司大概率仍应将该子公司纳入合并报表范围。在合并报表中：（1）如果仍以该子公司名义对外经营，则承包方使用该子公司资产所形成的收入、成本、各项资产负债仍需纳入合并报表范围，只是将归属于承包方的收益计入各期成本费用；（2）如果以承包方名义对外经营，则相当于母公司将该子公司的相关资产出租给承包方，按经营租赁进行会计处理，取得的固定或收入0.5%的款项作为租金收入，但承包方通过使用子公司资产所形成的经营性收入和成本不需在合并利润表中体现。", "searchText": "5496472 将全资子公司承包出去，该如何账务处理？ 合并/股权/权益法 一云 本帖最后由 一云 于 2026-3-23 14:40 编辑\n\n      a公司将自己的全资子公司承包给自然人，承包期限5年，双方约定承包期间不管公司是否营利，承包人每年向a公司缴纳 20 万元承包费及上一年度营业额的 0.5%。该公司银行账户全部由承包人控制，a公司也不参与该公司经营管理。\n\n           请问承包期内，是否仍应将该子公司纳入合并范围？  如应纳入合并范围，那该如何核算该子公司的归母净资产和少数股东权益呢？   上缴的 20 万元承包费及上一年度营业额的 0.5%，在合并报表层面就别合并抵销掉了吧？ 承包期间内是否仍纳入合并范围的判断，请参阅《监管规则适用指引——会计类第1号》之“1-9 控制的判断”之“一、委托、受托经营业务”，以及《企业会计准则应用指南汇编2024》之【例34-9】。这些指引是从承包方角度写的，但出包方（原母公司）的处理原则与之对称，即承包方、出包方（原母公司）这两者中有且仅有一方对标的公司具有控制权。\n\n如果承包期限只有5年，承包期满后收回，不涉及股权转让等后续安排，则a公司大概率仍应将该子公司纳入合并报表范围。在合并报表中：（1）如果仍以该子公司名义对外经营，则承包方使用该子公司资产所形成的收入、成本、各项资产负债仍需纳入合并报表范围，只是将归属于承包方的收益计入各期成本费用；（2）如果以承包方名义对外经营，则相当于母公司将该子公司的相关资产出租给承包方，按经营租赁进行会计处理，取得的固定或收入0.5%的款项作为租金收入，但承包方通过使用子公司资产所形成的经营性收入和成本不需在合并利润表中体现。"}, {"tid": "5496471", "title": "这类买断房是否符合全额列收？", "category": "收入确认/总额净额", "questionAuthor": "jdyuan", "questionTime": "2026-03-23 10:22:38", "replyTime": "2026-04-06 14:14:58", "replySortTime": "2026-04-06 14:14:58", "url": "https://bbs.esnai.com/thread-5496471-1-3.html", "question": "公司与第三方单位A（非酒店）签定买断房1000间夜，合同约定A提供给我司的协议价保证最优惠政策，我司销售价不得高于酒店前台优惠价，若因A降价造成我司损失由A赔偿；非我司原因导致无法在约定时间内正常使用买断房源，A需负责为我司提供同等级别或更高级别、同等价位或更高价位的替代房源。", "reply": "建议考虑以下问题：\n\n1、第三方单位A不是酒店，那么也是代理商？其从酒店取得房源的方式是否同样是买断？\n\n2、本企业与A之间的结算方式是什么？在买断时是否已支付全款给A或酒店？\n\n3、该批买断房源的有效期是否足够长（例如超过一年或三个月）？买断数量是否小于正常情况下本企业销售的该酒店客房数量？\n\n4、实际操作中，本企业自主定价的实际空间是否足够大？因需求不足、价格变动等原因导致本企业回报的实际可变性情况如何？\n\n5、本企业的下游客户是终端客户，还是旅行社或其他代理商？与下游客户的结算条款如何设定？", "searchText": "5496471 这类买断房是否符合全额列收？ 收入确认/总额净额 jdyuan 公司与第三方单位a（非酒店）签定买断房1000间夜，合同约定a提供给我司的协议价保证最优惠政策，我司销售价不得高于酒店前台优惠价，若因a降价造成我司损失由a赔偿；非我司原因导致无法在约定时间内正常使用买断房源，a需负责为我司提供同等级别或更高级别、同等价位或更高价位的替代房源。 建议考虑以下问题：\n\n1、第三方单位a不是酒店，那么也是代理商？其从酒店取得房源的方式是否同样是买断？\n\n2、本企业与a之间的结算方式是什么？在买断时是否已支付全款给a或酒店？\n\n3、该批买断房源的有效期是否足够长（例如超过一年或三个月）？买断数量是否小于正常情况下本企业销售的该酒店客房数量？\n\n4、实际操作中，本企业自主定价的实际空间是否足够大？因需求不足、价格变动等原因导致本企业回报的实际可变性情况如何？\n\n5、本企业的下游客户是终端客户，还是旅行社或其他代理商？与下游客户的结算条款如何设定？"}, {"tid": "5496433", "title": "受托加工材料结余如何进行会计处理？", "category": "收入确认/总额净额", "questionAuthor": "鼻涕刺客", "questionTime": "2026-03-19 14:30:45", "replyTime": "2026-03-23 13:04:09", "replySortTime": "2026-03-23 13:04:09", "url": "https://bbs.esnai.com/thread-5496433-1-4.html", "question": "贵金属受托加工模式下，委托方提供材料，约定固定损耗率，受托方实际加工时，实际损耗率低于约定的固定损耗率，结余的材料归受托方，该部分结余材料对于受托方如何会计处理。\n\n3种方式：\n\n1、对于受托方，结余的材料按照公允价值入账、确认收入。借：原材料；贷：营业收入。\n\n2、对于受托方，结余的材料按照账面单位成本冲减成本。但可能导致加工成本为负。\n\n3、对于受托方，加工成本在同批次投入材料中分摊，结余材料入账价值=加工成本/材料投入量*结余量。\n\n请教陈版及各位大佬，哪种才符合会计准则及IPO审核要求？", "reply": "一般建议按主帖的方法一，即作为提供受托加工服务的交易对价的一部分，适用收入准则中的可变对价和非现金对价的处理原则。", "searchText": "5496433 受托加工材料结余如何进行会计处理？ 收入确认/总额净额 鼻涕刺客 贵金属受托加工模式下，委托方提供材料，约定固定损耗率，受托方实际加工时，实际损耗率低于约定的固定损耗率，结余的材料归受托方，该部分结余材料对于受托方如何会计处理。\n\n3种方式：\n\n1、对于受托方，结余的材料按照公允价值入账、确认收入。借：原材料；贷：营业收入。\n\n2、对于受托方，结余的材料按照账面单位成本冲减成本。但可能导致加工成本为负。\n\n3、对于受托方，加工成本在同批次投入材料中分摊，结余材料入账价值=加工成本/材料投入量*结余量。\n\n请教陈版及各位大佬，哪种才符合会计准则及ipo审核要求？ 一般建议按主帖的方法一，即作为提供受托加工服务的交易对价的一部分，适用收入准则中的可变对价和非现金对价的处理原则。"}, {"tid": "5496434", "title": "关于计提盈余公积的问题", "category": "列报/报表科目/其他", "questionAuthor": "ananand", "questionTime": "2026-03-19 16:00:12", "replyTime": "2026-03-23 13:02:26", "replySortTime": "2026-03-23 13:02:26", "url": "https://bbs.esnai.com/thread-5496434-1-4.html", "question": "请教陈版@chenyiwei 和各位，如果一家公司没有实收资本，本期弥补亏损后仍有盈利，是否需要计提盈余公积呢？", "reply": "这种情况下仍需计提盈余公积。\n\n根据《公司法》第210条：公司分配当年税后利润时，应当提取利润的百分之十列入公司法定公积金。公司法定公积金累计额为公司注册资本的百分之五十以上的，可以不再提取。\n\n因此，可以不再提取的条件是法定盈余公积的累计金额已达到注册资本的50%，而不是实收资本的50%。", "searchText": "5496434 关于计提盈余公积的问题 列报/报表科目/其他 ananand 请教陈版@chenyiwei 和各位，如果一家公司没有实收资本，本期弥补亏损后仍有盈利，是否需要计提盈余公积呢？ 这种情况下仍需计提盈余公积。\n\n根据《公司法》第210条：公司分配当年税后利润时，应当提取利润的百分之十列入公司法定公积金。公司法定公积金累计额为公司注册资本的百分之五十以上的，可以不再提取。\n\n因此，可以不再提取的条件是法定盈余公积的累计金额已达到注册资本的50%，而不是实收资本的50%。"}, {"tid": "5496435", "title": "同一控制下企业合并的界定", "category": "合并/股权/权益法", "questionAuthor": "傻傻的飞鸟", "questionTime": "2026-03-19 16:03:09", "replyTime": "2026-03-23 13:00:16", "replySortTime": "2026-03-23 13:00:16", "url": "https://bbs.esnai.com/thread-5496435-1-4.html", "question": "请教大家与陈版。省属国企一级单位A，100%控制二级单位B，B持有三级单位C51%股权，A持有三级单位C49%股权。以往年度由B编制与C单位的合并报表。现股权无偿划转，C的51%股权划转给A，由A来编制与C单位的合并报表。企业认为是同控，但我翻了19年的监管和陈版以前的回答，个人理解这是由间接控制变为直接控制的提级，不属于同控。想和陈版确认一下，对于A的账务处理只是长投换个明细就可以吗。谢谢大家以及陈版", "reply": "在划转前后，C都在A的合并报表范围之内。A并未因为该次划转而取得了对更多经济资源的控制权。对A而言，该次划转是其合并范围内的架构调整，而不是企业合并。主帖的理解是合理的。", "searchText": "5496435 同一控制下企业合并的界定 合并/股权/权益法 傻傻的飞鸟 请教大家与陈版。省属国企一级单位a，100%控制二级单位b，b持有三级单位c51%股权，a持有三级单位c49%股权。以往年度由b编制与c单位的合并报表。现股权无偿划转，c的51%股权划转给a，由a来编制与c单位的合并报表。企业认为是同控，但我翻了19年的监管和陈版以前的回答，个人理解这是由间接控制变为直接控制的提级，不属于同控。想和陈版确认一下，对于a的账务处理只是长投换个明细就可以吗。谢谢大家以及陈版 在划转前后，c都在a的合并报表范围之内。a并未因为该次划转而取得了对更多经济资源的控制权。对a而言，该次划转是其合并范围内的架构调整，而不是企业合并。主帖的理解是合理的。"}, {"tid": "5496461", "title": "其他综合收益的递延所得税账务处理", "category": "合并/股权/权益法", "questionAuthor": "一云", "questionTime": "2026-03-21 23:36:02", "replyTime": "2026-03-23 12:50:37", "replySortTime": "2026-03-23 12:50:37", "url": "https://bbs.esnai.com/thread-5496461-1-4.html", "question": "请问:其他权益工具投资的公允价值变动确认的其他综合收益，是否和长期股权投资权益法确认的投资收益一样，如果计划长期持有该项投资，就不确认递延所得税负债？", "reply": "《企业会计准则第18号——所得税》第十二条的豁免规定仅适用于对子公司、合营企业和联营企业的长期股权投资。金融资产的公允价值变动不适用该项豁免规定。\n\n根据“足额确认递延所得税负债，谨慎确认递延所得税资产”的普遍原则，除了准则明确规定的豁免情形以外，其余情况下均应对应纳税暂时性差异足额确认递延所得税负债，不考虑其转回可能性和转回时预计有无足够多的应纳税所得额。所以对计划长期持有的其他权益工具投资的公允价值变动仍需确认递延所得税负债。", "searchText": "5496461 其他综合收益的递延所得税账务处理 合并/股权/权益法 一云 请问:其他权益工具投资的公允价值变动确认的其他综合收益，是否和长期股权投资权益法确认的投资收益一样，如果计划长期持有该项投资，就不确认递延所得税负债？ 《企业会计准则第18号——所得税》第十二条的豁免规定仅适用于对子公司、合营企业和联营企业的长期股权投资。金融资产的公允价值变动不适用该项豁免规定。\n\n根据“足额确认递延所得税负债，谨慎确认递延所得税资产”的普遍原则，除了准则明确规定的豁免情形以外，其余情况下均应对应纳税暂时性差异足额确认递延所得税负债，不考虑其转回可能性和转回时预计有无足够多的应纳税所得额。所以对计划长期持有的其他权益工具投资的公允价值变动仍需确认递延所得税负债。"}, {"tid": "5496426", "title": "请教陈版：关于对外投资的参股公司业务分拆的账务处理", "category": "合并/股权/权益法", "questionAuthor": "hy2608", "questionTime": "2026-03-18 19:59:59", "replyTime": "2026-03-20 07:13:53", "replySortTime": "2026-03-20 07:13:53", "url": "https://bbs.esnai.com/thread-5496426-1-4.html", "question": "陈版好，甲公司早期投资乙公司，在其他权益工具核算，假设2025年12月31日，公允价值3000万，此时，乙公司将有良好发展前景和较高估值的A业务单独拆分出来设立丙公司，甲公司作为乙公司老股东，又通过股权置换的方式，将对乙公司的股权下沉到丁有限合伙和戊有限合伙，这两个持股平台都只投资丙公司，合计持有丙公司的持股比例仍为原持股乙公司的比例，即甲公司将原对乙公司的投资转换成对两个持股平台的投资，穿透下去就是对丙公司的投资，假设公允价值还是3000万，想请教陈版，要怎么进行账务处理，因为现在直接持股的是两个有限合伙，是否要终止原来的其他权益工具的确认，然后增加两个其他非流动金融资产。但是实际上对这两个持股平台的投资，穿透下去就是将对原来甲公司的投资下沉到了对其子公司的投资，投资目的和实质应该算没有发生变化，这种情况下是不是还是只能在其他权益工具投资核算呢（直接穿透确认对丙公司的投资）。期盼陈版指教。", "reply": "如果这两个有限合伙企业是有限寿命主体，或者由其他原因导致其合伙份额不满足权益工具的定义，则如主帖所述，需终止确认原先对丙公司的“其他权益工具投资”，并初始确认对这两个有限合伙企业的投资（其他非流动金融资产）。虽然“投资目的和实质应该算没有发生变化”，但按照现行金融工具准则规定，也只能如此处理。", "searchText": "5496426 请教陈版：关于对外投资的参股公司业务分拆的账务处理 合并/股权/权益法 hy2608 陈版好，甲公司早期投资乙公司，在其他权益工具核算，假设2025年12月31日，公允价值3000万，此时，乙公司将有良好发展前景和较高估值的a业务单独拆分出来设立丙公司，甲公司作为乙公司老股东，又通过股权置换的方式，将对乙公司的股权下沉到丁有限合伙和戊有限合伙，这两个持股平台都只投资丙公司，合计持有丙公司的持股比例仍为原持股乙公司的比例，即甲公司将原对乙公司的投资转换成对两个持股平台的投资，穿透下去就是对丙公司的投资，假设公允价值还是3000万，想请教陈版，要怎么进行账务处理，因为现在直接持股的是两个有限合伙，是否要终止原来的其他权益工具的确认，然后增加两个其他非流动金融资产。但是实际上对这两个持股平台的投资，穿透下去就是将对原来甲公司的投资下沉到了对其子公司的投资，投资目的和实质应该算没有发生变化，这种情况下是不是还是只能在其他权益工具投资核算呢（直接穿透确认对丙公司的投资）。期盼陈版指教。 如果这两个有限合伙企业是有限寿命主体，或者由其他原因导致其合伙份额不满足权益工具的定义，则如主帖所述，需终止确认原先对丙公司的“其他权益工具投资”，并初始确认对这两个有限合伙企业的投资（其他非流动金融资产）。虽然“投资目的和实质应该算没有发生变化”，但按照现行金融工具准则规定，也只能如此处理。"}, {"tid": "5496423", "title": "请教版主关于关于公司新开的肯德基加盟店的收入，是按总额法还是净额法", "category": "收入确认/总额净额", "questionAuthor": "xiaoxiao1219", "questionTime": "2026-03-18 09:43:26", "replyTime": "2026-03-20 07:09:35", "replySortTime": "2026-03-20 07:09:35", "url": "https://bbs.esnai.com/thread-5496423-1-4.html", "question": "公司是一个在高速服务区经营的，包括加油站、便利店和餐饮区域，其中餐饮区域本年与肯德基合作，以加盟店的方式，所有环节都委托肯德基提供，包括装修、设备、人员、系统、采购、配送等，公司收取银行流水，同时按月支付授权费费用、各项服务费用。请问版主应该是总额法还是净额法确认收入。", "reply": "如果实际经营是归肯德基方面负责，本企业只是提供场地、收取资金流水，则按净额法核算，并需考虑该交易是否实质上构成一项租赁场地的安排。\n\n如果实际经营由本企业负责，肯德基只是负责提供经营标准和规范方面的指导，在符合肯德基经营标准的前提下，本企业仍有一定的自主经营权，则也有可能应采用总额法核算。\n\n总之具体取决于业务合作的具体模式。", "searchText": "5496423 请教版主关于关于公司新开的肯德基加盟店的收入，是按总额法还是净额法 收入确认/总额净额 xiaoxiao1219 公司是一个在高速服务区经营的，包括加油站、便利店和餐饮区域，其中餐饮区域本年与肯德基合作，以加盟店的方式，所有环节都委托肯德基提供，包括装修、设备、人员、系统、采购、配送等，公司收取银行流水，同时按月支付授权费费用、各项服务费用。请问版主应该是总额法还是净额法确认收入。 如果实际经营是归肯德基方面负责，本企业只是提供场地、收取资金流水，则按净额法核算，并需考虑该交易是否实质上构成一项租赁场地的安排。\n\n如果实际经营由本企业负责，肯德基只是负责提供经营标准和规范方面的指导，在符合肯德基经营标准的前提下，本企业仍有一定的自主经营权，则也有可能应采用总额法核算。\n\n总之具体取决于业务合作的具体模式。"}, {"tid": "5496421", "title": "请教陈版，培训机构考试费的处理", "category": "收入确认/总额净额", "questionAuthor": "不哎上班", "questionTime": "2026-03-17 22:44:56", "replyTime": "2026-03-20 07:06:36", "replySortTime": "2026-03-20 07:06:36", "url": "https://bbs.esnai.com/thread-5496421-1-4.html", "question": "请教陈版：\n\n我们公司是一家无人机培训机构，学费8000元，其中700元是考试费（培训协议也写明了培训费7300，考试费700元），学员经过二个月的培训达标后，我们公司给学员报考，然后由我们公司将700元的考试费交给考试机构，考试结束后考试机构将发票开给我们，考试机构不能给学员开票，另外学员如果挂科了，学员可以在合同有效期内继续免费学习，但是补考费需要另外向我们公司缴纳700元，补考时，再由我们公司向考试机构缴纳700元。\n\n请教陈版，收到和支付的考试费是分别计入收入成本呢？还是做代收代缴处理呢？", "reply": "从主帖信息来看， 此处的考试费的代收代付具有强制性（考试机构不能给学员开票），本企业也不承担因学员不通过考试而需再次考试的考试费支出；考试费标准由考试机构制定，本企业无自主定价权，平进平出。\n\n因此，考试费应按代收代付处理，通过往来款核算，不计入本机构的收入和成本。", "searchText": "5496421 请教陈版，培训机构考试费的处理 收入确认/总额净额 不哎上班 请教陈版：\n\n我们公司是一家无人机培训机构，学费8000元，其中700元是考试费（培训协议也写明了培训费7300，考试费700元），学员经过二个月的培训达标后，我们公司给学员报考，然后由我们公司将700元的考试费交给考试机构，考试结束后考试机构将发票开给我们，考试机构不能给学员开票，另外学员如果挂科了，学员可以在合同有效期内继续免费学习，但是补考费需要另外向我们公司缴纳700元，补考时，再由我们公司向考试机构缴纳700元。\n\n请教陈版，收到和支付的考试费是分别计入收入成本呢？还是做代收代缴处理呢？ 从主帖信息来看， 此处的考试费的代收代付具有强制性（考试机构不能给学员开票），本企业也不承担因学员不通过考试而需再次考试的考试费支出；考试费标准由考试机构制定，本企业无自主定价权，平进平出。\n\n因此，考试费应按代收代付处理，通过往来款核算，不计入本机构的收入和成本。"}, {"tid": "5496412", "title": "关于资产负债表日后事项", "category": "审计/报告表达", "questionAuthor": "踏雪无痕68", "questionTime": "2026-03-17 10:34:27", "replyTime": "2026-03-20 07:02:25", "replySortTime": "2026-03-20 07:02:25", "url": "https://bbs.esnai.com/thread-5496412-1-4.html", "question": "我公司有一笔长期借款10000万，借款期限2025.08.13-2028.08.12。合同约定2026.08.12偿还3000万，2027.08.12偿还3500万，2028.08.12偿还3500万。2025.12.31借款余额为10000万。2025.12.31时点，基于合同约定，将2026.08.12偿还的3000万重分类至“一年内到期的非流动负债”。\n\n但公司于2026.02.10公司提前偿还3332.64万，也未与银行就还款事项签署补充协议。\n\n请教陈版及各位老师，公司于2026.02.10提前偿还的3332.64万是否属于资产负债表日后调整事项（我公司2025年财务报告报出日为2026年4月25日），2025.12.31日报表是否应将该笔长期借款重分类至“一年内到期的非流动负债”金额调整为3332.64万？", "reply": "1、既然未与银行就还款事项签署补充协议，则为何提前偿还部分贷款？是因为2月份资金充足而临时作出的决定，或者其他？这个提前还款事项，站在2025年末时点，基于当时可获得的信息，能否合理预见？这是判断是否属于资产负债表日后调整事项的前提。\n\n2、负债流动性的判断应依据《企业会计准则第30号——财务报表列报（2014年修订）》和《企业会计准则解释第17号》第一条的规定。根据《企业会计准则解释第17号》第一条规定：“对于符合《企业会计准则第30号——财务报表列报》非流动负债划分条件的负债，即使企业有意图或者计划在资产负债表日后一年内（含一年，下同）提前清偿该负债，或者在资产负债表日至财务报告批准报出日之间已提前清偿该负债，该负债仍应归类为非流动负债。”。如果除了合同约定应于1年呢偿还的3000万元以外，额外多偿还的332.64万元并无合同约定，而是本企业自行行使提前还款权的结果，则该332.64万元在2025年末仍属于非流动负债。", "searchText": "5496412 关于资产负债表日后事项 审计/报告表达 踏雪无痕68 我公司有一笔长期借款10000万，借款期限2025.08.13-2028.08.12。合同约定2026.08.12偿还3000万，2027.08.12偿还3500万，2028.08.12偿还3500万。2025.12.31借款余额为10000万。2025.12.31时点，基于合同约定，将2026.08.12偿还的3000万重分类至“一年内到期的非流动负债”。\n\n但公司于2026.02.10公司提前偿还3332.64万，也未与银行就还款事项签署补充协议。\n\n请教陈版及各位老师，公司于2026.02.10提前偿还的3332.64万是否属于资产负债表日后调整事项（我公司2025年财务报告报出日为2026年4月25日），2025.12.31日报表是否应将该笔长期借款重分类至“一年内到期的非流动负债”金额调整为3332.64万？ 1、既然未与银行就还款事项签署补充协议，则为何提前偿还部分贷款？是因为2月份资金充足而临时作出的决定，或者其他？这个提前还款事项，站在2025年末时点，基于当时可获得的信息，能否合理预见？这是判断是否属于资产负债表日后调整事项的前提。\n\n2、负债流动性的判断应依据《企业会计准则第30号——财务报表列报（2014年修订）》和《企业会计准则解释第17号》第一条的规定。根据《企业会计准则解释第17号》第一条规定：“对于符合《企业会计准则第30号——财务报表列报》非流动负债划分条件的负债，即使企业有意图或者计划在资产负债表日后一年内（含一年，下同）提前清偿该负债，或者在资产负债表日至财务报告批准报出日之间已提前清偿该负债，该负债仍应归类为非流动负债。”。如果除了合同约定应于1年呢偿还的3000万元以外，额外多偿还的332.64万元并无合同约定，而是本企业自行行使提前还款权的结果，则该332.64万元在2025年末仍属于非流动负债。"}, {"tid": "5496411", "title": "长期股权投资核算问题", "category": "合并/股权/权益法", "questionAuthor": "踏雪无痕68", "questionTime": "2026-03-17 10:17:12", "replyTime": "2026-03-20 06:55:44", "replySortTime": "2026-03-20 06:55:44", "url": "https://bbs.esnai.com/thread-5496411-1-4.html", "question": "请问陈版，我公司持有一家A公司30%的股权，我公司子公司B公司（我公司对其持股59.5%）持有A公司30%的股权，我公司对A公司股权在我公司个别报表层面采用成本法核算还是权益法核算", "reply": "https://bbs.esnai.com/thread-5496410-1-1.html", "searchText": "5496411 长期股权投资核算问题 合并/股权/权益法 踏雪无痕68 请问陈版，我公司持有一家a公司30%的股权，我公司子公司b公司（我公司对其持股59.5%）持有a公司30%的股权，我公司对a公司股权在我公司个别报表层面采用成本法核算还是权益法核算 https://bbs.esnai.com/thread-5496410-1-1.html"}, {"tid": "5496410", "title": "长期股权投资核算问题", "category": "合并/股权/权益法", "questionAuthor": "踏雪无痕68", "questionTime": "2026-03-17 10:14:47", "replyTime": "2026-03-20 06:55:32"
