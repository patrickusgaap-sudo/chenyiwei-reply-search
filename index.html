投标文件生成根据积分消耗按次确认收入。（积分永久有效与服务期一年不匹配，一年期满大概率积分消耗有结余，a公司认定客户会续费，如果不续费剩余积分可退款。）\n\n请教陈老师 ：\n\n1  没有saas基础运营服务无法生成投标文件，投标文件生成与基础运营服务高度关联，该业务整体构成一项履约义务，这样理解是否正确？\n\n2  整体为一项履约义务，单项履约义务中两种结算模式（基础服务按年收费，产品输出按次收费）收入如何确认? \n\n（1）saas基础运营服务与产品交付为一项履约义务，收入确认为时段法。（2）收入确认金额：每月收入确认金额=基础服务/服务期+当月文件输出消耗金额\n\n请问陈老师上述收入确认处理是否可行？ https://bbs.esnai.cn/thread-5497442-1-1.html https://bbs.esnai.cn/thread-5497514-1-1.html"}, {"tid": "5497511", "title": "上市公司关于员工持股计划授予日的确认", "category": "最近更新", "questionAuthor": "yanxuyan", "questionTime": "2026-06-18T10:00:07.000Z", "replyTime": "2026-06-19T23:38:00.000Z", "replySortTime": "2026-06-19T23:38:00.000Z", "url": "https://bbs.esnai.cn/thread-5497511-1-1.html", "question": "一、背景\n\nA股上市公司分配员工持股计划，在2026年4月21日通过员工持股计划董事会审议，且与员工达成一致协议；在2026年5月5日-5月19日员工陆续完成实际出资认购股份；在2026年5月27日收到中国证券登记结算有限责任公司出具的《证券过户登记确认书》。\n\n二、请教陈版主及各位老师的问题：\n\nA股上市公司分配员工持投计划的授予日是按哪天来确认？会计准则是以“股份支付协议获得批准的日期”确认，有人说应该以收到证券过户登记确认书的时间，也有人说应该按收到员工缴款的时间，后面两种我没理解是基于什么来判断的。请教陈版主及各位老师的解答，感谢！", "reply": "授予日应为2026年4月21日通过员工持股计划董事会审议，且与员工达成一致协议时（如果该计划还需要经过上市公司股东会或者上级母公司、外部监管机构批准的，则还需取得这些批准）。后续员工缴款和在登记公司的登记只是该计划的具体执行步骤，不是会计上确定授予日的依据。\n\n如果有员工虽然签了协议，但未在规定期限内缴款的，则也视为该部分股份已被授予，但因该员工放弃而需做加速可行权处理。", "searchText": "5497511 上市公司关于员工持股计划授予日的确认 最近更新 yanxuyan 2026-06-18t10:00:07.000z 2026-06-19t23:38:00.000z 一、背景\n\na股上市公司分配员工持股计划，在2026年4月21日通过员工持股计划董事会审议，且与员工达成一致协议；在2026年5月5日-5月19日员工陆续完成实际出资认购股份；在2026年5月27日收到中国证券登记结算有限责任公司出具的《证券过户登记确认书》。\n\n二、请教陈版主及各位老师的问题：\n\na股上市公司分配员工持投计划的授予日是按哪天来确认？会计准则是以“股份支付协议获得批准的日期”确认，有人说应该以收到证券过户登记确认书的时间，也有人说应该按收到员工缴款的时间，后面两种我没理解是基于什么来判断的。请教陈版主及各位老师的解答，感谢！ 授予日应为2026年4月21日通过员工持股计划董事会审议，且与员工达成一致协议时（如果该计划还需要经过上市公司股东会或者上级母公司、外部监管机构批准的，则还需取得这些批准）。后续员工缴款和在登记公司的登记只是该计划的具体执行步骤，不是会计上确定授予日的依据。\n\n如果有员工虽然签了协议，但未在规定期限内缴款的，则也视为该部分股份已被授予，但因该员工放弃而需做加速可行权处理。 https://bbs.esnai.cn/thread-5497511-1-1.html"}, {"tid": "5497510", "title": "关于上市公司股份支付中员工持股计划授予日的确认", "category": "最近更新", "questionAuthor": "yanxuyan", "questionTime": "2026-06-18T10:00:07.000Z", "replyTime": "2026-06-19T23:35:00.000Z", "replySortTime": "2026-06-19T23:35:00.000Z", "url": "https://bbs.esnai.cn/thread-5497510-1-1.html", "question": "一、目前的情况是这样：上市公司A在2026年4月21日通过关于员工持股计划分配的董事会审议，且与员工达成一致协议。2026年5月5日到5月19日员工陆续完成实际出资认购股份，2026年5月27日收到中国证券登记结算有限责任公司出具的《证券过户登记确认书》。", "reply": "https://bbs.esnai.cn/thread-5497511-1-1.html", "searchText": "5497510 关于上市公司股份支付中员工持股计划授予日的确认 最近更新 yanxuyan 2026-06-18t10:00:07.000z 2026-06-19t23:35:00.000z 一、目前的情况是这样：上市公司a在2026年4月21日通过关于员工持股计划分配的董事会审议，且与员工达成一致协议。2026年5月5日到5月19日员工陆续完成实际出资认购股份，2026年5月27日收到中国证券登记结算有限责任公司出具的《证券过户登记确认书》。 https://bbs.esnai.cn/thread-5497511-1-1.html https://bbs.esnai.cn/thread-5497510-1-1.html"}, {"tid": "5497495", "title": "请问陈版：关于设计公司分包成本的问题", "category": "最近更新", "questionAuthor": "mafa", "questionTime": "2026-06-17T10:00:06.000Z", "replyTime": "2026-06-19T23:33:00.000Z", "replySortTime": "2026-06-19T23:33:00.000Z", "url": "https://bbs.esnai.cn/thread-5497495-1-1.html", "question": "背景：母公司对外承接业务；母公司把业务交给分公司实际执行；母公司又和第三方分包单位签订分包合同；第三方分包单位把发票开给母公司；现在需要确定成本、进项税和母分公司往来账怎么处理。\n\n母公司做账：1.确认收入100万：\n\n借：应收账款  100\n\n贷：主营业务收入 94\n\n贷：销项税  6\n\n2.分包给分公司80万，分公司开票给母公司80万：\n\n借：主营业务成本 75\n\n借：进项税 5\n\n贷：其他应付款-分公司 80\n\n3.代分公司支付分包款10万：\n\n借：其他应收款-分公司 9.4\n\n借：进项税 0.6（第三方直接开票给母公司）\n\n贷：银行存款 10\n\n分公司做账：\n\n1.分公司开票80万，确认收入：\n\n借：其他应收款-母公司  80\n\n   贷：主营业务收入     75\n\n   贷：销项税           5\n\n2.母公司代付分包费10万，确认成本：\n\n借：主营业务成本  9.4（不含税金额）\n\n贷：其他应付款-分公司  9.4\n\n结算时\n\n母公司应付分公司80-9.4=70.6万\n\n1.        母公司做账\n\n借：其他应付款-分公司 80\n\n   贷：银行存款 70.6\n\n   贷：其他应收款 9.4\n\n2.        分公司\n\n借：银行存款 70.6\n\n其他应付款-母公司 9.4\n\n贷：其他应收款-母公司 80\n\n以上做法对吗，第三方发票开给母公司，母公司抵扣进项税；母公司把不含税金额作为对分公司的内部往来；分公司根据内部结算单确认成本。这样往来都能平，但是分公司那边没有收到票却确认了成本，税务上有没有异常。", "reply": "在分公司作为主要责任人的前提下，主帖中的账务处理无明显问题。但建议考虑总部给分公司是否应开票而不仅仅是开具内部结算单。相关税务风险问题建议咨询税务专业人士意见。", "searchText": "5497495 请问陈版：关于设计公司分包成本的问题 最近更新 mafa 2026-06-17t10:00:06.000z 2026-06-19t23:33:00.000z 背景：母公司对外承接业务；母公司把业务交给分公司实际执行；母公司又和第三方分包单位签订分包合同；第三方分包单位把发票开给母公司；现在需要确定成本、进项税和母分公司往来账怎么处理。\n\n母公司做账：1.确认收入100万：\n\n借：应收账款  100\n\n贷：主营业务收入 94\n\n贷：销项税  6\n\n2.分包给分公司80万，分公司开票给母公司80万：\n\n借：主营业务成本 75\n\n借：进项税 5\n\n贷：其他应付款-分公司 80\n\n3.代分公司支付分包款10万：\n\n借：其他应收款-分公司 9.4\n\n借：进项税 0.6（第三方直接开票给母公司）\n\n贷：银行存款 10\n\n分公司做账：\n\n1.分公司开票80万，确认收入：\n\n借：其他应收款-母公司  80\n\n   贷：主营业务收入     75\n\n   贷：销项税           5\n\n2.母公司代付分包费10万，确认成本：\n\n借：主营业务成本  9.4（不含税金额）\n\n贷：其他应付款-分公司  9.4\n\n结算时\n\n母公司应付分公司80-9.4=70.6万\n\n1.        母公司做账\n\n借：其他应付款-分公司 80\n\n   贷：银行存款 70.6\n\n   贷：其他应收款 9.4\n\n2.        分公司\n\n借：银行存款 70.6\n\n其他应付款-母公司 9.4\n\n贷：其他应收款-母公司 80\n\n以上做法对吗，第三方发票开给母公司，母公司抵扣进项税；母公司把不含税金额作为对分公司的内部往来；分公司根据内部结算单确认成本。这样往来都能平，但是分公司那边没有收到票却确认了成本，税务上有没有异常。 在分公司作为主要责任人的前提下，主帖中的账务处理无明显问题。但建议考虑总部给分公司是否应开票而不仅仅是开具内部结算单。相关税务风险问题建议咨询税务专业人士意见。 https://bbs.esnai.cn/thread-5497495-1-1.html"}, {"tid": "5497496", "title": "公司食堂的折旧费用是否属于职工福利支出", "category": "最近更新", "questionAuthor": "鞋带松了", "questionTime": "2026-06-17T10:00:07.000Z", "replyTime": "2026-06-19T23:22:00.000Z", "replySortTime": "2026-06-19T23:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497496-1-1.html", "question": "请教陈版主：\n\n   公司盖食堂用于工厂员工日常用餐，该食堂相应计提的折旧费用是否属于员职工福利支出，需按照14%的限额规定，超出部分不得税前抵扣？个人觉得该食堂是为公司员工用餐所建设，亦不对外营业，所以其相应的折旧也应计入职工福利费按限额进行抵扣，但查阅相关资料中提及的职工福利中并未提及建筑物的折旧，请版主赐教，谢谢~\n\n相关资料：根据《国家税务总局关于企业工资薪金及职工福利费扣除问题的通知》（国税函〔2009〕3号）及《企业所得税法实施条例》规定，职工福利费包括：内设福利部门（如职工食堂）的设备、设施及维修保养费用，以及福利部门工作人员的工资薪金、社保等；同时包括为职工生活发放的职工食堂经费补贴。", "reply": "根据《关于企业加强职工福利费财务管理的通知》（财企[2009]242号）规定，“企业尚未分离的内设集体福利部门所发生的设备、设施和人员费用，包括职工食堂、职工浴室、理发室、医务所、托儿所、疗养院、集体宿舍等集体福利部门设备、设施的折旧、维修保养费用以及集体福利部门工作人员的工资薪金、社会保险费、住房公积金、劳务费等人工费用”属于职工福利费范围。税务处理中也可能参照这一口径，具体建议与主管税务机关沟通确认。", "searchText": "5497496 公司食堂的折旧费用是否属于职工福利支出 最近更新 鞋带松了 2026-06-17t10:00:07.000z 2026-06-19t23:22:00.000z 请教陈版主：\n\n   公司盖食堂用于工厂员工日常用餐，该食堂相应计提的折旧费用是否属于员职工福利支出，需按照14%的限额规定，超出部分不得税前抵扣？个人觉得该食堂是为公司员工用餐所建设，亦不对外营业，所以其相应的折旧也应计入职工福利费按限额进行抵扣，但查阅相关资料中提及的职工福利中并未提及建筑物的折旧，请版主赐教，谢谢~\n\n相关资料：根据《国家税务总局关于企业工资薪金及职工福利费扣除问题的通知》（国税函〔2009〕3号）及《企业所得税法实施条例》规定，职工福利费包括：内设福利部门（如职工食堂）的设备、设施及维修保养费用，以及福利部门工作人员的工资薪金、社保等；同时包括为职工生活发放的职工食堂经费补贴。 根据《关于企业加强职工福利费财务管理的通知》（财企[2009]242号）规定，“企业尚未分离的内设集体福利部门所发生的设备、设施和人员费用，包括职工食堂、职工浴室、理发室、医务所、托儿所、疗养院、集体宿舍等集体福利部门设备、设施的折旧、维修保养费用以及集体福利部门工作人员的工资薪金、社会保险费、住房公积金、劳务费等人工费用”属于职工福利费范围。税务处理中也可能参照这一口径，具体建议与主管税务机关沟通确认。 https://bbs.esnai.cn/thread-5497496-1-1.html"}, {"tid": "5497497", "title": "香港PayPal账户货币兑换汇率含手续费，是否需要手动拆分？", "category": "最近更新", "questionAuthor": "baibingbing132y", "questionTime": "2026-06-17T10:00:06.000Z", "replyTime": "2026-06-19T23:20:00.000Z", "replySortTime": "2026-06-19T23:20:00.000Z", "url": "https://bbs.esnai.cn/thread-5497497-1-1.html", "question": "香港公司的PayPal账户货币兑换含3%-4%手续费，例如100港币只能兑换成12.5美元，即1美元≈8港币，交易明细港币户支出100港币，美元户进账12.5美元。\n\n问题：是否需要择出财务费用-货币兑换 和财务费用-手续费呢？\n\n提前谢谢陈版回复啦。", "reply": "如能够合理确定手续费金额的，则应对两者进行拆分（在实际兑换时确认手续费支出）。期末汇兑损益调整时不考虑日后兑换时可能需发生的手续费支出。", "searchText": "5497497 香港paypal账户货币兑换汇率含手续费，是否需要手动拆分？ 最近更新 baibingbing132y 2026-06-17t10:00:06.000z 2026-06-19t23:20:00.000z 香港公司的paypal账户货币兑换含3%-4%手续费，例如100港币只能兑换成12.5美元，即1美元≈8港币，交易明细港币户支出100港币，美元户进账12.5美元。\n\n问题：是否需要择出财务费用-货币兑换 和财务费用-手续费呢？\n\n提前谢谢陈版回复啦。 如能够合理确定手续费金额的，则应对两者进行拆分（在实际兑换时确认手续费支出）。期末汇兑损益调整时不考虑日后兑换时可能需发生的手续费支出。 https://bbs.esnai.cn/thread-5497497-1-1.html"}, {"tid": "5497499", "title": "大电网控制的上市公司接收用户资产是国有独享还是全体股东享有？", "category": "最近更新", "questionAuthor": "rpfhot", "questionTime": "2026-06-17T10:00:07.000Z", "replyTime": "2026-06-19T23:18:00.000Z", "replySortTime": "2026-06-19T23:18:00.000Z", "url": "https://bbs.esnai.cn/thread-5497499-1-1.html", "question": "A上市公司，属大电网控股的上市公司，其在日常经营活动中会按规定接受部分电力用户移交的电力资产，接收时计入“资本公积”，根据《财政部关于电网企业接收用户资产有关财务处理问题的通知》（财企[2011]129号）规定：“电网公司接收用户资产，在清产核资基础上，按全部接收用户资产净额作增加集团公司国家资本金处理，全资、控股企业相应作增加法人资本金处理”。现在A的控股股东（大电网）要求按照前述政策文件，将已接收的用户资产履行相关程序后转增实收资本（国有独享）或在资本公积中作为国有独享。该部分权益应该归属国有独享还是上市公司全体股东享有？", "reply": "依据上述规定，应作为国有独享权益处理（除电网集团公司以外的其他股东不享有该部分权益）。如转增国家资本金的，则应按照上市公司定向增发的程序执行。\n\n为了区分该部分国有独享权益，建议参照《关于印发加强企业财务信息管理暂行规定的通知》（财企[2012]23号）第八条规定处理：\n\n    企业收到的财政性资金应当纳入企业预算管理，实现资金统一管控，提高财政性资金使用的整体效益。企业收到资本性财政性资金，列作国有实收资本或股本，企业股东(大)会或董事会、经理办公会等决策机构应当出具同意注(增)资的书面材料。企业一个会计年度内多次收到资本性财政性资金的，可暂作资本公积，但应在次年履行法定程序转增国有实收资本或股本；发生增资扩股、改制上市等事项，应当及时转增。\n\n    企业集团母公司将资本性财政性资金拨付所属全资或控股法人企业使用的，应当作为股权投资。母公司所属控股法人企业暂无增资扩股计划的，列作委托贷款，与母公司签订协议，约定在发生增资扩股、改制上市等事项时，依法将委托贷款转为母公司的股权投资。\n\n    企业收到费用性财政性资金，列作收益，符合《财政部国家税务总局关于专项用途财政性资金企业所得税处理问题的通知》(财税[2011]70号)规定不征税条件的，可作为不征税收入。企业按规定将费用性财政性资金拨付所属全资或控股法人企业使用，中间拨付环节企业均作为往来款项。", "searchText": "5497499 大电网控制的上市公司接收用户资产是国有独享还是全体股东享有？ 最近更新 rpfhot 2026-06-17t10:00:07.000z 2026-06-19t23:18:00.000z a上市公司，属大电网控股的上市公司，其在日常经营活动中会按规定接受部分电力用户移交的电力资产，接收时计入“资本公积”，根据《财政部关于电网企业接收用户资产有关财务处理问题的通知》（财企[2011]129号）规定：“电网公司接收用户资产，在清产核资基础上，按全部接收用户资产净额作增加集团公司国家资本金处理，全资、控股企业相应作增加法人资本金处理”。现在a的控股股东（大电网）要求按照前述政策文件，将已接收的用户资产履行相关程序后转增实收资本（国有独享）或在资本公积中作为国有独享。该部分权益应该归属国有独享还是上市公司全体股东享有？ 依据上述规定，应作为国有独享权益处理（除电网集团公司以外的其他股东不享有该部分权益）。如转增国家资本金的，则应按照上市公司定向增发的程序执行。\n\n为了区分该部分国有独享权益，建议参照《关于印发加强企业财务信息管理暂行规定的通知》（财企[2012]23号）第八条规定处理：\n\n    企业收到的财政性资金应当纳入企业预算管理，实现资金统一管控，提高财政性资金使用的整体效益。企业收到资本性财政性资金，列作国有实收资本或股本，企业股东(大)会或董事会、经理办公会等决策机构应当出具同意注(增)资的书面材料。企业一个会计年度内多次收到资本性财政性资金的，可暂作资本公积，但应在次年履行法定程序转增国有实收资本或股本；发生增资扩股、改制上市等事项，应当及时转增。\n\n    企业集团母公司将资本性财政性资金拨付所属全资或控股法人企业使用的，应当作为股权投资。母公司所属控股法人企业暂无增资扩股计划的，列作委托贷款，与母公司签订协议，约定在发生增资扩股、改制上市等事项时，依法将委托贷款转为母公司的股权投资。\n\n    企业收到费用性财政性资金，列作收益，符合《财政部国家税务总局关于专项用途财政性资金企业所得税处理问题的通知》(财税[2011]70号)规定不征税条件的，可作为不征税收入。企业按规定将费用性财政性资金拨付所属全资或控股法人企业使用，中间拨付环节企业均作为往来款项。 https://bbs.esnai.cn/thread-5497499-1-1.html"}, {"tid": "5497501", "title": "少数股东增资，股权稀释丧失控制权，单体及合并层面处理？", "category": "最近更新", "questionAuthor": "rourou24", "questionTime": "2026-06-17T10:00:07.000Z", "replyTime": "2026-06-19T23:12:00.000Z", "replySortTime": "2026-06-19T23:12:00.000Z", "url": "https://bbs.esnai.cn/thread-5497501-1-1.html", "question": "问题：A、B共同成立C，C股本200万，A出资110万持股55%，B出资90万占股45%，现新股东加入，各股东计划共同增资至1000万，A继续增资240万，已部分实缴但未完全到位，同时A股权被稀释到35%丧失控制权，截止目前C股本470万（其中A占140万），未分配利润-260万，当期净利润-80万", "reply": "A个别报表层面：首先将本次增资额30万元计入对C的长期股权投资成本，后续按照《企业会计准则解释第7号》第一条规定进行丧失控制权的会计处理。\n\nA合并报表层面：丧失控制权时点对剩余股权按公允价值重新计量，差额确认投资收益，后续对继续持有的股权改按权益法核算（假设对C仍有重大影响）。\n\n无论是个别报表还是合并报表层面，在实缴出资比例不同于认缴出资比例，且被投资企业持续亏损的情况下，都应注意合理、谨慎地确定本企业在被投资企业的净利润、净亏损中应享有和分担的份额。一般原则是：如果C的公司章程或者股东协议有明确约定的，则从其约定；如无明确约定或约定不明确的，则按谨慎原则从高确认应分担的亏损份额。", "searchText": "5497501 少数股东增资，股权稀释丧失控制权，单体及合并层面处理？ 最近更新 rourou24 2026-06-17t10:00:07.000z 2026-06-19t23:12:00.000z 问题：a、b共同成立c，c股本200万，a出资110万持股55%，b出资90万占股45%，现新股东加入，各股东计划共同增资至1000万，a继续增资240万，已部分实缴但未完全到位，同时a股权被稀释到35%丧失控制权，截止目前c股本470万（其中a占140万），未分配利润-260万，当期净利润-80万 a个别报表层面：首先将本次增资额30万元计入对c的长期股权投资成本，后续按照《企业会计准则解释第7号》第一条规定进行丧失控制权的会计处理。\n\na合并报表层面：丧失控制权时点对剩余股权按公允价值重新计量，差额确认投资收益，后续对继续持有的股权改按权益法核算（假设对c仍有重大影响）。\n\n无论是个别报表还是合并报表层面，在实缴出资比例不同于认缴出资比例，且被投资企业持续亏损的情况下，都应注意合理、谨慎地确定本企业在被投资企业的净利润、净亏损中应享有和分担的份额。一般原则是：如果c的公司章程或者股东协议有明确约定的，则从其约定；如无明确约定或约定不明确的，则按谨慎原则从高确认应分担的亏损份额。 https://bbs.esnai.cn/thread-5497501-1-1.html"}, {"tid": "5497502", "title": "无偿接收资产的核算", "category": "最近更新", "questionAuthor": "18819490381", "questionTime": "2026-06-17T10:00:06.000Z", "replyTime": "2026-06-19T23:07:00.000Z", "replySortTime": "2026-06-19T23:07:00.000Z", "url": "https://bbs.esnai.cn/thread-5497502-1-1.html", "question": "陈版主，请教一下。政府单位将一批资产无偿转让给A公司（已明确不是股权投资方式投入），资产有如标语牌、应急照明灯、电动三轮车、空调、监控设备等等，政府单位使用该批资产已经有几年了。                                                                                                                                                   问题1：A公司入账该批资产能沿用政府单位账面上的资产原值吗,还是应按公允价值作为初始价值入账呢？                                                                     问题2：A公司将该批资产入账是要作为固定资产核算吗?如果作为固定资产核算，折旧年限应该怎么确定呢？部分资产在政府单位的账面上已计提完折旧了。后续如何核算呢？                                                                                                                                                                                          问题3：A公司无偿接收该批资产，能分类为与资产相关的政府补助吗？", "reply": "1、从主帖所述资产目录来看，这些资产应该是不构成业务的，应按评估的公允价值入账。\n\n2、根据取得资产后的用途确定，如拟用于生产商品、提供劳务、出租或经营管理目的，且剩余使用寿命超过一年、价值超过固定资产单位金额下限的，则确认为固定资产。\n\n3、根据企业与政府的关系、政府划拨该批资产的目的等因素考虑，通常理解更大的可能性是政府对企业的资本性投入，应贷记资本公积。", "searchText": "5497502 无偿接收资产的核算 最近更新 18819490381 2026-06-17t10:00:06.000z 2026-06-19t23:07:00.000z 陈版主，请教一下。政府单位将一批资产无偿转让给a公司（已明确不是股权投资方式投入），资产有如标语牌、应急照明灯、电动三轮车、空调、监控设备等等，政府单位使用该批资产已经有几年了。                                                                                                                                                   问题1：a公司入账该批资产能沿用政府单位账面上的资产原值吗,还是应按公允价值作为初始价值入账呢？                                                                     问题2：a公司将该批资产入账是要作为固定资产核算吗?如果作为固定资产核算，折旧年限应该怎么确定呢？部分资产在政府单位的账面上已计提完折旧了。后续如何核算呢？                                                                                                                                                                                          问题3：a公司无偿接收该批资产，能分类为与资产相关的政府补助吗？ 1、从主帖所述资产目录来看，这些资产应该是不构成业务的，应按评估的公允价值入账。\n\n2、根据取得资产后的用途确定，如拟用于生产商品、提供劳务、出租或经营管理目的，且剩余使用寿命超过一年、价值超过固定资产单位金额下限的，则确认为固定资产。\n\n3、根据企业与政府的关系、政府划拨该批资产的目的等因素考虑，通常理解更大的可能性是政府对企业的资本性投入，应贷记资本公积。 https://bbs.esnai.cn/thread-5497502-1-1.html"}, {"tid": "5497493", "title": "求助陈版主一个关于副产品/废品的问题", "category": "最近更新", "questionAuthor": "tommysdp", "questionTime": "2026-06-16T10:00:06.000Z", "replyTime": "2026-06-19T22:34:00.000Z", "replySortTime": "2026-06-19T22:34:00.000Z", "url": "https://bbs.esnai.cn/thread-5497493-1-1.html", "question": "陈版主好，我们这边生产会同时产出主要产品A和少量的B，B这个东西现在没人要，可能短期内（一两年内）都没人要，但老板估计这个东西中期（3年左右）一定会有很高价值，所以一直堆在仓库里。想请教陈版主的是，在这种情况下，作为审计师来看，B应不应该分摊成本，应当用怎样的会计理解去判断这个事情，如果分摊的话，跌价有没有什么较好的方法确定。", "reply": "从主帖信息来看，B的未来经济价值有较大不确定性，可能不满足确认为资产的条件。在此情况下，建议B不分摊成本，全部生产成本均分配给主要产品A。对B的库存数量进行账外备查登记即可。", "searchText": "5497493 求助陈版主一个关于副产品/废品的问题 最近更新 tommysdp 2026-06-16t10:00:06.000z 2026-06-19t22:34:00.000z 陈版主好，我们这边生产会同时产出主要产品a和少量的b，b这个东西现在没人要，可能短期内（一两年内）都没人要，但老板估计这个东西中期（3年左右）一定会有很高价值，所以一直堆在仓库里。想请教陈版主的是，在这种情况下，作为审计师来看，b应不应该分摊成本，应当用怎样的会计理解去判断这个事情，如果分摊的话，跌价有没有什么较好的方法确定。 从主帖信息来看，b的未来经济价值有较大不确定性，可能不满足确认为资产的条件。在此情况下，建议b不分摊成本，全部生产成本均分配给主要产品a。对b的库存数量进行账外备查登记即可。 https://bbs.esnai.cn/thread-5497493-1-1.html"}, {"tid": "5497478", "title": "对方不是政府或者政府的授权人的BOT项目，能够按照ppp项目的规定进行会计处理吗", "category": "最近更新", "questionAuthor": "注会侯", "questionTime": "2026-06-15T10:00:06.000Z", "replyTime": "2026-06-19T22:25:00.000Z", "replySortTime": "2026-06-19T22:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5497478-1-1.html", "question": "选煤厂BOT项目通常是指社会资本方（项目公司）与国有企业签订BOT合同，由社会资本方负责融资建设选煤厂基础设施，在约定运营期内通过收取洗选加工费的方式收回投资成本并获得合理回报，运营期满后将项目资产无偿移交给国有企业。\n\n结算规则：总费用 =投资返还费（固定保底金额）+ 生产运营费（吨煤单价 × 销量）\n\n       问题1：该项目是否可以按照ppp项目的混合模式（金融资产+无形资产）进行会计处理，如不适用，账务处理应该使用哪项准则。：\n\n      问题2：两项收费，应该怎样开票比较合理。投资返还费（固定保底金额）是投资本金加上合理利息，其中利息部分作为\"贷款服务\"6%开票是否可行； \n\n     由于我公司营业执照上没有“煤炭洗选”这项营业范围，而实际运营期的煤炭洗选业务我公司也是外包给其他公司做，所以生产运营费（吨煤单价 × 销量）这部分的收入，是否可以按照6%的“现代服务”进行开票。", "reply": "该类业务可类比合同能源管理业务，参考《上市公司执行企业会计准则案例解析2024》之“案例6-01 合同能源管理业务的收入确认”所述原则处理。可以选择租赁模式或者PPP会计模式，但证监会更倾向于采用租赁模式。\n\n如果采用PPP模式的，则应根据“投资返还费（固定保底金额）”是否足以保证建设投资和融资成本回收，来确定属于金融资产模式还是混合模式。如果可以，则属于金融资产模式。相应地，在该情况下，如采用租赁会计模式，则属于融资租赁。\n\n运营服务的外包，表明运营服务作为一项单项履约义务很可能需采用净额法核算。对建设服务也需要注意判断本企业是否为代理人，谨慎采用总额法核算。\n\n开票和税率确定等税务处理问题建议咨询税务专业人士意见。", "searchText": "5497478 对方不是政府或者政府的授权人的bot项目，能够按照ppp项目的规定进行会计处理吗 最近更新 注会侯 2026-06-15t10:00:06.000z 2026-06-19t22:25:00.000z 选煤厂bot项目通常是指社会资本方（项目公司）与国有企业签订bot合同，由社会资本方负责融资建设选煤厂基础设施，在约定运营期内通过收取洗选加工费的方式收回投资成本并获得合理回报，运营期满后将项目资产无偿移交给国有企业。\n\n结算规则：总费用 =投资返还费（固定保底金额）+ 生产运营费（吨煤单价 × 销量）\n\n       问题1：该项目是否可以按照ppp项目的混合模式（金融资产+无形资产）进行会计处理，如不适用，账务处理应该使用哪项准则。：\n\n      问题2：两项收费，应该怎样开票比较合理。投资返还费（固定保底金额）是投资本金加上合理利息，其中利息部分作为\"贷款服务\"6%开票是否可行； \n\n     由于我公司营业执照上没有“煤炭洗选”这项营业范围，而实际运营期的煤炭洗选业务我公司也是外包给其他公司做，所以生产运营费（吨煤单价 × 销量）这部分的收入，是否可以按照6%的“现代服务”进行开票。 该类业务可类比合同能源管理业务，参考《上市公司执行企业会计准则案例解析2024》之“案例6-01 合同能源管理业务的收入确认”所述原则处理。可以选择租赁模式或者ppp会计模式，但证监会更倾向于采用租赁模式。\n\n如果采用ppp模式的，则应根据“投资返还费（固定保底金额）”是否足以保证建设投资和融资成本回收，来确定属于金融资产模式还是混合模式。如果可以，则属于金融资产模式。相应地，在该情况下，如采用租赁会计模式，则属于融资租赁。\n\n运营服务的外包，表明运营服务作为一项单项履约义务很可能需采用净额法核算。对建设服务也需要注意判断本企业是否为代理人，谨慎采用总额法核算。\n\n开票和税率确定等税务处理问题建议咨询税务专业人士意见。 https://bbs.esnai.cn/thread-5497478-1-1.html"}, {"tid": "5497474", "title": "固定资产会计处理", "category": "最近更新", "questionAuthor": "zhanlianke", "questionTime": "2026-06-15T10:00:05.000Z", "replyTime": "2026-06-19T22:15:00.000Z", "replySortTime": "2026-06-19T22:15:00.000Z", "url": "https://bbs.esnai.cn/thread-5497474-1-1.html", "question": "公司向供应商租赁3D打印设备（设备对外直接销售31.5万），租赁期为3年，同时向它购买原材料，原材料市场价格90元/KG，但是按125元/KG（这里面包括90元的材料费用和35元的设备租金），约定如果3年内每年按125元/KG购买3000KG材料后，该3D打印设备就归公司所有（35*3000*3=31.5万元），之后每KG材料为90元。如果3年内每年按125元/KG购买材料款未达到3000KG后，那么3D打印设备归供应商所里，所支付的作为租金，请问这种应该算购买设备还是租赁设备，会计上应该如何处理？", "reply": "公司应合理估计达到“3年内每年按125元/KG购买3000KG材料”这一条件的可能性。如果认为很可能达到的，则该交易是以31.5万元总价购买3000KG材料和设备，应将该总价按市价比例合理分摊到设备和材料，分别按照采购处理；如果预计无法达到或者不确定能否达到，则按可变租金+按市价购买材料处理。\n\n如果在3年内因情况变化导致这一估计发生变化的，则对会计处理模式的改变属于会计估计变更。", "searchText": "5497474 固定资产会计处理 最近更新 zhanlianke 2026-06-15t10:00:05.000z 2026-06-19t22:15:00.000z 公司向供应商租赁3d打印设备（设备对外直接销售31.5万），租赁期为3年，同时向它购买原材料，原材料市场价格90元/kg，但是按125元/kg（这里面包括90元的材料费用和35元的设备租金），约定如果3年内每年按125元/kg购买3000kg材料后，该3d打印设备就归公司所有（35*3000*3=31.5万元），之后每kg材料为90元。如果3年内每年按125元/kg购买材料款未达到3000kg后，那么3d打印设备归供应商所里，所支付的作为租金，请问这种应该算购买设备还是租赁设备，会计上应该如何处理？ 公司应合理估计达到“3年内每年按125元/kg购买3000kg材料”这一条件的可能性。如果认为很可能达到的，则该交易是以31.5万元总价购买3000kg材料和设备，应将该总价按市价比例合理分摊到设备和材料，分别按照采购处理；如果预计无法达到或者不确定能否达到，则按可变租金+按市价购买材料处理。\n\n如果在3年内因情况变化导致这一估计发生变化的，则对会计处理模式的改变属于会计估计变更。 https://bbs.esnai.cn/thread-5497474-1-1.html"}, {"tid": "5497475", "title": "固定资产会计处理", "category": "最近更新", "questionAuthor": "zhanlianke", "questionTime": "2026-06-15T10:00:06.000Z", "replyTime": "2026-06-19T22:15:00.000Z", "replySortTime": "2026-06-19T22:15:00.000Z", "url": "https://bbs.esnai.cn/thread-5497475-1-1.html", "question": "公司向供应商租赁3D打印设备（设备对外直接销售10.5万），租赁期为3年，同时向它购买原材料，原材料市场价格90元/KG，但是按125元/KG（这里面包括90元的材料费用和35元的设备租金），约定如果3年内按125元/KG购买3000KG材料后，该3D打印设备就归公司所有（35*3000=10.5万元），之后每KG材料为90元。如果3年内按125元/KG购买材料款未达到3000KG后，那么3D打印设备还是归供应商所里，所支付的费用作为租金，请问这种应该算购买设备还是租赁设备，会计上应该如何处理？", "reply": "https://bbs.esnai.cn/forum.php?mod=viewthread&tid=5497474", "searchText": "5497475 固定资产会计处理 最近更新 zhanlianke 2026-06-15t10:00:06.000z 2026-06-19t22:15:00.000z 公司向供应商租赁3d打印设备（设备对外直接销售10.5万），租赁期为3年，同时向它购买原材料，原材料市场价格90元/kg，但是按125元/kg（这里面包括90元的材料费用和35元的设备租金），约定如果3年内按125元/kg购买3000kg材料后，该3d打印设备就归公司所有（35*3000=10.5万元），之后 egory": "最近更新", "questionAuthor": "佳木jj", "questionTime": "2026-06-02T02:39:39.000Z", "replyTime": "2026-06-13T07:00:34.000Z", "replySortTime": "2026-06-13T07:00:34.000Z", "url": "https://bbs.esnai.cn/thread-5497334-1-1.html", "question": "背景：A公司持有B公司65%股权，A公司将事业部剥离，并出售给B公司。其中，事业部包含：资产、业务、团队、雇员，资产（存货、固定资产、无形资产）账面价值200万，第三方评估公司按照收益法对事业部进行价值评估，评估价值1.5亿。\n\n求助各位版主，以上业务是否构成业务合并，A公司、B公司、合并报表应该如何进行会计处理，以及目前有公开案例可供参考吗，谢谢\n\n---\n\n陈版，目前剥离的事业部分资产账面价值只有200万，但评估作价1.5亿，并且B公司也打算现金支付对价1.5亿，这块差价A公司全部确定为资产处置损益是否风险过大；另外网络检索有确认为资本公积的建议，这种方案是不可行的吗，想搜索披露的公开案例也没有完全一致的，", "reply": "对子公司B而言，从母公司取得事业部构成“业务”，故属于同一控制下合并。\n\nA公司个别报表层面按照处置资产处理，在作价公允的前提下，处置差额可确认为资产处置损益。\n\nB公司按同一控制下合并的处理原则，取得各项资产和负债按其在A公司的原账面价值入账，与支付对价金额之间的差额调整权益。如果B公司有其他子公司，需编制合并报表的，则在合并报表中对其进行追溯重述处理。\n\nA公司合并报表层面：系母子公司之间的交易，应进行合并抵销处理，即A公司个别报表层面确认的资产处置损益与B公司冲减权益的金额互抵。最终对A的合并报表无影响。\n\n---\n\n关键在于判断该评估值（公允价值）的合理性。在作价公允合理的前提下，置出方可确认资产处置损益，而不是资本公积。确认资本公积的做法不符合权益***易的一般原理。", "searchText": "5497334 求助陈版，剥离事业部给子公司相关会计处理 最近更新 佳木jj 2026-06-02t02:39:39.000z 2026-06-13t07:00:34.000z 背景：a公司持有b公司65%股权，a公司将事业部剥离，并出售给b公司。其中，事业部包含：资产、业务、团队、雇员，资产（存货、固定资产、无形资产）账面价值200万，第三方评估公司按照收益法对事业部进行价值评估，评估价值1.5亿。\n\n求助各位版主，以上业务是否构成业务合并，a公司、b公司、合并报表应该如何进行会计处理，以及目前有公开案例可供参考吗，谢谢\n\n---\n\n陈版，目前剥离的事业部分资产账面价值只有200万，但评估作价1.5亿，并且b公司也打算现金支付对价1.5亿，这块差价a公司全部确定为资产处置损益是否风险过大；另外网络检索有确认为资本公积的建议，这种方案是不可行的吗，想搜索披露的公开案例也没有完全一致的， 对子公司b而言，从母公司取得事业部构成“业务”，故属于同一控制下合并。\n\na公司个别报表层面按照处置资产处理，在作价公允的前提下，处置差额可确认为资产处置损益。\n\nb公司按同一控制下合并的处理原则，取得各项资产和负债按其在a公司的原账面价值入账，与支付对价金额之间的差额调整权益。如果b公司有其他子公司，需编制合并报表的，则在合并报表中对其进行追溯重述处理。\n\na公司合并报表层面：系母子公司之间的交易，应进行合并抵销处理，即a公司个别报表层面确认的资产处置损益与b公司冲减权益的金额互抵。最终对a的合并报表无影响。\n\n---\n\n关键在于判断该评估值（公允价值）的合理性。在作价公允合理的前提下，置出方可确认资产处置损益，而不是资本公积。确认资本公积的做法不符合权益***易的一般原理。 https://bbs.esnai.cn/thread-5497334-1-1.html"}, {"tid": "5497364", "title": "关于外汇掉期业务实务处理", "category": "最近更新", "questionAuthor": "zhaoyouhao", "questionTime": "2026-06-04T15:21:25.000Z", "replyTime": "2026-06-10T23:44:00.000Z", "replySortTime": "2026-06-10T23:44:00.000Z", "url": "https://bbs.esnai.cn/thread-5497364-1-1.html", "question": "公司5月发生一笔有关外汇掉期业务，背景如下：公司账面持有美元存款10万元，2026年5月21日，公司办理美元兑日元外汇掉期业务，近端交割日为2026年5月21日，近端汇率155，远端交割日2026年12月30日，远端汇率154。 日元在5月21日至12月30日之间存入定期存款，存款年利息2%。同日，公司与银行签订《区间宝交易申请书》，办理美元兑人民币远期结汇业务。该笔交易名义本金 10万美元，交割日确定为 2026 年 12 月 30 日，约定汇率K=6.7。本次交易不收取期权费。我们查阅2025年上市公司年报披露，大部分公司均选择按照第22号金融工具准则进行会计处理。我理解的会计处理：\n\n2026年5月21日：\n\n    借：其他货币资金-定期存款    1550万日元\n\n     贷：银行存款-美元        10万美元\n\n2026年5月31日： \n\n1、计提日元5月21至5月31日共计11天定期存款利息：假定日元与人民币汇率是0.05\n\n    借：应收利息   1550万元*2%*11/360=9472.22日元   473.61人民币\n\n      贷：财务费用-利息收入   473.61人民币 \n\n2、计算公允价值变动损益：   \n\n假定5月31日银行7个月远期美元兑日元外汇牌价是156，7个月远期美元兑人民币是6.8；7个月美元无风险年化利率为3%。7个月人民币无风险年化利率为1.5%，5月底即期美元与人民币汇率为6.9\n\n则日元兑换美元公允价值变动损益=1550万日元*（1/154-1/156）/（1+3%*7/12）=1279.18美元*6.9=8826.34人民币\n\n  借：交易性金融资产  8826.34人民币\n\n   贷：公允价值变动损益  8826.34人民币\n\n美元兑换人民币公允价值变动损益=10万美元*（6.7-6.8）/（1+1.5%*7/12）=-9913.26人民币\n\n借：公允价值变动损益  9913.26人民币\n\n   贷：交易性金融负债  9913.26人民币\n\n2026年6月30日： \n\n1、计提日元6月1至6月30日共计30天定期存款利息：假定日元与人民币汇率是0.045\n\n    借：应收利息   1550万元*2%*30/360=25833.33日元   1162.50人民币\n\n      贷：财务费用-利息收入   1162.50人民币 \n\n2、计提5月应收利息的汇兑损益\n\n    借：财务费用-汇兑损益   47.36人民币\n\n      贷：应收利息       47.36人民币\n\n3、计算公允价值变动损益：   \n\n假定6月30日银行6个月远期美元兑日元外汇牌价是157，美元兑人民币是6.9；6个月美元无风险年化利率为3%。6个月人民币无风险年化利率为1.5%，6月底即期美元与人民币汇率为7\n\n则日元兑换美元累计公允价值变动损益=1550万日元*（1/154-1/157）/（1+3%*6/12）=1894.81美元，6月份公允价值变动损益=1894.81-1279.18=615.63美元\n\n  借：交易性金融资产  615.63*7=4309.41人民币\n\n   贷：公允价值变动损益  615.63*7=4309.41人民币\n\n美元兑换人民币公允价值变动损益=10万美元*（6.7-6.9）/（1+1.5%*6/12）=-19851.12人民币，6月份公允价值变动损益=-19851.12+9913.26=615.63美元\n\n借：公允价值变动损益  9937.86人民币\n\n   贷：公允价值变动损益  9937.86人民币\n\n 以后月份以此类推。。。。。\n\n问题1、以上会计处理是否正确？\n\n问题2：在每个月月底是很难直接查询到远期美元/日元的外汇牌价，我用人民币做中间币种查询银行远期结售汇牌价是否合理？我采用同时期日元买入价/美元卖出价用于替代美元/日元的远期外汇牌价。因为到期日我将卖出日元买入美元，对于银行来说则是买入日元卖出美元。\n\n问题3：我在6月底对定期应收利息计提汇兑损益是否正确？\n\n问题4：无风险美元利率参考CME Term SOFR，无风险人民币利率参考中债国债收益率，这样采取是合理的吗？\n\n问题5：在计算6月日元兑换美元公允价值变动损益计算出来的是累计美元数，6月的发生额=6月累计数-5月累计数，但是5月底和6月底的汇率不同，还需要计提汇兑损益吗？\n\n问题6：月底已经收到银行发过来的估值通知单，但是拿不到银行具体的计算步骤，银行估值  以后月份以此类推。。。。。\n\n问题1、以上会计处理是否正确？\n\n问题2：在每个月月底是很难直接查询到远期美元/日元的外汇牌价，我用人民币做中间币种查询银行远期结售汇牌价是否合理？我采用同时期日元买入价/美元卖出价用于替代美元/日元的远期外汇牌价。因为到期日我将卖出日元买入美元，对于银行来说则是买入日元卖出美元。\n\n问题3：我在6月底对定期应收利息计提汇兑损益是否正确？\n\n问题4：无风险美元利率参考cme term sofr，无风险人民币利率参考中债国债收益率，这样采取是合理的吗？\n\n问题5：在计算6月日元兑换美元公允价值变动损益计算出来的是累计美元数，6月的发生额=6月累计数-5月累计数，但是5月底和6月底的汇率不同，还需要计提汇兑损益吗？\n\n问题6：月底已经收到银行发过来的估值通知单，但是拿不到银行具体的计算步骤，银行估值通知单上面计算的公允价值变动损益与我们计算的有差异，我们应该按照银行的估值通知单上面的金额还是我们自己计算的金额进行账务处理？ 1、上述会计处理基本合理。\n\n2、也可以，但建议通过境外外汇市场上日元与美元直接交易的汇率进行交叉验证。\n\n3、该做法合理。\n\n5、期末计算的美元金额按照期末汇率折算到人民币记账。此类衍生工具不是外币货币性项目，不涉及单独确认汇兑损益，全部影响体现在公允价值变动损益中。\n\n6、建议与银行沟通估值通知单中采用的计算方法和参数，与自行测算的相比较。从主帖信息来看自行测算只是考虑了衍生工具的内在价值，没有考虑时间价值等其他因素的影响，可能不如银行计算的专业和完整。 https://bbs.esnai.cn/thread-5497364-1-1.html"}, {"tid": "5497409", "title": "急急急 求助陈版主：现金结算股份支付等待期内取消的处理依据及延伸问题", "category": "最近更新", "questionAuthor": "审计人1989", "questionTime": "2026-06-09T10:00:36.000Z", "replyTime": "2026-06-10T23:39:00.000Z", "replySortTime": "2026-06-10T23:39:00.000Z", "url": "https://bbs.esnai.cn/thread-5497409-1-1.html", "question": "之前陈版主在两个帖子中回复了现金结算股份支付在等待期内取消的会计处理，概括如下：\n\n取消时，冲回此前累积确认的费用及负债（应付职工薪酬），不存在\"视同加速可行权\"的说法；\n\n这与权益结算股份支付的处理逻辑不同，因为现金结算下累计费用最终等于实际支付现金，取消即归零。\n\n在此基础上，想进一步请教版主以下几个问题：\n\n问题一：上述处理的准则依据是什么？\n\n现行《企业会计准则第11号——股份支付》中，关于权益结算股份支付在等待期内取消的处理有较明确规定（第十一条），要求视同加速可行权处理，并将剩余应确认金额一次性确认，同时将相应权益项目转入资本溢价。但准则对现金结算股份支付取消的处理并无明确对应条款。版主在回复中的处理逻辑（直接冲回费用和负债、不做加速处理）具体是援引了哪条准则规定，还是基于对准则整体原则的理解与推导？\n\n问题二：上述处理方式是否存在潜在的利润调节空间？\n\n按照\"取消时冲回此前累积费用和负债\"的处理，企业可以通过选择取消时点来影响损益。例如，在等待期末期取消，可将此前多期已确认的费用全额冲回，从而在取消当期实现大额利润改善。请问这种安排是否构成盈余管理的手段？实务中是否有相关监管关注或审计关注点？", "reply": "1、如前面回复所述，现金结算股份支付的费用确认最终就是以实际需支付的金额为依据。准则对权益结算股份支付的规定较为详细，是因为其特殊性（例如对于如何计量员工为获取股份而提供的服务，没有像现金结算股份支付那样清晰的标志）和反规避（避免造成只要最终未授予或行权就可以不确认费用），但这些问题在现金结算股份支付中不重大或不存在。\n\n2、现金结算股份支付在实务中并不是很多见，也较少在这方面进行利润操纵或跨期调节的案例。由于股份支付的取消须有严格的流程，这些流程本身就为避免通过控制取消时间操纵各期利润提供了一定的保障。", "searchText": "5497409 急急急 求助陈版主：现金结算股份支付等待期内取消的处理依据及延伸问题 最近更新 审计人1989 2026-06-09t10:00:36.000z 2026-06-10t23:39:00.000z 之前陈版主在两个帖子中回复了现金结算股份支付在等待期内取消的会计处理，概括如下：\n\n取消时，冲回此前累积确认的费用及负债（应付职工薪酬），不存在\"视同加速可行权\"的说法；\n\n这与权益结算股份支付的处理逻辑不同，因为现金结算下累计费用最终等于实际支付现金，取消即归零。\n\n在此基础上，想进一步请教版主以下几个问题：\n\n问题一：上述处理的准则依据是什么？\n\n现行《企业会计准则第11号——股份支付》中，关于权益结算股份支付在等待期内取消的处理有较明确规定（第十一条），要求视同加速可行权处理，并将剩余应确认金额一次性确认，同时将相应权益项目转入资本溢价。但准则对现金结算股份支付取消的处理并无明确对应条款。版主在回复中的处理逻辑（直接冲回费用和负债、不做加速处理）具体是援引了哪条准则规定，还是基于对准则整体原则的理解与推导？\n\n问题二：上述处理方式是否存在潜在的利润调节空间？\n\n按照\"取消时冲回此前累积费用和负债\"的处理，企业可以通过选择取消时点来影响损益。例如，在等待期末期取消，可将此前多期已确认的费用全额冲回，从而在取消当期实现大额利润改善。请问这种安排是否构成盈余管理的手段？实务中是否有相关监管关注或审计关注点？ 1、如前面回复所述，现金结算股份支付的费用确认最终就是以实际需支付的金额为依据。准则对权益结算股份支付的规定较为详细，是因为其特殊性（例如对于如何计量员工为获取股份而提供的服务，没有像现金结算股份支付那样清晰的标志）和反规避（避免造成只要最终未授予或行权就可以不确认费用），但这些问题在现金结算股份支付中不重大或不存在。\n\n2、现金结算股份支付在实务中并不是很多见，也较少在这方面进行利润操纵或跨期调节的案例。由于股份支付的取消须有严格的流程，这些流程本身就为避免通过控制取消时间操纵各期利润提供了一定的保障。 https://bbs.esnai.cn/thread-5497409-1-1.html"}, {"tid": "5497367", "title": "请教陈版主如何理解上市公司执行企业会计准则案例解析2024版6-25点价销售模式下的...", "category": "最近更新", "questionAuthor": "qingzhouygwcs", "questionTime": "2026-06-05T10:00:34.000Z", "replyTime": "2026-06-10T11:28:00.000Z", "replySortTime": "2026-06-10T11:28:00.000Z", "url": "https://bbs.esnai.cn/thread-5497367-1-1.html", "question": "案例的基本情况：\n\n销售方采用点价销售，点价标的是市场合约价格基础上加上一定的升水，合同的特点是控制权转移日点价日不确定，但需要在30日内由卖方指定点价日。核心定价机制为点价日标的价格+升水。例如案例解析的合同签订时暂按5800元/吨定价，约定采用定价日SR2009合约价+100升水定价。时间点从前到后，可分为销售合同签订日，控制权转移日，点价日，结算日。\n\n监管意见：公司应按照控制权转移日【即收入确认日】、基于双方约定的价格调整机制而计算得出的当日价格作为收入确认金额，同时该混合合同整体作为一项FVTPL资产计量。具体来讲，若控制权转移日，该合约的当日价格为6000元/吨，则收入计量单价=收入确认日标的价格+升水确认收入=6000+100=6100，即用当天价格替代点价日标的价格，按双方约定的价格调整机制去计算价格。\n\n而非按照5800元/吨或按照6000元/吨确认收入对吧？延伸问题：以上情景中，点价日不确定，若销售合同条款初始约定，点价日为控制权转移日往后推60天。即收入确认日为T日，点价日为T+60日。此时如何理解所谓“按照控制权转移日、基于双方约定的价格调整机制而计算得出的当日价格作为收入确认金额”，是否应在收入确认日估计点价日的价格进行收入确认。\n\n例如合同签订时暂按5800元/吨定价，约定采用定价日SR2009合约价+100升水定价，点价日约定为控制权转移日点价日为T+60日（或者约定某个特指的具体时间，如点价日为XX年XX月XX日）合约价格。若控制权转移日，挂钩合约的当日价格6000元/吨，基于市场观测预计T+60日【点价日】后合约价格5900元/吨【该价格为预期评估，不代表T+60日后价格一定为此价格】，\n\n控制权转移当月月末，合约当日价格6100元/吨，站在当月月末预估点价日的合约价格为6150元/吨。\n\n最终时间来到点价日时，合约价格6200元/吨，按6300元/吨付款结算。\n\n收入确认当月的收入计量，公允价值计量如何处理？\n\n方案1：收入按合约当天价格+升水=6000+100=6100元/吨计价确认收入，当天按预估点价日价格+升水对金融资产估值，即以5900+100为基础估值，与收入计价差异当天计入公允价值变动损失，月末继续按预估点价日价格为基础计量金融资产公允价值，即6150+100=6250为基础估值，公允价值变动计入公允价值变动收益。\n\n方案2：由于点价日已经确定，应站在收入确认日合理估计点价日标的价格套算定价机制，即收入确认日评估的点价日价格+升水=5900+100为基础计量收入，月末继续续按预估点价日价格为基础计量金融资产公允价值，即6150+100=6250为基础估值，公允价值变动计入公允价值变动收益。\n\n方案3：收入计价金额采用方案1，即仅考虑合约当天价格，不站在收入确认日估计远期价格，按合约当天价格+升水=6000+100=6100元/吨计价确认收入，后续估值也仅以估值日的当天合约价格为基础，这样收入确认日当天不产生公允价值变动收益，当月末按6100+100为基础估值。\n\n我个人倾向于方案2，原因有两个。其一：在点价日确定的情况下，具备估计点价日价格的基础，例如看同天到期的相关合约价格。更符合“基于双方约定的价格调整机制而计算”的要求其二：FVTPL的初始计量应该以公允价值计量，初始计量当日不应该产生公允价值变动收益。在每个资产负债表日评估该金融工具的公允价值时，如果需要考虑预估点价日价格的影响，那么没有理由在初始计量时仅考虑当天的市价。\n\n请问陈老师的意见如何？", "reply": "赞同主帖意见，采用方案2。", "searchText": "5497367 请教陈版主如何理解上市公司执行企业会计准则案例解析2024版6-25点价销售模式下的... 最近更新 qingzhouygwcs 2026-06-05t10:00:34.000z 2026-06-10t11:28:00.000z 案例的基本情况：\n\n销售方采用点价销售，点价标的是市场合约价格基础上加上一定的升水，合同的特点是控制权转移日点价日不确定，但需要在30日内由卖方指定点价日。核心定价机制为点价日标的价格+升水。例如案例解析的合同签订时暂按5800元/吨定价，约定采用定价日sr2009合约价+100升水定价。时间点从前到后，可分为销售合同签订日，控制权转移日，点价日，结算日。\n\n监管意见：公司应按照控制权转移日【即收入确认日】、基于双方约定的价格调整机制而计算得出的当日价格作为收入确认金额，同时该混合合同整体作为一项fvtpl资产计量。具体来讲，若控制权转移日，该合约的当日价格为6000元/吨，则收入计量单价=收入确认日标的价格+升水确认收入=6000+100=6100，即用当天价格替代点价日标的价格，按双方约定的价格调整机制去计算价格。\n\n而非按照5800元/吨或按照6000元/吨确认收入对吧？延伸问题：以上情景中，点价日不确定，若销售合同条款初始约定，点价日为控制权转移日往后推60天。即收入确认日为t日，点价日为t+60日。此时如何理解所谓“按照控制权转移日、基于双方约定的价格调整机制而计算得出的当日价格作为收入确认金额”，是否应在收入确认日估计点价日的价格进行收入确认。\n\n例如合同签订时暂按5800元/吨定价，约定采用定价日sr2009合约价+100升水定价，点价日约定为控制权转移日点价日为t+60日（或者约定某个特指的具体时间，如点价日为xx年xx月xx日）合约价格。若控制权转移日，挂钩合约的当日价格6000元/吨，基于市场观测预计t+60日【点价日】后合约价格5900元/吨【该价格为预期评估，不代表t+60日后价格一定为此价格】，\n\n控制权转移当月月末，合约当日价格6100元/吨，站在当月月末预估点价日的合约价格为6150元/吨。\n\n最终时间来到点价日时，合约价格6200元/吨，按6300元/吨付款结算。\n\n收入确认当月的收入计量，公允价值计量如何处理？\n\n方案1：收入按合约当天价格+升水=6000+100=6100元/吨计价确认收入，当天按预估点价日价格+升水对金融资产估值，即以5900+100为基础估值，与收入计价差异当天计入公允价值变动损失，月末继续按预估点价日价格为基础计量金融资产公允价值，即6150+100=6250为基础估值，公允价值变动计入公允价值变动收益。\n\n方案2：由于点价日已经确定，应站在收入确认日合理估计点价日标的价格套算定价机制，即收入确认日评估的点价日价格+升水=5900+100为基础计量收入，月末继续续按预估点价日价格为基础计量金融资产公允价值，即6150+100=6250为基础估值，公允价值变动计入公允价值变动收益。\n\n方案3：收入计价金额采用方案1，即仅考虑合约当天价格，不站在收入确认日估计远 化只选用12月31日中间价汇率。\n\n公司背景介绍：\n\n1、关于记账本位币选择：鉴于日常交易收、支90%以上用美元，少量用人民币港币，尽管注资10万港币，仍以美元作为本位币。\n\n2、香港公司银行账户是综合多币种账户，同一账号下设独立币种子账户（港币、人民币、美元等），资金分币种独立核算，收支互不干扰，无需单独开立不同币种账号。\n\n问题如下：\n\n1、鉴于我公司业务量不大，年营业额50万-80万美元，每年只记账一次，即用12月31日中国人民银行公布的当日美元汇率中间价换算人民币、港币业务的银行存款、应收账款、应付账款、主营业务收入、主营业务成本，是否可行？还是使用离岸汇率？\n\n2、关于货币兑换分录，例如25年11月28日用人民币兑换1万美元，人民币户支出71124.36，美元户收入1万，当日，银行美元卖出价为1美元=7.112436元人民币，中国人民银行公布的当日中间价为1美元=7.0789元人民币。\n\n按照外币折算准则分录如下是否正确呢？\n\n借：银行存款—美元 10000\n\n财务费用-汇兑差额 47.37\n\n贷：银行存款—人民币 10047.37(71124.36/7.0789)\n\n贷方能否使用25年12月31日中间价汇率折算呢？", "reply": "基本原则是汇率的选择与香港子公司实际交易中使用的兑换汇率要基本接近，如果该子公司的业务多数在香港发生，则可以采用与其交易最多的银行所发布的挂牌买入、卖出价。央行汇率仅用于期末美元报表折算到人民币报表。\n\n能否采用年末央行汇率进行简化处理，取决于该项简化处理对香港子公司的自身原币报表和折算到人民币的报表的影响程度是否重大。", "searchText": "5497411 香港公司账务核算汇率选用以及每年度能否简化只选用12月31日中间价汇率。 最近更新 baibingbing132y 2026-06-09t10:00:33.000z 2026-06-10t09:01:00.000z 香港公司账务核算汇率选用使用央行汇率还是离岸汇率，以及每年度能否简化只选用12月31日中间价汇率。\n\n公司背景介绍：\n\n1、关于记账本位币选择：鉴于日常交易收、支90%以上用美元，少量用人民币港币，尽管注资10万港币，仍以美元作为本位币。\n\n2、香港公司银行账户是综合多币种账户，同一账号下设独立币种子账户（港币、人民币、美元等），资金分币种独立核算，收支互不干扰，无需单独开立不同币种账号。\n\n问题如下：\n\n1、鉴于我公司业务量不大，年营业额50万-80万美元，每年只记账一次，即用12月31日中国人民银行公布的当日美元汇率中间价换算人民币、港币业务的银行存款、应收账款、应付账款、主营业务收入、主营业务成本，是否可行？还是使用离岸汇率？\n\n2、关于货币兑换分录，例如25年11月28日用人民币兑换1万美元，人民币户支出71124.36，美元户收入1万，当日，银行美元卖出价为1美元=7.112436元人民币，中国人民银行公布的当日中间价为1美元=7.0789元人民币。\n\n按照外币折算准则分录如下是否正确呢？\n\n借：银行存款—美元 10000\n\n财务费用-汇兑差额 47.37\n\n贷：银行存款—人民币 10047.37(71124.36/7.0789)\n\n贷方能否使用25年12月31日中间价汇率折算呢？ 基本原则是汇率的选择与香港子公司实际交易中使用的兑换汇率要基本接近，如果该子公司的业务多数在香港发生，则可以采用与其交易最多的银行所发布的挂牌买入、卖出价。央行汇率仅用于期末美元报表折算到人民币报表。\n\n能否采用年末央行汇率进行简化处理，取决于该项简化处理对香港子公司的自身原币报表和折算到人民币的报表的影响程度是否重大。 https://bbs.esnai.cn/thread-5497411-1-1.html"}, {"tid": "5497397", "title": "高速公路改扩建转固及衔接", "category": "最近更新", "questionAuthor": "fly666翔", "questionTime": "2026-06-08T10:00:33.000Z", "replyTime": "2026-06-10T08:53:00.000Z", "replySortTime": "2026-06-10T08:53:00.000Z", "url": "https://bbs.esnai.cn/thread-5497397-1-1.html", "question": "公司某条高速公路原本2027年12月底到期，届时高速公路路产及特许经营权会折摊完毕。目前在进行改扩建，但是预计要2028年底全部完工。2027年12月底-2028年年底这一段时间我们称之为过渡期，过渡期仍然会进行收费，通行费收入数目不小。公司改扩建期间会进行交通导改，边通车边施工：先维持现有高速通行，开展两侧拼宽路基施工；再将现状交通量导改至右幅保通侧，并同步封闭左幅开始施工；左幅封闭完成后，将现状交通量导改至左幅，并同步封闭右幅开始施工；路基全部施工完成，开放全部车道同行，进行附属工程施工。保通车道采用的临时低速标准，没有按照正常高速的设计标准。改扩建全程会一段一段陆续完工，但是预计2027年底没有某段高速先行完工。后续竣工验收后收费期会核定延长多少年，暂不确定，但是会从2027年12月底起算。\n\n1、高速公路的预定可使用状态怎么判断？我们过渡期的保通车道（有些是永久车道，后续会进一步完善路面达到设计时速）在进行通车情况下，是否需要转固？\n\n2、如果在不满足转固的条件下，有收入无折摊成本配比，是否合理？\n\n3、如果转固，相应的利息资本化是不是也要按照一定的比例暂停？", "reply": "个人理解：\n\n1、保通车道是临时性的，未达到规定的时速标准，故虽然保通车道在施工期间临时保持通车，但不代表已达到预定可使用状态。\n\n2、由于原高速公路的通车必须保持，故建议继续将原公路资产在固定资产核算，并继续计提折旧（修改剩余折旧年限至改扩建工程预计整体完工日，作为会计估计变更处理）。\n\n3、利息资本化的终止与改扩建成本的转固进度相适应。", "searchText": "5497397 高速公路改扩建转固及衔接 最近更新 fly666翔 2026-06-08t10:00:33.000z 2026-06-10t08:53:00.000z 公司某条高速公路原本2027年12月底到期，届时高速公路路产及特许经营权会折摊完毕。目前在进行改扩建，但是预计要2028年底全部完工。2027年12月底-2028年年底这一段时间我们称之为过渡期，过渡期仍然会进行收费，通行费收入数目不小。公司改扩建期间会进行交通导改，边通车边施工：先维持现有高速通行，开展两侧拼宽路基施工；再将现状交通量导改至右幅保通侧，并同步封闭左幅开始施工；左幅封闭完成后，将现状交通量导改至左幅，并同步封闭右幅开始施工；路基全部施工完成，开放全部车道同行，进行附属工程施工。保通车道采用的临时低速标准，没有按照正常高速的设计标准。改扩建全程会一段一段陆续完工，但是预计2027年底没有某段高速先行完工。后续竣工验收后收费期会核定延长多少年，暂不确定，但是会从2027年12月底起算。\n\n1、高速公路的预定可使用状态怎么判断？我们过渡期的保通车道（有些是永久车道，后续会进一步完善路面达到设计时速）在进行通车情况下，是否需要转固？\n\n2、如果在不满足转固的条件下，有收入无折摊成本配比，是否合理？\n\n3、如果转固，相应的利息资本化是不是也要按照一定的比例暂停？ 个人理解：\n\n1、保通车道是临时性的，未达到规定的时速标准，故虽然保通车道在施工期间临时保持通车，但不代表已达到预定可使用状态。\n\n2、由于原高速公路的通车必须保持，故建议继续将原公路资产在固定资产核算，并继续计提折旧（修改剩余折旧年限至改扩建工程预计整体完工日，作为会计估计变更处理）。\n\n3、利息资本化的终止与改扩建成本的转固进度相适应。 https://bbs.esnai.cn/thread-5497397-1-1.html"}, {"tid": "5497351", "title": "求教陈版主关于处置子公司，原逆流交易形成的未确认内部损益的后期处理", "category": "最近更新", "questionAuthor": "龚", "questionTime": "2026-06-03T08:35:36.000Z", "replyTime": "2026-06-10T08:25:00.000Z", "replySortTime": "2026-06-10T08:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5497351-1-1.html", "question": "背景：子公司A于2026年6月31日注销，原子公司A向母公司B出售了价值2000万的存货，增值300万\n\n个人理解：需要在后期合并报表层面持续跟踪300万增值部分，针对未实现部分仍然要冲减存货账面价值，调整未分配利润，对于后期实现损益部分，调整营业成本和存货价值\n\n现有新规定：2025 年 7 月 18 日，中国证监会发布《监管规则适用指引——会计类第 5 号》 （以下简称“会计类第 5 号”），其中“5-7 处置或视同处置子公司时逆流交易产生 的未实现内部交易损益的会计处理”明确规定：对于投资方与原子公司之间发生逆流交易产生的未实现内部交易损益，因处置或视同处置原子公司，相关未实现内部交易损益已得以实现，在合并财务报表层面投资方应将其计入当期处置子公司损益，同时相应调整投资方相关资产账面价值。\n\n按照新柜，300的增值遗留在账面价值，同时注销的时候一次将300万转移到处置子公司的投资收益，后续不再抵消处理\n\n请教陈版主，是否按新规处理，新规处理是否是直接做投资收益，后续不再处理了？", "reply": "个人理解，从实体理论的观点出发，应该是“需要在后期合并报表层面持续跟踪300万增值部分，针对未实现部分仍然要冲减存货账面价值，调整未分配利润，对于后期实现损益部分，调整营业成本和存货价值”。\n\n但既然现在《监管规则适用指引——会计类第5号》对此做出了明确规定，那么在证监会监管范围内就照此执行，即在丧失对原先作为内部卖方的子公司的控制权时一次性将内部交易未实现损益（无论是顺流交易还是逆流交易形成）均并入投资收益——处置子公司损益中。", "searchText": "5497351 求教陈版主关于处置子公司，原逆流交易形成的未确认内部损益的后期处理 最近更新 龚 2026-06-03t08:35:36.000z 2026-06-10t08:25:00.000z 背景：子公司a于2026年6月31日注销，原子公司a向母公司b出售了价值2000万的存货，增值300万\n\n个人理解：需要在后期合并报表层面持续跟踪300万增值部分，针对未实现部分仍然要冲减存货账面价值，调整未分配利润，对于后期实现损益部分，调整营业成本和存货价值\n\n现有新规定：2025 年 7 月 18 日，中国证监会发布《监管规则适用指引——会计类第 5 号》 （以下简称“会计类第 5 号”），其中“5-7 处置或视同处置子公司时逆流交易产生 的未实现内部交易损益的会计处理”明确规定：对于投资方与原子公司之间发生逆流交易产生的未实现内部交易损益，因处置或视同处置原子公司，相关未实现内部交易损益已得以实现，在合并财务报表层面投资方应将其计入当期处置子公司损益，同时相应调整投资方相关资产账面价值。\n\n按照新柜，300的增值遗留在账面价值，同时注销的时候一次将300万转移到处置子公司的投资收益，后续不再抵消处理\n\n请教陈版主，是否按新规处理，新规处理是否是直接做投资收益，后续不再处理了？ 个人理解，从实体理论的观点出发，应该是“需要在后期合并报表层面持续跟踪300万增值部分，针对未实现部分仍然要冲减存货账面价值，调整未分配利润，对于后期实现损益部分，调整营业成本和存货价值”。\n\n但既然现在《监管规则适用指引——会计类第5号》对此做出了明确规定，那么在证监会监管范围内就照此执行，即在丧失对原先作为内部卖方的子公司的控制权时一次性将内部交易未实现损益（无论是顺流交易还是逆流交易形成）均并入投资收益——处置子公司损益中。 https://bbs.esnai.cn/thread-5497351-1-1.html"}, {"tid": "5497139", "title": "请教陈版关于长投成本法转权益法追溯调整的时点问题", "category": "最近更新", "questionAuthor": "appleappl2011", "questionTime": "2026-05-17T03:43:13.000Z", "replyTime": "2026-06-07T15:01:00.000Z", "replySortTime": "2026-06-07T15:01:00.000Z", "url": "https://bbs.esnai.cn/thread-5497139-1-1.html", "question": "假设A公司2020年开始持有B公司10%的股权计入其他权益工具，2021年增持至30%确认为长期股权投资采用权益法核算，2022年继续增持至60%能够控制B公司改为成本法核算，并将B公司开始纳入合并范围，2024年处置20%股权丧失控制权，对剩余40%股权又改为权益法核算要进行追溯调整，那么开始追溯调整的时间点是哪年呢，是首次持股的2020年？成为长期股权投资的2021年？还是达到控制的2022年呢？\n\n---\n\n投资方因处置部分权益性投资等原因丧失了对被投资单位的控制的，在编制个别财务报表时，处置后的剩余股权能够对被投资单位实施共同控制或施加重大影响的，应当改按权益法核算，并对该剩余股权视同自取得时即采用权益法核算进行调整；\n\n再次请教陈版主，“视同取得时”在这个例子中是2020年、2021年还是2022年呢", "reply": "根据《应用指南汇编2024》P82，此处的追溯调整不需要调整前期比较数据，仅需调整2024年的期初留存收益即可，即按照剩余股权比例（40%）模拟权益法核算的结果调整2024年年初留存收益。\n\n---\n\n建议采用先进先出法确定继续持有的40%股权各批次的取得时间。分批次追溯到各自的最初取得时间。", "searchText": "5497139 请教陈版关于长投成本法转权益法追溯调整的时点问题 最近更新 appleappl2011 2026-05-17t03:43:13.000z 2026-06-07t15:01:00.000z 假设a公司2020年开始持有b公司10%的股权计入其他权益工具，2021年增持至30%确认为长期股权投资采用权益法核算，2022年继续增持至60%能够控制b公司改为成本法核算，并将b公司开始纳入合并范围，2024年处置20%股权丧失控制权，对剩余40%股权又改为权益法核算要进行追溯调整，那么开始追溯调整的时间点是哪年呢，是首次持股的2020年？成为长期股权投资的2021年？还是达到控制的2022年呢？\n\n---\n\n投资方因处置部分权益性投资等原因丧失了对被投资单位的控制的，在编制个别财务报表时，处置后的剩余股权能够对被投资单位实施共同控制或施加重大影响的，应当改按权益法核算，并对该剩余股权视同自取得时即采用权益法核算进行调整；\n\n再次请教陈版主，“视同取得时”在这个例子中是2020年、2021年还是2022年呢 根据《应用指南汇编2024》p82，此处的追溯调整不需要调整前期比较数据，仅需调整2024年的期初留存收益即可，即按照剩余股权比例（40%）模拟权益法核算的结果调整2024年年初留存收益。\n\n---\n\n建议采用先进先出法确定继续持有的40%股权各批次的取得时间。分批次追溯到各自的最初取得时间。 https://bbs.esnai.cn/thread-5497139-1-1.html"}, {"tid": "5497239", "title": "编制合并报表时是否要抵消？", "category": "最近更新", "questionAuthor": "九九加一九", "questionTime": "2026-05-25T05:36:28.000Z", "replyTime": "2026-06-07T14:59:00.000Z", "replySortTime": "2026-06-07T14:59:00.000Z", "url": "https://bbs.esnai.cn/thread-5497239-1-1.html", "question": "甲公司2024年销售一台车给海外客户A，成本120万元，售价180万元。A客户支付了50%货款90万元，后由于迟迟未销售出去，一直未给甲公司付款尾款。甲公司为了收回货款，与A公司达成协议，要求A公司将该货物以90万元转卖给甲公司在客户A所在国的子公司乙，乙公司在2025年将该货物以150万元销售出去。在甲公司编制2025年合并财务报表时，是否需要将乙公司的这笔交易合并抵消？抵消的收入成本应该是多少？", "reply": "在甲公司合并报表层面，“A公司将该货物以90万元转卖给甲公司在客户A所在国的子公司乙”应视同销售退回处理，冲减退回年度的销售收入（虽然乙公司个别报表层面是作为采购处理）。乙公司再对外出售才能确认收入。", "searchText": "5497239 编制合并报表时是否要抵消？ 最近更新 九九加一九 2026-05-25t05:36:28.000z 2026-06-07t14:59:00.000z 甲公司2024年销售一台车给海外客户a，成本120万元，售价180万元。a客户支付了50%货款90万元，后由于迟迟未销售出去，一直未给甲公司付款尾款。甲公司为了收回货款，与a公司达成协议，要求a公司将该货物以90万元转卖给甲公司在客户a所在国的子公司乙，乙公司在2025年将该货物以150万元销售出去。在甲公司编制2025年合并财务报表时，是否需要将乙公司的这笔交易合并抵消？抵消的收入成本应该是多少？ 在甲公司合并报表层面，“a公司将该货物以90万元转卖给甲公司在客户a所在国的子公司乙”应视同销售退回处理，冲减退回年度的销售收入（虽然乙公司个别报表层面是作为采购处理）。乙公司再对外出售才能确认收入。 https://bbs.esnai.cn/thread-5497239-1-1.html"}, {"tid": "5494183", "title": "求助陈版主 辛苦了", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2025-12-17T05:41:54.000Z", "replyTime": "2026-06-07T14:56:00.000Z", "replySortTime": "2026-06-07T14:56:00.000Z", "url": "https://bbs.esnai.cn/thread-5494183-1-1.html", "question": "有几个问题想继续追问下：\n\n1、B公司之母公司（上市公司）单体层面、B公司之母公司（上市公司）的控股股东单体层面，他们不是回购自身的权益工具，为何也是全额确认呢？\n\n2、债务回购与股权回购，会有哪些不同呢？\n\n---\n\n还是有点没有太明白，根据【中审众环研究】​问题5-3-11（为关联方担保导致承担担保责任的会计处理），为何这个是参照或有事项准则呢？同样都是需要承担连带责任，为何一个是按全额确认，根据金融工具准则，这两个案例有什么区别呢？\n\n---\n\n根据【中审众环研究】​问题5-3-11（为关联方担保导致承担担保责任的会计处理），为何这个是参照或有事项准则呢？是否是适用金融工具中的财务担保合同呢？", "reply": "1、明股实债的回购义务也要全额确认，此时相当于母公司向资金方借款对子公司增资，后续回购相当于借款的还本付息。2、需结合具体案例讨论。\n\n---\n\n此时的会计处理相当于视同被投资方自身直接承担回购义务，而不是担保的补充责任，与一般的借款担保不同。\n\n---\n\n应该是金融工具准则。后续将做修改。", "searchText": "5494183 求助陈版主 辛苦了 最近更新 爬爬呀 2025-12-17t05:41:54.000z 2026-06-07t14:56:00.000z 有几个问题想继续追问下：\n\n1、b公司之母公司（上市公司）单体层面、b公司之母公司（上市公司）的控股股东单体层面，他们不是回购自身的权益工具，为何也是全额确认呢？\n\n2、债务回购与股权回购，会有哪些不同呢？\n\n---\n\n还是有点没有太明白，根据【中审众环研究】​问题5-3-11（为关联方担保导致承担担保责任的会计处理），为何这个是参照或有事项准则呢？同样都是需要承担连带责任，为何一个是按全额确认，根据金融工具准则，这两个案例有什么区别呢？\n\n---\n\n根据【中审众环研究】​问题5-3-11（为关联方担保导致承担担保责任的会计处理），为何这个是参照或有事项准则呢？是否是适用金融工具中的财务担保合同呢？ 1、明股实债的回购义务也要全额确认，此时相当于母公司向资金方借款对子公司增资，后续回购相当于借款的还本付息。2、需结合具体案例讨论。\n\n---\n\n此时的会计处理相当于视同被投资方自身直接承担回购义务，而不是担保的补充责任，与一般的借款担保不同。\n\n---\n\n应该是金融工具准则。后续将做修改。 https://bbs.esnai.cn/thread-5494183-1-1.html"}, {"tid": "5497076", "title": "股份支付", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2026-05-14T02:04:50.000Z", "replyTime": "2026-06-07T14:54:00.000Z", "replySortTime": "2026-06-07T14:54:00.000Z", "url": "https://bbs.esnai.cn/thread-5497076-1-1.html", "question": "A个别报表是否需要调整长期股权投资的明细呢？\n\n---\n\n继续追问下：母公司为A，下有子公司B，子公司C。\n\n1、如果B公司向C公司授予其自身的权益工具，B公司按权益结算的股份支付，具体的分录是怎么样的呢？C公司由于没有结算义务，也按权益结算的股份支付，这块C对应的分录是怎么样的呢？\n\n2、如果B公司向母公司A公司授予其自身的权益工具，B公司按权益结算的股份支付，具体的分录是怎么样的呢？A公司由于没有结算义务，是按现金结算还是按权益结算的股份支付呢，这块A对应的分录是怎么样的呢？", "reply": "不需要。A不直接持有C的股份。\n\n---\n\n1、如果B和C是平级的，则B直接按照收到的投资款确认股本和资本公积，C公司按权益结算股份支付处理，借记股份支付费用，贷记资本公积。（在等待期内逐年做该处理）", "searchText": "5497076 股份支付 最近更新 爬爬呀 2026-05-14t02:04:50.000z 2026-06-07t14:54:00.000z a个别报表是否需要调整长期股权投资的明细呢？\n\n---\n\n继续追问下：母公司为a，下有子公司b，子公司c。\n\n1、如果b公司向c公司授予其自身的权益工具，b公司按权益结算的股份支付，具体的分录是怎么样的呢？c公司由于没有结算义务，也按权益结算的股份支付，这块c对应的分录是怎么样的呢？\n\n2、如果b公司向母公司a公司授予其自身的权益工具，b公司按权益结算的股份支付，具体的分录是怎么样的呢？a公司由于没有结算义务，是按现金结算还是按权益结算的股份支付呢，这块a对应的分录是怎么样的呢？ 不需要。a不直接持有c的股份。\n\n---\n\n1、如果b和c是平级的，则b直接按照收到的投资款确认股本和资本公积，c公司按权益结算股份支付处理，借记股份支付费用，贷记资本公积。（在等待期内逐年做该处理） https://bbs.esnai.cn/thread-5497076-1-1.html"}, {"tid": "5490885", "title": "请教陈版，子公司无偿划转孙公司给母公司的会计处理", "category": "最近更新", "questionAuthor": "嘿喵警长zz", "questionTime": "2025-09-22T08:21:31.000Z", "replyTime": "2026-06-07T14:52:00.000Z", "replySortTime": "2026-06-07T14:52:00.000Z", "url": "https://bbs.esnai.cn/thread-5490885-1-1.html", "question": "陈版，如果是孙公司之间的无偿划转，那单体层面母公司对子公司的长投二级明细是否需要调整？举个例子，A公司是母公司，投资200万100%持有B公司，投资100万100%持有C公司，B公司投资50万100%持有D公司。截至24年底，D公司净资产100万元。24年底，整理组织架构，B公司根据集团指示将D公司股权0对价转让给C公司。A、B、C账务处理是不是这样：\n\nB公司：借：未分配利润（若没有资本公积） 50 贷：长期股权投资-D 50\n\nC公司：借：长期股权投资-D 100 贷：资本公积 100\n\nA公司：借：长期股权投资-C  50 贷：长期股权投资-B 50 ，还是说不需要这一步调整？\n\n---\n\n上次没说全，未分配利润是负数，是否能继续冲减？\n\n---\n\n请教陈版，资本公积和盈余公积为0，B公司冲减未分配利润，那么期末未分配利润≠期初未分配利润+本期净利润，不勾稽的情况是可以存在的吗", "reply": "A公司个别报表层面的处理：借：长投——C 50（或100），贷：长投——B 50（或100）。\n\n---\n\n可以。\n\n---\n\n可以。", "searchText": "5490885 请教陈版，子公司无偿划转孙公司给母公司的会计处理 最近更新 嘿喵警长zz 2025-09-22t08:21:31.000z 2026-06-07t14:52:00.000z 陈版，如果是孙公司之间的无偿划转，那单体层面母公司对子公司的长投二级明细是否需要调整？举个例子，a公司是母公司，投资200万100%持有b公司，投资100万100%持有c公司，b公司投资50万100%持有d公司。截至24年底，d公司净资产100万元。24年底，整理组织架构，b公司根据集团指示将d公司股权0对价转让给c公司。a、b、c账务处理是不是这样：\n\nb公司：借：未分配利润（若没有资本公积） 50 贷：长期股权投资-d 50\n\nc公司：借：长期股权投资-d 100 贷：资本公积 100\n\na公司：借：长期股权投资-c  50 贷：长期股权投资-b 50 ，还是说不需要这一步调整？\n\n---\n\n上次没说全，未分配利润是负数，是否能继续冲减？\n\n---\n\n请教陈版，资本公积和盈余公积为0，b公司冲减未分配利润，那么期末未分配利润≠期初未分配利润+本期净利润，不勾稽的情况是可以存在的吗 a公司个别报表层面的处理：借：长投——c 50（或100），贷：长投——b 50（或100）。\n\n---\n\n可以。\n\n---\n\n可以。 https://bbs.esnai.cn/thread-5490885-1-1.html"}, {"tid": "5468434", "title": "未对账部分应收账款是否确认为合同资产？", "category": "最近更新", "questionAuthor": "koodhao", "questionTime": "2022-09-29T13:45:34.000Z", "replyTime": "2026-06-07T14:28:00.000Z", "replySortTime": "2026-06-07T14:28:00.000Z", "url": "https://bbs.esnai.cn/thread-5468434-1-1.html", "question": "合同资产，是指企业已向客户转让商品而有权收取对价的权利，且该权利取决于时间流逝之外的其他因素。\n\n在这个定义解释里面，只是说收款取决于时间流逝之外的其他因素，似乎并没有说是额外的履约义务？对账是否可以认定为一项其他因素？因为未对账未开票部分，双方未对交易金额进行核对，客户一般不予确认，收款自然也无从说起。另外就是函证时，客户一般也不会对这部分应收款进行确认\n\n---\n\n请教陈版主：\n\n新媒体行业，类似优酷、爱奇艺这些产业，广告分成收入，约定了季度结算，对账后才有付款的义务。月度按照广告点击率暂估收入，对应的往来应该要确认成应收账款还是合同资产？应收账款是无条件收款权，而上面这种交易要求季度对账后才会有收款权。\n\n谢谢！", "reply": "这只是可变对价估计问题，不表明不具备无条件收款权。\n\n---\n\n合同资产。", "searchText": "5468434 未对账部分应收账款是否确认为合同资产？ 最近更新 koodhao 2022-09-29t13:45:34.000z 2026-06-07t14:28:00.000z 合同资产，是指企业已向客户转让商品而有权收取对价的权利，且该权利取决于时间流逝之外的其他因素。\n\n在这个定义解释里面，只是说收款取决于时间流逝之外的其他因素，似乎并没有说是额外的履约义务？对账是否可以认定为一项其他因素？因为未对账未开票部分，双方未对交易金额进行核对，客户一般不予确认，收款自然也无从说起。另外就是函证时，客户一般也不会对这部分应收款进行确认\n\n---\n\n请教陈版主：\n\n新媒体行业，类似优酷、爱奇艺这些产业，广告分成收入，约定了季度结算，对账后才有付款的义务。月度按照广告点击率暂估收入，对应的往来应该要确认成应收账款还是合同资产？应收账款是无条件收款权，而上面这种交易要求季度对账后才会有收款权。\n\n谢谢！ 这只是可变对价估计问题，不表明不具备无条件收款权。\n\n---\n\n合同资产。 https://bbs.esnai.cn/thread-5468434-1-1.html"}, {"tid": "5496445", "title": "请教陈版主：有关国资委划拨股权的合并报表的处理问题", "category": "合并/股权/权益法", "questionAuthor": "hahlee", "questionTime": "2026-03-20T02:31:28.000Z", "replyTime": "2026-06-07T14:27:00.000Z", "replySortTime": "2026-06-07T14:27:00.000Z", "url": "https://bbs.esnai.cn/thread-5496445-1-1.html", "question": "国资委在2024年12月31日，将A集团的a公司、B集团的b公司等其他公司，分别按评估价值，划拨到完全新成立的C集团（该集团实际成立时间是在2025年3月），现编制2025年12月31日的合并报表，有几个问题想要请教陈版主：\n\n1.新成立的C集团的单体报表按照国资委批复的金额，期初（2024年12月31日）借记长期股权投资，贷记实收资本（批复有列明作为实收资本入账）的处理正确吗？\n\n2.国资委批复的a公司和b公司，其账面净资产均小于批复的划拨价值，原因是产生了评估增值，那么，合并报表的处理是按照评估增值的资产，借对应资产，贷资本公积吗？\n\n3.站在2025年12月31日，期初的合并资产负债表应包括各个划拨进来的子公司的账面价值，期初的利润表是否应该有各个子公司的数呢？那么合并的资产负债表的期初未分配利润是否应该有数？\n\n4.因为各个集团均属同一国资委的控制管理，分不清到底是按同控还是非同控处理。\n\n麻烦陈版主和各位老师了，谢谢！！\n\n---\n\n再请教陈版主：那么划出方A集团和B集团，期初是否应当包含被划出的a公司和b公司呢？", "reply": "1、C集团个别报表层面，因为接受国资委划拨的股权系按评估值作价出资，所以为了避免个别报表层面出现资本公积负数，可接受按国资委批复的金额（股权评估值）入账，对应贷记实收资本和资本公积的处理。\n\n2、C集团合并报表层面应遵循同一控制下合并的会计处理原则，以划入日作为合并日，以合并日取得A、B集团的账面净资产份额作为长期股权投资成本，与实收资本之间的差额借记或贷记资本公积。同时参照财政部会计司发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0211102_3762826.htm），C集团的合并报表应追溯至其成立日之前，视同A、B等被划入企业在最早期间期初已被纳入C集团的合并报表范围。\n\n3、基于上述2，2025年度C集团的合并报表是正常将A、B的全年数和上年比较数据纳入而编制的。前期的合并利润表中也包含A、B的上年数。合并资产负债表中应恢复被合并方A、B的留存收益，这是将A、B的前期利润表纳入合并范围所必然导致的留存收益滚存结果的体现。\n\n4、如上，属于同一控制下合并，只不过在C的个别报表层面为了避免资本公积出现负数而做了一些变通处理，在合并报表层面是严格遵循同一控制下合并的合并报表编制思路的。\n\n---\n\n划出方应合并标的企业直至划出完成为止，与划入方的处理不对称。", "searchText": "5496445 请教陈版主：有关国资委划拨股权的合并报表的处理问题 合并/股权/权益法 hahlee 2026-03-20t02:31:28.000z 2026-06-07t14:27:00.000z 国资委在2024年12月31日，将a集团的a公司、b集团的b公司等其他公司，分别按评估价值，划拨到完全新成立的c集团（该集团实际成立时间是在2025年3月），现编制2025年12月31日的合并报表，有几个问题想要请教陈版主：\n\n1.新成立的c集团的单体报表按照国资委批复的金额，期初（2024年12月31日）借记长期股权投资，贷记实收资本（批复有列明作为实收资本入账）的处理正确吗？\n\n2.国资委批复的a公司和b公司，其账面净资产均小于批复的划拨价值，原因是产生了评估增值，那么，合并报表的处理是按照评估增值的资产，借对应资产，贷资本公积吗？\n\n3.站在2025年12月31日，期初的合并资产负债表应包括各个划拨进来的子公司的账面价值，期初的利润表是否应该有各个子公司的数呢？那么合并的资产负债表的期初未分配利润是否应该有数？\n\n4.因为各个集团均属同一国资委的控制管理，分不清到底是按同控还是非同控处理。\n\n麻烦陈版主和各位老师了，谢谢！！\n\n---\n\n再请教陈版主：那么划出方a集团和b集团，期初是否应当包含被划出的a公司和b公司呢？ 1、c集团个别报表层面，因为接受国资委划拨的股权系按评估值作价出资，所以为了避免个别报表层面出现资本公积负数，可接受按国资委批复的金额（股权评估值）入账，对应贷记实收资本和资本公积的处理。\n\n2、c集团合并报表层面应遵循同一控制下合并的会计处理原则，以划入日作为合并日，以合并日取得a、b集团的账面净资产份额作为长期股权投资成本，与实收资本之间的差额借记或贷记资本公积。同时参照财政部会计司发布的实施问答（http://kjs.mof.gov.cn/zt/kjzzss/ ... 0211102_3762826.htm），c集团的合并报表应追溯至其成立日之前，视同a、b等被划入企业在最早期间期初已被纳入c集团的合并报表范围。\n\n3、基于上述2，2025年度c集团的合并报表是正常将a、b的全年数和上年比较数据纳入而编制的。前期的合并利润表中也包含a、b的上年数。合并资产负债表中应恢复被合并方a、b的留存收益，这是将a、b的前期利润表纳入合并范围所必然导致的留存收益滚存结果的体现。\n\n4、如上，属于同一控制下合并，只不过在c的个别报表层面为了避免资本公积出现负数而做了一些变通处理，在合并报表层面是严格遵循同一控制下合并的合并报表编制思路的。\n\n---\n\n划出方应合并标的企业直至划出完成为止，与划入方的处理不对称。 https://bbs.esnai.cn/thread-5496445-1-1.html"}, {"tid": "5497255", "title": "【请教陈版】关于CAS23特定可辨认现金流量的理解讨论", "category": "最近更新", "questionAuthor": "ZLY326", "questionTime": "2026-05-26T08:24:34.000Z", "replyTime": "2026-06-07T14:25:00.000Z", "replySortTime": "2026-06-07T14:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5497255-1-1.html", "question": "陈版好，\n\n请教一个关于CAS23特定可辨认现金流量的理解问题。\n\n【背景】\n\nA公司与银行签订了一个无追索保理合同，约定转让某个客户部分应收账款，附件中详细列示了本次保理的应收账款对应的采购订单、发票金额。已知，A公司账面对该客户不仅这一笔应收账款，同时存在采购订单下的应收账款。A公司日常收到客户回款时，由客户指定回款的是哪个订单，业务人员就该笔款项认领至哪个订单。\n\n【疑问】\n\nA公司本次部分保理业务是否符合仅转让特定可辨认现金流量？从而适用部分终止确认判断？\n\n【分析】\n\n虽然合同里面明确约定了本次办理保理业务的具体采购订及金额。但是考虑到在实务中，假设我是债务人，当我对债权人的欠款同时包含应付银行的保理款和直接付给债权人的货款时，银行逾期会收利息，但是对债权人逾期不会收息。因此，我作为一个理性人我会优先偿还对银行的保理款。且我同时又拥有决定该笔现金流属于哪个采购订单的权力。因此，虽然形式上约定了保理业务的具体的采购订单，但是实际意义上回款的现金流并不具备特定可辨认的特征（债务人可指定回款是哪个采购订单）。因此个人理解，不符合仅转让特定可辨认现金流量，从而终止确认的规定适用于该客户应收账款整体去进行判断。", "reply": "基本赞同主帖中的理解。", "searchText": "5497255 【请教陈版】关于cas23特定可辨认现金流量的理解讨论 最近更新 zly326 2026-05-26t08:24:34.000z 2026-06-07t14:25:00.000z 陈版好，\n\n请教一个关于cas23特定可辨认现金流量的理解问题。\n\n【背景】\n\na公司与银行签订了一个无追索保理合同，约定转让某个客户部分应收账款，附件中详细列示了本次保理的应收账款对应的采购订单、发票金额。已知，a公司账面对该客户不仅这一笔应收账款，同时存在采购订单下的应收账款。a公司日常收到客户回款时，由客户指定回款的是哪个订单，业务人员就该笔款项认领至哪个订单。\n\n【疑问】\n\na公司本次部分保理业务是否符合仅转让特定可辨认现金流量？从而适用部分终止确认判断？\n\n【分析】\n\n虽然合同里面明确约定了本次办理保理业务的具体采购订及金额。但是考虑到在实务中，假设我是债务人，当我对债权人的欠款同时包含应付银行的保理款和直接付给债权人的货款时，银行逾期会收利息，但是对债权人逾期不会收息。因此，我作为一个理性人我会优先偿还对银行的保理款。且我同时又拥有决定该笔现金流属于哪个采购订单的权力。因此，虽然形式上约定了保理业务的具体的采购订单，但是实际意义上回款的现金流并不具备特定可辨认的特征（债务人可指定回款是哪个采购订单）。因此个人理解，不符合仅转让特定可辨认现金流量，从而终止确认的规定适用于该客户应收账款整体去进行判断。 基本赞同主帖中的理解。 https://bbs.esnai.cn/thread-5497255-1-1.html"}, {"tid": "5454051", "title": "请教陈版，关于应收账款组合划分涉及会计估计变更问题。", "category": "最近更新", "questionAuthor": "18508936152", "questionTime": "2021-12-20T07:56:29.000Z", "replyTime": "2026-06-07T14:23:00.000Z", "replySortTime": "2026-06-07T14:23:00.000Z", "url": "https://bbs.esnai.cn/thread-5454051-1-1.html", "question": "《2020年上市公司年报会计监管报告》3.金融工具计量和减值相关问题（1）未恰当评估与划分信用风险组合：\n\n“根据企业会计准则及相关规定，以组合为基础上进行信用风险变化评估时，企业可以共同风险特征为依据，将金融工具分为不同组别，从而使有关评估更为合理并能及时识别信用风险的显著增加。企业不应将具有不同风险特征的金融工具归为同一组别。年报分析发现，个别上市公司主营业务涉及多个不同行业，上市公司简单将不同行业客户的应收账款作为一个组合计提预期信用损失。上市公司应充分评估不同行业客户的信用风险特征是否相同，并根据情况划分不同组合分别计提预期信用损失。”\n\n请教陈版，\n\n公司2019年初执行新准则，下属有三个不同的行业，2020年之前应收账款坏账计提都是用一个组合。\n\n按照监管报告内容公司可能需要划分三个组合，若今年按三个不同的行业划分为三个应收账款组合分别计提坏账，是否属于会计估计变更？按照金额影响需要上董事会或股东大会审批？\n\n谢谢陈版~\n\n---\n\n陈老师，您好，想针对如果组合划分属于会计估计变更延伸咨询一个问题：\n\n之前合并范围外关联方按照账龄组合计提了坏账，本年度将其调整为无风险组合不提坏账，那么会计估计变更用未来适用法，比如该往来款之前余额100，坏账余额20，本年度余额是200，意思是：\n\n1、本年末坏账余额按照无风险组合，全部不提，所以最终是往来余额200，坏账0。\n\n2、本年末坏账余额按照无风险组合，以前年度提的不变，本年新增的100不提坏账，所以最终是，往来余额200，坏账20.\n\n想请教陈老师，哪种是对的呢，万分感谢！", "reply": "严格来说是前期差错。但如果没有证据表明此前方法下计提的坏账准备与实际可收回金额有重大偏差的，也可以以会计估计变更的名义调整。\n\n---\n\n同一债务人的信用风险水平是相同的，所以2不合理，可能可以接受1。", "searchText": "5454051 请教陈版，关于应收账款组合划分涉及会计估计变更问题。 最近更新 18508936152 2021-12-20t07:56:29.000z 2026-06-07t14:23:00.000z 《2020年上市公司年报会计监管报告》3.金融工具计量和减值相关问题（1）未恰当评估与划分信用风险组合：\n\n“根据企业会计准则及相关规定，以组合为基础上进行信用风险变化评估时，企业可以共同风险特征为依据，将金融工具分为不同组别，从而使有关评估更为合理并能及时识别信用风险的显著增加。企业不应将具有不同风险特征的金融工具归为同一组别。年报分析发现，个别上市公司主营业务涉及多个不同行业，上市公司简单将不同行业客户的应收账款作为一个组合计提预期信用损失。上市公司应充分评估不同行业客户的信用风险特征是否相同，并根据情况划分不同组合分别计提预期信用损失。”\n\n请教陈版，\n\n公司2019年初执行新准则，下属有三个不同的行业，2020年之前应收账款坏账计提都是用一个组合。\n\n按照监管报告内容公司可能需要划分三个组合，若今年按三个不同的行业划分为三个应收账款组合分别计提坏账，是否属于会计估计变更？按照金额影响需要上董事会或股东大会审批？\n\n谢谢陈版~\n\n---\n\n陈老师，您好，想针对如果组合划分属于会计估计变更延伸咨询一个问题：\n\n之前合并范围外关联方按照账龄组合计提了坏账，本年度将其调整为无风险组合不提坏账，那么会计估计变更用未来适用法，比如该往来款之前余额100，坏账余额20，本年度余额是200，意思是：\n\n1、本年末坏账余额按照无风险组合，全部不提，所以最终是往来余额200，坏账0。\n\n2、本年末坏账余额按照无风险组合，以前年度提的不变，本年新增的100不提坏账，所以最终是，往来余额200，坏账20.\n\n想请教陈老师，哪种是对的呢，万分感谢！ 严格来说是前期差错。但如果没有证据表明此前方法下计提的坏账准备与实际可收回金额有重大偏差的，也可以以会计估计变更的名义调整。\n\n---\n\n同一债务人的信用风险水平是相同的，所以2不合理，可能可以接受1。 https://bbs.esnai.cn/thread-5454051-1-1.html"}, {"tid": "5497129", "title": "关于母子公司之间商业承兑汇票业务的会计处理", "category": "最近更新", "questionAuthor": "2529926646", "questionTime": "2026-05-16T10:07:47.000Z", "replyTime": "2026-06-07T14:22:00.000Z", "replySortTime": "2026-06-07T14:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497129-1-1.html", "question": "问题1：子公司出具商业承兑汇票给供应商，母公司为承兑人，到期后由母公司先行兑付，子公司再将对应款项支付给母公司，母子公司分别应如何会计处理；\n\n问题2：子公司出具商业承兑汇票给供应商，母公司为承兑人，出票后子公司将票据贴现给银行，银行直接将贴现款项支付给供应商（与出票金额一致），同时子公司单独支付贴现利息，到期后由母公司先行兑付，子公司再将对应款项支付给母公司，母子公司分别应如何会计处理；\n\n---\n\n是否可以改成：1、采购时：子公司：借：原材料等  贷：应付账款；出票时：借：应付账款  贷：应付票据。承兑支付时：借：应付票据   贷：其他应付款——母公司\n\n母公司：承兑支付时：借：其他应收款——子公司，贷：银行存款。", "reply": "1、子公司：借：原材料等，贷：应付账款；借：应付账款，贷：其他应付款——母公司。\n\n母公司：借：其他应收款——子公司，贷：应付票据——供应商。\n\n 资产（以下简称\"标的物业\"），目前尚未完成向c公司的产权划转；\n\n根据集团整体安排，标的物业未来应划转至c公司，但截至当前，产权过户手续尚未完成，b公司仍为法定产权人。\n\n二、交易安排的具体模式\n\n（一）对外法律关系\n\nc公司与外部承租方签订租赁合同，作为合同载明的出租方；\n\nc公司直接向外部承租方收取租金，并全额留存，不向b公司转交；\n\n外部承租方实际使用标的物业。\n\n（二）对内法律关系\n\nb公司与c公司之间未就标的物业签订租赁合同（即b公司未将物业出租给c公司）；\n\nb公司与c公司之间未签订委托经营协议或代管协议，或虽存在集团内部安排，但未约定c公司代收租金后向b公司转交的义务；\n\nc公司实际占有、支配全部租金收益，b公司作为产权人未从标的物业获取任何现金流入或其他形式的经济利益\n\n---\n\n陈版好，我公司目前也有一个类似的问题，我们有一批车位，是随同房屋买卖合同一起签订的使用权转让合同，车位使用权的期限与房屋土地使用期限相同，其实就相当于买过来了，但目前的情况是停车位的产权不在我们手里，而且以后也办不了产权证，目前由我们控制且已经租赁出去，这些车位在我们账上如何处理？是否可以作为无形资产处理？ 这种情况下，虽然事实上b尚未将资产的法定所有权转移给c，但该房产已不能为b企业带来经济利益流入，事实上已经完成了经济利益的转移，b不应继续将该房产确认为自身资产，而是终止确认该项资产，对应冲减权益，更不应将该房产确认为b的投资性房地产。\n\n在a的合并报表层面，如果后续房产完成过户，具备可出售条件不存在实质性障碍，可确认为投资性房地产。\n\n---\n\n无形资产，或者长期待摊费用。 https://bbs.esnai.cn/thread-5497110-1-1.html"}, {"tid": "5497193", "title": "关于顺流交易合并抵消的问题", "category": "最近更新", "questionAuthor": "everest2017", "questionTime": "2026-05-20T13:51:33.000Z", "replyTime": "2026-06-07T14:17:00.000Z", "replySortTime": "2026-06-07T14:17:00.000Z", "url": "https://bbs.esnai.cn/thread-5497193-1-1.html", "question": "业务背景：\n\nX公司是一家L4级自动驾驶技术公司，核心主业为公开道路无人驾驶车辆的研发、生产、销售及运营服务。\n\nX公司与某整车厂（以下代称“甲公司”）共同出资设立A公司，其中：X公司持有A公司30%股权，甲公司持有A公司70%股权，X公司对A公司具有重大影响。X公司向A公司销售智能驾驶套件，A公司从事无人驾驶车辆的生产与销售。\n\n同时，X公司与第三方公司（以下代称“乙公司”）共同出资设立B公司，其中：X公司持有B公司40%股权，乙公司持有B公司60%股权，X公司对B公司具有重大影响。B公司自A公司采购无人驾驶车辆，B公司将车辆对外出租或出售并负责车辆后端的运营管理。\n\nA公司和B公司均属于X公司的重要联营单位，X公司采用权益法核算。\n\n请教陈版及各位老师：\n\n情形一、X公司将智驾套件销售给A公司，A公司组装成整车销售给B公司，假设截至2025年12月31日，B公司尚未实现对外销售。针对该情形，X公司在编制合并报表时，能否100%全额确认向A销售的智驾套件收入？如不能，在合并报表层面按照多少比例抵消未实现的顺流交易产生的毛利（30%？40%？30%*40%？）？\n\n情形二、X公司将智驾套件销售给整车厂甲公司，甲公司生产整车后销售给B公司，后续由B公司对外销售或出租并负责车辆后端的运营管理。假设截至2025年12月31日，B公司自整车厂购入的车辆尚未实现对外销售。针对该情形，在合并报表层面，X公司能否100%全额确认向整车厂甲公司销售的智驾套件收入？\n\n---\n\n感谢陈版主解惑！\n\n承接您的回复辛苦您再帮忙指导一下以下理解是否正确：\n\n1、如果整车厂能够自行决定整车的销售对象、销售价格，在不构成受托加工的前提下，X公司销售给整车厂的智驾套件经整车厂验收后即确认销售收入的实现；整车厂销售给B公司的车辆，即使B公司尚未对外销售，车辆上所搭载的智驾套件也无需按40%比例抵销顺流交易损益。\n\n2、如果A公司生产的车辆全部销售给B公司，基于此事实应将A公司车辆生产认定为受托加工，X公司销售给A公司的智驾套件不确认收入；A公司将车辆销售给B公司，如车辆尚未实现对外销售，对于在B公司的车辆上所搭载的智驾套件按40%比例抵销顺流交易损益。", "reply": "首先明确讨论前提；A公司和B公司各自均为其所属角色的主要责任人，特别是B不是A或X的代理人。在此前提下：\n\n1、X公司个别报表层面应在将智驾套件交付给A公司且由A公司验收确认时确认收入。期末对于仍在A公司（尚未与车辆一起销售给B公司）的套件销售利润按30%抵销；对于期末在B公司的车辆上已安装的套件销售利润按12%比例（30%*40%）抵销（如果B公司将车辆以经营租赁方式出租的，则该项顺流交易损益随着车辆在B公司计提折旧逐步实现，下同）。\n\n2、需考虑整车厂所生产的整车是否均销售给B公司，即整车厂有无权利自行决定整车的销售对象、价格等要素，并考虑对B公司以外客户销售的实际能力。如果协议约定只能销售给B公司，或者协议无明确约定但事实上只销售给B公司的（对第三方的直接销售占比很小），则仍应认为整车厂是受托加工，对于在整车厂的车辆上所搭载的智驾套件应视同仍由X控制，不能确认销售收入；对于在B公司的车辆上所搭载的智驾套件按40%比例抵销顺流交易损益。\n\n---\n\n可以这样理解。", "searchText": "5497193 关于顺流交易合并抵消的问题 最近更新 everest2017 2026-05-20t13:51:33.000z 2026-06-07t14:17:00.000z 业务背景：\n\nx公司是一家l4级自动驾驶技术公司，核心主业为公开道路无人驾驶车辆的研发、生产、销售及运营服务。\n\nx公司与某整车厂（以下代称“甲公司”）共同出资设立a公司，其中：x公司持有a公司30%股权，甲公司持有a公司70%股权，x公司对a公司具有重大影响。x公司向a公司销售智能驾驶套件，a公司从事无人驾驶车辆的生产与销售。\n\n同时，x公司与第三方公司（以下代称“乙公司”）共同出资设立b公司，其中：x公司持有b公司40%股权，乙公司持有b公司60%股权，x公司对b公司具有重大影响。b公司自a公司采购无人驾驶车辆，b公司将车辆对外出租或出售并负责车辆后端的运营管理。\n\na公司和b公司均属于x公司的重要联营单位，x公司采用权益法核算。\n\n请教陈版及各位老师：\n\n情形一、x公司将智驾套件销售给a公司，a公司组装成整车销售给b公司，假设截至2025年12月31日，b公司尚未实现对外销售。针对该情形，x公司在编制合并报表时，能否100%全额确认向a销售的智驾套件收入？如不能，在合并报表层面按照多少比例抵消未实现的顺流交易产生的毛利（30%？40%？30%*40%？）？\n\n情形二、x公司将智驾套件销售给整车厂甲公司，甲公司生产整车后销售给b公司，后续由b公司对外销售或出租并负责车辆后端的运营管理。假设截至2025年12月31日，b公司自整车厂购入的车辆尚未实现对外销售。针对该情形，在合并报表层面，x公司能否100%全额确认向整车厂甲公司销售的智驾套件收入？\n\n---\n\n感谢陈版主解惑！\n\n承接您的回复辛苦您再帮忙指导一下以下理解是否正确：\n\n1、如果整车厂能够自行决定整车的销售对象、销售价格，在不构成受托加工的前提下，x公司销售给整车厂的智驾套件经整车厂验收后即确认销售收入的实现；整车厂销售给b公司的车辆，即使b公司尚未对外销售，车辆上所搭载的智驾套件也无需按40%比例抵销顺流交易损益。\n\n2、如果a公司生产的车辆全部销售给b公司，基于此事实应将a公司车辆生产认定为受托加工，x公司销售给a公司的智驾套件不确认收入；a公司将车辆销售给b公司，如车辆尚未实现对外销售，对于在b公司的车辆上所搭载的智驾套件按40%比例抵销顺流交易损益。 首先明确讨论前提；a公司和b公司各自均为其所属角色的主要责任人，特别是b不是a或x的代理人。在此前提下：\n\n1、x公司个别报表层面应在将智驾套件交付给a公司且由a公司验收确认时确认收入。期末对于仍在a公司（尚未与车辆一起销售给b公司）的套件销售利润按30%抵销；对于期末在b公司的车辆上已安装的套件销售利润按12%比例（30%*40%）抵销（如果b公司将车辆以经营租赁方式出租的，则该项顺流交易损益随着车辆在b公司计提折旧逐步实现，下同）。\n\n2、需考虑整车厂所生产的整车是否均销售给b公司，即整车厂有无权利自行决定整车的销售对象、价格等要素，并考虑对b公司以外客户销售的实际能力。如果协议约定只能销售给b公司，或者协议无明确约定但事实上只销售给b公司的（对第三方的直接销售占比很小），则仍应认为整车厂是受托加工，对于在整车厂的车辆上所搭载的智驾套件应视同仍由x控制，不能确认销售收入；对于在b公司的车辆上所搭载的智驾套件按40%比例抵销顺流交易损益。\n\n---\n\n可以这样理解。 https://bbs.esnai.cn/thread-5497193-1-1.html"}, {"tid": "5497224", "title": "复验导致的不符事项", "category": "最近更新", "questionAuthor": "wx_5acf1ca80787", "questionTime": "2026-05-23T05:39:42.000Z", "replyTime": "2026-06-07T14:00:00.000Z", "replySortTime": "2026-06-07T14:00:00.000Z", "url": "https://bbs.esnai.cn/thread-5497224-1-1.html", "question": "@chenyiwei陈版主好，公司向客户销售材料，合同中约定验收标准是通过客户复验。实际业务流程是，客户在收到公司材料时先做简单初验（核实重量、随货资料是否齐全），然后暂估入库，在客户使用之前会对公司的材料进行实验室复验，实验室复验通过之后客户才会使用该材料，也就是客户在复验结束后才会向公司出具验收单，公司据此确认收入。但是这导致年末公司向对方函证的时候，对方回函应付账款暂估不符，也就是两家单位的交易额是不一致的，原因其实就是客户初验后即入库，但是客户的入库和向公司出具验收单的时点不一致。请问这种情况下，公司该做何种处理？\n\n我们理解这种实验室复验的流程和细节程度均与初验不同，就是不被理解为一种“例行程序”，那么这种由于合同内容导致的差异是否属于商业模式的可解释现象？", "reply": "如果这种实验室复验不能被认定为例行程序，而是代表客户接受商品的正式验收程序，则双方均以通过实验室复验时点作为会计处理依据，即本企业据此确认收入（此前确认发出商品），客户据此确认存货。两者确认的时点还是一致的，如果有对账结果不一致情况，则需考虑是哪一方的差错。一般尽量避免两者会计处理不同步导致的回函确认差异。", "searchText": "5497224 复验导致的不符事项 最近更新 wx_5acf1ca80787 2026-05-23t05:39:42.000z 2026-06-07t14:00:00.000z @chenyiwei陈版主好，公司向客户销售材料，合同中约定验收标准是通过客户复验。实际业务流程是，客户在收到公司材料时先做简单初验（核实重量、随货资料是否齐全），然后暂估入库，在客户使用之前会对公司的材料进行实验室复验，实验室复验通过之后客户才会使用该材料，也就是客户在复验结束后才会向公司出具验收单，公司据此确认收入。但是这导致年末公司向对方函证的时候，对方回函应付账款暂估不符，也就是两家单位的交易额是不一致的，原因其实就是客户初验后即入库，但是客户的入库和向公司出具验收单的时点不一致。请问这种情况下，公司该做何种处理？\n\n我们理解这种实验室复验的流程和细节程度均与初验不同，就是不被理解为一种“例行程序”，那么这种由于合同内容导致的差异是否属于商业模式的可解释现象？ 如果这种实验室复验不能被认定为例行程序，而是代表客户接受商品的正式验收程序，则双方均以通过实验室复验时点作为会计处理依据，即本企业据此确认收入（此前确认发出商品），客户据此确认存货。两者确认的时点还是一致的，如果有对账结果不一致情况，则需考虑是哪一方的差错。一般尽量避免两者会计处理不同步导致的回函确认差异。 https://bbs.esnai.cn/thread-5497224-1-1.html"}, {"tid": "5497238", "title": "租赁付款时增值税部分在现金流中如何列示", "category": "最近更新", "questionAuthor": "已转非执业", "questionTime": "2026-05-25T04:56:26.000Z", "replyTime": "2026-06-07T13:53:00.000Z", "replySortTime": "2026-06-07T13:53:00.000Z", "url": "https://bbs.esnai.cn/thread-5497238-1-1.html", "question": "@chenyiwei 陈老师好，关于租赁准则中支付的增值税在现金流量表中如何列示？\n\n  结合准则中现金流量表的规定，承租人偿还租赁负债本金、利息，以及预付租金、租赁保证金，统一归类为筹资活动相关现金流出。\n\n现行准则条文未对租赁交易对应的增值税进项税列报口径作出明确界定，实务处理口径因此出现不同理解，基于以下观点个人认为应当与本金一致放在支付的其他与筹资活动有关的现金；\n\n1、常规认知里，支付的各项税费核算企业直接向税务机关缴纳的税款，属于实际税负成本，租赁进项税实质为随同款项支付的代垫税金，后续可抵扣减少实际增值税缴纳额，与常规税费支出性质存在区别，因此不应该单独列示为支付的税费；\n\n2、日常购买商品、销售收款、购置固定资产、无形资产、开发支出等交易，对应的增值税进项税均未单独拆分列示，均跟随主业交易统一归类，租赁进项税并无特殊拆分依据；虽然是价外税，虽然有的属于经营活动有的属于投资活动，但并没有把税费单独列示；\n\n3、同一笔租赁付款流水，从实务核算习惯来看，按款项整体经济性质统一列报，更贴合报表列报逻辑。\n\n但也有不同的观点，似乎也有道理\n\n1、归入投资活动现金流\n\n依据租赁交易形成使用权资产，类比购建长期资产业务逻辑，认为对应进项税应随同资产相关支出，划分至投资活动现金流。\n\n2、归入经营活动现金流\n\n由于增值税进项税额并未计入使用权资产和租赁负债的初始计量成本中，因此不属于“筹资活动现金流出”；租金中的增值税进项税额本身不是投资活动也不是筹资活动，根据现金流量表的原则，既不是投资活动也不是筹资活动的属于经营活动。\n\n想请教陈老师对于该问题的看法，偏向于哪一种处理，为什么？", "reply": "该部分增值税额与租赁负债的结算是同步支付的，两者密切相关，故列入同一个现金流量表项目更合理，即支付其他与筹资活动有关的现金。", "searchText": "5497238 租赁付款时增值税部分在现金流中如何列示 最近更新 已转非执业 2026-05-25t04:56:26.000z 2026-06-07t13:53:00.000z @chenyiwei 陈老师好，关于租赁准则中支付的增值税在现金流量表中如何列示？\n\n  结合准则中现金流量表的规定，承租人偿还租赁负债本金、利息，以及预付租金、租赁保证金，统一归类为筹资活动相关现金流出。\n\n现行准则条文未对租赁交易对应的增值税进项税列报口径作出明确界定，实务处理口径因此出现不同理解，基于以下观点个人认为应当与本金一致放在支付的其他与筹资活动有关的现金；\n\n1、常规认知里，支付的各项税费核算企业直接向税务机关缴纳的税款，属于实际税负成本，租赁进项税实质为随同款项支付的代垫税金，后续可抵扣减少实际增值税缴纳额，与常规税费支出性质存在区别，因此不应该单独列示为支付的税费；\n\n2、日常购买商品、销售收款、购置固定资产、无形资产、开发支出等交易，对应的增值税进项税均未单独拆分列示，均跟随主业交易统一归类，租赁进项税并无特殊拆分依据；虽然是价外税，虽然有的属于经营活动有的属于投资活动，但并没有把税费单独列示；\n\n3、同一笔租赁付款流水，从实务核算习惯来看，按款项整体经济性质统一列报，更贴合报表列报逻辑。\n\n但也有不同的观点，似乎也有道理\n\n1、归入投资活动现金流\n\n依据租赁交易形成使用权资产，类比购建长期资产业务逻辑，认为对应进项税应随同资产相关支出，划分至投资活动现金流。\n\n2、归入经营活动现金流\n\n由于增值税进项税额并未计入使用权资产和租赁负债的初始计量成本中，因此不属于“筹资活动现金流出”；租金中的增值税进项税额本身不是投资活动也不是筹资活动，根据现金流量表的原则，既不是投资活动也不是筹资活动的属于经营活动。\n\n想请教陈老师对于该问题的看法，偏向于哪一种处理，为什么？ 该部分增值税额与租赁负债的结算是同步支付的，两者密切相关，故列入同一个现金流量表项目更合理，即支付其他与筹资活动有关的现金。 https://bbs.esnai.cn/thread-5497238-1-1.html"}, {"tid": "5497183", "title": "使用权资产租赁变更", "category": "最近更新", "questionAuthor": "wx_635fb64a7cf0", "questionTime": "2026-05-20T06:09:56.000Z", "replyTime": "2026-06-07T13:50:00.000Z", "replySortTime": "2026-06-07T13:50:00.000Z", "url": "https://bbs.esnai.cn/thread-5497183-1-1.html", "question": "业务背景\n\n我司线下实体店铺租赁合同统一一年一签，门店前期装修投入金额大、存在大额长期待摊费用摊销，为匹配装修摊销周期，2024 年 1 月仅签订 1 年期正式租赁合同，账务上直接按照装修三年长期待摊摊销年限，确定整体预估租赁期为 2024.01-2026.12 共计 3 年，按 3 年期限确认使用权资产、租赁负债，同时按 3 年期限正常计提使用权资产折旧。\n\n目前2024 年度租赁期已满，现已续签2025 年度租赁合同，本次租金差异为结合当下市场行情做的常规调价，和最初预估续租租金不一致；\n\n另外公司经营存在不确定性，无法精准确定门店后续实际能够持续租赁的具体年限。\n\n核心疑问\n\n1、本次 2025 年续签租金变动属于市场行情常规调整，是否仅需修正原预估租金金额，重新测算调整租赁负债，进而同步调整使用权资产账面价值即可？\n\n2、准则仅规定租赁变更需依据租赁负债变动调整使用权资产账面价值，想明确：租赁变更时点，是否需要将变更前使用权资产原值与对应的累计折旧进行对抵处理？\n\n3、签订 2025 年合同完成续签后，是否仅需将原预估租金金额修正为实际租金金额，原本预估剩余租期是否保持 2024.01-2026.12 这 3 年总预估租赁期口径不变、不再额外延长租期？\n\n另外初始预估租赁期依据门店装修长期待摊摊销年限确定，重新签约后该如何合理考量确定后续预估租赁期；且企业无法确定门店长期租赁年限，待到2025 年租期到期、续签 2026 年租赁合同时，后续每一次逐年续签统一按照什么规则进行账务调整？\n\n4、待到最初预估的2026 年 12 月三年租赁总期限正式届满，进入2027 年重新签订一年期租赁合同后：\n\n（1）此时装修长摊已摊销完毕，无摊销年限作为预估依据，同时公司依旧无法确定后续租赁时长，该如何合理判断并确定新的预估租赁期限？\n\n（2）原 3 年预估租期已全部到期，账务上是否需要将此前基于 2024-2026 三年期限确认的使用权资产原值与累计折旧做对抵结清，再按照 2027 年新一年合同重新确认全新的使用权资产与租赁负债？\n\n公司门店租赁体量庞大、租赁合同数量多，若每一年续签都逐一重新评估复核预估租赁期限，工作量极大且实操落地难度高，请问有无简化合规的统一处理方式？\n\n---\n\n陈版，针对第4点，合同开始签了1年，我们预估了3年，3年到期了，重新进行了续签，这个时候为什么不认为是原租赁期结束了，重新预估租赁期确认一项使用权资产；如果预估的租赁期结束了，后续的续签还是按照变更处理（调整使用权资产和租赁负债），那使用权资产的原值不就是一直越滚越大了吗", "reply": "1、是。\n\n2、不需要在租赁变更时点将变更前使用权资产原值与对应的累计折旧进行对抵处理。\n\n3、由于租赁期原本就是一项估计，故需要定期复核调整该项估计。在租金调整的同时，也应对预计的后续经营年限进行重新估计，并据此调整剩余租赁期的会计估计。\n\n4、同上，应根据届时可获得的信息（包括最新续签的合同）对剩余租赁期限进行重新估计，必要时作为对续租选择权行权可能性的估计变更处理。此时的变更不构成一项单独租赁，故仍延续原租赁的会计处理，调整原租赁下使用权资产和租赁负债的账面价值，且无需将此前基于 2024-2026 三年期限确认的使用权资产原值与累计折旧做对抵结清。\n\n5、建议将门店按照其规模、所处地域、经营业绩水平、对公司的重要性等几个维度进行分层，针对不同层次，对处于顶层的少数重要门店采用个别认定法进行估计调整，对其他门店可按组合方式进行复核调整。\n\n---\n\n如果是在前一次租赁的到期日之前续签的，则属于租赁变更，但变更部分不构成一项单独租赁的情形。此时不终止确认原有的使用权资产，所以原值会越滚越大。", "searchText": "5497183 使用权资产租赁变更 最近更新 wx_635fb64a7cf0 2026-05-20t06:09:56.000z 2026-06-07t13:50:00.000z 业务背景\n\n我司线下实体店铺租赁合同统一一年一签，门店前期装修投入金额大、存在大额长期待摊费用摊销，为匹配装修摊销周期，2024 年 1 月仅签订 1 年期正式租赁合同，账务上直接按照装修三年长期待摊摊销年限，确定整体预估租赁期为 2024.01-2026.12 共计 3 年，按 3 年期限确认使用权资产、租赁负债，同时按 3 年期限正常计提使用权资产折旧。\n\n目前2024 年度租赁期已满，现已续签2025 年度租赁合同，本次租金差异为结合当下市场行情做的常规调价，和最初预估续租租金不一致；\n\n另外公司经营存在不确定性，无法精准确定门店后续实际能够持续租赁的具体年限。\n\n核心疑问\n\n1、本次 2025 年续签租金变动属于市场行情常规调整，是否仅需修正原预估租金金额，重新测算调整租赁负债，进而同步调整使用权资产账面价值即可？\n\n2、准则仅规定租赁变更需依据租赁负债变动调整使用权资产账面价值，想明确：租赁变更时点，是否需要将变更前使用权资产原值与对应的累计折旧进行对抵处理？\n\n3、签订 2025 年合同完成续签后，是否仅需将原预估租金金额修正为实际租金金额，原本预估剩余租期是否保持 2024.01-2026.12 这 3 年总预估租赁期口径不变、不再额外延长租期？\n\n另外初始预估租赁期依据门店装修长期待摊摊销年限确定，重新签约后该如何合理考量确定后续预估租赁期；且企业无法确定门店长期租赁年限，待到2025 年租期到期、续签 2026 年租赁合同时，后续每一次逐年续签统一按照什么规则进行账务调整？\n\n4、待到最初预估的2026 年 12 月三年租赁总期限正式届满，进入2027 年重新签订一年期租赁合同后：\n\n（1）此时装修长摊已摊销完毕，无摊销年限作为预估依据，同时公司依旧无法确定后续租赁时长，该如何合理判断并确定新的预估租赁期限？\n\n（2）原 3 年预估租期已全部到期，账务上是否需要将此前基于 2024-2026 三年期限确认的使用权资产原值与累计折旧做对抵结清，再按照 2027 年新一年合同重新确认全新的使用权资产与租赁负债？\n\n公司门店租赁体量庞大、租赁合同数量多，若每一年续签都逐一重新评估复核预估租赁期限，工作量极大且实操落地难度高，请问有无简化合规的统一处理方式？\n\n---\n\n陈版，针对第4点，合同开始签了1年，我们预估了3年，3年到期了，重新进行了续签，这个时候为什么不认为是原租赁期结束了，重新预估租赁期确认一项使用权资产；如果预估的租赁期结束了，后续的续签还是按照变更处理（调整使用权资产和租赁负债），那使用权资产的原值不就是一直越滚越大了吗 1、是。\n\n2、不需要在租赁变更时点将变更前使用权资产原值与对应的累计折旧进行对抵处理。\n\n3、由于租赁期原本就是一项估计，故需要定期复核调整该项估计。在租金调整的同时，也应对预计的后续经营年限进行重新估计，并据此调整剩余租赁期的会计估计。\n\n4、同上，应根据届时可获得的信息（包括最新续签的合同）对剩余租赁期限进行重新估计，必要时作为对续租选择权行权可能性的估计变更处理。此时的变更不构成一项单独租赁，故仍延续原租赁的会计处理，调整原租赁下使用权资产和租赁负债的账面价值，且无需将此前基于 2024-2026 三年期限确认的使用权资产原值与累计折旧做对抵结清。\n\n5、建议将门店按照其规模、所处地域、经营业绩水平、对公司的重要性等几个维度进行分层，针对不同层次，对处于顶层的少数重要门店采用个别认定法进行估计调整，对其他门店可按组合方式进行复核调整。\n\n---\n\n如果是在前一次租赁的到期日之前续签的，则属于租赁变更，但变更部分不构成一项单独租赁的情形。此时不终止确认原有的使用权资产，所以原值会越滚越大。 https://bbs.esnai.cn/thread-5497183-1-1.html"}, {"tid": "5467396", "title": "陈老师，关于实控人受让股份相关的股份支付", "category": "最近更新", "questionAuthor": "pippaqq", "questionTime": "2022-09-07T02:48:14.000Z", "replyTime": "2026-06-07T13:46:00.000Z", "replySortTime": "2026-06-07T13:46:00.000Z", "url": "https://bbs.esnai.cn/thread-5467396-1-1.html", "question": "谢谢陈老师的回复，针对第2点回复，再补充请教一下，“如果这部分股份不是由实控人受让，而是转让给公司”这里转让给公司是指我问题中的溢价部分，即回购价与再次授予价之间的差异转让给公司，还是指回购即由公司执行？如果是后者，这是否与原回购（假设约定由实控人）安排冲突，以及日后又如何再次授予合伙平台上的其他人员，由公司转让给合伙平台并同时授予其他人员吗？\n\n---\n\n请教陈老师@chenyiwei ，结合以上情况（1），针对实控人受让股份后再次转让，回购价格与日后再次授予价格之间的差异，如果归实控人所有的，也应就此确认实控人的股份支付费用，是否区分增资取得或老股转让，感谢🙏", "reply": "两者都有，即回购由公司执行，回购价格与再授予价格之间的差价由公司享有。\n\n---\n\n这里就不做区分了。", "searchText": "5467396 陈老师，关于实控人受让股份相关的股份支付 最近更新 pippaqq 2022-09-07t02:48:14.000z 2026-06-07t13:46:00.000z 谢谢陈老师的回复，针对第2点回复，再补充请教一下，“如果这部分股份不是由实控人受让，而是转让给公司”这里转让给公司是指我问题中的溢价部分，即回购价与再次授予价之间的差异转让给公司，还是指回购即由公司执行？如果是后者，这是否与原回购（假设约定由实控人）安排冲突，以及日后又如何再次授予合伙平台上的其他人员，由公司转让给合伙平台并同时授予其他人员吗？\n\n---\n\n请教陈老师@chenyiwei ，结合以上情况（1），针对实控人受让股份后再次转让，回购价格与日后再次授予价格之间的差异，如果归实控人所有的，也应就此确认实控人的股份支付费用，是否区分增资取得或老股转让，感谢🙏 两者都有，即回购由公司执行，回购价格与再授予价格之间的差价由公司享有。\n\n---\n\n这里就不做区分了。 https://bbs.esnai.cn/thread-5467396-1-1.html"}, {"tid": "5497292", "title": "以股权激励的形式获取联营企业股权", "category": "最近更新", "questionAuthor": "Yuan-Sir", "questionTime": "2026-05-28T15:26:35.000Z", "replyTime": "2026-06-07T13:15:00.000Z", "replySortTime": "2026-06-07T13:15:00.000Z", "url": "https://bbs.esnai.cn/thread-5497292-1-1.html", "question": "请教各位：\n\nA公司以货币2亿元+自身股份（以股权激励的形式，授予期权，授予比例占集团比例低于1%）向持股45%的联营公司B的实控人张三进一步收购股权40%，本次交易后，A公司持有B公司85%股权，形成非同一控制下的企业合并。同时，张三加入A公司的另外一个控股公司C，成为员工，不再持有任何B公司的股份。授予的期权分四批归属，每年可行权一批，行权条件为满足约定的服务期及当年的考核，期权总价值评估为8000万元。\n\n问题1：以股权激励的形式获取联营企业股权，如何进行会计处理？\n\n初步想法：《企业会计准则解释第4号》：结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积(其他资本公积)或负债。\n\n授予期权时：\n\n授予企业：\n\n第一年：借：长期股权投资：8000/4/1+8000/4/2+8000/4/3+8000/4/4=4166.67万元\n\n     借：长期股权投资 2亿元\n\n        贷：资本公积4166.67万元\n\n        贷：银行存款 2亿元\n\n以后年度，按期权归属进度确认长期股权投资、资本公积。\n\n接受服务企业：\n\n第一年：借：管理费用4166.67万元\n\n        贷：资本公积4166.67万元\n\n以后年度，按期权归属进度确认管理费用、资本公积\n\n张三行权时：\n\n借：银行存款，贷：股本、资本公积\n\n合并层面：（1）假设原45%长投账面价值为2.9亿元，45%公允价值=2.8亿元/40%*45%=3.15亿元，长投、投资收益增加0.25亿元。（2）长投与资本公积抵消4166.67万元，最终合并层面体现的是管理费用与资本公积4166.67万元。\n\n疑惑点1：调整45%价值时用了期权的全部价值8000万算公允价值，而个别报表仅确认了分摊价值4166.67元，合并报表如何抵消？疑惑点2：假设问题换为股权激励换取对方1%股份，不构成合并，此时合并层面抵消掉长投与资本公积，那么对联营企业的长投岂不是没有体现新收购部分的价值吗？", "reply": "你在主贴中的理解基本合理。\n\n1、个别报表层面的长期股权投资成本与子公司（接受服务方）报表中确认的费用是一致的。因此可以抵销，无特殊问题。鉴于C不是A的全资子公司，相当于A为C的少数股东承担了一部分股份支付费用，故在A的合并报表中需体现出A对C的少数股东的利益让渡，即减少资本公积同时增加少数股东权益。\n\n2、“股权激励换取对方1%股份”具体如何操作？需说明具体操作才能进一步考虑会计处理。", "searchText": "5497292 以股权激励的形式获取联营企业股权 最近更新 yuan-sir 2026-05-28t15:26:35.000z 2026-06-07t13:15:00.000z 请教各位：\n\na公司以货币2亿元+自身股份（以股权激励的形式，授予期权，授予比例占集团比例低于1%）向持股45%的联营公司b的实控人张三进一步收购股权40%，本次交易后，a公司持有b公司85%股权，形成非同一控制下的企业合并。同时，张三加入a公司的另外一个控股公司c，成为员工，不再持有任何b公司的股份。授予的期权分四批归属，每年可行权一批，行权条件为满足约定的服务期及当年的考核，期权总价值评估为8000万元。\n\n问题1：以股权激励的形式获取联营企业股权，如何进行会计处理？\n\n初步想法：《企业会计准则解释第4号》：结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积(其他资本公积)或负债。\n\n授予期权时：\n\n授予企业：\n\n第一年：借：长期股权投资：8000/4/1+8000/4/2+8000/4/3+8000/4/4=4166.67万元\n\n     借：长期股权投资 2亿元\n\n        贷：资本公积4166.67万元\n\n        贷：银行存款 2亿元\n\n以后年度，按期权归属进度确认长期股权投资、资本公积。\n\n接受服务企业：\n\n第一年：借：管理费用4166.67万元\n\n        贷：资本公积4166.67万元\n\n以后年度，按期权归属进度确认管理费用、资本公积\n\n张三行权时：\n\n借：银行存款，贷：股本、资本公积\n\n合并层面：（1）假设原45%长投账面价值为2.9亿元，45%公允价值=2.8亿元/40%*45%=3.15亿元，长投、投资收益增加0.25亿元。（2）长投与资本公积抵消4166.67万元，最终合并层面体现的是管理费用与资本公积4166.67万元。\n\n疑惑点1：调整45%价值时用了期权的全部价值8000万算公允价值，而个别报表仅确认了分摊价值4166.67元，合并报表如何抵消？疑惑点2：假设问题换为股权激励换取对方1%股份，不构成合并，此时合并层面抵消掉长投与资本公积，那么对联营企业的长投岂不是没有体现新收购部分的价值吗？ 你在主贴中的理解基本合理。\n\n1、个别报表层面的长期股权投资成本与子公司（接受服务方）报表中确认的费用是一致的。因此可以抵销，无特殊问题。鉴于c不是a的全资子公司，相当于a为c的少数股东承担了一部分股份支付费用，故在a的合并报表中需体现出a对c的少数股东的利益让渡，即减少资本公积同时增加少数股东权益。\n\n2、“股权激励换取对方1%股份”具体如何操作？需说明具体操作才能进一步考虑会计处理。 https://bbs.esnai.cn/thread-5497292-1-1.html"}, {"tid": "5497284", "title": "同一控制下企业合并关于商誉和评估增值的问题", "category": "最近更新", "questionAuthor": "国际庄Lee", "questionTime": "2026-05-28T01:33:43.000Z", "replyTime": "2026-06-07T11:03:00.000Z", "replySortTime": "2026-06-07T11:03:00.000Z", "url": "https://bbs.esnai.cn/thread-5497284-1-1.html", "question": "求教陈版主，各位大神：\n\n案例背景：\n\n假设A集团在23年收购了B C两家公司，因为这两家公司的股东是一样的持股比例也一样，他们之前内部一起管理，所以收购时把两家公司一起评估，交易对价也是合计考虑的，商誉也没有在两家公司区分。\n\n26年B公司要对C公司增资，增资后B控股C公司，A变为C的少数股东。\n\n现在有几个疑惑点：\n\n（1）对于C公司来说，A因为变成少数股东，之前长投是按照成本法核算，现在需要因为变为少股而转换成权益法核算吗？\n\n自己的考虑：虽然A公司直接持股比例为少数股东，但是通过B公司间接持股，仍然对C公司持有控股权，所以不需要单独调整长期股权投资。也有同事说持股只是看直接持有，不需要看间接持有，所以需要调整长投。\n\n（2）商誉需要在B和C之间分摊吗？并且将C公司的商誉下放到B公司的小合并中吗？C公司的商誉需要下放到C的小合并中吗？收购产生的评估增值需要从A公司下放到B公司小合并吗？\n\n自己的考虑：商誉需要分摊，因为B公司的长投需要反应C公司自收购以来持续计量的可辨认净资产公允价值，公允价值包括了评估增值和商誉。\n\nC公司商誉和评估增值需要下放，B公司不需要，对于B公司来说股东没有变化，仍然是A公司控股，如果把B公司的商誉下放到B小合并，自己的合并报表包括了自己的商誉就很怪（但是审计师质控说之前是有案例这么做，还在寻找中）；对于C公司来说，需要把商誉和评估增减值都下放到B公司合并报表中，这样才能反应持续计量的公允价值\n\n（3）如果需要拆分商誉的话怎么拆分更合理一些呢？\n\n个人感觉难点在当时评估增值一项无形资产-品牌，现在两个公司都是在生产和销售这个品牌的产品，只不过型号不一样，这部分怎么拆分更合理一些呢？\n\n自己的考虑：因为当时收购的时候主要的经营还是在B公司，之前经营模式是C公司主要产品生产完之后少量自己对外销售，大部分都销售给B公司，由对方对外销售，所以这样情况的前提下，这个品牌都放到B公司仍然在大合并是不是会更好一些呢？", "reply": "1、在B对C增资后，A仍然控制C，只是由直接控制变为间接控制，因此A个别报表层面对C的长投仍按成本法核算，无需调整。\n\n2、根据《企业会计准则解释第6号》第二条规定，B公司在合并C公司时，虽然是同一控制下合并，但仅追溯至两公司被A收购之日，且作为同一控制下合并会计处理依据的账面价值是A合并报表层面的账面价值，即以原购买日的公允价值为基础持续计算至合并日的金额（包括C公司的商誉）。所以商誉是需要在B、C之间分摊的。但B的合并报表中对自身资产、负债仍保持原账面价值的计量基础。\n\n3、此问题需根据案例的具体情况讨论，你说的商誉全部归B上述有可能的。但是否合适还需要结合进一步信息予以考虑。", "searchText": "5497284 同一控制下企业合并关于商誉和评估增值的问题 最近更新 国际庄lee 2026-05-28t01:33:43.000z 2026-06-07t11:03:00.000z 求教陈版主，各位大神：\n\n案例背景：\n\n假设a集团在23年收购了b c两家公司，因为这两家公司的股东是一样的持股比例也一样，他们之前内部一起管理，所以收购时把两家公司一起评估，交易对价也是合计考虑的，商誉也没有在两家公司区分。\n\n26年b公司要对c公司增资，增资后b控股c公司，a变为c的少数股东。\n\n现在有几个疑惑点：\n\n（1）对于c公司来说，a因为变成少数股东，之前长投是按照成本法核算，现在需要因为变为少股而转换成权益法核算吗？\n\n自己的考虑：虽然a公司直接持股比例为少数股东，但是通过b公司间接持股，仍然对c公司持有控股权，所以不需要单独调整长期股权投资。也有同事说持股只是看直接持有，不需要看间接持有，所以需要调整长投。\n\n（2）商誉需要在b和c之间分摊吗？并且将c公司的商誉下放到b公司的小合并中吗？c公司的商誉需要下放到c的小合并中吗？收购产生的评估增值需要从a公司下放到b公司小合并吗？\n\n自己的考虑：商誉需要分摊，因为b公司的长投需要反应c公司自收购以来持续计量的可辨认净资产公允价值，公允价值包括了评估增值和商誉。\n\nc公司商誉和评估增值需要下放，b公司不需要，对于b公司来说股东没有变化，仍然是a公司控股，如果把b公司的商誉下放到b小合并，自己的合并报表包括了自己的商誉就很怪（但是审计师质控说之前是有案例这么做，还在寻找中）；对于c公司来说，需要把商誉和评估增减值都下放到b公司合并报表中，这样才能反应持续计量的公允价值\n\n（3）如果需要拆分商誉的话怎么拆分更合理一些呢？\n\n个人感觉难点在当时评估增值一项无形资产-品牌，现在两个公司都是在生产和销售这个品牌的产品，只不过型号不一样，这部分怎么拆分更合理一些呢？\n\n自己的考虑：因为当时收购的时候主要的经营还是在b公司，之前经营模式是c公司主要产品生产完之后少量自己对外销售，大部分都销售给b公司，由对方对外销售，所以这样情况的前提下，这个品牌都放到b公司仍然在大合并是不是会更好一些呢？ 1、在b对c增资后，a仍然控制c，只是由直接控制变为间接控制，因此a个别报表层面对c的长投仍按成本法核算，无需调整。\n\n2、根据《企业会计准则解释第6号》第二条规定，b公司在合并c公司时，虽然是同一控制下合并，但仅追溯至两公司被a收购之日，且作为同一控制下合并会计处理依据的账面价值是a合并报表层面的账面价值，即以原购买日的公允价值为基础持续计算至合并日的金额（包括c公司的商誉）。所以商誉是需要在b、c之间分摊的。但b的合并报表中对自身资产、负债仍保持原账面价值的计量基础。\n\n3、此问题需根据案例的具体情况讨论，你说的商誉全部归b上述有可能的。但是否合适还需要结合进一步信息予以考虑。 https://bbs.esnai.cn/thread-5497284-1-1.html"}, {"tid": "5497281", "title": "请教股票期权分摊期的确定", "category": "最近更新", "questionAuthor": "ancctv001", "questionTime": "2026-05-27T13:24:46.000Z", "replyTime": "2026-06-07T10:56:00.000Z", "replySortTime": "2026-06-07T10:56:00.000Z", "url": "https://bbs.esnai.cn/thread-5497281-1-1.html", "question": "案例背景：企业在实施股份支付计划时采取“一次授予、分批行权”的方式，授予日为2x16年5月1日，有四个可行权日期。情况如下：\n\n可行权日期可行权条件可行权数量\n2x18年6月1日（1）2x16年收入较2x15年增长10%；（2）至2x18年6月1日持续在职100\n\n2x19年6月1日（1）2x17年收入较2x16年增长15%；（2）至2x19年6月1日持续在职100\n\n2x20年6月1日（1）2x18年收入较2x17年增长20%；（2）至2x20年6月1日持续在职100\n\n2x21年6月1日（1）2x19年收入较2x18年增长20%；（2）至2x21年6月1日持续在职100\n\n可行权期间为可行权日开始一年，即第一批股票期权的可行权期间为2x18年6月1日至2x19年5月31日。业绩考核中还约定若公司若连续两个会计年度营业收入未达到上述业绩考核目标，则本次激励计划终止，公司注销所有激励对象股票期权可行权份额。\n\n咨询问题：业绩考核中的该项约定是否对于分摊期的确认有影响？第一批股票期权的分摊期确定为哪个期间比较合适？\n\n（1）因2x17、2x18年增长均不达标导致第一批股票期权可行权但未行权部分的注销，属于可行权日后事项，分摊期为2x16年5月1日至2x18年6月1日；\n\n（2）2x17、2x18年业绩增长实际也属于第一批股票期权的非市场业绩条件，分摊期为2x16年5月1日至2x19年5月31日（审计报告出具日，业绩情况确定）", "reply": "业绩考核中的该项约定对于分摊期的确认无影响，仍按照《监管规则适用指引——会计类第1号》之“1-13 一次授予、分期行权的股份支付计划”确定各批次的等待期。若因为触发“若连续两个会计年度营业收入未达到上述业绩考核目标，则本次激励计划终止”条款导致激励计划终止的，则：对于终止时等待期已满的激励股权，不冲回已确认的股份支付费用；对于终止时尚在等待期内的激励股权，则已确认的股份支付费用予以转回处理。", "searchText": "5497281 请教股票期权分摊期的确定 最近更新 ancctv001 2026-05-27t13:24:46.000z 2026-06-07t10:56:00.000z 案例背景：企业在实施股份支付计划时采取“一次授予、分批行权”的方式，授予日为2x16年5月1日，有四个可行权日期。情况如下：\n\n可行权日期可行权条件可行权数量\n2x18年6月1日（1）2x16年收入较2x15年增长10%；（2）至2x18年6月1日持续在职100\n\n2x19年6月1日（1）2x17年收入较2x16年增长15%；（2）至2x19年6月1日持续在职100\n\n2x20年6月1日（1）2x18年收入较2x17年增长20%；（2）至2x20年6月1日持续在职100\n\n2x21年6月1日（1）2x19年收入较2x18年增长20%；（2）至2x21年6月1日持续在职100\n\n可行权期间为可行权日开始一年，即第一批股票期权的可行权期间为2x18年6月1日至2x19年5月31日。业绩考核中还约定若公司若连续两个会计年度营业收入未达到上述业绩考核目标，则本次激励计划终止，公司注销所有激励对象股票期权可行权份额。\n\n咨询问题：业绩考核中的该项约定是否对于分摊期的确认有影响？第一批股票期权的分摊期确定为哪个期间比较合适？\n\n（1）因2x17、2x18年增长均不达标导致第一批股票期权可行权但未行权部分的注销，属于可行权日后事项，分摊期为2x16年5月1日至2x18年6月1日；\n\n（2）2x17、2x18年业绩增长实际也属于第一批股票期权的非市场业绩条件，分摊期为2x16年5月1日至2x19年5月31日（审计报告出具日，业绩情况确定） 业绩考核中的该项约定对于分摊期的确认无影响，仍按照《监管规则适用指引——会计类第1号》之“1-13 一次授予、分期行权的股份支付计划”确定各批次的等待期。若因为触发“若连续两个会计年度营业收入未达到上述业绩考核目标，则本次激励计划终止”条款导致激励计划终止的，则：对于终止时等待期已满的激励股权，不冲回已确认的股份支付费用；对于终止时尚在等待期内的激励股权，则已确认的股份支付费用予以转回处理。 https://bbs.esnai.cn/thread-5497281-1-1.html"}, {"tid": "5497286", "title": "请问陈老师关于委托研发会计处理问题", "category": "最近更新", "questionAuthor": "wx_60e811b92a55", "questionTime": "2026-05-28T06:15:21.000Z", "replyTime": "2026-06-07T09:50:00.000Z", "replySortTime": "2026-06-07T09:50:00.000Z", "url": "https://bbs.esnai.cn/thread-5497286-1-1.html", "question": "陈老师好，我司目前想要与A企业签订一份委托研发合同，约定对方为我方提供研发服务，一次性支付款项比如100万。合同履行了半年，A企业的研发未能取得进展，无法完成合同约定的目标，双方约定委托研发合同取消，将原已支付的款项转为对A企业的投资。请问，各个时间节点我司应该如何进行账务处理？如果前期已经费用化的研发费用后续转为对企业的投资款，应该如何处理，跨期的情况下怎么处理？", "reply": "对于委托研发合同，应首先根据对研发成果的控制权、对研发过程的主导权、研发过程中相关风险和收益的享有和承担情况等因素，判断其实质是“外购无形资产”还是‘研发外包’。在外购无形资产的情况下，合同开始时支付的款项确认为预付账款（列报为其他非流动资产），到研发成功取得研发成果后转为无形资产；在研发外包情况下，合同开始时支付的款项确认为预付账款，后续取得研发成果时，根据对应的主要研发项目是否已进入资本化阶段，将该项预付账款转为研发费用（费用化支出）或者开发支出（资本化支出）。\n\n在中途确定研发失败，终止合同并将合同价款转为对A企业投资款的情况下，实际上存在两项交易：一是要求A企业退回款项；二是对该项债权进行债转股的债务重组。即，本企业应首先将预付账款转为对A公司的其他应收款，后续按照债务重组（债转股）进行会计处理。", "searchText": "5497286 请问陈老师关于委托研发会计处理问题 最近更新 wx_60e811b92a55 2026-05-28t06:15:21.000z 2026-06-07t09:50:00.000z 陈老师好，我司目前想要与a企业签订一份委托研发合同，约定对方为我方提供研发服务，一次性支付款项比如100万。合同履行了半年，a企业的研发未能取得进展，无法完成合同约定的目标，双方约定委托研发合同取消，将原已支付的款项转为对a企业的投资。请问，各个时间节点我司应该如何进行账务处理？如果前期已经费用化的研发费用后续转为对企业的投资款，应该如何处理，跨期的情况下怎么处理？ 对于委托研发合同，应首先根据对研发成果的控制权、对研发过程的主导权、研发过程中相关风险和收益的享有和承担情况等因素，判断其实质是“外购无形资产”还是‘研发外包’。在外购无形资产的情况下，合同开始时支付的款项确认为预付账款（列报为其他非流动资产），到研发成功取得研发成果后转为无形资产；在研发外包情况下，合同开始时支付的款项确认为预付账款，后续取得研发成果时，根据对应的主要研发项目是否已进入资本化阶段，将该项预付账款转为研发费用（费用化支出）或者开发支出（资本化支出）。\n\n在中途确定研发失败，终止合同并将合同价款转为对a企业投资款的情况下，实际上存在两项交易：一是要求a企业退回款项；二是对该项债权进行债转股的债务重组。即，本企业应首先将预付账款转为对a公司的其他应收款，后续按照债务重组（债转股）进行会计处理。 https://bbs.esnai.cn/thread-5497286-1-1.html"}, {"tid": "5497294", "title": "请教陈版主：护肤品销售中赠送小样的会计处理", "category": "最近更新", "questionAuthor": "__yEs、先生", "questionTime": "2026-05-29T02:03:25.000Z", "replyTime": "2026-06-07T09:44:00.000Z", "replySortTime": "2026-06-07T09:44:00.000Z", "url": "https://bbs.esnai.cn/thread-5497294-1-1.html", "question": "护肤品销售时随正品赠送小样的捆绑销售场景下，该订单最终会有两个场景：\n\n1、客户试用试用装满意后，整单收货确认！\n\n2、客户已使用小样，小样不退回，仅退回正品并全额退款。\n\n请教陈版主针对如上场景下会计处理如下是否妥当？\n\n【举例说明】 某护肤品公司以100元销售一瓶正装面霜（公允价值100元），同时赠送一盒小样（公允价值20元），合同总价100元。按公允价值比例分摊：正品分 tegory": "最近更新", "questionAuthor": "alexwaung", "questionTime": "2026-05-30T09:32:51.000Z", "replyTime": "2026-06-07T09:39:00.000Z", "replySortTime": "2026-06-07T09:39:00.000Z", "url": "https://bbs.esnai.cn/thread-5497303-1-1.html", "question": "Dear 陈总 @chenyiwei ：\n\n您好！现遇到如下问题，特向您请教，烦请您在方便时拨冗指点：\n\nA公司（注册资本及实收资本均为550万元）与B公司（注册资本及实收资本均为50万元，历史上已完成验资）均为同一控制下企业。由于业务收缩，为节约管理成本，集团管理层拟关闭B公司，并采用吸收合并方式，由A公司吸收合并B公司。\n\n方案拟定为：由A公司承继B公司的全部资产及负债，同时A公司注册资本增至600万元（增加B公司对应的50万元）。吸收合并日，管理层拟将B公司资产负债表整体平移至A公司账套，同时A公司实收资本增加50万元。\n\n针对上述事项，烦请协助确认以下问题：\n\n1、作为同一控制下企业合并，未来A公司报送财务报表时，单体报表是否需要对期初数进行重述（即按A+B口径追溯调整）？\n2、作为同一控制下企业合并，B公司资产及负债拟按照其账面价值平移至A公司报表内。根据同一控制下企业合并的处理原则，B公司所有者权益中的未分配利润/未弥补亏损，在吸收合并时，是否亦应作为权益性交易处理：\n若为未分配利润，计入资本公积；若为未弥补亏损，由于资本公积原则上不应为负，是否应冲减A公司未分配利润？\n\n3、吸收合并过程中涉及验资事项。对于A公司新增的50万元实收资本，关于验资报告的出具形式及处理口径，不知是否有相关建议可供参考？如B公司在吸收合并基准日存在资不抵债情形（即净资产为负数，主要负债为集团公司资金池借款，B公司无需归还），在A公司承继其全部资产及负债的情况下，A公司注册资本/实收资本仍增加50万元的处理方式是否可行？实务中对此类情形是否存在特别关注事项或建议的处理口径？\n\n拟采用如下会计处理方式：\n借：各项资产（被合并方账面价值）\n\n贷：各项负债（被合并方账面价值）\n贷：实收资本 50万元\n\n贷：资本公积——资本溢价/股本溢价（差额）\n借：未分配利润（如为累计亏损情形）\n\n非常感谢您的不吝赐教！\n\n谢谢！", "reply": "1、A公司单体报表无需就该吸收合并进行追溯。但如果A公司有其他子公司，需编制合并报表的，则在合并报表层面需进行追溯。（《应用指南汇编2024》P600）\n\n2、可以这样理解。主帖中的账务处理基本合理。\n\n3、根据原国家工商行政管理总局《关于做好公司合并分立登记支持企业兼并重组的意见》（工商企字[2011]226号）：“支持公司自主约定注册资本数额。因合并而存续或者新设的公司，其注册资本、实收资本数额由合并协议约定，但不得高于合并前各公司的注册资本之和、实收资本之和。合并各方之间存在投资关系的，计算合并前各公司的注册资本之和、实收资本之和时，应当扣除投资所对应的注册资本、实收资本数额。”。因此，即使被吸收方B资不抵债，将吸收合并后存续公司A的注册资本确定为两者原注册资本之和仍是可以的，但需在验资报告中对B此前的资不抵债情况作出必要说明。", "searchText": "5497303 请教陈版：同一控制下的吸收合并会计处理 最近更新 alexwaung 2026-05-30t09:32:51.000z 2026-06-07t09:39:00.000z dear 陈总 @chenyiwei ：\n\n您好！现遇到如下问题，特向您请教，烦请您在方便时拨冗指点：\n\na公司（注册资本及实收资本均为550万元）与b公司（注册资本及实收资本均为50万元，历史上已完成验资）均为同一控制下企业。由于业务收缩，为节约管理成本，集团管理层拟关闭b公司，并采用吸收合并方式，由a公司吸收合并b公司。\n\n方案拟定为：由a公司承继b公司的全部资产及负债，同时a公司注册资本增至600万元（增加b公司对应的50万元）。吸收合并日，管理层拟将b公司资产负债表整体平移至a公司账套，同时a公司实收资本增加50万元。\n\n针对上述事项，烦请协助确认以下问题：\n\n1、作为同一控制下企业合并，未来a公司报送财务报表时，单体报表是否需要对期初数进行重述（即按a+b口径追溯调整）？\n2、作为同一控制下企业合并，b公司资产及负债拟按照其账面价值平移至a公司报表内。根据同一控制下企业合并的处理原则，b公司所有者权益中的未分配利润/未弥补亏损，在吸收合并时，是否亦应作为权益性交易处理：\n若为未分配利润，计入资本公积；若为未弥补亏损，由于资本公积原则上不应为负，是否应冲减a公司未分配利润？\n\n3、吸收合并过程中涉及验资事项。对于a公司新增的50万元实收资本，关于验资报告的出具形式及处理口径，不知是否有相关建议可供参考？如b公司在吸收合并基准日存在资不抵债情形（即净资产为负数，主要负债为集团公司资金池借款，b公司无需归还），在a公司承继其全部资产及负债的情况下，a公司注册资本/实收资本仍增加50万元的处理方式是否可行？实务中对此类情形是否存在特别关注事项或建议的处理口径？\n\n拟采用如下会计处理方式：\n借：各项资产（被合并方账面价值）\n\n贷：各项负债（被合并方账面价值）\n贷：实收资本 50万元\n\n贷：资本公积——资本溢价/股本溢价（差额）\n借：未分配利润（如为累计亏损情形）\n\n非常感谢您的不吝赐教！\n\n谢谢！ 1、a公司单体报表无需就该吸收合并进行追溯。但如果a公司有其他子公司，需编制合并报表的，则在合并报表层面需进行追溯。（《应用指南汇编2024》p600）\n\n2、可以这样理解。主帖中的账务处理基本合理。\n\n3、根据原国家工商行政管理总局《关于做好公司合并分立登记支持企业兼并重组的意见》（工商企字[2011]226号）：“支持公司自主约定注册资本数额。因合并而存续或者新设的公司，其注册资本、实收资本数额由合并协议约定，但不得高于合并前各公司的注册资本之和、实收资本之和。合并各方之间存在投资关系的，计算合并前各公司的注册资本之和、实收资本之和时，应当扣除投资所对应的注册资本、实收资本数额。”。因此，即使被吸收方b资不抵债，将吸收合并后存续公司a的注册资本确定为两者原注册资本之和仍是可以的，但需在验资报告中对b此前的资不抵债情况作出必要说明。 https://bbs.esnai.cn/thread-5497303-1-1.html"}, {"tid": "5497318", "title": "求教陈版：购入的耕地占补平衡指标是否可以作为存货核算", "category": "最近更新", "questionAuthor": "wx_64acbdd6843c", "questionTime": "2026-06-01T00:36:44.000Z", "replyTime": "2026-06-07T09:31:00.000Z", "replySortTime": "2026-06-07T09:31:00.000Z", "url": "https://bbs.esnai.cn/thread-5497318-1-1.html", "question": "我公司是某县域平台公司，非房地产类企业，2025年购入5000万元耕地占补平衡指标，该指标目前无明确用途，可以作为存货核算吗", "reply": "首先要确定是否满足确认为资产的条件，即需要明确其未来给本企业带来未来经济利益流入的方式，并确保至少可回收其成本。\n\n在满足确认为本企业资产的条件的前提下，需考虑买卖该指标是否为本企业的”日常活动“。根据收入准则应用指南：”日常活动，是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商品流通企业销售商品、咨询公司提供咨询服务、软件公司为客户开发软件、安装公司提供安装服务、建筑企业提供建造服务等，均属于企业的日常活动。日常活动所形成的经济利益的流入应当确认为收入“。只有确定买卖该指标属于企业日常活动的前提下，才能将购入的指标确认为存货，后续出售时确认收入、成本；反之，只能确认为其他流动资产或者其他非流动资产，后续出售时差额确认为资产处置损益或者营业外收入。", "searchText": "5497318 求教陈版：购入的耕地占补平衡指标是否可以作为存货核算 最近更新 wx_64acbdd6843c 2026-06-01t00:36:44.000z 2026-06-07t09:31:00.000z 我公司是某县域平台公司，非房地产类企业，2025年购入5000万元耕地占补平衡指标，该指标目前无明确用途，可以作为存货核算吗 首先要确定是否满足确认为资产的条件，即需要明确其未来给本企业带来未来经济利益流入的方式，并确保至少可回收其成本。\n\n在满足确认为本企业资产的条件的前提下，需考虑买卖该指标是否为本企业的”日常活动“。根据收入准则应用指南：”日常活动，是指企业为完成其经营目标所从事的经常性活动以及与之相关的活动。例如，工业企业制造并销售产品、商品流通企业销售商品、咨询公司提供咨询服务、软件公司为客户开发软件、安装公司提供安装服务、建筑企业提供建造服务等，均属于企业的日常活动。日常活动所形成的经济利益的流入应当确认为收入“。只有确定买卖该指标属于企业日常活动的前提下，才能将购入的指标确认为存货，后续出售时确认收入、成本；反之，只能确认为其他流动资产或者其他非流动资产，后续出售时差额确认为资产处置损益或者营业外收入。 https://bbs.esnai.cn/thread-5497318-1-1.html"}, {"tid": "5497320", "title": "关于带有融资性质的交易事项税会处理咨询，请教陈版", "category": "最近更新", "questionAuthor": "woainicai111", "questionTime": "2026-06-01T01:52:53.000Z", "replyTime": "2026-06-07T09:25:00.000Z", "replySortTime": "2026-06-07T09:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5497320-1-1.html", "question": "1、背景：乙公司与国内某医院甲医院长期合作，作为乙医院的供应商进行供货。2、目前：我公司嵌入到交易环节，乙公司卖给我们，我们卖给医院，毛利是固定的5%。这样目的主要是为了乙公司快速汇款。如果医院超过3个月没有汇款给我司，我司向乙公司每月收取0.8%的资金费用。\n\n3、请教陈版主：此项交易，我们没有定价权，但是合同又约定我司承担货物风险，我理解总体来看是否处理为净额法？且我司相关资金收支差异，统一处理为利息收入性质的科目，包括5%的毛利部分以及如果超过3个月产生的0.8%部分。\n\n感谢！！！", "reply": "应采用净额法更合理。\n\n承担货物风险与对商品的控制权是两个概念，不能混淆。承担商品实物的毁损灭失风险本质上是一种善良管理义务，不表明本企业有主导商品使用并获取由此产生的几乎全部经济利益的权利。因此不能作为控制权的标志。在贸易类业务中，判断对商品控制权的主要依据应当是：有权决定”在何时，以什么价格卖给谁“。", "searchText": "5497320 关于带有融资性质的交易事项税会处理咨询，请教陈版 最近更新 woainicai111 2026-06-01t01:52:53.000z 2026-06-07t09:25:00.000z 1、背景：乙公司与国内某医院甲医院长期合作，作为乙医院的供应商进行供货。2、目前：我公司嵌入到交易环节，乙公司卖给我们，我们卖给医院，毛利是固定的5%。这样目的主要是为了乙公司快速汇款。如果医院超过3个月没有汇款给我司，我司向乙公司每月收取0.8%的资金费用。\n\n3、请教陈版主：此项交易，我们没有定价权，但是合同又约定我司承担货物风险，我理解总体来看是否处理为净额法？且我司相关资金收支差异，统一处理为利息收入性质的科目，包括5%的毛利部分以及如果超过3个月产生的0.8%部分。\n\n感谢！！！ 应采用净额法更合理。\n\n承担货物风险与对商品的控制权是两个概念，不能混淆。承担商品实物的毁损灭失风险本质上是一种善良管理义务，不表明本企业有主导商品使用并获取由此产生的几乎全部经济利益的权利。因此不能作为控制权的标志。在贸易类业务中，判断对商品控制权的主要依据应当是：有权决定”在何时，以什么价格卖给谁“。 https://bbs.esnai.cn/thread-5497320-1-1.html"}, {"tid": "5497321", "title": "借出产品用于客户测试的核算", "category": "最近更新", "questionAuthor": "wx_5da958a4acba", "questionTime": "2026-06-01T02:37:43.000Z", "replyTime": "2026-06-07T09:23:00.000Z", "replySortTime": "2026-06-07T09:23:00.000Z", "url": "https://bbs.esnai.cn/thread-5497321-1-1.html", "question": "请教老师，公司为AI芯片设计企业，在新产品推出前，会大量借出给客户进行适配测试，借出时会签订借用协议，协议仅简单约定借用时间，借用使用范围，客户负责保管如灭失需要赔偿等一般条款。如客户使用顺理会补充签订借转销合同。借出余额货值重大（可达千万）。 \n\n目前有几种看法①仅作为台账记录，账面不做任何财务处理，还在库存商品核算 ②借出时转为发出商品 ③借出时按存货成本转为对客户的其他应收款。 请问哪种处理更合理", "reply": "
