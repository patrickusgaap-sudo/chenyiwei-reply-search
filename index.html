报表的股东权益总额，少数股东权益仍为-22,650.00万元。c公司因债务豁免增加的资本公积8亿元，全部归属于b公司，少数股东（持有c公司30%股权）不享有该部分权益。以上理解是否正确？是否需要少数股东签署一份不享有8亿元资本公积权益的承诺书？ 查看原帖\n问题1：上述测算和会计处理基本合理。\n\n问题2：是，在购买日时点a、b层面与c相关的少数股权应当一致。日后，c的损益和净资产变动中有部分将归属于b的少数股东乙，导致a、b合并报表层面关于c的少数股东权益出现差异，但该差异在购买日尚不存在。\n\n问题3：不能这样理解。除非与持有c公司30%股权的少数股东有特殊约定，否则因b豁免c的债务导致c增加的权益，该少数股东同样享有，因此在合并报表层面讲体现一项与少数股东之间的权益性交易（增加少数股东权益，相应减少资本公积）。 https://bbs.esnai.cn/thread-5497723-1-1.html"}, {"tid": "5497722", "title": "求助陈版主：关于处置子公司时合并现金流量表的列报问题", "category": "最近更新", "questionAuthor": "tingting@@", "questionTime": "2026-07-07T17:02:16.000Z", "replyTime": "2026-07-15T06:41:00.000Z", "replySortTime": "2026-07-15T06:41:00.000Z", "url": "https://bbs.esnai.cn/thread-5497722-1-1.html", "question": "背景：\n\nA公司原持有B公司100%股权，于2026年6月2日与第三方签订股权转让协议，将所持B公司全部股权对外转让。根据协议约定，本次股权转让对价为0元。转让日（2026年6月2日），B公司账面货币资金余额为1,200万元。其中，有1,080万元系B公司应付A公司的购买商品货款（即A公司向B公司销售商品形成的应收款项，B公司尚未支付），20万系B公司应付A公司往来款。在A公司编制2026年度合并现金流量表时，由于B公司不再纳入合并范围，其出表日所持有的1,200万元货币资金在合并现金流量表中应如何列示？因处置对价为0，计算出的净额为-1,200万元，是否应当将该金额全部列报为“支付其他与投资活动有关的现金”？若需其他披露或调整，应如何操作？非常感谢", "reply": "查看原帖\n是，由于处置对价（0）减去处置日B公司现金及现金等价物余额（1200万元）为负数，所以该负数在A公司的合并现金流量表中应列报为“支付其他与投资活动有关的现金”。\n\n依据：《企业会计准则应用指南汇编2024》P1229：“由千企业处置子公司或其他营业单位是整体交易，子公司和其他营业单位可能持有现金和现金等价物。这样，整体处置子公司或其他营业单位的现金流量，就应当以处置价款中收到现金的部分，减去子公司或其他营业单位持有的现金和现金等价物以及相关处置费用后的净额反映。处置子公司及其他营业单位收到的现金净额如为负数，则将该金额填列至“支付其他与投资活动有关的现金”项目中。”。\n\n另外需注意：在合并报表层面，对于A应收B的应收账款和往来款，在处置日应以当日公允价值（预计可收回金额的现值）进行初始计量，该初始计量金额与原名义金额之间的差额调整在合并报表层面的“投资收益——处置子公司损益”中。参阅：《监管规则适用指引——会计类第3号》之“3-3 母公司丧失控制权时对应收原子公司款项的会计处理”。", "searchText": "5497722 求助陈版主：关于处置子公司时合并现金流量表的列报问题 最近更新 tingting@@ 2026-07-07t17:02:16.000z 2026-07-15t06:41:00.000z 背景：\n\na公司原持有b公司100%股权，于2026年6月2日与第三方签订股权转让协议，将所持b公司全部股权对外转让。根据协议约定，本次股权转让对价为0元。转让日（2026年6月2日），b公司账面货币资金余额为1,200万元。其中，有1,080万元系b公司应付a公司的购买商品货款（即a公司向b公司销售商品形成的应收款项，b公司尚未支付），20万系b公司应付a公司往来款。在a公司编制2026年度合并现金流量表时，由于b公司不再纳入合并范围，其出表日所持有的1,200万元货币资金在合并现金流量表中应如何列示？因处置对价为0，计算出的净额为-1,200万元，是否应当将该金额全部列报为“支付其他与投资活动有关的现金”？若需其他披露或调整，应如何操作？非常感谢 查看原帖\n是，由于处置对价（0）减去处置日b公司现金及现金等价物余额（1200万元）为负数，所以该负数在a公司的合并现金流量表中应列报为“支付其他与投资活动有关的现金”。\n\n依据：《企业会计准则应用指南汇编2024》p1229：“由千企业处置子公司或其他营业单位是整体交易，子公司和其他营业单位可能持有现金和现金等价物。这样，整体处置子公司或其他营业单位的现金流量，就应当以处置价款中收到现金的部分，减去子公司或其他营业单位持有的现金和现金等价物以及相关处置费用后的净额反映。处置子公司及其他营业单位收到的现金净额如为负数，则将该金额填列至“支付其他与投资活动有关的现金”项目中。”。\n\n另外需注意：在合并报表层面，对于a应收b的应收账款和往来款，在处置日应以当日公允价值（预计可收回金额的现值）进行初始计量，该初始计量金额与原名义金额之间的差额调整在合并报表层面的“投资收益——处置子公司损益”中。参阅：《监管规则适用指引——会计类第3号》之“3-3 母公司丧失控制权时对应收原子公司款项的会计处理”。 https://bbs.esnai.cn/thread-5497722-1-1.html"}, {"tid": "5497720", "title": "非同一控制下企业合并问题", "category": "最近更新", "questionAuthor": "YXD1234567", "questionTime": "2026-07-07T10:44:07.000Z", "replyTime": "2026-07-15T06:35:00.000Z", "replySortTime": "2026-07-15T06:35:00.000Z", "url": "https://bbs.esnai.cn/thread-5497720-1-1.html", "question": "求助陈版，A公司为上市公司，先要收购B公司60%的股权，2026年3月31日为评估基准日，2026年6月末，A公司通过了股东大会，2026年7月完成工商变更，股权收购协议中约定了以交割日当月的上月末作为过渡期损益的审计基准日。\n\n在这种情况下，是否以2026年6月30日作为推定购买日，半年报中是否需要合并资产负债表？", "reply": "查看原帖\n“股权收购协议中约定了以交割日当月的上月末作为过渡期损益的审计基准日”并不意味着在2026年6月末已取得对B公司的控制权，只是过渡期损益确定和结算的基准日，故2026年半年报中仍不应将B公司纳入合并范围。如果合并B公司对合并报表整体影响较大的，可作为资产负债表日后非调整事项披露。", "searchText": "5497720 非同一控制下企业合并问题 最近更新 yxd1234567 2026-07-07t10:44:07.000z 2026-07-15t06:35:00.000z 求助陈版，a公司为上市公司，先要收购b公司60%的股权，2026年3月31日为评估基准日，2026年6月末，a公司通过了股东大会，2026年7月完成工商变更，股权收购协议中约定了以交割日当月的上月末作为过渡期损益的审计基准日。\n\n在这种情况下，是否以2026年6月30日作为推定购买日，半年报中是否需要合并资产负债表？ 查看原帖\n“股权收购协议中约定了以交割日当月的上月末作为过渡期损益的审计基准日”并不意味着在2026年6月末已取得对b公司的控制权，只是过渡期损益确定和结算的基准日，故2026年半年报中仍不应将b公司纳入合并范围。如果合并b公司对合并报表整体影响较大的，可作为资产负债表日后非调整事项披露。 https://bbs.esnai.cn/thread-5497720-1-1.html"}, {"tid": "5497716", "title": "关于支付的重整投资款的核算", "category": "最近更新", "questionAuthor": "freakyboom", "questionTime": "2026-07-06T20:40:46.000Z", "replyTime": "2026-07-15T06:24:00.000Z", "replySortTime": "2026-07-15T06:24:00.000Z", "url": "https://bbs.esnai.cn/thread-5497716-1-1.html", "question": "公司与重整管理人签订了《重整投资协议》，根据协议约定支付2亿元，作为偿债资金，用于重整企业偿还债务。截止目前债务偿还已经完成，工商股权信息也已经变更。但是重整中的核心资产土地及房产未变更给公司，同时公司经营还是由管理人负责。  目前的情况公司是未控制重整公司的。请教陈版，支付的2亿元，是计入长期股投资还是其他非流动资产？ 公司认为支付投资款的核心目的是获取被重整企业的股权，即使尚未完成工商变更，只要协议已生效且款项已支付，是否可以直接计入长期股权投资？", "reply": "查看原帖\n建议先作为“其他非流动资产——预付投资款”，到实际取得被重整企业的股权后再转为长期股权投资。", "searchText": "5497716 关于支付的重整投资款的核算 最近更新 freakyboom 2026-07-06t20:40:46.000z 2026-07-15t06:24:00.000z 公司与重整管理人签订了《重整投资协议》，根据协议约定支付2亿元，作为偿债资金，用于重整企业偿还债务。截止目前债务偿还已经完成，工商股权信息也已经变更。但是重整中的核心资产土地及房产未变更给公司，同时公司经营还是由管理人负责。  目前的情况公司是未控制重整公司的。请教陈版，支付的2亿元，是计入长期股投资还是其他非流动资产？ 公司认为支付投资款的核心目的是获取被重整企业的股权，即使尚未完成工商变更，只要协议已生效且款项已支付，是否可以直接计入长期股权投资？ 查看原帖\n建议先作为“其他非流动资产——预付投资款”，到实际取得被重整企业的股权后再转为长期股权投资。 https://bbs.esnai.cn/thread-5497716-1-1.html"}, {"tid": "5497739", "title": "求助陈版主，关于预付账款转让的损失的处理", "category": "最近更新", "questionAuthor": "heyuanhui", "questionTime": "2026-07-09T12:00:34.000Z", "replyTime": "2026-07-14T18:41:00.000Z", "replySortTime": "2026-07-14T18:41:00.000Z", "url": "https://bbs.esnai.cn/thread-5497739-1-1.html", "question": "A公司因采购合同支付供应商C公司1000万元，后因自身原因，采购合同不再执行，根据合同条款，违约金恰好等于预付账款，无法收回，为避免损失，A公司找到了B公司，B公司也有向C公司的采购业务，且因B公司和C公司良好的关系，三方约定A公司以500万的价格将A公司的预付账款转给B公司，B公司视为支付了C公司1000万元采购预付款，那么A公司的预付账款转让应当怎么进行账务处理？", "reply": "查看原帖\n首先确保该交易是否公允、合理，例如50%的折价转让比例是否代表了债务人C在该时点的偿债能力。\n\n如是，则A首先对该项预付账款计提减值准备（借：资产减值损失，贷：预付账款减值准备），再进行转让的会计处理（借：银行存款，借：预付账款减值准备，贷：预付账款，如有差额调整投资收益）。\n\n如果50%的折价转让比例并不代表债务人C在该时点的偿债能力，则应考虑该交易的背后原因，考虑是否存在权益性交易、关联方交易，或者与其他交易或事项构成一揽子交易等，在核实交易实质的基础上确定会计处理方案。", "searchText": "5497739 求助陈版主，关于预付账款转让的损失的处理 最近更新 heyuanhui 2026-07-09t12:00:34.000z 2026-07-14t18:41:00.000z a公司因采购合同支付供应商c公司1000万元，后因自身原因，采购合同不再执行，根据合同条款，违约金恰好等于预付账款，无法收回，为避免损失，a公司找到了b公司，b公司也有向c公司的采购业务，且因b公司和c公司良好的关系，三方约定a公司以500万的价格将a公司的预付账款转给b公司，b公司视为支付了c公司1000万元采购预付款，那么a公司的预付账款转让应当怎么进行账务处理？ 查看原帖\n首先确保该交易是否公允、合理，例如50%的折价转让比例是否代表了债务人c在该时点的偿债能力。\n\n如是，则a首先对该项预付账款计提减值准备（借：资产减值损失，贷：预付账款减值准备），再进行转让的会计处理（借：银行存款，借：预付账款减值准备，贷：预付账款，如有差额调整投资收益）。\n\n如果50%的折价转让比例并不代表债务人c在该时点的偿债能力，则应考虑该交易的背后原因，考虑是否存在权益性交易、关联方交易，或者与其他交易或事项构成一揽子交易等，在核实交易实质的基础上确定会计处理方案。 https://bbs.esnai.cn/thread-5497739-1-1.html"}, {"tid": "5497750", "title": "减资的账务处理", "category": "最近更新", "questionAuthor": "18810325235", "questionTime": "2026-07-09T12:00:33.000Z", "replyTime": "2026-07-14T18:37:00.000Z", "replySortTime": "2026-07-14T18:37:00.000Z", "url": "https://bbs.esnai.cn/thread-5497750-1-1.html", "question": "我司为集团二级子公司，历史年度自集团无偿接受B公司为全资子公司，我司对B公司长投按照划转时点账面净资产790万计算。2026年7月我司计划对B公司减资3700万，减资后仍作为控股股东（100%），截至2026年7月，B公司账面净资产如下：\n\n实收资本：400万\n\n资本公积：3721万（系历史年度B公司厂区搬迁专项应付款按照财企〔2005〕123号文件形成的资本公积）\n\n盈余公积：231.8万\n\n未分配利润：781.5万\n\n需请教减资的账务处理我司理解是否无误：\n\n1.履行减值手续后，我司按照处置长投处理，收到的3700万减资款与账面790万长投的差额，计入投资收益。\n\n2.B公司要先资本公积转注册资本，然后减资3700万，\n\n    借：实收资本 3700万\n\n         贷：银行存款  3700万\n\n3.合并层面抵消，暂无理解，烦请陈版主予以解答！", "reply": "查看原帖\n账务处理基本合理。\n\n合并报表层面，因为是母公司与全资子公司之间的内部交易，故对合并报表无影响。抵销分录为借：投资收益，贷：子公司权益，以消除该项内部交易影响。", "searchText": "5497750 减资的账务处理 最近更新 18810325235 2026-07-09t12:00:33.000z 2026-07-14t18:37:00.000z 我司为集团二级子公司，历史年度自集团无偿接受b公司为全资子公司，我司对b公司长投按照划转时点账面净资产790万计算。2026年7月我司计划对b公司减资3700万，减资后仍作为控股股东（100%），截至2026年7月，b公司账面净资产如下：\n\n实收资本：400万\n\n资本公积：3721万（系历史年度b公司厂区搬迁专项应付款按照财企〔2005〕123号文件形成的资本公积）\n\n盈余公积：231.8万\n\n未分配利润：781.5万\n\n需请教减资的账务处理我司理解是否无误：\n\n1.履行减值手续后，我司按照处置长投处理，收到的3700万减资款与账面790万长投的差额，计入投资收益。\n\n2.b公司要先资本公积转注册资本，然后减资3700万，\n\n    借：实收资本 3700万\n\n         贷：银行存款  3700万\n\n3.合并层面抵消，暂无理解，烦请陈版主予以解答！ 查看原帖\n账务处理基本合理。\n\n合并报表层面，因为是母公司与全资子公司之间的内部交易，故对合并报表无影响。抵销分录为借：投资收益，贷：子公司权益，以消除该项内部交易影响。 https://bbs.esnai.cn/thread-5497750-1-1.html"}, {"tid": "5497753", "title": "求助陈版_抵扣券的会计处理", "category": "最近更新", "questionAuthor": "雲", "questionTime": "2026-07-10T12:00:33.000Z", "replyTime": "2026-07-14T18:34:00.000Z", "replySortTime": "2026-07-14T18:34:00.000Z", "url": "https://bbs.esnai.cn/thread-5497753-1-1.html", "question": "公司属于出租方，商户晚几天开店需要赔付违约金，但是协商后让商户给了抵用券，公司收到抵用券后用于业务招待，但是实际情况不一定能全部用完。请问入账是否可以这样操作。\n\n1、收到抵用券\n\n借：其他应收款-商户       票面*预计使用率  \n\n贷：营业外收入-违约金    票面*预计使用率-票面*增值税税率\n\n贷：应交税费                  票面*增值税税率\n\n2、使用抵用券用于业务招待\n\n借： 销售费用-招待费       票面\n\n贷： 其他应收款-商户       票面", "reply": "查看原帖\n用于业务招待的抵用券（不能再转售的）应在收到时即作为费用处理。即借记费用（销售费用或管理费用），贷记营业外收入。\n\n依据：《应用指南汇编2024》P38：企业采购用于广告营销活动的特定商品，向客户预付货款未取得商品时，应作为预付账款进行会计处理，待取得相关商品时计入当期损益（销售费用） 。企业取得广告营销性质的服务比照该原则进行处理。", "searchText": "5497753 求助陈版_抵扣券的会计处理 最近更新 雲 2026-07-10t12:00:33.000z 2026-07-14t18:34:00.000z 公司属于出租方，商户晚几天开店需要赔付违约金，但是协商后让商户给了抵用券，公司收到抵用券后用于业务招待，但是实际情况不一定能全部用完。请问入账是否可以这样操作。\n\n1、收到抵用券\n\n借：其他应收款-商户       票面*预计使用率  \n\n贷：营业外收入-违约金    票面*预计使用率-票面*增值税税率\n\n贷：应交税费                  票面*增值税税率\n\n2、使用抵用券用于业务招待\n\n借： 销售费用-招待费       票面\n\n贷： 其他应收款-商户       票面 查看原帖\n用于业务招待的抵用券（不能再转售的）应在收到时即作为费用处理。即借记费用（销售费用或管理费用），贷记营业外收入。\n\n依据：《应用指南汇编2024》p38：企业采购用于广告营销活动的特定商品，向客户预付货款未取得商品时，应作为预付账款进行会计处理，待取得相关商品时计入当期损益（销售费用） 。企业取得广告营销性质的服务比照该原则进行处理。 https://bbs.esnai.cn/thread-5497753-1-1.html"}, {"tid": "5497755", "title": "急急急 求助陈版主", "category": "最近更新", "questionAuthor": "爱喝冰美式", "questionTime": "2026-07-10T12:00:05.000Z", "replyTime": "2026-07-14T18:25:00.000Z", "replySortTime": "2026-07-14T18:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5497755-1-1.html", "question": "母公司A持有子公司B 80%的股权，子公司B另外20%股权由员工持股平台合伙企业C持有。合伙企业C中有60%的份额为母公司所有，母公司为LP，合伙企业的GP为子公司总经理（不在母公司任职）。合伙企业章程均为通用条款，母公司A按照出资份额享受利润分配或者亏损分担，但合伙企业相关决策均按照合伙人一人一票进行决策，母公司仅占1票，剩余4票均为子公司B的管理层，母公司A是否应将合伙企业C纳入合并范围。", "reply": "查看原帖\n建议关注持股平台的各合伙人是否与母公司签订一致行动协议，从而母公司可以主导持股平台相关活动的决策；对于持股平台最主要的相关活动（决定日后的退出方案）的决策，母公司有无主导权等。另外，建议关注母公司的持股60%有无后续进一步的再授予计划，预计未来授予时的价格如何确定，母公司作为LP期间持有的该部分份额的公允价值变动损益归谁享有。", "searchText": "5497755 急急急 求助陈版主 最近更新 爱喝冰美式 2026-07-10t12:00:05.000z 2026-07-14t18:25:00.000z 母公司a持有子公司b 80%的股权，子公司b另外20%股权由员工持股平台合伙企业c持有。合伙企业c中有60%的份额为母公司所有，母公司为lp，合伙企业的gp为子公司总经理（不在母公司任职）。合伙企业章程均为通用条款，母公司a按照出资份额享受利润分配或者亏损分担，但合伙企业相关决策均按照合伙人一人一票进行决策，母公司仅占1票，剩余4票均为子公司b的管理层，母公司a是否应将合伙企业c纳入合并范围。 查看原帖\n建议关注持股平台的各合伙人是否与母公司签订一致行动协议，从而母公司可以主导持股平台相关活动的决策；对于持股平台最主要的相关活动（决定日后的退出方案）的决策，母公司有无主导权等。另外，建议关注母公司的持股60%有无后续进一步的再授予计划，预计未来授予时的价格如何确定，母公司作为lp期间持有的该部分份额的公允价值变动损益归谁享有。 https://bbs.esnai.cn/thread-5497755-1-1.html"}, {"tid": "5497754", "title": "合伙企业是否并表", "category": "最近更新", "questionAuthor": "爱喝冰美式", "questionTime": "2026-07-10T12:00:04.000Z", "replyTime": "2026-07-14T18:22:00.000Z", "replySortTime": "2026-07-14T18:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497754-1-1.html", "question": "母公司A持有子公司B 80%的股权，子公司B另外20%股权由员工持股平台合伙企业C持有。合伙企业C中有60%的份额为母公司所有，母公司为LP，合伙企业的GP为子公司总经理（不在母公司任职）。合伙企业章程均为通用条款，母公司A按照出资份额享受利润分配或者亏损分担，但合伙企业相关决策均按照合伙人一人一票进行决策，母公司仅占1票，剩余4票均为子公司B的管理层，母公司A是否应将合伙企业C纳入合并范围。", "reply": "查看原帖\nhttps://bbs.esnai.cn/thread-5497755-1-1.html", "searchText": "5497754 合伙企业是否并表 最近更新 爱喝冰美式 2026-07-10t12:00:04.000z 2026-07-14t18:22:00.000z 母公司a持有子公司b 80%的股权，子公司b另外20%股权由员工持股平台合伙企业c持有。合伙企业c中有60%的份额为母公司所有，母公司为lp，合伙企业的gp为子公司总经理（不在母公司任职）。合伙企业章程均为通用条款，母公司a按照出资份额享受利润分配或者亏损分担，但合伙企业相关决策均按照合伙人一人一票进行决策，母公司仅占1票，剩余4票均为子公司b的管理层，母公司a是否应将合伙企业c纳入合并范围。 查看原帖\nhttps://bbs.esnai.cn/thread-5497755-1-1.html https://bbs.esnai.cn/thread-5497754-1-1.html"}, {"tid": "5497757", "title": "请教陈版主一个收入确认的问题", "category": "最近更新", "questionAuthor": "tommysdp", "questionTime": "2026-07-10T12:00:05.000Z", "replyTime": "2026-07-14T18:21:00.000Z", "replySortTime": "2026-07-14T18:21:00.000Z", "url": "https://bbs.esnai.cn/thread-5497757-1-1.html", "question": "陈版主，请教一个业务问题。\n\n我们是一个生产厂商，为了销货我们和当地的A达成一项合作，我们给A发出10吨产品，然后和A约定：1、A可以自由定价销货，我们只要求收到10万；2、如果A一个月内没有销出10万，则A补偿差额，如果卖的多，我们也不管。然后第一次合作，A找到了客户C，谈妥了8吨，10万，C向公司回款10万，A实际留下2吨；第二次，A找到了客户D，谈妥了4吨，5万，D向公司回款5万，到期后A向公司打款差额5万。\n\n在这个业务模式下，陈老师认为收入的确认时点应该怎么认定比较好，还有就是，我们收入的金额应该如何确定，是否需要给A拉一块销售费用出来。", "reply": "查看原帖\n这个问题的关键在于判断A是否为主要责任人。如果是主要责任人的，则在货物交付给A时即可确认收入，金额为与A之间的合同约定的销售价格；如果A是代理人的，则在商品销售给最终客户时才能确认收入，金额为A向最终客户的销售价格（归属于A的盈亏确认为销售费用——合同取得成本）。\n\n建议考虑的因素包括：A对于无法售出的商品（因质量缺陷导致的除外）有无退货权；A有无独立仓库单独存储从本企业获得的商品；A是否在有了下游客户订单之后才向本企业下订单要求发货；等等。", "searchText": "5497757 请教陈版主一个收入确认的问题 最近更新 tommysdp 2026-07-10t12:00:05.000z 2026-07-14t18:21:00.000z 陈版主，请教一个业务问题。\n\n我们是一个生产厂商，为了销货我们和当地的a达成一项合作，我们给a发出10吨产品，然后和a约定：1、a可以自由定价销货，我们只要求收到10万；2、如果a一个月内没有销出10万，则a补偿差额，如果卖的多，我们也不管。然后第一次合作，a找到了客户c，谈妥了8吨，10万，c向公司回款10万，a实际留下2吨；第二次，a找到了客户d，谈妥了4吨，5万，d向公司回款5万，到期后a向公司打款差额5万。\n\n在这个业务模式下，陈老师认为收入的确认时点应该怎么认定比较好，还有就是，我们收入的金额应该如何确定，是否需要给a拉一块销售费用出来。 查看原帖\n这个问题的关键在于判断a是否为主要责任人。如果是主要责任人的，则在货物交付给a时即可确认收入，金额为与a之间的合同约定的销售价格；如果a是代理人的，则在商品销售给最终客户时才能确认收入，金额为a向最终客户的销售价格（归属于a的盈亏确认为销售费用——合同取得成本）。\n\n建议考虑的因素包括：a对于无法售出的商品（因质量缺陷导致的除外）有无退货权；a有无独立仓库单独存储从本企业获得的商品；a是否在有了下游客户订单之后才向本企业下订单要求发货；等等。 https://bbs.esnai.cn/thread-5497757-1-1.html"}, {"tid": "5497765", "title": "长期待摊费用摊销", "category": "最近更新", "questionAuthor": "国际庄Lee", "questionTime": "2026-07-11T12:00:04.000Z", "replyTime": "2026-07-14T16:53:00.000Z", "replySortTime": "2026-07-14T16:53:00.000Z", "url": "https://bbs.esnai.cn/thread-5497765-1-1.html", "question": "求教陈版主和各位前辈，\n\n今天碰见个简单问题：A公司与某明星签订三年的代言合同，约定每年支付100万，开100万发票。\n\n针对这个情况：（1）第一年支付的100万要放到预付账款还是长期待摊费用呢？\n\n                       （2）第一年支付的100万要在第一年分12个月摊销还是要放到三年36个月平均分摊呢？\n\n                       （3）第二年支付的100万要在第二年分摊完还是要在后两年平均分摊呢？\n\n                       （4） 还是说第一年我都要把三百万作为长期待摊（两年没有支付的款项计入其他应付款），然后分三年平均年分摊计入费用呢？\n\n个人考虑：我个人倾向于（4），因为我感觉费用的计入跟实际支付是两条线，互不干预。费用按照合同约定三年平均分摊，款项支付按照合同约定", "reply": "查看原帖\n明星代言费属于广告费性质，不能确认为资产，即每一笔代言费支付时直接费用化处理，不存在摊销问题。", "searchText": "5497765 长期待摊费用摊销 最近更新 国际庄lee 2026-07-11t12:00:04.000z 2026-07-14t16:53:00.000z 求教陈版主和各位前辈，\n\n今天碰见个简单问题：a公司与某明星签订三年的代言合同，约定每年支付100万，开100万发票。\n\n针对这个情况：（1）第一年支付的100万要放到预付账款还是长期待摊费用呢？\n\n                       （2）第一年支付的100万要在第一年分12个月摊销还是要放到三年36个月平均分摊呢？\n\n                       （3）第二年支付的100万要在第二年分摊完还是要在后两年平均分摊呢？\n\n                       （4） 还是说第一年我都要把三百万作为长期待摊（两年没有支付的款项计入其他应付款），然后分三年平均年分摊计入费用呢？\n\n个人考虑：我个人倾向于（4），因为我感觉费用的计入跟实际支付是两条线，互不干预。费用按照合同约定三年平均分摊，款项支付按照合同约定 查看原帖\n明星代言费属于广告费性质，不能确认为资产，即每一笔代言费支付时直接费用化处理，不存在摊销问题。 https://bbs.esnai.cn/thread-5497765-1-1.html"}, {"tid": "5497766", "title": "外协加工后净额法销售？", "category": "最近更新", "questionAuthor": "arvinsong", "questionTime": "2026-07-11T12:00:05.000Z", "replyTime": "2026-07-14T16:29:00.000Z", "replySortTime": "2026-07-14T16:29:00.000Z", "url": "https://bbs.esnai.cn/thread-5497766-1-1.html", "question": "陈版主您好，我司由于订单增幅较大，产能不足，故与周边同行业公司A达成合作，我司与终端客户协商定价，签订订单，之后我们按照原材料成本价销售原材料给A公司（该原材料占成品成本比重约为30%，我们提供该原材料具有成本和质量优势，对方实质承担了剩余的物料以及进行了全部的生产加工活动）,用于生产我司订单产品，A公司完工后，我们组织验收并直接发往终端客户。原材料销售和成品采购独立签订购销合同。\n\n我的问题如下：\n\n1、我理解，对于我司销售原材料的行为，其目标是为了让我们可以采购对应材料生产的成品，故不应当确认材料销售收入。是否正确？\n\n2、是否应当在材料发出时结转委托加工物资科目？委托加工物资科目在成品采购时结转到什么科目呢？\n\n2、对于我司采购成品并销售终端客户的活动。我理解，我们主导了客户定价，订单，并提供了关键原材料，A公司类似于受托生产，我们是否可以按照总额法确认收入？", "reply": "查看原帖\n应考虑本企业在该业务中的地位是主要责任人还是代理人。\n\n1、如果是主要责任人的，则按委托加工处理，不作为“原材料销售+产品采购”的两笔交易处理。在产品交付客户时才确认收入。\n\n2、如果是代理人的，则仅按净额法确认收入和成本，不确认存货。", "searchText": "5497766 外协加工后净额法销售？ 最近更新 arvinsong 2026-07-11t12:00:05.000z 2026-07-14t16:29:00.000z 陈版主您好，我司由于订单增幅较大，产能不足，故与周边同行业公司a达成合作，我司与终端客户协商定价，签订订单，之后我们按照原材料成本价销售原材料给a公司（该原材料占成品成本比重约为30%，我们提供该原材料具有成本和质量优势，对方实质承担了剩余的物料以及进行了全部的生产加工活动）,用于生产我司订单产品，a公司完工后，我们组织验收并直接发往终端客户。原材料销售和成品采购独立签订购销合同。\n\n我的问题如下：\n\n1、我理解，对于我司销售原材料的行为，其目标是为了让我们可以采购对应材料生产的成品，故不应当确认材料销售收入。是否正确？\n\n2、是否应当在材料发出时结转委托加工物资科目？委托加工物资科目在成品采购时结转到什么科目呢？\n\n2、对于我司采购成品并销售终端客户的活动。我理解，我们主导了客户定价，订单，并提供了关键原材料，a公司类似于受托生产，我们是否可以按照总额法确认收入？ 查看原帖\n应考虑本企业在该业务中的地位是主要责任人还是代理人。\n\n1、如果是主要责任人的，则按委托加工处理，不作为“原材料销售+产品采购”的两笔交易处理。在产品交付客户时才确认收入。\n\n2、如果是代理人的，则仅按净额法确认收入和成本，不确认存货。 https://bbs.esnai.cn/thread-5497766-1-1.html"}, {"tid": "5497778", "title": "母公司转让子公司少数股权，少数股东权益在母公司合并财务报表中的处理", "category": "最近更新", "questionAuthor": "shichengqi", "questionTime": "2026-07-12T12:00:04.000Z", "replyTime": "2026-07-14T16:00:00.000Z", "replySortTime": "2026-07-14T16:00:00.000Z", "url": "https://bbs.esnai.cn/thread-5497778-1-1.html", "question": "请教陈版主，A公司持有B公司100%股权，现A公司将其持有B公司的20%的股权以一定价格转让给C公司，请问A公司在编制合并财务报表时，需要反应少数股东权益金额，这里的少数股东权益金额是否一定要等于B公司的归属于母公司净资产*少数股东持股比例20%？如果是，必定会有差异产生，是否计入资本公积。", "reply": "查看原帖\n通常情况下，这里的少数股东权益金额等于B公司的归属于母公司净资产*少数股东持股比例20%。但如果B公司最初是通过非同一控制下合并被纳入A的合并报表范围，且在原购买日产生了商誉的，则还应加上初始商誉金额的20%。参考：《监管规则适用指引——会计类第1号》之“1-11 不丧失控制权情况下处置子公司部分股权计算子公司净资产份额时如何考虑商誉”。\n\n根据《企业会计准则第33号——合并财务报表（2014年修订）》第四十九条规定：“母公司在不丧失控制权的情况下部分处置对子公司的长期股权投资，在合并财务报表中，处置价款与处置长期股权投资相对应享有子公司自购买日或合并日开始持续计算的净资产份额之间的差额，应当调整资本公积（资本溢价或股本溢价），资本公积不足冲减的，调整留存收益。”。其原理是将“不丧失控制权前提下部分处置子公司股权”看作是少数股东对合并集团的增资，少数股东的增资额（即处置股权的对价）与少数股东权益增加额之间的差额为少数股东和母公司之间的利益让渡，所以调整资本公积。", "searchText": "5497778 母公司转让子公司少数股权，少数股东权益在母公司合并财务报表中的处理 最近更新 shichengqi 2026-07-12t12:00:04.000z 2026-07-14t16:00:00.000z 请教陈版主，a公司持有b公司100%股权，现a公司将其持有b公司的20%的股权以一定价格转让给c公司，请问a公司在编制合并财务报表时，需要反应少数股东权益金额，这里的少数股东权益金额是否一定要等于b公司的归属于母公司净资产*少数股东持股比例20%？如果是，必定会有差异产生，是否计入资本公积。 查看原帖\n通常情况下，这里的少数股东权益金额等于b公司的归属于母公司净资产*少数股东持股比例20%。但如果b公司最初是通过非同一控制下合并被纳入a的合并报表范围，且在原购买日产生了商誉的，则还应加上初始商誉金额的20%。参考：《监管规则适用指引——会计类第1号》之“1-11 不丧失控制权情况下处置子公司部分股权计算子公司净资产份额时如何考虑商誉”。\n\n根据《企业会计准则第33号——合并财务报表（2014年修订）》第四十九条规定：“母公司在不丧失控制权的情况下部分处置对子公司的长期股权投资，在合并财务报表中，处置价款与处置长期股权投资相对应享有子公司自购买日或合并日开始持续计算的净资产份额之间的差额，应当调整资本公积（资本溢价或股本溢价），资本公积不足冲减的，调整留存收益。”。其原理是将“不丧失控制权前提下部分处置子公司股权”看作是少数股东对合并集团的增资，少数股东的增资额（即处置股权的对价）与少数股东权益增加额之间的差额为少数股东和母公司之间的利益让渡，所以调整资本公积。 https://bbs.esnai.cn/thread-5497778-1-1.html"}, {"tid": "5486300", "title": "回购义务在什么时候调整", "category": "最近更新", "questionAuthor": "sdongco", "questionTime": "2024-03-23T11:44:42.000Z", "replyTime": "2026-07-10T19:12:00.000Z", "replySortTime": "2026-07-10T19:12:00.000Z", "url": "https://bbs.esnai.cn/thread-5486300-1-1.html", "question": "A上市公司采用限制性股票的方式实施股权激励，员工先出资，业绩考核3年，每年完成考核分别解锁30%，30%，40%的股票。A公司在授予时即确认了回购义务。\n\n第一年末，A公司未完成业绩考核目标，冲回第一期30%的股份支付费用。但年末12月31日尚未经董事会公告未达业绩，亦未办理中登注销登记。\n\n请问，此时库存股是否按照中登登记的股数计算？虽然明知业绩不能完成，实际上第一期30%的回购义务已经没有了，但由于未经董事会审批及中登登记等程序，第一期的回购义务期末是否仍确认在其他应付款中？\n\n---\n\n查看原帖\n如果在资产负债表日后，审计报告出具前，董事会进行公告未达业绩，办理中登注销登记，是否考虑作为调整事项呢？", "reply": "查看原帖\n可以这样理解：仍列报为库存股。虽然已经确定需要回购，但由于未经董事会审批及中登登记等程序，第一期的回购义务期末是否仍确认在其他应付款中。\n\n---\n\n查看原帖\n这只是满足了回购的条件，但并未实施回购行为。实施回购行为本身仍是非调整事项。", "searchText": "5486300 回购义务在什么时候调整 最近更新 sdongco 2024-03-23t11:44:42.000z 2026-07-10t19:12:00.000z a上市公司采用限制性股票的方式实施股权激励，员工先出资，业绩考核3年，每年完成考核分别解锁30%，30%，40%的股票。a公司在授予时即确认了回购义务。\n\n第一年末，a公司未完成业绩考核目标，冲回第一期30%的股份支付费用。但年末12月31日尚未经董事会公告未达业绩，亦未办理中登注销登记。\n\n请问，此时库存股是否按照中登登记的股数计算？虽然明知业绩不能完成，实际上第一期30%的回购义务已经没有了，但由于未经董事会审批及中登登记等程序，第一期的回购义务期末是否仍确认在其他应付款中？\n\n---\n\n查看原帖\n如果在资产负债表日后，审计报告出具前，董事会进行公告未达业绩，办理中登注销登记，是否考虑作为调整事项呢？ 查看原帖\n可以这样理解：仍列报为库存股。虽然已经确定需要回购，但由于未经董事会审批及中登登记等程序，第一期的回购义务期末是否仍确认在其他应付款中。\n\n---\n\n查看原帖\n这只是满足了回购的条件，但并未实施回购行为。实施回购行为本身仍是非调整事项。 https://bbs.esnai.cn/thread-5486300-1-1.html"}, {"tid": "5497442", "title": "收入确认  履约义务   积分", "category": "最近更新", "questionAuthor": "7847748", "questionTime": "2026-06-11T21:48:52.000Z", "replyTime": "2026-07-05T18:51:00.000Z", "replySortTime": "2026-07-05T18:51:00.000Z", "url": "https://bbs.esnai.cn/thread-5497442-1-1.html", "question": "A公司为客户提供AI生成投标文件服务，合同约定基础运营服务（包括软件授权费/账号运营/为客户在线服务/培训/生成文件存储）每年 10000元，服务期1年。客户对账号预充值（如：20000元25000积分），每升成1份投标文件消耗50积分，积分永久有效。A公司认为基础运营与投标文件升成属于两项单项履约义务，基础运营服务按服务期确认收入，投标文件生成根据积分消耗按次确认收入。\n\n请教陈老师 ：\n\n1  没有基础运营无法生成投标文件，投标文件与基础运营高度关联，该业务整体构成一项履约义务，这样理解是否正确？\n\n 2 整体为一项履约义务，收入如何确认? （合同有一个矛盾的地方，积分永久有效与服务期一年不匹配。）\n\n如果基础服务到期积分清零，收入确认我理解可将服务期每年10000元折算为12500积分，投标文件升成按次确认收入，到期清零未用完积分一次性结转收入。\n\n 3 如果基础服务到期积分不清零，这个业务安排是否明显的不合理无法确认收入呢？有处理办法吗？\n\n---\n\n查看原帖\n谢谢老师回复，如果出现以下情况收入如何确认：\n\n1 客户无法从基础服务获取实质经济利益，在积分0消耗的情况下，基础服务费是否不能确认收入？也就是基础服务费是否应该在积分消耗后开始以合理的方式与积分消耗配比确认收入？\n\n2 从合同形式上，基础服务费包括软件授权费，客服及培训费，服务期开始3个月且客户0积分消耗的情况下客户要求退款，公司法务判断很可能只会退回剩余服务期基础服务费和未消耗积分。在这种情况下，是否应与客户达成一致意见后对不予退回的基础服务费确认收入？", "reply": "查看原帖\n基础运营与投标文件升成整体构成一项履约义务，在提供标书生成服务时，依据客户所消耗的积分以及单位积分的公允价值计量收入，例如充值时2万元可获得2.5万个积分，即单个积分的公允价值为0.8元；生成一份标书消耗50积分，即一份标书对应的收入金额为40元。\n\n对于基础运营服务，也应采用系统、合理的方式将1年1万元的服务费分摊到单次标书生成服务。如果能够合理估计客户在1年有效期内使用该服务的次数，则按照该次数进行分摊；如果无法合理估计，或者预计各月服务次数较为均衡的，也可以采用直线法进行近似模拟。\n\n---\n\n查看原帖\n1、是。2、可以。", "searchText": "5497442 收入确认  履约义务   积分 最近更新 7847748 2026-06-11t21:48:52.000z 2026-07-05t18:51:00.000z a公司为客户提供ai生成投标文件服务，合同约定基础运营服务（包括软件授权费/账号运营/为客户在线服务/培训/生成文件存储）每年 10000元，服务期1年。客户对账号预充值（如：20000元25000积分），每升成1份投标文件消耗50积分，积分永久有效。a公司认为基础运营与投标文件升成属于两项单项履约义务，基础运营服务按服务期确认收入，投标文件生成根据积分消耗按次确认收入。\n\n请教陈老师 ：\n\n1  没有基础运营无法生成投标文件，投标文件与基础运营高度关联，该业务整体构成一项履约义务，这样理解是否正确？\n\n 2 整体为一项履约义务，收入如何确认? （合同有一个矛盾的地方，积分永久有效与服务期一年不匹配。）\n\n如果基础服务到期积分清零，收入确认我理解可将服务期每年10000元折算为12500积分，投标文件升成按次确认收入，到期清零未用完积分一次性结转收入。\n\n 3 如果基础服务到期积分不清零，这个业务安排是否明显的不合理无法确认收入呢？有处理办法吗？\n\n---\n\n查看原帖\n谢谢老师回复，如果出现以下情况收入如何确认：\n\n1 客户无法从基础服务获取实质经济利益，在积分0消耗的情况下，基础服务费是否不能确认收入？也就是基础服务费是否应该在积分消耗后开始以合理的方式与积分消耗配比确认收入？\n\n2 从合同形式上，基础服务费包括软件授权费，客服及培训费，服务期开始3个月且客户0积分消耗的情况下客户要求退款，公司法务判断很可能只会退回剩余服务期基础服务费和未消耗积分。在这种情况下，是否应与客户达成一致意见后对不予退回的基础服务费确认收入？ 查看原帖\n基础运营与投标文件升成整体构成一项履约义务，在提供标书生成服务时，依据客户所消耗的积分以及单位积分的公允价值计量收入，例如充值时2万元可获得2.5万个积分，即单个积分的公允价值为0.8元；生成一份标书消耗50积分，即一份标书对应的收入金额为40元。\n\n对于基础运营服务，也应采用系统、合理的方式将1年1万元的服务费分摊到单次标书生成服务。如果能够合理估计客户在1年有效期内使用该服务的次数，则按照该次数进行分摊；如果无法合理估计，或者预计各月服务次数较为均衡的，也可以采用直线法进行近似模拟。\n\n---\n\n查看原帖\n1、是。2、可以。 https://bbs.esnai.cn/thread-5497442-1-1.html"}, {"tid": "5497570", "title": "财政部合并财务报表准则实施问答1项----求解惑", "category": "最近更新", "questionAuthor": "一云", "questionTime": "2026-06-23T17:54:37.000Z", "replyTime": "2026-07-05T18:49:00.000Z", "replySortTime": "2026-07-05T18:49:00.000Z", "url": "https://bbs.esnai.cn/thread-5497570-1-1.html", "question": "2026年6月18日，为进一步指导企业会计准则和《企业会计准则解释第19号》(以下简称《解释第19号》)的实施，财政部会计司发布8项实施问答和1项应用案例。\n\n   其中；\n\n      问：甲公司处置其唯一子公司并丧失控制权，在处置子公司当期仍应编制合并财务报表，但在处置后的下一年度及后续会计期间应以原个别财务报表还是原合并财务报表为基础进行报表编制工作？    答：根据《企业会计准则第33号——合并财务报表》第二条，合并财务报表是指反映母公司和其全部子公司形成的企业集团整体财务状况、经营成果和现金流量的财务报表。甲公司已处置其唯一子公司，在处置子公司当期仍应编制合并财务报表，但在处置子公司下一年度及后续会计期间无需编制合并财务报表，仅需编制个别财务报表且应以原个别财务报表为基础持续编制。为确保会计信息的可比性，在编制处置子公司下一年度财务报表时，比较期间（处置子公司年度期间）应以该期间个别财务报表数据为基础列示，对于与比较期间合并财务报表的数据差异，应在财务报表附注中披露这一事实。若甲公司以后年度因新取得子公司需编制合并财务报表，除非不切实可行，新合并财务报表应再以原合并财务报表为基础持续编制。\n\n-------请问陈老师：1、在处置子公司当期仍应编制合并财务报表----仅需要编合并利润表和合并现流表吧？  期末只有甲公司一家公司了，无需编制合并资产负债表了吧?       \n\n                   2、若甲公司以后年度因新取得子公司需编制合并财务报表，除非不切实可行，新合并财务报表应再以原合并财务报表为基础持续编制。-----请问：以原合并财务报表为基础持续编制----能举例说明吗？   是以处置前一个子公司后，甲公司处置期末的合并报表加上至甲公司收购新子公司前这期间的甲公司个别报表数据编制，作为原合并报表数据吗？\n\n---\n\n查看原帖\n感谢陈老师解惑\n\n1、处置当年的合并报表编制请参阅实施问答：http://kjs.mof.gov.cn/zt/kjzzss/ ... 0220621_3819698.htm。即理论上也需要编制期末合并资产负债表（可能与个别资产负债表的金额相同，也可能不同）。\n\n---------------请问：什么情况下与个别资产负债表的金额相同，什么时候不同呢？   期末只有母公司、没有子公司了，为什么会有与个别资产负债表的金额不同的情况呢？\n\n                                                                                               一云", "reply": "查看原帖\n1、处置当年的合并报表编制请参阅实施问答：http://kjs.mof.gov.cn/zt/kjzzss/ ... 0220621_3819698.htm。即理论上也需要编制期末合并资产负债表（可能与个别资产负债表的金额相同，也可能不同）。\n\n2、“再以原合并财务报表为基础持续编制”的一个例子是：处置了唯一的子公司，不再控制该子公司，但保留重大影响，剩余股权作为对联营企业的长期股权投资。这种情况下，个别报表和合并报表层面对剩余股权虽然都采用权益法核算，但核算的基础和计量结果是不同的。如果后续再取得其他子公司，又需要编制合并报表，则此时合并报表的编制基础应当是对该联营企业（原子公司）的剩余股权以处置日公允价值为基础持续计量的报表，即“经济主体报表”。这个最新问答的意义在于有限度地承认了“经济主体财务报表”的概念。\n\n---\n\n查看原帖\n我上面提到的例子“处置了唯一的子公司，不再控制该子公司，但保留重大影响，剩余股权作为对联营企业的长期股权投资”，如果延续原先的基础编制合并报表，则该合并报表就与个别报表不同。", "searchText": "5497570 财政部合并财务报表准则实施问答1项----求解惑 最近更新 一云 2026-06-23t17:54:37.000z 2026-07-05t18:49:00.000z 2026年6月18日，为进一步指导企业会计准则和《企业会计准则解释第19号》(以下简称《解释第19号》)的实施，财政部会计司发布8项实施问答和1项应用案例。\n\n   其中；\n\n      问：甲公司处置其唯一子公司并丧失控制权，在处置子公司当期仍应编制合并财务报表，但在处置后的下一年度及后续会计期间应以原个别财务报表还是原合并财务报表为基础进行报表编制工作？    答：根据《企业会计准则第33号——合并财务报表》第二条，合并财务报表是指反映母公司和其全部子公司形成的企业集团整体财务状况、经营成果和现金流量的财务报表。甲公司已处置其唯一子公司，在处置子公司当期仍应编制合并财务报表，但在处置子公司下一年度及后续会计期间无需编制合并财务报表，仅需编制个别财务报表且应以原个别财务报表为基础持续编制。为确保会计信息的可比性，在编制处置子公司下一年度财务报表时，比较期间（处置子公司年度期间）应以该期间个别财务报表数据为基础列示，对于与比较期间合并财务报表的数据差异，应在财务报表附注中披露这一事实。若甲公司以后年度因新取得子公司需编制合并财务报表，除非不切实可行，新合并财务报表应再以原合并财务报表为基础持续编制。\n\n-------请问陈老师：1、在处置子公司当期仍应编制合并财务报表----仅需要编合并利润表和合并现流表吧？  期末只有甲公司一家公司了，无需编制合并资产负债表了吧?       \n\n                   2、若甲公司以后年度因新取得子公司需编制合并财务报表，除非不切实可行，新合并财务报表应再以原合并财务报表为基础持续编制。-----请问：以原合并财务报表为基础持续编制----能举例说明吗？   是以处置前一个子公司后，甲公司处置期末的合并报表加上至甲公司收购新子公司前这期间的甲公司个别报表数据编制，作为原合并报表数据吗？\n\n---\n\n查看原帖\n感谢陈老师解惑\n\n1、处置当年的合并报表编制请参阅实施问答：http://kjs.mof.gov.cn/zt/kjzzss/ ... 0220621_3819698.htm。即理论上也需要编制期末合并资产负债表（可能与个别资产负债表的金额相同，也可能不同）。\n\n---------------请问：什么情况下与个别资产负债表的金额相同，什么时候不同呢？   期末只有母公司、没有子公司了，为什么会有与个别资产负债表的金额不同的情况呢？\n\n                                                                                               一云 查看原帖\n1、处置当年的合并报表编制请参阅实施问答：http://kjs.mof.gov.cn/zt/kjzzss/ ... 0220621_3819698.htm。即理论上也需要编制期末合并资产负债表（可能与个别资产负债表的金额相同，也可能不同）。\n\n2、“再以原合并财务报表为基础持续编制”的一个例子是：处置了唯一的子公司，不再控制该子公司，但保留重大影响，剩余股权作为对联营企业的长期股权投资。这种情况下，个别报表和合并报表层面对剩余股权虽然都采用权益法核算，但核算的基础和计量结果是不同的。如果后续再取得其他子公司，又需要编制合并报表，则此时合并报表的编制基础应当是对该联营企业（原子公司）的剩余股权以处置日公允价值为基础持续计量的报表，即“经济主体报表”。这个最新问答的意义在于有限度地承认了“经济主体财务报表”的概念。\n\n---\n\n查看原帖\n我上面提到的例子“处置了唯一的子公司，不再控制该子公司，但保留重大影响，剩余股权作为对联营企业的长期股权投资”，如果延续原先的基础编制合并报表，则该合并报表就与个别报表不同。 https://bbs.esnai.cn/thread-5497570-1-1.html"}, {"tid": "5488402", "title": "不需重新计量租赁负债", "category": "最近更新", "questionAuthor": "安好", "questionTime": "2024-08-09T11:50:52.000Z", "replyTime": "2026-07-05T18:45:00.000Z", "replySortTime": "2026-07-05T18:45:00.000Z", "url": "https://bbs.esnai.cn/thread-5488402-1-1.html", "question": "请教陈版，为什么发生发生承租人不属于可控范围内的事件或变化，导致购买选择权、续租选择权或终止租赁选择权的评估结果或实际行使情况发生变化，承租人不需重新计量租赁负债？谢谢！\n\n---\n\n查看原帖\n陈版您好，指南汇编658页例21-39提到：\n\n“本例中，该库房所在地区的房价上涨属于市场情况发生的变化，不在甲公司的可控范围内。因此，虽然该事项导致购买选择权的评估结果发生变化，但甲公司不应在第3年年末重新计量租赁负债。\n\n然而，如果甲公司在第3年年末不可撤销地通知乙公司，其将在第5年末 行使购买选择权，则属于购买选择权实际行使情况发生了变化，甲公司需要在第3年年末按修订后的折现率对变动后的租赁付款额进行折现，重新计量租赁负债。”\n\n为什么只有发出了不可撤销的通知才能重新计量租赁负债？是出于防止人为操纵利润的考虑吗？谢谢！", "reply": "查看原帖\n如果发生不属于承租人可控范围内事项的事件或变化，也涉及对租赁负债和使用权资产的重新计量，这些规定已包含在租赁变更的一般规定之内。第十五条规定的“发生承租人可控范围内的重大事件或变化，且影响承租人是否合理确定将行使相应选择权的，承租人应当对其是否合理确定将行使续租选择权、购买选择权或不行使终止租赁选择权进行重新评估”是对这种特殊情况的强调。\n\n---\n\n查看原帖\n发出了不可撤销的通知属于确定的租赁变更（条款修改），否则在条款本身无变化的情况下，对权利行使可能性的估计发生变化，不属于租赁变更。这两种情形适用的准则条文不同。", "searchText": "5488402 不需重新计量租赁负债 最近更新 安好 2024-08-09t11:50:52.000z 2026-07-05t18:45:00.000z 请教陈版，为什么发生发生承租人不属于可控范围内的事件或变化，导致购买选择权、续租选择权或终止租赁选择权的评估结果或实际行使情况发生变化，承租人不需重新计量租赁负债？谢谢！\n\n---\n\n查看原帖\n陈版您好，指南汇编658页例21-39提到：\n\n“本例中，该库房所在地区的房价上涨属于市场情况发生的变化，不在甲公司的可控范围内。因此，虽然该事项导致购买选择权的评估结果发生变化，但甲公司不应在第3年年末重新计量租赁负债。\n\n然而，如果甲公司在第3年年末不可撤销地通知乙公司，其将在第5年末 行使购买选择权，则属于购买选择权实际行使情况发生了变化，甲公司需要在第3年年末按修订后的折现率对变动后的租赁付款额进行折现，重新计量租赁负债。”\n\n为什么只有发出了不可撤销的通知才能重新计量租赁负债？是出于防止人为操纵利润的考虑吗？谢谢！ 查看原帖\n如果发生不属于承租人可控范围内事项的事件或变化，也涉及对租赁负债和使用权资产的重新计量，这些规定已包含在租赁变更的一般规定之内。第十五条规定的“发生承租人可控范围内的重大事件或变化，且影响承租人是否合理确定将行使相应选择权的，承租人应当对其是否合理确定将行使续租选择权、购买选择权或不行使终止租赁选择权进行重新评估”是对这种特殊情况的强调。\n\n---\n\n查看原帖\n发出了不可撤销的通知属于确定的租赁变更（条款修改），否则在条款本身无变化的情况下，对权利行使可能性的估计发生变化，不属于租赁变更。这两种情形适用的准则条文不同。 https://bbs.esnai.cn/thread-5488402-1-1.html"}, {"tid": "5497426", "title": "求助陈版主，叩谢。", "category": "最近更新", "questionAuthor": "tmtm123", "questionTime": "2026-06-11T09:35:44.000Z", "replyTime": "2026-07-05T14:38:00.000Z", "replySortTime": "2026-07-05T14:38:00.000Z", "url": "https://bbs.esnai.cn/thread-5497426-1-1.html", "question": "我司同客户签订设备销售合同，合同内容为制造设备、运输及安装，运输与安装不形成单项履约。由于物件庞大，因此分批运输，同时负担为客户进行土建设计的费用。求教陈版，这部分运输费用是计入生产成本，在存货-发出商品成本中列示？还是按新收入准则确认合同履约成本或者直接计入营业成本？感谢陈版。\n\n---\n\n查看原帖\n继续追问一下，像合同履约成本一般用于服务型企业，像用于时点法的制造企业，这块控制权转移前所发生的运费、安装费是否计入发出商品更为合适些呢？", "reply": "查看原帖\n参照新收入准则应用案例中关于“运输费用发生于商品控制权转移给客户之前”情形下的处理，此时运输服务不构成单项履约义务，“对于为履行客户合同而发生的运输费用，属于收入准则规范下的合同履约成本。若运输活动发生在商品的控制权转移之前，其通常不构成单项履约义务，企业应将相关支出作为与商品销售相关的成本计入合同履约成本，最终计入营业成本并予以恰当披露。若运输活动发生在商品控制权转移之后，其通常构成单项履约义务，企业应在确认运输服务收入的同时，将相关支出计入运输服务成本并予以恰当披露。”\n\n因此，本案例中的运输费应计入合同履约成本，到满足收入确认条件时与发出商品成本一并转入营业成本。\n\n---\n\n查看原帖\n也可以，放在合同履约成本还是发出商品成本中，这并不是原则性的差异。", "searchText": "5497426 求助陈版主，叩谢。 最近更新 tmtm123 2026-06-11t09:35:44.000z 2026-07-05t14:38:00.000z 我司同客户签订设备销售合同，合同内容为制造设备、运输及安装，运输与安装不形成单项履约。由于物件庞大，因此分批运输，同时负担为客户进行土建设计的费用。求教陈版，这部分运输费用是计入生产成本，在存货-发出商品成本中列示？还是按新收入准则确认合同履约成本或者直接计入营业成本？感谢陈版。\n\n---\n\n查看原帖\n继续追问一下，像合同履约成本一般用于服务型企业，像用于时点法的制造企业，这块控制权转移前所发生的运费、安装费是否计入发出商品更为合适些呢？ 查看原帖\n参照新收入准则应用案例中关于“运输费用发生于商品控制权转移给客户之前”情形下的处理，此时运输服务不构成单项履约义务，“对于为履行客户合同而发生的运输费用，属于收入准则规范下的合同履约成本。若运输活动发生在商品的控制权转移之前，其通常不构成单项履约义务，企业应将相关支出作为与商品销售相关的成本计入合同履约成本，最终计入营业成本并予以恰当披露。若运输活动发生在商品控制权转移之后，其通常构成单项履约义务，企业应在确认运输服务收入的同时，将相关支出计入运输服务成本并予以恰当披露。”\n\n因此，本案例中的运输费应计入合同履约成本，到满足收入确认条件时与发出商品成本一并转入营业成本。\n\n---\n\n查看原帖\n也可以，放在合同履约成本还是发出商品成本中，这并不是原则性的差异。 https://bbs.esnai.cn/thread-5497426-1-1.html"}, {"tid": "5491993", "title": "请教陈版，关于资金占用费账务处理", "category": "最近更新", "questionAuthor": "青鼠", "questionTime": "2026-03-21T10:55:20.000Z", "replyTime": "2026-07-05T14:37:00.000Z", "replySortTime": "2026-07-05T14:37:00.000Z", "url": "https://bbs.esnai.cn/thread-5491993-1-1.html", "question": "查看原帖\n陈版，按照您的回复，那大股东归还募集资金占用利息是否计入“其他业务收入”更合适？还是说计入“财务费用-利息收入”也是可以的呢？\n\n---\n\n查看原帖\n像这种资金占用费，如何区分是适用于收入准则作为可变对价计入营业收入，还是适用于金融工具准则计入财务费用-利息收入？", "reply": "查看原帖\n目前对于非金融企业收取的资金占用费，一般是计入财务费用或者投资收益，不列入其他业务收入。因为提供资金拆借融通并不是非金融企业的日常活动，故不能确认营业收入。\n\n---\n\n查看原帖\n看有无对应的商品或劳务交易背景，还是基于被占用资金的金额、时间和风险程度确定。", "searchText": "5491993 请教陈版，关于资金占用费账务处理 最近更新 青鼠 2026-03-21t10:55:20.000z 2026-07-05t14:37:00.000z 查看原帖\n陈版，按照您的回复，那大股东归还募集资金占用利息是否计入“其他业务收入”更合适？还是说计入“财务费用-利息收入”也是可以的呢？\n\n---\n\n查看原帖\n像这种资金占用费，如何区分是适用于收入准则作为可变对价计入营业收入，还是适用于金融工具准则计入财务费用-利息收入？ 查看原帖\n目前对于非金融企业收取的资金占用费，一般是计入财务费用或者投资收益，不列入其他业务收入。因为提供资金拆借融通并不是非金融企业的日常活动，故不能确认营业收入。\n\n---\n\n查看原帖\n看有无对应的商品或劳务交易背景，还是基于被占用资金的金额、时间和风险程度确定。 https://bbs.esnai.cn/thread-5491993-1-1.html"}, {"tid": "5497273", "title": "使用权资产租金不确定如何确认", "category": "最近更新", "questionAuthor": "myjedith", "questionTime": "2026-05-27T18:34:16.000Z", "replyTime": "2026-06-28T20:24:00.000Z", "replySortTime": "2026-06-28T20:24:00.000Z", "url": "https://bbs.esnai.cn/thread-5497273-1-1.html", "question": "公司停车场业务，合同约定给场地方每月支付租金40万元，另，场地方租赁我们管理的停车位，无需支付停车费，在场地租金40万中抵扣，该部分每月停车人数不同，抵扣的租金也不等，就导致我们月租金也不等，在计算使用权资产的时候，这部分抵扣的租金应该怎么考虑？是否是按照每个月的双方抵扣的合理估计数，假设为10万，我们按照30万为依据，确认使用权资产？每个月实际抵扣数与10万的差额，调整成本\n\n---\n\n陈版主，我重新研究了合同，本次的合同并不是租赁对方场地，而是签订的委托运营合同，我司按月支付保底收益给对方，对方给我司开具9%的发票，是否并不构成一项使用权资产，而是直接做收入成本确认\n\n---\n\n查看原帖\n还得继续麻烦陈版主，我举例子中，（1）抵扣金额不准确，经了解，每月抵扣额可能达到30万，也及时占我司需要支付的保底收益比例高达70%以上，（2）业主是我司股东，是上市公司，这个是否会影响使用权资产的确认？（3）运营期限是5年，前期我司每个月收入可能不足40万，后期可能经过运营、宣传提升出租率，我司收入可能达到80万，支付的保底收益不变，这个信息是否可以减少监管对上市公司利益输送、定价公允等问题的疑惑？（4）业主是否需要净额法确认该部分委托运营收益收入？", "reply": "这不是一般的可变租金，而是两项相对独立的交易，即本企业租赁场地设置停车场，以及本企业作为停车场运营方向场地方（作为客户）提供停车服务。因此应分别按照对应的准则处理。\n\n1、对于承租场地业务，应按协议约定的固定租金（每月40万元）的折现值确认使用权资产和租赁负债。\n\n2、对于提供停车服务，应在提供服务时按约定的收费标准确认服务收入。\n\n在结算时，存在将租赁负债和应收账款相抵的情况。\n\n---\n\n虽然名义上是委托运营，但已经包含了构成租赁的三项基本要素。因此实质上构成租赁，其会计处理适用租赁准则。\n\n---\n\n查看原帖\n如果这个交易中实际上大部分车位出租也同时是向场地出租方提供的，则不排除作为一揽子交易看待，按净额法处理的可能性。由于影响重大，建议向你司的审计机构沟通确认。", "searchText": "5497273 使用权资产租金不确定如何确认 最近更新 myjedith 2026-05-27t18:34:16.000z 2026-06-28t20:24:00.000z 公司停车场业务，合同约定给场地方每月支付租金40万元，另，场地方租赁我们管理的停车位，无需支付停车费，在场地租金40万中抵扣，该部分每月停车人数不同，抵扣的租金也不等，就导致我们月租金也不等，在计算使用权资产的时候，这部分抵扣的租金应该怎么考虑？是否是按照每个月的双方抵扣的合理估计数，假设为10万，我们按照30万为依据，确认使用权资产？每个月实际抵扣数与10万的差额，调整成本\n\n---\n\n陈版主，我重新研究了合同，本次的合同并不是租赁对方场地，而是签订的委托运营合同，我司按月支付保底收益给对方，对方给我司开具9%的发票，是否并不构成一项使用权资产，而是直接做收入成本确认\n\n---\n\n查看原帖\n还得继续麻烦陈版主，我举例子中，（1）抵扣金额不准确，经了解，每月抵扣额可能达到30万，也及时占我司需要支付的保底收益比例高达70%以上，（2）业主是我司股东，是上市公司，这个是否会影响使用权资产的确认？（3）运营期限是5年，前期我司每个月收入可能不足40万，后期可能经过运营、宣传提升出租率，我司收入可能达到80万，支付的保底收益不变，这个信息是否可以减少监管对上市公司利益输送、定价公允等问题的疑惑？（4）业主是否需要净额法确认该部分委托运营收益收入？ 这不是一般的可变租金，而是两项相对独立的交易，即本企业租赁场地设置停车场，以及本企业作为停车场运营方向场地方（作为客户）提供停车服务。因此应分别按照对应的准则处理。\n\n1、对于承租场地业务，应按协议约定的固定租金（每月40万元）的折现值确认使用权资产和租赁负债。\n\n2、对于提供停车服务，应在提供服务时按约定的收费标准确认服务收入。\n\n在结算时，存在将租赁负债和应收账款相抵的情况。\n\n---\n\n虽然名义上是委托运营，但已经包含了构成租赁的三项基本要素。因此实质上构成租赁，其会计处理适用租赁准则。\n\n---\n\n查看原帖\n如果这个交易中实际上大部分车位出租也同时是向场地出租方提供的，则不排除作为一揽子交易看待，按净额法处理的可能性。由于影响重大，建议向你司的审计机构沟通确认。 https://bbs.esnai.cn/thread-5497273-1-1.html"}, {"tid": "5497472", "title": "合并范围内股权转让产生的企业所得税在合并层面是否冲减资本公积", "category": "最近更新", "questionAuthor": "laoshiqan", "questionTime": "2026-06-15T09:21:40.000Z", "replyTime": "2026-06-28T20:22:00.000Z", "replySortTime": "2026-06-28T20:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497472-1-1.html", "question": "B上市公司为A集团非全资控股子公司，B公司将其持有的X公司51%股权（其他股权为外部股东）以公允价38亿转让给A集团母公司；B公司对X公司的初始投资成本5亿元、合并报表层面享有X公司净资产份额16亿，处置产生的投资收益 22亿。 \n\n上述股权转让中B公司缴纳企业所得税合计 8.49亿。 \n\n问题：针对B公司转让X公司股权处置交易对价与账面价值的差额缴纳的当期企业所得税，A集团合并层面应当如何处理？计入当期损益还是所有者权益？主要依据哪些准则条款和监管规定\n\n---\n\n查看原帖\n谢谢陈老师回复。单户层面确认所得税费用，是认可的。现在是在合并层面是否要将该费用冲减权益（资本公积），是否需要认可权益性交易不影响损益，如果不认可是否有准则依据。", "reply": "B转让X的股权给A，由此产生投资处置所得的纳税哟五，这种情况可能表明以前年度针对X公司的长期股权投资相关的应纳税暂时性差异差异（例如在X的留存收益中所占的份额，此处为16-5=11亿元）已不再满足《企业会计准则第18号——所得税》第十二条规定的可不确认递延所得税负债的豁免条件，因此，首先建议谨慎考虑是否需就该部分应纳税暂时性差异确认递延所得税负债并追溯重述前期报表，如是，则与改不掉暂时性差异转回相关的应纳税额（11*25%=2.75亿元）可不影响处置当期净利润。\n\n对于其余部分的应纳税额（对应于转让价格高于所享有X公司净资产账面价值份额的差额），应在实际转让年度计入该年度的所得税费用——当期所得税费用。\n\n---\n\n查看原帖\nA集团合并层面，该笔内部交易已被抵销，故合并层面不属于权益***易，由此产生的所得税只能计入损益了，因为不属于所得税准则第二十一条所述的例外情况。", "searchText": "5497472 合并范围内股权转让产生的企业所得税在合并层面是否冲减资本公积 最近更新 laoshiqan 2026-06-15t09:21:40.000z 2026-06-28t20:22:00.000z b上市公司为a集团非全资控股子公司，b公司将其持有的x公司51%股权（其他股权为外部股东）以公允价38亿转让给a集团母公司；b公司对x公司的初始投资成本5亿元、合并报表层面享有x公司净资产份额16亿，处置产生的投资收益 22亿。 \n\n上述股权转让中b公司缴纳企业所得税合计 8.49亿。 \n\n问题：针对b公司转让x公司股权处置交易对价与账面价值的差额缴纳的当期企业所得税，a集团合并层面应当如何处理？计入当期损益还是所有者权益？主要依据哪些准则条款和监管规定\n\n---\n\n查看原帖\n谢谢陈老师回复。单户层面确认所得税费用，是认可的。现在是在合并层面是否要将该费用冲减权益（资本公积），是否需要认可权益性交易不影响损益，如果不认可是否有准则依据。 b转让x的股权给a，由此产生投资处置所得的纳税哟五，这种情况可能表明以前年度针对x公司的长期股权投资相关的应纳税暂时性差异差异（例如在x的留存收益中所占的份额，此处为16-5=11亿元）已不再满足《企业会计准则第18号——所得税》第十二条规定的可不确认递延所得税负债的豁免条件，因此，首先建议谨慎考虑是否需就该部分应纳税暂时性差异确认递延所得税负债并追溯重述前期报表，如是，则与改不掉暂时性差异转回相关的应纳税额（11*25%=2.75亿元）可不影响处置当期净利润。\n\n对于其余部分的应纳税额（对应于转让价格高于所享有x公司净资产账面价值份额的差额），应在实际转让年度计入该年度的所得税费用——当期所得税费用。\n\n---\n\n查看原帖\na集团合并层面，该笔内部交易已被抵销，故合并层面不属于权益***易，由此产生的所得税只能计入损益了，因为不属于所得税准则第二十一条所述的例外情况。 https://bbs.esnai.cn/thread-5497472-1-1.html"}, {"tid": "5497487", "title": "求助陈老师：其他权益工具投资处置的账务处理", "category": "最近更新", "questionAuthor": "scorpionsss", "questionTime": "2026-06-16T17:33:35.000Z", "replyTime": "2026-06-28T20:17:00.000Z", "replySortTime": "2026-06-28T20:17:00.000Z", "url": "https://bbs.esnai.cn/thread-5497487-1-1.html", "question": "公司在2025年处置了一笔投资（有盈利），当时是指定为公允价值计量且其变动计入其他综合收益，且未来也不会转入损益，放在了其他权益工具投资科目，现在年审的时候，会计师提出，处置这笔其他权益工具投资，可以计入留存收益，但需要先考虑弥补以前年度亏损，但是查了下准则和应用指南，这笔处置并没有进25年当年的利润表，而且处置时是25年初处置，怎么可能预估到全年是盈利还是亏损呢，同时这个是资产负债表权益的变化，不影响利润表。\n\n请陈老师帮忙看下，处置这个投资的时候是应该先弥补亏损，还是不用考虑以前（包括当年）是否亏损，直接就是10%盈余公积、90%未分配利润。\n\n以下是我找的依据：\n\n22号金融工具确认和计量准则“第六十九条 企业根据本准则第十九条规定将非交易性权益工具投资指定为以公允价值计量且其变动计入其他综合收益的金融资产的，当该金融资产终止确认时，之前计入其他综合收益的累计利得或损失应当从其他综合收益中转出，计入留存收益。”，同时对应的应用指南例【22-23】的案例中，也是指定为公允价值计量且其变动计入其他综合收益，只是这个案例是亏损的案例，所以案例计入未分配利润，同时案例下方有写实务中如果涉及盈余公积还应一并调整。\n\n---\n\n查看原帖\n陈老师，如果不简化考虑，是不是应该将处理其他权益工具投资此事项的盈利，分别计入盈余公积（10%）和未分配利润（90%），而不用考虑是否有可弥补亏损？我觉得不应该有简化和不简化的考虑，应该按准则此出售此金融工具，已经指定了公允价值计量且其变动计入其他综合收益，那么在处置此金融工具时，如果盈利就应该按1：9分别计入盈余公积和未分配利润。", "reply": "这是其他综合收益转留存收益时如何在盈余公积和未分配利润之间分拆的问题。基于简化考虑，在处置时点的处理，可以简化为：如果该时点本公司（个别报表层面，下同）的未分配利润为负数的，则从其他综合收益转留存收益的金额优先用于弥补该负数，剩余部分再按照10%对90%的比例在盈余公积和未分配利润之间分配。\n\n由于其他综合收益转留存收益的金额不构成净利润的一部分，故不影响年末盈余公积的计提。\n\n---\n\n查看原帖\n如果此时未分配利润为负数，则习惯上还是先弥补。", "searchText": "5497487 求助陈老师：其他权益工具投资处置的账务处理 最近更新 scorpionsss 2026-06-16t17:33:35.000z 2026-06-28t20:17:00.000z 公司在2025年处置了一笔投资（有盈利），当时是指定为公允价值计量且其变动计入其他综合收益，且未来也不会转入损益，放在了其他权益工具投资科目，现在年审的时候，会计师提出，处置这笔其他权益工具投资，可以计入留存收益，但需要先考虑弥补以前年度亏损，但是查了下准则和应用指南，这笔处置并没有进25年当年的利润表，而且处置时是25年初处置，怎么可能预估到全年是盈利还是亏损呢，同时这个是资产负债表权益的变化，不影响利润表。\n\n请陈老师帮忙看下，处置这个投资的时候是应该先弥补亏损，还是不用考虑以前（包括当年）是否亏损，直接就是10%盈余公积、90%未分配利润。\n\n以下是我找的依据：\n\n22号金融工具确认和计量准则“第六十九条 企业根据本准则第十九条规定将非交易性权益工具投资指定为以公允价值计量且其变动计入其他综合收益的金融资产的，当该金融资产终止确认时，之前计入其他综合收益的累计利得或损失应当从其他综合收益中转出，计入留存收益。”，同时对应的应用指南例【22-23】的案例中，也是指定为公允价值计量且其变动计入其他综合收益，只是这个案例是亏损的案例，所以案例计入未分配利润，同时案例下方有写实务中如果涉及盈余公积还应一并调整。\n\n---\n\n查看原帖\n陈老师，如果不简化考虑，是不是应该将处理其他权益工具投资此事项的盈利，分别计入盈余公积（10%）和未分配利润（90%），而不用考虑是否有可弥补亏损？我觉得不应该有简化和不简化的考虑，应该按准则此出售此金融工具，已经指定了公允价值计量且其变动计入其他综合收益，那么在处置此金融工具时，如果盈利就应该按1：9分别计入盈余公积和未分配利润。 这是其他综合收益转留存收益时如何在盈余公积和未分配利润之间分拆的问题。基于简化考虑，在处置时点的处理，可以简化为：如果该时点本公司（个别报表层面，下同）的未分配利润为负数的，则从其他综合收益转留存收益的金额优先用于弥补该负数，剩余部分再按照10%对90%的比例在盈余公积和未分配利润之间分配。\n\n由于其他综合收益转留存收益的金额不构成净利润的一部分，故不影响年末盈余公积的计提。\n\n---\n\n查看原帖\n如果此时未分配利润为负数，则习惯上还是先弥补。 https://bbs.esnai.cn/thread-5497487-1-1.html"}, {"tid": "5497500", "title": "我公司加入市场化购电及绿电项目，相关电费优惠和补贴会计核算问题。", "category": "最近更新", "questionAuthor": "baibingbing132y", "questionTime": "2026-06-17T16:23:25.000Z", "replyTime": "2026-06-28T20:16:00.000Z", "replySortTime": "2026-06-28T20:16:00.000Z", "url": "https://bbs.esnai.cn/thread-5497500-1-1.html", "question": "我公司加入市场化购电及绿电项目，相关电费优惠和补贴会计核算问题。\n\n我公司主要为车间用电，即电费全部成本化。\n\n假设我公司每月用电10万度：\n\n1、电费优化：假设每度电优惠0.1元，每月省1万，即较以往少付国网1万。\n\n但需支付给乙方(代理方)20%服务费即0.2万。\n\n2、同时采购绿电，政府补贴0.02元/度，总补贴0.2万。\n\n但需支付给乙方(代理方)20%服务费即0.04万。\n\n问题：1和2的服务费用应该如何核算呢？冲减主营业务成本-电费吗？\n\n---\n\n查看原帖\n2是净额法核算收到的与收益相关的政府补助的意思么", "reply": "1中的服务费可视为电价的调整因素，调整产品生产成本和销售成本；\n\n2中的服务费一般计入管理费用处理。\n\n---\n\n查看原帖\n不是，这类服务费是一项单独的支出，与政府补助分开核算，所以计入管理费用。", "searchText": "5497500 我公司加入市场化购电及绿电项目，相关电费优惠和补贴会计核算问题。 最近更新 baibingbing132y 2026-06-17t16:23:25.000z 2026-06-28t20:16:00.000z 我公司加入市场化购电及绿电项目，相关电费优惠和补贴会计核算问题。\n\n我公司主要为车间用电，即电费全部成本化。\n\n假设我公司每月用电10万度：\n\n1、电费优化：假设每度电优惠0.1元，每月省1万，即较以往少付国网1万。\n\n但需支付给乙方(代理方)20%服务费即0.2万。\n\n2、同时采购绿电，政府补贴0.02元/度，总补贴0.2万。\n\n但需支付给乙方(代理方)20%服务费即0.04万。\n\n问题：1和2的服务费用应该如何核算呢？冲减主营业务成本-电费吗？\n\n---\n\n查看原帖\n2是净额法核算收到的与收益相关的政府补助的意思么 1中的服务费可视为电价的调整因素，调整产品生产成本和销售成本；\n\n2中的服务费一般计入管理费用处理。\n\n---\n\n查看原帖\n不是，这类服务费是一项单独的支出，与政府补助分开核算，所以计入管理费用。 https://bbs.esnai.cn/thread-5497500-1-1.html"}, {"tid": "5475965", "title": "被投资单位处置其他权益工具，投资方如何处理", "category": "最近更新", "questionAuthor": "爱鱼儿的瓶tl", "questionTime": "2023-03-06T18:22:26.000Z", "replyTime": "2026-06-28T19:41:00.000Z", "replySortTime": "2026-06-28T19:41:00.000Z", "url": "https://bbs.esnai.cn/thread-5475965-1-1.html", "question": "陈老师您好：\n\n     业务中遇到这样一个问题，还烦请您百忙中给予解答，不胜感激。\n\nA公司持有对联营企业的投资，以权益法核算。被投资单位B持有其他权益工具，本期B把其他权益工具处置了，将其他权益工具相应的公允价值变动由其他综合收益转入留存收益。对于投资方A来说，如何会计处理？\n\n比如说上年被投资单位B其他权益工具变动100万，A享有10万，借：长投-其他综合收益10贷：其他综合收益10.本期被投资方B其他综合收益为0，转入留存收益100万。\n\n  对于投资方A来说，是以下哪种处理方式：\n\n方式1：根据准则，除净利润、其他综合收益及利润分配外的其他净资产变动，确认为资本公积：\n\n借：长投-其他综合收益-10 借：长投-其他权益变动10 贷：其他综合收益-10 资本公积-其他资本公积10；\n\n方式2：被投资方处置其他权益工具，将其他综合收益转入留存收益，间接影响的仍然是净利润，故，借：其他综合收益 10  贷：投资收益 10。将长投明细项由其他综合收益结转至损益调整。\n\n---\n\n查看原帖\n既然准则规定了其他综合收益不可转权益部分，不能计入损益，那么投资联营企业也应一并遵照，不然绕过直接投资，既可以享受这部分利润？被投资方已然计入 留存收益，本质上与损益属于相同效果（会计处理上不能进入损益，但是进入为分批利润），直接进入投资方的留存收益 不是与损益一个道理吗？", "reply": "应采用方式1处理。该部分“资本公积——其他资本公积”可在后续处置对该联营企业的股权投资或者丧失重大影响时转入损益。\n\n---\n\n查看原帖\n抱歉，方案1中也有问题，后面的“ 贷：其他综合收益-10 资本公积-其他资本公积10”是不应该做的，只做长期股权投资的明细调整，这样就没有你说的问题了。", "searchText": "5475965 被投资单位处置其他权益工具，投资方如何处理 最近更新 爱鱼儿的瓶tl 2023-03-06t18:22:26.000z 2026-06-28t19:41:00.000z 陈老师您好：\n\n     业务中遇到这样一个问题，还烦请您百忙中给予解答，不胜感激。\n\na公司持有对联营企业的投资，以权益法核算。被投资单位b持有其他权益工具，本期b把其他权益工具处置了，将其他权益工具相应的公允价值变动由其他综合收益转入留存收益。对于投资方a来说，如何会计处理？\n\n比如说上年被投资单位b其他权益工具变动100万，a享有10万，借：长投-其他综合收益10贷：其他综合收益10.本期被投资方b其他综合收益为0，转入留存收益100万。\n\n  对于投资方a来说，是以下哪种处理方式：\n\n方式1：根据准则，除净利润、其他综合收益及利润分配外的其他净资产变动，确认为资本公积：\n\n借：长投-其他综合收益-10 借：长投-其他权益变动10 贷：其他综合收益-10 资本公积-其他资本公积10；\n\n方式2：被投资方处置其他权益工具，将其他综合收益转入留存收益，间接影响的仍然是净利润，故，借：其他综合收益 10  贷：投资收益 10。将长投明细项由其他综合收益结转至损益调整。\n\n---\n\n查看原帖\n既然准则规定了其他综合收益不可转权益部分，不能计入损益，那么投资联营企业也应一并遵照，不然绕过直接投资，既可以享受这部分利润？被投资方已然计入 留存收益，本质上与损益属于相同效果（会计处理上不能进入损益，但是进入为分批利润），直接进入投资方的留存收益 不是与损益一个道理吗？ 应采用方式1处理。该部分“资本公积——其他资本公积”可在后续处置对该联营企业的股权投资或者丧失重大影响时转入损益。\n\n---\n\n查看原帖\n抱歉，方案1中也有问题，后面的“ 贷：其他综合收益-10 资本公积-其他资本公积10”是不应该做的，只做长期股权投资的明细调整，这样就没有你说的问题了。 https://bbs.esnai.cn/thread-5475965-1-1.html"}, {"tid": "5497473", "title": "求助陈版：关于美国加征关税退税的会计处理咨询", "category": "最近更新", "questionAuthor": "hy2608", "questionTime": "2026-06-15T15:23:50.000Z", "replyTime": "2026-06-28T19:31:00.000Z", "replySortTime": "2026-06-28T19:31:00.000Z", "url": "https://bbs.esnai.cn/thread-5497473-1-1.html", "question": "陈版好，2026年2月20日，美国联邦最高法院以6:3多数作出裁决，认定特朗普政府依据《国际紧急经济权力法》(IEEPA)加征的关税缺乏充分法律授权，属违法征收。据此，2025年2月至2026年2月23日期间依据IEEPA加征的全部关税均应予撤销。依据“违法征税应予返还”的基本法理，备案进口商(Importer of Record)依法享有申请退还已缴纳税款的权利。本次涉及退税总规模约为1,660亿美元(含关税及相关保证金)。我国境内公司的子公司也涉及相关退税，大概金额1500万美元，针对此退税事项的报表列报是否可以冲减成本，还是计入营业外收入比较合适，是否能作为经常性损益呢，还请陈版给予专业意见。\n\n---\n\n查看原帖\n那如果是冲减营业成本，是否可以作为经常性损益呢", "reply": "应在收取退税款的权利确立且有权收取的金额能够可靠计量时确认应收退税款，对应冲减当初计提该部分关税时所计入的项目（例如营业成本）。如果冲减营业成本的金额较大，不希望将营业成本冲减为负数的，则计入营业外收入也可以接受。\n\n---\n\n查看原帖\n看影响金额大小，冲减营业成本不一定就是经常性损益。", "searchText": "5497473 求助陈版：关于美国加征关税退税的会计处理咨询 最近更新 hy2608 2026-06-15t15:23:50.000z 2026-06-28t19:31:00.000z 陈版好，2026年2月20日，美国联邦最高法院以6:3多数作出裁决，认定特朗普政府依据《国际紧急经济权力法》(ieepa)加征的关税缺乏充分法律授权，属违法征收。据此，2025年2月至2026年2月23日期间依据ieepa加征的全部关税均应予撤销。依据“违法征税应予返还”的基本法理，备案进口商(importer of record)依法享有申请退还已缴纳税款的权利。本次涉及退税总规模约为1,660亿美元(含关税及相关保证金)。我国境内公司的子公司也涉及相关退税，大概金额1500万美元，针对此退税事项的报表列报是否可以冲减成本，还是计入营业外收入比较合适，是否能作为经常性损益呢，还请陈版给予专业意见。\n\n---\n\n查看原帖\n那如果是冲减营业成本，是否可以作为经常性损益呢 应在收取退税款的权利确立且有权收取的金额能够可靠计量时确认应收退税款，对应冲减当初计提该部分关税时所计入的项目（例如营业成本）。如果冲减营业成本的金额较大，不希望将营业成本冲减为负数的，则计入营业外收入也可以接受。\n\n---\n\n查看原帖\n看影响金额大小，冲减营业成本不一定就是经常性损益。 https://bbs.esnai.cn/thread-5497473-1-1.html"}, {"tid": "5497607", "title": "陈老师好", "category": "最近更新", "questionAuthor": "yahmm", "questionTime": "2026-06-26T12:00:40.000Z", "replyTime": "2026-06-28T18:01:00.000Z", "replySortTime": "2026-06-28T18:01:00.000Z", "url": "https://bbs.esnai.cn/thread-5497607-1-1.html", "question": "陈老师，有一上市公司原来的会计政策是：同一控制下的关联方的往来不计提信用减值准备，现在计提信用减值准备，这是会计估计变更还是会计估计变更，如果是会计政策变更是否会计差错，是否需追朔调整，盼陈老师给予指教", "reply": "查看原帖\n严格来说，属于前期差错的可能性更大。\n\n如果能证明以下几点，则理论上可以作为会计估计变更，但个人预计这种可能性很小：（1）以前年度对此类关联方往来款项不计提坏账准备具有合理性；（2）有证据表明在本年度内，该等关联方的信用风险特征发生了重大变化，且变更后的计提比例合理、恰当地反映了债务人的信用风险状况。", "searchText": "5497607 陈老师好 最近更新 yahmm 2026-06-26t12:00:40.000z 2026-06-28t18:01:00.000z 陈老师，有一上市公司原来的会计政策是：同一控制下的关联方的往来不计提信用减值准备，现在计提信用减值准备，这是会计估计变更还是会计估计变更，如果是会计政策变更是否会计差错，是否需追朔调整，盼陈老师给予指教 查看原帖\n严格来说，属于前期差错的可能性更大。\n\n如果能证明以下几点，则理论上可以作为会计估计变更，但个人预计这种可能性很小：（1）以前年度对此类关联方往来款项不计提坏账准备具有合理性；（2）有证据表明在本年度内，该等关联方的信用风险特征发生了重大变化，且变更后的计提比例合理、恰当地反映了债务人的信用风险状况。 https://bbs.esnai.cn/thread-5497607-1-1.html"}, {"tid": "5497591", "title": "子公司向母公司按账面净值划转其持有的股权或资产", "category": "最近更新", "questionAuthor": "13618601651", "questionTime": "2026-06-25T12:00:41.000Z", "replyTime": "2026-06-28T17:59:00.000Z", "replySortTime": "2026-06-28T17:59:00.000Z", "url": "https://bbs.esnai.cn/thread-5497591-1-1.html", "question": "请问，100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付，会计处理上，子公司是否可以按税法规定冲减实收资本处理。\n\n     国家税务总局关于资产（股权）划转企业所得税征管问题的公告（国家税务总局公告2015年第40号）100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付。母公司按收回投资处理，或按接受投资处理，子公司按冲减实收资本处理。母公司应按被划转股权或资产的原计税基础，相应调减持有子公司股权的计税基础。\n\n   企业会计准则应用指南-第2 号—长期股权投资(2014)企业合并形成的长期股权投资。同一控制下企业合并形成的长期股权投资，合并方以支付现金、转让非现金资产或承担债务方式作为合并对价的，应在合并日按取得被合并方所有者权益在最终控制方合并财务报表中的账面价值的份额，借记本科目（投资成本），按支付的合并对价的账面价值，贷记或借记有关资产、负债科目，按其差额，贷记“资本公积——资本溢价或股本溢价”科目；如为借方差额，借记“资本公积——资本溢价或股本溢价”科目，资本公积（资本溢价或股本溢价）不足冲减的，应依次借记“盈余公积”、“利润分配——未分配利润”科目。\n\n    会计处理上，子公司是否可以按税法规定冲减实收资本处理。", "reply": "查看原帖\n如果子公司要冲减实收资本，则需按照《公司法》和国有资产管理的有关规定（假设子公司是国有及国有控股企业，下同）办理减资手续，在此基础上方可按减资方案确定的金额减少实收资本，未办理减资手续的，不能减少实收资本，只能依次冲减资本公积（资本溢价或股本溢价）和留存收益。", "searchText": "5497591 子公司向母公司按账面净值划转其持有的股权或资产 最近更新 13618601651 2026-06-25t12:00:41.000z 2026-06-28t17:59:00.000z 请问，100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付，会计处理上，子公司是否可以按税法规定冲减实收资本处理。\n\n     国家税务总局关于资产（股权）划转企业所得税征管问题的公告（国家税务总局公告2015年第40号）100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付。母公司按收回投资处理，或按接受投资处理，子公司按冲减实收资本处理。母公司应按被划转股权或资产的原计税基础，相应调减持有子公司股权的计税基础。\n\n   企业会计准则应用指南-第2 号—长期股权投资(2014)企业合并形成的长期股权投资。同一控制下企业合并形成的长期股权投资，合并方以支付现金、转让非现金资产或承担债务方式作为合并对价的，应在合并日按取得被合并方所有者权益在最终控制方合并财务报表中的账面价值的份额，借记本科目（投资成本），按支付的合并对价的账面价值，贷记或借记有关资产、负债科目，按其差额，贷记“资本公积——资本溢价或股本溢价”科目；如为借方差额，借记“资本公积——资本溢价或股本溢价”科目，资本公积（资本溢价或股本溢价）不足冲减的，应依次借记“盈余公积”、“利润分配——未分配利润”科目。\n\n    会计处理上，子公司是否可以按税法规定冲减实收资本处理。 查看原帖\n如果子公司要冲减实收资本，则需按照《公司法》和国有资产管理的有关规定（假设子公司是国有及国有控股企业，下同）办理减资手续，在此基础上方可按减资方案确定的金额减少实收资本，未办理减资手续的，不能减少实收资本，只能依次冲减资本公积（资本溢价或股本溢价）和留存收益。 https://bbs.esnai.cn/thread-5497591-1-1.html"}, {"tid": "5497590", "title": "求助陈版：风电公司的运维费计提的会计处理", "category": "最近更新", "questionAuthor": "8877961", "questionTime": "2026-06-25T12:00:39.000Z", "replyTime": "2026-06-28T17:43:00.000Z", "replySortTime": "2026-06-28T17:43:00.000Z", "url": "https://bbs.esnai.cn/thread-5497590-1-1.html", "question": "陈版您好：\n\n25年6月公司与供应商签订了风电场站运维合同，合同期限5年，合同总额1500万，合同总额又分为三类：基本运维管理费700万、考核保证金70万和奖励金730万；结算条款如下：\n\n1.合同约定基本运维管理费按季度结算\n\n2.考核保证金在每一运维年度结束后的次年按以下方式支付:每期合同生效后，受托方应在每一运维年度结束后30日内向委托方提交考核自评材料，委托方收到前述材料之日起15日内，按照附件四载明的考核指标审核无误后，在受托方提供了符合委托方要求的发票后的7个工作日内一次性付清。\n\n3.奖励金在每一运维年度结束后的次年按以下方式支付:每期合同生效后，受托方应在每一运维年度结束后30日内向委托方提交奖励依据材料，委托方收到前述材料之日起15日内，按照附件四载明的考核指标审核无误后，在受托方提供了符合委托方要求的发票后的7个工作日内一次性付清。\n\n公司按月计提运维费，目前每月仅对基本运维管理费进行暂估入成本，季度结算；但是考核保证金和奖励金未做暂估，审计也未做调整；想请教陈版：\n\n公司是否需要对保证金和奖励金每月或年度暂估入账？若不暂估的话，等到实际结算的时候做账到当期是否合适？", "reply": "查看原帖\n保证金和奖励金也是运维服务对价的一部分，类似于收入准则规定的可变对价。作为客户，其对费用的估计也应当遵循谨慎性原则（只不过这种“谨慎”的结果与站在供应商角度对可变对价的估计结果可能是相反的，即应当尽可能多地估计可能的成本费用）。\n\n即，本公司应根据以往历史经验和该项目的具体情况、该服务商的专业能力和口碑等，谨慎地估计需支付的运维费（包括考核保证金和奖励金）的金额，对应确认负债，不应只就基本运维管理费作出计提。后续根据情况的变化发展对该项估计金额的调整作为会计估计变更处理。", "searchText": "5497590 求助陈版：风电公司的运维费计提的会计处理 最近更新 8877961 2026-06-25t12:00:39.000z 2026-06-28t17:43:00.000z 陈版您好：\n\n25年6月公司与供应商签订了风电场站运维合同，合同期限5年，合同总额1500万，合同总额又分为三类：基本运维管理费700万、考核保证金70万和奖励金730万；结算条款如下：\n\n1.合同约定基本运维管理费按季度结算\n\n2.考核保证金在每一运维年度结束后的次年按以下方式支付:每期合同生效后，受托方应在每一运维年度结束后30日内向委托方提交考核自评材料，委托方收到前述材料之日起15日内，按照附件四载明的考核指标审核无误后，在受托方提供了符合委托方要求的发票后的7个工作日内一次性付清。\n\n3.奖励金在每一运维年度结束后的次年按以下方式支付:每期合同生效后，受托方应在每一运维年度结束后30日内向委托方提交奖励依据材料，委托方收到前述材料之日起15日内，按照附件四载明的考核指标审核无误后，在受托方提供了符合委托方要求的发票后的7个工作日内一次性付清。\n\n公司按月计提运维费，目前每月仅对基本运维管理费进行暂估入成本，季度结算；但是考核保证金和奖励金未做暂估，审计也未做调整；想请教陈版：\n\n公司是否需要对保证金和奖励金每月或年度暂估入账？若不暂估的话，等到实际结算的时候做账到当期是否合适？ 查看原帖\n保证金和奖励金也是运维服务对价的一部分，类似于收入准则规定的可变对价。作为客户，其对费用的估计也应当遵循谨慎性原则（只不过这种“谨慎”的结果与站在供应商角度对可变对价的估计结果可能是相反的，即应当尽可能多地估计可能的成本费用）。\n\n即，本公司应根据以往历史经验和该项目的具体情况、该服务商的专业能力和口碑等，谨慎地估计需支付的运维费（包括考核保证金和奖励金）的金额，对应确认负债，不应只就基本运维管理费作出计提。后续根据情况的变化发展对该项估计金额的调整作为会计估计变更处理。 https://bbs.esnai.cn/thread-5497590-1-1.html"}, {"tid": "5497587", "title": "求陈版主回复！！1关于企业是否能合并报表的判断", "category": "最近更新", "questionAuthor": "wuyifan724", "questionTime": "2026-06-24T12:00:39.000Z", "replyTime": "2026-06-28T17:34:00.000Z", "replySortTime": "2026-06-28T17:34:00.000Z", "url": "https://bbs.esnai.cn/thread-5497587-1-1.html", "question": "陈版主，求求求求回复！！！\n\n案例描述：A公司与B公司共同成立C公司，A公司占股70%,B公司占股30%，董事会席位已经日常经常都以A公司为主，但是对于审议批准公司的年度财务方案、决算方案，以及审议批准公司的利润分配方案和弥补亏损方案需要双方股东一致同意，其余无其他特殊约定。问题：该条款的约定会影响A公司对于C公司的控制权以及并表么？", "reply": "查看原帖\n从该约定来看，A应不能控制C。但该约定似乎明显不符合常规逻辑，建议了解“对于审议批准公司的年度财务方案、决算方案，以及审议批准公司的利润分配方案和弥补亏损方案需要双方股东一致同意”这一安排的理由和背后商业逻辑，以便进一步分析讨论。", "searchText": "5497587 求陈版主回复！！1关于企业是否能合并报表的判断 最近更新 wuyifan724 2026-06-24t12:00:39.000z 2026-06-28t17:34:00.000z 陈版主，求求求求回复！！！\n\n案例描述：a公司与b公司共同成立c公司，a公司占股70%,b公司占股30%，董事会席位已经日常经常都以a公司为主，但是对于审议批准公司的年度财务方案、决算方案，以及审议批准公司的利润分配方案和弥补亏损方案需要双方股东一致同意，其余无其他特殊约定。问题：该条款的约定会影响a公司对于c公司的控制权以及并表么？ 查看原帖\n从该约定来看，a应不能控制c。但该约定似乎明显不符合常规逻辑，建议了解“对于审议批准公司的年度财务方案、决算方案，以及审议批准公司的利润分配方案和弥补亏损方案需要双方股东一致同意”这一安排的理由和背后商业逻辑，以便进一步分析讨论。 https://bbs.esnai.cn/thread-5497587-1-1.html"}, {"tid": "5497581", "title": "求助，关于租赁的基础上进行装修", "category": "最近更新", "questionAuthor": "jianfei1302", "questionTime": "2026-06-24T12:00:41.000Z", "replyTime": "2026-06-28T17:32:00.000Z", "replySortTime": "2026-06-28T17:32:00.000Z", "url": "https://bbs.esnai.cn/thread-5497581-1-1.html", "question": "公司因招商引资政策，与当地政府协商，公司租赁100亩土地及土地上的房产，租赁期限为2026年-2030年，2031年1月，公司可以按照市场价格购入房产及土地。\n\n公司投入大量设备，预计2031年购入房产土地的可能性非常大。\n\n2026年至2030年期间，公司对租赁的房产进行大规模装修改造，且装修改造金额较大。\n\n2026年发生的装修改造费用如何处理？\n\n方案一：按照常规租赁计入「长期待摊费用」，并且按照3年或租赁期限进行摊销，但是存在2029年或者2030年的装修改造费用，是否只能在1-2年摊销了？\n\n方案二：因为租赁后非常有可能进行购入房产土地，该租赁实质属于「融资租入资产」，最终会取得房产所有权：若装修金额较大、符合资本化条件，可计入「长期待摊费用」，按照装修的预计受益年限（如20年）摊销？\n\n以上哪个方案更加合适？", "reply": "查看原帖\n总体上看方案二更合理。但为了保持会计处理的逻辑一致性，应将预计2031年租赁期满时需支付的购买款的折现值也预估入账，调整使用权资产账面价值，该使用权资产的折旧年限应包括留购后的预计剩余使用寿命在内。后续如果对留购价款金额的估计发生变化的，则相应调整该负债以及使用权资产账面价值。到2031年实际行使留购权后，届时的使用权资产原值、累计折旧分别平移为固定资产的原值、累计折旧。\n\n附注中应披露对留购可能性大小及留购价格估计的相关依据。", "searchText": "5497581 求助，关于租赁的基础上进行装修 最近更新 jianfei1302 2026-06-24t12:00:41.000z 2026-06-28t17:32:00.000z 公司因招商引资政策，与当地政府协商，公司租赁100亩土地及土地上的房产，租赁期限为2026年-2030年，2031年1月，公司可以按照市场价格购入房产及土地。\n\n公司投入大量设备，预计2031年购入房产土地的可能性非常大。\n\n2026年至2030年期间，公司对租赁的房产进行大规模装修改造，且装修改造金额较大。\n\n2026年发生的装修改造费用如何处理？\n\n方案一：按照常规租赁计入「长期待摊费用」，并且按照3年或租赁期限进行摊销，但是存在2029年或者2030年的装修改造费用，是否只能在1-2年摊销了？\n\n方案二：因为租赁后非常有可能进行购入房产土地，该租赁实质属于「融资租入资产」，最终会取得房产所有权：若装修金额较大、符合资本化条件，可计入「长期待摊费用」，按照装修的预计受益年限（如20年）摊销？\n\n以上哪个方案更加合适？ 查看原帖\n总体上看方案二更合理。但为了保持会计处理的逻辑一致性，应将预计2031年租赁期满时需支付的购买款的折现值也预估入账，调整使用权资产账面价值，该使用权资产的折旧年限应包括留购后的预计剩余使用寿命在内。后续如果对留购价款金额的估计发生变化的，则相应调整该负债以及使用权资产账面价值。到2031年实际行使留购权后，届时的使用权资产原值、累计折旧分别平移为固定资产的原值、累计折旧。\n\n附注中应披露对留购可能性大小及留购价格估计的相关依据。 https://bbs.esnai.cn/thread-5497581-1-1.html"}, {"tid": "5497569", "title": "请教陈版主及各位前辈：关于母公司吸收合并子公司的账务处理", "category": "最近更新", "questionAuthor": "她笑呀", "questionTime": "2026-06-23T12:00:41.000Z", "replyTime": "2026-06-28T17:16:00.000Z", "replySortTime": "2026-06-28T17:16:00.000Z", "url": "https://bbs.esnai.cn/thread-5497569-1-1.html", "question": "陈版主及各位前辈：有一个实务案例想请教一下：\n事项背景：\n母公司（我方）于以前年度通过非同一控制下企业合并取得子公司（100%控股）。购买日，子公司可辨认净资产评估增值（固定资产-房屋）600万元，子公司账面未分配利润为300万元。\n关键时间节点：\n2026年度：合并层面计提评估增值房产折旧100万元（已在合并报表中借记“年初未分配利润”100万，贷记“累计折旧”100万）\n2026年3月：该评估增值的房产办理产权转让至母公司（母公司单体按净值入账并计入资本公积）\n2026年5月：子公司完成工商注销，母公司吸收合并事项完毕\n关键数据：\n母公司对子公司的长投账面价值在母公司单体已全额计提减值准备（提至0）\n子公司注销日账面资产100万，负债120万（资不抵债）\n针对上述情形，在单体与合并层面存在以下困惑，恳请指点：\n一、母公司单体报表层面：\n1）关于资本公积与后续折旧的处理：\n\n3月房产转让至母公司时，我按评估净额计入了单体资本公积。由于子公司5月才注销，4-5月该房产的折旧是否应冲减资本公积？还是说资本公积金额在3月即锁定，4-5月折旧直接计入母公司损益？实务中是否存在资本公积与留存收益分类不当的风险？\n2）关于吸收合并取得净资产的入账分录：\n\n母公司单体吸收合并分录拟做：\n\n借：资产 100万\n\n资本公积 20万\n\n贷：负债 120万\n\n（即按子公司账面净资产入账，差额冲减资本公积）\n\n争议点： 我看到部分观点认为应“还原子公司留存收益”（即借：资产，贷：负债，贷：年初未分配利润/资本公积等），另一观点认为直接计入资本公积。在母公司长投已全额减值且净资产为负的情况下，上述简化的差额冲资本公积的处理是否合规？\n3）关于长投减值准备：\n\n母公司单体原计提的长投减值准备，在子公司注销后是否视为“长期股权投资处置损失”实现？该部分减值准备能否在企业所得税税前扣除？（是否需要满足资产损失税前扣除的专项申报条件？）\n二、合并报表层面\n1）关于利润表纳入与勾稽关系：\n\n子公司注销当年（2026年），我拟将子公司1-5月的利润表纳入合并范围，但不合并资产负债表期末数。此时合并报表层面未分配利润的勾稽关系（期初未分配利润+本期归母净利润=期末未分配利润）是否会因“只并利润表不并资产负债表”而被打破？若打破，是否属于合理情形？\n2）关于购买日评估增值及合并抵销分录：\n\n子公司注销后，合并层面原有的购买日评估增值分录（借：固定资产600万，贷：长投600万；借：长投300万，贷：年初未分配利润300万）是否应全部终止？是否需要在2026年合并底稿中做反向冲回处理？\n3）关于内部交易未实现损益：\n\n子公司以前年度销售给母公司及集团内其他子公司的固定资产/无形资产，其中涉及的未实现内部销售损益，在子公司注销后是否仍应延续原抵销操作（继续抵销直至该资产折旧完毕或处置）？\n4）关于资本公积的变动差异：\n\n吸收合并后，合并报表层面的资本公积与合并前比较，出现了一个差额。经分析，该差额等于“评估增值房产在合并层面已计提的累计折旧金额”（因为合并层面原值是计入资本公积，折旧冲损益；而单体转让时是按净值入资本公积，口径不一致）。请问合并层面是否应通过调整分录消除此差额？\n5）关于长期股权投资与减值准备的灭失：\n\n在吸收合并完成的合并底稿中，母公司单体层面的“长期股权投资”及对应的“长期股权投资减值准备”是否应在合并层面全额抵消冲销（即视同该项投资已不复存在）？", "reply": "查看原帖\n一、首先个别报表层面是否应就取得资产计入资本公积是有疑问的，我理解应首先冲减长期股权投资账面价值，再对差额部分按照解释7号第四条规定处理。另外，收回资产价值600万元，但对长期股权投资全额计提减值，是否恰当，建议谨慎考虑。总之建议对前期报表关注是否需进行差错更正。\n\n无论如何，母公司取得该资产后，计提减值准备应正常计入相应的成本费用项目，不应冲减资本公积。该项资本公积（如有）自吸收合并后即锁定。\n\n原先计提的长投减值准备（如有）在子公司注销后应作为已发生损失申报税前扣除和财务核销。\n\n二、合并报表层面，该事项本身不应影响合并报表层面的资产、负债和权益。如涉及所得税影响的，其影响金额计入合并报表层面的所得税费用。该事项在合并报表层面不属于权益性交易。", "searchText": "5497569 请教陈版主及各位前辈：关于母公司吸收合并子公司的账务处理 最近更新 她笑呀 2026-06-23t12:00:41.000z 2026-06-28t17:16:00.000z 陈版主及各位前辈：有一个实务案例想请教一下：\n事项背景：\n母公司（我方）于以前年度通过非同一控制下企业合并取得子公司（100%控股）。购买日，子公司可辨认净资产评估增值（固定资产-房屋）600万元，子公司账面未分配利润为300万元。\n关键时间节点：\n2026年度：合并层面计提评估增值房产折旧100万元（已在合并报表中借记“年初未分配利润”100万，贷记“累计折旧”100万）\n2026年3月：该评估增值的房产办理产权转让至母公司（母公司单体按净值入账并计入资本公积）\n2026年5月：子公司完成工商注销，母公司吸收合并事项完毕\n关键数据：\n母公司对子公司的长投账面价值在母公司单体已全额计提减值准备（提至0）\n子公司注销日账面资产100万，负债120万（资不抵债）\n针对上述情形，在单体与合并层面存在以下困惑，恳请指点：\n一、母公司单体报表层面：\n1）关于资本公积与后续折旧的处理：\n\n3月房产转让至母公司时，我按评估净额计入了单体资本公积。由于子公司5月才注销，4-5月该房产的折旧是否应冲减资本公积？还是说资本公积金额在3月即锁定，4-5月折旧直接计入母公司损益？实务中是否存在资本公积与留存收益分类不当的风险？\n2）关于吸收合并取得净资产的入账分录：\n\n母公司单体吸收合并分录拟做：\n\n借：资产 100万\n\n资本公积 20万\n\n贷：负债 120万\n\n（即按子公司账面净资产入账，差额冲减资本公积）\n\n争议点： 我看到部分观点认为应“还原子公司留存收益”（即借：资产，贷：负债，贷：年初未分配利润/资本公积等），另一观点认为直接计入资本公积。在母公司长投已全额减值且净资产为负的情况下，上述简化的差额冲资本公积的处理是否合规？\n3）关于长投减值准备：\n\n母公司单体原计提的长投减值准备，在子公司注销后是否视为“长期股权投资处置损失”实现？该部分减值准备能否在企业所得税税前扣除？（是否需要满足资产损失税前扣除的专项申报条件？）\n二、合并报表层面\n1）关于利润表纳入与勾稽关系：\n\n子公司注销当年（2026年），我拟将子公司1-5月的利润表纳入合并范围，但不合并资产负债表期末数。此时合并报表层面未分配利润的勾稽关系（期初未分配利润+本期归母净利润=期末未分配利润）是否会因“只并利润表不并资产负债表”而被打破？若打破，是否属于合理情形？\n2）关于购买日评估增值及合并抵销分录：\n\n子公司注销后，合并层面原有的购买日评估增值分录（借：固定资产600万，贷：长投600万；借：长投300万，贷：年初未分配利润300万）是否应全部终止？是否需要在2026年合并底稿中做反向冲回处理？\n3）关于内部交易未实现损益：\n\n子公司以前年度销售给母公司及集团内其他子公司的固定资产/无形资产，其中涉及的未实现内部销售损益，在子公司注销后是否仍应延续原抵销操作（继续抵销直至该资产折旧完毕或处置）？\n4）关于资本公积的变动差异：\n\n吸收合并后，合并报表层面的资本公积与合并前比较，出现了一个差额。经分析，该差额等于“评估增值房产在合并层面已计提的累计折旧金额”（因为合并层面原值是计入资本公积，折旧冲损益；而单体转让时是按净值入资本公积，口径不一致）。请问合并层面是否应通过调整分录消除此差额？\n5）关于长期股权投资与减值准备的灭失：\n\n在吸收合并完成的合并底稿中，母公司单体层面的“长期股权投资”及对应的“长期股权投资减值准备”是否应在合并层面全额抵消冲销（即视同该项投资已不复存在）？ 查看原帖\n一、首先个别报表层面是否应就取得资产计入资本公积是有疑问的，我理解应首先冲减长期股权投资账面价值，再对差额部分按照解释7号第四条规定处理。另外，收回资产价值600万元，但对长期股权投资全额计提减值，是否恰当，建议谨慎考虑。总之建议对前期报表关注是否需进行差错更正。\n\n无论如何，母公司取得该资产后，计提减值准备应正常计入相应的成本费用项目，不应冲减资本公积。该项资本公积（如有）自吸收合并后即锁定。\n\n原先计提的长投减值准备（如有）在子公司注销后应作为已发生损失申报税前扣除和财务核销。\n\n二、合并报表层面，该事项本身不应影响合并报表层面的资产、负债和权益。如涉及所得税影响的，其影响金额计入合并报表层面的所得税费用。该事项在合并报表层面不属于权益性交易。 https://bbs.esnai.cn/thread-5497569-1-1.html"}, {"tid": "5497567", "title": "【请教陈版主】关于项目公司承担上级管理费的处理", "category": "最近更新", "questionAuthor": "wx_6142e9577699", "questionTime": "2026-06-23T12:00:39.000Z", "replyTime": "2026-06-28T12:36:00.000Z", "replySortTime": "2026-06-28T12:36:00.000Z", "url": "https://bbs.esnai.cn/thread-5497567-1-1.html", "question": "请教版主：F集团公司，投资了A、B项目，并成立A、B项目公司（均为100%控股），且均为在建项目，E为F集团公司母公司。A、B项目公司除项目建设管理业务外，其他财务等业务均有F集团公司人员参与。发生以下业务：（一）2023年A项目公司计提1000万F集团公司管理费，计入在建工程；\n\n（二）2023年B项目公司计提500万E公司管理费，计入在建工程。\n\n1. 请教版主，上述核算方式是否恰当？\n\n2. 业务（一）未能获取F集团向A项目公司提供服务内容明细，及对应服务合同、支付凭据、发票，且收费合理性从目前获取到的资料也难以确认；业务（二）对应服务合同、支付凭据、发票完整，但实质上E公司直接给项目公司提供的服务也无法确认。", "reply": "查看原帖\n根据F集团公司人员实际为A、B项目公司提供服务的情况，A、B计提一定的管理费（服务报酬）是合理的，但明显超出合理服务报酬的管理费，或者在未接受服务情况下计提的管理费则是不合理的。如果一定要支付，则这部分不合理的管理费只能冲减权益处理。", "searchText": "5497567 【请教陈版主】关于项目公司承担上级管理费的处理 最近更新 wx_6142e9577699 2026-06-23t12:00:39.000z 2026-06-28t12:36:00.000z 请教版主：f集团公司，投资了a、b项目，并成立a、b项目公司（均为100%控股），且均为在建项目，e为f集团公司母公司。a、b项目公司除项目建设管理业务外，其他财务等业务均有f集团公司人员参与。发生以下业务：（一）2023年a项目公司计提1000万f集团公司管理费，计入在建工程；\n\n（二）2023年b项目公司计提500万e公司管理费，计入在建工程。\n\n1. 请教版主，上述核算方式是否恰当？\n\n2. 业务（一）未能获取f集团向a项目公司提供服务内容明细，及对应服务合同、支付凭据、发票，且收费合理性从目前获取到的资料也难以确认；业务（二）对应服务合同、支付凭据、发票完整，但实质上e公司直接给项目公司提供的服务也无法确认。 查看原帖\n根据f集团公司人员实际为a、b项目公司提供服务的情况，a、b计提一定的管理费（服务报酬）是合理的，但明显超出合理服务报酬的管理费，或者在未接受服务情况下计提的管理费则是不合理的。如果一定要支付，则这部分不合理的管理费只能冲减权益处理。 https://bbs.esnai.cn/thread-5497567-1-1.html"}, {"tid": "5497566", "title": "收购少数股权或有对价处理", "category": "最近更新", "questionAuthor": "rickymost", "questionTime": "2026-06-23T12:00:38.000Z", "replyTime": "2026-06-28T12:32:00.000Z", "replySortTime": "2026-06-28T12:32:00.000Z", "url": "https://bbs.esnai.cn/thread-5497566-1-1.html", "question": "陈老师您好：\n\n      甲公司是市属国有企业A集团的二级子公司，甲公司持有乙公司82%股份，其他18%股份为集团外个人股东持有。现甲公司拟收购乙公司个人股东持有的18%的股权，要求乙公司对长期挂账的应收款应全部100%计提坏账，并根据计提坏账后的净值考虑收购价，并约定，如后续收回该部分已全额计提坏账的应收款，按约定支付少数股东相关款项。请问：这块是否是或有对价，甲乙公司要怎么进行账务处理？\n\n1、甲公司账务处理：\n\n（1）借：长期股权投资——乙公司             贷：银行存款            根据净资产先支付的款项        预计负债        未来需要支付的收回款项乘以18%\n\n如果原按100%计提坏账，预计负债的公允价值是0吗？还是说这是两个不同的判断标准呢？此时如何预估预计负债价值呢？\n\n预计负债是否年底都要重新根据估计计量？变动计入公允价值变动损益？\n\n（2）将初始投资成本与“按新增持股比例计算应享有乙公司自购买日（或合并日）开始持续计算的净资产份额”进行比较\n\n借：资本公积——资本溢价（差额）    （若成本＞份额）    贷：长期股权投资——乙公司（差额）\n\n（3）实际支付额 = 预估公允价值\n\n借：预计负债        贷：银行存款\n\n（4）  际支付额 > 预估公允价值 \n\n 支付补付款：借：预计负债        资本公积        差额    贷：银行存款         实际支付额（5）  实际支付额  预估公允价值 \n\n 支付补付款：借：预计负债         贷：银行存款         实际支付额\n\n    资本公积    差额    \n\n2、乙公司账务处理：\n\n（1）按甲公司要求，乙公司对长期挂账的应收款全额计提坏账准备：\n\n借：信用减值损失                       贷：坏账准备   \n\n（2）后续收回应收款\n\n冲回坏账准备：借：坏账准备                           贷：信用减值损失  确认银行存款收回：借：银行存款                           贷：应收账款   \n\n陈老师，请问上述问题及账务处理是否正确，是否适用《企业会计准则第20号——企业合并》中关于或有对价“12个月内调成本、12个月后进损益”的规则？谢谢。", "reply": "查看原帖\n该种情形类似于解释19号中的补偿性资产。假设该笔应收款项的实际可收回金额是20%，原始金额100万元，协议约定后续实际收回的金额均归少数股东，则实质上相当于将该笔应收款项从子公司剥离。\n\n此类情况的基本处理原则：\n\n1、相关应收款项不终止确认，按照常规方法测算可收回金额和计提坏账准备（不能直接引用收购协议约定对其100%计提坏账准备）。\n\n2、另一方面，根据应收账款的坏账测算结果和补充协议约定，估算应支付给少数股东的收回款项，将其确认为负债，纳入少数股权收购对价的计算中。\n\n3、上述2中的少数股权收购对价与交易日少数股权账面价值之间的差额，按权益性交易原则调整资本公积。\n\n4、后续，应定期对该应收款项的坏账准备进行复核调整，每次调整坏账准备时对应调整上述2中的负债余额，该项负债的金额变动应计入损益，不再调整资本公积。", "searchText": "5497566 收购少数股权或有对价处理 最近更新 rickymost 2026-06-23t12:00:38.000z 2026-06-28t12:32:00.000z 陈老师您好：\n\n      甲公司是市属国有企业a集团的二级子公司，甲公司持有乙公司82%股份，其他18%股份为集团外个人股东持有。现甲公司拟收购乙公司个人股东持有的18%的股权，要求乙公司对长期挂账的应收款应全部100%计提坏账，并根据计提坏账后的净值考虑收购价，并约定，如后续收回该部分已全额计提坏账的应收款，按约定支付少数股东相关款项。请问：这块是否是或有对价，甲乙公司要怎么进行账务处理？\n\n1、甲公司账务处理：\n\n（1）借：长期股权投资——乙公司             贷：银行存款            根据净资产先支付的款项        预计负债        未来需要支付的收回款项乘以18%\n\n如果原按100%计提坏账，预计负债的公允价值是0吗？还是说这是两个不同的判断标准呢？此时如何预估预计负债价值呢？\n\n预计负债是否年底都要重新根据估计计量？变动计入公允价值变动损益？\n\n（2）将初始投资成本与“按新增持股比例计算应享有乙公司自购买日（或合并日）开始持续计算的净资产份额”进行比较\n\n借：资本公积——资本溢价（差额）    （若成本＞份额）    贷：长期股权投资——乙公司（差额）\n\n（3）实际支付额 = 预估公允价值\n\n借：预计负债        贷：银行存款\n\n（4）  际支付额 > 预估公允价值 \n\n 支付补付款：借：预计负债        资本公积        差额    贷：银行存款         实际支付额（5）  实际支付额  预估公允价值 \n\n 支付补付款：借：预计负债         贷：银行存款         实际支付额\n\n    资本公积    差额    \n\n2、乙公司账务处理：\n\n（1）按甲公司要求，乙公司对长期挂账的应收款全额计提坏账准备：\n\n借：信用减值损失                       贷：坏账准备   \n\n（2）后续收回应收款\n\n冲回坏账准备：借：坏账准备                           贷：信用减值损失  确认银行存款收回：借：银行存款                           贷：应收账款   \n\n陈老师，请问上述问题及账务处理是否正确，是否适用《企业会计准则第20号——企业合并》中关于或有对价“12个月内调成本、12个月后进损益”的规则？谢谢。 查看原帖\n该种情形类似于解释19号中的补偿性资产。假设该笔应收款项的实际可收回金额是20%，原始金额100万元，协议约定后续实际收回的金额均归少数股东，则实质上相当于将该笔应收款项从子公司剥离。\n\n此类情况的基本处理原则：\n\n1、相关应收款项不终止确认，按照常规方法测算可收回金额和计提坏账准备（不能直接引用收购协议约定对其100%计提坏账准备）。\n\n2、另一方面，根据应收账款的坏账测算结果和补充协议约定，估算应支付给少数股东的收回款项，将其确认为负债，纳入少数股权收购对价的计算中。\n\n3、上述2中的少数股权收购对价与交易日少数股权账面价值之间的差额，按权益性交易原则调整资本公积。\n\n4、后续，应定期对该应收款项的坏账准备进行复核调整，每次调整坏账准备时对应调整上述2中的负债余额，该项负债的金额变动应计入损益，不再调整资本公积。 https://bbs.esnai.cn/thread-5497566-1-1.html"}, {"tid": "5497564", "title": "固定资产一次性折旧", "category": "最近更新", "questionAuthor": "DavidDe", "questionTime": "2026-06-23T12:00:39.000Z", "replyTime": "2026-06-28T11:37:00.000Z", "replySortTime": "2026-06-28T11:37:00.000Z", "url": "https://bbs.esnai.cn/thread-5497564-1-1.html", "question": "陈版主，请教下这个问题。企业组装了一套用于研发实验的固定资产装置，明确仅用于A研发项目，无法用作他途，A研发项目预计一年半可以完成，用完后该固定资产装置只能用于变卖废铁。这种情况下，固定资产就按1年半的周期来折旧是否可以？按照企业会计准则第4号，企业应当根据与固定资产有关的经济利益的预期实现方式合理选择固定资产折旧方法。该固定资产装置的“经济利益的预期实现方式”就是在这一年半中使用得以实现，我们理解就是一种“工作量法”。如果强行按照几年去折旧，我们认为会扭曲实际的折旧情况。税法上规定了各项固定资产最低折旧年限，但是会计上并没有这个说法，固定资产的定义要求“使用寿命超过一个会计年度”即可。\n\n《企业会计准则第4号——固定资产》第十七条 企业应当根据与固定资产有关的经济利益的预期实现方式，合理选择固定资产折旧方法。可选用的折旧方法包括年限平均法、工作量法、双倍余额递减法和年数总和法等。固定资产的折旧方法一经确定，不得随意变更。但是，符合本准则第十九条规定的除外。第十八条 固定资产应当按月计提折旧，并根据用途计入相关资产的成本或者当期损益。", "reply": "查看原帖\n在主帖所述情况下，该试验装置不应单独确认为固定资产，而是将其成本直接计入对应项目的研发支出，根据该支出发生时对应的研发项目是否已进入资本化阶段，确定如何进行会计处理，即：在搭建该试验装置时，如对应的研发项目尚未进入资本化阶段，则该装置的搭建支出直接计入研发费用；如对应的研发项目已进入资本化阶段，则该装置的搭建支出计入“开发支出——资本化支出”。\n\n总之，不是采用计提折旧的方式将该装置的成本分期计入研发支出。", "searchText": "5497564 固定资产一次性折旧 最近更新 davidde 2026-06-23t12:00:39.000z 2026-06-28t11:37:00.000z 陈版主，请教下这个问题。企业组装了一套用于研发实验的固定资产装置，明确仅用于a研发项目，无法用作他途，a研发项目预计一年半可以完成，用完后该固定资产装置只能用于变卖废铁。这种情况下，固定资产就按1年半的周期来折旧是否可以？按照企业会计准则第4号，企业应当根据与固定资产有关的经济利益的预期实现方式合理选择固定资产折旧方法。该固定资产装置的“经济利益的预期实现方式”就是在这一年半中使用得以实现，我们理解就是一种“工作量法”。如果强行按照几年去折旧，我们认为会扭曲实际的折旧情况。税法上规定了各项固定资产最低折旧年限，但是会计上并没有这个说法，固定资产的定义要求“使用寿命超过一个会计年度”即可。\n\n《企业会计准则第4号——固定资产》第十七条 企业应当根据与固定资产有关的经济利益的预期实现方式，合理选择固定资产折旧方法。可选用的折旧方法包括年限平均法、工作量法、双倍余额递减法和年数总和法等。固定资产的折旧方法一经确定，不得随意变更。但是，符合本准则第十九条规定的除外。第十八条 固定资产应当按月计提折旧，并根据用途计入相关资产的成本或者当期损益。 查看原帖\n在主帖所述情况下，该试验装置不应单独确认为固定资产，而是将其成本直接计入对应项目的研发支出，根据该支出发生时对应的研发项目是否已进入资本化阶段，确定如何进行会计处理，即：在搭建该试验装置时，如对应的研发项目尚未进入资本化阶段，则该装置的搭建支出直接计入研发费用；如对应的研发项目已进入资本化阶段，则该装置的搭建支出计入“开发支出——资本化支出”。\n\n总之，不是采用计提折旧的方式将该装置的成本分期计入研发支出。 https://bbs.esnai.cn/thread-5497564-1-1.html"}, {"tid": "5497560", "title": "关于经销模式下收入确认的问题", "category": "最近更新", "questionAuthor": "everest2017", "questionTime": "2026-06-22T20:59:12.000Z", "replyTime": "2026-06-28T11:33:00.000Z", "replySortTime": "2026-06-28T11:33:00.000Z", "url": "https://bbs.esnai.cn/thread-5497560-1-1.html", "question": "业务背景：X公司主要从事无人驾驶车辆的研发与销售，在经销模式下，X公司与经销商的主要约定如下：①经销商自行开拓客户，为避免不同区域经销商出现客户重叠情形，经销商需要向X公司报备客户信息；②经销商按年度或季度任务指标自X公司采购一定数量的无人驾驶车辆，经销商在提车前需全额支付货款，且非车辆本身质量问题不允许退货；③X公司不设置价格限制，经销商自行与客户协商确定产品销售价格，拥有完全的自主定价权；④经销商向最终客户交付的车辆须由X公司提供地图部署、道路测试等服务；⑤X公司按照经销商完成的任务额给予一定金额的返利。\n\n基于上述业务背景，请教陈版及各位老师以下各项判断是否合理，谢谢老师！\n\n（1）关于经销商的主要责任人和代理人的判断。经销商提车后非因质量问题不允许退货，承担了与车辆相关的存货风险，且拥有自主定价权，应将经销商认定为主要责任人。\n\n（2）关于X公司收入确认时点。基于无人驾驶技术的行业特殊性，如未完成地图部署、道路测试等落地服务，仅提供车辆对客户不具有实际使用价值，且相关部署服务仅能由X公司提供，车辆交付与落地部署服务具有高度关联性，应合并确认为一项履约义务，并于车辆完成向最终客户的落地部署服务后确认收入。\n\n（3）关于返利的处理。在经销商满足主要责任人认定的情况下，X公司向经销商支付的返利应作为可变对价冲减收入。", "reply": "查看原帖\n1、如果经销商是在与意向客户达成协议后才向X公司采购的，则经销商是代理人。另外，由于经销商向最终客户交付的车辆须由X公司提供地图部署、道路测试等服务，而如主帖所述，基于无人驾驶技术的行业特殊性，如未完成地图部署、道路测试等落地服务，仅提供车辆对客户不具有实际使用价值，且相关部署服务仅能由X公司提供，车辆交付与落地部署服务具有高度关联性，应合并确认为一项履约义务，更佐证了在该项履约义务中，X公司是主要责任人，经销商不具备向客户独立交付可用车辆的能力。\n\n2、赞同整体构成单项履约义务。但如前所述，在车辆完成向最终客户的落地部署服务后确认收入时，X公司应按总额法确认收入，归属于经销商的收益（含X公司向经销商支付的返利）应确认为销售费用。", "searchText": "5497560 关于经销模式下收入确认的问题 最近更新 everest2017 2026-06-22t20:59:12.000z 2026-06-28t11:33:00.000z 业务背景：x公司主要从事无人驾驶车辆的研发与销售，在经销模式下，x公司与经销商的主要约定如下：①经销商自行开拓客户，为避免不同区域经销商出现客户重叠情形，经销商需要向x公司报备客户信息；②经销商按年度或季度任务指标自x公司采购一定数量的无人驾驶车辆，经销商在提车前需全额支付货款，且非车辆本身质量问题不允许退货；③x公司不设置价格限制，经销商自行与客户协商确定产品销售价格，拥有完全的自主定价权；④经销商向最终客户交付的车辆须由x公司提供地图部署、道路测试等服务；⑤x公司按照经销商完成的任务额给予一定金额的返利。\n\n基于上述业务背景，请教陈版及各位老师以下各项判断是否合理，谢谢老师！\n\n（1）关于经销商的主要责任人和代理人的判断。经销商提车后非因质量问题不允许退货，承担了与车辆相关的存货风险，且拥有自主定价权，应将经销商认定为主要责任人。\n\n（2）关于x公司收入确认时点。基于无人驾驶技术的行业特殊性，如未完成地图部署、道路测试等落地服务，仅提供车辆对客户不具有实际使用价值，且相关部署服务仅能由x公司提供，车辆交付与落地部署服务具有高度关联性，应合并确认为一项履约义务，并于车辆完成向最终客户的落地部署服务后确认收入。\n\n（3）关于返利的处理。在经销商满足主要责任人认定的情况下，x公司向经销商支付的返利应作为可变对价冲减收入。 查看原帖\n1、如果经销商是在与意向客户达成协议后才向x公司采购的，则经销商是代理人。另外，由于经销商向最终客户交付的车辆须由x公司提供地图部署、道路测试等服务，而如主帖所述，基于无人驾驶技术的行业特殊性，如未完成地图部署、道路测试等落地服务，仅提供车辆对客户不具有实际使用价值，且相关部署服务仅能由x公司提供，车辆交付与落地部署服务具有高度关联性，应合并确认为一项履约义务，更佐证了在该项履约义务中，x公司是主要责任人，经销商不具备向客户独立交付可用车辆的能力。\n\n2、赞同整体构成单项履约义务。但如前所述，在车辆完成向最终客户的落地部署服务后确认收入时，x公司应按总额法确认收入，归属于经销商的收益（含x公司向经销商支付的返利）应确认为销售费用。 https://bbs.esnai.cn/thread-5497560-1-1.html"}, {"tid": "5497553", "title": "请教陈版及各位老师，关于资产折旧年限的问题", "category": "最近更新", "questionAuthor": "everest2017", "questionTime": "2026-06-22T18:23:46.000Z", "replyTime": "2026-06-28T11:23:00.000Z", "replySortTime": "2026-06-28T11:23:00.000Z", "url": "https://bbs.esnai.cn/thread-5497553-1-1.html", "question": "业务背景：甲公司主要从事车辆销售业务，销售合同通常约定5年质保期；同时，甲公司亦对外提供与销售车辆同款车型的车辆租赁业务（假设均属于经营租赁），账面将该部分出租车辆确认为固定资产，并按照4年期限计提折旧。\n\n请教陈版及各位老师，对于该案例，甲公司提供5年质保，是否可以判断甲公司对该车型预计可使用年限为5年，应按照5年期限计提折旧？谢谢各位老师！", "reply": "查看原帖\n1、要考虑出售车辆和出租车辆的使用模式有无重大差异，例如出租车辆的使用强度是否大于被购入后用于车主自用的车辆。\n\n2、考虑5年质保是否符合汽车销售行业的惯例。\n\n3、从历史数据来看，4年的折旧期是否合理；是否有较多的已出售5年以上的车仍提供质保服务的案例等。", "searchText": "5497553 请教陈版及各位老师，关于资产折旧年限的问题 最近更新 everest2017 2026-06-22t18:23:46.000z 2026-06-28t11:23:00.000z 业务背景：甲公司主要从事车辆销售业务，销售合同通常约定5年质保期；同时，甲公司亦对外提供与销售车辆同款车型的车辆租赁业务（假设均属于经营租赁），账面将该部分出租车辆确认为固定资产，并按照4年期限计提折旧。\n\n请教陈版及各位老师，对于该案例，甲公司提供5年质保，是否可以判断甲公司对该车型预计可使用年限为5年，应按照5年期限计提折旧？谢谢各位老师！ 查看原帖\n1、要考虑出售车辆和出租车辆的使用模式有无重大差异，例如出租车辆的使用强度是否大于被购入后用于车主自用的车辆。\n\n2、考虑5年质保是否符合汽车销售行业的惯例。\n\n3、从历史数据来看，4年的折旧期是否合理；是否有较多的已出售5年以上的车仍提供质保服务的案例等。 https://bbs.esnai.cn/thread-5497553-1-1.html"}, {"tid": "5488492", "title": "控股股东授予少数股东看跌期权", "category": "最近更新", "questionAuthor": "6j09宇", "questionTime": "2024-08-14T16:21:15.000Z", "replyTime": "2026-06-22T22:00:55.000Z", "replySortTime": "2026-06-22T22:00:55.000Z", "url": "https://bbs.esnai.cn/thread-5488492-1-1.html", "question": "请教陈版主\n\n“非同一控制下企业合并中，如果购买方存在对少数股东的远期收购义务，在合并财务报表中，企业承担了一项不能无条件避免的支付现金以回购自身权益工具的合同义务，在合并日应将该回购义务确认为一项金融负债，金额为回购义务所需支付金额的现值。企业应根据合同条款的具体约定，判断少数股东权益是否实质上仍存在并进行相应会计处理。如果相关事实表明少数股东实质上仍享有普通股相关权利和义务，则在合并财务报表中应继续确认少数股东权益，企业确认上述金融负债的同时应冲减资本公积（资本公积不足冲减的，冲减留存收益）。”\n\n对于该回购义务为什么不按照公允价值（行权价格与将来行权日该股票市场价格之间的差额）计量且其变动计入当期损益，而是按照回购所需支付金额计量且计入资本公积。\n\n---\n\n请教陈版，控股股东授予子公司的少数股东看跌期权，看跌期权的行权条件比较苛刻（1、控股股东破产；2、子公司破产；3、子公司连续两年亏损），而且期权期限50年，以触发行权时子公司的净资产为对价，评估无法预估未来回购金额跟什么时候会触发这种回购义务，这种情况下，公司的合并层还需要确认金融负债吗？\n\n目前审计师认为50年无法做合理评估，建议公司假设即时可行权，用现在的子公司的净资产乘以少数股东的比例作为金融负债金额， 但是这个观点有点奇怪，行权的条件比较苛刻，现在这个时点并没有达到行权条件，近两年内也不可能达到行权条件，那用现在的净资产*持股比例作为负债的金额，可行吗？\n\n谢谢！", "reply": "这里主要原因是：根据《企业会计准则第37号——金融工具列报（2017年修订）》第十一条规定：“除根据本准则第三章分类为权益工具的金融工具外，如果一项合同使发行方承担了以现金或其他金融资产回购自身权益工具的义务，即使发行方的回购义务取决于合同对手方是否行使回售权，发行方应当在初始确认时将该义务确认为一项金融负债，其金额等于回购所需支付金额的现值（如远期回购价格的现值、期权行权价格的现值或其他回售金额的现值）。如果最终发行方无需以现金或其他金融资产回购自身权益工具，应当在合同到期时将该项金融负债按照账面价值重分类为权益工具。”\n\n在购买方的个别报表中，由于收购标的（子公司少数股权）并非自身权益工具，所以确实如主帖所言，确认一项以公允价值计量且其变动计入损益的金融负债（衍生金融负债）即可。\n\n但在购买方的合并报表层面，因为子公司的少数股权也是合并主体的自身权益工具，所以需要按照上述规定，确认一项与回购自身权益工具的合同义务相关的金融负债，金额为需支付的回购金额的折现值（相当于本金+截至本资产负债表日的累计利息）。\n\n---\n\n仍需确认金融负债。“子公司连续两年亏损”是正常经营风险的体现，并非保护性条款。", "searchText": "5488492 控股股东授予少数股东看跌期权 最近更新 6j09宇 2024-08-14t16:21:15.000z 2026-06-22t22:00:55.000z 请教陈版主\n\n“非同一控制下企业合并中，如果购买方存在对少数股东的远期收购义务，在合并财务报表中，企业承担了一项不能无条件避免的支付现金以回购自身权益工具的合同义务，在合并日应将该回购义务确认为一项金融负债，金额为回购义务所需支付金额的现值。企业应根据合同条款的具体约定，判断少数股东权益是否实质上仍存在并进行相应会计处理。如果相关事实表明少数股东实质上仍享有普通股相关权利和义务，则在合并财务报表中应继续确认少数股东权益，企业确认上述金融负债的同时应冲减资本公积（资本公积不足冲减的，冲减留存收益）。”\n\n对于该回购义务为什么不按照公允价值（行权价格与将来行权日该股票市场价格之间的差额）计量且其变动计入当期损益，而是按照回购所需支付金额计量且计入资本公积。\n\n---\n\n请教陈版，控股股东授予子公司的少数股东看跌期权，看跌期权的行权条件比较苛刻（1、控股股东破产；2、子公司破产；3、子公司连续两年亏损），而且期权期限50年，以触发行权时子公司的净资产为对价，评估无法预估未来回购金额跟什么时候会触发这种回购义务，这种情况下，公司的合并层还需要确认金融负债吗？\n\n目前审计师认为50年无法做合理评估，建议公司假设即时可行权，用现在的子公司的净资产乘以少数股东的比例作为金融负债金额， 但是这个观点有点奇怪，行权的条件比较苛刻，现在这个时点并没有达到行权条件，近两年内也不可能达到行权条件，那用现在的净资产*持股比例作为负债的金额，可行吗？\n\n谢谢！ 这里主要原因是：根据《企业会计准则第37号——金融工具列报（2017年修订）》第十一条规定：“除根据本准则第三章分类为权益工具的金融工具外，如果一项合同使发行方承担了以现金或其他金融资产回购自身权益工具的义务，即使发行方的回购义务取决于合同对手方是否行使回售权，发行方应当在初始确认时将该义务确认为一项金融负债，其金额等于回购所需支付金额的现值（如远期回购价格的现值、期权行权价格的现值或其他回售金额的现值）。如果最终发行方无需以现金或其他金融资产回购自身权益工具，应当在合同到期时将该项金融负债按照账面价值重分类为权益工具。”\n\n在购买方的个别报表中，由于收购标的（子公司少数股权）并非自身权益工具，所以确实如主帖所言，确认一项以公允价值计量且其变动计入损益的金融负债（衍生金融负债）即可。\n\n但在购买方的合并报表层面，因为子公司的少数股权也是合并主体的自身权益工具，所以需要按照上述规定，确认一项与回购自身权益工具的合同义务相关的金融负债，金额为需支付的回购金额的折现值（相当于本金+截至本资产负债表日的累计利息）。\n\n---\n\n仍需确认金融负债。“子公司连续两年亏损”是正常经营风险的体现，并非保护性条款。 https://bbs.esnai.cn/thread-5488492-1-1.html"}, {"tid": "5497524", "title": "[求助] 求助陈老师，关于带短期租约飞机资产的科目划分", "category": "最近更新", "questionAuthor": "ionaccount", "questionTime": "2026-06-18T10:00:35.000Z", "replyTime": "2026-06-22T21:49:00.000Z", "replySortTime": "2026-06-22T21:49:00.000Z", "url": "https://bbs.esnai.cn/thread-5497524-1-1.html", "question": "陈老师好！想请教陈老师问题如下：现有A公司从事航材销售、航空运输设备销售、飞机租赁业务，A公司从B公司（飞机租赁公司）购入一架带租约的飞机，剩余租赁期2年8个月，合同约定，飞机交付后的租金由承租方向A公司支付，A公司董事会决议确认购入的飞机租赁到期后，进行拆解作为航空材料销售。A公司的会计处理：将未来租金折现后账列长期应收款，合同购置价减去租金折现现值后账列存货。向您请教：A公司的会计处理是否符合企业会计准则的相关规定？", "reply": "主帖所述A公司的会计处理基本合理。由于剩余租赁期基本等于该飞机的剩余可使用年限，故属于融资租赁。", "searchText": "5497524 [求助] 求助陈老师，关于带短期租约飞机资产的科目划分 最近更新 ionaccount 2026-06-18t10:00:35.000z 2026-06-22t21:49:00.000z 陈老师好！想请教陈老师问题如下：现有a公司从事航材销售、航空运输设备销售、飞机租赁业务，a公司从b公司（飞机租赁公司）购入一架带租约的飞机，剩余租赁期2年8个月，合同约定，飞机交付后的租金由承租方向a公司支付，a公司董事会决议确认购入的飞机租赁到期后，进行拆解作为航空材料销售。a公司的会计处理：将未来租金折现后账列长期应收款，合同购置价减去租金折现现值后账列存货。向您请教：a公司的会计处理是否符合企业会计准则的相关规定？ 主帖所述a公司的会计处理基本合理。由于剩余租赁期基本等于该飞机的剩余可使用年限，故属于融资租赁。 https://bbs.esnai.cn/thread-5497524-1-1.html"}, {"tid": "5497527", "title": "求助陈版主，租赁变更问题", "category": "最近更新", "questionAuthor": "18243187003", "questionTime": "2026-06-19T10:00:35.000Z", "replyTime": "2026-06-22T21:47:00.000Z", "replySortTime": "2026-06-22T21:47:00.000Z", "url": "https://bbs.esnai.cn/thread-5497527-1-1.html", "question": "A公司与C公司签订房屋租赁合同，租期2024年1月1日至2027年12月31日，A公司账面确认使用权资产及租赁负债，2026年3月A公司与C公司重新签订合同，自4月起只租赁原来面积的一半，另一半由A公司安排其全资子公司B公司继续承租，其他条件不变，后续由A公司向C公司支付原租金的一半，B公司向C支付原租金的一半，B公司单独与C公司签订了租赁合同，A公司单体层面、B公司及A公司合并层面在变更当年应该如何进行处理，以后年度应该如何进行处理？", "reply": "1、A公司个别报表层面：对于转由其全资子公司B承租和缴纳租金的部分，自2026年4月起终止确认原使用权资产额租赁负债，差额确认资产处置损益。\n\n2、B公司个别报表层面按照一项新租赁进行会计处理。\n\n3、A、B的合并报表层面，由于与C之间的租赁关系实质上未发生变化，故应视同原租赁延续，抵销A、B各自个别报表层面租赁变更和确认新租赁的差异影响。", "searchText": "5497527 求助陈版主，租赁变更问题 最近更新 18243187003 2026-06-19t10:00:35.000z 2026-06-22t21:47:00.000z a公司与c公司签订房屋租赁合同，租期2024年1月1日至2027年12月31日，a公司账面确认使用权资产及租赁负债，2026年3月a公司与c公司重新签订合同，自4月起只租赁原来面积的一半，另一半由a公司安排其全资子公司b公司继续承租，其他条件不变，后续由a公司向c公司支付原租金的一半，b公司向c支付原租金的一半，b公司单独与c公司签订了租赁合同，a公司单体层面、b公司及a公司合并层面在变更当年应该如何进行处理，以后年度应该如何进行处理？ 1、a公司个别报表层面：对于转由其全资子公司b承租和缴纳租金的部分，自2026年4月起终止确认原使用权资产额租赁负债，差额确认资产处置损益。\n\n2、b公司个别报表层面按照一项新租赁进行会计处理。\n\n3、a、b的合并报表层面，由于与c之间的租赁关系实质上未发生变化，故应视同原租赁延续，抵销a、b各自个别报表层面租赁变更和确认新租赁的差异影响。 https://bbs.esnai.cn/thread-5497527-1-1.html"}, {"tid": "5497535", "title": "急急急，请教陈版主关于合同内不同履约义务收入的确认", "category": "最近更新", "questionAuthor": "haijian9468", "questionTime": "2026-06-20T10:00:35.000Z", "replyTime": "2026-06-22T21:43:00.000Z", "replySortTime": "2026-06-22T21:43:00.000Z", "url": "https://bbs.esnai.cn/thread-5497535-1-1.html", "question": "一、合同基本情况\n\n合同总额：3,066.67万元（固定总价合同）\n\n履约义务：① 设备供货（时点义务）；② 3年运维服务（时段义务）\n\n合同报价特征：不平衡报价——设备报价虚高（报价2,312.67万元，实际单独售价约1,840万元，毛利率约40%），辅料报价偏低（报价754万元，实际毛利率仅约8%）\n\n已处理部分：设备已验收，按单独售价确认收入1,840万元\n\n剩余未确认部分：1,226.67万元，对应3年运维义务，细分为：\n\n合同报价中的固定部分472万元（客户必须支付，不会再审减）\n\n辅料结算部分754万元（按实际耗用结算，可能因实际耗用少于合同约定而审减）\n\n二、请教陈版主\n\n剩余未确认的1226万元的运营3年的收入，应该如何确认收入？@chenyiwei", "reply": "1、对于辅料结算部分，因系按实际耗用结算，可能因实际耗用少于合同约定而审减，故对其金额应按可变对价原则予以合理、谨慎的估计，例如考虑根据该设备和客户运营业务特点，所需耗用的最低量和对应的最低价款金额。辅料销售收入在交付辅料给客户时（也可能是实际耗用时）确认收入。\n\n2、运营服务收入属于时段法确认的收入，在合理确定其总额的基础上，在合同预定的运营期内分摊确认。\n\n对于合同约定的设备价格的虚高部分，也涉及如何在上述两部分之间分摊调整的问题。在针对两部分的分摊金额确定后，同样纳入各自收入金额的估计，按照上述原则在交付（或耗用）辅料时以及提供运维服务期间确认收入。", "searchText": "5497535 急急急，请教陈版主关于合同内不同履约义务收入的确认 最近更新 haijian9468 2026-06-20t10:00:35.000z 2026-06-22t21:43:00.000z 一、合同基本情况\n\n合同总额：3,066.67万元（固定总价合同）\n\n履约义务：① 设备供货（时点义务）；② 3年运维服务（时段义务）\n\n合同报价特征：不平衡报价——设备报价虚高（报价2,312.67万元，实际单独售价约1,840万元，毛利率约40%），辅料报价偏低（报价754万元，实际毛利率仅约8%）\n\n已处理部分：设备已验收，按单独售价确认收入1,840万元\n\n剩余未确认部分：1,226.67万元，对应3年运维义务，细分为：\n\n合同报价中的固定部分472万元（客户必须支付，不会再审减）\n\n辅料结算部分754万元（按实际耗用结算，可能因实际耗用少于合同约定而审减）\n\n二、请教陈版主\n\n剩余未确认的1226万元的运营3年的收入，应该如何确认收入？@chenyiwei 1、对于辅料结算部分，因系按实际耗用结算，可能因实际耗用少于合同约定而审减，故对其金额应按可变对价原则予以合理、谨慎的估计，例如考虑根据该设备和客户运营业务特点，所需耗用的最低量和对应的最低价款金额。辅料销售收入在交付辅料给客户时（也可能是实际耗用时）确认收入。\n\n2、运营服务收入属于时段法确认的收入，在合理确定其总额的基础上，在合同预定的运营期内分摊确认。\n\n对于合同约定的设备价格的虚高部分，也涉及如何在上述两部分之间分摊调整的问题。在针对两部分的分摊金额确定后，同样纳入各自收入金额的估计，按照上述原则在交付（或耗用）辅料时以及提供运维服务期间确认收入。 https://bbs.esnai.cn/thread-5497535-1-1.html"}, {"tid": "5497408", "title": "现金投资出资，设立子公司的初始直接费用处理", "category": "最近更新", "questionAuthor": "XXXX123789", "questionTime": "2026-06-09T02:22:07.000Z", "replyTime": "2026-06-20T14:18:00.000Z", "replySortTime": "2026-06-20T14:18:00.000Z", "url": "https://bbs.esnai.cn/thread-5497408-1-1.html", "question": "A公司和B公司共同设立公司C公司，A公司现金出资，B公司以土地出资，A公司控制C公司。A公司为取得对C公司的长期股权投资发生的直接相关费用（如财务尽调、法律尽调，可研费用等），个别报表是计入长期股权投资投资成本，合并报表调整至管理费用吗？\n\n---\n\n那如果是属于与股权投资直接相关的费用，比如股权登记及过户费用，协议拟定的法律、财务顾问费，是否在个别报表层面可以计入长投投资成本呢？在合并层面再调整为管理费用？", "reply": "财务尽调、法律尽调，可研费用等支出，其目的都是研究的可行性，即在此类支出发生时，是否将进行该项投资并不确定。因此不属于与取得股权投资直接相关的增量费用。相应地，这些支出在A公司的个别报表和合并报表层面都应当计入管理费用处理。\n\n---\n\n个别报表层面也是直接计入损益。", "searchText": "5497408 现金投资出资，设立子公司的初始直接费用处理 最近更新 xxxx123789 2026-06-09t02:22:07.000z 2026-06-20t14:18:00.000z a公司和b公司共同设立公司c公司，a公司现金出资，b公司以土地出资，a公司控制c公司。a公司为取得对c公司的长期股权投资发生的直接相关费用（如财务尽调、法律尽调，可研费用等），个别报表是计入长期股权投资投资成本，合并报表调整至管理费用吗？\n\n---\n\n那如果是属于与股权投资直接相关的费用，比如股权登记及过户费用，协议拟定的法律、财务顾问费，是否在个别报表层面可以计入长投投资成本呢？在合并层面再调整为管理费用？ 财务尽调、法律尽调，可研费用等支出，其目的都是研究的可行性，即在此类支出发生时，是否将进行该项投资并不确定。因此不属于与取得股权投资直接相关的增量费用。相应地，这些支出在a公司的个别报表和合并报表层面都应当计入管理费用处理。\n\n---\n\n个别报表层面也是直接计入损益。 https://bbs.esnai.cn/thread-5497408-1-1.html"}, {"tid": "5497447", "title": "【请教陈版主】关于经营租赁可变租赁付款额核算", "category": "最近更新", "questionAuthor": "账套Z", "questionTime": "2026-06-12T09:11:23.000Z", "replyTime": "2026-06-20T14:06:00.000Z", "replySortTime": "2026-06-20T14:06:00.000Z", "url": "https://bbs.esnai.cn/thread-5497447-1-1.html", "question": "请教版主：             出租人公司A开展户用光伏经营租赁项目，将自有电站出租与项目公司B，租期15年，按季度收租，租金=电价*发电量-其他固定费用。电站的运维方C保证年发电量满足约定的最低标准，最低发电标准基本可以达到。未来电价存在不确定性，取决于政策及市场电价综合因素。       \n\nA公司项目经理在尽调阶段，通过各类情景分析，预估了租赁期可能收到的租金，并制作租金表，作为内部审批流程的材料。与承租人签订的租赁合同不包括预估的租金。\n\n尽管A公司预估了租金表，但实际租金取决于电站实际运营情况，因此每期租金不固定。\n\n假设该租赁项目已满足经营租赁各条件。\n\n出租人A公司每月按租赁准则，将预估租金表收款额按直线法摊销，确认租金收入。季度收租时，冲回前期计提的租金收入，同时将收到的租金，作为可变租赁付款额，在实际收到时计入当期损益。\n\n      1. 请教版主，上述核算方式是否恰当？\n\n      2. 版主在2025年答复过一篇关于可变租赁付款额的求助帖（https://bbs.esnai.cn/thread-5494426-1-1.html），提到：“租金根据周边市场租金调整的约定，也属于‘取决于指数或比率的可变租赁付款额’，因为租金市场价格也可以看作一项物价指数。”对于本项目的可变租赁付款额，是否也是与指数或利率挂钩的可变租赁付款额？如是，便不能按上述做法一次性计入当期损益。请问如何确认收入比较合适？\n\n感谢版主，望指教！", "reply": "本案例中的可变租金既取决于电价，也取决于发电量，而发电量属于租赁资产自身的运营绩效指标，故不是单纯的“取决于指数或比率的可变租赁付款额”。如果没有保底租金，则本案例中承租人不应确认使用权资产和租赁负债；出租人不应人为将各期租金均衡化，应按每期的发电量和电价测算应收租金。", "searchText": "5497447 【请教陈版主】关于经营租赁可变租赁付款额核算 最近更新 账套z 2026-06-12t09:11:23.000z 2026-06-20t14:06:00.000z 请教版主：             出租人公司a开展户用光伏经营租赁项目，将自有电站出租与项目公司b，租期15年，按季度收租，租金=电价*发电量-其他固定费用。电站的运维方c保证年发电量满足约定的最低标准，最低发电标准基本可以达到。未来电价存在不确定性，取决于政策及市场电价综合因素。       \n\na公司项目经理在尽调阶段，通过各类情景分析，预估了租赁期可能收到的租金，并制作租金表，作为内部审批流程的材料。与承租人签订的租赁合同不包括预估的租金。\n\n尽管a公司预估了租金表，但实际租金取决于电站实际运营情况，因此每期租金不固定。\n\n假设该租赁项目已满足经营租赁各条件。\n\n出租人a公司每月按租赁准则，将预估租金表收款额按直线法摊销，确认租金收入。季度收租时，冲回前期计提的租金收入，同时将收到的租金，作为可变租赁付款额，在实际收到时计入当期损益。\n\n      1. 请教版主，上述核算方式是否恰当？\n\n      2. 版主在2025年答复过一篇关于可变租赁付款额的求助帖（https://bbs.esnai.cn/thread-5494426-1-1.html），提到：“租金根据周边市场租金调整的约定，也属于‘取决于指数或比率的可变租赁付款额’，因为租金市场价格也可以看作一项物价指数。”对于本项目的可变租赁付款额，是否也是与指数或利率挂钩的可变租赁付款额？如是，便不能按上述做法一次性计入当期损益。请问如何确认收入比较合适？\n\n感谢版主，望指教！ 本案例中的可变租金既取决于电价，也取决于发电量，而发电量属于租赁资产自身的运营绩效指标，故不是单纯的“取决于指数或比率的可变租赁付款额”。如果没有保底租金，则本案例中承租人不应确认使用权资产和租赁负债；出租人不应人为将各期租金均衡化，应按每期的发电量和电价测算应收租金。 https://bbs.esnai.cn/thread-5497447-1-1.html"}, {"tid": "5497075", "title": "对于不能对价很可能收回的合同，成本结转问题", "category": "最近更新", "questionAuthor": "刘洪强", "questionTime": "2026-05-12T07:53:01.000Z", "replyTime": "2026-06-20T13:44:00.000Z", "replySortTime": "2026-06-20T13:44:00.000Z", "url": "https://bbs.esnai.cn/thread-5497075-1-1.html", "question": "请教陈版：对于不能对价很可能收回的合同，如不能确认收入，相应成本是否需要结转，商品已经转移给客户了，目前由于对价不满足很可能收回的条件，不确认收入，请问成本是否需要结转，如不需要结转，应当如何进行会计处理？\n\n---\n\n继续追问一下，也就是不确认收入，但是对于商品于控制权转移时点，就需要结转成本对吗？", "reply": "如果某项合同不满足“对价很可能收回”的条件，从而不能确认收入，则也就意味着其已发生的成本并不是很可能收回的，相应地，已发生的合同履约成本不满足《企业会计准则第14号——收入（2017年修订）》第二十六条规定的确认为资产的条件，应在发生当期即直接转入营业成本处理，尽管并无收入与该项成本相对应。\n\n---\n\n是。", "searchText": "5497075 对于不能对价很可能收回的合同，成本结转问题 最近更新 刘洪强 2026-05-12t07:53:01.000z 2026-06-20t13:44:00.000z 请教陈版：对于不能对价很可能收回的合同，如不能确认收入，相应成本是否需要结转，商品已经转移给客户了，目前由于对价不满足很可能收回的条件，不确认收入，请问成本是否需要结转，如不需要结转，应当如何进行会计处理？\n\n---\n\n继续追问一下，也就是不确认收入，但是对于商品于控制权转移时点，就需要结转成本对吗？ 如果某项合同不满足“对价很可能收回”的条件，从而不能确认收入，则也就意味着其已发生的成本并不是很可能收回的，相应地，已发生的合同履约成本不满足《企业会计准则第14号——收入（2017年修订）》第二十六条规定的确认为资产的条件，应在发生当期即直接转入营业成本处理，尽管并无收入与该项成本相对应。\n\n---\n\n是。 https://bbs.esnai.cn/thread-5497075-1-1.html"}, {"tid": "5489039", "title": "请教陈版及各位老师，合并前发生交易在合并后是否应该抵消", "category": "最近更新", "questionAuthor": "dafen114", "questionTime": "2024-09-19T08:46:05.000Z", "replyTime": "2026-06-20T13:43:00.000Z", "replySortTime": "2026-06-20T13:43:00.000Z", "url": "https://bbs.esnai.cn/thread-5489039-1-1.html", "question": "请教陈版及各位老师，合并抵消中遇到这样一个场景，有些拿不准该怎么处理，特来求助~~\n\n背景简化如下：\n\n2022年1月，A公司将自有的歌曲版权授权B公司使用，收费240万，许可期限2年。\n\nA公司账务处理如下：\n\n一次性收款时：借 银行存款   贷 递延收入\n\n每个月做一笔收入：借 递延收入  贷 主营业务收入\n\nB公司账务处理如下：\n\n一次性付款时：借 版权资产  贷 银行存款\n\n每个月做一笔摊销：借 主营业务成本-版权资产摊销 贷 累计摊销-版权资产\n\n2023年1月，B公司的母公司C公司取得A公司60%股权，A公司开始与B公司一同纳入C公司的合并范围。\n\n请问，这个场景下，B公司后续摊销的成本跟C公司按月确认的收入需要做抵消吗？\n\n这个交易事项中形成的资产、负债科目是否需要考虑合并抵消呢。\n\n感恩各位~", "reply": "这种情况下，在C（A、B的共同上级母公司）的合并报表中，相当于原先给B的授权提前收回了，此后A、B之间就该歌曲版权授权的相关收入和成本应予以抵销处理，A、B之间与之相关的资产和负债也应当抵销。\n\n如果截至购买日时点，B账面的预收账款（或合同负债，下同）与B所拥有的该项特许权的公允价值不一致的，则该差额应调整合并报表层面的投资收益。后续合并报表层面不应再出现A的预收账款摊销（结转收入）和B的无形资产摊销（结转成本）。", "searchText": "5489039 请教陈版及各位老师，合并前发生交易在合并后是否应该抵消 最近更新 dafen114 2024-09-19t08:46:05.000z 2026-06-20t13:43:00.000z 请教陈版及各位老师，合并抵消中遇到这样一个场景，有些拿不准该怎么处理，特来求助~~\n\n背景简化如下：\n\n2022年1月，a公司将自有的歌曲版权授权b公司使用，收费240万，许可期限2年。\n\na公司账务处理如下：\n\n一次性收款时：借 银行存款   贷 递延收入\n\n每个月做一笔收入：借 递延收入  贷 主营业务收入\n\nb公司账务处理如下：\n\n一次性付款时：借 版权资产  贷 银行存款\n\n每个月做一笔摊销：借 主营业务成本-版权资产摊销 贷 累计摊销-版权资产\n\n2023年1月，b公司的母公司c公司取得a公司60%股权，a公司开始与b公司一同纳入c公司的合并范围。\n\n请问，这个场景下，b公司后续摊销的成本跟c公司按月确认的收入需要做抵消吗？\n\n这个交易事项中形成的资产、负债科目是否需要考虑合并抵消呢。\n\n感恩各位~ 这种情况下，在c（a、b的共同上级母公司）的合并报表中，相当于原先给b的授权提前收回了，此后a、b之间就该歌曲版权授权的相关收入和成本应予以抵销处理，a、b之间与之相关的资产和负债也应当抵销。\n\n如果截至购买日时点，b账面的预收账款（或合同负债，下同）与b所拥有的该项特许权的公允价值不一致的，则该差额应调整合并报表层面的投资收益。后续合并报表层面不应再出现a的预收账款摊销（结转收入）和b的无形资产摊销（结转成本）。 https://bbs.esnai.cn/thread-5489039-1-1.html"}, {"tid": "5497269", "title": "换货升级的处理", "category": "最近更新", "questionAuthor": "wx_5da958a4acba", "questionTime": "2026-05-27T03:21:54.000Z", "replyTime": "2026-06-20T13:37:00.000Z", "replySortTime": "2026-06-20T13:37:00.000Z", "url": "https://bbs.esnai.cn/thread-5497269-1-1.html", "question": "请教各位老师：\n\n公司为AI芯片厂，某形芯片正在研发试制过程中，但未完成定型。由于市场需求旺盛，以风险量产形式对客户进行批量销售，即目前产品为试做型，未来定型的量产型虽然代际型号为一个，但具体产品性能、售价成本等可能存在差异。\n\n某日与A客户签订销售合同销售A型号产品一批（比如叫I5芯片第一版），销售规模金额重大几千万级，现已交货履行完毕。3个月后，因新试做型产出（比如叫I5芯片第二版），为维护客户关系，公司与客户签订补充协议，将原销售的A产品（I5芯片第一版）收回，并免费换成等量的新试做型A产品（I5芯片第二版）。该换货升级不是公司常规销售政策，客户签订原销售合同时不能合理预期会收到该升级服务。\n\n请问：\n\n一、换成改进型的模式有两类，一是在收回的A产品上做继续加工升级，升级后原样返回客户；二是收回A产品后直接将库存的改进型A产品给客户。这两种不同模式分别应如何处理？\n\n二、如果免费升级的是不同型号且无需额外支付对价（如用I7换原来I5，是不同的型号而不是相互迭代的概念），又该如何处理？\n\n---\n\n感谢陈老师，追问下\n\n如果原合同目的变成适配客户最终产品，公司的交付义务是：1、按时间要求交付试作品用于预装验证 2、验证完成后，根据验证意见结果，将所有试作产品返修成正式品、或退回试作品新发正式品\n\n此场景下，（一）收入确认应如何进行：以最终正式品验收确收，还是试作品与正式品分别确收？（二）相关发出的存货成本如何列报，返修或退回重发金额如何处理？", "reply": "1、在收回的A产品上做继续加工升级，升级后原样返回客户的，不做销售退回处理，发生的运费、升级加工成本等直接计入营业成本。\n\n收回A产品后直接将库存的改进型A产品给客户的，参照上述2处理。\n\n2、如果免费升级的是不同型号且无需额外支付对价（如用I7换原来I5，是不同的型号而不是相互迭代的概念），则作为原商品退回、新商品销售两笔业务分别进行会计处理。\n\n---\n\n试作品不构成单项履约义务，需在最终正式验收后才能确认收入。最终验收前作为发出商品核算，返修或退回重发金额计入发出商品成本。", "searchText": "5497269 换货升级的处理 最近更新 wx_5da958a4acba 2026-05-27t03:21:54.000z 2026-06-20t13:37:00.000z 请教各位老师：\n\n公司为ai芯片厂，某形芯片正在研发试制过程中，但未完成定型。由于市场需求旺盛，以风险量产形式对客户进行批量销售，即目前产品为试做型，未来定型的量产型虽然代际型号为一个，但具体产品性能、售价成本等可能存在差异。\n\n某日与a客户签订销售合同销售a型号产品一批（比如叫i5芯片第一版），销售规模金额重大几千万级，现已交货履行完毕。3个月后，因新试做型产出（比如叫i5芯片第二版），为维护客户关系，公司与客户签订补充协议，将原销售的a产品（i5芯片第一版）收回，并免费换成等量的新试做型a产品（i5芯片第二版）。该换货升级不是公司常规销售政策，客户签订原销售合同时不能合理预期会收到该升级服务。\n\n请问：\n\n一、换成改进型的模式有两类，一是在收回的a产品上做继续加工升级，升级后原样返回客户；二是收回a产品后直接将库存的改进型a产品给客户。这两种不同模式分别应如何处理？\n\n二、如果免费升级的是不同型号且无需额外支付对价（如用i7换原来i5，是不同的型号而不是相互迭代的概念），又该如何处理？\n\n---\n\n感谢陈老师，追问下\n\n如果原合同目的变成适配客户最终产品，公司的交付义务是：1、按时间要求交付试作品用于预装验证 2、验证完成后，根据验证意见结果，将所有试作产品返修成正式品、或退回试作品新发正式品\n\n此场景下，（一）收入确认应如何进行：以最终正式品验收确收，还是试作品与正式品分别确收？（二）相关发出的存货成本如何列报，返修或退回重发金额如何处理？ 1、在收回的a产品上做继续加工升级，升级后原样返回客户的，不做销售退回处理，发生的运费、升级加工成本等直接计入营业成本。\n\n收回a产品后直接将库存的改进型a产品给客户的，参照上述2处理。\n\n2、如果免费升级的是不同型号且无需额外支付对价（如用i7换原来i5，是不同的型号而不是相互迭代的概念），则作为原商品退回、新商品销售两笔业务分别进行会计处理。\n\n---\n\n试作品不构成单项履约义务，需在最终正式验收后才能确认收入。最终验收前作为发出商品核算，返修或退回重发金额计入发出商品成本。 https://bbs.esnai.cn/thread-5497269-1-1.html"}, {"tid": "5471858", "title": "求助陈版主 关于民营企业之间类似BOT的业务", "category": "最近更新", "questionAuthor": "耶耶耶Yee", "questionTime": "2022-12-08T04:43:34.000Z", "replyTime": "2026-06-20T13:32:00.000Z", "replySortTime": "2026-06-20T13:32:00.000Z", "url": "https://bbs.esnai.cn/thread-5471858-1-1.html", "question": "审计中碰到这样一个问题，一个拟上市公司A今年和客户B签订几个相似的合同，技术协议可见项目为建设加运营，但商务合同以材料销售合同签订，以其中一个举例。技术协议中约定A公司为客户B建设一套环保设备，由A公司自己进行组装建设，建设完成后进行运营（技术协议中对运营期表述为“节能效益分享期”，但就A公司而言并未进行节能降耗，仅通过运营使排放达标），运营期3年，到期前重新约定是否继续承接运营，设备在建成后一直到运营结束之前，所有权均归A公司所有，A公司可就设备设置抵押等行为，运营期结束后进行所有权转移，但双方未就所有权转移时是否需要支付额外价款等问题做出进一步明确的约定。\n\n在该项目中，建设期客户B不进行任何垫资，甲方通过借款获取资金用于环保设备建设，后期通过运营期间的发电量乘以单价计算各期运营费，故各期运营费难以估计，但技术协议又对运营期的总发电量上限做出约定，故项目总额又属于固定的。技术协议约定，如果运营不到3年已达合同总额，则免费运营至3年为止；如果运营达到三年不足总额上限，则延长运营期至结算达到合同上限为止，如果延长12个月仍未达到合同总额上限，则直接补价至合同总额上限。\n\n现在的考虑是，如果为了收入成本配比，则未考虑时间价值；如果考虑时间价值，每期的结算款无法估计（非年金且无保底），且如果提前达到发电量则剩余期间只有成本没有收入进行配比。请问建设部分和运营部分的收入和成本应该参照哪个准则如何进行账务处理？\n\n---\n\nA公司作为出租人，B客户作为承租人，但B并没有控制该项资产。是否不符合租赁的准则", "reply": "参考：《中审众环研究2020》之“问题4-2-25（合同能源管理的会计处理）”。可以选择“租赁模式”或“类PPP模式”。其中，如果选择租赁模式的，则应注意首先区分其中的租赁成分和后续服务成分，对租赁成份适用租赁准则，对服务成份适用新收入准则。\n\n在租赁模式下，A公司属于出租人，故仍需根据租赁资产所有权上的主要风险和报酬是否转移给承租人来确定租赁的类型属于经营租赁还是融资租赁。这里的主要考虑因素是：由于合同约定每年收费金额与发电量挂钩，则客户的每年发电量是否稳定，是否构成实质固定租赁付款额？如果有相对固定的租赁付款额或者实质上的保底付款额，则实质固定付款额或者保底付款额的折现值是否足以涵盖设备的公允价值？\n\n---\n\n该环保设备系与B的生产设备配套，具有专用性，不能轻易替换，可作为B控制该资产的证据。A提供运营服务不代表A可以控制该资产的使用。", "searchText": "5471858 求助陈版主 关于民营企业之间类似bot的业务 最近更新 耶耶耶yee 2022-12-08t04:43:34.000z 2026-06-20t13:32:00.000z 审计中碰到这样一个问题，一个拟上市公司a今年和客户b签订几个相似的合同，技术协议 16:21.000z 2026-06-20t13:28:00.000z 请教陈老师及各位版主：甲公司【非房地产企业】原持有a公司100%股权，甲公司的出资成本为1亿元；a公司为房地产开发的项目公司，名下持有一宗土地使用权为其几乎全部财产。\n\n20x2年12月【a公司名下地块处于待开发状态，a公司亦无其他重大的资产或负债】，甲引入战略投资者非关联方乙【具有较为丰富的房地产开发经验】入股a公司共同开发该房地产项目，a公司的股东变为甲持股50%、乙持股50%。【甲将a公司股权50%转让给乙的对价是6亿元，假定该交易价格是公允的】该交易完成后，a公司为甲乙共同控制。\n\n于20x2年12月a公司股权变更后，可否参照购买不构成业务的净资产的理念，甲形式上持有a公司股权的实质是持有一宗待开发的土地使用权，引入乙是引进找略投资者【合作方】的目的是完成a公司地块的开发，并未改变其持有a公司地块土地使用权。\n\n甲公司合并报表层面的会计处理，仍将其通过持有a公司股权形式间接持有的土地使用权继续作为土地使用权类资产反映，不确认处置子公司股权损益。该处理是否恰当？请各位不吝指教，谢谢\n\n---\n\n引入乙公司后，a公司重大事项（包括a地块开发中的重大问题）由甲、乙两方委派代表共同协商确定，a公司盈亏由两方股东按出资比例分享或承担。甲乙公司均有国资背景【分属不同省市】，a公司董事会成员共7名董事，其中：甲乙双方各自推荐3名董事【各含1名外部董事】、a公司层面选举一名职工董事。a公司董事会上除特定事项【如投融资、制度建设、薪酬体系等】需全部董事同意外，其他一般事项需半数以上同意。 建议关注以下问题：\n\n1、引入乙公司后，是甲、乙两公司共同决定a地块开发中的重大问题，盈亏各担50%；还是双方各自开发该地块中各50%的面积，各自的开发活动各自独立决策，收益各自享有。\n\n2、如果是上述1中的后一种情形，则a公司的两个地块是否分别满足合并报表准则第二十条对“单独主体”的定义和判断条件，特别是双方的融资风险如何实现隔离。\n\n---\n\n如是，则a公司属于甲乙双方的合营企业，应将继续持有的剩余股权确认为长期股权投资，以丧失控制权之日的公允价值为基础计量，后续按权益法核算。 https://bbs.esnai.cn/thread-5497378-1-1.html"}, {"tid": "5497393", "title": "在建工程包含哪些必要支出？", "category": "最近更新", "questionAuthor": "一云", "questionTime": "2026-06-08T01:30:25.000Z", "replyTime": "2026-06-20T13:26:00.000Z", "replySortTime": "2026-06-20T13:26:00.000Z", "url": "https://bbs.esnai.cn/thread-5497393-1-1.html", "question": "请教陈老师：\n\n   一家公司，处于基建期，在盖一栋大楼，没有别的经营活动，那这家公司将本公司所有支出（包括综合部门薪酬、办公费、电话费、招待费等等）全部计入在建工程，   然后这家公司的利润表是空表，这样处理正确吗？\n\n---\n\n谢谢陈老师     请问：在哪里能买到《中审众环研究2020》？  请发个链接好吗？", "reply": "不恰当。建议参考《中审众环研究2020》之问题1-1-29。\n\n---\n\nhttps://www.zszhcpa.cn/Articlesandpublishers/info_itemid_188.html", "searchText": "5497393 在建工程包含哪些必要支出？ 最近更新 一云 2026-06-08t01:30:25.000z 2026-06-20t13:26:00.000z 请教陈老师：\n\n   一家公司，处于基建期，在盖一栋大楼，没有别的经营活动，那这家公司将本公司所有支出（包括综合部门薪酬、办公费、电话费、招待费等等）全部计入在建工程，   然后这家公司的利润表是空表，这样处理正确吗？\n\n---\n\n谢谢陈老师     请问：在哪里能买到《中审众环研究2020》？  请发个链接好吗？ 不恰当。建议参考《中审众环研究2020》之问题1-1-29。\n\n---\n\nhttps://www.zszhcpa.cn/articlesandpublishers/info_itemid_188.html https://bbs.esnai.cn/thread-5497393-1-1.html"}, {"tid": "5497515
