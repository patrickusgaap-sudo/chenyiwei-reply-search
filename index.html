  <script id="recordsData" type="application/json">[{"tid": "5489062", "title": "厂房折旧是否可以计入在建工程", "category": "最近更新", "questionAuthor": "bkmoon", "questionTime": "2025-12-10T16:09:18.000Z", "replyTime": "2026-07-21T00:31:00.000Z", "replySortTime": "2026-07-21T00:31:00.000Z", "url": "https://bbs.esnai.cn/thread-5489062-1-1.html", "question": "查看原帖\n陈版主您好   如果厂房转固了   设备由于正在试生产环节未转固   试生产环节厂房折旧也应该计入管理费用  还是试生产环节厂房折旧资本化？\n\n---\n\n查看原帖\n陈版主，请问。假如公司有两条产线和一个公共设施，公共设施供两条产线生产用，比如锅炉蒸汽等。现在公共设施转固了，产线未转固，产线试生产阶段，需要用到公共设施，那公共设施的折旧能否计入在建工程成本，产出产品成本如何核算。", "reply": "查看原帖\n此时厂房折旧应费用化处理。\n\n---\n\n查看原帖\n如果大部分时间该公共设施闲置，仅有少数时间用于对生产线的调试等，则其折旧主要仍然计入管理费用，仅有确定与配合生产线调试相关的机器工时对应的折旧可以计入在建工程成本。", "searchText": "5489062 厂房折旧是否可以计入在建工程 最近更新 bkmoon 2025-12-10t16:09:18.000z 2026-07-21t00:31:00.000z 查看原帖\n陈版主您好   如果厂房转固了   设备由于正在试生产环节未转固   试生产环节厂房折旧也应该计入管理费用  还是试生产环节厂房折旧资本化？\n\n---\n\n查看原帖\n陈版主，请问。假如公司有两条产线和一个公共设施，公共设施供两条产线生产用，比如锅炉蒸汽等。现在公共设施转固了，产线未转固，产线试生产阶段，需要用到公共设施，那公共设施的折旧能否计入在建工程成本，产出产品成本如何核算。 查看原帖\n此时厂房折旧应费用化处理。\n\n---\n\n查看原帖\n如果大部分时间该公共设施闲置，仅有少数时间用于对生产线的调试等，则其折旧主要仍然计入管理费用，仅有确定与配合生产线调试相关的机器工时对应的折旧可以计入在建工程成本。 https://bbs.esnai.cn/thread-5489062-1-1.html"}, {"tid": "5497710", "title": "请教陈版，施工企业项目部租赁问题", "category": "最近更新", "questionAuthor": "wqhaohaoxuexi", "questionTime": "2026-07-06T18:42:23.000Z", "replyTime": "2026-07-21T00:27:00.000Z", "replySortTime": "2026-07-21T00:27:00.000Z", "url": "https://bbs.esnai.cn/thread-5497710-1-1.html", "question": "陈版您好！对施工企业项目部租赁有以下疑问：假设项目部租赁一块场地用于项目使用，租期3年，项目预期5年完工；（1）该项租赁是否应当依据租赁准则，确认使用权资产和租赁负债？（2）若应当确认，以承租人增量借款利率作为折现率时，增量借款利率选择项目部对应借款利率，还是施工单位对应借款利率？（3）若应当确认，使用权资产计提折旧计入合同履约成本，未确认融资费用摊销计入能否也计入合同履约成本？\n\n谢谢！\n\n---\n\n查看原帖\n感谢陈版的解答。对于“未确认融资费用计入合同履约成本”，我是参考项目借款，利息费用资本化这个角度理解。您觉得这么理解可以吗？项目部因项目履约租赁的场地，对应的未确认融资费用计入合同履约成本，公司本部（这类管理部门）租赁的办公场地等，对应的未确认融资费用计入财务费用。", "reply": "查看原帖\n1、是，应确认使用权资产和租赁负债。\n\n2、增量借款利率的选择，如果该项目部有单独对外借款的，则使用项目部的增量借款利率；反之使用所属法人企业的增量借款利率，\n\n3、未确认融资费用的分摊应正常确认为财务费用——利息支出。\n\n---\n\n查看原帖\n租赁负债相关利息支出实务中很少资本化，因为使用权资产本身不属于符合借款费用资本化条件的资产。", "searchText": "5497710 请教陈版，施工企业项目部租赁问题 最近更新 wqhaohaoxuexi 2026-07-06t18:42:23.000z 2026-07-21t00:27:00.000z 陈版您好！对施工企业项目部租赁有以下疑问：假设项目部租赁一块场地用于项目使用，租期3年，项目预期5年完工；（1）该项租赁是否应当依据租赁准则，确认使用权资产和租赁负债？（2）若应当确认，以承租人增量借款利率作为折现率时，增量借款利率选择项目部对应借款利率，还是施工单位对应借款利率？（3）若应当确认，使用权资产计提折旧计入合同履约成本，未确认融资费用摊销计入能否也计入合同履约成本？\n\n谢谢！\n\n---\n\n查看原帖\n感谢陈版的解答。对于“未确认融资费用计入合同履约成本”，我是参考项目借款，利息费用资本化这个角度理解。您觉得这么理解可以吗？项目部因项目履约租赁的场地，对应的未确认融资费用计入合同履约成本，公司本部（这类管理部门）租赁的办公场地等，对应的未确认融资费用计入财务费用。 查看原帖\n1、是，应确认使用权资产和租赁负债。\n\n2、增量借款利率的选择，如果该项目部有单独对外借款的，则使用项目部的增量借款利率；反之使用所属法人企业的增量借款利率，\n\n3、未确认融资费用的分摊应正常确认为财务费用——利息支出。\n\n---\n\n查看原帖\n租赁负债相关利息支出实务中很少资本化，因为使用权资产本身不属于符合借款费用资本化条件的资产。 https://bbs.esnai.cn/thread-5497710-1-1.html"}, {"tid": "5497604", "title": "求助陈版主！关于时段法收入确认的问题请教", "category": "最近更新", "questionAuthor": "DDDJX", "questionTime": "2026-06-26T08:44:04.000Z", "replyTime": "2026-07-21T00:26:00.000Z", "replySortTime": "2026-07-21T00:26:00.000Z", "url": "https://bbs.esnai.cn/thread-5497604-1-1.html", "question": "关于合格收款权的案例请教\n\n背景：\n\n条款1：公司合同有类似于《关于广州瑞松智能科技股份 有限公司2024年年度报告的信息披露监管问询函》回复中提到的关于公司按时段法确认的合同情景：若非因乙方原因导致合同解除，合同解除后，甲乙双方按照乙方已完成的工程量或工作量结算，如给乙方造成其他损失的，甲方应负责赔偿，同时公司的商品是大型的具有不可替代用途的，定制化程度较高的。\n\n条款2：公司合同约定：如果因乙方严重违反合同约定或者乙方出现出现到期无法偿还债务或者乙方要求合同终止或者暂缓请求的，需要向甲方返还所有已支付款项，还应向甲方赔偿损失。  \n\n问题：以上1和2同时存在的合同条款是否还能满足合格收款权？ 如果条款2有冲突，那公司如果修改比较好？因为合同是相对的，我们要求客户违约要付已履约的对价，那客户就会要求我们如果违约返还已支付价款。\n\n分析：（因准则对于合格收款权的约定是指在由于客户或其他方原因终止合同的情况下，企业有权就累计至今已完成的履约部分收取能够补偿其已发生成本和合理利润的款项，并且该权利具有法律约束力，这一条单独来看合同条款是已经有类似约定了。）公司认为因自己原因违约的可能性很低。是否可以按照合格收款权判断可以按时段法确认收入？\n\n---\n\n查看原帖\n感谢陈版主的回复。如果条款2里的违约赔偿条款含如果最终项目无法整体验收交付，可能会导致我方违约，而需要支付已收取的款项。当然，公司评估这种情况的发生概率是非常低的，因为这个项目是一个成熟的项目，已经有很多交付案例。这样是否还会影响不能按时段法确认呢？", "reply": "查看原帖\n一般理解条款2属于违约赔偿条款，单独看条款2不会导致不适用时段法。但对于能否仅依据条款1和“同时公司的商品是大型的具有不可替代用途的，定制化程度较高的”的事实来认定满足时段法适用条件，也建议进一步分析，建议参考《上市公司执行企业会计准则案例解析2024》之“案例6-04 按时点法或时段法确认收入的判断”之“相关案例之三：企业能否仅依据民法典的违约责任条款认定为具有合格收款权”。\n\n---\n\n查看原帖\n如果是发生可能性极小的保护性条款，则该项违约责任条款不影响时段法的判断。", "searchText": "5497604 求助陈版主！关于时段法收入确认的问题请教 最近更新 dddjx 2026-06-26t08:44:04.000z 2026-07-21t00:26:00.000z 关于合格收款权的案例请教\n\n背景：\n\n条款1：公司合同有类似于《关于广州瑞松智能科技股份 有限公司2024年年度报告的信息披露监管问询函》回复中提到的关于公司按时段法确认的合同情景：若非因乙方原因导致合同解除，合同解除后，甲乙双方按照乙方已完成的工程量或工作量结算，如给乙方造成其他损失的，甲方应负责赔偿，同时公司的商品是大型的具有不可替代用途的，定制化程度较高的。\n\n条款2：公司合同约定：如果因乙方严重违反合同约定或者乙方出现出现到期无法偿还债务或者乙方要求合同终止或者暂缓请求的，需要向甲方返还所有已支付款项，还应向甲方赔偿损失。  \n\n问题：以上1和2同时存在的合同条款是否还能满足合格收款权？ 如果条款2有冲突，那公司如果修改比较好？因为合同是相对的，我们要求客户违约要付已履约的对价，那客户就会要求我们如果违约返还已支付价款。\n\n分析：（因准则对于合格收款权的约定是指在由于客户或其他方原因终止合同的情况下，企业有权就累计至今已完成的履约部分收取能够补偿其已发生成本和合理利润的款项，并且该权利具有法律约束力，这一条单独来看合同条款是已经有类似约定了。）公司认为因自己原因违约的可能性很低。是否可以按照合格收款权判断可以按时段法确认收入？\n\n---\n\n查看原帖\n感谢陈版主的回复。如果条款2里的违约赔偿条款含如果最终项目无法整体验收交付，可能会导致我方违约，而需要支付已收取的款项。当然，公司评估这种情况的发生概率是非常低的，因为这个项目是一个成熟的项目，已经有很多交付案例。这样是否还会影响不能按时段法确认呢？ 查看原帖\n一般理解条款2属于违约赔偿条款，单独看条款2不会导致不适用时段法。但对于能否仅依据条款1和“同时公司的商品是大型的具有不可替代用途的，定制化程度较高的”的事实来认定满足时段法适用条件，也建议进一步分析，建议参考《上市公司执行企业会计准则案例解析2024》之“案例6-04 按时点法或时段法确认收入的判断”之“相关案例之三：企业能否仅依据民法典的违约责任条款认定为具有合格收款权”。\n\n---\n\n查看原帖\n如果是发生可能性极小的保护性条款，则该项违约责任条款不影响时段法的判断。 https://bbs.esnai.cn/thread-5497604-1-1.html"}, {"tid": "5497780", "title": "不分红只享排水权的股权投资，该入哪个会计科目？", "category": "最近更新", "questionAuthor": "heening", "questionTime": "2026-07-13T12:00:37.000Z", "replyTime": "2026-07-21T00:24:00.000Z", "replySortTime": "2026-07-21T00:24:00.000Z", "url": "https://bbs.esnai.cn/thread-5497780-1-1.html", "question": "某煤矿疏干水处理 BOT 项目出资账务处理分析\n\n一、案例背景\n\n本环保水处理项目采用 BOT 模式设立专项项目公司，项目整体合作经营期限 25 年。项目公司由 1 家属地国有平台运营企业与 10 家涉煤企业共同出资设立，各股东出资比例按照煤炭剩余可采储量权重 70%、矿井年疏干水外排水量权重 30% 综合测算核定。\n\n本煤矿为项目公司工商登记在册股东，持股比例 20.22%，认缴出资总额若干万元，于 2020 年 5 月完成第二期出资缴款。根据股东协议及公司章程约定，本煤矿不参与项目公司日常经营管理，不享有项目经营利润分红，本次出资的核心对价为取得 25 年期疏干水免费排放权益。\n\n（一）股东权利\n\n全体股东均有权出席股东会并行使表决权；\n\n项目 25 年合作经营期满，经属地政府主管部门批准后，股东可依法对外转让所持股权；\n\n若项目公司终止清算后存在剩余资产，各股东按持股比例享有剩余财产分配权；\n\n合作期内，本煤矿可将达标疏干水免费排入统一管网，无需另行支付管网运维费、排水服务费。\n\n（二）股东义务\n\n仅按约定足额履行出资义务，不参与项目工程建设、日常运营管理相关事务；\n\n自愿放弃项目存续期间经营利润分配权；\n\n仅对自身排入管网水质不达标、排水超管网设计容量产生的环保责任自行承担；\n\n项目运营亏损、管网设备损坏维修、实际疏干水排水量不足等全部经营风险，均由属地国有平台股东单独承担。\n\n二、案例分析\n\n（一）计入长期股权投资\n\n持股比例 20.22%，准则默认对被投单位具有重大影响，且工商登记为在册股东，享有表决、剩余财产分配、股权转让等法定股东权利，仅内部约定放弃分红不改变股权投资实质，应计入长期股权投资核算；仅在股权处置或公司清算时扣除对应投资成本。\n\n（二）计入长期待摊费用\n\n企业出资核心目的仅获取 25 年疏干水免费排放权益、解决环保合规问题，无获取股权增值、分红收益的诉求，持股仅为满足 PPP 项目设立硬性要求，属于名义持股，经济实质为预付长期环保服务费，应计入长期待摊费用，按 25 年分期摊销计入生产成本。\n\n（三）计入其他权益工具投资\n\n因不具备重大影响，不适用长期股权投资准则；企业长期持有该股权、不以短期出售套利为目的，初始确认时可不可撤销指定为以公允价值计量且其变动计入其他综合收益的金融资产，计入 “其他权益工具投资”。\n\n---\n\n查看原帖\n项目公司目前来说是亏损的，每年各股东单位向项目公司每吨疏干水缴纳1元的费用。暂时没有对盈利做出约定，对剩余权益暂时也没有约定，项目公司是政府国资委成立的公司既是股东，也是管理人。这样这1元费用计入生产成本？如果后续项目公司解散，投资损失各股东可以税前抵扣吗，假设计入长期待摊费用，每年摊销后做了纳税调增。这个项目公司收到的投资款是计入实收资本还是？既然没有对各股东有剩余权益的分配，项目公司计入实收资本合适吗？", "reply": "查看原帖\n因为不享有收益分配权，只是通过参与该项目获得一定年限内的免费排水权，因此该项投资不符合权益工具投资的定义，即不享有项目公司净资产的剩余权益。因此，不应确认为长期股权投资或者其他权益工具投资。\n\n建议确认为长期待摊费用（或者无形资产）——排水权，在煤矿的剩余开采年限和排水权剩余年限两者孰短的年限内摊销，摊销额计入各期营业成本。\n\n另外建议核实：如果各股东都“不参与项目公司日常经营管理，不享有项目经营利润分红”，则该项目公司的盈亏和剩余权益将如何享有或承担？如有亏损或者其他资金需求则如何弥补？\n\n---\n\n查看原帖\n建议首先明确谁是项目公司最终经营风险和收益的最终享有或承担者。", "searchText": "5497780 不分红只享排水权的股权投资，该入哪个会计科目？ 最近更新 heening 2026-07-13t12:00:37.000z 2026-07-21t00:24:00.000z 某煤矿疏干水处理 bot 项目出资账务处理分析\n\n一、案例背景\n\n本环保水处理项目采用 bot 模式设立专项项目公司，项目整体合作经营期限 25 年。项目公司由 1 家属地国有平台运营企业与 10 家涉煤企业共同出资设立，各股东出资比例按照煤炭剩余可采储量权重 70%、矿井年疏干水外排水量权重 30% 综合测算核定。\n\n本煤矿为项目公司工商登记在册股东，持股比例 20.22%，认缴出资总额若干万元，于 2020 年 5 月完成第二期出资缴款。根据股东协议及公司章程约定，本煤矿不参与项目公司日常经营管理，不享有项目经营利润分红，本次出资的核心对价为取得 25 年期疏干水免费排放权益。\n\n（一）股东权利\n\n全体股东均有权出席股东会并行使表决权；\n\n项目 25 年合作经营期满，经属地政府主管部门批准后，股东可依法对外转让所持股权；\n\n若项目公司终止清算后存在剩余资产，各股东按持股比例享有剩余财产分配权；\n\n合作期内，本煤矿可将达标疏干水免费排入统一管网，无需另行支付管网运维费、排水服务费。\n\n（二）股东义务\n\n仅按约定足额履行出资义务，不参与项目工程建设、日常运营管理相关事务；\n\n自愿放弃项目存续期间经营利润分配权；\n\n仅对自身排入管网水质不达标、排水超管网设计容量产生的环保责任自行承担；\n\n项目运营亏损、管网设备损坏维修、实际疏干水排水量不足等全部经营风险，均由属地国有平台股东单独承担。\n\n二、案例分析\n\n（一）计入长期股权投资\n\n持股比例 20.22%，准则默认对被投单位具有重大影响，且工商登记为在册股东，享有表决、剩余财产分配、股权转让等法定股东权利，仅内部约定放弃分红不改变股权投资实质，应计入长期股权投资核算；仅在股权处置或公司清算时扣除对应投资成本。\n\n（二）计入长期待摊费用\n\n企业出资核心目的仅获取 25 年疏干水免费排放权益、解决环保合规问题，无获取股权增值、分红收益的诉求，持股仅为满足 ppp 项目设立硬性要求，属于名义持股，经济实质为预付长期环保服务费，应计入长期待摊费用，按 25 年分期摊销计入生产成本。\n\n（三）计入其他权益工具投资\n\n因不具备重大影响，不适用长期股权投资准则；企业长期持有该股权、不以短期出售套利为目的，初始确认时可不可撤销指定为以公允价值计量且其变动计入其他综合收益的金融资产，计入 “其他权益工具投资”。\n\n---\n\n查看原帖\n项目公司目前来说是亏损的，每年各股东单位向项目公司每吨疏干水缴纳1元的费用。暂时没有对盈利做出约定，对剩余权益暂时也没有约定，项目公司是政府国资委成立的公司既是股东，也是管理人。这样这1元费用计入生产成本？如果后续项目公司解散，投资损失各股东可以税前抵扣吗，假设计入长期待摊费用，每年摊销后做了纳税调增。这个项目公司收到的投资款是计入实收资本还是？既然没有对各股东有剩余权益的分配，项目公司计入实收资本合适吗？ 查看原帖\n因为不享有收益分配权，只是通过参与该项目获得一定年限内的免费排水权，因此该项投资不符合权益工具投资的定义，即不享有项目公司净资产的剩余权益。因此，不应确认为长期股权投资或者其他权益工具投资。\n\n建议确认为长期待摊费用（或者无形资产）——排水权，在煤矿的剩余开采年限和排水权剩余年限两者孰短的年限内摊销，摊销额计入各期营业成本。\n\n另外建议核实：如果各股东都“不参与项目公司日常经营管理，不享有项目经营利润分红”，则该项目公司的盈亏和剩余权益将如何享有或承担？如有亏损或者其他资金需求则如何弥补？\n\n---\n\n查看原帖\n建议首先明确谁是项目公司最终经营风险和收益的最终享有或承担者。 https://bbs.esnai.cn/thread-5497780-1-1.html"}, {"tid": "5407265", "title": "关于证监会商誉减值专题检查通报", "category": "最近更新", "questionAuthor": "cfshichunsheng", "questionTime": "2020-02-17T10:33:45.000Z", "replyTime": "2026-07-21T00:22:00.000Z", "replySortTime": "2026-07-21T00:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5407265-1-1.html", "question": "请问陈版，证监会会计部在2019年度内部控制审计、商誉减值审计与评估专题检查情况的通报中指出“有的评估机构在执业中也存在类似问题，未充分分析不同评估方法的适用性，未恰当选择适合商誉减值目的的评估方法或仅选用一种评估方法，简单以市场法、收益法或资产基础法评估的企业价值等同于资产组的可收回金额，直接将成本法评估的市场价值等同于公允价值减去处置费用后的净额。”我的问题是最后一句“直接将成本法评估的市场价值等同于公允价值减去处置费用后的净额”应如何理解？\n\n---\n\n查看原帖\n同问\n\n陈版，假如发生以下情况该如何处理？（1）由于历年亏损，收益法计算值为负数或接近于零，资产组全额减值；（2）如果收益法不适用（如已停产），该如何考虑资产组的可收回金额。\n\n---\n\n查看原帖\n继续追问一下：针对第二点，我们同评估师沟通，评估师这样反馈：部分资产存在大量基础费用、安装调试费用，若企业确定完全报废或者拆除，那么理应按照废材残料进行确认公允价值，如果没有明确后续处置计划，只是暂时搁置无明确计划，此类资产基于谨慎性原则，目前我们对其未直接按照报废废材进行处理，而是采用成本法对其进行贬值考虑。\n\n个人考虑：成本法是不适用于资产减值的，所以评估师这样处理并不正确。\n\n陈版主您的看法呢？\n\n---\n\n查看原帖\n继续追问下：如果有强制性的弃置义务，那么借方科目是资产减值损失？", "reply": "查看原帖\n根据《企业会计准则第8号——资产减值》第六条规定：“可收回金额应当根据资产的公允价值减去处置费用后的净额与资产预计未来现金流量的现值两者之间较高者确定”。即，会计上的资产减值是指资产或资产组的可收回金额低于其账面价值，可收回金额应当根据“资产的公允价值减去处置费用后的净额”与“资产预计未来现金流量的现值”两者之间较高者确定，前者相当于市场法评估值，后者相当于收益法评估值。但在很多情况下，评估师运用资产基础法对单项资产进行评估，而资产基础法下评估结果的含义是在当前状态下重置相同或类似资产所发生的经济资源消耗的名义货币价值（重置成本），并不能代表“资产的公允价值减去处置费用后的净额”或者“资产预计未来现金流量的现值”，因此成本法（资产基础法）下的资产评估结果不能作为会计上计提资产减值准备的直接依据，而应采用收益法或者市场法评估值。如果相关资产无活跃市场，无同类或类似资产的近期市场交易价格可作为市场法评估的参考，则收益法将成为唯一适用的减值评估方法。\n\n---\n\n查看原帖\n1、这种情况下最多全额计提减值，一般情况下不会确认预计负债，除非仍有强制性的弃置义务；2、建议考虑旧货市场的二手货交易价格或者残料变卖价值。\n\n---\n\n查看原帖\n是，“采用成本法对其进行贬值考虑”的处理应不恰当。\n\n---\n\n查看原帖\n弃置义务相关负债金额首先计入该项固定资产原值，然后以调整增加后的原值为基础进行减值测试和确认减值准备（如需要）。", "searchText": "5407265 关于证监会商誉减值专题检查通报 最近更新 cfshichunsheng 2020-02-17t10:33:45.000z 2026-07-21t00:22:00.000z 请问陈版，证监会会计部在2019年度内部控制审计、商誉减值审计与评估专题检查情况的通报中指出“有的评估机构在执业中也存在类似问题，未充分分析不同评估方法的适用性，未恰当选择适合商誉减值目的的评估方法或仅选用一种评估方法，简单以市场法、收益法或资产基础法评估的企业价值等同于资产组的可收回金额，直接将成本法评估的市场价值等同于公允价值减去处置费用后的净额。”我的问题是最后一句“直接将成本法评估的市场价值等同于公允价值减去处置费用后的净额”应如何理解？\n\n---\n\n查看原帖\n同问\n\n陈版，假如发生以下情况该如何处理？（1）由于历年亏损，收益法计算值为负数或接近于零，资产组全额减值；（2）如果收益法不适用（如已停产），该如何考虑资产组的可收回金额。\n\n---\n\n查看原帖\n继续追问一下：针对第二点，我们同评估师沟通，评估师这样反馈：部分资产存在大量基础费用、安装调试费用，若企业确定完全报废或者拆除，那么理应按照废材残料进行确认公允价值，如果没有明确后续处置计划，只是暂时搁置无明确计划，此类资产基于谨慎性原则，目前我们对其未直接按照报废废材进行处理，而是采用成本法对其进行贬值考虑。\n\n个人考虑：成本法是不适用于资产减值的，所以评估师这样处理并不正确。\n\n陈版主您的看法呢？\n\n---\n\n查看原帖\n继续追问下：如果有强制性的弃置义务，那么借方科目是资产减值损失？ 查看原帖\n根据《企业会计准则第8号——资产减值》第六条规定：“可收回金额应当根据资产的公允价值减去处置费用后的净额与资产预计未来现金流量的现值两者之间较高者确定”。即，会计上的资产减值是指资产或资产组的可收回金额低于其账面价值，可收回金额应当根据“资产的公允价值减去处置费用后的净额”与“资产预计未来现金流量的现值”两者之间较高者确定，前者相当于市场法评估值，后者相当于收益法评估值。但在很多情况下，评估师运用资产基础法对单项资产进行评估，而资产基础法下评估结果的含义是在当前状态下重置相同或类似资产所发生的经济资源消耗的名义货币价值（重置成本），并不能代表“资产的公允价值减去处置费用后的净额”或者“资产预计未来现金流量的现值”，因此成本法（资产基础法）下的资产评估结果不能作为会计上计提资产减值准备的直接依据，而应采用收益法或者市场法评估值。如果相关资产无活跃市场，无同类或类似资产的近期市场交易价格可作为市场法评估的参考，则收益法将成为唯一适用的减值评估方法。\n\n---\n\n查看原帖\n1、这种情况下最多全额计提减值，一般情况下不会确认预计负债，除非仍有强制性的弃置义务；2、建议考虑旧货市场的二手货交易价格或者残料变卖价值。\n\n---\n\n查看原帖\n是，“采用成本法对其进行贬值考虑”的处理应不恰当。\n\n---\n\n查看原帖\n弃置义务相关负债金额首先计入该项固定资产原值，然后以调整增加后的原值为基础进行减值测试和确认减值准备（如需要）。 https://bbs.esnai.cn/thread-5407265-1-1.html"}, {"tid": "5497833", "title": "求助陈版主 辛苦了", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2026-07-17T12:00:37.000Z", "replyTime": "2026-07-21T00:20:00.000Z", "replySortTime": "2026-07-21T00:20:00.000Z", "url": "https://bbs.esnai.cn/thread-5497833-1-1.html", "question": "特别感谢陈版主的很多指导，又有些问题想请教下陈版主：一上市公司A设立员工持股计划，方案约定“本计划的资产独立于公司的固有财产。公司不得侵占、挪用本期员工持股计划资产或以其他任何形式将本期员工持股计划资产与公司固有资产混同。”有几处疑问：\n\n像这种方案，公司并没有设立合伙企业，而是将自身的权益工具直接授予给员工，对于这几个阶段的账务处理是怎么样的呢？\n\n1、4月底收到员工认缴款入2026年员工持股平台计划专户；2、审计验资阶段(5月初)；3、中登过户，库存股登记到员工持股平台，员工持股平台计划专户转钱到上市公司一般户。前面这几个阶段的账务处理是怎么样的呢？\n\n4、感觉这个员工持股平台计划资金与上市公司资金都是计入了上市公司的账上，那么这个是否会导入员工持股计划资产与上市公司固有资产混同呢？像这种形式的员工持股计划，是以什么样的形式存在着呢，为何有些员工持股计划是以设立合伙企业的形式。一直没有搞得清楚员工持股计划与上市公司存在何种关系，涉及到不同情况的账务处理是怎么样的。\n\n---\n\n查看原帖\n继续追问下:“个人理解视同将激励股票直接登记到各激励对象名下”，具体是什么意思呢？收到认缴款时，这部分银行存款是否计入上市公司账上呢？", "reply": "查看原帖\n如果不设立合伙企业、信托等法律承认的主体，则本期员工持股计划资产与公司固有资产很可能还是混同的。如何保证持股计划资产的独立性，建议咨询律师意见。\n\n就账务处理而言，个人理解视同将激励股票直接登记到各激励对象名下，上市公司按照《企业会计准则解释第7号》第五条规定确认回购义务相关负债。股本的股东明细按照登记公司出具的相关证明文件进行披露。\n\n---\n\n查看原帖\n因为该资金进入上市公司账户，所以应列入上市公司报表中。", "searchText": "5497833 求助陈版主 辛苦了 最近更新 爬爬呀 2026-07-17t12:00:37.000z 2026-07-21t00:20:00.000z 特别感谢陈版主的很多指导，又有些问题想请教下陈版主：一上市公司a设立员工持股计划，方案约定“本计划的资产独立于公司的固有财产。公司不得侵占、挪用本期员工持股计划资产或以其他任何形式将本期员工持股计划资产与公司固有资产混同。”有几处疑问：\n\n像这种方案，公司并没有设立合伙企业，而是将自身的权益工具直接授予给员工，对于这几个阶段的账务处理是怎么样的呢？\n\n1、4月底收到员工认缴款入2026年员工持股平台计划专户；2、审计验资阶段(5月初)；3、中登过户，库存股登记到员工持股平台，员工持股平台计划专户转钱到上市公司一般户。前面这几个阶段的账务处理是怎么样的呢？\n\n4、感觉这个员工持股平台计划资金与上市公司资金都是计入了上市公司的账上，那么这个是否会导入员工持股计划资产与上市公司固有资产混同呢？像这种形式的员工持股计划，是以什么样的形式存在着呢，为何有些员工持股计划是以设立合伙企业的形式。一直没有搞得清楚员工持股计划与上市公司存在何种关系，涉及到不同情况的账务处理是怎么样的。\n\n---\n\n查看原帖\n继续追问下:“个人理解视同将激励股票直接登记到各激励对象名下”，具体是什么意思呢？收到认缴款时，这部分银行存款是否计入上市公司账上呢？ 查看原帖\n如果不设立合伙企业、信托等法律承认的主体，则本期员工持股计划资产与公司固有资产很可能还是混同的。如何保证持股计划资产的独立性，建议咨询律师意见。\n\n就账务处理而言，个人理解视同将激励股票直接登记到各激励对象名下，上市公司按照《企业会计准则解释第7号》第五条规定确认回购义务相关负债。股本的股东明细按照登记公司出具的相关证明文件进行披露。\n\n---\n\n查看原帖\n因为该资金进入上市公司账户，所以应列入上市公司报表中。 https://bbs.esnai.cn/thread-5497833-1-1.html"}, {"tid": "5497592", "title": "求助陈版，债务重组中债权人投资收益确认", "category": "最近更新", "questionAuthor": "sjy_0727", "questionTime": "2026-06-25T15:38:09.000Z", "replyTime": "2026-07-21T00:19:00.000Z", "replySortTime": "2026-07-21T00:19:00.000Z", "url": "https://bbs.esnai.cn/thread-5497592-1-1.html", "question": "请教陈版，A公司针对B公司的2700万应收账款已经全额单项计提坏账准备，通过诉讼和解达成新的协议，允许对方以2100万分三年分期归还债务，无逾期利息规定。请教陈版以下问题：（1）债权的终止确认：是否参考债务重组应用指南 五、债权和债务的终止确认 （二）修改其他条款，整体考虑是否对全部债权的合同条款作出了实质性修改，参考债务人的判断原则，未来现金流现值(2100-2700)/2700=-22.22%，22.22%>10%，判断存在实质性修改，终止确认原2700万债权，确认一项新的金融资产2100万（长期应收款列示？）；\n\n（2）债务重组的相关损益确认：如判断存在实质性修改，终止确认原债权，损益参照重组债权2100万-放弃债权的账面价值0=2100万确认投资收益？；\n\n（3）重组债权的坏账如何确认：出于谨慎性考虑，重组债权仍保持全额计提坏账的状态么？\n\n（4）如果不判定为存在实质性修改的话，重新计算该债权的账面余额2100万，差异-600万确认投资收益并冲回应收账款账面余额0万，相应当期坏账冲回600万？\n\n---\n\n查看原帖\n“对于豁免的600万元单独进行账务处理，与对应的已计提坏账准备对冲”，是否为借：应收账款-坏账准备 600万 贷：应收账款-原值 600万？", "reply": "查看原帖\n首先对于豁免的600万元单独进行账务处理，与对应的已计提坏账准备对冲；其次对于剩余的2100万元考虑其条款是否为实质性变更。由于原先应收账款的实际利率为零，故变更前后该2100万元的现值无实质性差异，不属于实质性修改。基于谨慎考虑，除非有证据表明B公司的偿债能力已有实质性的回升，否则建议保持原账面价值（零）不变，后续实际收到款项时转回坏账准备（或者有实质性证据后再转回坏账准备）。\n\n由于B公司的偿债能力很可能仍有重大不确定性，故不建议轻易转回已计提的坏账准备。\n\n---\n\n查看原帖\n是。", "searchText": "5497592 求助陈版，债务重组中债权人投资收益确认 最近更新 sjy_0727 2026-06-25t15:38:09.000z 2026-07-21t00:19:00.000z 请教陈版，a公司针对b公司的2700万应收账款已经全额单项计提坏账准备，通过诉讼和解达成新的协议，允许对方以2100万分三年分期归还债务，无逾期利息规定。请教陈版以下问题：（1）债权的终止确认：是否参考债务重组应用指南 五、债权和债务的终止确认 （二）修改其他条款，整体考虑是否对全部债权的合同条款作出了实质性修改，参考债务人的判断原则，未来现金流现值(2100-2700)/2700=-22.22%，22.22%>10%，判断存在实质性修改，终止确认原2700万债权，确认一项新的金融资产2100万（长期应收款列示？）；\n\n（2）债务重组的相关损益确认：如判断存在实质性修改，终止确认原债权，损益参照重组债权2100万-放弃债权的账面价值0=2100万确认投资收益？；\n\n（3）重组债权的坏账如何确认：出于谨慎性考虑，重组债权仍保持全额计提坏账的状态么？\n\n（4）如果不判定为存在实质性修改的话，重新计算该债权的账面余额2100万，差异-600万确认投资收益并冲回应收账款账面余额0万，相应当期坏账冲回600万？\n\n---\n\n查看原帖\n“对于豁免的600万元单独进行账务处理，与对应的已计提坏账准备对冲”，是否为借：应收账款-坏账准备 600万 贷：应收账款-原值 600万？ 查看原帖\n首先对于豁免的600万元单独进行账务处理，与对应的已计提坏账准备对冲；其次对于剩余的2100万元考虑其条款是否为实质性变更。由于原先应收账款的实际利率为零，故变更前后该2100万元的现值无实质性差异，不属于实质性修改。基于谨慎考虑，除非有证据表明b公司的偿债能力已有实质性的回升，否则建议保持原账面价值（零）不变，后续实际收到款项时转回坏账准备（或者有实质性证据后再转回坏账准备）。\n\n由于b公司的偿债能力很可能仍有重大不确定性，故不建议轻易转回已计提的坏账准备。\n\n---\n\n查看原帖\n是。 https://bbs.esnai.cn/thread-5497592-1-1.html"}, {"tid": "5468077", "title": "求助陈版：关于照付不议合同的账务处理", "category": "最近更新", "questionAuthor": "denghaifu", "questionTime": "2022-09-21T17:51:22.000Z", "replyTime": "2026-07-20T13:06:00.000Z", "replySortTime": "2026-07-20T13:06:00.000Z", "url": "https://bbs.esnai.cn/thread-5468077-1-1.html", "question": "甲公司与乙公司签订销售合同，合同规定，甲公司每年向乙公司销售天然气，协议规定，对于乙公司实际采购量小于计划量90%的部分执行照付不议，每年结算一次，对于当年的照付不议量可以在未来三年内使用。假设2020年乙公司计划采购量为10万吨，实际采购量为8万吨，每吨价格3000元，照付不议量为1万吨，2021年使用了这1万吨的照付不议量，针对这个照付不议的以下账务处理是否合适：\n\n1、2020年照付不议量确认收款全，应确认应收账款和合同负债：\n\n借：应收账款 3000元*8万=24000万元\n\n    贷：合同负债 24000万元\n\n2、2021年使用照付不议量时\n\n借：合同负债 24000万元\n\n    贷：营业收入 24000万元\n\n3、收款是：\n\n借：银行存款 24000万元\n\n    贷：应收账款 24000万元\n\n谢谢陈版\n\n---\n\n查看原帖\n对于照付不议这样的理解思路是否正确，辛苦陈版主多指导下，感谢：\n\n1、站在销售方的角度这种情况应参照“基于客户采购情况等给予的阶梯定价”作为可变对价处理，即估计整个交易年度（可能与日历年度不同）期间内对该客户的供气量，据此测算平均每方的实际销售价格。在中期报告期末，或者当结算年度不同于日历年度时的会计年度末，都应基于可变对价原则作出估计，确保遵循“极可能不会发生重大转回”的限制条件。交易年度结束时，根据实际情况对此前暂估的收入进行调整。\n\n2、站在采购方的角度，根据企业会计准则，公司按协议约定将次月的天然气采购款预付至卖方账户， 计入“预付账款”； 每月实际采购天然气时， 根据采购结算额冲减“预付账款”， 增加“存货”、“营业成本”； 在中期报告期末，或者当结算年度不同于日历年度时的会计年度末，都应基于实际采购情况作出估计， 如因自身原因很大可能未达到约定的“年净照付不议量”，触发“照付不议”条款， 则将损失对应部分的气款确认“存货”、“营业成本”进行计提处理；反之，应在双方最终结算确认后才将损失对应部分确认“存货”、“营业成本”。", "reply": "查看原帖\n分录金额是否有问题？既然存在照付不议安排，则在实际采购量未达到计划采购量的情况下，是否应按计划采购量的90%（9万吨）收款，同时把将于三年内交付的1万吨对应的价款确认为合同负债，后续履约交付时结转收入？\n\n---\n\n查看原帖\n一般可以这样理解。", "searchText": "5468077 求助陈版：关于照付不议合同的账务处理 最近更新 denghaifu 2022-09-21t17:51:22.000z 2026-07-20t13:06:00.000z 甲公司与乙公司签订销售合同，合同规定，甲公司每年向乙公司销售天然气，协议规定，对于乙公司实际采购量小于计划量90%的部分执行照付不议，每年结算一次，对于当年的照付不议量可以在未来三年内使用。假设2020年乙公司计划采购量为10万吨，实际采购量为8万吨，每吨价格3000元，照付不议量为1万吨，2021年使用了这1万吨的照付不议量，针对这个照付不议的以下账务处理是否合适：\n\n1、2020年照付不议量确认收款全，应确认应收账款和合同负债：\n\n借：应收账款 3000元*8万=24000万元\n\n    贷：合同负债 24000万元\n\n2、2021年使用照付不议量时\n\n借：合同负债 24000万元\n\n    贷：营业收入 24000万元\n\n3、收款是：\n\n借：银行存款 24000万元\n\n    贷：应收账款 24000万元\n\n谢谢陈版\n\n---\n\n查看原帖\n对于照付不议这样的理解思路是否正确，辛苦陈版主多指导下，感谢：\n\n1、站在销售方的角度这种情况应参照“基于客户采购情况等给予的阶梯定价”作为可变对价处理，即估计整个交易年度（可能与日历年度不同）期间内对该客户的供气量，据此测算平均每方的实际销售价格。在中期报告期末，或者当结算年度不同于日历年度时的会计年度末，都应基于可变对价原则作出估计，确保遵循“极可能不会发生重大转回”的限制条件。交易年度结束时，根据实际情况对此前暂估的收入进行调整。\n\n2、站在采购方的角度，根据企业会计准则，公司按协议约定将次月的天然气采购款预付至卖方账户， 计入“预付账款”； 每月实际采购天然气时， 根据采购结算额冲减“预付账款”， 增加“存货”、“营业成本”； 在中期报告期末，或者当结算年度不同于日历年度时的会计年度末，都应基于实际采购情况作出估计， 如因自身原因很大可能未达到约定的“年净照付不议量”，触发“照付不议”条款， 则将损失对应部分的气款确认“存货”、“营业成本”进行计提处理；反之，应在双方最终结算确认后才将损失对应部分确认“存货”、“营业成本”。 查看原帖\n分录金额是否有问题？既然存在照付不议安排，则在实际采购量未达到计划采购量的情况下，是否应按计划采购量的90%（9万吨）收款，同时把将于三年内交付的1万吨对应的价款确认为合同负债，后续履约交付时结转收入？\n\n---\n\n查看原帖\n一般可以这样理解。 https://bbs.esnai.cn/thread-5468077-1-1.html"}, {"tid": "5462770", "title": "矿业权出让收益会计处理", "category": "最近更新", "questionAuthor": "AK47M40", "questionTime": "2022-06-17T10:42:59.000Z", "replyTime": "2026-07-20T11:28:00.000Z", "replySortTime": "2026-07-20T11:28:00.000Z", "url": "https://bbs.esnai.cn/thread-5462770-1-1.html", "question": "请教陈版主，公司缴纳矿业权出让收益金，金额较大，应如何核算？计入无形资产、长期待摊？按几年摊销？\n\n---\n\n查看原帖\n根据2026年6月国家最新发布的《财政部 自然资源部 税务总局关于进一步完善矿业权出让收益征收有关工作的通知》财综〔2026〕25号，由于这部分出让收益金，站在企业一方是否考虑作为可变对价，是否可以参考《上市公司执行企业会计准则案例解析2024》之“案例5-03 以收取提成费方式许可使用无形资产的会计处理”？", "reply": "查看原帖\n一般是计入“无形资产——矿业权”的成本，后续摊销一般采用产量法。\n\n---\n\n查看原帖\n可以这样考虑。", "searchText": "5462770 矿业权出让收益会计处理 最近更新 ak47m40 2022-06-17t10:42:59.000z 2026-07-20t11:28:00.000z 请教陈版主，公司缴纳矿业权出让收益金，金额较大，应如何核算？计入无形资产、长期待摊？按几年摊销？\n\n---\n\n查看原帖\n根据2026年6月国家最新发布的《财政部 自然资源部 税务总局关于进一步完善矿业权出让收益征收有关工作的通知》财综〔2026〕25号，由于这部分出让收益金，站在企业一方是否考虑作为可变对价，是否可以参考《上市公司执行企业会计准则案例解析2024》之“案例5-03 以收取提成费方式许可使用无形资产的会计处理”？ 查看原帖\n一般是计入“无形资产——矿业权”的成本，后续摊销一般采用产量法。\n\n---\n\n查看原帖\n可以这样考虑。 https://bbs.esnai.cn/thread-5462770-1-1.html"}, {"tid": "5497659", "title": "求教陈版主和各位前辈老师，关于职工福利费的处理", "category": "最近更新", "questionAuthor": "tmtm123", "questionTime": "2026-07-01T10:51:02.000Z", "replyTime": "2026-07-19T11:27:00.000Z", "replySortTime": "2026-07-19T11:27:00.000Z", "url": "https://bbs.esnai.cn/thread-5497659-1-1.html", "question": "1、公司统一给职工租房，如果是短期外派租房就计入差旅费（全额扣除），长期异地任职就计入职工福利-非货币性福利；长期异地任职职工自己租房，凭票报销则计入职工福利-货币性福利。请问上述会计处理是否规范？以及这部分福利费实务中是否应并入工资总额计算个税。\n\n2、公司给职工购买的商业保险，会计上是不是要计入职工福利-非货币性福利？（不设置补充保险科目）这部分福利费是否要并入工资总额计算个税？\n\n叩谢陈版与各位大佬。\n\n---\n\n查看原帖\n叩谢陈版主，如果是公司对公支付为职工租房，是不是可以不计入工资总额，放在福利费列支呢？", "reply": "查看原帖\n“长期异地任职职工自己租房，凭票报销”的情形，可能需计入工资总额内，不能列入福利费。其税务处理也就相应不同。\n\n企业为职工购买商业保险，受益人为职工及其继承人的，应将保费支出计入工资，纳入个税计征范围。\n\n---\n\n查看原帖\n公司直接支付租金给房东，可作为福利费处理。", "searchText": "5497659 求教陈版主和各位前辈老师，关于职工福利费的处理 最近更新 tmtm123 2026-07-01t10:51:02.000z 2026-07-19t11:27:00.000z 1、公司统一给职工租房，如果是短期外派租房就计入差旅费（全额扣除），长期异地任职就计入职工福利-非货币性福利；长期异地任职职工自己租房，凭票报销则计入职工福利-货币性福利。请问上述会计处理是否规范？以及这部分福利费实务中是否应并入工资总额计算个税。\n\n2、公司给职工购买的商业保险，会计上是不是要计入职工福利-非货币性福利？（不设置补充保险科目）这部分福利费是否要并入工资总额计算个税？\n\n叩谢陈版与各位大佬。\n\n---\n\n查看原帖\n叩谢陈版主，如果是公司对公支付为职工租房，是不是可以不计入工资总额，放在福利费列支呢？ 查看原帖\n“长期异地任职职工自己租房，凭票报销”的情形，可能需计入工资总额内，不能列入福利费。其税务处理也就相应不同。\n\n企业为职工购买商业保险，受益人为职工及其继承人的，应将保费支出计入工资，纳入个税计征范围。\n\n---\n\n查看原帖\n公司直接支付租金给房东，可作为福利费处理。 https://bbs.esnai.cn/thread-5497659-1-1.html"}, {"tid": "5494265", "title": "母公司向子公司捐赠资产的会计及税务处理", "category": "最近更新", "questionAuthor": "姜姜jj", "questionTime": "2025-10-15T12:49:52.000Z", "replyTime": "2026-07-19T11:21:00.000Z", "replySortTime": "2026-07-19T11:21:00.000Z", "url": "https://bbs.esnai.cn/thread-5494265-1-1.html", "question": "查看原帖\n陈老师您好，母公司的生产线是0对价划转，对于母公司来说，是少了一项资产，确认长投就无法体现少了一项资产了，为什么要确认长投呢？谢谢！\n\n---\n\n查看原帖\n请问陈老师，如果母公司按交换不具有商业实质，按划出资产的原账面价值确认长期股权投资成本；\n\n同时，子公司按生产线不构成业务，按划出资产的公允价值入账；\n\n那之间的差额在合并抵消时应该如何处理？是否是借资本公积，贷固定资产？", "reply": "查看原帖\n母公司并未丧失对该资产的控制权，以该项资产对子公司进行资本性投入。\n\n---\n\n查看原帖\n是，可以这样处理。后续还要就两者账面价值的差异对折旧进行每年调整。", "searchText": "5494265 母公司向子公司捐赠资产的会计及税务处理 最近更新 姜姜jj 2025-10-15t12:49:52.000z 2026-07-19t11:21:00.000z 查看原帖\n陈老师您好，母公司的生产线是0对价划转，对于母公司来说，是少了一项资产，确认长投就无法体现少了一项资产了，为什么要确认长投呢？谢谢！\n\n---\n\n查看原帖\n请问陈老师，如果母公司按交换不具有商业实质，按划出资产的原账面价值确认长期股权投资成本；\n\n同时，子公司按生产线不构成业务，按划出资产的公允价值入账；\n\n那之间的差额在合并抵消时应该如何处理？是否是借资本公积，贷固定资产？ 查看原帖\n母公司并未丧失对该资产的控制权，以该项资产对子公司进行资本性投入。\n\n---\n\n查看原帖\n是，可以这样处理。后续还要就两者账面价值的差异对折旧进行每年调整。 https://bbs.esnai.cn/thread-5494265-1-1.html"}, {"tid": "5462089", "title": "求助陈版-证监会案例非同控合并少数股东持有的卖出期权个别报表会计处理", "category": "最近更新", "questionAuthor": "wx_5a60a720bf5b", "questionTime": "2022-06-01T12:29:33.000Z", "replyTime": "2026-07-19T11:19:00.000Z", "replySortTime": "2026-07-19T11:19:00.000Z", "url": "https://bbs.esnai.cn/thread-5462089-1-1.html", "question": "陈版好，\n\n根据《（2020年版）上市公司执行企业会计准则案例解析》的案例3-16 ：非同一控制下企业合并中少数股东持有的卖出期权的会计处理，合并报表的处理与陈版在问题4-1-13（控股股东授予子公司少数股东看跌期权（卖出期权）的处理）中的回复基本上一致。\n\n证监会案例中也提到了母公司个别报表的会计处理：在A上市公司个别财务报表中，子公司少数股东持有的卖出期权并未导致A公司承担回购自身权益工具的义务（因为在A公司个别报表中，不对子公司的少数股东权益进行核算），因此A公司无需在个别报表层面就卖出期权确认全额负债。该安排是A公司未来以约定价格购买子公司少数股权的一项衍生金融工具，应以该衍生工具的公允价值进行初始确认和后续计量。在确定卖出期权的公允价值时，需基于子公司少数股权的约定购买价格与少数股权的公允价值之间的差额，并综合考虑剩余行权期限、子公司股权价值的波动性等因素。\n\n想请教一下陈版：\n\n1）个别报表确认衍生金融负债，借方科目是什么？（包括合并报表确认和不确认少数股东权益的情况下）\n\n2）陈版是否认同证监会案例中所说的，个别报表应当以卖出期权的公允价值确认衍生金融负债，而不像合并报表中以回购所需支付金额的现值确认衍生金融负债。\n\n再次感谢陈版！\n\n---\n\n查看原帖\n继续追问一下，第一问，为何对方科目为长期股权投资，而不是交易性金融负债呢？对方科目计为长期股权投资或交易性金融负债，这两者适用于什么情况呢？\n\n---\n\n查看原帖\n为何有些授予的远期看跌期权，初始计入时，是计入交易性金融负债呢？有些不明白，为何有些初始计入是长期股权投资，有些是计入交易性金融负债？\n\n---\n\n查看原帖\n继续追问一下，1、本贴中个别报表确认长期股权投资的金额是多少呢？为何合并报表确认和不确认少数股东权益的情况下，个别报表中的借方科目都是长期股权投资呢？\n\n2、下方贴中，初始是不进行任何的会计处理，后续会计分录是借：公允价值变动损益 贷：衍生金融负债。辛苦陈版主解释一下，这下方贴子与本贴的回复是否存在区别。\n\n请教陈版主：关于向少数股东签发的看跌期权，会计分录问题问题\n\nhttps://bbs.esnai.cn/thread-5492941-1-1.html\n\n(出处: 中国会计视野论坛)\n\n---\n\n查看原帖\n是否是这样的来进行理解：母公司个别报表层面确认的衍生金融负债，1、初始计量金额一般为零；2、后续确认公允价值变动损益，即借：公允价值变动损益 贷：衍生金融负债；3、到实际完成收购时，借：长期股权投资  投资收益（差额）贷：衍生金融负债？", "reply": "查看原帖\n1、个别报表层面，确认与签出卖出期权相关的衍生金融负债，对应科目应为长期股权投资（即调整新取得的对子公司长期股权投资的入账价值）。\n\n2、赞同证监会书中的意见。我们日常也都是这样处理的。\n\n---\n\n查看原帖\n初始确认时，该项目的金额作为取得投资的成本，调整长期股权投资账面价值，后续变动就正常计入损益处理了。\n\n---\n\n查看原帖\n这是同一笔分录的借贷双方，并不矛盾。\n\n---\n\n查看原帖\n母公司个别报表层面确认的衍生金融负债，初始计量金额一般为零，后续确认公允价值变动损益，到实际完成收购时，按届时该项衍生金融负债的账面价值反向调整（贷记）因收购少数股权所形成长投的账面价值。\n\n---\n\n查看原帖\n一般可以这样理解，但如果衍生金融负债一直保持严格的公允价值计量，则理论上最后一步应该直接可以以衍生金融负债的账面价值调整长投入账价值，无需要特殊处理的差额。", "searchText": "5462089 求助陈版-证监会案例非同控合并少数股东持有的卖出期权个别报表会计处理 最近更新 wx_5a60a720bf5b 2022-06-01t12:29:33.000z 2026-07-19t11:19:00.000z 陈版好，\n\n根据《（2020年版）上市公司执行企业会计准则案例解析》的案例3-16 ：非同一控制下企业合并中少数股东持有的卖出期权的会计处理，合并报表的处理与陈版在问题4-1-13（控股股东授予子公司少数股东看跌期权（卖出期权）的处理）中的回复基本上一致。\n\n证监会案例中也提到了母公司个别报表的会计处理：在a上市公司个别财务报表中，子公司少数股东持有的卖出期权并未导致a公司承担回购自身权益工具的义务（因为在a公司个别报表中，不对子公司的少数股东权益进行核算），因此a公司无需在个别报表层面就卖出期权确认全额负债。该安排是a公司未来以约定价格购买子公司少数股权的一项衍生金融工具，应以该衍生工具的公允价值进行初始确认和后续计量。在确定卖出期权的公允价值时，需基于子公司少数股权的约定购买价格与少数股权的公允价值之间的差额，并综合考虑剩余行权期限、子公司股权价值的波动性等因素。\n\n想请教一下陈版：\n\n1）个别报表确认衍生金融负债，借方科目是什么？（包括合并报表确认和不确认少数股东权益的情况下）\n\n2）陈版是否认同证监会案例中所说的，个别报表应当以卖出期权的公允价值确认衍生金融负债，而不像合并报表中以回购所需支付金额的现值确认衍生金融负债。\n\n再次感谢陈版！\n\n---\n\n查看原帖\n继续追问一下，第一问，为何对方科目为长期股权投资，而不是交易性金融负债呢？对方科目计为长期股权投资或交易性金融负债，这两者适用于什么情况呢？\n\n---\n\n查看原帖\n为何有些授予的远期看跌期权，初始计入时，是计入交易性金融负债呢？有些不明白，为何有些初始计入是长期股权投资，有些是计入交易性金融负债？\n\n---\n\n查看原帖\n继续追问一下，1、本贴中个别报表确认长期股权投资的金额是多少呢？为何合并报表确认和不确认少数股东权益的情况下，个别报表中的借方科目都是长期股权投资呢？\n\n2、下方贴中，初始是不进行任何的会计处理，后续会计分录是借：公允价值变动损益 贷：衍生金融负债。辛苦陈版主解释一下，这下方贴子与本贴的回复是否存在区别。\n\n请教陈版主：关于向少数股东签发的看跌期权，会计分录问题问题\n\nhttps://bbs.esnai.cn/thread-5492941-1-1.html\n\n(出处: 中国会计视野论坛)\n\n---\n\n查看原帖\n是否是这样的来进行理解：母公司个别报表层面确认的衍生金融负债，1、初始计量金额一般为零；2、后续确认公允价值变动损益，即借：公允价值变动损益 贷：衍生金融负债；3、到实际完成收购时，借：长期股权投资  投资收益（差额）贷：衍生金融负债？ 查看原帖\n1、个别报表层面，确认与签出卖出期权相关的衍生金融负债，对应科目应为长期股权投资（即调整新取得的对子公司长期股权投资的入账价值）。\n\n2、赞同证监会书中的意见。我们日常也都是这样处理的。\n\n---\n\n查看原帖\n初始确认时，该项目的金额作为取得投资的成本，调整长期股权投资账面价值，后续变动就正常计入损益处理了。\n\n---\n\n查看原帖\n这是同一笔分录的借贷双方，并不矛盾。\n\n---\n\n查看原帖\n母公司个别报表层面确认的衍生金融负债，初始计量金额一般为零，后续确认公允价值变动损益，到实际完成收购时，按届时该项衍生金融负债的账面价值反向调整（贷记）因收购少数股权所形成长投的账面价值。\n\n---\n\n查看原帖\n一般可以这样理解，但如果衍生金融负债一直保持严格的公允价值计量，则理论上最后一步应该直接可以以衍生金融负债的账面价值调整长投入账价值，无需要特殊处理的差额。 https://bbs.esnai.cn/thread-5462089-1-1.html"}, {"tid": "5497614", "title": "急急急 求助陈版主", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2026-06-26T21:15:43.000Z", "replyTime": "2026-07-19T11:16:00.000Z", "replySortTime": "2026-07-19T11:16:00.000Z", "url": "https://bbs.esnai.cn/thread-5497614-1-1.html", "question": "陈版主好，有个问题想请教一下，案例背景是这样的：\n\nA公司对外销售空调，由于近年来房地产业务萎靡，房地产客户资金断缺，导致这部分的应收账款难以收回。为了解决这一问题，故打算实施债务重组，以房抵债。\n\nA公司、A公司之子公司B公司(之前并非从事房地产业务，考虑到债务重组的需求，A公司想让以房抵债这部分的房产业务与原本的空调业务风险隔离，变更了营业执照的范围，新增了房地产业务内容)、A公司之房地产客户签订协议。\n\n大概有两种方案情况如下，其中方案一：协议约定，A方同意购买房地产公司所开发之房产并指定B公司作为实际购房人，该购房款全部或者部分由房地产代A公司或B公司向房产销售公司支付,房地产代付已抵扣购房款部分与合同之约定材料款等额抵扣。各方同意由A公司以及B公司购买相关房产，由A公司方及B公司连带承担购房款的支付义务，并以B公司名义签署购买房产的《商品房买卖合同》及其相关文件,并同意在结算材料款确定后房产销售公司确认购房款已经付清情况下房产产权归B公司所有。\n\n   如A公司对客户应收账款-原值5，应收账款-坏账准备3；客户准备以房抵债，如工抵房签订时的协议价格为1、评估价为0.5。有以下几点疑问：1、实际存货入账是按哪个金额呢？由于客户到时开具发票也是根据协议价格来的，如果根据评估价来入账，评估价与协议价的这部分的税费差异如何处理呢？2、由于对客户是按单项计提坏账准备的，后转为其他应收款-B公司，是按账龄组合法计提坏账准备的，那么这部分的差异是计入信用减值损失是否合理呢？因为A公司对B公司这部分的其他应收款挂账，主要就是工抵房业务，A公司客户坏账导致的，B公司无力偿还对A公司的其他应付款，那么在A 公司单体层面、B公司层面以及合并层面如何处理呢？ 3、A公司挂账其他应收款-B公司是否还需要单独签订相关的借款协议呢？约定借款期限、借款利率等事项呢？4、下列的分录总感觉有点怪怪的，恳请陈版主多指点下，以及对于B公司账务处理有个差额计入什么科目较为合适呢？\n\nA公司：借：其他应收款-B公司 5\n\n             应收账款-坏账准备  3\n\n            贷：应收账款-原值（客户）5\n\n                信用减值损失   3\n\nB公司：借：存货-0.5\n\n            应交税费-应交增值税（进项税额）1*税率（9%）0.09\n\n            差额计入什么科目呢？\n\n           贷：其他应付款-A公司5\n\n方案二： A公司对客户应收账款-原值5，应收账款-坏账准备3；客户先把钱2打给A公司，然后需要B公司、房地产客户直接签订房屋买售协议，即B公司直接从房地产客户购入房产，又需要把A公司收到的2，以支付房款的名义支付给客户，假如房屋买售协议价格为2、评估价为1。疑问：1、A 公司单体层面、B公司层面以及合并层面对于这笔现金流如何列示？2、实际存货入账如果根据评估价来入账，由于客户到时开具发票也是根据协议价格来的，如果根据评估价来入账，评估价与协议价的这部分的税费差异如何处理呢？3、下列的分录总感觉有点怪怪的，恳请陈版主多指点下，以及对于B公司账务处理有个差额计入什么科目较为合适呢？\n\nA公司：借：银行存款2\n\n                     应收账款-坏账准备 3\n\n贷：应收账款-原值（客户）5\n\n  借：其他应收款-B公司  2\n\n            贷：银行存款   2\n\nB公司：\n\n        借：银行存款   2\n\n           贷：其他应付款-A公司2\n\n         借：存货 1\n\n                应交税费-应交增值税（进项税额）1*税率（9%）0.09\n\n            差额计入什么科目呢？\n\n           贷：银行存款 2\n\n特别希望陈版主能够多加详细指导下，这个问题已经困扰我很久了，叩谢！\n\n---\n\n查看原帖\n继续追问下，希望陈版主再多加指导下：\n\n针对方案一：1、如果根据评估价来入账，评估价与协议价的这部分的税费差异是否计入营业外支出或是管理费用，如果计入信用减值损失，这样会导致坏账准备不勾稽；2、由于对客户是按单项计提坏账准备的，后转为其他应收款-B公司，是按账龄组合法计提坏账准备的，那么这部分的差异是否直接计入投资收益-以摊余成本计量的金融资产终止确认；3、A公司挂账其他应收款-B公司是否还需要单独签订相关的借款协议呢？约定借款期限、借款利率等事项呢？4、A公司挂账其他应收款-B公司的款项性质注明为什么较为合适呢？\n\n针对方案二：1、A公司单体层面收到2时，计入“销售商品、提供劳务所收到的现金”，支付2给A公司时，计入”支付其他与经营活动有关的现金“；B公司单体层面收到A公司2时，计入”收到其他与经营活动有关的现金“，购买房屋计入存货时，计入“采购商品、购买劳务所支付的现金”。合并层面将A、B公司内部的“收到其他与经营活动有关的现金“与”支付其他与经营活动有关的现金“ 这两笔现金流直接抵销即可；\n\n---\n\n查看原帖\n继续追问一下：\n\n1、针对方案二再补充说明下：A公司的房地产客户先把原挂账应收账款部分或是全部回款转给A公司，A公司转给B公司，随后B公司以购买房款的名义支付给房地产客户。资金流走向：房地产客户——A公司——B公司——房地产客户。现金流这样处理应该没有问题吧：即A公司单体层面：收到房地产客户转账时，计入“销售商品、提供劳务收到的现金”，随后支付给B公司时，计入“支付的其他与经营活动有关的现金”；\n\nB公司单体层面：收到A公司转账时，计入“收到的其他与经营活动有关的现金”，购买房屋计入存货时，计入“购买商品、接受劳务支付的现金”；\n\n合并层面：将A公司、B公司内部的“收到的其他与经营活动有关的现金”与“支付的其他与经营活动有关的现金” 这两笔现金流直接抵销即可。\n\n2、差异直接计入投资收益-以摊余成本计量的金融资产终止确认，是否作为经常性损益呢？\n\n---\n\n查看原帖\n针对第一问，继续追问下:为何不直接按4入账，计入存货，而是按5计入，同时确认一笔资产减值损失呢？", "reply": "查看原帖\n方案一：1、实际存货入账价值为协议价和评估值孰低。评估值低于协议价的差额确认为额外的信用减值损失。\n\n2、由于债务人改变，相当于对原债权通过以房抵债安排已经终止确认，对B的代垫购房款（内部往来）是一项新的债权，故新老债权的坏账准备差额不应通过信用减值损失调整，而是体现在原债权的终止确认损益中。\n\n如果预计B公司在可预见的未来不会偿还对A公司的欠款，则该笔代垫购房款事实上构成了A对B的长期权益性投资，应确认为长期应收款，但在计提损失准备时与A对B的长期股权投资作为一个整体考虑。\n\nB公司分录中的差额调整权益（资本公积）。\n\n方案二：虽然有现金过手，但交易实质与方案一无实质差异，过手现金流作为收到/支付其他与经营活动有关的现金处理（会计分录按代收代付，通过往来核算，不作为对原债权的结算）。也不影响对抵债房产的计量。\n\n---\n\n查看原帖\n1、税费差异可以计入营业外支出或管理费用。2、是。3、根据A的内部管理制度确定。4、和一般内部往来无本质区别。\n\n---\n\n查看原帖\n1、可以这样理解。2、可以列入经常性损益。\n\n---\n\n查看原帖\n公允价值（入账价值）是取交易协议达成日的公允价值，还是实际交割日的公允价值，这两者一直存在一定争议。此处采用的是协议达成日的公允价值，后续公允价值如下跌则确认减值损失。", "searchText": "5497614 急急急 求助陈版主 最近更新 爬爬呀 2026-06-26t21:15:43.000z 2026-07-19t11:16:00.000z 陈版主好，有个问题想请教一下，案例背景是这样的：\n\na公司对外销售空调，由于近年来房地产业务萎靡，房地产客户资金断缺，导致这部分的应收账款难以收回。为了解决这一问题，故打算实施债务重组，以房抵债。\n\na公司、a公司之子公司b公司(之前并非从事房地产业务，考虑到债务重组的需求，a公司想让以房抵债这部分的房产业务与原本的空调业务风险隔离，变更了营业执照的范围，新增了房地产业务内容)、a公司之房地产客户签订协议。\n\n大概有两种方案情况如下，其中方案一：协议约定，a方同意购买房地产公司所开发之房产并指定b公司作为实际购房人，该购房款全部或者部分由房地产代a公司或b公司向房产销售公司支付,房地产代付已抵扣购房款部分与合同之约定材料款等额抵扣。各方同意由a公司以及b公司购买相关房产，由a公司方及b公司连带承担购房款的支付义务，并以b公司名义签署购买房产的《商品房买卖合同》及其相关文件,并同意在结算材料款确定后房产销售公司确认购房款已经付清情况下房产产权归b公司所有。\n\n   如a公司对客户应收账款-原值5，应收账款-坏账准备3；客户准备以房抵债，如工抵房签订时的协议价格为1、评估价为0.5。有以下几点疑问：1、实际存货入账是按哪个金额呢？由于客户到时开具发票也是根据协议价格来的，如果根据评估价来入账，评估价与协议价的这部分的税费差异如何处理呢？2、由于对客户是按单项计提坏账准备的，后转为其他应收款-b公司，是按账龄组合法计提坏账准备的，那么这部分的差异是计入信用减值损失是否合理呢？因为a公司对b公司这部分的其他应收款挂账，主要就是工抵房业务，a公司客户坏账导致的，b公司无力偿还对a公司的其他应付款，那么在a 公司单体层面、b公司层面以及合并层面如何处理呢？ 3、a公司挂账其他应收款-b公司是否还需要单独签订相关的借款协议呢？约定借款期限、借款利率等事项呢？4、下列的分录总感觉有点怪怪的，恳请陈版主多指点下，以及对于b公司账务处理有个差额计入什么科目较为合适呢？\n\na公司：借：其他应收款-b公司 5\n\n             应收账款-坏账准备  3\n\n            贷：应收账款-原值（客户）5\n\n                信用减值损失   3\n\nb公司：借：存货-0.5\n\n            应交税费-应交增值税（进项税额）1*税率（9%）0.09\n\n            差额计入什么科目呢？\n\n           贷：其他应付款-a公司5\n\n方案二： a公司对客户应收账款-原值5，应收账款-坏账准备3；客户先把钱2打给a公司，然后需要b公司、房地产客户直接签订房屋买售协议，即b公司直接从房地产客户购入房产，又需要把a公司收到的2，以支付房款的名义支付给客户，假如房屋买售协议价格为2、评估价为1。疑问：1、a 公司单体层面、b公司层面以及合并层面对于这笔现金流如何列示？2、实际存货入账如果根据评估价来入账，由于客户到时开具发票也是根据协议价格来的，如果根据评估价来入账，评估价与协议价的这部分的税费差异如何处理呢？3、下列的分录总感觉有点怪怪的，恳请陈版主多指点下，以及对于b公司账务处理有个差额计入什么科目较为合适呢？\n\na公司：借：银行存款2\n\n                     应收账款-坏账准备 3\n\n贷：应收账款-原值（客户）5\n\n  借：其他应收款-b公司  2\n\n            贷：银行存款   2\n\nb公司：\n\n        借：银行存款   2\n\n           贷：其他应付款-a公司2\n\n         借：存货 1\n\n                应交税费-应交增值税（进项税额）1*税率（9%）0.09\n\n            差额计入什么科目呢？\n\n           贷：银行存款 2\n\n特别希望陈版主能够多加详细指导下，这个问题已经困扰我很久了，叩谢！\n\n---\n\n查看原帖\n继续追问下，希望陈版主再多加指导下：\n\n针对方案一：1、如果根据评估价来入账，评估价与协议价的这部分的税费差异是否计入营业外支出或是管理费用，如果计入信用减值损失，这样会导致坏账准备不勾稽；2、由于对客户是按单项计提坏账准备的，后转为其他应收款-b公司，是按账龄组合法计提坏账准备的，那么这部分的差异是否直接计入投资收益-以摊余成本计量的金融资产终止确认；3、a公司挂账其他应收款-b公司是否还需要单独签订相关的借款协议呢？约定借款期限、借款利率等事项呢？4、a公司挂账其他应收款-b公司的款项性质注明为什么较为合适呢？\n\n针对方案二：1、a公司单体层面收到2时，计入“销售商品、提供劳务所收到的现金”，支付2给a公司时，计入”支付其他与经营活动有关的现金“；b公司单体层面收到a公司2时，计入”收到其他与经营活动有关的现金“，购买房屋计入存货时，计入“采购商品、购买劳务所支付的现金”。合并层面将a、b公司内部的“收到其他与经营活动有关的现金“与”支付其他与经营活动有关的现金“ 这两笔现金流直接抵销即可；\n\n---\n\n查看原帖\n继续追问一下：\n\n1、针对方案二再补充说明下：a公司的房地产客户先把原挂账应收账款部分或是全部回款转给a公司，a公司转给b公司，随后b公司以购买房款的名义支付给房地产客户。资金流走向：房地产客户——a公司——b公司——房地产客户。现金流这样处理应该没有问题吧：即a公司单体层面：收到房地产客户转账时，计入“销售商品、提供劳务收到的现金”，随后支付给b公司时，计入“支付的其他与经营活动有关的现金”；\n\nb公司单体层面：收到a公司转账时，计入“收到的其他与经营活动有关的现金”，购买房屋计入存货时，计入“购买商品、接受劳务支付的现金”；\n\n合并层面：将a公司、b公司内部的“收到的其他与经营活动有关的现金”与“支付的其他与经营活动有关的现金” 这两笔现金流直接抵销即可。\n\n2、差异直接计入投资收益-以摊余成本计量的金融资产终止确认，是否作为经常性损益呢？\n\n---\n\n查看原帖\n针对第一问，继续追问下:为何不直接按4入账，计入存货，而是按5计入，同时确认一笔资产减值损失呢？ 查看原帖\n方案一：1、实际存货入账价值为协议价和评估值孰低。评估值低于协议价的差额确认为额外的信用减值损失。\n\n2、由于债务人改变，相当于对原债权通过以房抵债安排已经终止确认，对b的代垫购房款（内部往来）是一项新的债权，故新老债权的坏账准备差额不应通过信用减值损失调整，而是体现在原债权的终止确认损益中。\n\n如果预计b公司在可预见的未来不会偿还对a公司的欠款，则该笔代垫购房款事实上构成了a对b的长期权益性投资，应确认为长期应收款，但在计提损失准备时与a对b的长期股权投资作为一个整体考虑。\n\nb公司分录中的差额调整权益（资本公积）。\n\n方案二：虽然有现金过手，但交易实质与方案一无实质差异，过手现金流作为收到/支付其他与经营活动有关的现金处理（会计分录按代收代付，通过往来核算，不作为对原债权的结算）。也不影响对抵债房产的计量。\n\n---\n\n查看原帖\n1、税费差异可以计入营业外支出或管理费用。2、是。3、根据a的内部管理制度确定。4、和一般内部往来无本质区别。\n\n---\n\n查看原帖\n1、可以这样理解。2、可以列入经常性损益。\n\n---\n\n查看原帖\n公允价值（入账价值）是取交易协议达成日的公允价值，还是实际交割日的公允价值，这两者一直存在一定争议。此处采用的是协议达成日的公允价值，后续公允价值如下跌则确认减值损失。 https://bbs.esnai.cn/thread-5497614-1-1.html"}, {"tid": "5497806", "title": "商业承兑汇票在合并报表列示", "category": "最近更新", "questionAuthor": "半斤八两好", "questionTime": "2026-07-15T12:00:31.000Z", "replyTime": "2026-07-19T10:41:00.000Z", "replySortTime": "2026-07-19T10:41:00.000Z", "url": "https://bbs.esnai.cn/thread-5497806-1-1.html", "question": "陈版您好：\n\n母子公司发生真实的购销业务，母公司自子公司购买100万商品，并对外销售完毕。母公司支付子公司100万商业承兑汇票，出票人、承兑人均为母公司，子公司收到票据后向银行卖断式贴现，并受到现金100万。\n\n年底合并报表中，母公司账面的100万应付票据，是列示在应付票据-商业承兑汇票，还是列示在短期借款 合适？\n\n我理解，从合并角度看，是一笔融资，放短期借款更合适。", "reply": "查看原帖\n合并报表层面，应按贴现款确认为一项短期借款，贴现息在票据存续期内摊销，计入各期的财务费用——利息支出。资产负债表中按照贴现净额（票面金额减去贴现息）作为短期借款的初始计量金额，后续票据到期时的兑付作为该笔短期借款的到期还本付息处理。对应的现金流量，在合并现金流量表中分别作为“取得借款收到的现金”和“偿还债务支付的现金”。", "searchText": "5497806 商业承兑汇票在合并报表列示 最近更新 半斤八两好 2026-07-15t12:00:31.000z 2026-07-19t10:41:00.000z 陈版您好：\n\n母子公司发生真实的购销业务，母公司自子公司购买100万商品，并对外销售完毕。母公司支付子公司100万商业承兑汇票，出票人、承兑人均为母公司，子公司收到票据后向银行卖断式贴现，并受到现金100万。\n\n年底合并报表中，母公司账面的100万应付票据，是列示在应付票据-商业承兑汇票，还是列示在短期借款 合适？\n\n我理解，从合并角度看，是一笔融资，放短期借款更合适。 查看原帖\n合并报表层面，应按贴现款确认为一项短期借款，贴现息在票据存续期内摊销，计入各期的财务费用——利息支出。资产负债表中按照贴现净额（票面金额减去贴现息）作为短期借款的初始计量金额，后续票据到期时的兑付作为该笔短期借款的到期还本付息处理。对应的现金流量，在合并现金流量表中分别作为“取得借款收到的现金”和“偿还债务支付的现金”。 https://bbs.esnai.cn/thread-5497806-1-1.html"}, {"tid": "5497805", "title": "请教陈版，含税总价不变的租赁，租赁期内增值税税率发生变动的处理", "category": "最近更新", "questionAuthor": "Cynthiaxxx", "questionTime": "2026-07-15T12:00:30.000Z", "replyTime": "2026-07-19T10:13:00.000Z", "replySortTime": "2026-07-19T10:13:00.000Z", "url": "https://bbs.esnai.cn/thread-5497805-1-1.html", "question": "请教陈版，公司有一个租赁，与出租方签订的合同，约定的租金为含税总价。\n\n租赁期内，出租方由小规模纳税人变为一般纳税人，增值税税率发生了变化，导致不含税租金发生变化。\n\n由于租赁付款额为不含税金额，这种情况下的不含税租金变动，应怎么处理。", "reply": "查看原帖\n租赁期内，因出租人由小规模纳税人变为一般纳税人，导致不含税租金发生变化的，承租人应按租赁准则第二十九条规定（租赁变更不构成新的单独租赁）的规定处理。按照变更日的折现率对剩余租赁期内新的不含税租金进行折现，据此调整使用权资产和租赁负债。", "searchText": "5497805 请教陈版，含税总价不变的租赁，租赁期内增值税税率发生变动的处理 最近更新 cynthiaxxx 2026-07-15t12:00:30.000z 2026-07-19t10:13:00.000z 请教陈版，公司有一个租赁，与出租方签订的合同，约定的租金为含税总价。\n\n租赁期内，出租方由小规模纳税人变为一般纳税人，增值税税率发生了变化，导致不含税租金发生变化。\n\n由于租赁付款额为不含税金额，这种情况下的不含税租金变动，应怎么处理。 查看原帖\n租赁期内，因出租人由小规模纳税人变为一般纳税人，导致不含税租金发生变化的，承租人应按租赁准则第二十九条规定（租赁变更不构成新的单独租赁）的规定处理。按照变更日的折现率对剩余租赁期内新的不含税租金进行折现，据此调整使用权资产和租赁负债。 https://bbs.esnai.cn/thread-5497805-1-1.html"}, {"tid": "5497797", "title": "关于“承贴通”业务在单体及合并报表中的列示与现金流量归属问题", "category": "最近更新", "questionAuthor": "她笑呀", "questionTime": "2026-07-14T12:00:30.000Z", "replyTime": "2026-07-19T10:11:00.000Z", "replySortTime": "2026-07-19T10:11:00.000Z", "url": "https://bbs.esnai.cn/thread-5497797-1-1.html", "question": "现就母公司办理的“承贴通”业务，向前辈们请教其在财务报表层面的列示及现金流划分问题，具体业务背景如下：\n\n业务概况：\n\n母公司通过招商银行办理“承贴通”项下的票据贴现业务，并将贴现所得款项中的1000万元支付给子公司。该业务涉及保证金200万元，并产生贴现利息费用7万元。\n\n当前财务处理：\n\n母公司单体报表：\n\n应付票据：1,000万元\n\n其他货币资金（受限）：200万元\n\n财务费用-利息支出：7万元\n\n子公司单体报表：\n\n银行存款（收到的款项）：1,000万元\n\n现金流量表：列示为“销售商品、提供劳务收到的现金”\n\n合并报表（初步判断）：\n\n应付票据：1,000万元（合并层面应付外部银行）\n\n核心疑问：\n\n单体报表层面：上述母公司及子公司的会计处理和现金流分类是否准确？如有偏差，应如何调整？\n\n合并报表层面：除应付票据外，合并资产负债表中的其他项目（如货币资金、财务费用）应如何抵销或重分类？\n\n合并现金流量表：该笔业务在合并层面应如何列示？是体现为“取得借款收到的现金”，还是需与其他项目（如内部往来）进行抵销调整？", "reply": "查看原帖\n请说明：\n\n1、该子公司是否为持票人？相应的票据是银行承兑汇票还是商业承兑汇票？如果是银行承兑汇票，则承兑行是谁？占用谁在银行的授信额度？\n\n2、子公司是否符合票据贴现的终止确认条件？\n\n但无论个别报表层面如何处理，在母公司的合并报表层面，该交易都相当于获得一笔短期借款，金额为贴现款净额（扣除贴现息），所以在合并报表层面按贴现款净额列作短期借款；贴现息在票据存续期间分摊计入各期的财务费用——利息支出。票据的到期兑付作为该项短期借款的还本付息处理，相应地现金流在合并现金流量表中均属于筹资活动。", "searchText": "5497797 关于“承贴通”业务在单体及合并报表中的列示与现金流量归属问题 最近更新 她笑呀 2026-07-14t12:00:30.000z 2026-07-19t10:11:00.000z 现就母公司办理的“承贴通”业务，向前辈们请教其在财务报表层面的列示及现金流划分问题，具体业务背景如下：\n\n业务概况：\n\n母公司通过招商银行办理“承贴通”项下的票据贴现业务，并将贴现所得款项中的1000万元支付给子公司。该业务涉及保证金200万元，并产生贴现利息费用7万元。\n\n当前财务处理：\n\n母公司单体报表：\n\n应付票据：1,000万元\n\n其他货币资金（受限）：200万元\n\n财务费用-利息支出：7万元\n\n子公司单体报表：\n\n银行存款（收到的款项）：1,000万元\n\n现金流量表：列示为“销售商品、提供劳务收到的现金”\n\n合并报表（初步判断）：\n\n应付票据：1,000万元（合并层面应付外部银行）\n\n核心疑问：\n\n单体报表层面：上述母公司及子公司的会计处理和现金流分类是否准确？如有偏差，应如何调整？\n\n合并报表层面：除应付票据外，合并资产负债表中的其他项目（如货币资金、财务费用）应如何抵销或重分类？\n\n合并现金流量表：该笔业务在合并层面应如何列示？是体现为“取得借款收到的现金”，还是需与其他项目（如内部往来）进行抵销调整？ 查看原帖\n请说明：\n\n1、该子公司是否为持票人？相应的票据是银行承兑汇票还是商业承兑汇票？如果是银行承兑汇票，则承兑行是谁？占用谁在银行的授信额度？\n\n2、子公司是否符合票据贴现的终止确认条件？\n\n但无论个别报表层面如何处理，在母公司的合并报表层面，该交易都相当于获得一笔短期借款，金额为贴现款净额（扣除贴现息），所以在合并报表层面按贴现款净额列作短期借款；贴现息在票据存续期间分摊计入各期的财务费用——利息支出。票据的到期兑付作为该项短期借款的还本付息处理，相应地现金流在合并现金流量表中均属于筹资活动。 https://bbs.esnai.cn/thread-5497797-1-1.html"}, {"tid": "5497796", "title": "投资性房地产计量与合并报表会计政策统一的问题", "category": "最近更新", "questionAuthor": "752067050", "questionTime": "2026-07-14T12:00:30.000Z", "replyTime": "2026-07-19T10:04:00.000Z", "replySortTime": "2026-07-19T10:04:00.000Z", "url": "https://bbs.esnai.cn/thread-5497796-1-1.html", "question": "陈版您好，向您请教一个投资性房地产计量与合并报表会计政策统一的问题，烦请解惑：\nA 公司原对投资性房地产采用公允价值模式进行后续计量。本年6 月，B 公司收购A 公司股权并取得控制权，该交易属于非同一控制下企业合并。B 公司自身对投资性房地产采用成本模式计量，目前集团为统一核算政策，要求A 公司单体层面将投资性房地产的计量模式由公允价值转为成本模式。\n我们的基础判断是：根据《企业会计准则第3 号 —— 投资性房地产》的明确规定，已采用公允价值模式计量的投资性房地产，不得从公允价值模式转为成本模式，因此A 公司个别报表层面不能变更该项会计政策。\n我们理解的合规处理路径是：\nA 公司个别财务报表：继续维持投资性房地产的公允价值计量模式，不做会计政策变更。\nB 公司合并财务报表：基于合并报表统一会计政策的法定要求，将A 公司的投资性房地产调整为成本模式计量。具体以购买日该项投资性房地产的公允价值作为合并层面的初始入账成本，同时以购买日为基准重新评估其剩余使用寿命、预计净残值，以此作为合并层面计提折旧的依据；后续编制合并报表时，抵销A 公司单体确认的公允价值变动损益，并补提对应期间的折旧。\n想向您确认上述处理思路是否准确？ \n谢谢陈版！", "reply": "查看原帖\n赞同主帖的处理意见。A公司自身作为延续的会计主体，不能将公允价值模式转回成本模式；B公司合并报表层面可以以购买日公允价值为成本基础，采用成本模式进行后续计量。", "searchText": "5497796 投资性房地产计量与合并报表会计政策统一的问题 最近更新 752067050 2026-07-14t12:00:30.000z 2026-07-19t10:04:00.000z 陈版您好，向您请教一个投资性房地产计量与合并报表会计政策统一的问题，烦请解惑：\na 公司原对投资性房地产采用公允价值模式进行后续计量。本年6 月，b 公司收购a 公司股权并取得控制权，该交易属于非同一控制下企业合并。b 公司自身对投资性房地产采用成本模式计量，目前集团为统一核算政策，要求a 公司单体层面将投资性房地产的计量模式由公允价值转为成本模式。\n我们的基础判断是：根据《企业会计准则第3 号 —— 投资性房地产》的明确规定，已采用公允价值模式计量的投资性房地产，不得从公允价值模式转为成本模式，因此a 公司个别报表层面不能变更该项会计政策。\n我们理解的合规处理路径是：\na 公司个别财务报表：继续维持投资性房地产的公允价值计量模式，不做会计政策变更。\nb 公司合并财务报表：基于合并报表统一会计政策的法定要求，将a 公司的投资性房地产调整为成本模式计量。具体以购买日该项投资性房地产的公允价值作为合并层面的初始入账成本，同时以购买日为基准重新评估其剩余使用寿命、预计净残值，以此作为合并层面计提折旧的依据；后续编制合并报表时，抵销a 公司单体确认的公允价值变动损益，并补提对应期间的折旧。\n想向您确认上述处理思路是否准确？ \n谢谢陈版！ 查看原帖\n赞同主帖的处理意见。a公司自身作为延续的会计主体，不能将公允价值模式转回成本模式；b公司合并报表层面可以以购买日公允价值为成本基础，采用成本模式进行后续计量。 https://bbs.esnai.cn/thread-5497796-1-1.html"}, {"tid": "5497793", "title": "PPP项目金融资产模式收入确认问题", "category": "最近更新", "questionAuthor": "yh1215慕鱼", "questionTime": "2026-07-14T12:00:30.000Z", "replyTime": "2026-07-19T10:03:00.000Z", "replySortTime": "2026-07-19T10:03:00.000Z", "url": "https://bbs.esnai.cn/thread-5497793-1-1.html", "question": "请教陈版主：\n\n一、项目背景及基本情况项目成立于2017年12月，是某PPP项目的实施主体，负责项目的投资、融资、建设及运营管理。该项目严格遵循财政部及国家发改委关于PPP项目的规范性文件要求，依法合规入库。根据财政部《企业会计准则解释第14号》及相关收入准则，公司自2022年起对该项目采用金融资产模式进行会计核算，并对前期账务进行了追溯调整。\n\n二、已完成的财税调整工作  \n\n（一）账务处理追溯调整： 公司已将工程建设部分确认为主营业务收入，将融资相关收益确认为利息收入，并调整了2018-2021年财务报表。\n\n（二）企业所得税更正申报： 鉴于PPP项目涉税特殊性，公司已委托第三方机构出具财税咨询报告，并于2023年5月完成2018-2021年度企业所得税更正申报。针对建设期未实际收到的融资利息收入，公司已按税法规定进行纳税调减，待实际收到政府款项在进行纳税调增。\n\n（三）增值税申报情况： 2025年9月，公司按9%（建筑服务）和6%（利息收入）拆分申报了可用性付费部分的增值税。但2026年2月，主管税务机关口头答复要求统一按9%建筑服务税率缴纳。三、请教问题\n\n按照目前主管税局的最新要求所有收入均按照9%税率缴纳增值税，在会计准则上还有区分建筑收入和利息收入的必要吗？在会计核算上是否需要将以前年度确认的利息收入部分，全部调整至主营业务收入进行核算？", "reply": "查看原帖\n会计上仍需区分建造收入（假设为主要责任人，下同）和利息收入。利息收入列入“财务费用——利息收入”，而不是主营业务收入或其他业务收入。具体参阅财政部会计司发布的PPP项目（金融资产模式）应用案例。", "searchText": "5497793 ppp项目金融资产模式收入确认问题 最近更新 yh1215慕鱼 2026-07-14t12:00:30.000z 2026-07-19t10:03:00.000z 请教陈版主：\n\n一、项目背景及基本情况项目成立于2017年12月，是某ppp项目的实施主体，负责项目的投资、融资、建设及运营管理。该项目严格遵循财政部及国家发改委关于ppp项目的规范性文件要求，依法合规入库。根据财政部《企业会计准则解释第14号》及相关收入准则，公司自2022年起对该项目采用金融资产模式进行会计核算，并对前期账务进行了追溯调整。\n\n二、已完成的财税调整工作  \n\n（一）账务处理追溯调整： 公司已将工程建设部分确认为主营业务收入，将融资相关收益确认为利息收入，并调整了2018-2021年财务报表。\n\n（二）企业所得税更正申报： 鉴于ppp项目涉税特殊性，公司已委托第三方机构出具财税咨询报告，并于2023年5月完成2018-2021年度企业所得税更正申报。针对建设期未实际收到的融资利息收入，公司已按税法规定进行纳税调减，待实际收到政府款项在进行纳税调增。\n\n（三）增值税申报情况： 2025年9月，公司按9%（建筑服务）和6%（利息收入）拆分申报了可用性付费部分的增值税。但2026年2月，主管税务机关口头答复要求统一按9%建筑服务税率缴纳。三、请教问题\n\n按照目前主管税局的最新要求所有收入均按照9%税率缴纳增值税，在会计准则上还有区分建筑收入和利息收入的必要吗？在会计核算上是否需要将以前年度确认的利息收入部分，全部调整至主营业务收入进行核算？ 查看原帖\n会计上仍需区分建造收入（假设为主要责任人，下同）和利息收入。利息收入列入“财务费用——利息收入”，而不是主营业务收入或其他业务收入。具体参阅财政部会计司发布的ppp项目（金融资产模式）应用案例。 https://bbs.esnai.cn/thread-5497793-1-1.html"}, {"tid": "5497792", "title": "生物性资产寄养问题的账务处理", "category": "最近更新", "questionAuthor": "qiueryiran", "questionTime": "2026-07-14T12:00:30.000Z", "replyTime": "2026-07-19T09:58:00.000Z", "replySortTime": "2026-07-19T09:58:00.000Z", "url": "https://bbs.esnai.cn/thread-5497792-1-1.html", "question": "公司的 100 头种子母牛寄养在子公司 3 年，3 年期间的牛只费用由子公司承担，合同约定牛死亡灭失风险归子公司。然后 3 年后子公司返还不是寄养的这一批牛，原寄养牛只 100 头归子公司，而是与当初寄养的时候的同等月龄的其他种子母牛，但是子公司需要归还数量变成 110 头，该事项如何账务处理？\n\n目前审计发现企业母公司账务处理如下：\n\n借：应收账款     100头价值  \n\n 贷：生产性生物资产  100头价值  \n\n子公司目前是\n\n借：生产性生物资产100头价值    \n\n  贷：应付账款   100头价值  \n\n然后到期后母公司：\n\n借：生产性生物资产  110头价值  \n\n贷：应收账款 100头价值\n\n贷：资产处置收益 10头价值\n\n子公司  ：\n\n借：应付账款  100头价值 \n\n借：资产处置收益10头价值  \n\n贷：生产性生物资产110头价值", "reply": "查看原帖\n没有看懂主帖的事实背景？请梳理相关事实，特别是委托/受托双方的权利义务关系和风险、报酬享有和承担情况、3年内牛只市场价格变动的风险和收益的享有和承担情况。\n\n另外，因为是母子公司之间的关联交易，请关注该安排是否公允合理、是否具有商业实质，是否不涉及权益性交易因素。", "searchText": "5497792 生物性资产寄养问题的账务处理 最近更新 qiueryiran 2026-07-14t12:00:30.000z 2026-07-19t09:58:00.000z 公司的 100 头种子母牛寄养在子公司 3 年，3 年期间的牛只费用由子公司承担，合同约定牛死亡灭失风险归子公司。然后 3 年后子公司返还不是寄养的这一批牛，原寄养牛只 100 头归子公司，而是与当初寄养的时候的同等月龄的其他种子母牛，但是子公司需要归还数量变成 110 头，该事项如何账务处理？\n\n目前审计发现企业母公司账务处理如下：\n\n借：应收账款     100头价值  \n\n 贷：生产性生物资产  100头价值  \n\n子公司目前是\n\n借：生产性生物资产100头价值    \n\n  贷：应付账款   100头价值  \n\n然后到期后母公司：\n\n借：生产性生物资产  110头价值  \n\n贷：应收账款 100头价值\n\n贷：资产处置收益 10头价值\n\n子公司  ：\n\n借：应付账款  100头价值 \n\n借：资产处置收益10头价值  \n\n贷：生产性生物资产110头价值 查看原帖\n没有看懂主帖的事实背景？请梳理相关事实，特别是委托/受托双方的权利义务关系和风险、报酬享有和承担情况、3年内牛只市场价格变动的风险和收益的享有和承担情况。\n\n另外，因为是母子公司之间的关联交易，请关注该安排是否公允合理、是否具有商业实质，是否不涉及权益性交易因素。 https://bbs.esnai.cn/thread-5497792-1-1.html"}, {"tid": "5497679", "title": "陈版，销售给客户产品并帮客户保管主要是赚取保管费，收入确认吗？", "category": "最近更新", "questionAuthor": "642658990", "questionTime": "2026-07-03T11:03:32.000Z", "replyTime": "2026-07-16T11:38:00.000Z", "replySortTime": "2026-07-16T11:38:00.000Z", "url": "https://bbs.esnai.cn/thread-5497679-1-1.html", "question": "为帮客户完成粮油储备任务，与客户签订储备合同，合同约定：销售粮油给客户，并按客户要求回购，销售与回购价格是一样，销售后客户将货款打给公司，同时公司再货款打给客户作为履约保证金。货物不动，由公司进行保管，客户给公司保管费。请问这个销售要不要确认收入？会计分录如何写？", "reply": "查看原帖\n从主帖描述情况看，该事项并不具备商业实质，即使在名义上作为储备粮油期间，其实际风险和报酬归属仍属于本企业。\n\n故出售粮油收到的价款不确认收入，而是确认为一项负债，同时将出库的存货按其成本转为其他流动资产。后续回购时，将其他流动资产转回存货，按支付的回购价款冲减上述负债处理。", "searchText": "5497679 陈版，销售给客户产品并帮客户保管主要是赚取保管费，收入确认吗？ 最近更新 642658990 2026-07-03t11:03:32.000z 2026-07-16t11:38:00.000z 为帮客户完成粮油储备任务，与客户签订储备合同，合同约定：销售粮油给客户，并按客户要求回购，销售与回购价格是一样，销售后客户将货款打给公司，同时公司再货款打给客户作为履约保证金。货物不动，由公司进行保管，客户给公司保管费。请问这个销售要不要确认收入？会计分录如何写？ 查看原帖\n从主帖描述情况看，该事项并不具备商业实质，即使在名义上作为储备粮油期间，其实际风险和报酬归属仍属于本企业。\n\n故出售粮油收到的价款不确认收入，而是确认为一项负债，同时将出库的存货按其成本转为其他流动资产。后续回购时，将其他流动资产转回存货，按支付的回购价款冲减上述负债处理。 https://bbs.esnai.cn/thread-5497679-1-1.html"}, {"tid": "5496882", "title": "陈版，中储粮双向竞价交易情形是否适用净额法？", "category": "收入确认/总额净额", "questionAuthor": "642658990", "questionTime": "2026-04-24T14:10:37.000Z", "replyTime": "2026-07-16T11:36:00.000Z", "replySortTime": "2026-07-16T11:36:00.000Z", "url": "https://bbs.esnai.cn/thread-5496882-1-1.html", "question": "公司参与中储粮网大豆双向竞价交易，交易模式是中储粮挂出大豆销售与采购差价，由参与竞价方我们对其销售价进行竞价，比如中储粮大豆对外销售底价是4850元/吨，采购大豆价格是5300元/吨（固定的），我们对其销售价进行竞价，最终以5090元/吨取得其销售的大豆，但必需在规定的时间内按5300的价格买新大豆给中储粮，我们对中储粮承担补充新大豆的风险（包括质量、数量、价格等）。我们在竞价成功后，再向贸易商采购大豆5100元/吨，约定由贸易商将新大豆送到中储粮指定的收购库点（贸易商承担中储粮收货前的所有风险，包括不能交货的风险），中储粮收货确认后，视为贸易商对我们履行了合同。我们采购的大豆用于加工。\n\n     1、我们与中储粮的双向竞价交易是否属一揽子交易？整个交易的目的是为了采购最便宜的大豆用于加工，实际上加工大豆的成本是5090-（5300-5100）=4890元/吨，比市场价少了5100-4890=210元，如何账务处理可以作为加工原料的成本？\n\n     2、我们向贸易商采购再销售给中储粮是否属于净额法确认收入的情形？\n\n---\n\n查看原帖\n根据陈版说法，我对实际业务进行了复盘，发现几个实务问题较难处理：\n\n1、时间差问题，采购中储粮的大豆是当期，按约定补库可能跨期（大豆轮空期可达6个月），这个价差成本的调整有可能到几个月后才能入账体现，但几个月后这些原料可能已用完也可能还没有用，无法识别。假设极端情况下当期已用完且没有原料库存了，下期入账时再调整原料成本没库存可调了，只能调整营业成本。对下期损益又带来了影响。\n\n2、产品成本调整问题，因为产出的产品是好几种，每批产出还不同，如果价差直接调整各产品营业成本，应该怎么拆分到各个产品品种上，也是个难题。\n\n有没有对这种成本的延期调整可行理论？", "reply": "查看原帖\n1、从主帖所述情况看，本企业向中储粮竞价采购其储备的大豆，同时按约定价格将大豆销售给中储粮以补充其储备，属于一揽子交易（对中储粮而言即为储备的定期轮换；对本企业而言属于采购大豆用于加工）。如主帖所述，向贸易商采购大豆发价款与出售给中储粮的价格之间的价差应作为对大豆采购成本的调整处理，不应单独确认收入和成本。\n\n2、如作为一揽子交易，则该价差（尤其是此处所述的价差为正数的情况）应作为对采购成本的调整处理，不属于应确认收入的情形（包括按净额法确认收入也可能是不恰当的）。\n\n---\n\n查看原帖\n个人理解：1、如果无法对应的，则及时调整损益处理，但以不提前确认收益为原则；2、参考共同材料成本在联产品之间的分配方式。", "searchText": "5496882 陈版，中储粮双向竞价交易情形是否适用净额法？ 收入确认/总额净额 642658990 2026-04-24t14:10:37.000z 2026-07-16t11:36:00.000z 公司参与中储粮网大豆双向竞价交易，交易模式是中储粮挂出大豆销售与采购差价，由参与竞价方我们对其销售价进行竞价，比如中储粮大豆对外销售底价是4850元/吨，采购大豆价格是5300元/吨（固定的），我们对其销售价进行竞价，最终以5090元/吨取得其销售的大豆，但必需在规定的时间内按5300的价格买新大豆给中储粮，我们对中储粮承担补充新大豆的风险（包括质量、数量、价格等）。我们在竞价成功后，再向贸易商采购大豆5100元/吨，约定由贸易商将新大豆送到中储粮指定的收购库点（贸易商承担中储粮收货前的所有风险，包括不能交货的风险），中储粮收货确认后，视为贸易商对我们履行了合同。我们采购的大豆用于加工。\n\n     1、我们与中储粮的双向竞价交易是否属一揽子交易？整个交易的目的是为了采购最便宜的大豆用于加工，实际上加工大豆的成本是5090-（5300-5100）=4890元/吨，比市场价少了5100-4890=210元，如何账务处理可以作为加工原料的成本？\n\n     2、我们向贸易商采购再销售给中储粮是否属于净额法确认收入的情形？\n\n---\n\n查看原帖\n根据陈版说法，我对实际业务进行了复盘，发现几个实务问题较难处理：\n\n1、时间差问题，采购中储粮的大豆是当期，按约定补库可能跨期（大豆轮空期可达6个月），这个价差成本的调整有可能到几个月后才能入账体现，但几个月后这些原料可能已用完也可能还没有用，无法识别。假设极端情况下当期已用完且没有原料库存了，下期入账时再调整原料成本没库存可调了，只能调整营业成本。对下期损益又带来了影响。\n\n2、产品成本调整问题，因为产出的产品是好几种，每批产出还不同，如果价差直接调整各产品营业成本，应该怎么拆分到各个产品品种上，也是个难题。\n\n有没有对这种成本的延期调整可行理论？ 查看原帖\n1、从主帖所述情况看，本企业向中储粮竞价采购其储备的大豆，同时按约定价格将大豆销售给中储粮以补充其储备，属于一揽子交易（对中储粮而言即为储备的定期轮换；对本企业而言属于采购大豆用于加工）。如主帖所述，向贸易商采购大豆发价款与出售给中储粮的价格之间的价差应作为对大豆采购成本的调整处理，不应单独确认收入和成本。\n\n2、如作为一揽子交易，则该价差（尤其是此处所述的价差为正数的情况）应作为对采购成本的调整处理，不属于应确认收入的情形（包括按净额法确认收入也可能是不恰当的）。\n\n---\n\n查看原帖\n个人理解：1、如果无法对应的，则及时调整损益处理，但以不提前确认收益为原则；2、参考共同材料成本在联产品之间的分配方式。 https://bbs.esnai.cn/thread-5496882-1-1.html"}, {"tid": "5494515", "title": "求助陈版：汽车车企进行整车碰撞测试研发费用的归集", "category": "最近更新", "questionAuthor": "mayleee12审计", "questionTime": "2025-10-22T10:59:04.000Z", "replyTime": "2026-07-16T11:33:00.000Z", "replySortTime": "2026-07-16T11:33:00.000Z", "url": "https://bbs.esnai.cn/thread-5494515-1-1.html", "question": "求助陈版：被审单位为汽车车企，从仓库领用成品整车进行研发的碰撞测试，成品整车的生产是由生产人员参与，请问研发费用归集的口径：1.是从碰撞测试车的生产阶段根据领料的进度、人工投入归集等分阶段计入研发费用\n\n2.还是前期先在制造费用/生产成本里面归集，完工后结转进成品，等到进行碰撞测试的时候领用成品一次性计入研发费用？\n\n感谢陈版回复", "reply": "查看原帖\n请核实：这辆测试车就是普通的成品车领用的，还是专门为碰撞测试的目的而专门制造，从一开始就明确是用于研发，不对外销售的？", "searchText": "5494515 求助陈版：汽车车企进行整车碰撞测试研发费用的归集 最近更新 mayleee12审计 2025-10-22t10:59:04.000z 2026-07-16t11:33:00.000z 求助陈版：被审单位为汽车车企，从仓库领用成品整车进行研发的碰撞测试，成品整车的生产是由生产人员参与，请问研发费用归集的口径：1.是从碰撞测试车的生产阶段根据领料的进度、人工投入归集等分阶段计入研发费用\n\n2.还是前期先在制造费用/生产成本里面归集，完工后结转进成品，等到进行碰撞测试的时候领用成品一次性计入研发费用？\n\n感谢陈版回复 查看原帖\n请核实：这辆测试车就是普通的成品车领用的，还是专门为碰撞测试的目的而专门制造，从一开始就明确是用于研发，不对外销售的？ https://bbs.esnai.cn/thread-5494515-1-1.html"}, {"tid": "5497702", "title": "处置子公司时，原内部顺流交易对应的递延所得税资产的会计处理？", "category": "最近更新", "questionAuthor": "破罗马", "questionTime": "2026-07-06T10:42:32.000Z", "replyTime": "2026-07-16T11:27:00.000Z", "replySortTime": "2026-07-16T11:27:00.000Z", "url": "https://bbs.esnai.cn/thread-5497702-1-1.html", "question": "合并报表处置子公司，原因内部顺流交易未实现损益产生的，关于存货的暂时性差异的递延所得税资产，在处置时是并入处置时的投资收益计算，还是单独作递延所得税资产转回处理？该处理作为经常性损益还是非经常性损益？", "reply": "查看原帖\n目前实务中的做法，还是多数作为递延所得税资产转回处理，在合并报表中借记“所得税费用——递延所得税费用”而不是“投资收益——处置子公司损益“。\n\n在确定非经常性损益时，由于顺流交易损益实现的影响体现在合并报表的投资收益中，作为“资产处置损益”列入非经常性损益，故对应的所得税影响数也是作为非经常性损益的所得税影响数处理。", "searchText": "5497702 处置子公司时，原内部顺流交易对应的递延所得税资产的会计处理？ 最近更新 破罗马 2026-07-06t10:42:32.000z 2026-07-16t11:27:00.000z 合并报表处置子公司，原因内部顺流交易未实现损益产生的，关于存货的暂时性差异的递延所得税资产，在处置时是并入处置时的投资收益计算，还是单独作递延所得税资产转回处理？该处理作为经常性损益还是非经常性损益？ 查看原帖\n目前实务中的做法，还是多数作为递延所得税资产转回处理，在合并报表中借记“所得税费用——递延所得税费用”而不是“投资收益——处置子公司损益“。\n\n在确定非经常性损益时，由于顺流交易损益实现的影响体现在合并报表的投资收益中，作为“资产处置损益”列入非经常性损益，故对应的所得税影响数也是作为非经常性损益的所得税影响数处理。 https://bbs.esnai.cn/thread-5497702-1-1.html"}, {"tid": "5497704", "title": "联营企业逆流交易", "category": "最近更新", "questionAuthor": "李喵喵喵喵", "questionTime": "2026-07-06T11:33:58.000Z", "replyTime": "2026-07-16T11:22:00.000Z", "replySortTime": "2026-07-16T11:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497704-1-1.html", "question": "A公司持有联营企业B公司20%股权，B公司出售材料给A公司10吨，单位成本3万元/吨，销售单价10万元/吨，针对此笔业务，联营企业形成毛利70万元。A公司处于试生产阶段，购入上述存货后，将材料投入生产最终形成了产成品、半成品、在建工程和原材料。由于所生产的产成品存在减值，故A公司对半成品和主要原材料锂精矿计提减值，总减值金额30万元。\n\n请教陈版主，公司在常规按持股确认对联营企业投资收益的基础上，按联营企业上述业务毛利70万元的20%分别抵减存货和在建工程，同时减少投资收益。但是，对于，A公司单体层面确认的存货减值合并层面如何处理存在疑问，望给予指导：\n\n处理方式1：按照合并层面抵减后的存货单位成本为基础计算存货减值。如单体层面购入材料成本10万元/吨，抵减后材料单位成本（假设全部抵减存货）10-1.4=8.6万元/吨，按8.6万元/吨重新测算的存货减值与单体报表计提的减值额在合并层面冲回。\n\n处理方式2：由于联营企业逆流交易为单向合并，合并层面不做处理，全额确认单体层面计提的减值。", "reply": "查看原帖\n赞同处理方式1。如果按照方式2处理，会导致合并报表层面的存货账面价值低于其成本与可变现净值的孰低金额，属于过度计提跌价准备了。", "searchText": "5497704 联营企业逆流交易 最近更新 李喵喵喵喵 2026-07-06t11:33:58.000z 2026-07-16t11:22:00.000z a公司持有联营企业b公司20%股权，b公司出售材料给a公司10吨，单位成本3万元/吨，销售单价10万元/吨，针对此笔业务，联营企业形成毛利70万元。a公司处于试生产阶段，购入上述存货后，将材料投入生产最终形成了产成品、半成品、在建工程和原材料。由于所生产的产成品存在减值，故a公司对半成品和主要原材料锂精矿计提减值，总减值金额30万元。\n\n请教陈版主，公司在常规按持股确认对联营企业投资收益的基础上，按联营企业上述业务毛利70万元的20%分别抵减存货和在建工程，同时减少投资收益。但是，对于，a公司单体层面确认的存货减值合并层面如何处理存在疑问，望给予指导：\n\n处理方式1：按照合并层面抵减后的存货单位成本为基础计算存货减值。如单体层面购入材料成本10万元/吨，抵减后材料单位成本（假设全部抵减存货）10-1.4=8.6万元/吨，按8.6万元/吨重新测算的存货减值与单体报表计提的减值额在合并层面冲回。\n\n处理方式2：由于联营企业逆流交易为单向合并，合并层面不做处理，全额确认单体层面计提的减值。 查看原帖\n赞同处理方式1。如果按照方式2处理，会导致合并报表层面的存货账面价值低于其成本与可变现净值的孰低金额，属于过度计提跌价准备了。 https://bbs.esnai.cn/thread-5497704-1-1.html"}, {"tid": "5497706", "title": "关联买卖固定资产往来余额是否统一", "category": "最近更新", "questionAuthor": "寻梦的人路遥远", "questionTime": "2026-07-06T12:18:00.000Z", "replyTime": "2026-07-16T11:05:00.000Z", "replySortTime": "2026-07-16T11:05:00.000Z", "url": "https://bbs.esnai.cn/thread-5497706-1-1.html", "question": "陈版主，你好，之前我们是买卖非关联固定资产做应收应付，关联方之间挂其他应收和其他应付，后续考虑到购销固定资产不能因为关联和非关来区分，改成购入资产挂应付账款，处置销售时挂其他应收(认为是非日常活动)，但会导致关联科目不匹配，其他应收对应应付账款，请问这样是否可行？同一集团内有必要保持一致都挂其他往来，或全部走应收应付核算呢？还是说针对处置和销售来作为区分，查了一些资料还未下定论。", "reply": "查看原帖\n这个问题目前并无明确规定，在同一会计主体范围内保持一贯性，以及关注与现金流量表项目之间的勾稽关系即可，", "searchText": "5497706 关联买卖固定资产往来余额是否统一 最近更新 寻梦的人路遥远 2026-07-06t12:18:00.000z 2026-07-16t11:05:00.000z 陈版主，你好，之前我们是买卖非关联固定资产做应收应付，关联方之间挂其他应收和其他应付，后续考虑到购销固定资产不能因为关联和非关来区分，改成购入资产挂应付账款，处置销售时挂其他应收(认为是非日常活动)，但会导致关联科目不匹配，其他应收对应应付账款，请问这样是否可行？同一集团内有必要保持一致都挂其他往来，或全部走应收应付核算呢？还是说针对处置和销售来作为区分，查了一些资料还未下定论。 查看原帖\n这个问题目前并无明确规定，在同一会计主体范围内保持一贯性，以及关注与现金流量表项目之间的勾稽关系即可， https://bbs.esnai.cn/thread-5497706-1-1.html"}, {"tid": "5497571", "title": "权益法下超额亏损的确认与恢复（同时涉及其他综合收益及其他权益变动）", "category": "最近更新", "questionAuthor": "halalalalala", "questionTime": "2026-06-23T18:01:17.000Z", "replyTime": "2026-07-16T11:03:00.000Z", "replySortTime": "2026-07-16T11:03:00.000Z", "url": "https://bbs.esnai.cn/thread-5497571-1-1.html", "question": "假设案例背景：甲持乙股权40%，权益法核算，除以下业务外，不考虑其他条件及因素。 \n\n初始状态（2×20年末）：\n\n1、甲公司对乙公司的长期股权投资账面价值合计为2,500万元（其中，投资成本为2,000万元，损益调整为300万元，其他综合收益为100万元，其他权益变动为100万元）。乙公司所有者权益为6250万元。\n\n2、此外，甲公司存在其他实质上构成对被投资单位净投资的长期权益——长期应收款300万元。 \n\n3、同时，根据合同约定，甲公司负有额外的损失补偿义务上限为200万元。 \n\n4、截至2×20年末，甲公司的备查簿中尚未登记任何未确认投资净损失，余额为0元。\n\n各年度具体事件：\n\n2×21年：\n\n乙公司发生净亏损6,000万元，\n\n同时，乙公司的其他综合收益减少4,000万元。 \n\n2×22年：\n\n乙公司的其他综合收益增加1,000万元。\n\n同时，乙公司的其他资本公积增加5,000万元（大股东进行单方增资），乙公司持股比例降至20%。\n\n                        \n\n求助老师：甲应该如何进行会计处理？\n\n疑惑点：\n\n1、若投资方超额亏损及恢复，仅因被投资方其他权益变动导致的话，冲减及按序恢复时，涉及长投科目是否都用“长投——其他权益变动”这个？\n\n2、当投资方因被投资方同时发生多项原因导致的超额亏损及恢复时，在冲减长投账面价值至0时是否有先后顺序？应该考虑哪个明细科目？\n\n盼求指点，感谢🙏\n\n---\n\n查看原帖\n您好，陈版，将前期未确认的其他综合收益负数补记入账（按照稀释后新的股权比例）为什么用稀释后的股权比例，我觉得2021年发生大额亏损和其他综合收益时，由于长期股权投资不能冲减负数，其他综合收益负数未入账，应该是2021年的即稀释前的。谢谢", "reply": "查看原帖\n参考文件：《企业会计准则解释第9号——关于权益法下投资净损失的会计处理》；《监管规则适用指引——会计类第3号》之“3-2 权益法下未确认投资净损失后续得到弥补的会计处理”。\n\n2021年发生净亏损和其他综合收益减少，理论上应按照发生的先后顺序，先发生的先入账，后发生的以可冲减限额（长期股权投资剩余账面价值+长期应收款账面价值+损失补偿义务上限金额）入账，不足处理的部分备查。实务中，如果无法合理确定发生的先后顺序的，则建议优先确认净亏损，再确认其他综合收益变动，这样会在2021年末形成未确认的其他综合收益负数余额。\n\n2022年，大股东单方面增资导致乙公司的资本公积增加时，甲公司首先确认其享有乙公司权益的增加额，调整“资本公积——其他资本公积”，再以该权益增加额为限，将前期未确认的其他综合收益负数补记入账（按照稀释后新的股权比例）。到乙公司的净资产恢复为正数之后就按正常方法进行权益法核算。\n\n---\n\n查看原帖\n因为首先确认被投资企业因接受投资导致的权益增加中本企业的份额，此时就已经将本企业享有的权益比例稀释了，所以后续再补充确认投资收益、其他综合收益份额时按稀释后的比例。", "searchText": "5497571 权益法下超额亏损的确认与恢复（同时涉及其他综合收益及其他权益变动） 最近更新 halalalalala 2026-06-23t18:01:17.000z 2026-07-16t11:03:00.000z 假设案例背景：甲持乙股权40%，权益法核算，除以下业务外，不考虑其他条件及因素。 \n\n初始状态（2×20年末）：\n\n1、甲公司对乙公司的长期股权投资账面价值合计为2,500万元（其中，投资成本为2,000万元，损益调整为300万元，其他综合收益为100万元，其他权益变动为100万元）。乙公司所有者权益为6250万元。\n\n2、此外，甲公司存在其他实质上构成对被投资单位净投资的长期权益——长期应收款300万元。 \n\n3、同时，根据合同约定，甲公司负有额外的损失补偿义务上限为200万元。 \n\n4、截至2×20年末，甲公司的备查簿中尚未登记任何未确认投资净损失，余额为0元。\n\n各年度具体事件：\n\n2×21年：\n\n乙公司发生净亏损6,000万元，\n\n同时，乙公司的其他综合收益减少4,000万元。 \n\n2×22年：\n\n乙公司的其他综合收益增加1,000万元。\n\n同时，乙公司的其他资本公积增加5,000万元（大股东进行单方增资），乙公司持股比例降至20%。\n\n                        \n\n求助老师：甲应该如何进行会计处理？\n\n疑惑点：\n\n1、若投资方超额亏损及恢复，仅因被投资方其他权益变动导致的话，冲减及按序恢复时，涉及长投科目是否都用“长投——其他权益变动”这个？\n\n2、当投资方因被投资方同时发生多项原因导致的超额亏损及恢复时，在冲减长投账面价值至0时是否有先后顺序？应该考虑哪个明细科目？\n\n盼求指点，感谢🙏\n\n---\n\n查看原帖\n您好，陈版，将前期未确认的其他综合收益负数补记入账（按照稀释后新的股权比例）为什么用稀释后的股权比例，我觉得2021年发生大额亏损和其他综合收益时，由于长期股权投资不能冲减负数，其他综合收益负数未入账，应该是2021年的即稀释前的。谢谢 查看原帖\n参考文件：《企业会计准则解释第9号——关于权益法下投资净损失的会计处理》；《监管规则适用指引——会计类第3号》之“3-2 权益法下未确认投资净损失后续得到弥补的会计处理”。\n\n2021年发生净亏损和其他综合收益减少，理论上应按照发生的先后顺序，先发生的先入账，后发生的以可冲减限额（长期股权投资剩余账面价值+长期应收款账面价值+损失补偿义务上限金额）入账，不足处理的部分备查。实务中，如果无法合理确定发生的先后顺序的，则建议优先确认净亏损，再确认其他综合收益变动，这样会在2021年末形成未确认的其他综合收益负数余额。\n\n2022年，大股东单方面增资导致乙公司的资本公积增加时，甲公司首先确认其享有乙公司权益的增加额，调整“资本公积——其他资本公积”，再以该权益增加额为限，将前期未确认的其他综合收益负数补记入账（按照稀释后新的股权比例）。到乙公司的净资产恢复为正数之后就按正常方法进行权益法核算。\n\n---\n\n查看原帖\n因为首先确认被投资企业因接受投资导致的权益增加中本企业的份额，此时就已经将本企业享有的权益比例稀释了，所以后续再补充确认投资收益、其他综合收益份额时按稀释后的比例。 https://bbs.esnai.cn/thread-5497571-1-1.html"}, {"tid": "5497568", "title": "关于探矿权的账务处理问题", "category": "最近更新", "questionAuthor": "wx_5abe02573bf7", "questionTime": "2026-06-23T16:13:42.000Z", "replyTime": "2026-07-16T11:00:00.000Z", "replySortTime": "2026-07-16T11:00:00.000Z", "url": "https://bbs.esnai.cn/thread-5497568-1-1.html", "question": "公司于2025年末以竞拍的方式取得一项探矿权，探矿权的出让收益为2100万元，目前还未探明经济可采储量，账务处理时计入“无形资产”是否合适，计入“无形资产”不摊销是否合适？披露时是否需列报至“其他非流动资产”？\n\n---\n\n查看原帖\n陈版主，我还想问一下，我们购买的这个探矿权如果取得了探矿权证后是在无形资产-探矿权核算还是其他非流动资产？查询了几家上市公司，紫金矿业无形资产中有探矿权，其他非流动资产有“勘探开发成本”，应该是在哪里核算更合适呢？", "reply": "查看原帖\n在实务中，探矿权会计处理很多时候受到《企业和地质勘查单位探矿权采矿权会计处理规定》（财会字[1999]40号）的影响，虽然这个文件早已废止，但后续似乎没有专门规定的文件。根据该文件规定，探矿权并非无形资产，列报为“其他非流动资产”可能更恰当，类似于现在资产负债表中的“油气资产”项目下的子项。\n\n根据《企业会计准则应用指南汇编2024》P1106：石油天然气以外的采掘业企业的勘探和评价活动参照本章执行，其他活动应按照相关章进行处理。\n\n---\n\n查看原帖\n取得采矿权后，可以在无形资产核算。", "searchText": "5497568 关于探矿权的账务处理问题 最近更新 wx_5abe02573bf7 2026-06-23t16:13:42.000z 2026-07-16t11:00:00.000z 公司于2025年末以竞拍的方式取得一项探矿权，探矿权的出让收益为2100万元，目前还未探明经济可采储量，账务处理时计入“无形资产”是否合适，计入“无形资产”不摊销是否合适？披露时是否需列报至“其他非流动资产”？\n\n---\n\n查看原帖\n陈版主，我还想问一下，我们购买的这个探矿权如果取得了探矿权证后是在无形资产-探矿权核算还是其他非流动资产？查询了几家上市公司，紫金矿业无形资产中有探矿权，其他非流动资产有“勘探开发成本”，应该是在哪里核算更合适呢？ 查看原帖\n在实务中，探矿权会计处理很多时候受到《企业和地质勘查单位探矿权采矿权会计处理规定》（财会字[1999]40号）的影响，虽然这个文件早已废止，但后续似乎没有专门规定的文件。根据该文件规定，探矿权并非无形资产，列报为“其他非流动资产”可能更恰当，类似于现在资产负债表中的“油气资产”项目下的子项。\n\n根据《企业会计准则应用指南汇编2024》p1106：石油天然气以外的采掘业企业的勘探和评价活动参照本章执行，其他活动应按照相关章进行处理。\n\n---\n\n查看原帖\n取得采矿权后，可以在无形资产核算。 https://bbs.esnai.cn/thread-5497568-1-1.html"}, {"tid": "5491766", "title": "请教陈版，企业购入资产后，使用用途改变，该如何处理", "category": "最近更新", "questionAuthor": "gpqg", "questionTime": "2025-03-21T14:21:10.000Z", "replyTime": "2026-07-16T10:58:00.000Z", "replySortTime": "2026-07-16T10:58:00.000Z", "url": "https://bbs.esnai.cn/thread-5491766-1-1.html", "question": "陈版，A 公司刚开始购入一批物资，作为存货，将来打算进行出售。购入这批物资后，过了大概几个月的时间，管理层决定不再出售这批物资，而是作为企业自身的固定资产，打算对外出租使用（构成经营租赁）。\n\n我的问题是，企业购入资产后，由于使用用途发生变化，导致从存货变更为固定资产。此时固定资产的折旧该如何计提呢？是从一开始购入这批存货的时间为起始点计提折旧，还是从将存货变更为固定资产后的次月开始计提折旧呢？\n\n谢谢陈版！\n\n---\n\n查看原帖\n如果公司业务模式有设备出售，也可自持设备对外租赁（经营租赁，租期1年）。\n\n当一批租赁设备到期，公司翻新后有客户购买，能否将固定资产转至存货，出售时确认营业收入和营业成本？\n\n问题1：因为公司业务模式设备可租可售，固定资产转至存货要满足什么条件呢？比如翻新金额占设备总额的大部分，实质改造很大是否可行？\n\n问题2：如果翻新并无重大实质改变，只是简单维修，因设备也是公司日常经营活动，能否将固定资产转至存货，并销售后确认营业收入和营业成本呢？\n\n问题3：如果固定资产不能转回存货，具体依据怎么理解呢", "reply": "查看原帖\n因管理层对用途的指定发生改变，导致由存货转为固定资产，不属于会计政策变更，因此其折旧计提也就不应追溯到最初购入时。应自转换日起，在转换日所估计的剩余使用年限内计提折旧。\n\n另外还需注意：在现行的会计模式下，由存货转为固定资产是允许的，但由固定资产再转回存货处理通常是不可以的。这也就意味着：如果日后再次改变该批物资的用途，将其用于对外出售，则只能作为固定资产处置处理，不能转回库存商品并确认销售收入和销售成本。\n\n---\n\n查看原帖\n目前会计规范下，除了畜牧业会计中产役畜可以转为育肥畜以外，没有其他在正常情况下可将固定资产转为存货的例子。我理解在某些其他行业也有这方面的需求，但会计准则对此无明确规定。", "searchText": "5491766 请教陈版，企业购入资产后，使用用途改变，该如何处理 最近更新 gpqg 2025-03-21t14:21:10.000z 2026-07-16t10:58:00.000z 陈版，a 公司刚开始购入一批物资，作为存货，将来打算进行出售。购入这批物资后，过了大概几个月的时间，管理层决定不再出售这批物资，而是作为企业自身的固定资产，打算对外出租使用（构成经营租赁）。\n\n我的问题是，企业购入资产后，由于使用用途发生变化，导致从存货变更为固定资产。此时固定资产的折旧该如何计提呢？是从一开始购入这批存货的时间为起始点计提折旧，还是从将存货变更为固定资产后的次月开始计提折旧呢？\n\n谢谢陈版！\n\n---\n\n查看原帖\n如果公司业务模式有设备出售，也可自持设备对外租赁（经营租赁，租期1年）。\n\n当一批租赁设备到期，公司翻新后有客户购买，能否将固定资产转至存货，出售时确认营业收入和营业成本？\n\n问题1：因为公司业务模式设备可租可售，固定资产转至存货要满足什么条件呢？比如翻新金额占设备总额的大部分，实质改造很大是否可行？\n\n问题2：如果翻新并无重大实质改变，只是简单维修，因设备也是公司日常经营活动，能否将固定资产转至存货，并销售后确认营业收入和营业成本呢？\n\n问题3：如果固定资产不能转回存货，具体依据怎么理解呢 查看原帖\n因管理层对用途的指定发生改变，导致由存货转为固定资产，不属于会计政策变更，因此其折旧计提也就不应追溯到最初购入时。应自转换日起，在转换日所估计的剩余使用年限内计提折旧。\n\n另外还需注意：在现行的会计模式下，由存货转为固定资产是允许的，但由固定资产再转回存货处理通常是不可以的。这也就意味着：如果日后再次改变该批物资的用途，将其用于对外出售，则只能作为固定资产处置处理，不能转回库存商品并确认销售收入和销售成本。\n\n---\n\n查看原帖\n目前会计规范下，除了畜牧业会计中产役畜可以转为育肥畜以外，没有其他在正常情况下可将固定资产转为存货的例子。我理解在某些其他行业也有这方面的需求，但会计准则对此无明确规定。 https://bbs.esnai.cn/thread-5491766-1-1.html"}, {"tid": "5497738", "ti 858 2026-07-08t09:43:01.000z 2026-07-15t06:59:00.000z 请教陈版及各位同仁，被审计单位为上市公司的参股公司，之前年度没有计提过坏账，审计期间可以按照上市公司的账龄计提方法进行计提吗？另外存货存在减值迹象，以前年度也没进行计提，本次审计期间为一年一期，25年1月1日的原材料市场价无法取得，可以只在25年开始进行调整吗？ 查看原帖\n以前年度未确认坏账损失和存货跌价损失，应作为前期差错更正事项处理。\n\n资产减值事项属于会计估计，不能直接参照投资方（上市公司）的相关政策和比例，而应根据被审计单位自身情况确定。如要参考上市公司的相关做法，应首先考虑在客户群、所属行业、销售和收账策略、存货类型和周转方式等方面有无实质性差异。 https://bbs.esnai.cn/thread-5497727-1-1.html"}, {"tid": "5497725", "title": "合伙企业超额分红", "category": "最近更新", "questionAuthor": "Rainbow727@sohu", "questionTime": "2026-07-08T08:12:55.000Z", "replyTime": "2026-07-15T06:54:00.000Z", "replySortTime": "2026-07-15T06:54:00.000Z", "url": "https://bbs.esnai.cn/thread-5497725-1-1.html", "question": "请教陈老师：\n\nA公司和外部投资者B成立合伙企业，由于A公司担任GP，比例为30%，A公司进行并表，B为财务投资人持有70%；合伙企业持有项目公司C，合伙企业通过搭建股东借款的方式抽取项目公司的现金流，由于项目公司存在折旧，抽取的现金流超过项目公司的利润，举例说明，项目公司实现利润3亿，实现现金流为5亿，合并归属与B的利润为2.1亿，归属与B的现金流为3.5亿；由于实际现金抽取到合伙企业是5亿，因此合伙企业单体的利润也是5亿，故给B分配了3.5亿，分配的金额3.5超过了合并利润归属比例2.1，则超过利润的金额部分1.4亿如何进行处理，是否将这1.4亿作为权益性处理，冲减A公司合并的资本公积。需要补充的是，由于B是财务投资者，分配利润的按照一定的固定收益率确定。", "reply": "查看原帖\n因为“由于B是财务投资者，分配利润的按照一定的固定收益率确定”，即项目公司的剩余净利润和现金流均归属于A，如果合伙企业对项目公司的持股比例是100%，则穿透来看该项目公司实际上是A的全资子公司。在超额分红和对应的现金流无需返还给合伙企业和项目公司的前提下，A应确认为投资收益，而不是确认为A自身的资本公积。\n\nA作为投资方，即使认定为权益性交易，也应冲减对合伙企业或项目公司的投资成本（超出部分视同分红列入投资收益），不应确认为A自身的资本公积。", "searchText": "5497725 合伙企业超额分红 最近更新 rainbow727@sohu 2026-07-08t08:12:55.000z 2026-07-15t06:54:00.000z 请教陈老师：\n\na公司和外部投资者b成立合伙企业，由于a公司担任gp，比例为30%，a公司进行并表，b为财务投资人持有70%；合伙企业持有项目公司c，合伙企业通过搭建股东借款的方式抽取项目公司的现金流，由于项目公司存在折旧，抽取的现金流超过项目公司的利润，举例说明，项目公司实现利润3亿，实现现金流为5亿，合并归属与b的利润为2.1亿，归属与b的现金流为3.5亿；由于实际现金抽取到合伙企业是5亿，因此合伙企业单体的利润也是5亿，故给b分配了3.5亿，分配的金额3.5超过了合并利润归属比例2.1，则超过利润的金额部分1.4亿如何进行处理，是否将这1.4亿作为权益性处理，冲减a公司合并的资本公积。需要补充的是，由于b是财务投资者，分配利润的按照一定的固定收益率确定。 查看原帖\n因为“由于b是财务投资者，分配利润的按照一定的固定收益率确定”，即项目公司的剩余净利润和现金流均归属于a，如果合伙企业对项目公司的持股比例是100%，则穿透来看该项目公司实际上是a的全资子公司。在超额分红和对应的现金流无需返还给合伙企业和项目公司的前提下，a应确认为投资收益，而不是确认为a自身的资本公积。\n\na作为投资方，即使认定为权益性交易，也应冲减对合伙企业或项目公司的投资成本（超出部分视同分红列入投资收益），不应确认为a自身的资本公积。 https://bbs.esnai.cn/thread-5497725-1-1.html"}, {"tid": "54977
