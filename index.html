Z", "replySortTime": "2026-06-07T09:17:00.000Z", "url": "https://bbs.esnai.cn/thread-5497333-1-1.html", "question": "请教陈版一个问题：基本情况如下：公司A与公司B签订了epc合同，由公司B为公司A提供EPC工程服务。其后公司C、公司B、公司A签订了一份融资租赁的合同，合同约定由C向B购买原epc合同中设备，C将购得设备出租给A使用。问题：对于公司C、公司B、公司A签订的合同，公司A是否要按租赁准则确认使用权资产、租赁负债等。若需确认，何时确认。", "reply": "该交易是典型的“以租代买”交易，不同于一般意义上的“直租”。我们理解该种模式不在《会计类3号》之3-9的规范范围内：承租人先与供应商签署了买卖合同，后因资金紧张引入融资租赁交易方式，与融资租赁公司（出租人）、供应商签订了三方协议，原买卖合同解除，由供应商与融资租赁公司签订买卖合同，同时承租人与融资租赁公司签订直接租赁合同。融资租赁公司向供应商支付资产价款，后续通过向承租人收取租金的方式收回本金并获得利息收入。租赁期结束，全部租金付清后，承租人取得租赁资产的完整所有权。\n\n我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租人，出租人实质上是以租赁物为抵押，以代付资产购建款项的形式向承租人提供融资。因此，对于此类租赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进行会计处理，不使用“使用权资产”和“租赁负债”科目。即承租人的处理要点为：\n\n1、根据出租人向供应商支付设备价款的情况，一方面确认在建工程（或其他非流动资产），另一方面确认金融负债（如长期应付款）。\n\n2、上述金融负债自其初始确认日开始计息（按实际利率法确认利息支出），建造期内的利息可作为专门借款费用资本化计入资产成本，资产达到预定可使用状态后的利息支出费用化计入财务费用。\n\n3、资产达到预定可使用状态后，按在“在建工程”科目中归集的实际成本（包括融资租赁公司代付的部分和本企业自行承担的部分）转入固定资产，正常计提折旧。\n\n上述做法在新老租赁准则下均适用。尤其是在新租赁准则下，由于此类情况下融资租赁公司一般不可能承担100%的资产购建款项，有部分还要承租人自行支付给供应商，同时承租人还需承担运输、安装等购建支出，上述处理办法就可以避免将同一项资产的一部分成本归入使用权资产、另一部分归入其他科目所造成的麻烦。也更能体现此类交易的经济实质。", "searchText": "5497333 租赁开始日确认 最近更新 rccrhj 2026-06-02t10:00:19.000z 2026-06-07t09:17:00.000z 请教陈版一个问题：基本情况如下：公司a与公司b签订了epc合同，由公司b为公司a提供epc工程服务。其后公司c、公司b、公司a签订了一份融资租赁的合同，合同约定由c向b购买原epc合同中设备，c将购得设备出租给a使用。问题：对于公司c、公司b、公司a签订的合同，公司a是否要按租赁准则确认使用权资产、租赁负债等。若需确认，何时确认。 该交易是典型的“以租代买”交易，不同于一般意义上的“直租”。我们理解该种模式不在《会计类3号》之3-9的规范范围内：承租人先与供应商签署了买卖合同，后因资金紧张引入融资租赁交易方式，与融资租赁公司（出租人）、供应商签订了三方协议，原买卖合同解除，由供应商与融资租赁公司签订买卖合同，同时承租人与融资租赁公司签订直接租赁合同。融资租赁公司向供应商支付资产价款，后续通过向承租人收取租金的方式收回本金并获得利息收入。租赁期结束，全部租金付清后，承租人取得租赁资产的完整所有权。\n\n我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租人，出租人实质上是以租赁物为抵押，以代付资产购建款项的形式向承租人提供融资。因此，对于此类租赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进行会计处理，不使用“使用权资产”和“租赁负债”科目。即承租人的处理要点为：\n\n1、根据出租人向供应商支付设备价款的情况，一方面确认在建工程（或其他非流动资产），另一方面确认金融负债（如长期应付款）。\n\n2、上述金融负债自其初始确认日开始计息（按实际利率法确认利息支出），建造期内的利息可作为专门借款费用资本化计入资产成本，资产达到预定可使用状态后的利息支出费用化计入财务费用。\n\n3、资产达到预定可使用状态后，按在“在建工程”科目中归集的实际成本（包括融资租赁公司代付的部分和本企业自行承担的部分）转入固定资产，正常计提折旧。\n\n上述做法在新老租赁准则下均适用。尤其是在新租赁准则下，由于此类情况下融资租赁公司一般不可能承担100%的资产购建款项，有部分还要承租人自行支付给供应商，同时承租人还需承担运输、安装等购建支出，上述处理办法就可以避免将同一项资产的一部分成本归入使用权资产、另一部分归入其他科目所造成的麻烦。也更能体现此类交易的经济实质。 https://bbs.esnai.cn/thread-5497333-1-1.html"}, {"tid": "5497335", "title": "关于医药流通业务中内部代理商收入确认采用总额法还是净额法的咨询", "category": "最近更新", "questionAuthor": "已转非执业", "questionTime": "2026-06-02T10:00:16.000Z", "replyTime": "2026-06-07T09:10:00.000Z", "replySortTime": "2026-06-07T09:10:00.000Z", "url": "https://bbs.esnai.cn/thread-5497335-1-1.html", "question": "我司为医药制造企业，原有药品通过外部医药配送商分销至医院、线下药房；现新增线上零售渠道，由我司下属内部代理商公司统一配送、结算。现就该内部代理商收入确认口径请教同行及专家。\n\n一、业务背景\n\n合同与定价：内外部代理商合同形式一致，未明确约定不承担跌价风险；\n\n实务中：风险承担（行业特殊）：\n\n1、常规情况：非政策性降价、滞销、过期，外部配送商自行承担，符合买断经销特征。\n\n2、集采 / 医保谈判：政策性大幅降价，行业惯例由厂家兜底，对所有内外部经销商、代理商未售库存统一补差价（不直接退款，后续采购折扣兑现），两票制下普遍执行。\n\n结算：统一 30 至90天账期，到期无论终端是否售出，均回款；回款后政策性调价，补差仍由厂家承担。\n\n二、核心疑问（结合准则与实务）\n\n1、头部上市流通商（国药、上药、九州通）会计政策披露为买断式、总额法，但实务中集采调价由厂家兜底；这种 “合同买断 + 实质部分兜底” 是否仍支持总额法？其公开披露的会计政策能否直接参考？或者说政策性调价不影响常规情况下的买断式业务判断？\n\n2、我司内部代理商合同与外部代理商一样，没有写政策性调价的问题，但实质不承担降价 / 滞销 / 过期风险、毛利也比较低赚几个点的毛利；合同模糊是否会改变 “实质代理、应按净额法” 的判断？\n\n3、另外查到两家公司，山东药玻、运盛医疗的代理商从总额法改为净额法的公告。\n\n其中运盛医疗“从医疗流通业务的经营实质判断,公司认为在向客户转让商品前对该商品的控制权较弱，因此改为净额法确认收入”；\n\n山东药玻“公司对部分贸易业务的交易实质进行了更加严格的判断，基于审慎性原则，将部分贸易业务收入确认方法由总额法调整为净额法。”\n\n但没有公布更多细节，因此尚无法判断是否属于政策性条件引起的。\n\n感谢各位结合医药行业实务、审计案例分享经验与见解！", "reply": "如果合同约定模糊，则会进一步核对实际操作情况和风险报酬享有和承担的实际情况。如果“实质不承担降价 / 滞销 / 过期风险、毛利也比较低赚几个点的毛利”属实，则该代理商大概率应采用净额法核算。\n\n判断总额法/净额法的关键是在于是否取得商品的控制权，上述风险和报酬的享有或承担是其中的考虑因素之一，但并非全部。按照一般理解，最根本的考虑是是否“囤货”，即代理商是否在取得下游客户订单之前即从上游供应商购入商品并支付相当比例的价款。如果确有囤货行为，则按总额法核算可能是恰当的；如果无囤货行为，则应按净额法。", "searchText": "5497335 关于医药流通业务中内部代理商收入确认采用总额法还是净额法的咨询 最近更新 已转非执业 2026-06-02t10:00:16.000z 2026-06-07t09:10:00.000z 我司为医药制造企业，原有药品通过外部医药配送商分销至医院、线下药房；现新增线上零售渠道，由我司下属内部代理商公司统一配送、结算。现就该内部代理商收入确认口径请教同行及专家。\n\n一、业务背景\n\n合同与定价：内外部代理商合同形式一致，未明确约定不承担跌价风险；\n\n实务中：风险承担（行业特殊）：\n\n1、常规情况：非政策性降价、滞销、过期，外部配送商自行承担，符合买断经销特征。\n\n2、集采 / 医保谈判：政策性大幅降价，行业惯例由厂家兜底，对所有内外部经销商、代理商未售库存统一补差价（不直接退款，后续采购折扣兑现），两票制下普遍执行。\n\n结算：统一 30 至90天账期，到期无论终端是否售出，均回款；回款后政策性调价，补差仍由厂家承担。\n\n二、核心疑问（结合准则与实务）\n\n1、头部上市流通商（国药、上药、九州通）会计政策披露为买断式、总额法，但实务中集采调价由厂家兜底；这种 “合同买断 + 实质部分兜底” 是否仍支持总额法？其公开披露的会计政策能否直接参考？或者说政策性调价不影响常规情况下的买断式业务判断？\n\n2、我司内部代理商合同与外部代理商一样，没有写政策性调价的问题，但实质不承担降价 / 滞销 / 过期风险、毛利也比较低赚几个点的毛利；合同模糊是否会改变 “实质代理、应按净额法” 的判断？\n\n3、另外查到两家公司，山东药玻、运盛医疗的代理商从总额法改为净额法的公告。\n\n其中运盛医疗“从医疗流通业务的经营实质判断,公司认为在向客户转让商品前对该商品的控制权较弱，因此改为净额法确认收入”；\n\n山东药玻“公司对部分贸易业务的交易实质进行了更加严格的判断，基于审慎性原则，将部分贸易业务收入确认方法由总额法调整为净额法。”\n\n但没有公布更多细节，因此尚无法判断是否属于政策性条件引起的。\n\n感谢各位结合医药行业实务、审计案例分享经验与见解！ 如果合同约定模糊，则会进一步核对实际操作情况和风险报酬享有和承担的实际情况。如果“实质不承担降价 / 滞销 / 过期风险、毛利也比较低赚几个点的毛利”属实，则该代理商大概率应采用净额法核算。\n\n判断总额法/净额法的关键是在于是否取得商品的控制权，上述风险和报酬的享有或承担是其中的考虑因素之一，但并非全部。按照一般理解，最根本的考虑是是否“囤货”，即代理商是否在取得下游客户订单之前即从上游供应商购入商品并支付相当比例的价款。如果确有囤货行为，则按总额法核算可能是恰当的；如果无囤货行为，则应按净额法。 https://bbs.esnai.cn/thread-5497335-1-1.html"}, {"tid": "5497336", "title": "求助陈版_长期股权投资不够冲减如何账务处理", "category": "最近更新", "questionAuthor": "雲", "questionTime": "2026-06-02T10:00:19.000Z", "replyTime": "2026-06-07T09:02:00.000Z", "replySortTime": "2026-06-07T09:02:00.000Z", "url": "https://bbs.esnai.cn/thread-5497336-1-1.html", "question": "B公司系A公司的全资子公司，但是实际并未出资，此时B公司向A公司无偿划转了一个100w债权，A公司账面没有长投可以冲减，A公司是否可以按照100w入账资产且同时调整A公司的资本公积", "reply": "该事项是A公司与子公司之间的权益性交易。对于取得划入资产（相当于非现金形式的分配）超出长期股权投资账面价值（0）的差额，应首先关注该事项的合理性（未出资的子公司为何能形成较大的长期投资），以及接受划入资产后是否还需要承担额外的支付义务。如果确定无需承担对该子公司的额外支付义务，且该项分配具有商业合理性的，则A公司取得无偿划入的孙公司股权应按该项股权在B公司个别报表中的长期股权投资账面价值入账，对应贷记投资收益，视同取得股利分配的收益。", "searchText": "5497336 求助陈版_长期股权投资不够冲减如何账务处理 最近更新 雲 2026-06-02t10:00:19.000z 2026-06-07t09:02:00.000z b公司系a公司的全资子公司，但是实际并未出资，此时b公司向a公司无偿划转了一个100w债权，a公司账面没有长投可以冲减，a公司是否可以按照100w入账资产且同时调整a公司的资本公积 该事项是a公司与子公司之间的权益性交易。对于取得划入资产（相当于非现金形式的分配）超出长期股权投资账面价值（0）的差额，应首先关注该事项的合理性（未出资的子公司为何能形成较大的长期投资），以及接受划入资产后是否还需要承担额外的支付义务。如果确定无需承担对该子公司的额外支付义务，且该项分配具有商业合理性的，则a公司取得无偿划入的孙公司股权应按该项股权在b公司个别报表中的长期股权投资账面价值入账，对应贷记投资收益，视同取得股利分配的收益。 https://bbs.esnai.cn/thread-5497336-1-1.html"}, {"tid": "5497267", "title": "求问陈版主：试生产产品对外出售，是否可以冲减固定资产原值", "category": "最近更新", "questionAuthor": "sunflower10", "questionTime": "2026-05-27T10:00:51.000Z", "replyTime": "2026-06-02T01:14:00.000Z", "replySortTime": "2026-06-02T01:14:00.000Z", "url": "https://bbs.esnai.cn/thread-5497267-1-1.html", "question": "求助陈版主：\n\n公司为药品生产企业，在固定资产转固前试生产的原料药不允许在国内出售标准，不符合存货确认条件，故将生产成本全部计入在建工程原值（完工后转入固定资产）。后在开发海外市场的过程中，开发了国外客户，可以采购这部分试生产产品。经过国外客户验厂及检测，公司试生产原料药满足进口国政策要求及客户需求，最终达成交易。但国外销量极不稳定，视市场需求而定，从以前年度数据来看，这部分收入金额重大。现有以下三个问题，请教陈版主：\n\n1、由于试生产的目的是进行药品安全认证等目的，不确定未来是否可以对外出售（国内不允许出售、出口销量也极不稳定），也无法可靠估计未来出口销量，也就不符合经济利益很可能流入企业的条件，是否可以认定为不满足存货确认条件而计入固定资产成本？\n\n2、如果计入固定资产成本，将来出售时调整成本调整固定资产原值，是否合理？\n\n3、如果不能调整固定资产原值，可否计入营业外收入或其他业务收入，成本为0，依据是什么？", "reply": "1、由于在此类试生产成本发生时，无法合理确定能否实现销售，故将试生产支出计入在建工程成本是合理的。\n\n2、对于已计入固定资产成本的试生产成本，如后续试生产产品实现出口销售的，则根据《企业会计准则解释第15号》第一条和《监管规则适用指引——会计类第3号》之3-11等规定确定试生产销售的收入和成本。对应的成本不应为零。", "searchText": "5497267 求问陈版主：试生产产品对外出售，是否可以冲减固定资产原值 最近更新 sunflower10 2026-05-27t10:00:51.000z 2026-06-02t01:14:00.000z 求助陈版主：\n\n公司为药品生产企业，在固定资产转固前试生产的原料药不允许在国内出售标准，不符合存货确认条件，故将生产成本全部计入在建工程原值（完工后转入固定资产）。后在开发海外市场的过程中，开发了国外客户，可以采购这部分试生产产品。经过国外客户验厂及检测，公司试生产原料药满足进口国政策要求及客户需求，最终达成交易。但国外销量极不稳定，视市场需求而定，从以前年度数据来看，这部分收入金额重大。现有以下三个问题，请教陈版主：\n\n1、由于试生产的目的是进行药品安全认证等目的，不确定未来是否可以对外出售（国内不允许出售、出口销量也极不稳定），也无法可靠估计未来出口销量，也就不符合经济利益很可能流入企业的条件，是否可以认定为不满足存货确认条件而计入固定资产成本？\n\n2、如果计入固定资产成本，将来出售时调整成本调整固定资产原值，是否合理？\n\n3、如果不能调整固定资产原值，可否计入营业外收入或其他业务收入，成本为0，依据是什么？ 1、由于在此类试生产成本发生时，无法合理确定能否实现销售，故将试生产支出计入在建工程成本是合理的。\n\n2、对于已计入固定资产成本的试生产成本，如后续试生产产品实现出口销售的，则根据《企业会计准则解释第15号》第一条和《监管规则适用指引——会计类第3号》之3-11等规定确定试生产销售的收入和成本。对应的成本不应为零。 https://bbs.esnai.cn/thread-5497267-1-1.html"}, {"tid": "5497266", "title": "关于补偿性资产的会计处理及适用情况的疑问", "category": "最近更新", "questionAuthor": "shu759", "questionTime": "2026-05-27T10:00:51.000Z", "replyTime": "2026-06-02T01:09:00.000Z", "replySortTime": "2026-06-02T01:09:00.000Z", "url": "https://bbs.esnai.cn/thread-5497266-1-1.html", "question": "一、案例背景简述\n2021年，A公司非同一控制下自B公司处收购其下属的C公司100%股权，C公司主营业务为生产制造，收购时项目刚建成投产。\n股权收购协议中相关规定：（1）鉴于C公司尚未取得生产、管理用房等永久性占地部分的土地使用权证及房屋不动产权属证书（如主管部门明确要求办理），转让方B公司承诺继续负责办理并承担办理费用；（2）C公司因交割日以前事项形成的税收惩罚或环境违规等事项的处罚，由转让方B公司承担（另有约定的除外）；（3）双方约定，如果产生以上费用由B公司承担，B公司将相关费用支付给A公司后，由A公司转付给C公司，或由A公司从应付B公司款项中直接支付给C公司。\nC公司被收购后至2023年，因为办理土地使用权证及房屋不动产权证而前后垫付了相关款项共计200万元；在2024年末确认因税务检查而补缴了2021年股权收购前产生的税务补缴款及滞纳金、罚款共计100万元，并于2025年实际支付。\n\n至2025年初，A公司账面对B公司应付股权转让款余额为350万元。三方协商，以上费用按照股权转让协议应由B公司承担，由A公司从所欠B公司的股权转让款中支付给C公司作为B公司对C公司的补偿。\n二、相关疑问\n根据企业会计准则解释第19 号-关于非同一控制下企业合并中补偿性资产的会计处理的相关规定中明确：“在非同一控制下企业合并中，出售方与购买方可能作出合同约定，针对与被购买方某些资产或负债的全部或部分相关的或有事项或其他不确定性结果，出售方给予购买方补偿，购买方因此获得补偿性权利“。而此案例中，由于股权转让协议中规定的相关补偿是原股东B公司对被投资单位（项目公司）C公司未来或有事项的补偿，该案例中的情况是否适用与解释第19 号，C公司是否在发生此类业务时按照或有事项准则进行处理？\n请陈博给予指导，谢谢！", "reply": "该事项对A、B（交易双方）而言属于补偿性资产相关的交易。\n\n对于C公司（标的公司），应在实际收到补偿时计入资本公积处理。", "searchText": "5497266 关于补偿性资产的会计处理及适用情况的疑问 最近更新 shu759 2026-05-27t10:00:51.000z 2026-06-02t01:09:00.000z 一、案例背景简述\n2021年，a公司非同一控制下自b公司处收购其下属的c公司100%股权，c公司主营业务为生产制造，收购时项目刚建成投产。\n股权收购协议中相关规定：（1）鉴于c公司尚未取得生产、管理用房等永久性占地部分的土地使用权证及房屋不动产权属证书（如主管部门明确要求办理），转让方b公司承诺继续负责办理并承担办理费用；（2）c公司因交割日以前事项形成的税收惩罚或环境违规等事项的处罚，由转让方b公司承担（另有约定的除外）；（3）双方约定，如果产生以上费用由b公司承担，b公司将相关费用支付给a公司后，由a公司转付给c公司，或由a公司从应付b公司款项中直接支付给c公司。\nc公司被收购后至2023年，因为办理土地使用权证及房屋不动产权证而前后垫付了相关款项共计200万元；在2024年末确认因税务检查而补缴了2021年股权收购前产生的税务补缴款及滞纳金、罚款共计100万元，并于2025年实际支付。\n\n至2025年初，a公司账面对b公司应付股权转让款余额为350万元。三方协商，以上费用按照股权转让协议应由b公司承担，由a公司从所欠b公司的股权转让款中支付给c公司作为b公司对c公司的补偿。\n二、相关疑问\n根据企业会计准则解释第19 号-关于非同一控制下企业合并中补偿性资产的会计处理的相关规定中明确：“在非同一控制下企业合并中，出售方与购买方可能作出合同约定，针对与被购买方某些资产或负债的全部或部分相关的或有事项或其他不确定性结果，出售方给予购买方补偿，购买方因此获得补偿性权利“。而此案例中，由于股权转让协议中规定的相关补偿是原股东b公司对被投资单位（项目公司）c公司未来或有事项的补偿，该案例中的情况是否适用与解释第19 号，c公司是否在发生此类业务时按照或有事项准则进行处理？\n请陈博给予指导，谢谢！ 该事项对a、b（交易双方）而言属于补偿性资产相关的交易。\n\n对于c公司（标的公司），应在实际收到补偿时计入资本公积处理。 https://bbs.esnai.cn/thread-5497266-1-1.html"}, {"tid": "5497264", "title": "同控下合并问题", "category": "最近更新", "questionAuthor": "dxd1999", "questionTime": "2026-05-27T10:00:52.000Z", "replyTime": "2026-06-02T01:05:00.000Z", "replySortTime": "2026-06-02T01:05:00.000Z", "url": "https://bbs.esnai.cn/thread-5497264-1-1.html", "question": 运营成本如何补偿？另外，是否约定运营一定年限后该系统无偿交给政府？ https://bbs.esnai.cn/thread-5497263-1-1.html"}, {"tid": "5497261", "title": "收入总额法净额法判断请教", "category": "最近更新", "questionAuthor": "myjedith", "questionTime": "2026-05-26T13:11:30.000Z", "replyTime": "2026-06-02T00:58:00.000Z", "replySortTime": "2026-06-02T00:58:00.000Z", "url": "https://bbs.esnai.cn/thread-5497261-1-1.html", "question": "求助陈版主，公司如下业务是否可以采用总额法核算。\n\n一、背景介绍\n\n公司开展互联网专线与电信增值业务拓展落地，主要是给各大园区的企业租户提供上网、互联网接入、光纤租赁服务。\n\n（一）互联网接入业务\n\n1.负责园区网络建设（包括不限于管井、光缆、光交箱等通信资源）、维护及管理工作，确保园区通信网络线路正常运行；负责提供业务合作开通的必要园区管井资源、楼宇管道资源及线路接入资源。\n\n2.合同中约定，负有故障维修的义务。\n\n3.具有一定的定价权，但是与供应商的合同体现的是供应商收取固定比例的分润。\n\n4.将基础运维工作外包代理商，代理商负责带宽出口服务相关的运维服务，包括不限于带宽监控、技术咨询及故障运维服务；\n\n（二）光纤租赁业务\n\n公司自建（或第三方代建）管井、光缆、光交箱等通信资源，供客户使用，若出现断网等情形，公司需赔偿损失，且无法向上游追索。但是日常维护、故障维修可能是第三方。\n\n业务把此类业务比作业主直租房子，是否可以类比理解，采用总额法确认。\n\n二、个人判断\n\n（一）互联网接入业务不符合总额法，类比充电桩业务，网络具有瞬间转移的特性，不具有控制权。\n\n（二）光纤租赁，需要证明光纤所有权在公司，且有类似的租赁资质\n\n三、补充资料\n\n如果公司可以提供以下资料，是否可以辅助支撑总额法确认？\n\n1.取得客户服务评价表，感谢信等\n\n2.取得验收单，且验收时，我方人员露脸、持工牌于验收现场拍照；\n\n3.证明我司除代理商外运维外提供的增值服务、重大整合的资料。如我司识别出问题点的记录、我司协商代理商、运营商等的沟通记录等；\n\n4.实施过程照片；\n\n5.实施时可匹配的自研软件著作权证书或专利证书；\n\n6.故障维修记录，拍照、客户确认等，客户确认单上不体现代理商。", "reply": "参考近期有比较明确结论的类似案例，如充电服务案例（财政部会计司发布的应用案例）、物业公司转售水电案例（证监会会计部监管报告中案例）来看，此类服务采用总额法的前提是来源的多样化，即可从多个水电、通信服务供应商处获得水电、上网服务等商品或服务（各供应商提供的商品或服务均占相当比重，没有一家占绝对优势），或者自行提供这些商品或服务，从而保证此类服务稳定提供的责任主要由本企业自身承担，在很大程度上不能外推给基础服务的供应商（供水、供电公司、电信运营商）。如不能满足该条件的，则应视同转售水电，采用净额法确认收入。", "searchText": "5497261 收入总额法净额法判断请教 最近更新 myjedith 2026-05-26t13:11:30.000z 2026-06-02t00:58:00.000z 求助陈版主，公司如下业务是否可以采用总额法核算。\n\n一、背景介绍\n\n公司开展互联网专线与电信增值业务拓展落地，主要是给各大园区的企业租户提供上网、互联网接入、光纤租赁服务。\n\n（一）互联网接入业务\n\n1.负责园区网络建设（包括不限于管井、光缆、光交箱等通信资源）、维护及管理工作，确保园区通信网络线路正常运行；负责提供业务合作开通的必要园区管井资源、楼宇管道资源及线路接入资源。\n\n2.合同中约定，负有故障维修的义务。\n\n3.具有一定的定价权，但是与供应商的合同体现的是供应商收取固定比例的分润。\n\n4.将基础运维工作外包代理商，代理商负责带宽出口服务相关的运维服务，包括不限于带宽监控、技术咨询及故障运维服务；\n\n（二）光纤租赁业务\n\n公司自建（或第三方代建）管井、光缆、光交箱等通信资源，供客户使用，若出现断网等情形，公司需赔偿损失，且无法向上游追索。但是日常维护、故障维修可能是第三方。\n\n业务把此类业务比作业主直租房子，是否可以类比理解，采用总额法确认。\n\n二、个人判断\n\n（一）互联网接入业务不符合总额法，类比充电桩业务，网络具有瞬间转移的特性，不具有控制权。\n\n（二）光纤租赁，需要证明光纤所有权在公司，且有类似的租赁资质\n\n三、补充资料\n\n如果公司可以提供以下资料，是否可以辅助支撑总额法确认？\n\n1.取得客户服务评价表，感谢信等\n\n2.取得验收单，且验收时，我方人员露脸、持工牌于验收现场拍照；\n\n3.证明我司除代理商外运维外提供的增值服务、重大整合的资料。如我司识别出问题点的记录、我司协商代理商、运营商等的沟通记录等；\n\n4.实施过程照片；\n\n5.实施时可匹配的自研软件著作权证书或专利证书；\n\n6.故障维修记录，拍照、客户确认等，客户确认单上不体现代理商。 参考近期有比较明确结论的类似案例，如充电服务案例（财政部会计司发布的应用案例）、物业公司转售水电案例（证监会会计部监管报告中案例）来看，此类服务采用总额法的前提是来源的多样化，即可从多个水电、通信服务供应商处获得水电、上网服务等商品或服务（各供应商提供的商品或服务均占相当比重，没有一家占绝对优势），或者自行提供这些商品或服务，从而保证此类服务稳定提供的责任主要由本企业自身承担，在很大程度上不能外推给基础服务的供应商（供水、供电公司、电信运营商）。如不能满足该条件的，则应视同转售水电，采用净额法确认收入。 https://bbs.esnai.cn/thread-5497261-1-1.html"}, {"tid": "5389360", "title": "非全资子公司分配股利的合并抵消问题", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2026-05-15T06:29:46.000Z", "replyTime": "2026-05-24T15:25:00.000Z", "replySortTime": "2026-05-24T15:25:00.000Z", "url": "https://bbs.esnai.cn/thread-5389360-1-1.html", "question": "按照成本法的抵销思路，是否是这样的：\n\n1、抵销股本与长期股权投资、少数股东权益：\n\n借：股本 100 \n\n     贷：长期股权投资 60\n\n           少数股东权益  40\n\n2、根据子公司净利润确认少数股东损益：\n\n借：少数股东损益  40\n\n    贷：少数股东权益 40\n\n3、抵销利润分配\n\n借：投资收益 60\n\n    贷：利润分配-向所有者分配股利  60\n\n最后的结果就是少数股东损益 40，少数股东权益 80，利润分配-向所有者分配股利 40.\n\n---\n\n谢谢陈版主，继续追问下。B是A的全资子公司，A挂账B公司应收账款100万元，2025年11月30日将B公司全部处置给A实际控制人控制的其他公司C，C跟A是平行关系，为同一实际控制人控制的公司。站在12月31日时点，由于B公司仍是A公司的关联方，A挂账B公司应收账款120万元，其中100万元是11月30日前形成的，那么期末披露关联方应收账款时，是披露120万元吗？假设不考虑坏账准备的影响。", "reply": "是。\n\n---\n\n是，按该时点余额全额披露为120万元。", "searchText": "5389360 非全资子公司分配股利的合并抵消问题 最近更新 爬爬呀 2026-05-15t06:29:46.000z 2026-05-24t15:25:00.000z 按照成本法的抵销思路，是否是这样的：\n\n1、抵销股本与长期股权投资、少数股东权益：\n\n借：股本 100 \n\n     贷：长期股权投资 60\n\n           少数股东权益  40\n\n2、根据子公司净利润确认少数股东损益：\n\n借：少数股东损益  40\n\n    贷：少数股东权益 40\n\n3、抵销利润分配\n\n借：投资收益 60\n\n    贷：利润分配-向所有者分配股利  60\n\n最后的结果就是少数股东损益 40，少数股东权益 80，利润分配-向所有者分配股利 40.\n\n---\n\n谢谢陈版主，继续追问下。b是a的全资子公司，a挂账b公司应收账款100万元，2025年11月30日将b公司全部处置给a实际控制人控制的其他公司c，c跟a是平行关系，为同一实际控制人控制的公司。站在12月31日时点，由于b公司仍是a公司的关联方，a挂账b公司应收账款120万元，其中100万元是11月30日前形成的，那么期末披露关联方应收账款时，是披露120万元吗？假设不考虑坏账准备的影响。 是。\n\n---\n\n是，按该时点余额全额披露为120万元。 https://bbs.esnai.cn/thread-5389360-1-1.html"}, {"tid": "5497034", "title": "陈版主，请教关于新租赁准则后租赁相关问题", "category": "最近更新", "questionAuthor": "wx_5abe02573bf7", "questionTime": "2026-05-08T03:15:45.000Z", "replyTime": "2026-05-24T15:22:00.000Z", "replySortTime": "2026-05-24T15:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5497034-1-1.html", "question": "我公司从事农业相关业务，会租赁租期超过一年的土地，对于租赁的土地，会发生租赁面积实测和当时租赁时不一致的情况，这种属于租赁变更吗？需要重新确认使用权资产和租赁负债，差额确认资产处置收益吗？\n\n     还存在租赁实测面积减少，同时租金有上涨（上涨原因是根据市场情况，每三年进行调整），这样的属于租赁变更还是可变租金？需要重新确认使用权资产和租赁负债，差额确认资产处置收益吗？\n\n---\n\n陈版主，如果单位面积租金和租赁面积的变动金额不大，是否可以直接费用化处理，不重新调整使用权资产和租赁负债", "reply": "因为“租金上涨是合同签订时约定：客户会根据市场情况等提供租金标准”，故主帖案例中的单位面积租金是取决于指数或比率（即，与物价指数挂钩）的可变租赁付款额。因单位面积租金的变化导致的租金变动，按照租赁准则第二十六条规定处理。\n\n对于因承租面积变动导致的租金变动，按照租赁准则第二十八条、第二十九条规定处理。其中，增加承租面积的，作为一项新租赁处理；减少承租面积的，作为使用权资产处置和租赁负债终止确认处理。\n\n---\n\n基于重要性原则考虑能否接受简化处理。", "searchText": "5497034 陈版主，请教关于新租赁准则后租赁相关问题 最近更新 wx_5abe02573bf7 2026-05-08t03:15:45.000z 2026-05-24t15:22:00.000z 我公司从事农业相关业务，会租赁租期超过一年的土地，对于租赁的土地，会发生租赁面积实测和当时租赁时不一致的情况，这种属于租赁变更吗？需要重新确认使用权资产和租赁负债，差额确认资产处置收益吗？\n\n     还存在租赁实测面积减少，同时租金有上涨（上涨原因是根据市场情况，每三年进行调整），这样的属于租赁变更还是可变租金？需要重新确认使用权资产和租赁负债，差额确认资产处置收益吗？\n\n---\n\n陈版主，如果单位面积租金和租赁面积的变动金额不大，是否可以直接费用化处理，不重新调整使用权资产和租赁负债 因为“租金上涨是合同签订时约定：客户会根据市场情况等提供租金标准”，故主帖案例中的单位面积租金是取决于指数或比率（即，与物价指数挂钩）的可变租赁付款额。因单位面积租金的变化导致的租金变动，按照租赁准则第二十六条规定处理。\n\n对于因承租面积变动导致的租金变动，按照租赁准则第二十八条、第二十九条规定处理。其中，增加承租面积的，作为一项新租赁处理；减少承租面积的，作为使用权资产处置和租赁负债终止确认处理。\n\n---\n\n基于重要性原则考虑能否接受简化处理。 https://bbs.esnai.cn/thread-5497034-1-1.html"}, {"tid": "5497065", "title": "请教陈版主：企业会计制度+同控+业务收购", "category": "最近更新", "questionAuthor": "我爱苏蜜", "questionTime": "2026-05-11T10:01:03.000Z", "replyTime": "2026-05-24T15:20:00.000Z", "replySortTime": "2026-05-24T15:20:00.000Z", "url": "https://bbs.esnai.cn/thread-5497065-1-1.html", "question": "尊敬的陈版主您好：\n\nA公司和B公司属于兄弟公司，同属最终控制方控制，均使用企业会计制度核算。B公司主营业务是1个海洋馆以及1个室内娱乐场馆，2个场馆分别独立核算。2025年11月公司A购买了公司B的娱乐场馆，收购的资产清单主要是室内设施和装修的固定资产、存货，以及另外与场馆人员重新签订了劳动合同，场馆实际业务运营在收购前后均没有发生变化，B公司注销分公司，A公司新设立分公司，将上述收购资产装入。该收购主要是最终控制方为整合相同业务线业务，所以调整架构，收购完成后，最终控制方在2026年2月将A公司出售给外部第三方集团。综上几个因素，A公司认为收购符合业务的几个条件，2025年12月31日报表账面作为一项业务收购来进行会计处理。其中，购买的固定资产和存货账面价值合计200万，支付对价按照评估报告3200万。问题1：A公司处理是否比照企业会计准则来处理，按照资产账面价值入账，差额冲权益（资本公积--盈余公积--未分配利润）？问题2：同控业务收购，是否涉及期初数据合并？\n\n非常感谢您！\n\n---\n\n非常感谢陈版主的回复。补充一下背景和新增信息：公司A购买公司B的资产是这个场馆的存货和固定资产，其中固定资产主要是场馆内的设施和装修，账面价值由于多年摊销只剩下50万，但是评估报告按照重置成本法估值有3000万。B公司的这个场馆本身一直经营不善，A公司在11月购买过来之后先按照评估价入账，但是在12月31日的时候由于场馆本身就一直经营不善，且预期未来也不会有起色，谨慎起见就又对这部分固定资产做了全额减值的处理。由于这个业务是基于集团内部的业务重组考虑，公司A购买公司B的娱乐场馆之后，集团就会把A公司整体打包出售给外部第三方集团。所以从商业实质角度来说，是否可以认为在购买时，这个按照重置成本法做出来的评估对价并不能代表真正的公允价值，而是集团基于重组考虑的内部交易，A公司需要按照B公司场馆的存货和固定资产账面价值入账，而非公允价值入账，评估增值的部分（3200万减去200万）需要作为权益性交易，冲减A公司的资本公积？非常感谢您！", "reply": "原制度并无类似于企业会计准则下“同一控制下合并”的规定，也不区分被收购方是否构成“业务”，A公司应将支付的收购对价款按照各项被收购资产公允价值的相对比例，对购买对价进行分摊，以确定各项被购入资产的入账价值。同时，原制度下也不要求对收购方的前期报表进行追溯重述，只需自收购完成日起将被收购方纳入收购方报表即可。\n\n---\n\n有这个可能性，关键在于在A购买B的资产时，是否已对后续出售A给外部第三方的交易做好了安排，即两者是否为一揽子交易，并非在集团单方面主导下完成。如是，则对A可能构成非同一控制下合并。", "searchText": "5497065 请教陈版主：企业会计制度+同控+业务收购 最近更新 我爱苏蜜 2026-05-11t10:01:03.000z 2026-05-24t15:20:00.000z 尊敬的陈版主您好：\n\na公司和b公司属于兄弟公司，同属最终控制方控制，均使用企业会计制度核算。b公司主营业务是1个海洋馆以及1个室内娱乐场馆，2个场馆分别独立核算。2025年11月公司a购买了公司b的娱乐场馆，收购的资产清单主要是室内设施和装修的固定资产、存货，以及另外与场馆人员重新签订了劳动合同，场馆实际业务运营在收购前后均没有发生变化，b公司注销分公司，a公司新设立分公司，将上述收购资产装入。该收购主要是最终控制方为整合相同业务线业务，所以调整架构，收购完成后，最终控制方在2026年2月将a公司出售给外部第三方集团。综上几个因素，a公司认为收购符合业务的几个条件，2025年12月31日报表账面作为一项业务收购来进行会计处理。其中，购买的固定资产和存货账面价值合计200万，支付对价按照评估报告3200万。问题1：a公司处理是否比照企业会计准则来处理，按照资产账面价值入账，差额冲权益（资本公积--盈余公积--未分配利润）？问题2：同控业务收购，是否涉及期初数据合并？\n\n非常感谢您！\n\n---\n\n非常感谢陈版主的回复。补充一下背景和新增信息：公司a购买公司b的资产是这个场馆的存货和固定资产，其中固定资产主要是场馆内的设施和装修，账面价值由于多年摊销只剩下50万，但是评估报告按照重置成本法估值有3000万。b公司的这个场馆本身一直经营不善，a公司在11月购买过来之后先按照评估价入账，但是在12月31日的时候由于场馆本身就一直经营不善，且预期未来也不会有起色，谨慎起见就又对这部分固定资产做了全额减值的处理。由于这个业务是基于集团内部的业务重组考虑，公司a购买公司b的娱乐场馆之后，集团就会把a公司整体打包出售给外部第三方集团。所以从商业实质角度来说，是否可以认为在购买时，这个按照重置成本法做出来的评估对价并不能代表真正的公允价值，而是集团基于重组考虑的内部交易，a公司需要按照b公司场馆的存货和固定资产账面价值入账，而非公允价值入账，评估增值的部分（3200万减去200万）需要作为权益性交易，冲减a公司的资本公积？非常感谢您！ 原制度并无类似于企业会计准则下“同一控制下合并”的规定，也不区分被收购方是否构成“业务”，a公司应将支付的收购对价款按照各项被收购资产公允价值的相对比例，对购买对价进行分摊，以确定各项被购入资产的入账价值。同时，原制度下也不要求对收购方的前期报表进行追溯重述，只需自收购完成日起将被收购方纳入收购方报表即可。\n\n---\n\n有这个可能性，关键在于在a购买b的资产时，是否已对后续出售a给外部第三方的交易做好了安排，即两者是否为一揽子交易，并非在集团单方面主导下完成。如是，则对a可能构成非同一控制下合并。 https://bbs.esnai.cn/thread-5497065-1-1.html"}, {"tid": "5497073", "title": "求助陈版主！关于政府补助账务处理", "category": "最近更新", "questionAuthor": "DDDJX", "questionTime": "2026-05-11T16:10:05.000Z", "replyTime": "2026-05-24T15:16:00.000Z", "replySortTime": "2026-05-24T15:16:00.000Z", "url": "https://bbs.esnai.cn/thread-5497073-1-1.html", "question": "背景：A公司收到某省相关部门的关于产业发展的专项资金补助，申报要求：产业类项目包括科研生产条件建设、某业务产业化和公共服务平台建设。公司向相关部门提交了申报材料，填写了产业类项目信息表，包含以下内容：项目名称、项目单位、总投资、项目背景及重要性、主要建设内容、建设目标、形象进度、资金保障；以及项目单位信息包括单位简介、上年度主营业务收入、是否有融资需求。 公司申报材料里介绍了公司的情况、产业园建设项目的具体情况，还提交了项目绩效目标申报表（包括项目建设内容及建设目标简介、产出指标:项目建成后投入设备数量、产线的可靠性、建设过程中安全生产事故次数、效益指标：财政资金带动投资比例、产品订货满足率、对周边环境污染的影响、有利于提升产业能力、产品满意度等。这些指标还设置了权重)。该项目需要相关部门的验收，但是补助在验收前会拨付给公司。\n\n 问：该补助资金是否可以算为综合类的补助，根据项目绩效目标申报表的指标对应的属性，按权重区分资产相关与收益相关，如果考核的是产线建设相关的指标对应的权重之和乘以补助资金是否可以计入与资产相关的补助？ 对于与效益相关指标的权重之和是否可以计入与收益相关的补助？\n\n---\n\n感谢陈版主的回复！如果政府没有明确资金用途，但是申报材料里有一个关于建设长期资产相关的预算明细，能否作为难以区分用途计入与收益相关的补助吗？", "reply": "是否认定为综合类补助，取决于其补助对象是否同时包含非流动资产购建和其他项目，即补助款的用途，与考核权重并不一定相关，因此以不同指标的考核权重为依据分拆政府补助很可能并不恰当。\n\n关于两类补助如何区分：请参阅《企业会计准则应用指南汇编2024》P488-489“综合性项目政府补助的会计处理”、《上市公司执行企业会计准则案例解析2024》之“案例7-02 政府补助类别的判断”及其相关案例。\n\n---\n\n既然申报材料中有一个关于建设长期资产相关的预算明细，那就应当以此为基础进行政府补助拆分。", "searchText": "5497073 求助陈版主！关于政府补助账务处理 最近更新 dddjx 2026-05-11t16:10:05.000z 2026-05-24t15:16:00.000z 背景：a公司收到某省相关部门的关于产业发展的专项资金补助，申报要求：产业类项目包括科研生产条件建设、某业务产业化和公共服务平台建设。公司向相关部门提交了申报材料，填写了产业类项目信息表，包含以下内容：项目名称、项目单位、总投资、项目背景及重要性、主要建设内容、建设目标、形象进度、资金保障；以及项目单位信息包括单位简介、上年度主营业务收入、是否有融资需求。 公司申报材料里介绍了公司的情况、产业园建设项目的具体情况，还提交了项目绩效目标申报表（包括项目建设内容及建设目标简介、产出指标:项目建成后投入设备数量、产线的可靠性、建设过程中安全生产事故次数、效益指标：财政资金带动投资比例、产品订货满足率、对周边环境污染的影响、有利于提升产业能力、产品满意度等。这些指标还设置了权重)。该项目需要相关部门的验收，但是补助在验收前会拨付给公司。\n\n 问：该补助资金是否可以算为综合类的补助，根据项目绩效目标申报表的指标对应的属性，按权重区分资产相关与收益相关，如果考核的是产线建设相关的指标对应的权重之和乘以补助资金是否可以计入与资产相关的补助？ 对于与效益相关指标的权重之和是否可以计入与收益相关的补助？\n\n---\n\n感谢陈版主的回复！如果政府没有明确资金用途，但是申报材料里有一个关于建设长期资产相关的预算明细，能否作为难以区分用途计入与收益相关的补助吗？ 是否认定为综合类补助，取决于其补助对象是否同时包含非流动资产购建和其他项目，即补助款的用途，与考核权重并不一定相关，因此以不同指标的考核权重为依据分拆政府补助很可能并不恰当。\n\n关于两类补助如何区分：请参阅《企业会计准则应用指南汇编2024》p488-489“综合性项目政府补助的会计处理”、《上市公司执行企业会计准则案例解析2024》之“案例7-02 政府补助类别的判断”及其相关案例。\n\n---\n\n既然申报材料中有一个关于建设长期资产相关的预算明细，那就应当以此为基础进行政府补助拆分。 https://bbs.esnai.cn/thread-5497073-1-1.html"}, {"tid": "5495075", "title": "急急急 求助 陈版主", "category": "最近更新", "questionAuthor": "爬爬呀", "questionTime": "2025-12-04T00:29:45.000Z", "replyTime": "2026-05-24T15:12:00.000Z", "replySortTime": "2026-05-24T15:12:00.000Z", "url": "https://bbs.esnai.cn/thread-5495075-1-1.html", "question": "案例背景是这样的：A为一家上市公司，下有一家非全资子公司B，对其持股比例为70%；剩余30%股权，一部分是由A公司的控股股东C公司成立的一家合伙企业D（C公司对合伙企业持股比例为99%）,对其持股比例13%； 一部分是由A公司的员工持股平台成立10家合伙企业E（统称为E）对其合计持股比例为17%； E合伙企业主要系为A公司的关键管理人员。当时合伙企业D、E对B持股，主要是当时B想分拆上市，实施了股权激励方案。后来由于种种原因，B公司分拆上市未能成功，于是合伙企业D、E想退出。故合伙企业D、E将其对B公司的30%股份转让给第三方F公司，收到F公司钱后，合伙企业D、E便会注销。一些主要条款如下：\n\n一、期间收益\n预期期间收益=投资方F公司出资余额×7%×实际投资天数/360，收益来源包括：1.B公司股利分配；2.实控人、C公司每年度向投资方F公司支付权利维持费。\n二、优先收购权\n1.优先收购权：投资方F公司投资满一年后，实控人、C公司按照不低于约定价格优先收购投资方F公司持有的B公司股权。约定价格=投资方F公司出资余额+预期期间收益-已收到的权利维持费-已收到的B公司分红/0.75（若部分收购则按比例计算）\n2. 权利维持费：为维持上述优先收购权利，实控人、C公司需按年向投资方F公司支付权利维持费。当年权利维持费=投资方F公司出资余额×7%×当年实际投资天数/360-当年已收到B公司分红/0.75\n三、退出方式\n1. 实控人、C公司行使优先收购权，按照约定价格收购投资方F公司持有的B公司股权。\n2. 以下任一特定情形发生，实控人、C公司应在投资方F公司出具书面通知之日起60日内，受让投资方F公司持有的全部B公司股权并一次性支付完毕转让价款：（1）投资方F公司持有B公司股权届满2年，未能通过上市公司发行股份/可转债购买资产（以上市公司首次公告重组交易相关的董事会决议为标准）、远期现金收购或其他方式实现投资本金及预期收益之退出，且投资方F公司未同意展期。（2）实控人、C公司未足额按年向投资方F公司支付权利维持费经投资方F公司书面催告逾期超过7个工作日仍未支付的；（3）实控人、C公司或B公司出现破产风险或清算事件的，包括但不限于发生解散事由、被发起或主动发起任何破产、清算、解散、歇业、停业、撤销、吊销、关闭、撤销、注销的程序；（超过其净资产额的5%）的财产被扣押、冻结、查封或司法拍卖；（4）实控人、C公司或B公司在其与金融机构之间的贷款合同或担保合同项下发生严重违约，例如发生金融负债逾期等情形；（5）自2025年起，B公司或A公司连续2个完整会计年度持续亏损，或任意一个会计年度相关审计机构未能对B公司或C公司集团的审计报告出具无保留审计意见；（6）未经投资方F公司书面同意，B公司进行减资、合并、分立、改变主营业务、重大资产重组、除投资方F公司外的B公司其他股东将所持B公司股权对非上市公司并表主体转让；（7）实控人失去对 B公司集团的控制权，或者因涉嫌违法犯罪行为被法院判决承担刑事责任；（8）实控人或C公司违反消极质押、处置承诺；（9）交易文件项下相关主体严重违反交易文件之约定，且未能在投资方F公司届时要求的期限内或者按照投资方F公司要求予以妥善解决或纠正的。\n出现上述任一情形时，实控人、C公司应当收购投资方F公司持有的全部B公司股权，不得仅收购部分股权，股权转让价款应按照如下公式计算：转让价款=投资方F公司出资余额+预期期间收益-已收到的期间收益若上述情形下，实控人或C公司未在投资方F公司出具出面通知后的60天内（付款期）回购投资方F公司持有的全部B公司股权，投资方F公司有权自行转让持有的B公司股权，转让价款不低于经投资方F公司和实控人或C公司共同认可的评估机构出具的评估值，转让价款用于偿还投资方F公司投资本息、违约金，如若转让价款不能覆盖投资方F公司投资本息，则由实控人和C公司提供差额补足。四、救济措施\n若投资期限届满或触发上述特定情形，实控人、C公司未能按约受让投资方F公司持有的全部B公司股权并支付转让价款的，视为实控人、C公司对投资方F公司违约。自违约之日起，投资方F公司的预期收益率提升至10%/年，并同时触发以下救济措施：1.投资方F公司有权要求增加B公司董事席位，直至投资方F公司合计拥有的B公司董事会席位数至半数以上，且就董事会审议事项，投资方F公司委派董事享有一票否决权。投资方F公司有权委派B公司财务总监和总经理人选。2.投资方F公司获得拖售权，如拟议受让方需要购买的B公司股权多于投资方F公司拟出售的股权，C公司集团及其控制主体应积极配合，确保根据投资方F公司要求按照相同的条件、价格不低于经双方共同认可的评估机构出具的评估值、与投资方F公司共同向拟议受让方出售，但需在合法、合规基础上，按照上市公司相关审议程序履行。\n备注：实控人、C公司承担的权利维持费、回购义务等费用，均不会再向任何一方（如D、E、B公司）收取。\n\n处理思路：\n1、B公司个别报表层面：\n协议签订并办理相应的工商登记变更时：\n借：实收资本-D、E公司\n  贷：实收资本-F公司\n后续向股东分红时，分配给F公司的也同其他股东一样的处理：\n借：利润分配\n  贷：应付股利\n2、D、E公司个别报表层面：按处置公司股权处理，正常确认投资收益。\n3、C公司个别报表层面：\nD、E公司收到F公司股权转让款时：\n借：长期股权投资-B公司\n    未确认融资费用\n   贷：长期应付款-F公司\n确认每期支付的费用时：\n借：财务费用\n   贷：长期应付款-F公司\n支付给F公司时：\n借：长期应付款-F公司\n   贷：银行存款\n4、C公司合并报表层面：本质上是以股权质押借款，应完整体现该业务的“名股实债”的经济实质，即最终的处理结果：\n在公司收到投资时：\n借：银行存款                 \n    未确认融资费用            \n   贷：长期应付款-F公司\n后续每期确认融资费用时：\n借：财务费用\n    贷：未确认融资费用\n偿还本息时：\n借：长期应付款-F公司\n    贷：银行存款\n\n疑问：1、上述的会计处理思路是否正确呢？\n2、C公司初始计入长期股权投资、长期应付款的金额如何计算呢？以及后续每期支付的金额如何计算呢？\n\n3、 由此导致资金的受益方及承担成本的承担人不匹配，如何来进行理解呢？\n\n---\n\n针对第3点继续追问一下：1、C公司是否也需要同样按照权益性交易原则，为A的员工承担资金成本的部分，计入借：长期股权投资-A公司 贷：财务费用-利息收入？\n\n2、“A应按权益性交易原则处理，即按照C和实控人计提利息的金额，确认管理费用（职工薪酬费用）和资本公积。”，为何不是计入财务费用-利息费用呢？", "reply": "1、基本可以这样处理。\n\n2、C公司初始计入长期股权投资、长期应付款的金额按未来需支付的回购款的折现值计算。实际上就是F的受让价款。\n\n3、由此导致资金的受益方及承担成本的承担人不匹配，即受益人为D、E的合伙人（C以及A的员工），但回购资金成本由C和实控人承担。对于C和实控人为A的员工承担资金成本的部分，A应按权益性交易原则处理，即按照C和实控人计提利息的金额，确认管理费用（职工薪酬费用）和资本公积。\n\n---\n\n1、需要。2、受益人为员工，故属于职工薪酬费用。", "searchText": "5495075 急急急 求助 陈版主 最近更新 爬爬呀 2025-12-04t00:29:45.000z 2026-05-24t15:12:00.000z 案例背景是这样的：a为一家上市公司，下有一家非全资子公司b，对其持股比例为70%；剩余30%股权，一部分是由a公司的控股股东c公司成立的一家合伙企业d（c公司对合伙企业持股比例为99%）,对其持股比例13%； 一部分是由a公司的员工持股平台成立10家合伙企业e（统称为e）对其合计持股比例为17%； e合伙企业主要系为a公司的关键管理人员。当时合伙企业d、e对b持股，主要是当时b想分拆上市，实施了股权激励方案。后来由于种种原因，b公司分拆上市未能成功，于是合伙企业d、e想退出。故合伙企业d、e将其对b公司的30%股份转让给第三方f公司，收到f公司钱后，合伙企业d、e便会注销。一些主要条款如下：\n\n一、期间收益\n预期期间收益=投资方f公司出资余额×7%×实际投资天数/360，收益来源包括：1.b公司股利分配；2.实控人、c公司每年度向投资方f公司支付权利维持费。\n二、优先收购权\n1.优先收购权：投资方f公司投资满一年后，实控人、c公司按照不低于约定价格优先收购投资方f公司持有的b公司股权。约定价格=投资方f公司出资余额+预期期间收益-已收到的权利维持费-已收到的b公司分红/0.75（若部分收购则按比例计算）\n2. 权利维持费：为维持上述优先收购权利，实控人、c公司需按年向投资方f公司支付权利维持费。当年权利维持费=投资方f公司出资余额×7%×当年实际投资天数/360-当年已收到b公司分红/0.75\n三、退出方式\n1. 实控人、c公司行使优先收购权，按照约定价格收购投资方f公司持有的b公司股权。\n2. 以下任一特定情形发生，实控人、c公司应在投资方f公司出具书面通知之日起60日内，受让投资方f公司持有的全部b公司股权并一次性支付完毕转让价款：（1）投资方f公司持有b公司股权届满2年，未能通过上市公司发行股份/可转债购买资产（以上市公司首次公告重组交易相关的董事会决议为标准）、远期现金收购或其他方式实现投资本金及预期收益之退出，且投资方f公司未同意展期。（2）实控人、c公司未足额按年向投资方f公司支付权利维持费经投资方f公司书面催告逾期超过7个工作日仍未支付的；（3）实控人、c公司或b公司出现破产风险或清算事件的，包括但不限于发生解散事由、被发起或主动发起任何破产、清算、解散、歇业、停业、撤销、吊销、关闭、撤销、注销的程序；（超过其净资产额的5%）的财产被扣押、冻结、查封或司法拍卖；（4）实控人、c公司或b公司在其与金融机构之间的贷款合同或担保合同项下发生严重违约，例如发生金融负债逾期等情形；（5）自2025年起，b公司或a公司连续2个完整会计年度持续亏损，或任意一个会计年度相关审计机构未能对b公司或c公司集团的审计报告出具无保留审计意见；（6）未经投资方f公司书面同意，b公司进行减资、合并、分立、改变主营业务、重大资产重组、除投资方f公司外的b公司其他股东将所持b公司股权对非上市公司并表主体转让；（7）实控人失去对 b公司集团的控制权，或者因涉嫌违法犯罪行为被法院判决承担刑事责任；（8）实控人或c公司违反消极质押、处置承诺；（9）交易文件项下相关主体严重违反交易文件之约定，且未能在投资方f公司届时要求的期限内或者按照投资方f公司要求予以妥善解决或纠正的。\n出现上述任一情形时，实控人、c公司应当收购投资方f公司持有的全部b公司股权，不得仅收购部分股权，股权转让价款应按照如下公式计算：转让价款=投资方f公司出资余额+预期期间收益-已收到的期间收益若上述情形下，实控人或c公司未在投资方f公司出具出面通知后的60天内（付款期）回购投资方f公司持有的全部b公司股权，投资方f公司有权自行转让持有的b公司股权，转让价款不低于经投资方f公司和实控人或c公司共同认可的评估机构出具的评估值，转让价款用于偿还投资方f公司投资本息、违约金，如若转让价款不能覆盖投资方f公司投资本息，则由实控人和c公司提供差额补足。四、救济措施\n若投资期限届满或触发上述特定情形，实控人、c公司未能按约受让投资方f公司持有的全部b公司股权并支付转让价款的，视为实控人、c公司对投资方f公司违约。自违约之日起，投资方f公司的预期收益率提升至10%/年，并同时触发以下救济措施：1.投资方f公司有权要求增加b公司董事席位，直至投资方f公司合计拥有的b公司董事会席位数至半数以上，且就董事会审议事项，投资方f公司委派董事享有一票否决权。投资方f公司有权委派b公司财务总监和总经理人选。2.投资方f公司获得拖售权，如拟议受让方需要购买的b公司股权多于投资方f公司拟出售的股权，c公司集团及其控制主体应积极配合，确保根据投资方f公司要求按照相同的条件、价格不低于经双方共同认可的评估机构出具的评估值、与投资方f公司共同向拟议受让方出售，但需在合法、合规基础上，按照上市公司相关审议程序履行。\n备注：实控人、c公司承担的权利维持费、回购义务等费用，均不会再向任何一方（如d、e、b公司）收取。\n\n处理思路：\n1、b公司个别报表层面：\n协议签订并办理相应的工商登记变更时：\n借：实收资本-d、e公司\n  贷：实收资本-f公司\n后续向股东分红时，分配给f公司的也同其他股东一样的处理：\n借：利润分配\n  贷：应付股利\n2、d、e公司个别报表层面：按处置公司股权处理，正常确认投资收益。\n3、c公司个别报表层面：\nd、e公司收到f公司股权转让款时：\n借：长期股权投资-b公司\n    未确认融资费用\n   贷：长期应付款-f公司\n确认每期支付的费用时：\n借：财务费用\n   贷：长期应付款-f公司\n支付给f公司时：\n借：长期应付款-f公司\n   贷：银行存款\n4、c公司合并报表层面：本质上是以股权质押借款，应完整体现该业务的“名股实债”的经济实质，即最终的处理结果：\n在公司收到投资时：\n借：银行存款                 \n    未确认融资费用            \n   贷：长期应付款-f公司\n后续每期确认融资费用时：\n借：财务费用\n    贷：未确认融资费用\n偿还本息时：\n借：长期应付款-f公司\n    贷：银行存款\n\n疑问：1、上述的会计处理思路是否正确呢？\n2、c公司初始计入长期股权投资、长期应付款的金额如何计算呢？以及后续每期支付的金额如何计算呢？\n\n3、 由此导致资金的受益方及承担成本的承担人不匹配，如何来进行理解呢？\n\n---\n\n针对第3点继续追问一下：1、c公司是否也需要同样按照权益性交易原则，为a的员工承担资金成本的部分，计入借：长期股权投资-a公司 贷：财务费用-利息收入？\n\n2、“a应按权益性交易原则处理，即按照c和实控人计提利息的金额，确认管理费用（职工薪酬费用）和资本公积。”，为何不是计入财务费用-利息费用呢？ 1、基本可以这样处理。\n\n2、c公司初始计入长期股权投资、长期应付款的金额按未来需支付的回购款的折现值计算。实际上就是f的受让价款。\n\n3、由此导致资金的受益方及承担成本的承担人不匹配，即受益人为d、e的合伙人（c以及a的员工），但回购资金成本由c和实控人承担。对于c和实控人为a的员工承担资金成本的部分，a应按权益性交易原则处理，即按照c和实控人计提利息的金额，确认管理费用（职工薪酬费用）和资本公积。\n\n---\n\n1、需要。2、受益人为员工，故属于职工薪酬费用。 https://bbs.esnai.cn/thread-5495075-1-1.html"}, {"tid": "5496161", "title": "请教陈版主关于存在回购义务的外部股东增资对少数股东权益和金融负债的确认事项", "category": "合并/股权/权益法", "questionAuthor": "青砖作尘", "questionTime": "2026-02-26T11:11:12.000Z", "replyTime": "2026-05-24T12:22:00.000Z", "replySortTime": "2026-05-24T12:22:00.000Z", "url": "https://bbs.esnai.cn/thread-5496161-1-1.html", "question": "案例背景：本公司外部股东增资1000万（公司本身附有不可避免的回购义务），在单体及合并层面都需要将收到的增资款确认股本和资本公积（股本溢价）；同时按照回购所需支付金额的现值，将回购义务从权益重分类为一项金融负债,会计分录为借:资本公积 贷:金融负债；需请教陈版主指导如下问题，感谢！\n\n1.金融负债的现值该如何折现，以及后续各期利息费用如何确认？\n\n以如下数据做测算：本金1000万，约定回购期限为5年，回购利率为5%，单利计息，公司无借款，参考5年期LPR3.5%作为折现率，到期回购义务本息和为1250万，现值为1052.47万=1250/（1+3.5%）^5  ，各期确认利息费用考虑折现后合计数=197.53万比不考虑折现前的利息和250万要小，折现模型如下：\n\n 时间    现金流  回购义务现值  利息费用  不考虑折现利息费用起始日                   1,052.47     \n\n第一年         0        1,089.30      36.83               50\n\n第二年         0        1,127.43      38.13               50\n\n第三年         0        1,166.89      39.46               50\n\n第四年         0        1,207.73      40.84               50\n\n第五年    1250        1,250.00     42.27                50\n\n合计                                      197.53              250\n\n2.在本公司的母公司合并报表层面因子公司少数股东增资导致母公司股权稀释但未丧失控制权时，合并层面少数股东权益的计算是否要考虑应确认回购义务对本公司净资产的影响（增资后本公司的净资产如果考虑回购义务的确认，比增资前净资产更低）\n\n假设增资前母公司应享有本公司账面净资产的份额为-1个亿（100%控股），本公司外部投资者增资1000万（持股比例为5%），增资后本公司账面净资产份额为-1个亿+1000万-1052.47万=-10052.47万，母公司应享有的本公司净资产份额为-10052.47万*95%=-9549.85万，确认少数股东权益-502.62万。\n\n---\n\n继续追问一下：为何“合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额”？这个如何理解呢？", "reply": "1、实务中一般直接按照回购协议约定的计息利率折现，企业的增量融资成本不可能恰好等于LPR，一般都会高于LPR。\n\n2、合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额，在此基础上乘以少数股东对子公司的持股比例计算少数股东权益）。\n\n在很多案例中，被增资的子公司和母公司对回购股权是承担连带责任的，此时该子公司个别报表层面已经确认过回购义务相关负债，母公司合并报表层面就没有必要重复反映了，直接将子公司报表中的该项回购义务相关负债平移到合并报表层面即可。\n\n---\n\n使得合并报表中的少数股东权益能够真实反映少数股东所享有的权益金额。", "searchText": "5496161 请教陈版主关于存在回购义务的外部股东增资对少数股东权益和金融负债的确认事项 合并/股权/权益法 青砖作尘 2026-02-26t11:11:12.000z 2026-05-24t12:22:00.000z 案例背景：本公司外部股东增资1000万（公司本身附有不可避免的回购义务），在单体及合并层面都需要将收到的增资款确认股本和资本公积（股本溢价）；同时按照回购所需支付金额的现值，将回购义务从权益重分类为一项金融负债,会计分录为借:资本公积 贷:金融负债；需请教陈版主指导如下问题，感谢！\n\n1.金融负债的现值该如何折现，以及后续各期利息费用如何确认？\n\n以如下数据做测算：本金1000万，约定回购期限为5年，回购利率为5%，单利计息，公司无借款，参考5年期lpr3.5%作为折现率，到期回购义务本息和为1250万，现值为1052.47万=1250/（1+3.5%）^5  ，各期确认利息费用考虑折现后合计数=197.53万比不考虑折现前的利息和250万要小，折现模型如下：\n\n 时间    现金流  回购义务现值  利息费用  不考虑折现利息费用起始日                   1,052.47     \n\n第一年         0        1,089.30      36.83               50\n\n第二年         0        1,127.43      38.13               50\n\n第三年         0        1,166.89      39.46               50\n\n第四年         0        1,207.73      40.84               50\n\n第五年    1250        1,250.00     42.27                50\n\n合计                                      197.53              250\n\n2.在本公司的母公司合并报表层面因子公司少数股东增资导致母公司股权稀释但未丧失控制权时，合并层面少数股东权益的计算是否要考虑应确认回购义务对本公司净资产的影响（增资后本公司的净资产如果考虑回购义务的确认，比增资前净资产更低）\n\n假设增资前母公司应享有本公司账面净资产的份额为-1个亿（100%控股），本公司外部投资者增资1000万（持股比例为5%），增资后本公司账面净资产份额为-1个亿+1000万-1052.47万=-10052.47万，母公司应享有的本公司净资产份额为-10052.47万*95%=-9549.85万，确认少数股东权益-502.62万。\n\n---\n\n继续追问一下：为何“合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额”？这个如何理解呢？ 1、实务中一般直接按照回购协议约定的计息利率折现，企业的增量融资成本不可能恰好等于lpr，一般都会高于lpr。\n\n2、合并层面的少数股东权益的计算，不扣减被投资子公司自身就回购义务确认的金融负债（即需要将该子公司的净资产模拟加回回购义务相关金融负债的初始计量金额，在此基础上乘以少数股东对子公司的持股比例计算少数股东权益）。\n\n在很多案例中，被增资的子公司和母公司对回购股权是承担连带责任的，此时该子公司个别报表层面已经确认过回购义务相关负债，母公司合并报表层面就没有必要重复反映了，直接将子公司报表中的该项回购义务相关负债平移到合并报表层面即可。\n\n---\n\n使得合并报表中的少数股东权益能够真实反映少数股东所享有的权益金额。 https://bbs.esnai.cn/thread-5496161-1-1.html"}, {"tid": "5492314", "title": "非全资子公司的联营企业投资收益在合并报表的列报", "category": "最近更新", "questionAuthor": "tanhuan508", "questionTime": "2025-04-29T02:40:35.000Z", "replyTime": "2026-05-18T03:01:05.000Z", "replySortTime": "2026-05-18T03:01:05.000Z", "url": "https://bbs.esnai.com/thread-5492314-1-1.html", "question": "现有母公司A持有子公司B 80%的股权，B公司持有C公司30%股权具有重大影响，在编制母公司A的合并财务报表时，是否需要穿透按照80%×30%=24%的持股比例确认，调整合并财务报表中对C公司按照权益法计算的投资收益金额？烦请各位前辈不吝赐教！！\n\n---\n\n继续追问下，辛苦陈版主指导下：\n\n是否是这样的，1、在母公司合并报告中列示的对C公司持股比例，披露为间接持股30%？                            \n\n  2、在母公司合并报表中，将归属于少数股东的投资收益部分，借：少数股东损益 贷：少数股东权益？", "reply": "合并报表层面对C的投资收益仍按30%的股权比例计算，但其中有6%股权对应的收益应归属于少数股东损益。归属母公司股东的收益比例是24%。\n\n---\n\n是。", "searchText": "5492314 非全资子公司的联营企业投资收益在合并报表的列报 最近更新 tanhuan508 2025-04-29t02:40:35.000z 2026-05-18t03:01:05.000z 现有母公司a持有子公司b 80%的股权，b公司持有c公司30%股权具有重大影响，在编制母公司a的合并财务报表时，是否需要穿透按照80%×30%=24%的持股比例确认，调整合并财务报表中对c公司按照权益法计算的投资收益金额？烦请各位前辈不吝赐教！！\n\n---\n\n继续追问下，辛苦陈版主指导下：\n\n是否是这样的，1、在母公司合并报告中列示的对c公司持股比例，披露为间接持股30%？                            \n\n  2、在母公司合并报表中，将归属于少数股东的投资收益部分，借：少数股东损益 贷：少数股东权益？ 合并报表层面对c的投资收益仍按30%的股权比例计算，但其中有6%股权对应的收益应归属于少数股东损益。归属母公司股东的收益比例是24%。\n\n---\n\n是。 https://bbs.esnai.com/thread-5492314-1-1.html"}, {"tid": "5496949", "title": "求助陈版主，合营企业其他股东退出形成100%持股但标的不构成业务的判断和会计处理", "category": "最近更新", "questionAuthor": "BeckScott", "questionTime": "2026-04-30T05:42:40.000Z", "replyTime": "2026-05-14T11:44:00.000Z", "replySortTime": "2026-05-14T11:44:00.000Z", "url": "https://bbs.esnai.com/thread-5496949-1-1.html", "question": "我们是A公司，原持有B公司40%股权并按权益法核算，因B公司持续亏损逐步停止业务，几方股东达成一致，B公司定向另外两位股东(持股40%，20%）减资，从而A公司成为100%持股的股东，拟将B公司纳入合并范围。B公司股本1000，盈余公积500，未分配利润-1200，故净资产账面价值300。可辨认净资产评估的公允价值330，为固定资产增值所致（账面价值125，评估价值155，主要为生产用机械设备）。B公司减资前总资产账面价值375，其中现金230，应收账款20，固定资产125，B公司按照账面净资产公允价值330*60%=198向其他股东返还现金。请问，在B公司业务暂停、且根据集中度测试固定资产公允价值155占分配后总资产公允价值375+30-198-(230-198)=88.5%情形下，能否判断B公司不构成业务？\n\n如果不构成业务，根据准则应将购买成本以购买日所取得各项可辨认资产、负债的相对公允价值为基础进行分配，此时的购买成本应如何确定，是A公司账面权益法核算的长期股权投资，还是B公司分配后的账面净资产公允价值吗？（如果是后者，由于整个交易A公司未额外支付成本，是否会计处理和构成业务的情形没有差异了？）\n\n望陈版主解答，谢谢！\n\n---\n\n感谢陈版主，还想请问一下，长期股权投资购买成本仍等于B公司可辨认净资产的公允价值的理论依据/原因是什么？这样是否表明合并报表层面，原权益法下已持有的40%股权在购买日重新计量了（因为不满足企业合并，但此处还是近似遵循了合并报表准则第四十八条“分步购买实现非同一控制下合并”的规定），长期股权投资账面价值与可辨认净资产公允价值差额仍然计入投资收益吗？另外想咨询一下个别报表会计处理，是否仍然按照权益法长期股权投资账面价值计量？即根据长投准则，企业通过多次交易分步实现非同一控制下企业合并的，在编制个别财务报表时，应当按照原持有的股权投资的账面价值加上新增投资成本之和，作为改按成本法核算的初始投资成本。", "reply": "1、根据主帖信息，B公司在被A公司控制的时点不构成业务。\n\n2、合并报表层面，购买成本仍等于B公司可辨认净资产的公允价值，即330*40%=132。由于B不构成业务，因此在A的合并报表中不确认商誉和递延所得税，这是与一般的非同一控制下合并（被购买方构成业务）最主要的区别。\n\n---\n\n可以这样理解。但对于被购买方不构成业务的情形下的分步购买是否需对此前持有的股权进行重新计量的问题，目前并无定论。证监会此前讨论中曾提出过不进行重新计量，总之也是有不同的观点。", "searchText": "5496949 求助陈版主，合营企业其他股东退出形成100%持股但标的不构成业务的判断和会计处理 最近更新 beckscott 2026-04-30t05:42:40.000z 2026-05-14t11:44:00.000z 我们是a公司，原持有b公司40%股权并按权益法核算，因b公司持续亏损逐步停止业务，几方股东达成一致，b公司定向另外两位股东(持股40%，20%）减资，从而a公司成为100%持股的股东，拟将b公司纳入合并范围。b公司股本1000，盈余公积500，未分配利润-1200，故净资产账面价值300。可辨认净资产评估的公允价值330，为固定资产增值所致（账面价值125，评估价值155，主要为生产用机械设备）。b公司减资前总资产账面价值375，其中现金230，应收账款20，固定资产125，b公司按照账面净资产公允价值330*60%=198向其他股东返还现金。请问，在b公司业务暂停、且根据集中度测试固定资产公允价值155占分配后总资产公允价值375+30-198-(230-198)=88.5%情形下，能否判断b公司不构成业务？\n\n如果不构成业务，根据准则应将购买成本以购买日所取得各项可辨认资产、负债的相对公允价值为基础进行分配，此时的购买成本应如何确定，是a公司账面权益法核算的长期股权投资，还是b公司分配后的账面净资产公允价值吗？（如果是后者，由于整个交易a公司未额外支付成本，是否会计处理和构成业务的情形没有差异了？）\n\n望陈版主解答，谢谢！\n\n---\n\n感谢陈版主，还想请问一下，长期股权投资购买成本仍等于b公司可辨认净资产的公允价值的理论依据/原因是什么？这样是否表明合并报表层面，原权益法下已持有的40%股权在购买日重新计量了（因为不满足企业合并，但此处还是近似遵循了合并报表准则第四十八条“分步购买实现非同一控制下合并”的规定），长期股权投资账面价值与可辨认净资产公允价值差额仍然计入投资收益吗？另外想咨询一下个别报表会计处理，是否仍然按照权益法长期股权投资账面价值计量？即根据长投准则，企业通过多次交易分步实现非同一控制下企业合并的，在编制个别财务报表时，应当按照原持有的股权投资的账面价值加上新增投资成本之和，作为改按成本法核算的初始投资成本。 1、根据主帖信息，b公司在被a公司控制的时点不构成业务。\n\n2、合并报表层面，购买成本仍等于b公司可辨认净资产的公允价值，即330*40%=132。由于b不构成业务，因此在a的合并报表中不确认商誉和递延所得税，这是与一般的非同一控制下合并（被购买方构成业务）最主要的区别。\n\n---\n\n可以这样理解。但对于被购买方不构成业务的情形下的分步购买是否需对此前持有的股权进行重新计量的问题，目前并无定论。证监会此前讨论中曾提出过不进行重新计量，总之也是有不同的观点。 https://bbs.esnai.com/thread-5496949-1-1.html"}, {"tid": "5495256", "title": "固定资产资本化大修理费用", "category": "最近更新", "questionAuthor": "安好", "questionTime": "2025-12-16T14:58:16.000Z", "replyTime": "2026-05-14T10:17:00.000Z", "replySortTime": "2026-05-14T10:17:00.000Z", "url": "https://bbs.esnai.com/thread-5495256-1-1.html", "question": "2025年注会会计教材56页有这样一段话“企业对固定资产进行定期检查发生的大修理费用，有确凿证据表明符合资本化条件的部分，可以计入固定资产成本或其他相关资产的成本;不符合资本化条件的，应当费用化，计入当期损益。”\n\n请问这里的计入其他相关资产的成本是指什么情况？谢谢！\n\n---\n\n陈版，我想问一下，那什么情况下的大修费用是可以计入固定资产成本的？", "reply": "“其他相关资产成本”可能主要还是指产品的生产成本，即对生产设备的大修理等支出有可能可以计入制造费用，由本期或者一段时间内的产品成本承担。但个人理解，计入制造费用的方法要慎用，因为可能导致不同期间的产品成本不可比。对于生产设备的大修理支出，个人更倾向于直接计入营业成本。\n\n一般情况下不应计入长期待摊费用之类科目。\n\n---\n\n必须是大修和改扩建结合，增加资产的未来经济利益流入潜力。", "searchText": "5495256 固定资产资本化大修理费用 最近更新 安好 2025-12-16t14:58:16.000z 2026-05-14t10:17:00.000z 2025年注会会计教材56页有这样一段话“企业对固定资产进行定期检查发生的大修理费用，有确凿证据表明符合资本化条件的部分，可以计入固定资产成本或其他相关资产的成本;不符合资本化条件的，应当费用化，计入当期损益。”\n\n请问这里的计入其他相关资产的成本是指什么情况？谢谢！\n\n---\n\n陈版，我想问一下，那什么情况下的大修费用是可以计入固定资产成本的？ “其他相关资产成本”可能主要还是指产品的生产成本，即对生产设备的大修理等支出有可能可以计入制造费用，由本期或者一段时间内的产品成本承担。但个人理解，计入制造费用的方法要慎用，因为可能导致不同期间的产品成本不可比。对于生产设备的大修理支出，个人更倾向于直接计入营业成本。\n\n一般情况下不应计入长期待摊费用之类科目。\n\n---\n\n必须是大修和改扩建结合，增加资产的未来经济利益流入潜力。 https://bbs.esnai.com/thread-5495256-1-1.html"}, {"tid": "5496938", "title": "求助陈版，请问新型业务共同投资音乐节核算论证", "category": "最近更新", "questionAuthor": "Yu9696", "questionTime": "2026-04-29T10:05:35.000Z", "replyTime": "2026-05-14T10:15:00.000Z", "replySortTime": "2026-05-14T10:15:00.000Z", "url": "https://bbs.esnai.com/thread-5496938-1-1.html", "question": "背景介绍：A公司属于文化传媒行业，在2017年2月与B公司（音乐节IP持有方）签订合作协议。双方合作组织某歌星进行全国巡回演唱会，双方合计出资3.5亿元。A公司出资1.5亿元（转B公司账户），B公司出资2亿元并主导演唱会项目的全部运作。\n\n双方约定，按照投资比例进行风险和报酬的分配。待活动结束后根据收益条款扣掉出资款结算，收益条款目前有 05-14T10:09:00.000Z", "url": "https://bbs.esnai.com/thread-5051348-1-1.html", "question": "请教陈版：\n财会[2010]15号\n七、企业集团内涉及不同企业的股份支付交易应当如何进行会计处理?\n答：企业集团（由母公司和其全部子公司构成）内发生的股份支付交易，应当按照以下规定进行会计处理：\n（一）结算企业以其本身权益工具结算的，应当将该股份支付交易作为权益结算的股份支付处理；除此之外，应当作为现金结算的股份支付处理。\n结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积（其他资本公积）或负债。\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n本解释发布前股份支付交易未按上述规定处理的，应当进行追溯调整，追溯调整不切实可行的除外。\n\n光看定义怕理解有偏差，举个例子请陈版指点：\n甲集团公司旗下有三家公司A、B、C，其中A公司全资控股B、C公司，甲集团考虑公司长远发展故对员工进行股权激励，以甲公司持有的A公司股权对A公司高管和B公司高管进行股权激励。在本案例中，结算公司为甲集团公司，其权益工具为甲公司持有的对A公司的股权。接受服务企业是A公司和B公司。\n甲公司的账务处理是  借：长期股权投资  A+B\n                            贷：资本公积-其他资本公积\nA公司和B公司的账务处理：  借：管理费用（A+B）\n                              贷：资本公积-其他资本公积\n在甲集团的合并报表中抵消的是  借：资本公积-其他资本公积\n                                  贷：长期股权投资 A+B\n我的疑问是以甲公司持有的A公司股权对B公司员工进行股份支付交易是否符合财会[2010]15号的规定，下级公司的员工享受上级公司的股份支付是否合规。在上例中就是A公司和B公司的账务处理是否正确。\n\n---\n\na确认长骨投资b是否合适？毕竟集团公司甲提供方？\n\n---\n\n（１）陈老师，结算企业以其自身权益工具结算的，计入资本公积，以其他企业权益工具结算的，计入负债。上例中，甲集团以A公司股权进行结算，是否应该计入负债啊？\n\r\n（２）下文中，加粗部分：接受服务企业具有结算义务，授予本企业职工的是其本身权益工具（或其他单位权益工具）……\n\r\n我想问，这个接受服务企业是谁呢？是第一段中的结算企业吗？是结算企业与接受服务企业同为一个企业的情况，重新把第一段的处理方式描述了一遍？还是，就是指仅子公司的处理？\n\r\n（一）结算企业以其本身权益工具结算的，应当将该股份支付交易作为权益结算的股份支付处理；除此之外，应当作为现金结算的股份支付处理。\n\r\n结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积（其他资本公积）或负债。\n\r\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n---\n\n陈老师，感谢您凌晨还在回复大家的问题！太佩服您了！\n\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n上面这段话分为三种情况：\n\n1.接受服务企业没有结算义务:即母公司替子公司结算，子公司仅接受服务不需要结算。这个好理解 \n\n2.接受服务企业授予本企业职工的是其本身权益工具；\n\n3.接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的。\n\n上述2.3两种情况，不太能理解，如果母公司替它结算了，为什么子公司还要结算？高会有个辅导书上说，这种情况下，是结算企业和接受服务企业为同一企业的情况。\n\n---\n\n如果子公司属于“接受服务企业本身即负有结算义务的情况”，两者合一的处理，即在子公司单体层面直接借管理费用 贷资本公积-其他资本公积是吗？母公司单体层面是否需要进行相关的账务处理呢？", "reply": "甲公司的账务处理是  借：长期股权投资——A  A+B\n\r\n                            贷：资本公积-其他资本公积\n\r\nA公司的账务处理：  借：管理费用（A）\n\r\n                    借：长期股权投资——B（B）\n\r\n                    贷：资本公积-其他资本公积（A+B）\n\r\nB公司的账务处理：  借：管理费用（B）\n\r\n                    贷：资本公积-其他资本公积（B）\n\r\n在甲集团的合并报表中抵消的是  借：资本公积-其他资本公积\n\r\n                                  贷：长期股权投资 A+B\n\n\r\n即，逐层向下传递费用和资本公积影响。\n\n---\n\n比较合理的做法是将此类代承担费用形式的资本性投入进行逐级下沉，逐级向下确认长期股权投资和对应的资本公积，相当于A接受其母公司的资本性投入后转投给其自己的子公司B。\n\n---\n\n1、先计入负债，到交付A公司股权时核销该负债。2、接受服务企业就是激励对象供职或主要服务的子公司。\n\n---\n\n2、3都是接受服务企业本身即负有结算义务的情况，也就是两者合一的情形。\n\n---\n\n是，子公司自身报表中直接按权益结算股份支付进行处理，母公司个别报表层面无需会计处理。", "searchText": "5051348 企业集团内涉及不同企业的股份支付交易的理解及会计处理 最近更新 随风8373 2016-01-12t16:08:39.000z 2026-05-14t10:09:00.000z 请教陈版：\n财会[2010]15号\n七、企业集团内涉及不同企业的股份支付交易应当如何进行会计处理?\n答：企业集团（由母公司和其全部子公司构成）内发生的股份支付交易，应当按照以下规定进行会计处理：\n（一）结算企业以其本身权益工具结算的，应当将该股份支付交易作为权益结算的股份支付处理；除此之外，应当作为现金结算的股份支付处理。\n结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积（其他资本公积）或负债。\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n本解释发布前股份支付交易未按上述规定处理的，应当进行追溯调整，追溯调整不切实可行的除外。\n\n光看定义怕理解有偏差，举个例子请陈版指点：\n甲集团公司旗下有三家公司a、b、c，其中a公司全资控股b、c公司，甲集团考虑公司长远发展故对员工进行股权激励，以甲公司持有的a公司股权对a公司高管和b公司高管进行股权激励。在本案例中，结算公司为甲集团公司，其权益工具为甲公司持有的对a公司的股权。接受服务企业是a公司和b公司。\n甲公司的账务处理是  借：长期股权投资  a+b\n                            贷：资本公积-其他资本公积\na公司和b公司的账务处理：  借：管理费用（a+b）\n                              贷：资本公积-其他资本公积\n在甲集团的合并报表中抵消的是  借：资本公积-其他资本公积\n                                  贷：长期股权投资 a+b\n我的疑问是以甲公司持有的a公司股权对b公司员工进行股份支付交易是否符合财会[2010]15号的规定，下级公司的员工享受上级公司的股份支付是否合规。在上例中就是a公司和b公司的账务处理是否正确。\n\n---\n\na确认长骨投资b是否合适？毕竟集团公司甲提供方？\n\n---\n\n（１）陈老师，结算企业以其自身权益工具结算的，计入资本公积，以其他企业权益工具结算的，计入负债。上例中，甲集团以a公司股权进行结算，是否应该计入负债啊？\n\r\n（２）下文中，加粗部分：接受服务企业具有结算义务，授予本企业职工的是其本身权益工具（或其他单位权益工具）……\n\r\n我想问，这个接受服务企业是谁呢？是第一段中的结算企业吗？是结算企业与接受服务企业同为一个企业的情况，重新把第一段的处理方式描述了一遍？还是，就是指仅子公司的处理？\n\r\n（一）结算企业以其本身权益工具结算的，应当将该股份支付交易作为权益结算的股份支付处理；除此之外，应当作为现金结算的股份支付处理。\n\r\n结算企业是接受服务企业的投资者的，应当按照授予日权益工具的公允价值或应承担负债的公允价值确认为对接受服务企业的长期股权投资，同时确认资本公积（其他资本公积）或负债。\n\r\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n---\n\n陈老师，感谢您凌晨还在回复大家的问题！太佩服您了！\n\n（二）接受服务企业没有结算义务或授予本企业职工的是其本身权益工具的，应当将该股份支付交易作为权益结算的股份支付处理；接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的，应当将该股份支付交易作为现金结算的股份支付处理。\n\n上面这段话分为三种情况：\n\n1.接受服务企业没有结算义务:即母公司替子公司结算，子公司仅接受服务不需要结算。这个好理解 \n\n2.接受服务企业授予本企业职工的是其本身权益工具；\n\n3.接受服务企业具有结算义务且授予本企业职工的是企业集团内其他企业权益工具的。\n\n上述2.3两种情况，不太能理解，如果母公司替它结算了，为什么子公司还要结算？高会有个辅导书上说，这种情况下，是结算企业和接受服务企业为同一企业的情况。\n\n---\n\n如果子公司属于“接受服务企业本身即负有结算义务的情况”，两者合一的处理，即在子公司单体层面直接借管理费用 贷资本公积-其他资本公积是吗？母公司单体层面是否需要进行相关的账务处理呢？ 甲公司的账务处理是  借：长期股权投资——a  a+b\n\r\n                            贷：资本公积-其他资本公积\n\r\na公司的账务处理：  借：管理费用（a）\n\r\n                    借：长期股权投资——b（b）\n\r\n                    贷：资本公积-其他资本公积（a+b）\n\r\nb公司的账务处理：  借：管理费用（b）\n\r\n                    贷：资本公积-其他资本公积（b）\n\r\n在甲集团的合并报表中抵消的是  借：资本公积-其他资本公积\n\r\n                                  贷：长期股权投资 a+b\n\n\r\n即，逐层向下传递费用和资本公积影响。\n\n---\n\n比较合理的做法是将此类代承担费用形式的资本性投入进行逐级下沉，逐级向下确认长期股权投资和对应的资本公积，相当于a接受其母公司的资本性投入后转投给其自己的子公司b。\n\n---\n\n1、先计入负债，到交付a公司股权时核销该负债。2、接受服务企业就是激励对象供职或主要服务的子公司。\n\n---\n\n2、3都是接受服务企业本身即负有结算义务的情况，也就是两者合一的情形。\n\n---\n\n是，子公司自身报表中直接按权益结算股份支付进行处理，母公司个别报表层面无需会计处理。 https://bbs.esnai.com/thread-5051348-1-1.html"}, {"tid": "5092144", "title": "请教陈版主关于合并报表抵消分录的问题", "category": "最近更新", "questionAuthor": "hl1314526", "questionTime": "2016-11-29T05:55:18.000Z", "replyTime": "2026-05-14T10:00:53.000Z", "replySortTime": "2026-05-14T10:00:53.000Z", "url": "https://bbs.esnai.com/thread-5092144-1-1.html", "question": "（1）举例：假设甲公司为母公司，拥有子公司乙公司80%股份，甲公司在2013年1月1日取得乙公司的80%股份，购买日（合并日）时点乙公司所有者权益中专项储备报表余额为0，2013年乙公司提取了2000万元的专项储备（假设借方科目为损益类科目），那么甲公司在2013年12月31日编制合并报表时的调整抵消分录（针对专项储备）：（直接基于成本法编制）（1）借：专项储备 2000 贷：少数股东权益：400  未分配利润-年末 1600 这样处理是否正确？\n\n---\n\n是否实际上最终的影响为借：专项储备 400  贷：少数股东损益400。具体分拆是这样的：首先针对确认少数股东利润：借： 少数股东权益 400  贷：少数股东损益 400 ，然后调整归属于母公司的专 股权确认的处置收益中。\n\n---\n\n是这样。 https://bbs.esnai.com/thread-5496932-1-1.html"}, {"tid": "5496929", "title": "建筑劳务分包属于代理人还是主要责任人！！！", "category": "收入确认/总额净额", "questionAuthor": "wuzhilin_000", "questionTime": "2026-04-28T12:54:33.000Z", "replyTime": "2026-05-12T10:00:59.000Z", "replySortTime": "2026-05-12T10:00:59.000Z", "url": "https://bbs.esnai.com/thread-5496929-1-1.html", "question": "本公司中标A工程项目的建筑劳务分包（7个区域的装修工程），然后在将A项目的装修工程分包给不同的班组（均为个人），与招标单位（以下统称为“发包方”）和班组签订合同的主要条款如下：\n\n1、与“发包方”签订合同的主要条款：\n\r\n（1）工作方式：实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理。\n\r\n（2）工期要求：本公司应按照发包方的要求进行施工作业，准时完成施工，以保证工程按期竣工验收交付使用。\n\r\n（3）质量要求：因本公司的原因造成工程质量达不到验收条件的，在合理时间内无偿返工直到达到验收标准，否则发包方有权单方解除合同并可要求本公司赔偿损失。\n\r\n（4）计价方式：a、计时制：按照中标单价执行；b、计量制：按施工据实计量；\n\r\n（5）计量方式：由发包方组织验收合格后，对合格的工程进行结算。\n\r\n（6）支付方式：由发包方统一验收后，对合格工程量进行计量支付，按完成工程量97%进行支付，项目完工并通过验收后，发包方一次性支付所有费用，同时提供相应金额数量劳务发票。\n\r\n（7）施工管理及安全：\n\r\na、施工中发包方方有权随机对本公司施工工艺质量等进行检查，如发现问题，本公司应在发包方规定的限期内整改至合格，如不能按时整改，所延误的工期及损失由本公司全额赔偿。\n\r\nb、本公司应遵守工程建设安全生产的有关管理规定，严格按安全标准组织施工，本公司负责对施工工人进行安全教育，采取必要的安全措施，安全责任由本公司负责。\n\n\r\nc、本公司需听从发包方工作安排，工人数量无条件达到工程需求，如因本公司原因造成工期延误，发包方有权对本公司进行处罚。\n\n2、与“班组”签订合同的 主要条款：\n\r\n（1）合同金额：按实际发生工程量计算(单包工)。\n\r\n（2）付款方式：施工费用按完成工程量支付(或按工程进度节点支付)，工程完工后，支付结算款的97%，余款3%待工程项目部验收合格后一次性付清。\n\r\n（3）工程质量标准：所施工范围内的工艺质量必须达到本公司要求，按照本公司要求实施，并接受随时抽查。\n\r\n（4）安全责任：a、班组与每个务工人员签订《劳动合同》，并支付工资（务工人员工资每月造册备案）。若因此带来的纠纷由班组承担。b、班组应遵守安全生产相关规定，严格按照安全施工标准进行施工，加强安全教育。若因此造成的事故由班组承担。\n\r\n（5）若中途无故停工、罢工，造成的损失由班组承担。\n\r\n本人的判断如下：\n\r\n1、由于该项目的建筑劳务分包，是通过投标所得，因此本公司无定价权；本公司按照发包方的要求进行施工，在整个过程中不能对该项装修工程进行更改。\n\r\n2、本公司与发包方、班组签订的合同，工程相关责任（安全事故、工程质量、停工损失等）转嫁给了班组。\n\r\n3、发包方与本公司、本公司与班组的付款方式均为，工程完工后支付97%，剩余3%，验收合格后一次性支付。因此本公司实质上不承担与班组的工程款项支付的违约风险。\n\r\n4、该项工程实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理，本公司不承担装修工程的主要风险。\n\r\n综上所述：本公司在转让商品前（装修工程），不能控制该商品（装修工程）。因此，本人认为该业务应当采用“净额法”核算。\n\r\n请陈老师指教！请各位大佬指教！\n\n---\n\n陈老师，另外有个疑问，关于上下游与中间商的责任承担问题：一般的合同签订条款为，下游与中间商签订合同，约定，商品或者服务的质量问题由中间商承担；中间商与上游签订的合同约定，商品或者服务的质量由上游承担。在判断其责任承担方时候，是否可以理解为中间商不承担任何商品或者服务的质量风险，因为中间商将质量风险从下游“转移”到了上游。这种责任在法律上是否可以转移呢？在会计上是否可以转移呢？", "reply": "赞同主帖意见，应采用净额法，不赞同采用总额法处理。\n\r\n公司中标A工程项目的建筑劳务分包（7个区域的装修工程），然后在将A项目的装修工程分包给不同的班组（均为个人），与招标方和分包方分别签订背靠背的合同，这种情况下仍属于分包商直接向业主提供服务，本企业并未取得相关建筑劳务的控制权。\n\r\n由于7个区域互相独立，本企业并未对其进行重大整合，因此7个区域可分别视为不同的履约义务，应针对具体的单项履约义务判断是否构成主要责任人。\n\r\n虽然名义上本企业对业主（招标方）承担主要责任，但可通过分包合同将该等责任转嫁给分包商，且通过对分包商的资质审核确保其有能力承担这些责任，从而将本企业承担连带责任的风险降至最低。\n\n---\n\n法律上两者仍是互相独立的，但会计上认为实质上可以转移（前提是上游具备实际承担责任的能力）。", "searchText": "5496929 建筑劳务分包属于代理人还是主要责任人！！！ 收入确认/总额净额 wuzhilin_000 2026-04-28t12:54:33.000z 2026-05-12t10:00:59.000z 本公司中标a工程项目的建筑劳务分包（7个区域的装修工程），然后在将a项目的装修工程分包给不同的班组（均为个人），与招标单位（以下统称为“发包方”）和班组签订合同的主要条款如下：\n\n1、与“发包方”签订合同的主要条款：\n\r\n（1）工作方式：实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理。\n\r\n（2）工期要求：本公司应按照发包方的要求进行施工作业，准时完成施工，以保证工程按期竣工验收交付使用。\n\r\n（3）质量要求：因本公司的原因造成工程质量达不到验收条件的，在合理时间内无偿返工直到达到验收标准，否则发包方有权单方解除合同并可要求本公司赔偿损失。\n\r\n（4）计价方式：a、计时制：按照中标单价执行；b、计量制：按施工据实计量；\n\r\n（5）计量方式：由发包方组织验收合格后，对合格的工程进行结算。\n\r\n（6）支付方式：由发包方统一验收后，对合格工程量进行计量支付，按完成工程量97%进行支付，项目完工并通过验收后，发包方一次性支付所有费用，同时提供相应金额数量劳务发票。\n\r\n（7）施工管理及安全：\n\r\na、施工中发包方方有权随机对本公司施工工艺质量等进行检查，如发现问题，本公司应在发包方规定的限期内整改至合格，如不能按时整改，所延误的工期及损失由本公司全额赔偿。\n\r\nb、本公司应遵守工程建设安全生产的有关管理规定，严格按安全标准组织施工，本公司负责对施工工人进行安全教育，采取必要的安全措施，安全责任由本公司负责。\n\n\r\nc、本公司需听从发包方工作安排，工人数量无条件达到工程需求，如因本公司原因造成工期延误，发包方有权对本公司进行处罚。\n\n2、与“班组”签订合同的 主要条款：\n\r\n（1）合同金额：按实际发生工程量计算(单包工)。\n\r\n（2）付款方式：施工费用按完成工程量支付(或按工程进度节点支付)，工程完工后，支付结算款的97%，余款3%待工程项目部验收合格后一次性付清。\n\r\n（3）工程质量标准：所施工范围内的工艺质量必须达到本公司要求，按照本公司要求实施，并接受随时抽查。\n\r\n（4）安全责任：a、班组与每个务工人员签订《劳动合同》，并支付工资（务工人员工资每月造册备案）。若因此带来的纠纷由班组承担。b、班组应遵守安全生产相关规定，严格按照安全施工标准进行施工，加强安全教育。若因此造成的事故由班组承担。\n\r\n（5）若中途无故停工、罢工，造成的损失由班组承担。\n\r\n本人的判断如下：\n\r\n1、由于该项目的建筑劳务分包，是通过投标所得，因此本公司无定价权；本公司按照发包方的要求进行施工，在整个过程中不能对该项装修工程进行更改。\n\r\n2、本公司与发包方、班组签订的合同，工程相关责任（安全事故、工程质量、停工损失等）转嫁给了班组。\n\r\n3、发包方与本公司、本公司与班组的付款方式均为，工程完工后支付97%，剩余3%，验收合格后一次性支付。因此本公司实质上不承担与班组的工程款项支付的违约风险。\n\r\n4、该项工程实行包工不包料方式进行施工，材料由发包方供应，本公司负责工程劳务施工管理，本公司不承担装修工程的主要风险。\n\r\n综上所述：本公司在转让商品前（装修工程），不能控制该商品（装修工程）。因此，本人认为该业务应当采用“净额法”核算。\n\r\n请陈老师指教！请各位大佬指教！\n\n---\n\n陈老师，另外有个疑问，关于上下游与中间商的责任承担问题：一般的合同签订条款为，下游与中间商签订合同，约定，商品或者服务的质量问题由中间商承担；中间商与上游签订的合同约定，商品或者服务的质量由上游承担。在判断其责任承担方时候，是否可以理解为中间商不承担任何商品或者服务的质量风险，因为中间商将质量风险从下游“转移”到了上游。这种责任在法律上是否可以转移呢？在会计上是否可以转移呢？ 赞同主帖意见，应采用净额法，不赞同采用总额法处理。\n\r\n公司中标a工程项目的建筑劳务分包（7个区域的装修工程），然后在将a项目的装修工程分包给不同的班组（均为个人），与招标方和分包方分别签订背靠背的合同，这种情况下仍属于分包商直接向业主提供服务，本企业并未取得相关建筑劳务的控制权。\n\r\n由于7个区域互相独立，本企业并未对其进行重大整合，因此7个区域可分别视为不同的履约义务，应针对具体的单项履约义务判断是否构成主要责任人。\n\r\n虽然名义上本企业对业主（招标方）承担主要责任，但可通过分包合同将该等责任转嫁给分包商，且通过对分包商的资质审核确保其有能力承担这些责任，从而将本企业承担连带责任的风险降至最低。\n\n---\n\n法律上两者仍是互相独立的，但会计上认为实质上可以转移（前提是上游具备实际承担责任的能力）。 https://bbs.esnai.com/thread-5496929-1-1.html"}, {"tid": "5496845", "title": "求助陈版主，关于收购少数股东股权导致企业合并的问题", "category": "合并/股权/权益法", "questionAuthor": "18826079924", "questionTime": "2026-04-21T06:33:16.000Z", "replyTime": "2026-05-12T10:00:06.000Z", "replySortTime": "2026-05-12T10:00:06.000Z", "url": "https://bbs.esnai.com/thread-5496845-1-1.html", "question": "甲公司的原控股股东为自然人A，A新设一家由其控制的公司B，由B收购了甲公司的少数股权，收购完成后B公司控制了甲公司。求助：该交易属于同一控制下控股合并还是收购少数股权？长期股权投资初始计量成本是甲公司净资产还是支付的价款？\n\n---\n\n谢谢陈版主。实控人A与公司B签订了一致行动协议，A和B是甲公司的共同控股股东，这种情况下是否认定为控制权没有转移？该交易可以认定为收购少数股东股权？", "reply": "B是新设公司，此前并不控制甲公司，该交易后取得对甲公司的控制权（我理解应是在B收购甲的少数股权后，A通过托管等协议将管理权授予B公司），因此应作为同一控制下的合并处理。\n\r\n如果A是公司，则在A的合并报表中，该交易体现为收购甲公司的少数股权。\n\n---\n\n实质控制权有可能并未转移，仍以实控人控制为主。但要具体情况具体分析。", "searchText": "5496845 求助陈版主，关于收购少数股东股权导致企业合并的问题 合并/股权/权益法 18826079924 2026-04-21t06:33:16.000z 2026-05-12t10:00:06.000z 甲公司的原控股股东为自然人a，a新设一家由其控制的公司b，由b收购了甲公司的少数股权，收购完成后b公司控制了甲公司。求助：该交易属于同一控制下控股合并还是收购少数股权？长期股权投资初始计量成本是甲公司净资产还是支付的价款？\n\n---\n\n谢谢陈版主。实控人a与公司b签订了一致行动协议，a和b是甲公司的共同控股股东，这种情况下是否认定为控制权没有转移？该交易可以认定为收购少数股东股权？ b是新设公司，此前并不控制甲公司，该交易后取得对甲公司的控制权（我理解应是在b收购甲的少数股权后，a通过托管等协议将管理权授予b公司），因此应作为同一控制下的合并处理。\n\r\n如果a是公司，则在a的合并报表中，该交易体现为收购甲公司的少数股权。\n\n---\n\n实质控制权有可能并未转移，仍以实控人控制为主。但要具体情况具体分析。 https://bbs.esnai.com/thread-5496845-1-1.html"}, {"tid": "5115895", "title": "应收账款保理的账务处理", "category": "最近更新", "questionAuthor": "anderial", "questionTime": "2017-04-13T09:03:48.000Z", "replyTime": "2026-05-12T10:00:06.000Z", "replySortTime": "2026-05-12T10:00:06.000Z", "url": "https://bbs.esnai.com/thread-5115895-1-1.html", "question": "母子公司公司之间有正常购销关系\n\r\n子公司将对母公司的应收账款向银行申请无追索权的公开保理业务\n\r\n母公司同时与银行签订了代理付款协议，约定应付款项到期后由银行直接从母公司账户中扣款进行支付，且不可撤销\n\r\n合并报表层面没有疑问，按照应收账款保理的金额作为短期借款，收到款项与应收账款差额作为财务费用。现金流上应收金额作为筹资现金流入，利息作为筹资现金流出。\n\r\n但是在单体报表层面有点疑问\n\r\n在子公司单体报表层面\n\r\n应收账款应该终止确认，收到款项与应收账款差额作为财务费用列支，应收款项作为经营性现金流入，利息支出作为筹资现金流出\n\r\n单体报表现金流上\n\r\n在母公司单体报表层面\n\r\n该如何处理：\n\r\n有两种选择，一种继续挂应付账款子公司，但是会和子公司应收账款无法匹配\n\r\n一种是将应付账款转为短期借款进行列报，还是将应付账款修改为对银行的应付款项\n\r\n母公司现金流又该如何考虑呢\n\n---\n\n陈版主好，如果该笔保理融资占用的是母公司的授信额度呢？", "reply": "因为是公开保理，母公司应当直接向银行履行付款义务，所以应将负债的科目调整为“其他应付款——X银行”。\n\n---\n\n也可能在母公司个别报表和合并报表中列报为短期借款。", "searchText": "5115895 应收账款保理的账务处理 最近更新 anderial 2017-04-13t09:03:48.000z 2026-05-12t10:00:06.000z 母子公司公司之间有正常购销关系\n\r\n子公司将对母公司的应收账款向银行申请无追索权的公开保理业务\n\r\n母公司同时与银行签订了代理付款协议，约定应付款项到期后由银行直接从母公司账户中扣款进行支付，且不可撤销\n\r\n合并报表层面没有疑问，按照应收账款保理的金额作为短期借款，收到款项与应收账款差额作为财务费用。现金流上应收金额作为筹资现金流入，利息作为筹资现金流出。\n\r\n但是在单体报表层面有点疑问\n\r\n在子公司单体报表层面\n\r\n应收账款应该终止确认，收到款项与应收账款差额作为财务费用列支，应收款项作为经营性现金流入，利息支出作为筹资现金流出\n\r\n单体报表现金流上\n\r\n在母公司单体报表层面\n\r\n该如何处理：\n\r\n有两种选择，一种继续挂应付账款子公司，但是会和子公司应收账款无法匹配\n\r\n一种是将应付账款转为短期借款进行列报，还是将应付账款修改为对银行的应付款项\n\r\n母公司现金流又该如何考虑呢\n\n---\n\n陈版主好，如果该笔保理融资占用的是母公司的授信额度呢？ 因为是公开保理，母公司应当直接向银行履行付款义务，所以应将负债的科目调整为“其他应付款——x银行”。\n\n---\n\n也可能在母公司个别报表和合并报表中列报为短期借款。 https://bbs.esnai.com/thread-5115895-1-1.html"}, {"tid": "5496862", "title": "合并报表外币折算处理请教", "category": "合并/股权/权益法", "questionAuthor": "leevon", "questionTime": "2026-04-22T12:17:12.000Z", "replyTime": "2026-05-12T10:00:06.000Z", "replySortTime": "2026-05-12T10:00:06.000Z", "url": "https://bbs.esnai.com/thread-5496862-1-1.html", "question": "1.以历史成本计量的外币非货币性项目，仍采用交易发生日的即期汇率折算，不改变其记账本位币金额。\n\r\n2资产负债表中的资产和负债项目，采用资产负债表日的即期汇率折算，所有者权益项目除“未分配利润”项目外，其他项目采用发生时的即期汇率折算。\n\r\n准则里有这两句话不太理解，感觉有点冲突，如果A公司的记账本位币是美元，他的母公司B记账本位币是人民币，A公司曾用人民币购买了一台固定资产，那么B公司在做合并报表时，应该是以第一条采用交易发生日即期汇率折算，还是直接按资产负债表日汇率对整个报表折算？\n\n---\n\n沿用上述例子：\n\n1.母公司B记账本位币为人民币，买入以美元计价的固定资产，采用交易日即期汇率折算为人民币，期末不改变其本位币金额。\n\n2.子公司A记账本位币为美元，期末因为要纳入B的合并报表，所以子公司A报表中的资产负债（美元为单位）需要按资产负债表日汇率折算成人民币。\n\n也就是说这两个规定是针对不同的情况所做的规定，不存在冲突的说法。\n\n---\n\n那A公司买入了一项以人民币计价的固定资产，做单体报表时仍然用交易日汇率，在母公司B公司合并报表时按资产负债表日的汇率，实际上在合报时，固定资产也会受汇率的影响对吧？", "reply": "这两者适用的场景不同，因此并不冲突。\n\r\n1适用于会计核算中的期末汇兑差额调整，其特点是“从外币折算到本位币”。\n\r\n2适用于外币财务报表折算，其特点是“从本位币折算到非本位币的报告货币”。\n\n---\n\n可以这样理解。\n\n---\n\n是。", "searchText": "5496862 合并报表外币折算处理请教 合并/股权/权益法 leevon 2026-04-22t12:17:12.000z 2026-05-12t10:00:06.000z 1.以历史成本计量的外币非货币性项目，仍采用交易发生日的即期汇率折算，不改变其记账本位币金额。\n\r\n2资产负债表中的资产和负债项目，采用资产负债表日的即期汇率折算，所有者权益项目除“未分配利润”项目外，其他项目采用发生时的即期汇率折算。\n\r\n准则里有这两句话不太理解，感觉有点冲突，如果a公司的记账本位币是美元，他的母公司b记账本位币是人民币，a公司曾用人民币购买了一台固定资产，那么b公司在做合并报表时，应该是以第一条采用交易发生日即期汇率折算，还是直接按资产负债表日汇率对整个报表折算？\n\n---\n\n沿用上述例子：\n\n1.母公司b记账本位币为人民币，买入以美元计价的固定资产，采用交易日即期汇率折算为人民币，期末不改变其本位币金额。\n\n2.子公司a记账本位币为美元，期末因为要纳入b的合并报表，所以子公司a报表中的资产负债（美元为单位）需要按资产负债表日汇率折算成人民币。\n\n也就是说这两个规定是针对不同的情况所做的规定，不存在冲突的说法。\n\n---\n\n那a公司买入了一项以人民币计价的固定资产，做单体报表时仍然用交易日汇率，在母公司b公司合并报表时按资产负债表日的汇率，实际上在合报时，固定资产也会受汇率的影响对吧？ 这两者适用的场景不同，因此并不冲突。\n\r\n1适用于会计核算中的期末汇兑差额调整，其特点是“从外币折算到本位币”。\n\r\n2适用于外币财务报表折算，其特点是“从本位币折算到非本位币的报告货币”。\n\n---\n\n可以这样理解。\n\n---\n\n是。 https://bbs.esnai.com/thread-5496862-1-1.html"}, {"tid": "5409711", "title": "新金融工具准则下，对财务担保合同的核算", "category": "最近更新", "questionAuthor": "一云", "questionTime": "2020-03-12T01:01:01.000Z", "replyTime": "2026-05-12T10:00:05.000Z", "replySortTime": "2026-05-12T10:00:05.000Z", "url": "https://bbs.esnai.com/thread-5409711-1-1.html", "question": "陈老师：有以下问题请教您：1、新金融工具准则所说的对财务担保合同减值的处理，是不是只适用于专业的担保公司？  能否从准则中找到相应条文规定？\n\n\r\n2、一般企业发生财务担保时，初始计量确认及后续减值测试的会计分录处理，能否举例说明？\n\n\r\n                                       多谢陈老师\n\n\r\n                                                        一云\n\n---\n\n如果履行担保代偿义务后基本确定可以获得补偿的，则可以同时按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，同时减少计入信用减值损失的金额。\n\n\r\n请教陈老师：\n\n\r\n1.履行代偿责任同时（同一天）预计按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，这是否可以理解为金融负债的终止确认，相关的其他流动/非流动资产计入投资收益而不是减少信用减值损失。\n\n\r\n2.履行代偿责任后如1月1日履行代偿责任，6月1日基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，其实调整计入信用减值损失是否恰当？（6月1日因为金融负债已经不存在了），若不恰当是计入营业外支出（贷方）还是投资收益？\n\n---\n\n继续追问一下：请问如果财务担保合同预期信用损失实际发生偿付的处理呢？是不是借：预计负债  贷：营业外支出，与当时计提预计负债时的差额，是否调整信用减值损失呢？", "reply": "1、一般企业更适用于金融工具确认和计量准则中的财务担保合同会计处理模式。事实上担保公司更可能采用保险合同会计模式，而一般企业运用保险合同会计模式还是存在困难的。\n\r\n2、基本分录是：借：信用减值损失，贷：预计负债。但这里只是借用了预计负债的科目名称，实际上其后续计量原则并不是由或有事项准则规范的。如果履行担保代偿义务后基本确定可以获得补偿的，则可以同时按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，同时减少计入信用减值损失的金额。\n\n---\n\n我前面的回复是针对期末计提预计负债，而不是针对实际履行代偿责任时的处理。所以是减少信用减值损失。履行代偿责任后确定可以取得补偿的，可以作为投资收益，也可以冲减信用减值损失（无定论）。\n\n---\n\n贷方是货币资金（不是营业外支出）。其他合理。", "searchText": "5409711 新金融工具准则下，对财务担保合同的核算 最近更新 一云 2020-03-12t01:01:01.000z 2026-05-12t10:00:05.000z 陈老师：有以下问题请教您：1、新金融工具准则所说的对财务担保合同减值的处理，是不是只适用于专业的担保公司？  能否从准则中找到相应条文规定？\n\n\r\n2、一般企业发生财务担保时，初始计量确认及后续减值测试的会计分录处理，能否举例说明？\n\n\r\n                                       多谢陈老师\n\n\r\n                                                        一云\n\n---\n\n如果履行担保代偿义务后基本确定可以获得补偿的，则可以同时按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，同时减少计入信用减值损失的金额。\n\n\r\n请教陈老师：\n\n\r\n1.履行代偿责任同时（同一天）预计按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，这是否可以理解为金融负债的终止确认，相关的其他流动/非流动资产计入投资收益而不是减少信用减值损失。\n\n\r\n2.履行代偿责任后如1月1日履行代偿责任，6月1日基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，其实调整计入信用减值损失是否恰当？（6月1日因为金融负债已经不存在了），若不恰当是计入营业外支出（贷方）还是投资收益？\n\n---\n\n继续追问一下：请问如果财务担保合同预期信用损失实际发生偿付的处理呢？是不是借：预计负债  贷：营业外支出，与当时计提预计负债时的差额，是否调整信用减值损失呢？ 1、一般企业更适用于金融工具确认和计量准则中的财务担保合同会计处理模式。事实上担保公司更可能采用保险合同会计模式，而一般企业运用保险合同会计模式还是存在困难的。\n\r\n2、基本分录是：借：信用减值损失，贷：预计负债。但这里只是借用了预计负债的科目名称，实际上其后续计量原则并不是由或有事项准则规范的。如果履行担保代偿义务后基本确定可以获得补偿的，则可以同时按基本确定可获得第三方补偿的金额确认一项其他流动/非流动资产，同时减少计入信用减值损失的金额。\n\n---\n\n我前面的回复是针对期末计提预计负债，而不是针对实际履行代偿责任时的处理。所以是减少信用减值损失。履行代偿责任后确定可以取得补偿的，可以作为投资收益，也可以冲减信用减值损失（无定论）。\n\n---\n\n贷方是货币资金（不是营业外支出）。其他合理。 https://bbs.esnai.com/thread-5409711-1-1.html"}, {"tid": "5343921", "title": "chenyiwei版主：有关外币永续债的期末计量", "category": "最近更新", "questionAuthor": "562345436", "questionTime": "2018-06-01T08:18:08.000Z", "replyTime": "2026-05-12T10:00:04.000Z", "replySortTime": "2026-05-12T10:00:04.000Z", "url": "https://bbs.esnai.com/thread-5343921-1-1.html", "question": "陈版主您好，请问外币永续债在会计期末，因汇率变动，导致期末永续债**价值较期初**价值发生变化，应如何进行账务处理？烦请分权益性和负债行两种情况介绍。\n\n---\n\n请教陈版主，\n\n关于列报于权益的外币永续债，多年之后公司打算赎回\n\n权益中的项目以发生当时的汇率入账，后续没有做调整。但归还时需要按照原币金额归还，则会导致实际本位币归还额与其他权益工具期末余额存在差异。 这个差异应该计入什么科目比较合适？\n\n谢谢！", "reply": "永续债如属于负债的，应根据其分类和后续计量原则（以摊余成本或公允价值进行后续计量）处理。以摊余成本计量的，汇率变动影响列入汇兑损益；以公允价值计量的，汇率变动影响计入公允价值变动损益。\n\r\n永续债如属于权益的，不确认其汇率变动影响。\n\n---\n\n应调整权益，而不是列入汇兑损益等损益类科目。", "searchText": "5343921 chenyiwei版主：有关外币永续债的期末计量 最近更新 562345436 2018-06-01t08:18:08.000z 2026-05-12t10:00:04.000z 陈版主您好，请问外币永续债在会计期末，因汇率变动，导致期末永续债**价值较期初**价值发生变化，应如何进行账务处理？烦请分权益性和负债行两种情况介绍。\n\n---\n\n请教陈版主，\n\n关于列报于权益的外币永续债，多年之后公司打算赎回\n\n权益中的项目以发生当时的汇率入账，后续没有做调整。但归还时需要按照原币金额归还，则会导致实际本位币归还额与其他权益工具期末余额存在差异。 这个差异应该计入什么科目比较合适？\n\n谢谢！ 永续债如属于负债的，应根据其分类和后续计量原则（以摊余成本或公允价值进行后续计量）处理。以摊余成本计量的，汇率变动影响列入汇兑损益；以公允价值计量的，汇率变动影响计入公允价值变动损益。\n\r\n永续债如属于权益的，不确认其汇率变动影响。\n\n---\n\n应调整权益，而不是列入汇兑损益等损益类科目。 https://bbs.esnai.com/thread-5343921-1-1.html"}, {"tid": "5496877", "title": "按照中国注册会计师审计准则执行审计工作出具的审计报告是否可以使用英语等外国文...", "category": "审计/报告表达", "questionAuthor": "德鲁大叔", "questionTime": "2026-04-23T14:24:37.000Z", "replyTime": "2026-05-12T10:00:04.000Z", "replySortTime": "2026-05-12T10:00:04.000Z", "url": "https://bbs.esnai.com/thread-5496877-1-1.html", "question": "请教陈版\n背景信息：\nXYZ公司一家位于上海的外商投资企业，财务报表编制基础为企业会计准则，其母公司位于境外。\nABC会计师事务所是为一家位于上海的有限责任所，并非中国境内的中外合作会计师事务所或国际会计公司成员所。\nABC事务所接受委托按照中国注册会计师审计准则对XYC公司2024年度财务报表执行审计工作，并在业务约定书中约定最终交付的审计报告须使用外国文字提交XYZ母公司。\nABC事务所在实际开展执行审计工作中，使用中文编制审计工作底稿，使用外国文字出具审计报告并加盖了事务所公章及两名注册会计师签章。\n相关准则依据：\n关于编制审计工作底稿使用何种文字的要求，《中国注册会计师审计准则第1131号——审计工作底稿》第十六条规定“编制审计工作底稿的文字应当使用中文会计师事务所执行涉外业务时可以同时使用某种外国文字。”\n但关于出具审计报告使用何种文字的要求，我们在《中国注册会计师审计准则第1501号——对财务报表形成审计意见和出具审计报告》等相关准则中未见相应表述。\n最终问题：\n在本案例中，按照中国注册会计师审计准则执行审计工作出具的审计报告是否可以使用英语等外国文字书写？ABC公司使用外国文字出具并加盖了事务所公章及两名注册会计师签章的审计报告是否具备鉴证效力？\n\n---\n\n谢谢陈老师解答，还有想再请问下是否有准则依据，我们内部讨论下来也觉得正式版本应为中文，但是始终没找到准则依据，1131准则也只规定了工作底稿的文字要求，但始终没有找到规定审计报告使用何种文字的要求", "reply": "正式版本应为中文，可根据委托方需求提供英文译本（一般译本上不签名盖章），但应注明：当中英文两种文本不一致时，以中文文本为准。\n\n---\n\n可以查阅《国家通用语言文字法》等作为依据。审计准则中确实没有提及报告应以中文作为正式文本出具。", "searchText": 处理问题，辛苦陈版主在百忙之中指导一下\n\n公司设立了一个持股平台，简称为a吧（合伙企业）。公司设立初期就预留了期权激励的总金额，a将对应这部分金额的投资款在设立初期就汇款给公司（a的款项来源是借款，a占公司的股份不到20%）。\n\n员工的期权需要在上市时才能变现，上市前离职需要退回期权。\n\n后续在实际有员工缴纳期权行权款时，公司又设立了一些子平台：a1、a2、a3（也是合伙企业），\n\n员工将行权款缴纳给子平台，子平台将收到的行权款支付给a\n\n问题：子平台向a合伙企业支付的款项，合伙企业a向公司支付的款项，入在什么科目，是长期股权投资，还是其他权益工具投资？依据是什么 权益结构是否为：各子平台持有平台a的份额、平台a持有公司股权？另外，各子平台对平台a是否均无控制、共同控制或重大影响，平台a对本公司无控制、共同控制或重大影响？\n\n如果是，则：\n\n1、各子平台持有平台a的份额，各子平台确认为其他非流动金融资产；\n\n2、平台a持有的本公司股权，平台a确认为其他非流动金融资产。 https://bbs.esnai.com/thread-5497032-1-1.html"}, {"tid": "5497006", "title": "请教陈版主：子公司将孙公司股权无偿划转给母公司，各主体的会计处理", "category": "最近更新", "questionAuthor": "暴走hu", "questionTime": "2026-05-06T06:11:49.000Z", "replyTime": "2026-05-11T10:00:08.000Z", "replySortTime": "2026-05-11T10:00:08.000Z", "url": "https://bbs.esnai.com/thread-5497006-1-1.html", "question": "A公司是母公司，投资1000万100%持有B公司，B公司投资490万持有C公司49%的股份，但能控制C公司，纳入并表范围。截至2026年4月，C公司净资产7000万元。2026年4月，因管理调整，B公司将持有的C公司49%股权无偿划转给A公司。该事项的认定和各主体的处理如下是否正确：\n\n1、B公司单体，按照对C公司的长投账面价值减少长投490万，同时减少资本公积490万；\n\n2、B公司合并层面，不再合并C公司，减少资本公积（资本公积不足时，依次冲减盈余公积和未分配利润）、少数股东权益\n\n3、A公司单体减少对B公司的长投490万，增加对C公司长投490万，不调整资本公积；\n\n4、A公司合并层，C公司纳入直接并表范围，确认少数股东权益，整体合并划转前后，A公司合并报表数据不变。\n\n5、该处理项下，符合国家税务总局公告2015年第40号“一（三）”的规定，即“\n（三）100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付。母公司按收回投资处理，或按接受投资处理，子公司按冲减实收资本处理。母公司应按被划转股权或资产的原计税基础，相应调减持有子公司股权的计税基础。”，可以用特殊性税务处理。", "reply": "主帖中会计处理的意见基本合理；税务处理建议咨询税务专业人士意见。", "searchText": "5497006 请教陈版主：子公司将孙公司股权无偿划转给母公司，各主体的会计处理 最近更新 暴走hu 2026-05-06t06:11:49.000z 2026-05-11t10:00:08.000z a公司是母公司，投资1000万100%持有b公司，b公司投资490万持有c公司49%的股份，但能控制c公司，纳入并表范围。截至2026年4月，c公司净资产7000万元。2026年4月，因管理调整，b公司将持有的c公司49%股权无偿划转给a公司。该事项的认定和各主体的处理如下是否正确：\n\n1、b公司单体，按照对c公司的长投账面价值减少长投490万，同时减少资本公积490万；\n\n2、b公司合并层面，不再合并c公司，减少资本公积（资本公积不足时，依次冲减盈余公积和未分配利润）、少数股东权益\n\n3、a公司单体减少对b公司的长投490万，增加对c公司长投490万，不调整资本公积；\n\n4、a公司合并层，c公司纳入直接并表范围，确认少数股东权益，整体合并划转前后，a公司合并报表数据不变。\n\n5、该处理项下，符合国家税务总局公告2015年第40号“一（三）”的规定，即“\n（三）100%直接控制的母子公司之间，子公司向母公司按账面净值划转其持有的股权或资产，子公司没有获得任何股权或非股权支付。母公司按收回投资处理，或按接受投资处理，子公司按冲减实收资本处理。母公司应按被划转股权或资产的原计税基础，相应调减持有子公司股权的计税基础。”，可以用特殊性税务处理。 主帖中会计处理的意见基本合理；税务处理建议咨询税务专业人士意见。 https://bbs.esnai.com/thread-5497006-1-1.html"}, {"tid": "5497044", "title": "缴纳的印花税能计入投资性房地产吗", "category": "最近更新", "questionAuthor": "18819490381", "questionTime": "2026-05-09T10:00:07.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497044-1-1.html", "question": "陈版主，请教一个问题。A公司是B公司的控股股东，A公司将房屋建筑物划转注入B公司，B公司将该房屋建筑物作为投资性房地产核算，并同时确认增加实收资本。B公司在该资产划转过程缴纳了相应的印花税，该印花税能计入投资性房地产中吗？还是作为税金及附加核算？", "reply": "在资产取得环节缴纳的直接相关的印花税，可计入相关资产的取得成本。因此主帖案例中可以计入投资性房地产成本，无需计入损益。", "searchText": "5497044 缴纳的印花税能计入投资性房地产吗 最近更新 18819490381 2026-05-09t10:00:07.000z 2026-05-11t10:00:07.000z 陈版主，请教一个问题。a公司是b公司的控股股东，a公司将房屋建筑物划转注入b公司，b公司将该房屋建筑物作为投资性房地产核算，并同时确认增加实收资本。b公司在该资产划转过程缴纳了相应的印花税，该印花税能计入投资性房地产中吗？还是作为税金及附加核算？ 在资产取得环节缴纳的直接相关的印花税，可计入相关资产的取得成本。因此主帖案例中可以计入投资性房地产成本，无需计入损益。 https://bbs.esnai.com/thread-5497044-1-1.html"}, {"tid": "5497010", "title": "请教陈版", "category": "最近更新", "questionAuthor": "wjcpa9568", "questionTime": "2026-05-06T12:06:13.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497010-1-1.html", "question": "假设a公司对C合伙企业持股40%，认为有重大影响而作为权益法核算，在合并报表层面，60%的少数股东权益如何核算？谢谢陈版", "reply": "这种情形下，需要考虑该合伙企业C的合伙人权益是否属于《企业会计准则第37号——金融工具列报》第三章中的“特殊金融工具”，是否符合金融负债定义，但基于该章规定，在该合伙企业C自身报表中被分类为权益工具。如果是，则根据该准则第二十条规定，在A的合并报表层面，由其他合伙人持有的C合伙企业权益应列报为负债。\n\n在分析C合伙企业的权益是否属于“特殊金融工具”时，可以考虑：C企业是否有明确的存续期限限制；C合伙企业的合伙协议中是否约定只要获得利润就必须对合伙人分配，并且尽可能采用现金分配方式。", "searchText": "5497010 请教陈版 最近更新 wjcpa9568 2026-05-06t12:06:13.000z 2026-05-11t10:00:07.000z 假设a公司对c合伙企业持股40%，认为有重大影响而作为权益法核算，在合并报表层面，60%的少数股东权益如何核算？谢谢陈版 这种情形下，需要考虑该合伙企业c的合伙人权益是否属于《企业会计准则第37号——金融工具列报》第三章中的“特殊金融工具”，是否符合金融负债定义，但基于该章规定，在该合伙企业c自身报表中被分类为权益工具。如果是，则根据该准则第二十条规定，在a的合并报表层面，由其他合伙人持有的c合伙企业权益应列报为负债。\n\n在分析c合伙企业的权益是否属于“特殊金融工具”时，可以考虑：c企业是否有明确的存续期限限制；c合伙企业的合伙协议中是否约定只要获得利润就必须对合伙人分配，并且尽可能采用现金分配方式。 https://bbs.esnai.com/thread-5497010-1-1.html"}, {"tid": "5497009", "title": "求助陈版主，关于无偿划转特殊性税务处理", "category": "最近更新", "questionAuthor": "欧tomorrow27", "questionTime": "2026-05-06T09:51:10.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497009-1-1.html", "question": "A公司是集团P的一级子公司，P公司100%控股A公司，A公司持有B公司100%股权，B公司注册资本10万元，A公司实缴资本10万元，25年B公司向A公司分红550万，随后（同月内）A公司将对B公司的注册资本增加至550万，分2次投资了540万，投资后A公司对B公司长投550万，B公司实收资本550万。增资3个月以后，A公司将B公司无偿划转给P公司，B公司变成P公司一级子公司，第一次无偿划转6个月后，B公司又被无偿划转至C公司，C公司同为集团P的一级子公司。个人认为第二次无偿划转发生在12个月之内，那么第一次无偿划转时不满足特殊性税务处理要求，需要对第一次无偿划转补缴企业所得税。现在求助陈版主，请问25年通过B公司先分红再增资的交易，是否构成一揽子交易，如果构成一揽子交易，B公司分红的550万是不是会被认定内部资金的拆解，这550万是不是就不能免税了，那么第二次无偿划转后因不满足特殊性税务处理需要补缴第一次无偿划转的企业所得税时，B公司计税基础是不是也不能按照550万，而应该按照最初的10万？", "reply": "因为B是A的全资子公司，因此在同一月份内发生分红和再投资两项交易很可能应作为一个整体处理，即实质是B以留存收益转增资本。相应地，A的个别报表层面不应确认该项股利收益，也不改变对B的长投成本。", "searchText": "5497009 求助陈版主，关于无偿划转特殊性税务处理 最近更新 欧tomorrow27 2026-05-06t09:51:10.000z 2026-05-11t10:00:07.000z a公司是集团p的一级子公司，p公司100%控股a公司，a公司持有b公司100%股权，b公司注册资本10万元，a公司实缴资本10万元，25年b公司向a公司分红550万，随后（同月内）a公司将对b公司的注册资本增加至550万，分2次投资了540万，投资后a公司对b公司长投550万，b公司实收资本550万。增资3个月以后，a公司将b公司无偿划转给p公司，b公司变成p公司一级子公司，第一次无偿划转6个月后，b公司又被无偿划转至c公司，c公司同为集团p的一级子公司。个人认为第二次无偿划转发生在12个月之内，那么第一次无偿划转时不满足特殊性税务处理要求，需要对第一次无偿划转补缴企业所得税。现在求助陈版主，请问25年通过b公司先分红再增资的交易，是否构成一揽子交易，如果构成一揽子交易，b公司分红的550万是不是会被认定内部资金的拆解，这550万是不是就不能免税了，那么第二次无偿划转后因不满足特殊性税务处理需要补缴第一次无偿划转的企业所得税时，b公司计税基础是不是也不能按照550万，而应该按照最初的10万？ 因为b是a的全资子公司，因此在同一月份内发生分红和再投资两项交易很可能应作为一个整体处理，即实质是b以留存收益转增资本。相应地，a的个别报表层面不应确认该项股利收益，也不改变对b的长投成本。 https://bbs.esnai.com/thread-5497009-1-1.html"}, {"tid": "5497007", "title": "请教陈版主，按现行的会计准则，如果损益类科目不做结转损益的凭证是否行", "category": "最近更新", "questionAuthor": "tds_tang", "questionTime": "2026-05-06T07:16:47.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497007-1-1.html", "question": "请教陈版主，按现行的会计准则，如果损益类科目不做结转损益的凭证是否行\n\n因为每个月都去结转损益很麻烦，而且我现在的财务系统，不做结转损益的会计分录，也能出具准确的财务报告\n\n所以想请教，如果我们不做这部分凭证是否违规？", "reply": "会计准则并未直接规定具体的核算规则问题。在实务处理中，月末不做损益结转凭证（仅作报表结转），到年末再将全年的损益发生额一次性结转，也是可以接受的做法。", "searchText": "5497007 请教陈版主，按现行的会计准则，如果损益类科目不做结转损益的凭证是否行 最近更新 tds_tang 2026-05-06t07:16:47.000z 2026-05-11t10:00:07.000z 请教陈版主，按现行的会计准则，如果损益类科目不做结转损益的凭证是否行\n\n因为每个月都去结转损益很麻烦，而且我现在的财务系统，不做结转损益的会计分录，也能出具准确的财务报告\n\n所以想请教，如果我们不做这部分凭证是否违规？ 会计准则并未直接规定具体的核算规则问题。在实务处理中，月末不做损益结转凭证（仅作报表结转），到年末再将全年的损益发生额一次性结转，也是可以接受的做法。 https://bbs.esnai.com/thread-5497007-1-1.html"}, {"tid": "5497046", "title": "权益性交易问题", "category": "最近更新", "questionAuthor": "zsmj", "questionTime": "2026-05-09T10:00:07.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497046-1-1.html", "question": "陈老师，您好！咨询您个权益交易的问题，A、B公司分别持有C公司60%，40%股权，C、B公司分别持有D公司60%、40%股权，因集团策略调整C公司将D公司60%的表决权不可撤销的委托给B公司，C公司只享有收益权不在行使表决权，计入其他权益工具投资核算，在A公司出具集团合并报告的时候，C公司因丧失控制权产生的权益交易冲减的资本公积，应该是全部计入A公司的合并报表（视同全部是大股东A公司的权益性投入）还是A/B公司按照比例计算（40%的少数股权权益）？\n\n20260509-160940.jpg (68.16 KB, 下载次数: 0)\n\n下载附件\n\n5 天前 上传", "reply": "B和A是否为关联方？是否属于同一集团？\n\n另外，C能否仅因为表决权委托而丧失对D的控制权？如确定丧失控制权的，则转为金融资产时应确认重新计量损益，而不是权益性交易计入资本公积？", "searchText": "5497046 权益性交易问题 最近更新 zsmj 2026-05-09t10:00:07.000z 2026-05-11t10:00:07.000z 陈老师，您好！咨询您个权益交易的问题，a、b公司分别持有c公司60%，40%股权，c、b公司分别持有d公司60%、40%股权，因集团策略调整c公司将d公司60%的表决权不可撤销的委托给b公司，c公司只享有收益权不在行使表决权，计入其他权益工具投资核算，在a公司出具集团合并报告的时候，c公司因丧失控制权产生的权益交易冲减的资本公积，应该是全部计入a公司的合并报表（视同全部是大股东a公司的权益性投入）还是a/b公司按照比例计算（40%的少数股权权益）？\n\n20260509-160940.jpg (68.16 kb, 下载次数: 0)\n\n下载附件\n\n5 天前 上传 b和a是否为关联方？是否属于同一集团？\n\n另外，c能否仅因为表决权委托而丧失对d的控制权？如确定丧失控制权的，则转为金融资产时应确认重新计量损益，而不是权益性交易计入资本公积？ https://bbs.esnai.com/thread-5497046-1-1.html"}, {"tid": "5497041", "title": "差额计入“合同负债”还是“预计负债”？", "category": "最近更新", "questionAuthor": "王瑞瑞0818", "questionTime": "2026-05-08T10:00:07.000Z", "replyTime": "2026-05-11T10:00:07.000Z", "replySortTime": "2026-05-11T10:00:07.000Z", "url": "https://bbs.esnai.com/thread-5497041-1-1.html", "question": "1月1日，甲公司与乙公司签订销售合 的公司（P公司）：\n原股权结构为：股东A（法人股东）认缴663万，占比51%，股东B（法人股东，股东A控股子公司）认缴637万，占比49%。2025年9月30日，股东B转让30%股权给股东C（合伙企业）。\n股权转让完成后，P公司股权结构为：股东A认缴663万，占比51%；股东B认缴247万，占比19%；股东C 30%。P公司董事会由3名成员组成，三个股东各派1名，股东C派遣董事被选举为董事长并担任法定代表人。设监事1名，由股东A指派。\n2025年9月30日，股东C与股东A、B签署《业绩考核协议》，协议约定：考核期三年，考核期内股东C有以下权利及义务：\n一、股东C义务\n1、股东C在考核期限内须确保P公司自负盈亏。股东C团队薪酬、奖金及公司运营费用均由管理团队通过P公司经营收入获取；\n2、股东C保证在三年考核期满时，公司经审计净资产不低于业绩考核期起始时的净资产额。若经股东A指定的审计机构审计净资产低于该标准，股东C须在审计报告出具后30日内负责补足差额。\n3、各方同意，在业绩考核期内，每年暂以各方出资金额为基数，按照中国人民银行授权全国银行间同业拆借中心公布的一年期贷款市场报价利率(LPR)标准计息所得的金额进行保底性质的分红。如股东A、B在业绩考核期内每年获得的分红低于上述标准，股东C承诺优先向股东A、B分配，如仍然不足，股东C于每年分红时按照上述标准向股东A、B进行差额补足。\n4、股东C应积极拓展P公司业务，按照P公司既定的股权收购及运营思路，围绕基金设立的目标和投资方向开展工作，包括但不限于项目投资、基金募集、投后管理等，确保公司运营符合相关法律法规、行业规范及公司章程要求。\n二、股东C权利\n  (一)相对的经营自主权\n业绩考核期内股东A依据公司章程明确约定的限定条件对股东C管理团队进行授权经营。股东C有权自主决定P公司日常经营管理事务，包括但不限于人员招聘与管理及项目投资决策(在投资决策委员会权限范围内)、运营策略制定等，但整体应当服从股东A公司管理制度及治理体系，任何投资事项必须由律师事务所出具法律意见书后报董事会、股东会审议。\n(二)收益分配权利\n若在三年考核期内，股东C管理团队实现公司盈利，股东A同意在三年期满并完成保底分红后，将业绩考核期内经审计可分配收益减去业绩考核期起始日经审计可分配收益的等额资金作为奖金发放给股东C管理团队代表。奖金发放方案根据股东A制度要求经股东A总裁办公会/董事会/股东会审议通过后实施。奖金发放后由股东C团队成员按照内部约定的分配方案进行分配。\n【现状】\n2026年4月17日，股东A、B、C、P公司四方签署《P公司减资及股东退出协议》，各方确认以P公司2026年3月31日财务报告为基准，核定公司净资产、确定股东权益、差额补足及减资退款事宜。协议约定：股东A、B完全减资退出。根据《业绩考核协议》，股东C分别向股东A、B支付保底分红101,107.50元，37,667.50元；支付净资产差额补足211,081.01元，78,638.02元。\nP公司分别向股东A、B支付减资款7,373,281.99元（金额为P公司2026.03.31净资产×51%），2,746,908.98元（金额为P公司2026.03.31净资产×19%）。\n \n另股东A、B均非P公司初始股东，其股权是从P公司之前股东处购得。股东A、B个别报表上长期股权投资截至2026.03.31余额分别为7,264,504.04元和2,748,147.17元。\n \n【请教陈版以下几个问题，叩谢】\n1、股东C向股东A、B支付的保底分红101,107.50元和37,667.50元在股东A、B、C个别报表层面如何处理？\n2、股东C向股东A、B支付净资产差额补足211,081.01元和78,638.02元在股东A、B、C个别报表层面如何处理？\n3、P公司分别向股东A、B支付的减资款7,373,281.99元和2,746,908.98元在A、B、P公司个别报表层面如何处理？", "reply": "1、对于保底分红：A、B作为投资收益处理；C（实际承担和支付保底分红的一方）借记投资收益处理。\n\n2、处理原则同1。\n\n3、P支付的减资款依次冲减实收资本（减资方案约定的金额）、资本公积（资本溢价）、盈余公积、未分配利润；A、B收到的减资款与其长期股权投资账面价值之间的差额计入投资收益处理。", "searchText": "5497019 股东减资退出并涉及股东间保底分红及净资产差额补足事宜 最近更新 踏雪无痕68 2026-05-07t04:00:07.000z 2026-05-11t04:00:07.000z 【背景】\n现有标的公司（p公司）：\n原股权结构为：股东a（法人股东）认缴663万
